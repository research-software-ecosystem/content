about:
  description: A package that extends and improves the functionality of the base affy
    package. Routines that make heavy use of compiled code for speed. Central focus
    is on implementation of methods for fitting probe-level models and tools using
    these models. PLM based quality assessment tools.
  home: https://bioconductor.org/packages/3.22/bioc/html/affyPLM.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Methods for fitting probe-level models
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:affyplm
  parent_recipe:
    name: bioconductor-affyplm
    path: recipes/bioconductor-affyplm
    version: 1.56.0
package:
  name: bioconductor-affyplm
  version: 1.86.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-gcrma >=2.82.0,<2.83.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-gcrma >=2.82.0,<2.83.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - r-base
source:
  md5: 8d650502f7f4064cf957f80e5b031783
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/affyPLM_1.86.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/affyPLM/affyPLM_1.86.0.tar.gz
  - https://bioarchive.galaxyproject.org/affyPLM_1.86.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-affyplm/bioconductor-affyplm_1.86.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('affyPLM')"
