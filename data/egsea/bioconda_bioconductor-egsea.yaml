about:
  description: This package implements the Ensemble of Gene Set Enrichment Analyses
    (EGSEA) method for gene set testing. EGSEA algorithm utilizes the analysis results
    of twelve prominent GSE algorithms in the literature to calculate collective significance
    scores for each gene set.
  home: https://bioconductor.org/packages/3.22/bioc/html/EGSEA.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Ensemble of Gene Set Enrichment Analyses
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:egsea
  - usegalaxy-eu:egsea
  parent_recipe:
    name: bioconductor-egsea
    path: recipes/bioconductor-egsea
    version: 1.8.0
