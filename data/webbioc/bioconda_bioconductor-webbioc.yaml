about:
  description: An integrated web interface for doing microarray analysis using several
    of the Bioconductor packages. It is intended to be deployed as a centralized bioinformatics
    resource for use by many users. (Currently only Affymetrix oligonucleotide analysis
    is supported.)
  home: https://bioconductor.org/packages/3.22/bioc/html/webbioc.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Bioconductor Web Interface
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:webbioc
  - doi:10.1007/0-387-29362-0_18
  parent_recipe:
    name: bioconductor-webbioc
    path: recipes/bioconductor-webbioc
    version: 1.52.0
package:
  name: bioconductor-webbioc
  version: 1.82.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-annaffy >=1.82.0,<1.83.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-gcrma >=2.82.0,<2.83.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - bioconductor-vsn >=3.78.0,<3.79.0
  - r-base
  - r-biocmanager
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-annaffy >=1.82.0,<1.83.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-gcrma >=2.82.0,<2.83.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - bioconductor-vsn >=3.78.0,<3.79.0
  - r-base
  - r-biocmanager
source:
  md5: 0b0cd1da2e59a8730d6ebecaafde55ef
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/webbioc_1.82.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/webbioc/webbioc_1.82.0.tar.gz
  - https://bioarchive.galaxyproject.org/webbioc_1.82.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-webbioc/bioconductor-webbioc_1.82.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('webbioc')"
