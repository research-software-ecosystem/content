about:
  dev_url: https://github.com/KoslickiLab/fmh-funprofiler
  home: https://github.com/KoslickiLab/fmh-funprofiler
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: fmh-funprofiler is a pipeline that leverages FracMinHash (implemented in
    sourmash) to functionally profile metagenomic samples, offering a faster and more
    memory-efficient alternative to alignment-based methods.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  identifiers:
  - doi:10.1093/bioinformatics/btae397
  - biotools:fmh-funprofiler
  recipe-maintainers:
  - dkoslicki
  - miraep8
package:
  name: fmh-funprofiler
  version: 1.1.1
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python
  - pandas
  - numpy
  - sourmash
  - biom-format
source:
  sha256: 836b02dd08521bff013d2a2f209c06e9ba72d10aff67cb5373b8a15a5e4891ce
  url: https://github.com/KoslickiLab/fmh-funprofiler/archive/refs/tags/v1.1.1.tar.gz
test:
  commands:
  - funcprofiler --help
  import:
  - fmh-funprofiler
