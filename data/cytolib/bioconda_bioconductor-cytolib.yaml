about:
  description: This package provides the core data structure and API to represent
    and interact with the gated cytometry data.
  home: https://bioconductor.org/packages/3.22/bioc/html/cytolib.html
  license: AGPL-3.0-only
  license_file: /lib/R/share/licenses/GPL-3
  summary: C++ infrastructure for representing and interacting with the gated cytometry
    data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:cytolib
  parent_recipe:
    name: bioconductor-cytolib
    path: recipes/bioconductor-cytolib
    version: 1.4.0
package:
  name: bioconductor-cytolib
  version: 2.22.0
requirements:
  build:
  - null
  - null
  - automake
  - make
  host:
  - bioconductor-rhdf5lib >=1.32.0,<1.33.0
  - bioconductor-rprotobuflib >=2.22.0,<2.23.0
  - r-base
  - r-bh >=1.84.0.0
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-rhdf5lib >=1.32.0,<1.33.0
  - bioconductor-rprotobuflib >=2.22.0,<2.23.0
  - r-base
  - r-bh >=1.84.0.0
source:
  md5: 6a9e89e47f3d6d530999a39151ca4559
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/cytolib_2.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/cytolib/cytolib_2.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/cytolib_2.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cytolib/bioconductor-cytolib_2.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('cytolib')"
