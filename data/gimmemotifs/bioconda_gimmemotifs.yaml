about:
  description: Motif prediction pipeline and various motif-related tools.
  dev_url: https://github.com/vanheeringen-lab/gimmemotifs
  doc_url: https://gimmemotifs.readthedocs.io/en/master
  home: https://github.com/vanheeringen-lab/gimmemotifs
  license: MIT
  license_file: COPYING
  summary: Motif prediction pipeline and various motif-related tools.
build:
  number: 0
  run_exports:
  - null
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:gimmemotifs
  - doi:10.1093/bioinformatics/btq636
  - doi:10.1101/474403
  recipe-maintainers:
  - simonvh
  - siebrenf
  skip-lints:
  - version_constraints_missing_whitespace
outputs:
- build:
    script:
    - export LDFLAGS="${LDFLAGS} -L${PREFIX}/lib"
    - export CPPFLAGS="${CPPFLAGS} -I${PREFIX}/include"
    - python -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517
      -v
    skip: true
  name: gimmemotifs-minimal
  requirements:
    build:
    - null
    host:
    - python
    - pip
    - setuptools >=78.1.1
    - libgomp
    - llvm-openmp
    run:
    - libgomp
    - llvm-openmp
    - biofluff >=3.0.4
    - configparser
    - diskcache
    - feather-format
    - genomepy >=0.16.3
    - iteround
    - jinja2
    - logomaker
    - loguru
    - matplotlib-base >=3.3
    - numpy >=1.18
    - pandas >=1.3, <3
    - pybedtools >=0.9.0
    - pysam >=0.16
    - python
    - python-xxhash
    - qnorm  >=0.8.1
    - scikit-learn >=0.23.2
    - scipy >=1.5
    - seaborn-base >=0.10.1
    - statsmodels
    - tqdm >=4.46.1
    - xdg
    - xgboost >=1.0.2
  test:
    commands:
    - export LD_PRELOAD="${PREFIX}/lib/libgomp.so.1" && gimme --help
package:
  name: gimmemotifs
  version: 0.18.2
requirements:
  host:
  - python
  run:
  - null
  - python
  - dinamo >=1.0
  - gadem >=1.3.1
  - homer >=4.11
  - meme >=5.5.7
  - prosampler >=1.5
  - trawler >=2.0
  - weeder >=2.0
  - xxmotif >=1.6
source:
  sha256: 950a20a736871cf1a35084265cb5f8132171044abeddc0c8a77b34819e5f83ab
  url: https://github.com/vanheeringen-lab/gimmemotifs/releases/download/0.18.2/gimmemotifs-0.18.2.tar.gz
test:
  commands:
  - export LD_PRELOAD="${PREFIX}/lib/libgomp.so.1" && gimme --help
