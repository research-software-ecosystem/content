  - bioconductor-rcy3 >=2.30.0,<2.31.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - r-base
  - r-htmlwidgets
  - r-plyr
  - r-rcpp >=0.9.13
  - r-rjson
