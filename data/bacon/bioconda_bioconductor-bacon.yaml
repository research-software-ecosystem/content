about:
  description: Bacon can be used to remove inflation and bias often observed in epigenome-
    and transcriptome-wide association studies. To this end bacon constructs an empirical
    null distribution using a Gibbs Sampling algorithm by fitting a three-component
    normal mixture on z-scores.
  home: https://bioconductor.org/packages/3.22/bioc/html/bacon.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Controlling bias and inflation in association studies using the empirical
    null distribution
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:bacon
  parent_recipe:
    name: bioconductor-bacon
    path: recipes/bioconductor-bacon
    version: 1.8.0
package:
  name: bioconductor-bacon
  version: 1.38.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-ellipse
  - r-ggplot2
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-ellipse
  - r-ggplot2
source:
  md5: 5744d0b66c111f404bc38b3ccf0f1452
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/bacon_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/bacon/bacon_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/bacon_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bacon/bioconductor-bacon_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('bacon')"
