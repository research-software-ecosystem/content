about:
  dev_url: https://github.com/rrwick/Minipolish
  doc_url: https://github.com/rrwick/Minipolish/blob/v0.2.1/README.md
  home: https://github.com/rrwick/Minipolish
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: A tool for Racon polishing miniasm assemblies.
build:
  entry_points:
  - minipolish = minipolish.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517
    -vvv
extra:
  identifiers:
  - doi:10.12688/f1000research.21782.4
  - biotools:minipolish
  - usegalaxy-eu:minipolish
  recipe-maintainers:
  - thanhleviet
  - rrwick
package:
  name: minipolish
  version: 0.2.1
requirements:
  host:
  - python >=3.6
  - pip
  - setuptools
  run:
  - python >=3.6
  - python-edlib
  - minimap2
  - racon
source:
  sha256: 5c376775cb44773264d68c7018f5123eed3b7b73cbce35419812419488813441
  url: https://github.com/rrwick/Minipolish/archive/v0.2.1.tar.gz
test:
  commands:
  - minipolish --version
