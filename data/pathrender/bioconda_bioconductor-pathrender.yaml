about:
  description: build graphs from pathway databases, render them by Rgraphviz.
  home: https://bioconductor.org/packages/3.22/bioc/html/pathRender.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Render molecular pathways
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:pathrender
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-pathrender
    path: recipes/bioconductor-pathrender
    version: 1.48.0
package:
  name: bioconductor-pathrender
  version: 1.78.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-cmap >=1.15.0,<1.16.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - r-base
  - r-rcolorbrewer
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-cmap >=1.15.0,<1.16.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - r-base
  - r-rcolorbrewer
source:
  md5: b2da8dfc4341693d9d55de1b42aaac08
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/pathRender_1.78.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pathRender/pathRender_1.78.0.tar.gz
  - https://bioarchive.galaxyproject.org/pathRender_1.78.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pathrender/bioconductor-pathrender_1.78.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('pathRender')"
