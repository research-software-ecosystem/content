about:
  description: This package provides functions to identify genomic regions of interests
    based on segmented copy number data from multiple samples.
  home: https://bioconductor.org/packages/3.22/bioc/html/cghMCR.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Find chromosome regions showing common gains/losses
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:cghmcr
  - doi:10.1093/bioinformatics/btv298
  parent_recipe:
    name: bioconductor-cghmcr
    path: recipes/bioconductor-cghmcr
    version: 1.38.0
package:
  name: bioconductor-cghmcr
  version: 1.68.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-cntools >=1.66.0,<1.67.0
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-cntools >=1.66.0,<1.67.0
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
source:
  md5: 90e31a028e98883b33c2a8ec8fc9d980
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/cghMCR_1.68.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/cghMCR/cghMCR_1.68.0.tar.gz
  - https://bioarchive.galaxyproject.org/cghMCR_1.68.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cghmcr/bioconductor-cghmcr_1.68.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('cghMCR')"
