about:
  description: These recipes convert a wide variety and a growing number of public
    bioinformatic data sets into easily-used standard Bioconductor data structures.
  home: https://bioconductor.org/packages/3.22/bioc/html/AnnotationHubData.html
  license: Artistic-2.0
  summary: Transform public data resources into Bioconductor Data Structures
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:annotationhubdata
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-annotationhubdata
    path: recipes/bioconductor-annotationhubdata
    version: 1.10.3
package:
  name: bioconductor-annotationhubdata
  version: 1.40.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-annotationforge >=1.52.0,<1.53.0
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-bioccheck >=1.46.0,<1.47.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocviews >=1.78.0,<1.79.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-organismdbi >=1.52.0,<1.53.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
