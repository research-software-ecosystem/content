about:
  description: This package imports the epiviz visualization JavaScript app for genomic
    data interactive visualization. The 'epivizrServer' package is used to provide
    a web server running completely within R. This standalone version allows to browse
    arbitrary genomes through genome annotations provided by Bioconductor packages.
  home: https://bioconductor.org/packages/3.22/bioc/html/epivizrStandalone.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Run Epiviz Interactive Genomic Data Visualization App within R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:epivizrstandalone
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-epivizrstandalone
    path: recipes/bioconductor-epivizrstandalone
    version: 1.8.0
package:
  name: bioconductor-epivizrstandalone
  version: 1.38.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-epivizr >=2.40.0,<2.41.0
  - bioconductor-epivizrserver >=1.38.0,<1.39.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-git2r
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-epivizr >=2.40.0,<2.41.0
  - bioconductor-epivizrserver >=1.38.0,<1.39.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-git2r
source:
  md5: 28394c16d77ab9f43ebee83f9b26b1ee
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/epivizrStandalone_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/epivizrStandalone/epivizrStandalone_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/epivizrStandalone_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-epivizrstandalone/bioconductor-epivizrstandalone_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('epivizrStandalone')"
