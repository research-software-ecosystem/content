about:
  description: This package provides an R wrapper of the popular bowtie2 sequencing
    reads aligner and AdapterRemoval, a convenient tool for rapid adapter trimming,
    identification, and read merging. The package contains wrapper functions that
    allow for genome indexing and alignment to those indexes. The package also allows
    for the creation of .bam files via Rsamtools.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rbowtie2.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: An R Wrapper for Bowtie2 and AdapterRemoval
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:rbowtie2
  skip-lints:
  - version_constraints_missing_whitespace
package:
  name: bioconductor-rbowtie2
  version: 2.16.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - r-magrittr
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - r-magrittr
source:
  md5: 5a4fbdc3a5e7f654b15996f57fc2b4af
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rbowtie2_2.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rbowtie2/Rbowtie2_2.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/Rbowtie2_2.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rbowtie2/bioconductor-rbowtie2_2.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Rbowtie2')"
