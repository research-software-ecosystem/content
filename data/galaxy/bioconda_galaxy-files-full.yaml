about:
  dev_url: https://github.com/galaxyproject/galaxy
  doc_url: https://docs.galaxyproject.org
  home: https://galaxyproject.org
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE.txt
  summary: The Galaxy file sources framework and default plugins.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  identifiers:
  - biotools:galaxy
  - doi:10.1093/nar/gky379
  recipe-maintainers:
  - bernt-matthias
  - bgruening
package:
  name: galaxy-files-full
  version: 25.1.1
requirements:
  host:
  - python
  - pip
  - setuptools
  run:
  - python >=
  - galaxy-util >=25.1
  - fs
  - pydantic >=2.7.4
  - typing-extensions
  - fs.webdavfs
  - webdavclient3
  - fs.sshfs
  - fs.googledrivefs
  - fs-gcsfs
  - google-cloud-storage
source:
  sha256: 323c97d3d6de10a972afdc7faa8b7d446332a49e8f13279c0030e1e4f3b1f907
  url: https://pypi.org/packages/source/g/galaxy-files/galaxy_files-25.1.1.tar.gz
test:
  imports:
  - galaxy
  - galaxy.files
