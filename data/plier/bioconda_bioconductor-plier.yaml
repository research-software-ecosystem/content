about:
  description: The PLIER (Probe Logarithmic Error Intensity Estimate) method produces
    an improved signal by accounting for experimentally observed patterns in probe
    behavior and handling error at the appropriately at low and high signal values.
  home: https://bioconductor.org/packages/3.22/bioc/html/plier.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Implements the Affymetrix PLIER algorithm
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:plier
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-plier
    path: recipes/bioconductor-plier
    version: 1.50.0
package:
  name: bioconductor-plier
  version: 1.80.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
source:
