about:
  home: https://bitbucket.org/berkeleylab/checkv
  license: BSD-3-Clause-LBNL
  license_family: BSD
  license_file: LICENSE
  summary: Assess the quality of metagenome-assembled viral genomes.
build:
  entry_points:
  - checkv=checkv.cli:cli
  - anicalc=checkv.commands.anicalc:cli
  - aniclust=checkv.commands.aniclust:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  identifiers:
  - biotools:checkv
  - doi:10.1038/s41587-020-00774-7
package:
  name: checkv
  version: 1.1.1
requirements:
  host:
  - python
  - pip
  - flit-core >=3.10,<4
  run:
  - python
  - biopython
  - importlib-metadata >=0.12
  - numpy >=1.5
  - pyrodigal-gv >=0.3.1
  - psutil
  - requests
  - kcounter
  - click >=8.0
  - loguru >=0.7
  - diamond >=2.1.10
  - hmmer
source:
  sha256: ed675601dafa8c6a10739c86499af7493c50d38bb491c3da87933759c1ef5f4a
  url: https://pypi.io/packages/source/c/checkv/checkv-1.1.1.tar.gz
test:
  commands:
  - checkv --help
