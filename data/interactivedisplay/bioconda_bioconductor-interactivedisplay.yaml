about:
  description: The interactiveDisplay package contains the methods needed to generate
    interactive Shiny based display methods for Bioconductor objects.
  home: https://bioconductor.org/packages/3.22/bioc/html/interactiveDisplay.html
  license: Artistic-2.0
  summary: Package for enabling powerful shiny web displays of Bioconductor objects
build:
  noarch: generic
  number: 1
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:interactivedisplay
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-interactivedisplay
    path: recipes/bioconductor-interactivedisplay
    version: 1.18.0
package:
  name: bioconductor-interactivedisplay
  version: 1.48.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-category >=2.76.0,<2.77.0
  - bioconductor-interactivedisplaybase >=1.48.0,<1.49.0
  - r-base
  - r-ggplot2
  - r-biocmanager
  - r-gridsvg
  - r-plyr
  - r-rcolorbrewer
  - r-reshape2
  - r-shiny
  - r-xml
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-category >=2.76.0,<2.77.0
  - bioconductor-interactivedisplaybase >=1.48.0,<1.49.0
  - r-base
  - r-ggplot2
  - r-biocmanager
  - r-gridsvg
  - r-plyr
  - r-rcolorbrewer
  - r-reshape2
  - r-shiny
  - r-xml
source:
  md5: cc2fe5f87a037ab97d2825b38e911c21
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/interactiveDisplay_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/interactiveDisplay/interactiveDisplay_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/interactiveDisplay_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-interactivedisplay/bioconductor-interactivedisplay_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('interactiveDisplay')"
