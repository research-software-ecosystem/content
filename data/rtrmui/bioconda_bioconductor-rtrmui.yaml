about:
  description: This package provides a web interface to compute transcriptional regulatory
    modules with rTRM.
  home: https://bioconductor.org/packages/3.22/bioc/html/rTRMui.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: A shiny user interface for rTRM
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:rtrmui
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-rtrmui
    path: recipes/bioconductor-rtrmui
    version: 1.18.0
package:
  name: bioconductor-rtrmui
  version: 1.48.0
requirements:
  host:
  - bioconductor-motifdb >=1.52.0,<1.53.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-org.mm.eg.db >=3.22.0,<3.23.0
  - bioconductor-rtrm >=1.48.0,<1.49.0
  - r-base
  - r-shiny >=0.9
  run:
  - bioconductor-motifdb >=1.52.0,<1.53.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-org.mm.eg.db >=3.22.0,<3.23.0
  - bioconductor-rtrm >=1.48.0,<1.49.0
  - r-base
  - r-shiny >=0.9
source:
  md5: bbe727fecf3ba8c7800ff081481806e9
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rTRMui_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rTRMui/rTRMui_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/rTRMui_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rtrmui/bioconductor-rtrmui_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rTRMui')"
