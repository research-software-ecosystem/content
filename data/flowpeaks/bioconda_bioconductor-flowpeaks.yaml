  - linux-aarch64
  identifiers:
  - biotools:flowpeaks
  parent_recipe:
    name: bioconductor-flowpeaks
    path: recipes/bioconductor-flowpeaks
    version: 1.26.0
package:
  name: bioconductor-flowpeaks
  version: 1.56.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  - gsl
  run:
  - r-base
  - gsl
source:
  md5: 46269bf2e9fa1a8eebb4f0b297890ab2
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowPeaks_1.56.0.tar.gz
