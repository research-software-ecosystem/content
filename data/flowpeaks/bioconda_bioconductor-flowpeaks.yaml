about:
  description: A fast and automatic clustering to classify the cells into subpopulations
    based on finding the peaks from the overall density function generated by K-means.
  home: https://bioconductor.org/packages/3.22/bioc/html/flowPeaks.html
  license: Artistic-1.0
  summary: An R package for flow data clustering
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
