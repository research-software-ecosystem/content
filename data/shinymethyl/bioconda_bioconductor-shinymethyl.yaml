about:
  description: Interactive tool for visualizing Illumina methylation array data. Both
    the 450k and EPIC array are supported.
  home: https://bioconductor.org/packages/3.22/bioc/html/shinyMethyl.html
  license: Artistic-2.0
  summary: Interactive visualization for Illumina methylation arrays
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:shinymethyl
  parent_recipe:
    name: bioconductor-shinymethyl
    path: recipes/bioconductor-shinymethyl
    version: 1.16.0
package:
  name: bioconductor-shinymethyl
  version: 1.46.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - r-base
  - r-htmltools
  - r-rcolorbrewer
  - r-shiny
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - r-base
  - r-htmltools
  - r-rcolorbrewer
  - r-shiny
source:
  md5: e69e2edf57a08a016efb3bad517c2450
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/shinyMethyl_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/shinyMethyl/shinyMethyl_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/shinyMethyl_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-shinymethyl/bioconductor-shinymethyl_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('shinyMethyl')"
