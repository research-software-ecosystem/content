about:
  dev_url: https://github.com/EI-CoreBioinformatics/mikado
  doc_url: https://mikado.readthedocs.io/en/stable
  home: https://github.com/EI-CoreBioinformatics/mikado
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: LICENSE.txt
  summary: A Python3 annotation program to select the best gene model in each locus.
build:
  entry_points:
  - mikado = Mikado.__main__:main
  number: 1
  run_exports:
  - null
  script:
  - sed -i.bak 's|find_packages|find_namespace_packages|g' setup.py
  - sed -i.bak 's|<3.11|<3.13|' setup.py
  - rm -f *.bak
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:mikado
  - doi:10.1093/gigascience/giy093
  - doi:10.1093/gigascience/giy131
  recipe-maintainers:
  - lucventurini
  - ljyanesm
  - gemygk
  - swarbred
package:
  name: mikado
  version: 2.3.5rc3
requirements:
  build:
  - null
  - null
  - null
  - pkg-config
  host:
  - python
  - pip
  - setuptools <80.9
  - cython <3
  - numpy <2
  - scipy >=1.11.1
  run:
  - python
  - biopython >=1.79
  - datrie >=0.8
  - docutils >=0.19
  - drmaa >=0.7.9
  - hypothesis >=6.56.2
  - marshmallow >=3.14.1
  - marshmallow-dataclass >=8.5.3
  - msgpack-python >=1.0.4
  - networkx >=2.8.7
  - numpy <2
  - pandas >=1.5.0
  - pyfaidx >=0.5.9.5
  - pysam >=0.23.3
  - pytest >=7.1.3
  - python-rapidjson >=1.9
  - pyyaml >=6.0.1
  - scipy >=1.11.1
  - snakemake >=6.15.5,<8
  - sqlalchemy >=1.4.41,<2
  - sqlalchemy-utils >=0.38.3
  - sqlite
  - tabulate >=0.9.0
  - toml >=0.10.2
  - typeguard >=2.13.3
  - samtools >=1.11
  - htslib >=1.11
  - prodigal ==2.6.3
  - diamond ==2.1.16
  - portcullis >=1.2.4
source:
  sha256: e4a9a18ebfda5c1548487f609fc641010b0a4d4f6d4a791fe48ab6fb8f628d93
  url: https://github.com/EI-CoreBioinformatics/mikado/archive/refs/tags/v2.3.5rc3.tar.gz
test:
  commands:
  - mikado --help
  imports:
  - Mikado
  - Mikado.configuration
  - Mikado.loci
