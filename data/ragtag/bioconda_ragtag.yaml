about:
  dev_url: https://github.com/malonge/RagTag
  doc_url: https://github.com/malonge/RagTag/wiki
  home: https://github.com/malonge/RagTag
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Fast reference-guided genome assembly scaffolding.
build:
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  identifiers:
  - doi:10.1186/s13059-022-02823-7
  - biotools:ragtag
  - usegalaxy-eu:ragtag
  recipe-maintainers:
  - malonge
package:
  name: ragtag
  version: 2.1.0
requirements:
  host:
  - pip
  - python >=3
  - setuptools
  run:
  - python >=3
  - networkx
  - intervaltree
  - numpy
  - pysam
  - minimap2
  - mummer
source:
  patches:
  - 0001-python-tweaks.patch
  sha256: 99994d7caac7d2ec590f7ac51031dc675a0fd20a51aa3703713295607e8f70e8
  url: https://pypi.org/packages/source/R/RagTag/RagTag-2.1.0.tar.gz
test:
  commands:
  - ragtag.py --help
  imports:
  - ragtag_utilities
