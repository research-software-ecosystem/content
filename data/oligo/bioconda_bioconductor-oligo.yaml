about:
  description: A package to analyze oligonucleotide arrays (expression/SNP/tiling/exon)
    at probe-level. It currently supports Affymetrix (CEL files) and NimbleGen arrays
    (XYS files).
  home: https://bioconductor.org/packages/3.22/bioc/html/oligo.html
  license: LGPL (>= 2)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Preprocessing tools for oligonucleotide arrays
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:oligo
  parent_recipe:
    name: bioconductor-oligo
    path: recipes/bioconductor-oligo
    version: 1.44.0
package:
  name: bioconductor-oligo
  version: 1.74.0
requirements:
  build:
  - null
  - automake
  - make
  host:
  - bioconductor-affxparser >=1.82.0,<1.83.0
  - bioconductor-affyio >=1.80.0,<1.81.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-oligoclasses >=1.72.0,<1.73.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - r-base
  - r-bit
  - r-dbi >=0.3.1
  - r-ff
  - r-rsqlite >=1.0.0
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-affxparser >=1.82.0,<1.83.0
  - bioconductor-affyio >=1.80.0,<1.81.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-oligoclasses >=1.72.0,<1.73.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - r-base
  - r-bit
  - r-dbi >=0.3.1
  - r-ff
  - r-rsqlite >=1.0.0
source:
