about:
  dev_url: https://github.com/RECETOX/MSMetaEnhancer
  doc_url: https://msmetaenhancer.readthedocs.io
  home: https://github.com/RECETOX/MSMetaEnhancer
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: MSMetaEnhancer is a Python tool that adds more annotations (e.g. SMILES,
    InChI, CAS number) to MSP files.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  identifiers:
  - biotools:msmetaenhancer
  - doi:10.21105/joss.04494
  recipe-maintainers:
  - xtrojak
  - martenson
  - hechth
package:
  name: msmetaenhancer
  version: 0.5.1
requirements:
  host:
  - python >=3.10,<3.14
  - poetry-core
  - pip
  run:
  - python >=3.10,<3.14
  - matchms >=0.30.0
  - pandas
  - scipy
  - requests
  - aiohttp
  - asyncstdlib
  - frozendict
  - twine
  - tabulate
  - rdkit
  - multidict
  - aiocircuitbreaker
  - openpyxl
source:
  sha256: 6d6bc499395c3a196499605327880ecd9bd6a75ea2fa4cc8afbad6cc75d08d42
  url: https://pypi.io/packages/source/m/msmetaenhancer/msmetaenhancer-0.5.1.tar.gz
test:
  imports:
  - MSMetaEnhancer
