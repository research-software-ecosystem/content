about:
  description: Identify low-quality data using metrics developed for expression data
    derived from Formalin-Fixed, Paraffin-Embedded (FFPE) data.  Also a function for
    making Concordance at the Top plots (CAT-plots).
  home: https://bioconductor.org/packages/3.22/bioc/html/ffpe.html
  license: GPL (>2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Quality assessment and control for FFPE microarray expression data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:ffpe
  parent_recipe:
    name: bioconductor-ffpe
    path: recipes/bioconductor-ffpe
    version: 1.24.0
package:
  name: bioconductor-ffpe
  version: 1.54.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-lumi >=2.62.0,<2.63.0
  - bioconductor-methylumi >=2.56.0,<2.57.0
  - r-base
  - r-sfsmisc
  - r-ttr
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-lumi >=2.62.0,<2.63.0
  - bioconductor-methylumi >=2.56.0,<2.57.0
  - r-base
  - r-sfsmisc
  - r-ttr
source:
  md5: 254b2dd904a17b8bfe17ca4af6e73192
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ffpe_1.54.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ffpe/ffpe_1.54.0.tar.gz
  - https://bioarchive.galaxyproject.org/ffpe_1.54.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ffpe/bioconductor-ffpe_1.54.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ffpe')"
