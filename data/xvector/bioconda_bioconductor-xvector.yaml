about:
  description: Provides memory efficient S4 classes for storing sequences "externally"
    (e.g. behind an R external pointer, or on disk).
  home: https://bioconductor.org/packages/3.22/bioc/html/XVector.html
  license: Artistic-2.0
  summary: Foundation of external vector representation and manipulation in Bioconductor
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:xvector
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-xvector
    path: recipes/bioconductor-xvector
    version: 0.20.0
package:
  name: bioconductor-xvector
  version: 0.50.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
source:
  md5: 929b5a997ee6325853057c28ca3df77d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/XVector_0.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/XVector/XVector_0.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/XVector_0.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-xvector/bioconductor-xvector_0.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('XVector')"
