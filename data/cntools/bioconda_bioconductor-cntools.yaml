about:
  description: This package provides tools to convert the output of segmentation analysis
    using DNAcopy to a matrix structure with overlapping segments as rows and samples
    as columns so that other computational analyses can be applied to segmented data
  home: https://bioconductor.org/packages/3.22/bioc/html/CNTools.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Convert segment data into a region by sample matrix to allow for other
    high level computational analyses.
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:cntools
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-cntools
    path: recipes/bioconductor-cntools
    version: 1.36.0
package:
  name: bioconductor-cntools
  version: 1.66.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-genefilter >=1.92.0,<1.93.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-genefilter >=1.92.0,<1.93.0
  - r-base
source:
  md5: b111b97a9b1fe0b0a74fdea48c966c83
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CNTools_1.66.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CNTools/CNTools_1.66.0.tar.gz
  - https://bioarchive.galaxyproject.org/CNTools_1.66.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cntools/bioconductor-cntools_1.66.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CNTools')"
