about:
  dev_url: https://github.com/althonos/pyhmmer
  doc_url: https://pyhmmer.readthedocs.io
  home: https://github.com/althonos/pyhmmer
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: Cython bindings and Python interface to HMMER3.
build:
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1093/bioinformatics/btad214
  - biotools:pyhmmer
  recipe-maintainers:
  - althonos
package:
  name: pyhmmer
  version: 0.12.1
requirements:
  build:
  - null
  - null
  - cmake >=3.20
  - make
  host:
  - python
  - pip
  - setuptools
  - cython >=3.0
  - scikit-build-core
  run:
  - null
  - psutil >=6.0,<8.0
source:
  sha256: 86e8d82c065780df78cd6d406f22929d88a6227f59b5226741b107c67a137c3b
  url: https://pypi.org/packages/source/p/pyhmmer/pyhmmer-0.12.1.tar.gz
test:
