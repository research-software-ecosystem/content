about:
  description: Functions for normalisation of two-color microarrays by optimised local
    regression and for detection of artefacts in microarray data
  home: https://bioconductor.org/packages/3.22/bioc/html/OLIN.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Optimized local intensity-dependent normalisation of two-color microarrays
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:olin
  parent_recipe:
    name: bioconductor-olin
    path: recipes/bioconductor-olin
    version: 1.58.0
package:
  name: bioconductor-olin
  version: 1.88.0
requirements:
  host:
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-marray >=1.88.0,<1.89.0
  - r-base
  - r-locfit
  run:
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-marray >=1.88.0,<1.89.0
  - r-base
  - r-locfit
source:
  md5: c18c7625ee8482eacb8ec0c47eeb4e0b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/OLIN_1.88.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/OLIN/OLIN_1.88.0.tar.gz
  - https://bioarchive.galaxyproject.org/OLIN_1.88.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-olin/bioconductor-olin_1.88.0_src_all.tar.gz
test:
