  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/limma/limma_3.66.0.tar.gz
  - https://bioarchive.galaxyproject.org/limma_3.66.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-limma/bioconductor-limma_3.66.0_src_all.tar.gz
