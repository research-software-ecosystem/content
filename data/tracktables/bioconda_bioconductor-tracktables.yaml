about:
  description: Methods to create complex IGV genome browser sessions and dynamic IGV
    reports in HTML pages.
  home: https://bioconductor.org/packages/3.22/bioc/html/tracktables.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Build IGV tracks and HTML reports
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:tracktables
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-tracktables
    path: recipes/bioconductor-tracktables
    version: 1.14.0
package:
  name: bioconductor-tracktables
  version: 1.44.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
  - r-rcolorbrewer
  - r-stringr
  - r-tractor.base
  - r-xml
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
  - r-rcolorbrewer
  - r-stringr
  - r-tractor.base
  - r-xml
source:
  md5: cd76fab5a9496abeef230d43a7cac50d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/tracktables_1.44.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/tracktables/tracktables_1.44.0.tar.gz
  - https://bioarchive.galaxyproject.org/tracktables_1.44.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tracktables/bioconductor-tracktables_1.44.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('tracktables')"
