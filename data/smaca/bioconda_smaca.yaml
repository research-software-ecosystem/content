about:
  dev_url: https://github.com/babelomics/SMAca
  home: https://github.com/babelomics/SMAca
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.txt
  summary: smaca is a python tool to detect putative SMA carriers and estimate the
    absolute SMN1 copy-number in a population.
build:
  entry_points:
  - smaca = smaca.cli:main
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.2.4rc11
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  container:
    extended-base: true
  identifiers:
  - doi:10.1002/humu.24120
  - doi:10.5281/zenodo.3731299
  - biotools:smaca
  recipe-maintainers:
  - loucerac
  - erdanieee
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: smaca
  version: 1.2.4rc11
requirements:
  build:
  - null
  - null
  host:
  - pip
  - python
  - setuptools
  - setuptools-scm
  - cython
  - numpy
  - pysam
  run:
  - click
  - joblib
  - numpy
  - pysam
  - python
source:
  sha256: 7d477cb72b5e5afdff14dcde8e9bda9ea661f84d50bba6dc570ff543dd1cc913
  url: https://pypi.org/packages/source/s/smaca/smaca-1.2.4rc11.tar.gz
test:
  commands:
  - smaca --help
  imports:
  - smaca
