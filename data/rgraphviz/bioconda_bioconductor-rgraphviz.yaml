about:
  description: Interfaces R with the AT and T graphviz library for plotting R graph
    objects from the graph package.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rgraphviz.html
  license: EPL
  summary: Provides plotting capabilities for R graph objects
build:
  number: 2
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:rgraphviz
  - usegalaxy-eu:rgraphviz
package:
  name: bioconductor-rgraphviz
  version: 2.54.0
requirements:
  build:
  - null
  - null
  - null
  - autoconf
  - automake
  - libtool
  - make
  - pkg-config
  - gnuconfig
  host:
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
source:
  md5: 7c56d75e456cbb5772ce70e28f252b49
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rgraphviz_2.54.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rgraphviz/Rgraphviz_2.54.0.tar.gz
  - https://bioarchive.galaxyproject.org/Rgraphviz_2.54.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rgraphviz/bioconductor-rgraphviz_2.54.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Rgraphviz')"
