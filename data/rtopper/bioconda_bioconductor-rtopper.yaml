  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - r-base
source:
  md5: dc698d6757bc4f925ffc4ccdfc146d30
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RTopper_1.56.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RTopper/RTopper_1.56.0.tar.gz
  - https://bioarchive.galaxyproject.org/RTopper_1.56.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rtopper/bioconductor-rtopper_1.56.0_src_all.tar.gz
