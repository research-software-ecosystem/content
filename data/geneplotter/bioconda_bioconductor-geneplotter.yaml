about:
  description: Functions for plotting genomic data
  home: https://bioconductor.org/packages/3.22/bioc/html/geneplotter.html
  license: Artistic-2.0
  summary: Graphics related functions for Bioconductor
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
