about:
  description: This package has two functions. One reads a Affymetrix chip description
    file (CDF) and creates a hash table environment containing the location/probe
    set membership mapping. The other creates a package that automatically loads that
    environment.
  home: https://bioconductor.org/packages/3.22/bioc/html/makecdfenv.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: CDF Environment Maker
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:makecdfenv
  - doi:10.1186/1471-2105-13-56
  parent_recipe:
    name: bioconductor-makecdfenv
    path: recipes/bioconductor-makecdfenv
    version: 1.56.0
package:
  name: bioconductor-makecdfenv
  version: 1.86.0
requirements:
  build:
  - null
  - automake
  - make
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-affyio >=1.80.0,<1.81.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-affyio >=1.80.0,<1.81.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
source:
  md5: 5250c45e35bf6a1fb3798686a2c2f33d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/makecdfenv_1.86.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/makecdfenv/makecdfenv_1.86.0.tar.gz
  - https://bioarchive.galaxyproject.org/makecdfenv_1.86.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-makecdfenv/bioconductor-makecdfenv_1.86.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('makecdfenv')"
