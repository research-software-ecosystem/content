  - bioconductor-arrmdata >=1.46.0,<1.47.0
  - r-base
source:
  md5: 18afc86b2ad195a417a2393582ff125a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ARRmNormalization_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ARRmNormalization/ARRmNormalization_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/ARRmNormalization_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-arrmnormalization/bioconductor-arrmnormalization_1.50.0_src_all.tar.gz
