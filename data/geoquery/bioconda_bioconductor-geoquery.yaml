about:
  description: The NCBI Gene Expression Omnibus (GEO) is a public repository of microarray
    data.  Given the rich and varied nature of this resource, it is only natural to
    want to apply BioConductor tools to these data.  GEOquery is the bridge between
    GEO and BioConductor.
  home: https://bioconductor.org/packages/3.22/bioc/html/GEOquery.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Get data from NCBI Gene Expression Omnibus (GEO)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  container:
    extended-base: true
  identifiers:
  - biotools:geoquery
  parent_recipe:
    name: bioconductor-geoquery
    path: recipes/bioconductor-geoquery
    version: 2.48.0
package:
  name: bioconductor-geoquery
  version: 2.78.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-curl
  - r-data.table
  - r-dplyr
  - r-httr2
  - r-magrittr
  - r-r.utils
  - r-readr >=1.3.1
  - r-rentrez
  - r-rvest
  - r-stringr
  - r-tidyr
  - r-xml2
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-curl
  - r-data.table
  - r-dplyr
  - r-httr2
  - r-magrittr
  - r-r.utils
  - r-readr >=1.3.1
  - r-rentrez
  - r-rvest
  - r-stringr
  - r-tidyr
  - r-xml2
source:
  md5: 16b5a6c7ed0d5dae355d8ff857688917
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GEOquery_2.78.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GEOquery/GEOquery_2.78.0.tar.gz
  - https://bioarchive.galaxyproject.org/GEOquery_2.78.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-geoquery/bioconductor-geoquery_2.78.0_src_all.tar.gz
