about:
  description: Contains data and functions that define and allow translation between
    different chromosome sequence naming conventions (e.g., "chr1" versus "1"), including
    a function that attempts to place sequence names in their natural, rather than
    lexicographic, order.
  home: https://bioconductor.org/packages/3.22/bioc/html/GenomeInfoDb.html
  license: Artistic-2.0
  summary: Utilities for manipulating chromosome names, including modifying them to
    follow a particular naming style
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:genomeinfodb
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-genomeinfodb
    path: recipes/bioconductor-genomeinfodb
    version: 1.16.0
package:
  name: bioconductor-genomeinfodb
  version: 1.46.2
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-ucsc.utils >=1.6.0,<1.7.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-ucsc.utils >=1.6.0,<1.7.0
  - r-base
source:
  md5: da42e6dc9bfdea1afc1d11e8c304845b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GenomeInfoDb_1.46.2.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GenomeInfoDb/GenomeInfoDb_1.46.2.tar.gz
  - https://bioarchive.galaxyproject.org/GenomeInfoDb_1.46.2.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-genomeinfodb/bioconductor-genomeinfodb_1.46.2_src_all.tar.gz
