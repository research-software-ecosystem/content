about:
  description: Statistical methods for detection of differential splicing (differential
    exon usage) in RNA-seq and exon microarray data, using L1-regularization (lasso)
    to improve power.
  home: https://bioconductor.org/packages/3.22/bioc/html/regsplice.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: L1-regularization based methods for detection of differential splicing
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:regsplice
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-regsplice
    path: recipes/bioconductor-regsplice
    version: 1.6.0
package:
  name: bioconductor-regsplice
  version: 1.36.0
requirements:
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-glmnet
  - r-pbapply
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-glmnet
  - r-pbapply
source:
  md5: 8962823619c4474e641f2c1ee7dcd864
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/regsplice_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/regsplice/regsplice_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/regsplice_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-regsplice/bioconductor-regsplice_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('regsplice')"
