about:
  description: Detection of similarities between ordered lists of genes. Thereby,
    either simple lists can be compared or gene expression data can be used to deduce
    the lists. Significance of similarities is evaluated by shuffling lists or by
    resampling in microarray data, respectively.
  home: https://bioconductor.org/packages/3.22/bioc/html/OrderedList.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Similarities of Ordered Gene Lists
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:orderedlist
  - doi:10.1093/bioinformatics/btl385
  parent_recipe:
    name: bioconductor-orderedlist
    path: recipes/bioconductor-orderedlist
    version: 1.52.0
package:
  name: bioconductor-orderedlist
  version: 1.82.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-twilight >=1.86.0,<1.87.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-twilight >=1.86.0,<1.87.0
  - r-base
source:
  md5: d94731b9397392029a4c9f4e62162f6f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/OrderedList_1.82.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/OrderedList/OrderedList_1.82.0.tar.gz
