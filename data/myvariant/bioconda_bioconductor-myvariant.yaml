about:
  description: MyVariant.info is a comprehensive aggregation of variant annotation
    resources. myvariant is a wrapper for querying MyVariant.info services
  home: https://bioconductor.org/packages/3.22/bioc/html/myvariant.html
  license: Artistic-2.0
  summary: Accesses MyVariant.info variant query and annotation services
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:myvariant
  - doi:10.1101/035667
  parent_recipe:
    name: bioconductor-myvariant
    path: recipes/bioconductor-myvariant
    version: 1.10.0
package:
  name: bioconductor-myvariant
  version: 1.40.0
requirements:
  host:
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-hmisc
  - r-httr
  - r-jsonlite
  - r-magrittr
  - r-plyr
  run:
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-hmisc
  - r-httr
  - r-jsonlite
  - r-magrittr
  - r-plyr
source:
  md5: d9cbf755b62024818b46feba63a06302
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/myvariant_1.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/myvariant/myvariant_1.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/myvariant_1.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-myvariant/bioconductor-myvariant_1.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('myvariant')"
