about:
  description: Clomial fits binomial distributions to counts obtained from Next Gen
    Sequencing data of multiple samples of the same tumor. The trained parameters
    can be interpreted to infer the clonal structure of the tumor.
  home: https://bioconductor.org/packages/3.22/bioc/html/Clomial.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Infers clonal composition of a tumor
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:clomial
  parent_recipe:
    name: bioconductor-clomial
    path: recipes/bioconductor-clomial
    version: 1.18.0
package:
  name: bioconductor-clomial
  version: 1.46.0
requirements:
  host:
  - r-base
  - r-matrixstats
  - r-permute
  run:
  - r-base
  - r-matrixstats
  - r-permute
source:
  md5: 2af50fc04b927377303daf4ae6a11ad1
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Clomial_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Clomial/Clomial_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/Clomial_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-clomial/bioconductor-clomial_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Clomial')"
