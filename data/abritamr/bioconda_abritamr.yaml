about:
  dev_url: https://github.com/MDU-PHL/abritamr
  home: https://github.com/MDU-PHL/abritamr
  license: GPL-3.0-only
  license_family: GPL3
  summary: Running AMRFinderPlus for MDU.
build:
  entry_points:
  - abritamr = abritamr.abritamr:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-build-isolation --no-deps --no-cache-dir -vvv
extra:
  identifiers:
  - biotools:abritamr
  recipe-maintainers:
  - kristyhoran
package:
  name: abritamr
  version: 1.1.1
requirements:
  host:
  - pip
  - python >=3.9
  - setuptools
  - libcurl
  run:
  - python >=3.9
  - pandas
  - xlsxwriter
  - ncbi-amrfinderplus >=4.0.0
  - blast
  - hmmer
  - parallel
source:
  sha256: de6a1d46954dfa04e6c5d64909b1369fbf8a35ec2f482bd33c9ce383a95b3e10
  url: https://pypi.org/packages/source/a/abritamr/abritamr-1.1.1.tar.gz
test:
  commands:
  - abritamr --help
  imports:
  - abritamr
  requires:
  - nose
  - pytest
