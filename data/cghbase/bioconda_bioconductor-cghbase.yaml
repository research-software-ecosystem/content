  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-marray >=1.88.0,<1.89.0
  - r-base
source:
  md5: a52ad364c2c47559aa8dbeded5e881ae
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CGHbase_1.70.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CGHbase/CGHbase_1.70.0.tar.gz
