about:
  description: COPA is a method to find genes that undergo recurrent fusion in a given
    cancer type by finding pairs of genes that have mutually exclusive outlier profiles.
  home: https://bioconductor.org/packages/3.22/bioc/html/copa.html
  license: Artistic-2.0
  summary: Functions to perform cancer outlier profile analysis.
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:copa
  - usegalaxy-eu:copa
package:
  name: bioconductor-copa
  version: 1.78.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
source:
  md5: 11ad10f59dee1224bb06852c355598de
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/copa_1.78.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/copa/copa_1.78.0.tar.gz
  - https://bioarchive.galaxyproject.org/copa_1.78.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-copa/bioconductor-copa_1.78.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('copa')"
