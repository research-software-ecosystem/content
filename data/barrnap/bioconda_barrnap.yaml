  - transtermhp >=2
  - ziggypep
  - diamond
  - taxonkit
  - make
  - bats-core
  - mmseqs2
source:
  sha256: 37f1451b1c3521f3495fde0d6483e97600bd6f4a7ce625db11a78cbd06a68b19
