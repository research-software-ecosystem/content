  - bzip2
  - htslib
  - xz
  - curl
  - openssl
  run:
  - htslib
source:
  sha256: bccd0d9c8f0bb80986ab73b22656c82919635453a50420001a0d7376f487820c
  url: https://github.com/Griffan/VerifyBamID/archive/refs/tags/V2.0.2.tar.gz
