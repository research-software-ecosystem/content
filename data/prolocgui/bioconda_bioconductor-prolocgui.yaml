about:
  description: The package pRolocGUI comprises functions to interactively visualise
    spatial proteomics data on the basis of pRoloc, pRolocdata and shiny.
  home: https://bioconductor.org/packages/3.22/bioc/html/pRolocGUI.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Interactive visualisation of spatial proteomics data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:prolocgui
  - doi:10.1038/ncomms9992
  parent_recipe:
    name: bioconductor-prolocgui
    path: recipes/bioconductor-prolocgui
    version: 1.14.0
package:
  name: bioconductor-prolocgui
  version: 2.20.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-msnbase >=2.36.0,<2.37.0
  - bioconductor-proloc >=1.50.0,<1.51.0
  - r-base
  - r-colorspace
  - r-colourpicker
  - r-dplyr
  - r-dt >=0.1.40
  - r-ggplot2
  - r-scales
  - r-shiny >=0.9.1
  - r-shinydashboard
  - r-shinydashboardplus >=2.0.0
  - r-shinyhelper
  - r-shinyjs
  - r-shinywidgets
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-msnbase >=2.36.0,<2.37.0
  - bioconductor-proloc >=1.50.0,<1.51.0
  - r-base
  - r-colorspace
  - r-colourpicker
  - r-dplyr
  - r-dt >=0.1.40
  - r-ggplot2
  - r-scales
  - r-shiny >=0.9.1
  - r-shinydashboard
  - r-shinydashboardplus >=2.0.0
  - r-shinyhelper
  - r-shinyjs
  - r-shinywidgets
source:
  md5: 06955b292178545fe7301e6551ccc9ba
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/pRolocGUI_2.20.0.tar.gz
