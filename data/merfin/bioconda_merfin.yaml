about:
  dev_url: https://github.com/arangrhie/merfin
  doc_url: https://github.com/arangrhie/merfin/blob/v1.1/README.md
  home: https://github.com/arangrhie/merfin
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Improved variant filtering and polishing via k-mer validation.
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1038/s41592-022-01445-y
  - doi:10.1101/2022.12.01.518724
  - biotools:merfin
  skip-lints:
  - compiler_needs_stdlib_c
  - uses_vcs_url
package:
  name: merfin
  version: '1.1'
requirements:
  build:
  - make
  - null
  host:
  - llvm-openmp
  - libgomp
  - gzip >=1.11
  - pigz >=2.6
  - bzip2 >=1.0.8
  - xz >=5.2.5
  run:
  - llvm-openmp
  - libgomp
  - meryl >=1.3,<2
  - genomescope2
source:
  git_rev: 04c4332
  git_url: https://github.com/arangrhie/merfin.git
  patches:
  - macos.patch
  sha256: unused
test:
  commands:
  - merfin 2>&1 | grep 'usage:'
