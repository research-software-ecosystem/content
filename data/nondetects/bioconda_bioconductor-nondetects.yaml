about:
  description: Methods to model and impute non-detects in the results of qPCR experiments.
  home: https://bioconductor.org/packages/3.22/bioc/html/nondetects.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Non-detects in qPCR data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:nondetects
  parent_recipe:
    name: bioconductor-nondetects
    path: recipes/bioconductor-nondetects
    version: 2.10.0
package:
  name: bioconductor-nondetects
  version: 2.40.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-htqpcr >=1.64.0,<1.65.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-arm
  - r-base
  - r-mvtnorm
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-htqpcr >=1.64.0,<1.65.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-arm
  - r-base
  - r-mvtnorm
source:
  md5: 916ae05403bbe9b76fbce46084724a65
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/nondetects_2.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/nondetects/nondetects_2.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/nondetects_2.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-nondetects/bioconductor-nondetects_2.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('nondetects')"
