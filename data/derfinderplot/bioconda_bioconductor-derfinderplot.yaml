about:
  description: This package provides plotting functions for results from the derfinder
    package. This helps separate the graphical dependencies required for making these
    plots from the core functionality of derfinder.
  home: https://bioconductor.org/packages/3.22/bioc/html/derfinderPlot.html
  license: Artistic-2.0
  summary: Plotting functions for derfinder
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:derfinderplot
  parent_recipe:
    name: bioconductor-derfinderplot
    path: recipes/bioconductor-derfinderplot
    version: 1.14.0
package:
  name: bioconductor-derfinderplot
  version: 1.44.0
requirements:
  host:
  - bioconductor-derfinder >=1.44.0,<1.45.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-ggbio >=1.58.0,<1.59.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-ggplot2
  - r-plyr
  - r-rcolorbrewer
  - r-reshape2
  - r-scales
  run:
  - bioconductor-derfinder >=1.44.0,<1.45.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-ggbio >=1.58.0,<1.59.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-ggplot2
  - r-plyr
  - r-rcolorbrewer
  - r-reshape2
  - r-scales
