about:
  description: Implements the circular binary segmentation (CBS) algorithm to segment
    DNA copy number data and identify genomic regions with abnormal copy number.
  home: https://bioconductor.org/packages/3.22/bioc/html/DNAcopy.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: DNA Copy Number Data Analysis
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:dnacopy
  - doi:10.1038/nmeth.3252
package:
  name: bioconductor-dnacopy
  version: 1.84.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
source:
  md5: 2f6ecfaf23882e5d8fc23759dad5e876
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/DNAcopy_1.84.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DNAcopy/DNAcopy_1.84.0.tar.gz
  - https://bioarchive.galaxyproject.org/DNAcopy_1.84.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dnacopy/bioconductor-dnacopy_1.84.0_src_all.tar.gz
test:
