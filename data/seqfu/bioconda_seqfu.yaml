about:
  description: 'A collection of utilities to work with FASTX (FASTA or FASTQ) files

    that accept gzipped input.

    Tools to interleave and deinterleave, to calculate stats, and extract

    portions of sequence datasets.

    '
  docs: https://telatin.github.io/seqfu2
  home: https://github.com/telatin/seqfu2
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: DNA sequence utilities.
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:seqfu
  - doi:10.3390/bioengineering8050059
  recipe-maintainers:
  - telatin
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: seqfu
  version: 1.26.0
requirements:
  build:
  - null
  - null
  - nim >=2.0.8
  - make
  - pkg-config
  - coreutils
  host:
  - curl
  - pcre
  - zlib
  run:
  - pcre
source:
  sha256: 2b3aa5d6f983aed570d26b0cf48d910f847704d57401ef64e5b026de3dd0afff
  url: https://github.com/telatin/seqfu2/archive/refs/tags/v1.26.0.tar.gz
test:
  commands:
  - seqfu
  - seqfu stats --help
  - seqfu --version
  - seqfu --version | grep '1.26.0'
