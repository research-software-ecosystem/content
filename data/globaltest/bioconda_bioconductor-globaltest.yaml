about:
  description: The global test tests groups of covariates (or features) for association
    with a response variable. This package implements the test with diagnostic plots
    and multiple testing utilities, along with several functions to facilitate the
    use of this test for gene set testing of GO and KEGG terms.
  home: https://bioconductor.org/packages/3.22/bioc/html/globaltest.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Testing Groups of Covariates/Features for Association with a Response Variable,
    with Applications to Gene Set Testing
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:globaltest
  parent_recipe:
    name: bioconductor-globaltest
    path: recipes/bioconductor-globaltest
    version: 5.34.1
package:
  name: bioconductor-globaltest
  version: 5.64.0
requirements:
  host:
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - r-survival
  run:
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - r-survival
source:
  md5: 8588aa89f95c6d24254ef8820253d0d6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/globaltest_5.64.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/globaltest/globaltest_5.64.0.tar.gz
  - https://bioarchive.galaxyproject.org/globaltest_5.64.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-globaltest/bioconductor-globaltest_5.64.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('globaltest')"
