about:
  dev_url: https://github.com/hoffmangroup/segway
  doc_url: https://segway.readthedocs.io/en/latest
  home: https://segway.hoffmanlab.org
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: A tool for easy pattern discovery and identification in functional genomics
    data.
build:
  entry_points:
  - segway = segway.run:main
  - segway-layer = segway.layer:main
  - segway-task = segway.task:main
  - segway-winner = segway.winner:main
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - export HDF5_DIR="$PREFIX"
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=3.0.5
extra:
  identifiers:
  - doi:10.1093/bioinformatics/btx603
  - biotools:segway
  recipe-maintainers:
  - ericr86
package:
  name: segway
  version: 3.0.5
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools_scm
  run:
  - python >=3.10
  - six
  - genomedata
  - gmtk >=1.4.4
  - autolog
  - textinput
  - optbuild
  - optplus
  - palettable >=3.3.3
  - path.py
  - pytables >2.0.4
  - colorbrewer
  - drmaa >=0.4a3
  - ucsc-bedtobigbed
  - numpy
source:
  sha256: de77c66c75b4dec7b90a24ef6a8db435e807d1424b3ba66208877cb7db25157a
  url: https://pypi.org/packages/source/s/segway/segway-3.0.5.tar.gz
test:
  commands:
  - segway --version | grep 3.0.5
  - segway --help
  imports:
  - segway
