about:
  description: Fit-Hi-C is a tool for assigning statistical confidence estimates to
    intra-chromosomal contact maps produced by genome-wide genome architecture assays
    such as Hi-C.
  home: https://bioconductor.org/packages/3.22/bioc/html/FitHiC.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Confidence estimation for intra-chromosomal contact maps
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:fithic
  - doi:10.1101/gr.160374
  parent_recipe:
    name: bioconductor-fithic
    path: recipes/bioconductor-fithic
    version: 1.6.0
package:
  name: bioconductor-fithic
  version: 1.36.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - r-base
  - r-data.table
  - r-fdrtool
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
  - r-data.table
  - r-fdrtool
  - r-rcpp
source:
  md5: 674eb98d94ff5dd1efdee26b7ff654de
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/FitHiC_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/FitHiC/FitHiC_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/FitHiC_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-fithic/bioconductor-fithic_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('FitHiC')"
