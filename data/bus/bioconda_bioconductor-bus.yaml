about:
  description: This package can be used to compute associations among genes (gene-networks)
    or between genes and some external traits (i.e. clinical).
  home: https://bioconductor.org/packages/3.22/bioc/html/BUS.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Gene network reconstruction
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:bus
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-bus
    path: recipes/bioconductor-bus
    version: 1.36.0
package:
  name: bioconductor-bus
  version: 1.66.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-minet >=3.68.0,<3.69.0
  - r-base
  - r-infotheo
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-minet >=3.68.0,<3.69.0
  - r-base
  - r-infotheo
source:
