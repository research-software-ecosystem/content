about:
  description: Functions that are needed by many other packages or which replace R
    functions.
  home: https://bioconductor.org/packages/3.22/bioc/html/Biobase.html
  license: Artistic-2.0
  summary: 'Biobase: Base functions for Bioconductor'
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:biobase
package:
  name: bioconductor-biobase
  version: 2.70.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
source:
  md5: 1972f4f090998033acd1d3bfdec77961
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Biobase_2.70.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Biobase/Biobase_2.70.0.tar.gz
  - https://bioarchive.galaxyproject.org/Biobase_2.70.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biobase/bioconductor-biobase_2.70.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Biobase')"
