about:
  description: Probabilistic analysis of probe reliability and differential gene expression
    on short oligonucleotide arrays.
  home: https://bioconductor.org/packages/3.22/bioc/html/RPA.html
  license: BSD_2_clause + file LICENSE
  license_file: LICENSE
  summary: 'RPA: Robust Probabilistic Averaging for probe-level analysis'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:rpa
  parent_recipe:
    name: bioconductor-rpa
    path: recipes/bioconductor-rpa
    version: 1.36.0
package:
  name: bioconductor-rpa
  version: 1.66.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-phyloseq >=1.54.0,<1.55.0
  - r-base
  - r-rmarkdown
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-phyloseq >=1.54.0,<1.55.0
  - r-base
  - r-rmarkdown
source:
  md5: 84a6bdffe0f53d7484e212b2fb188076
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RPA_1.66.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RPA/RPA_1.66.0.tar.gz
  - https://bioarchive.galaxyproject.org/RPA_1.66.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rpa/bioconductor-rpa_1.66.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RPA')"
