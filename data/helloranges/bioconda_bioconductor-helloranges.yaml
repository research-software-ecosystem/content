about:
  description: Translates bedtools command-line invocations to R code calling functions
    from the Bioconductor *Ranges infrastructure. This is intended to educate novice
    Bioconductor users and to compare the syntax and semantics of the two frameworks.
  home: https://bioconductor.org/packages/3.22/bioc/html/HelloRanges.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Introduce *Ranges to bedtools users
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:helloranges
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-helloranges
    path: recipes/bioconductor-helloranges
    version: 1.6.0
package:
  name: bioconductor-helloranges
  version: 1.36.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-docopt
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-docopt
source:
  md5: c90a70d43d00c65499d30ff103beaede
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/HelloRanges_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HelloRanges/HelloRanges_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/HelloRanges_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-helloranges/bioconductor-helloranges_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HelloRanges')"
