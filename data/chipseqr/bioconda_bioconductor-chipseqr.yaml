about:
  description: ChIPseqR identifies protein binding sites from ChIP-seq and nucleosome
    positioning experiments. The model used to describe binding events was developed
    to locate nucleosomes but should flexible enough to handle other types of experiments
    as well.
  home: https://bioconductor.org/packages/3.22/bioc/html/ChIPseqR.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Identifying Protein Binding Sites in High-Throughput Sequencing Data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:chipseqr
package:
  name: bioconductor-chipseqr
  version: 1.64.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hilbertvis >=1.68.0,<1.69.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-shortread >=1.68.0,<1.69.0
  - r-base
  - r-fbasics
  - r-timsac
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hilbertvis >=1.68.0,<1.69.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-shortread >=1.68.0,<1.69.0
  - r-base
  - r-fbasics
  - r-timsac
source:
  md5: ce07f4d4e7dfa814fe43c594f0f96036
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ChIPseqR_1.64.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ChIPseqR/ChIPseqR_1.64.0.tar.gz
  - https://bioarchive.galaxyproject.org/ChIPseqR_1.64.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-chipseqr/bioconductor-chipseqr_1.64.0_src_all.tar.gz
test:
