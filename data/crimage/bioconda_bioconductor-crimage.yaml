about:
  description: CRImage provides functionality to process and analyze images, in particular
    to classify cells in biological images. Furthermore, in the context of tumor images,
    it provides functionality to calculate tumour cellularity.
  home: https://bioconductor.org/packages/3.22/bioc/html/CRImage.html
  license: Artistic-2.0
  summary: CRImage a package to classify cells and calculate tumour cellularity
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:crimage
  - doi:10.1126/scitranslmed.3004330
  parent_recipe:
    name: bioconductor-crimage
    path: recipes/bioconductor-crimage
    version: 1.28.0
package:
  name: bioconductor-crimage
  version: 1.58.0
requirements:
  host:
  - bioconductor-acgh >=1.88.0,<1.89.0
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - r-base
  - r-e1071
  - r-foreach
  - r-mass
  - r-sgeostat
  run:
  - bioconductor-acgh >=1.88.0,<1.89.0
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - r-base
  - r-e1071
  - r-foreach
  - r-mass
  - r-sgeostat
source:
  md5: c36c89422334ac7ffe921ce0e2b5ca3c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CRImage_1.58.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CRImage/CRImage_1.58.0.tar.gz
  - https://bioarchive.galaxyproject.org/CRImage_1.58.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-crimage/bioconductor-crimage_1.58.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CRImage')"
