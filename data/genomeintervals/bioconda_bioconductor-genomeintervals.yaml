  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/genomeIntervals_1.66.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/genomeIntervals/genomeIntervals_1.66.0.tar.gz
  - https://bioarchive.galaxyproject.org/genomeIntervals_1.66.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-genomeintervals/bioconductor-genomeintervals_1.66.0_src_all.tar.gz
