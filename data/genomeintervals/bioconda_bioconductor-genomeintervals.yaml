about:
  description: 'This package defines classes for representing genomic intervals and
    provides functions and methods for working with these. Note: The package provides
    the basic infrastructure for and is enhanced by the package ''girafe''.'
  home: https://bioconductor.org/packages/3.22/bioc/html/genomeIntervals.html
  license: Artistic-2.0
  summary: Operations on genomic intervals
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:genomeintervals
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-genomeintervals
    path: recipes/bioconductor-genomeintervals
    version: 1.36.0
package:
  name: bioconductor-genomeintervals
  version: 1.66.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-intervals >=0.14.0
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-intervals >=0.14.0
source:
