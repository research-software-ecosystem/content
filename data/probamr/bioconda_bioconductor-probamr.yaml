about:
  description: Mapping PSMs back to genome. The package builds SAM file from shotgun
    proteomics data The package also provides function to prepare annotation from
    GTF file.
  home: https://bioconductor.org/packages/3.22/bioc/html/proBAMr.html
  license: Artistic-2.0
  summary: Generating SAM file for PSMs in shotgun proteomics data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:probamr
  - doi:10.1074/mcp.M115.052860
  parent_recipe:
    name: bioconductor-probamr
    path: recipes/bioconductor-probamr
    version: 1.14.0
package:
  name: bioconductor-probamr
  version: 1.44.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-txdbmaker >=1.6.0,<1.7.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
