about:
  description: Estimate gene and eQTL networks from high-throughput expression and
    genotyping assays.
  home: https://bioconductor.org/packages/3.22/bioc/html/qpgraph.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Estimation of Genetic and Molecular Regulatory Networks from High-Throughput
    Genomics Data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:qpgraph
  parent_recipe:
    name: bioconductor-qpgraph
    path: recipes/bioconductor-qpgraph
    version: 2.14.0
package:
  name: bioconductor-qpgraph
  version: 2.44.0
requirements:
  build:
  - null
  - automake
  - make
  host:
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-matrix >=1.5-0
  - r-mvtnorm
  - r-qtl
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
