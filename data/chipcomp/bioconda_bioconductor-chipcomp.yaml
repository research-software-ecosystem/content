about:
  description: ChIPComp detects differentially bound sharp binding sites across multiple
    conditions considering matching control.
  home: https://bioconductor.org/packages/3.22/bioc/html/ChIPComp.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: Quantitative comparison of multiple ChIP-seq datasets
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:chipcomp
  parent_recipe:
    name: bioconductor-chipcomp
    path: recipes/bioconductor-chipcomp
    version: 1.10.0
package:
  name: bioconductor-chipcomp
  version: 1.40.0
