about:
  description: 'SvAnna is a tool for prioritizing structural variants (SVs) based
    on their

    predicted pathogenicity. It integrates information from coding and non-coding

    genomic annotations, phenotype data (HPO terms), and population frequency

    databases to rank SVs by clinical relevance.

    '
  dev_url: https://github.com/monarch-initiative/SvAnna
  doc_url: https://svanna.readthedocs.io
  home: https://github.com/monarch-initiative/SvAnna
  license: LicenseRef-Jackson-Laboratory-NonCommercial
  license_family: OTHER
  license_file: legal/LICENSE
  summary: Efficient and accurate pathogenicity prediction for coding and regulatory
    structural variants in long-read genome sequencing
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  identifiers:
  - doi:10.1186/s13073-022-01046-6
  - biotools:svanna
  notes: SvAnna is licensed for non-commercial use only (The Jackson Laboratory).
    Commercial use requires a separate license from contracts@jax.org. A wrapper script
    at $PREFIX/bin/svanna-cli launches the JAR via java.
  recipe-maintainers:
  - nourmahfel
package:
  name: svanna
  version: 1.2.0
requirements:
  run:
  - openjdk >=17
source:
