name: validate & run gh2biotools on .biotools.json changes to master

on:
  push:
    paths:
      - 'data/**/*.biotools.json'
    branches:
      - master

jobs:
  run-gh2biotools:
    runs-on: ubuntu-latest
    if: github.actor != 'biotools-bot'
    
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: '**/*.biotools.json'
          sparse-checkout-cone-mode: false
          fetch-depth: 2


      - name: check changes to biotools.json files
        id: changes
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: | 
            **/*.biotools.json


      - name: validate allowed fields
        env:
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
        run: |
          chmod +x .github/scripts/validate-biotools-fields.sh
          .github/scripts/validate-biotools-fields.sh ${{ steps.changes.outputs.all_changed_files }}


      - name: checkout utils repo
        uses: actions/checkout@v4
        with:
          repository: research-software-ecosystem/utils
          path: content-ecosystem-utils
          sparse-checkout: 'scripts/runbiotools'
          sparse-checkout-cone-mode: false
          fetch-depth: 1


      - name: validate allowed fields
        working-directory: content-ecosystem-utils/scripts/runbiotools
        env:
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
        run: |
          chmod +x ./validate-biotools-fields.sh
          ./validate-biotools-fields.sh ${{ steps.changes.outputs.all_changed_files }}


      - name: set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'


      - name: install dependencies
        working-directory: content-ecosystem-utils/scripts/runbiotools
        run: |
          pip3 install -r requirements.txt


      - name: run gh2biotools.py script
        env:
          BIOTOOLS_API_TOKEN: ${{ secrets.BIOTOOLS_API_TOKEN }}
        run: |
          changed_files="${{ steps.changes.outputs.all_changed_files }}"

          if [[ -z "$changed_files" ]]; then
            echo "ℹ️ No changed files to process"
            exit 0
          fi

          python content-ecosystem-utils/scripts/runbiotools/gh2biotools.py --files $changed_files
