about:
  home: https://github.com/clementlab/TwInsPEctor
  license: MIT
  license_file: LICENSE
  summary: 'TwInsPEctor: A tool for twin prime editing analysis.'
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
package:
  name: twinspector
  version: 0.1.3
requirements:
  host:
  - python
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.8
  - numpy
  - crispresso2
  - pandas
  - matplotlib-base
  - seaborn
source:
  sha256: c6ffaadb5434cb709010524bcca58ab52b22b43dde0378ff5342a118a20aa49c
  url: https://github.com/clementlab/TwInsPEctor/archive/v0.1.3.tar.gz
test:
  commands:
  - TwInsPEctor -h
  imports:
  - TwInsPEctor
