about:
  description: Client for the gypsum REST API (https://gypsum.artifactdb.com), a cloud-based
    file store in the ArtifactDB ecosystem. This package provides functions for uploads,
    downloads, and various adminstrative and management tasks. Check out the documentation
    at https://github.com/ArtifactDB/gypsum-worker for more details.
  home: https://bioconductor.org/packages/3.22/bioc/html/gypsum.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Interface to the gypsum REST API
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gypsum
  version: 1.6.0
requirements:
  host:
  - r-base
  - r-filelock
  - r-httr2
  - r-jsonlite
  - r-rappdirs
  run:
  - r-base
  - r-filelock
  - r-httr2
  - r-jsonlite
  - r-rappdirs
source:
  md5: f3dd8f91eaf009e2d554e953522c77c4
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/gypsum_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/gypsum/gypsum_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/gypsum_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gypsum/bioconductor-gypsum_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('gypsum')"
