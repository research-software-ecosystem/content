about:
  description: "EGGS is a tool to manipulate genotypes. It can split ms-replicates\
    \ to \nmultiple VCF files and convert EIGENSTRAT/ANCESTRYMAP files to VCF.\nEGGS\
    \ is able to introduce various sorts of error, such as sequencing error,\ndeamination,\
    \ and missing genotypes into simulated replicates. EGGS is\nwritten in C with\
    \ no dependencies.\n"
  dev_url: https://github.com/TQ-Smith/EGGS
  doc_url: https://github.com/TQ-Smith/EGGS/wiki
  home: https://github.com/TQ-Smith/EGGS
  license: MIT
  license_file: LICENSE
  summary: Empirical Genotype Generalizer for Samples
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - TQ-Smith
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: eggs
  version: 1.0.0
requirements:
  build:
  - null
  - make
  host:
  - zlib
source:
  sha256: 88612b702cfc9d554d0a6dc2629db76f165defb018bf3765f76d49490b3d3ccb
  url: https://github.com/TQ-Smith/EGGS/archive/refs/tags/Add_EGGSv1.0.0.tar.gz
test:
