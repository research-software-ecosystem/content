  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - mbhall88
package:
  name: rasusa
  version: 4.0.0
requirements:
  build:
  - null
  - null
  - cargo-bundle-licenses
source:
  sha256: cfbcb8db74d2675d8844c99a48877cb109cd25d2aa97fba3945ccbba07bc073e
  url: https://github.com/mbhall88/rasusa/archive/4.0.0.tar.gz
test:
  commands:
  - rasusa --help
  - rasusa reads --help
  - rasusa aln --help
  - rasusa cite
