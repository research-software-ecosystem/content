  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - mbhall88
package:
  name: rasusa
  version: 3.0.0
requirements:
  build:
  - null
  - null
  - cargo-bundle-licenses
source:
  sha256: 803cda395175a6806fa8b96f22f119c7e187935e9a281f6264dbdfc4d8f9068a
  url: https://github.com/mbhall88/rasusa/archive/3.0.0.tar.gz
test:
  commands:
  - rasusa --help
  - rasusa reads --help
  - rasusa aln --help
  - rasusa cite
