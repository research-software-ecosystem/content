about:
  description: '"Spaced Words Projection (SWeeP)" is a method for representing biological
    sequences using vectors preserving inter-sequence comparability.'
  home: https://bioconductor.org/packages/3.22/bioc/html/rSWeeP.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Spaced Words Projection (SWeeP)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rsweep
  version: 1.22.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-doparallel
  - r-foreach
  - r-stringi
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-doparallel
  - r-foreach
  - r-stringi
source:
  md5: 1215dca03f3106b27fea4e1bbd0edd37
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rSWeeP_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rSWeeP/rSWeeP_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/rSWeeP_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rsweep/bioconductor-rsweep_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rSWeeP')"
