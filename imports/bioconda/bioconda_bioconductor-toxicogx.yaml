about:
  description: Contains a set of functions to perform large-scale analysis of toxicogenomic
    data, providing a standardized data structure to hold information relevant to
    annotation, visualization and statistical analysis of toxicogenomic data.
  home: https://bioconductor.org/packages/3.22/bioc/html/ToxicoGx.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Analysis of Large-Scale Toxico-Genomic Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-toxicogx
  version: 2.14.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
