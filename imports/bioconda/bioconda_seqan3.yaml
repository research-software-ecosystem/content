  - pkg-config
  host:
  - cereal
  - bzip2
  - zlib
source:
  sha256: 47568bb116981f06276cec9b433482d38d9b12f5f5d83299734c469eb9d80448
  url: https://github.com/seqan/seqan3/releases/download/3.4.2/seqan3-3.4.2-Source.tar.xz
