about:
  description: This package identifies differential expression in high-throughput
    'count' data, such as that derived from next-generation sequencing machines, calculating
    estimated posterior likelihoods of differential expression (or more complex hypotheses)
    via empirical Bayesian methods.
  home: https://bioconductor.org/packages/3.22/bioc/html/baySeq.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Empirical Bayesian analysis of patterns of differential expression in count
    data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bayseq
  version: 2.44.0
requirements:
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-abind
  - r-base
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-abind
  - r-base
source:
  md5: afd7608b27a147dd7c814b7bf48763ee
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/baySeq_2.44.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/baySeq/baySeq_2.44.0.tar.gz
  - https://bioarchive.galaxyproject.org/baySeq_2.44.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bayseq/bioconductor-bayseq_2.44.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('baySeq')"
