about:
  dev_url: https://github.com/HenzelerB/sRNA-TAPS
  doc_url: https://github.com/HenzelerB/sRNA-TAPS#readme
  home: https://github.com/HenzelerB/sRNA-TAPS
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: TAPS-based m5C and 5hmC detection pipeline for small RNA sequencing
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vvv
extra:
  recipe-maintainers:
  - HenzelerB
package:
  name: srna-taps
  version: 0.2.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - click >=8.0
  - pysam >=0.22
  - pandas >=2.1
  - numpy >=1.26
  - scipy >=1.12
  - statsmodels >=0.14
  - snakemake >=7.0
  - jinja2 >=3.0
  - pyyaml >=6.0
  - rich >=13.0
  - bowtie =1.3.1
  - samtools >=1.20
  - bcftools >=1.20
  - htslib >=1.20
  - fastqc >=0.12.1
  - trim-galore >=0.6.10
  - multiqc >=1.21
source:
  sha256: f68ed6a2c247bab0cde6943231801dbd285200bba46298e89264d3cb5a96bc63
  url: https://pypi.io/packages/source/s/srna-taps/srna_taps-0.2.2.tar.gz
test:
  commands:
  - srnataps --version
  - srnataps --help
  imports:
  - srnataps
  - srnataps.cli
  - srnataps.caller
  - srnataps.annotate
  - srnataps.snp
  - srnataps.utils
