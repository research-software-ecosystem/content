about:
  description: An R package which interfaces the OME Bio-Formats Java library to allow
    reading of proprietary microscopy image data and metadata.
  home: https://bioconductor.org/packages/3.22/bioc/html/RBioFormats.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: R interface to Bio-Formats
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rbioformats
  version: 1.10.0
requirements:
  host:
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-rjava >=0.9-6
  - openjdk
  run:
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-rjava >=0.9-6
  - openjdk
source:
  md5: f0fdf86456f2d7da79b8b0d489defe7d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RBioFormats_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RBioFormats/RBioFormats_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/RBioFormats_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rbioformats/bioconductor-rbioformats_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RBioFormats')"
