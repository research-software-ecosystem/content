about:
  description: Peak calling for ChIP-seq data with consideration of potential GC bias
    in sequencing reads. GC bias is first estimated with generalized linear mixture
    models using effective GC strategy, then applied into peak significance estimation.
  home: https://bioconductor.org/packages/3.22/bioc/html/gcapc.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: GC Aware Peak Caller
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gcapc
  version: 1.34.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-mass
  - r-matrixstats
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-mass
  - r-matrixstats
source:
  md5: 44a1ea488159f9c9959f5c6b6f1b5b6b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/gcapc_1.34.0.tar.gz
