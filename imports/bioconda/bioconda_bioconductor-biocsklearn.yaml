about:
  description: This package provides interfaces to selected sklearn elements, and
    demonstrates fault tolerant use of python modules requiring extensive iteration.
  home: https://bioconductor.org/packages/3.22/bioc/html/BiocSklearn.html
  license: Artistic-2.0
  summary: interface to python sklearn via Rstudio reticulate
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biocsklearn
  version: 1.32.0
requirements:
  host:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-reticulate
  - python >=2.7
  run:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-reticulate
  - python >=2.7
source:
  md5: 2bbe5be26f6b8b7b380f3ec0f517b850
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BiocSklearn_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BiocSklearn/BiocSklearn_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/BiocSklearn_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biocsklearn/bioconductor-biocsklearn_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('BiocSklearn')"
