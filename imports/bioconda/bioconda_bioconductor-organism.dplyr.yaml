about:
  description: This package provides an alternative interface to Bioconductor 'annotation'
    resources, in particular the gene identifier mapping functionality of the 'org'
    packages (e.g., org.Hs.eg.db) and the genome coordinate functionality of the 'TxDb'
    packages (e.g., TxDb.Hsapiens.UCSC.hg38.knownGene).
  home: https://bioconductor.org/packages/3.22/bioc/html/Organism.dplyr.html
  license: Artistic-2.0
  summary: dplyr-based Access to Bioconductor Annotation Resources
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-organism.dplyr
  version: 1.37.1
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-annotationfilter >=1.34.0,<1.35.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dbi
  - r-dbplyr
  - r-dplyr >=0.7.0
  - r-rlang
  - r-rsqlite
  - r-tibble
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-annotationfilter >=1.34.0,<1.35.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dbi
  - r-dbplyr
  - r-dplyr >=0.7.0
  - r-rlang
  - r-rsqlite
  - r-tibble
