about:
  dev_url: https://github.com/erinyoung/heatcluster
  home: https://github.com/DrB-S/heatcluster
  license: GPL-3.0-only
  license_file: LICENSE
  summary: A Python tool for visualizing SNP matrices with hierarchical clustering
build:
  entry_points:
  - heatcluster = heatcluster.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - erinyoung
package:
  name: heatcluster
  version: 1.3.0
requirements:
  host:
  - python >=3.8
  - setuptools >=61.0
  - pip
  run:
  - python >=3.8
  - pandas >=1.3.0
  - numpy >=1.20.0
  - seaborn >=0.11.0
  - matplotlib-base >=3.4.0
  - scipy >=1.7.0
  - scikit-learn
  - fastcluster
  - biopython
source:
  sha256: e8ccde127fd5c6a71ae44bfb691554fa31ca5117d86c85bacab0859cf573924c
  url: https://pypi.org/packages/source/h/heatcluster/heatcluster-1.3.0.tar.gz
test:
  commands:
  - pip check
  - heatcluster --help
  imports:
  - heatcluster
  requires:
  - pip
