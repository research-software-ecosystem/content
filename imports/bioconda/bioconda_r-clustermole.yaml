about:
  description: 'Assignment of cell type labels to single-cell RNA sequencing (scRNA-seq)
    clusters

    is often a time-consuming process that involves manual inspection of the cluster

    marker genes complemented with a detailed literature search. This is especially

    challenging when unexpected or poorly described populations are present. The clustermole

    R package provides methods to query thousands of human and mouse cell identity
    markers

    sourced from a variety of databases.

    '
  home: https://igordot.github.io/clustermole/
  license: MIT
  license_family: MIT
  license_file:
  - /lib/R/share/licenses/MIT
  - LICENSE
  summary: Unbiased Single-Cell Transcriptomic Data Cell Type Identification.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  recipe-maintainers:
  - Yuri-Kawahara
package:
  name: r-clustermole
  version: 1.1.1
requirements:
  host:
  - r-base
  - bioconductor-gseabase
  - bioconductor-gsva >=1.50.0
  - bioconductor-singscore
  - r-dplyr
  - r-magrittr
  - r-rlang
  - r-tibble
  - r-tidyr
  run:
  - r-base
  - bioconductor-gseabase
  - bioconductor-gsva >=1.50.0
  - bioconductor-singscore
  - r-dplyr
  - r-magrittr
  - r-rlang
  - r-tibble
  - r-tidyr
source:
  sha256: 096bb92e8eb3b2ad69124a0ea0ba483afa14d2d6833d629aba2de7b246dad6f1
  url:
  - /src/contrib/clustermole_1.1.1.tar.gz
  - /src/contrib/Archive/clustermole/clustermole_1.1.1.tar.gz
test:
  commands:
  - $R -e "library('clustermole')"
