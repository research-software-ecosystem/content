about:
  description: Provides example datasets for the iModMix package, including gene,
    protein, and metabolite partial correlation matrices derived from ccRCC4 and FloresData_K_TK
    studies. The data are preprocessed and ready to use for testing, demonstrating
    iModMix workflows, and exploring correlation networks.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/iModMixData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Data for iModMix Package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-imodmixdata
  version: 1.0.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: a740228baaa7fcbe366b1c2827c366b1
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/iModMixData_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/iModMixData/iModMixData_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/iModMixData_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-imodmixdata/bioconductor-imodmixdata_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('iModMixData')"
