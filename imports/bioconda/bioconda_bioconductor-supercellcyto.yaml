about:
  description: SuperCellCyto provides the ability to summarise cytometry data into
    supercells by merging together cells that are similar in their marker expressions
    using the SuperCell package.
  home: https://bioconductor.org/packages/3.22/bioc/html/SuperCellCyto.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: SuperCell For Cytometry Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-supercellcyto
  version: 1.0.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-data.table
  - r-matrix
  - r-supercell
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-data.table
  - r-matrix
  - r-supercell
source:
  md5: fb05de279bc8406b0b71abe45633b143
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SuperCellCyto_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SuperCellCyto/SuperCellCyto_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/SuperCellCyto_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-supercellcyto/bioconductor-supercellcyto_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SuperCellCyto')"
