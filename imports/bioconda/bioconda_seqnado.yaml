about:
  home: https://github.com/Milne-Group/SeqNado
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'A unified and user-friendly collection of pipelines for: ATAC-seq, ChIP-seq,
    CUT&RUN/TAG, RNA-seq, WGS, Methylation (Bisulphite/TAPS), CRISPR screens and Micro-Capture-C.'
build:
  entry_points:
  - seqnado = seqnado.cli:app
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps -vvv
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.0.1
extra:
  recipe-maintainers:
  - alsmith151
  - CChahrour
package:
  name: seqnado
  version: 1.0.1
requirements:
  host:
  - python >=3.10
  - setuptools >=61.0
  - wheel
  - setuptools-scm >=6.2
  - pip
  run:
  - pandas
  - pandera
  - pulp <=2.9.0
  - pydantic
  - pyranges
  - pyyaml
  - seaborn
  - setuptools_scm
  - snakemake-wrapper-utils
  - snakemake >8,<9
  - snakemake-executor-plugin-slurm
  - tracknado
  - wget
source:
  sha256: b53bb50e8db341e9d1dabcc543d7077701f5de2576137f6aa70268e9818889f0
  url: https://pypi.io/packages/source/s/seqnado/seqnado-1.0.1.tar.gz
test:
  commands:
  - seqnado --help
  imports:
  - seqnado
