about:
  home: https://github.com/Milne-Group/SeqNado
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'A unified and user-friendly collection of pipelines for: ATAC-seq, ChIP-seq,
    CUT&RUN/TAG, RNA-seq, WGS, Methylation (Bisulphite/TAPS), CRISPR screens and Micro-Capture-C.'
build:
  entry_points:
  - seqnado = seqnado.cli:app
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps -vvv
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.0.4
extra:
  recipe-maintainers:
  - alsmith151
  - CChahrour
package:
  name: seqnado
  version: 1.0.4
requirements:
  host:
  - python >=3.10
  - setuptools >=61.0
  - wheel
  - setuptools-scm >=6.2
  - pip
  run:
  - numpy >=1.24, <=2.1.0
  - pandas >=2.0, <=2.3.3
  - pandera
  - pulp <=2.9.0
  - pydantic
  - pyranges
  - pyyaml
  - seaborn
  - setuptools_scm
  - snakemake >=9.12.0, <=9.14.5
  - snakemake-executor-plugin-slurm
  - snakemake-wrapper-utils
  - tracknado
  - wget
source:
  sha256: 92aea64d618e8504e9a7ba4826a6f2827523d452f9ac4696d518e5371df639d3
  url: https://pypi.io/packages/source/s/seqnado/seqnado-1.0.4.tar.gz
test:
  commands:
  - seqnado --help
  imports:
  - seqnado
