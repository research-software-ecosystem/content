about:
  dev_url: https://github.com/mdmparis/defense-finder
  home: https://github.com/mdmparis/defense-finder
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: 'Defense Finder: allow for a systematic search of all known anti-phage
    systems.'
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: defense-finder
  version: 3.0.0
requirements:
  host:
  - pip
  - python >=3.10
  - setuptools
  run:
  - click >=8.0.3
  - colorlog >=6.3.0a1
  - macsyfinder 2.1.4
  - python >=3.10
  - pyhmmer
  - pyrodigal
source:
  sha256: 306df6b6601af46a1f5056ff5e7caf0ccedc4ef1783fd04ad7892b825fa21f45
  url: https://github.com/mdmparis/defense-finder/archive/v3.0.0.tar.gz
test:
  commands:
  - defense-finder run --help
