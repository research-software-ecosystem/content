about:
  description: Bulk RNA-seq from GTEx on 4,000 randomly selected, expressed genes.
    Data has been processed for co-expression analysis.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/spqnData.html
  license: Artistic-2.0
  summary: Data for the spqn package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spqndata
  version: 1.22.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 502e2cc83ac8a5dd46b94cc3875f396a
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/spqnData_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/spqnData/spqnData_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/spqnData_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-spqndata/bioconductor-spqndata_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('spqnData')"
