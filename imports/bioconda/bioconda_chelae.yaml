about:
  dev_url: https://github.com/fulcrumgenomics/chelae
  doc_url: https://github.com/fulcrumgenomics/chelae/blob/v0.1.0/README.md
  home: https://github.com/fulcrumgenomics/chelae
  license: MIT
  license_family: MIT
  license_file:
  - LICENSE
  - THIRDPARTY.yml
  summary: A toolkit for trimming and filtering FASTQ reads.
build:
  binary_relocation: false
  number: 0
  run_exports:
  - null
  script:
  - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
  - cargo install --locked cargo-multivers
  - cargo multivers --profile dist --out-dir "${PREFIX}/bin"
  - cargo install --no-track --locked --profile dist --root "${PREFIX}" --path .
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - nh13
  - tfenne
package:
  name: chelae
  version: 0.1.0
requirements:
  build:
  - null
  - null
  - null
  - cargo-bundle-licenses
source:
  sha256: 39cb2c912da5f411d05a8f8b6b2c38561bfb945d5bdebade7360594ba6853d13
  url: https://github.com/fulcrumgenomics/chelae/archive/v0.1.0.tar.gz
test:
  commands:
  - chelae --help
