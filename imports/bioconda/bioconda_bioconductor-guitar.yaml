about:
  description: The package is designed for visualization of RNA-related genomic features
    with respect to the landmarks of RNA transcripts, i.e., transcription starting
    site, start codon, stop codon and transcription ending site.
  home: https://bioconductor.org/packages/3.22/bioc/html/Guitar.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Guitar
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-guitar
    path: recipes/bioconductor-guitar
    version: 1.20.0
package:
  name: bioconductor-guitar
  version: 2.26.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-knitr
  - r-magrittr
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-knitr
  - r-magrittr
source:
  md5: 288235911662385f228a01bd4e0d1598
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Guitar_2.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Guitar/Guitar_2.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/Guitar_2.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-guitar/bioconductor-guitar_2.26.0_src_all.tar.gz
test:
