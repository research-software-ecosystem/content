about:
  description: A package to analyze flow cytometric data of complex microbial communities
    based on histogram images
  home: https://bioconductor.org/packages/3.22/bioc/html/flowCHIC.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Analyze flow cytometric data using histogram information
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-flowchic
  version: 1.44.0
requirements:
  host:
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-ggplot2
  - r-hexbin
  - r-vegan
  run:
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-ggplot2
  - r-hexbin
  - r-vegan
source:
  md5: 3993d8d9c1c1e5193f38815f980ce4fc
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowCHIC_1.44.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowCHIC/flowCHIC_1.44.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowCHIC_1.44.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowchic/bioconductor-flowchic_1.44.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('flowCHIC')"
