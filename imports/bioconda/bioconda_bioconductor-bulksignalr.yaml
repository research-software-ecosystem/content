about:
  description: Inference of ligand-receptor (LR) interactions from bulk expression
    (transcriptomics/proteomics) data, or spatial transcriptomics. BulkSignalR bases
    its inferences on the LRdb database included in our other package, SingleCellSignalR
    available from Bioconductor. It relies on a statistical model that is specific
    to bulk data sets. Different visualization and data summary functions are proposed
    to help navigating prediction results.
  home: https://bioconductor.org/packages/3.22/bioc/html/BulkSignalR.html
  license: CeCILL | file LICENSE
  license_file: LICENSE
  summary: Infer Ligand-Receptor Interactions from bulk expression (transcriptomics/proteomics)
    data, or spatial transcriptomics
