about:
  description: This package installs and interfaces the naive Bayesian classifier
    for 16S rRNA sequences developed by the Ribosomal Database Project (RDP). With
    this package the classifier trained with the standard training set can be used
    or a custom classifier can be trained.
  home: https://bioconductor.org/packages/3.22/bioc/html/rRDP.html
  license: GPL-2 + file LICENSE
  license_file: LICENSE
  summary: Interface to the RDP Classifier
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:rrdp
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-rrdp
    path: recipes/bioconductor-rrdp
    version: 1.14.0
package:
  name: bioconductor-rrdp
  version: 1.44.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-rjava
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-rjava
source:
  md5: 0c204596aa38308b1012464818517f62
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rRDP_1.44.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rRDP/rRDP_1.44.0.tar.gz
  - https://bioarchive.galaxyproject.org/rRDP_1.44.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rrdp/bioconductor-rrdp_1.44.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rRDP')"
