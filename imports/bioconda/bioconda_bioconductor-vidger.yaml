about:
  description: 'The aim of vidger is to rapidly generate information-rich visualizations
    for the interpretation of differential gene expression results from three widely-used
    tools: Cuffdiff, DESeq2, and edgeR.'
  home: https://bioconductor.org/packages/3.22/bioc/html/vidger.html
  license: GPL-3 | file LICENSE
  license_file: LICENSE
  summary: Create rapid visualizations of RNAseq data in R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-vidger
  version: 1.30.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggally
  - r-ggplot2
  - r-ggrepel
  - r-knitr
  - r-rcolorbrewer
  - r-rmarkdown
  - r-scales
  - r-tidyr
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggally
  - r-ggplot2
  - r-ggrepel
  - r-knitr
  - r-rcolorbrewer
  - r-rmarkdown
  - r-scales
  - r-tidyr
source:
  md5: 0d5ab32eeaf5fcd9c1b74201d66c5c3b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/vidger_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/vidger/vidger_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/vidger_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-vidger/bioconductor-vidger_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('vidger')"
