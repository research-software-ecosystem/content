about:
  home: https://github.com/meren/illumina-utils
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: COPYING
  summary: A library and collection of scripts to work with Illumina paired-end data
    (for CASAVA 1.8+).
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
package:
  name: illumina-utils
  version: '2.14'
requirements:
  host:
  - python >=3
  - pip
  - setuptools >=61
  - wheel
  run:
  - python >=3
  - matplotlib-base
  - python-levenshtein
  - numpy
source:
  sha256: 5536158e97f9264d428fb7666b9f60a9a19568a2dbd77331426e8043f9d55564
  url: https://pypi.io/packages/source/i/illumina-utils/illumina_utils-2.14.tar.gz
test:
  commands:
  - iu-merge-pairs -h
  - iu-gen-configs -h
  - iu-filter-quality-minoche -h
  - iu-demultiplex -h
  - iu-filter-merged-reads -h
  imports:
  - IlluminaUtils
  - IlluminaUtils.lib
  - IlluminaUtils.utils
