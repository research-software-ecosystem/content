about:
  description: "Quickly find motif matches for many motifs and many sequences. Wraps\
    \ C++ code from the MOODS motif calling library, which was developed by Pasi Rastas,\
    \ Janne Korhonen, and Petri Martinm\xE4ki."
  home: https://bioconductor.org/packages/3.22/bioc/html/motifmatchr.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Fast Motif Matching in R
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:motifmatchr
package:
  name: bioconductor-motifmatchr
  version: 1.32.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-tfbstools >=1.48.0,<1.49.0
  - r-base
  - r-matrix
  - r-rcpp
  - r-rcpparmadillo
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-tfbstools >=1.48.0,<1.49.0
  - r-base
  - r-matrix
  - r-rcpp
  - r-rcpparmadillo
source:
  md5: 3287cf01b93c9965ea1875a273fc6c48
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/motifmatchr_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/motifmatchr/motifmatchr_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/motifmatchr_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-motifmatchr/bioconductor-motifmatchr_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('motifmatchr')"
