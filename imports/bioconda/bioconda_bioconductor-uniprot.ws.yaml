about:
  description: The Universal Protein Resource (UniProt) is a comprehensive resource
    for protein sequence and annotation data. This package provides a collection of
    functions for retrieving, processing, and re-packaging UniProt web services. The
    package makes use of UniProt's modernized REST API and allows mapping of identifiers
    accross different databases.
  home: https://bioconductor.org/packages/3.22/bioc/html/UniProt.ws.html
  license: Artistic-2.0
  summary: R Interface to UniProt Web Services
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:uniprot.ws
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-uniprot.ws
    path: recipes/bioconductor-uniprot.ws
    version: 2.20.4
package:
  name: bioconductor-uniprot.ws
  version: 2.50.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-httr2
  - r-jsonlite
  - r-progress
  - r-rjsoncons
  - r-rlang
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-httr2
  - r-jsonlite
  - r-progress
  - r-rjsoncons
  - r-rlang
source:
  md5: 6633c7099e896a0223452485690932aa
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/UniProt.ws_2.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/UniProt.ws/UniProt.ws_2.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/UniProt.ws_2.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-uniprot.ws/bioconductor-uniprot.ws_2.50.0_src_all.tar.gz
test:
