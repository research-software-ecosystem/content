about:
  description: A client for BEDbase. bedbaser provides access to the API at api.bedbase.org.
    It also includes convenience functions to import BED files into GRanges objects
    and BEDsets into GRangesLists.
  home: https://bioconductor.org/packages/3.22/bioc/html/bedbaser.html
  license: Artistic License 2.0
  summary: A BEDbase client
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bedbaser
  version: 1.2.6
requirements:
  host:
  - bioconductor-anvil >=1.22.0,<1.23.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-curl
  - r-dplyr
  - r-httr
  - r-purrr
  - r-r.utils
  - r-rlang
  - r-stringr
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-anvil >=1.22.0,<1.23.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-curl
  - r-dplyr
  - r-httr
  - r-purrr
  - r-r.utils
  - r-rlang
  - r-stringr
  - r-tibble
  - r-tidyr
source:
  md5: 96af1bcfd6d354e5d2230be1f3c2b34c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/bedbaser_1.2.6.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/bedbaser/bedbaser_1.2.6.tar.gz
  - https://bioarchive.galaxyproject.org/bedbaser_1.2.6.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bedbaser/bioconductor-bedbaser_1.2.6_src_all.tar.gz
