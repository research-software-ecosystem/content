about:
  description: The SplicingFactory R package uses transcript-level expression values
    to analyze splicing diversity based on various statistical measures, like Shannon
    entropy or the Gini index. These measures can quantify transcript isoform diversity
    within samples or between conditions. Additionally, the package analyzes the isoform
    diversity data, looking for significant changes between conditions.
  home: https://bioconductor.org/packages/3.22/bioc/html/SplicingFactory.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Splicing Diversity Analysis for Transcriptome Data
build:
  noarch: generic
  number: 2
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-splicingfactory
  version: 1.18.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
source:
  md5: 9cf58796357dd2eb8862684ad9ea6744
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SplicingFactory_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SplicingFactory/SplicingFactory_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/SplicingFactory_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-splicingfactory/bioconductor-splicingfactory_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SplicingFactory')"
