about:
  description: omicsPrint provides functionality for cross omic genetic fingerprinting,
    for example, to verify sample relationships between multiple omics data types,
    i.e. genomic, transcriptomic and epigenetic (DNA methylation).
  home: https://bioconductor.org/packages/3.22/bioc/html/omicsPrint.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Cross omic genetic fingerprinting
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-omicsprint
    path: recipes/bioconductor-omicsprint
    version: 1.2.0
package:
  name: bioconductor-omicsprint
  version: 1.30.0
requirements:
  host:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-raggedexperiment >=1.34.0,<1.35.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-mass
  - r-matrixstats
  run:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-raggedexperiment >=1.34.0,<1.35.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-mass
  - r-matrixstats
source:
  md5: 5f53d3f6365ca0482fe87a253d86d360
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/omicsPrint_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/omicsPrint/omicsPrint_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/omicsPrint_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-omicsprint/bioconductor-omicsprint_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('omicsPrint')"
