about:
  description: Perform Canonical correlation between two forms of high demensional
    genetic data, and associate the first compoent of each form of data with a specific
    biologically interesting pattern of associations with multiple endpoints. A probe
    level analysis is also implemented.
  home: https://bioconductor.org/packages/3.22/bioc/html/CCPROMISE.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: PROMISE analysis with Canonical Correlation for Two Forms of High Dimensional
    Genetic Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ccpromise
  version: 1.36.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-promise >=1.62.0,<1.63.0
  - r-base
  - r-ccp
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-promise >=1.62.0,<1.63.0
  - r-base
  - r-ccp
source:
  md5: 518f2f498a64a045f937bf40a4a01301
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CCPROMISE_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CCPROMISE/CCPROMISE_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/CCPROMISE_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ccpromise/bioconductor-ccpromise_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CCPROMISE')"
