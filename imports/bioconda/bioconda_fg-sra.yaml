about:
  description: 'fg-sra is a high-performance replacement for NCBI''s sam-dump that
    converts

    SRA data to SAM, BAM, FASTA, and FASTQ formats. It provides multi-threaded

    processing, genomic region filtering, quality score quantization, and

    reference caching.

    '
  dev_url: https://github.com/fulcrumgenomics/fg-sra
  doc_url: https://github.com/fulcrumgenomics/fg-sra/blob/v0.1.0/README.md
  home: https://github.com/fulcrumgenomics/fg-sra
  license: MIT
  license_family: MIT
  license_file:
  - LICENSE
  - THIRDPARTY.yml
  summary: High-performance SRA-to-SAM/BAM/FASTQ converter.
