about:
  dev_url: https://github.com/mlbendall/telescope
  home: https://github.com/mlbendall/telescope
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Single locus resolution of Transposable ELEment expression.
build:
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  skip: true
extra:
  container:
    extended-base: true
  identifiers:
  - doi:10.1101/398172
  recipe-maintainers:
  - davebx
package:
  name: telescope
  version: 1.0.3_fix
requirements:
  build:
  - null
  host:
  - pip
  - python ==3.6
  - cython ==0.29.7
  - setuptools
  - numpy ==1.16.3
  - scipy ==1.2.1
  - pysam ==0.15.2
  - future >=0.17.1
  - pyyaml >=5.1
  - intervaltree ==3.0.2
  - htslib ==1.9
  - pandas ==1.1.3
  run:
  - python ==3.6
  - numpy ==1.16.3
  - scipy ==1.2.1
  - pysam ==0.15.2
  - future >=0.17.1
  - pyyaml >=5.1
  - intervaltree ==3.0.2
source:
  patches:
  - 0001-Fix-setup.py.patch
  sha256: a508d3598f14e9df888c7fa48f982a59b735b65ab4d15b81a25a202d2af8b2a0
  url: https://github.com/hanalysis/telescope/archive/v1.0.3_fix.tar.gz
test:
  commands:
  - telescope --version
  - telescope -h &> /dev/null
  - telescope assign -h &> /dev/null
  - telescope resume -h &> /dev/null
