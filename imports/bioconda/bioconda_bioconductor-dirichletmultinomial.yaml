about:
  description: 'Dirichlet-multinomial mixture models can be used to describe variability
    in microbial metagenomic data. This package is an interface to code originally
    made available by Holmes, Harris, and Quince, 2012, PLoS ONE 7(2): 1-15, as discussed
    further in the man page for this package, ?DirichletMultinomial.'
  home: https://bioconductor.org/packages/3.22/bioc/html/DirichletMultinomial.html
  license: LGPL-3
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Dirichlet-Multinomial Mixture Model Machine Learning for Microbiome Data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:dirichletmultinomial
  - doi:10.1371/journal.pone.0030126
  parent_recipe:
    name: bioconductor-dirichletmultinomial
    path: recipes/bioconductor-dirichletmultinomial
    version: 1.22.0
package:
  name: bioconductor-dirichletmultinomial
  version: 1.52.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  - gsl
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - gsl
source:
  md5: 4d353fe6ad98fdf909ca031b98cde9bb
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/DirichletMultinomial_1.52.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DirichletMultinomial/DirichletMultinomial_1.52.0.tar.gz
  - https://bioarchive.galaxyproject.org/DirichletMultinomial_1.52.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dirichletmultinomial/bioconductor-dirichletmultinomial_1.52.0_src_all.tar.gz
