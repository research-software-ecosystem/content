about:
  description: This package implements the inference of candidate master regulator
    proteins from multi-omics' data (MOMA) algorithm, as well as ancillary analysis
    and visualization functions.
  home: https://bioconductor.org/packages/3.22/bioc/html/MOMA.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Multi Omic Master Regulator Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-moma
  version: 1.22.0
requirements:
  host:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - r-base
  - r-circlize
  - r-cluster
  - r-dplyr
  - r-ggplot2
  - r-magrittr
  - r-mkmisc
  - r-rcolorbrewer
  - r-readr
  - r-reshape2
  - r-rlang
  - r-stringr
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - r-base
  - r-circlize
  - r-cluster
  - r-dplyr
  - r-ggplot2
  - r-magrittr
  - r-mkmisc
  - r-rcolorbrewer
  - r-readr
  - r-reshape2
  - r-rlang
  - r-stringr
  - r-tibble
  - r-tidyr
source:
  md5: 17180989706bdda4d4ee086f64b8de4c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MOMA_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MOMA/MOMA_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/MOMA_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-moma/bioconductor-moma_1.22.0_src_all.tar.gz
test:
