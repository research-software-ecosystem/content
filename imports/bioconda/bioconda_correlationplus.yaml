about:
  dev_url: https://github.com/tekpinar/correlationplus
  doc_url: https://github.com/tekpinar/correlationplus
  home: https://github.com/tekpinar/correlationplus
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: COPYING.LESSER
  summary: A Python package to calculate, visualize and analyze dynamical correlations
    of proteins.
build:
  entry_points:
  - correlationplus=correlationplus.scripts.correlationplus:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -v
extra:
  recipe-maintainers:
  - bneron
  - tekpinar
package:
  name: correlationplus
  version: 0.2.3
requirements:
  host:
  - pip
  - python
  - setuptools
  run:
  - matplotlib-base
  - networkx
  - numpy
  - prody
  - mdanalysis
  - numba
  - python
  - scipy
source:
  sha256: 0dd442521eac1cc78b7fef268c61e12d7cc05f0cd1bf137794bea0feadf8e5de
  url: https://pypi.io/packages/source/c/correlationplus/correlationplus-0.2.3.tar.gz
test:
  commands:
  - correlationplus --help
  imports:
  - correlationplus
  - correlationplus.scripts
