about:
  description: HMP2Data is a Bioconductor package of the Human Microbiome Project
    2 (HMP2) 16S rRNA sequencing data. Processed data is provided as phyloseq, SummarizedExperiment,
    and MultiAssayExperiment class objects. Individual matrices and data.frames used
    for building these S4 class objects are also provided in the package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/HMP2Data.html
  license: Artistic-2.0
  summary: 16s rRNA sequencing data from the Human Microbiome Project 2
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hmp2data
  version: 1.24.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-phyloseq >=1.54.0,<1.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-assertthat
  - r-base
  - r-data.table
  - r-dplyr
  - r-kableextra
  - r-knitr
  - r-magrittr
  - r-readr
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-phyloseq >=1.54.0,<1.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-assertthat
  - r-base
  - r-data.table
  - r-dplyr
  - r-kableextra
  - r-knitr
  - r-magrittr
  - r-readr
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 524ef126d243df5575cf62b01450f6dc
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HMP2Data_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HMP2Data/HMP2Data_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/HMP2Data_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hmp2data/bioconductor-hmp2data_1.24.0_src_all.tar.gz
