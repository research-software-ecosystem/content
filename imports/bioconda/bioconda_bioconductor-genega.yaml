about:
  description: R based Genetic algorithm for gene expression optimization by considering
    both mRNA secondary structure and codon usage bias, GeneGA includes the information
    of highly expressed genes of almost 200 genomes. Meanwhile, Vienna RNA Package
    is needed to ensure GeneGA to function properly.
  home: https://bioconductor.org/packages/3.22/bioc/html/GeneGA.html
  license: GPL version 2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Design gene based on both mRNA secondary structure and codon usage bias
    using Genetic algorithm
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-genega
  version: 1.60.0
requirements:
  host:
  - r-base
  - r-hash
  - r-seqinr
  run:
  - r-base
  - r-hash
  - r-seqinr
source:
  md5: c1615287e01cd78bf12c406588c051a3
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GeneGA_1.60.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GeneGA/GeneGA_1.60.0.tar.gz
  - https://bioarchive.galaxyproject.org/GeneGA_1.60.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-genega/bioconductor-genega_1.60.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GeneGA')"
