about:
  description: 'This package allows a direct access to the dataset generated by the
    Human Cell Atlas project for further processing in R and Bioconductor, in the
    comfortable format of SingleCellExperiment objects (available in other formats
    here: http://preview.data.humancellatlas.org/).'
  home: https://bioconductor.org/packages/3.22/data/experiment/html/HCAData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Accessing The Datasets Of The Human Cell Atlas in R/Bioconductor
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hcadata
  version: 1.26.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 9ad9445999c76d33135ecf225862c90a
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HCAData_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HCAData/HCAData_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/HCAData_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hcadata/bioconductor-hcadata_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HCAData')"
