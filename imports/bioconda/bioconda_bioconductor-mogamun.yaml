about:
  description: MOGAMUN is a multi-objective genetic algorithm that identifies active
    modules in a multiplex biological network. This allows analyzing different biological
    networks at the same time. MOGAMUN is based on NSGA-II (Non-Dominated Sorting
    Genetic Algorithm, version II), which we adapted to work on networks.
  home: https://bioconductor.org/packages/3.22/bioc/html/MOGAMUN.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: 'MOGAMUN: A Multi-Objective Genetic Algorithm to Find Active Modules in
    Multiplex Biological Networks'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mogamun
  version: 1.20.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-rcy3 >=2.30.0,<2.31.0
  - r-base
  - r-igraph
  - r-runit
  - r-stringr
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-rcy3 >=2.30.0,<2.31.0
  - r-base
  - r-igraph
  - r-runit
  - r-stringr
source:
  md5: b3fdebaa1f6c6f68b61a648f20d93556
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MOGAMUN_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MOGAMUN/MOGAMUN_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/MOGAMUN_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mogamun/bioconductor-mogamun_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MOGAMUN')"
