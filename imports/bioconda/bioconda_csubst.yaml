about:
  dev_url: https://github.com/kfuku52/csubst
  doc_url: https://github.com/kfuku52/csubst/blob/v1.8.0/README.md
  home: https://github.com/kfuku52/csubst
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Tool for analyzing combinatorial codon substitutions in DNA sequences.
build:
  number: 0
  run_exports:
  - null
  script:
  - export LDFLAGS="${LDFLAGS} -L${PREFIX}/lib"
  - export CPPFLAGS="${CPPFLAGS} -I${PREFIX}/include -I$(python -c 'import numpy;
    print(numpy.get_include())')"
  - sed -i.bak 's|find_packages|find_namespace_packages|' setup.py
  - rm -f *.bak
  - setup.py build_ext --inplace
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv
  skip: true
extra:
  identifiers:
  - doi:10.1038/s41559-022-01932-7
  recipe-maintainers:
  - kfuku52
package:
  name: csubst
  version: 1.8.0
requirements:
  build:
  - null
  - null
  host:
  - python >=3.10,<3.14
  - pip
  - cython
  - setuptools
  - numpy
  run:
  - python >=3.10,<3.14
  - ete4 >=4.3.0
  - numpy
  - scipy
  - pandas
  - matplotlib-base
  - iqtree >=2.0.0
  - pyvolve
  - biopython
  - pymol-open-source
  - mafft
source:
  sha256: eb568e33023db01e0516d373298f0b78d401be70109af5c532c2f6e588fa5304
  url: https://github.com/kfuku52/csubst/archive/refs/tags/v1.8.0.tar.gz
test:
  commands:
  - csubst --help
  imports:
  - csubst
