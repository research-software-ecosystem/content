about:
  dev_url: https://github.com/popgenmethods/smcpp
  doc_url: https://github.com/popgenmethods/smcpp/blob/v1.15.4/README.rst
  home: https://github.com/popgenmethods/smcpp
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: SMC++ infers population history from whole-genome sequence data.
build:
  number: 1
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.15.4
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  skip-lints:
  - uses_vcs_url
  - compiler_needs_stdlib_c
package:
  name: smcpp
  version: 1.15.4
requirements:
  build:
  - null
  host:
  - python
  - pip
  - setuptools <81
  - setuptools-scm
  - gmp
  - gsl
  - numpy <2
  - mpfr
  - libgomp
  - llvm-openmp
  run:
  - libgomp
  - llvm-openmp
  - python
  - numpy <2
  - gnuplot
  - gmp
  - gsl
  - mpfr
  - pysam >=0.18
  - matplotlib-base >=3,<3.6
  - pandas >=1.4
  - scikit-learn >=1
  - scipy >=1.8
  - appdirs
  - tqdm
  - seaborn-base
  - setuptools <81
source:
  git_rev: 6779fae
  git_url: https://github.com/popgenmethods/smcpp
  patches:
  - 0001-conditioned_sfs.patch
  - 0002-marginalize.patch
  sha256: unused
test:
  commands:
  - smc++ vcf2smc -v example/example.vcf.gz example.1.smc.gz 1 msp1:msp_0
  imports:
  - smcpp
  - smcpp._smcpp
  source_files:
  - example/example.vcf.gz
  - example/example.vcf.gz.csi
