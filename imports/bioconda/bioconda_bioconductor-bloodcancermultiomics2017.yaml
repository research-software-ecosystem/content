about:
  description: "The package contains data of the Primary Blood Cancer Encyclopedia\
    \ (PACE) project together with a complete executable transcript of the statistical\
    \ analysis and reproduces figures presented in the paper \"Drug-perturbation-based\
    \ stratification of blood cancer\" by Dietrich S, Ole\u015B M, Lu J et al., J.\
    \ Clin. Invest. (2018) 128(1):427-445. doi:10.1172/JCI93801."
  home: https://bioconductor.org/packages/3.22/data/experiment/html/BloodCancerMultiOmics2017.html
  license: LGPL (>= 3)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: "\"Drug-perturbation-based stratification of blood cancer\" by Dietrich\
    \ S, Ole\u015B M, Lu J et al. - experimental data and complete analysis"
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bloodcancermultiomics2017
  version: 1.30.0
