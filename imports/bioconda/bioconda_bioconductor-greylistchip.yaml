about:
  description: Identify regions of ChIP experiments with high signal in the input,
    that lead to spurious peaks during peak calling. Remove reads aligning to these
    regions prior to peak calling, for cleaner ChIP analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/GreyListChIP.html
  license: Artistic-2.0
  summary: Grey Lists -- Mask Artefact Regions Based on ChIP Inputs
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-greylistchip
  version: 1.42.0
requirements:
  host:
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-mass
  run:
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-mass
source:
  md5: 8b17d18a4ec0d8a9bd921af871c82bdd
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GreyListChIP_1.42.0.tar.gz
