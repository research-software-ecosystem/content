about:
  description: Raw data downloaded from GEO for the compound LY294002. Raw data is
    from multiple platforms from Affymetrix and Illumina. This data is used to illustrate
    the cross-platform meta-analysis of microarray data using the crossmeta package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/lydata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Example Dataset for crossmeta Package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-lydata
  version: 1.36.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 97ce5c2d091c398f3917ab7da48b3b26
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/lydata_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/lydata/lydata_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/lydata_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-lydata/bioconductor-lydata_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('lydata')"
