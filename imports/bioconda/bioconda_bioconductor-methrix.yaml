about:
  description: Bedgraph files generated by Bisulfite pipelines often come in various
    flavors. Critical downstream step requires summarization of these files into methylation/coverage
    matrices. This step of data aggregation is done by Methrix, including many other
    useful downstream functions.
  home: https://bioconductor.org/packages/3.22/bioc/html/methrix.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Fast and efficient summarization of generic bedGraph files from Bisufite
    sequencing
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-methrix
  version: 1.24.0
requirements:
  host:
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-delayedmatrixstats >=1.32.0,<1.33.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table >=1.12.4
  - r-ggplot2
  - r-matrixstats
  run:
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-delayedmatrixstats >=1.32.0,<1.33.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table >=1.12.4
  - r-ggplot2
  - r-matrixstats
source:
  md5: a52cbb100daccb429b81e67469da156a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/methrix_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/methrix/methrix_1.24.0.tar.gz
