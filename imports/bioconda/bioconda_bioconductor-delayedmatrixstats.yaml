about:
  description: A port of the 'matrixStats' API for use with DelayedMatrix objects
    from the 'DelayedArray' package. High-performing functions operating on rows and
    columns of DelayedMatrix objects, e.g. col / rowMedians(), col / rowRanks(), and
    col / rowSds(). Functions optimized per data type and for subsetted calculations
    such that both memory usage and processing time is minimized.
  home: https://bioconductor.org/packages/3.22/bioc/html/DelayedMatrixStats.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Functions that Apply to Rows and Columns of 'DelayedMatrix' Objects
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-delayedmatrixstats
    path: recipes/bioconductor-delayedmatrixstats
    version: 1.2.0
package:
  name: bioconductor-delayedmatrixstats
  version: 1.32.0
requirements:
  host:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - bioconductor-sparsematrixstats >=1.22.0,<1.23.0
  - r-base
  - r-matrix >=1.5-0
  run:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - bioconductor-sparsematrixstats >=1.22.0,<1.23.0
  - r-base
  - r-matrix >=1.5-0
