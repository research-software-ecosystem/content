about:
  description: Provides sample files and data for the vignettes of pepStat and Pviz
    as well as peptide collections for HIV and SIV.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/pepDat.html
  license: Artistic-2.0
  summary: Peptide microarray data package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-pepdat
  version: 1.30.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: d3403d0f8913b857f8819bbd8b452ca5
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/pepDat_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pepDat/pepDat_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/pepDat_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pepdat/bioconductor-pepdat_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('pepDat')"
