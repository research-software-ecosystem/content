about:
  dev_url: https://github.com/fawaz-dabbaghieh
  doc_url: https://github.com/fawaz-dabbaghieh/bubble_gun/blob/v1.2.0/README.md
  home: https://github.com/fawaz-dabbaghieh/bubble_gun
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: BubbleGun is a tool for detecting bubbles and superbubbles in GFA graphs,
    and reports them and their nested structures.
build:
  entry_points:
  - BubbleGun=BubbleGun.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: bubblegun
  version: 1.2.0
requirements:
  host:
  - python >=3.6
  - pip
  - setuptools
  run:
  - python >=3.6
source:
  sha256: 9d56f23118a2271b86a820c02eccfa31e790ba3bac97b3b882817f8c0e832396
  url: https://github.com/fawaz-dabbaghieh/bubble_gun/archive/refs/tags/v1.2.0.tar.gz
test:
  commands:
  - BubbleGun -h
