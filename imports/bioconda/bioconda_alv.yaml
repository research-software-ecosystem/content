about:
  home: https://github.com/arvestad/alv
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: A console-based sequence alignment viewer
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation -vv'
