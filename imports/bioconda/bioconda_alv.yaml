  - pip
  - python >=3.6
  - setuptools
  run:
  - biopython >=1.70
  - colorama >=0.3.8
  - python >=3.6
source:
  sha256: 96c4b4ef46fb8e543519297d78a7e55dfc9052955d3acad50e07066238cefbc5
  url: https://pypi.io/packages/source/a/alv/alv-1.8.2.tar.gz
test:
  commands:
  - alv --help
