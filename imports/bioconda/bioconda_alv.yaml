  - python >=3.6
  - setuptools
  run:
  - biopython >=1.70
  - colorama >=0.3.8
  - python >=3.6
source:
  sha256: 8f19648a53dada8be8664c4ec985b047a046e5997413936de97a70c0c5d65935
  url: https://pypi.io/packages/source/a/alv/alv-1.8.3.tar.gz
test:
  commands:
  - alv --help
