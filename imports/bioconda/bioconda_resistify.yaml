about:
  description: 'Resistify is a program which rapidly identifies and classifies plant
    resistance genes from protein sequences.

    It is designed to be lightweight and easy to use.'
  dev_url: https://github.com/SwiftSeal/resistify
  doc_url: https://github.com/SwiftSeal/resistify/blob/v2.0.1/README.md
  home: https://github.com/swiftseal/resistify
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  license_url: https://github.com/SwiftSeal/resistify/blob/main/LICENSE
  summary: A resistance gene annotation tool.
build:
  entry_points:
  - resistify = resistify.main:main
  noarch: python
  number: 1
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
package:
  name: resistify
  version: 2.0.1
requirements:
  host:
  - pip
  - python >=3.11
  - uv-build
  run:
  - python >=3.11
  - pyhmmer
  - scikit-learn
  - svg.py
  - numpy
  - fair-esm
  - pytorch
  - transformers
  - xgboost
  - einops
  - sentencepiece
  - tqdm
source:
  sha256: 65cc5cb1aaf20f5a9d82d2a1b8491964d5a66a45c6c0a9fe25ad37ee82cc24e0
  url: https://github.com/SwiftSeal/resistify/archive/refs/tags/v2.0.1.tar.gz
test:
  commands:
  - resistify --help
  imports:
  - resistify
