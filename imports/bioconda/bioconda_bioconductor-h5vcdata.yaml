about:
  description: This package contains the data used in the vignettes and examples of
    the 'h5vc' package
  home: https://bioconductor.org/packages/3.22/data/experiment/html/h5vcData.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Example data for the h5vc package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-h5vcdata
  version: 2.30.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: cbd55c8fbffe7d9800914d0dd22c7a33
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/h5vcData_2.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/h5vcData/h5vcData_2.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/h5vcData_2.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-h5vcdata/bioconductor-h5vcdata_2.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('h5vcData')"
