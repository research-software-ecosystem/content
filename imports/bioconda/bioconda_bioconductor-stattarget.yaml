about:
  description: A streamlined tool provides a graphical user interface for quality
    control based signal drift correction (QC-RFSC), integration of data from multi-batch
    MS-based experiments, and the comprehensive statistical analysis in metabolomics
    and proteomics.
  home: https://bioconductor.org/packages/3.22/bioc/html/statTarget.html
  license: LGPL (>= 3)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Statistical Analysis of Molecular Profiles
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-stattarget
  version: 1.40.0
requirements:
  host:
  - bioconductor-impute >=1.84.0,<1.85.0
  - bioconductor-roc >=1.86.0,<1.87.0
  - r-base
  - r-pdist
  - r-pls
  - r-plyr
  - r-randomforest
  - r-rrcov
  run:
  - bioconductor-impute >=1.84.0,<1.85.0
  - bioconductor-roc >=1.86.0,<1.87.0
  - r-base
  - r-pdist
  - r-pls
  - r-plyr
  - r-randomforest
  - r-rrcov
source:
  md5: 9ab231c1c58ef0031fed598a94149abd
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/statTarget_1.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/statTarget/statTarget_1.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/statTarget_1.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-stattarget/bioconductor-stattarget_1.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('statTarget')"
