about:
  home: https://github.com/TheJacksonLaboratory/ezomero
  license: GPL-2.0-only
  license_file: LICENSE
  summary: A module with convenience functions for writing Python code that interacts
    with OMERO.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: ezomero
  version: 3.2.3
requirements:
  host:
  - setuptools
  - pip
  - python >=3.8
  run:
  - python >=3.8
  - omero-py >=5.13.0,<5.20.0
  - numpy >=1.22,<2.0
source:
  sha256: f9e5b32571045470890f4986db8197a93721cbbec65ab26cbd92d83687ce4a68
  url: https://pypi.org/packages/source/e/ezomero/ezomero-3.2.3.tar.gz
test:
  imports:
  - ezomero
