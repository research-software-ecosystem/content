about:
  dev_url: https://github.com/KohlbacherLab/epytope/tree/develop
  doc_url: https://epytope.readthedocs.io/en/latest/
  home: https://github.com/KohlbacherLab/epytope
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: A Framework for Epitope Detection and Vaccine Design
build:
  noarch: python
  number: 1
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - christopher-mohr
  - jonasscheid
package:
  name: epytope
  version: 4.0.0
requirements:
  host:
  - python >=3.11
  - pip
  - setuptools >=64
  run:
  - beautifulsoup4
  - biopython
  - pandas >=2.1
  - pyensembl
  - pymysql
  - pyomo >=4.0
  - python >=3.11
  - pyvcf3
  - requests
  - urllib3
source:
  sha256: 973fd751095f0aa3f331f649f0ee04deb202b5b846dae8f85e331dcc07956651
  url: https://pypi.io/packages/source/e/epytope/epytope-4.0.0.tar.gz
