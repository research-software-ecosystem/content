about:
  description: DEWSeq is a sliding window approach for the analysis of differentially
    enriched binding regions eCLIP or iCLIP next generation sequencing data.
  home: https://bioconductor.org/packages/3.22/bioc/html/DEWSeq.html
  license: LGPL (>= 3)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Differential Expressed Windows Based on Negative Binomial Distribution
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dewseq
  version: 1.24.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table >=1.11.8
  - r-r.utils
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table >=1.11.8
  - r-r.utils
source:
  md5: 737489f5023d1865eb7371447a9d06ee
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/DEWSeq_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DEWSeq/DEWSeq_1.24.0.tar.gz
