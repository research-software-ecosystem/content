about:
  home: https://github.com/MDU-PHL/abritamr
  licence_file: LICENSE
  license: GPL-3.0-only
  license_family: GPL3
  summary: Idenify bacterial AMR genes and SNPs in genome assemblies
build:
  entry_points:
  - abritamr = abritamr.abritamr:main
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . --no-build-isolation --no-deps --no-cache-dir -vvv
extra:
  identifiers:
  - biotools:abritamr
  recipe-maintainers:
  - kristyhoran
package:
  name: abritamr
  version: 1.2.0
requirements:
  host:
  - pip
  - python >=3.9
  - setuptools
  - libcurl
  run:
  - python >=3.9
  - pandas
  - xlsxwriter
  - ncbi-amrfinderplus >=4.0.0
  - parallel
source:
  sha256: 784cf71a2a58adea6263fea07a6810bb0fe701dda5e316f454f906f274ec7e8a
  url: https://pypi.org/packages/source/a/abritamr/abritamr-1.2.0.tar.gz
test:
  commands:
  - abritamr --version
  - abritamr --help
  - abritamr run --help
  - abritamr report --help
  - abritamr update_db --help
  imports:
  - abritamr
  requires:
  - nose
  - pytest
