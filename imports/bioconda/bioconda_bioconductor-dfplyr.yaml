about:
  description: Provides `dplyr` verbs (`mutate`, `select`, `filter`, etc...) supporting
    `S4Vectors::DataFrame` objects. Importantly, this is achieved without conversion
    to an intermediate `tibble`. Adds grouping infrastructure to `DataFrame` which
    is respected by the transformation verbs.
  home: https://bioconductor.org/packages/3.22/bioc/html/DFplyr.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: A `DataFrame` (`S4Vectors`) backend for `dplyr`
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dfplyr
  version: 1.4.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-dplyr
  - r-rlang
  - r-tidyselect
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-dplyr
  - r-rlang
  - r-tidyselect
source:
  md5: 5388c747f7e0c48d6004af81820650f8
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/DFplyr_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DFplyr/DFplyr_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/DFplyr_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dfplyr/bioconductor-dfplyr_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('DFplyr')"
