about:
  description: Provides delayed computation of a matrix of residuals after fitting
    a linear model to each column of an input matrix. Also supports partial computation
    of residuals where selected factors are to be preserved in the output matrix.
    Implements a number of efficient methods for operating on the delayed matrix of
    residuals, most notably matrix multiplication and calculation of row/column sums
    or means.
  home: https://bioconductor.org/packages/3.22/bioc/html/ResidualMatrix.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Creating a DelayedMatrix of Regression Residuals
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-residualmatrix
  version: 1.20.0
requirements:
  host:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-matrix
  run:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-matrix
source:
  md5: 9c4fb15413aff2681eda81ec978f3d9b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ResidualMatrix_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ResidualMatrix/ResidualMatrix_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/ResidualMatrix_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-residualmatrix/bioconductor-residualmatrix_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ResidualMatrix')"
