about:
  description: 'This package provides ready to use reference data for GenomicDistributions
    package. Raw data was obtained from ensembldb and processed with helper functions.
    Data files are available for the following genome assemblies: hg19, hg38, mm9
    and mm10.'
  home: https://bioconductor.org/packages/3.22/data/experiment/html/GenomicDistributionsData.html
  license: BSD_2_clause + file LICENSE
  license_file: LICENSE
  summary: Reference data for GenomicDistributions package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-genomicdistributionsdata
  version: 1.18.0
requirements:
  host:
  - bioconductor-annotationfilter >=1.34.0,<1.35.0
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-ensembldb >=2.34.0,<2.35.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-data.table
  run:
  - bioconductor-annotationfilter >=1.34.0,<1.35.0
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-ensembldb >=2.34.0,<2.35.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-data.table
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 657a9e7475a7b219fe000164d00b6a05
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/GenomicDistributionsData_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GenomicDistributionsData/GenomicDistributionsData_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/GenomicDistributionsData_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-genomicdistributionsdata/bioconductor-genomicdistributionsdata_1.18.0_src_all.tar.gz
test:
