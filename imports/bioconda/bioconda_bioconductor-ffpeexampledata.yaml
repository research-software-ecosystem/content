about:
  description: A subset of GSE17565 (April et al. 2009) containing 32 FFPE samples
    of Burkitts Lymphoma and Breast Adenocarcinoma, with a dilution series in technical
    duplicate.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/ffpeExampleData.html
  license: GPL (>2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Illumina DASL example microarray data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ffpeexampledata
  version: 1.48.0
requirements:
  host:
  - bioconductor-lumi >=2.62.0,<2.63.0
  - r-base
  run:
  - bioconductor-lumi >=2.62.0,<2.63.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 5cac32b918421f9d0ed984e9ba8a0351
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/ffpeExampleData_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ffpeExampleData/ffpeExampleData_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/ffpeExampleData_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ffpeexampledata/bioconductor-ffpeexampledata_1.48.0_src_all.tar.gz
test:
