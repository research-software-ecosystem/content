about:
  description: The rols package is an interface to the Ontology Lookup Service (OLS)
    to access and query hundred of ontolgies directly from R.
  home: https://bioconductor.org/packages/3.22/bioc/html/rols.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: An R interface to the Ontology Lookup Service
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:rols
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-rols
    path: recipes/bioconductor-rols
    version: 2.8.2
package:
  name: bioconductor-rols
  version: 3.6.1
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - r-httr2
  - r-jsonlite
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - r-httr2
  - r-jsonlite
source:
  md5: c5c417e122495c2c23f44068329a1aaa
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rols_3.6.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rols/rols_3.6.1.tar.gz
  - https://bioarchive.galaxyproject.org/rols_3.6.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rols/bioconductor-rols_3.6.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('rols')"
