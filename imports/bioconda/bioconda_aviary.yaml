about:
  description: 'Aviary is an easy to use hybrid assembler and metagenomic pipeline


    For more details see documentation: https://rhysnewell.github.io/aviary.'
  dev_url: https://github.com/rhysnewell/aviary
  doc_url: https://rhysnewell.github.io/aviary
  home: https://github.com/rhysnewell/aviary
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: aviary - Metagenomics pipeline using long and short reads.
build:
  entry_points:
  - aviary = aviary.aviary:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
package:
  name: aviary
  version: 0.13.0
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - snakemake-minimal 9.*
  - ruamel.yaml >=0.15.99
  - numpy
  - pandas
  - polars
  - biopython
  - pigz >=2.6
  - parallel
  - bbmap
  - extern
  - pyopenssl >22.1.0
  - bird_tool_utils_python
source:
  sha256: c7fc48fec5211b93c45f010d260879be59dfed39b7a9a929e839bb3c916c10e1
  url: https://pypi.org/packages/source/a/aviary-genome/aviary_genome-0.13.0.tar.gz
test:
  commands:
  - aviary --version | grep '0.13.0'
