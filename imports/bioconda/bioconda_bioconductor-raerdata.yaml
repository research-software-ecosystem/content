about:
  description: raerdata is an ExperimentHub package that provides a collection of
    files useful for demostrating functionality in the raer package. Datasets include
    10x genomics scRNA-seq, bulk RNA-seq, and paired whole-genome and RNA-seq data.
    Additionally databases of human and mouse RNA editing sites are provided.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/raerdata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: A collection of datasets for use with raer package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-raerdata
  version: 1.8.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: cc8d84a7c1da1ed34864ab4d312d0b68
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/raerdata_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/raerdata/raerdata_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/raerdata_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-raerdata/bioconductor-raerdata_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('raerdata')"
