about:
  description: "GRIT (Genomic Range Interval Toolkit) is a high-performance Rust implementation\
    \                                                                            \
    \                                          \nof common BED file operations. It\
    \ provides streaming algorithms with O(k) memory                             \
    \                                                                            \
    \            \ncomplexity, achieving 3-15x speedup over bedtools with up to 1000x\
    \ less memory.                                                               \
    \                                                       \n"
  dev_url: https://github.com/manish59/grit
  doc_url: https://manish59.github.io/grit
  home: https://github.com/manish59/grit
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'GRIT: Genomic Range Interval Toolkit - high-performance BED file operations'
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - manish59
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: grit-genomics
  version: 0.1.1
requirements:
  build:
  - null
  - null
  - null
source:
  sha256: 40c0ad8652a05056aa8eac7662c23d68e67a86343ef588b397f46221c840121d
  url: https://github.com/manish59/grit/archive/refs/tags/v0.1.1.tar.gz
test:
  commands:
  - grit --version
  - grit --help
  - echo -e "chr1\t100\t200\nchr1\t150\t250" | grit merge -i - | grep -q "chr1"
