about:
  description: peakCombiner, a fully R based, user-friendly, transparent, and customizable
    tool that allows even novice R users to create a high-quality consensus peak list.
    The modularity of its functions allows an easy way to optimize input and output
    data. A broad range of accepted input data formats can be used to create a consensus
    peak set that can be exported to a file or used as the starting point for most
    downstream peak analyses.
  home: https://bioconductor.org/packages/3.22/bioc/html/peakCombiner.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: The R package to curate and merge enriched genomic regions into consensus
    peak sets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-peakcombiner
  version: 1.0.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dplyr >=1.1.2
  - r-here
  - r-purrr
  - r-readr >=2.1.2
  - r-rlang
  - r-stringr
  - r-tibble >=3.2.1
  - r-tidyr
  - r-tidyselect
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dplyr >=1.1.2
  - r-here
  - r-purrr
  - r-readr >=2.1.2
  - r-rlang
  - r-stringr
  - r-tibble >=3.2.1
  - r-tidyr
  - r-tidyselect
source:
  md5: 96cf4b75d32415a0ec88988504abb61a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/peakCombiner_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/peakCombiner/peakCombiner_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/peakCombiner_1.0.0.tar.gz
