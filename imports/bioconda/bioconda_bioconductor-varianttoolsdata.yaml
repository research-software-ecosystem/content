about:
  description: Data from the sequencing of a 50/50 mixture of HapMap trio samples
    NA12878 (CEU) and NA19240 (YRI), subset to the TP53 region.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/VariantToolsData.html
  license: Artistic-2.0
  summary: Data for the VariantTools tutorial
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-varianttoolsdata
  version: 1.34.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: bbfb3a537000992a90acd815526f222a
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/VariantToolsData_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/VariantToolsData/VariantToolsData_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/VariantToolsData_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-varianttoolsdata/bioconductor-varianttoolsdata_1.34.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('VariantToolsData')"
