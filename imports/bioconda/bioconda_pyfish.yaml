about:
  dev_url: https://github.com/ICCB-Cologne/PyFish
  home: https://github.com/ICCB-Cologne/PyFish
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Plotting tool for evolutionary population dynamics. Creates a Fish (Muller)
    plot.
build:
  entry_points:
  - pyfish = pyfish.main:run
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  identifiers:
  - doi:10.1093/bioinformatics/btad102
  recipe-maintainers:
  - tlkaufmann
  - xstreck1
package:
  name: pyfish
  version: 1.1.1
requirements:
  host:
  - setuptools
  - pip
  - python >=3.8
  run:
  - matplotlib-base >=3.0
  - numpy >=1.14
  - pandas >=1.0
  - python >=3.8
  - scipy >=1.0
source:
  sha256: 9c5b1da5e3c17f722c4b98356d0e9bf8b8725dfbfc1ee2d83344781a21b90096
  url: https://pypi.org/packages/source/p/pyfish/pyfish-1.1.1.tar.gz
test:
  commands:
  - pyfish --help
  imports:
  - pyfish
