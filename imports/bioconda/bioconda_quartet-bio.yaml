about:
  dev_url: https://github.com/aaranyue/quarTeT
  doc_url: https://github.com/aaranyue/quarTeT/blob/main/README.md
  home: https://github.com/aaranyue/quarTeT
  license: MIT
  license_family: MIT
  summary: A telomere-to-telomere toolkit for gap-free genome assembly and centromeric
    repeat identification.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  identifiers:
  - doi:10.1093/hr/uhad127
  - biotools:quartet
package:
  name: quartet-bio
  version: 1.2.5
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools
  run:
  - python >=3.7
  - r-rideogram
  - r-ggplot2
  - gnuplot
  - unimap
  - minimap2
  - mummer4
  - trf
  - cd-hit
  - blast
  - tidk
  - hifiasm
source:
  sha256: 63e9464fe2eb474d93d008654efda55e02aff1bb31f83fcd188f81383948a193
  url: https://github.com/aaranyue/quarTeT/archive/4fdd3e0ea2a4aae315ace99a67c1f54128759012.tar.gz
test:
  commands:
  - quartet.py -h
