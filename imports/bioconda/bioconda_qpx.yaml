about:
  description: 'qpx is a Python toolkit for working with quantitative proteomics data
    in

    the QPX Parquet format. It provides commands to convert results from

    common search engines, transform and aggregate quantitative data, run

    SQL-style queries with DuckDB, and validate datasets against the QPX

    schema.

    '
  dev_url: https://github.com/bigbio/qpx
  doc_url: https://qpx.quantms.org
  home: https://github.com/bigbio/qpx
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: "Quantitative proteomics data toolkit \u2014 convert, transform, query,\
    \ and validate QPX Parquet datasets"
build:
  entry_points:
  - qpxc = qpx.cli.main:main
  noarch: python
  number: 1
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - ypriverol
package:
  name: qpx
  version: 1.0.2
requirements:
  host:
  - python >=3.10
  - pip
  - hatchling
  - hatch-vcs
  run:
  - python >=3.10
  - click >=8.1
  - pandas >=2.1
  - pyarrow >=14.0
  - pyopenms >=3.3.0,<3.5.0
  - numpy >=1.24
  - duckdb >=1.1.3
  - pyyaml >=6.0
  - scipy
  - mudata >=0.2.4
  - anndata >=0.9.0
source:
  sha256: 80afef9d60e395126d3eac5e7bddfd2b04178a7540ddba40b9af7cf45dc5923e
  url: https://pypi.io/packages/source/q/qpx/qpx-1.0.2.tar.gz
test:
  commands:
  - qpxc --help
  - pip check
  imports:
  - qpx
  requires:
  - pip
