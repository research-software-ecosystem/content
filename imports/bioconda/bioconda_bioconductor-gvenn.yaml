about:
  description: Tools to compute and visualize overlaps between gene sets or genomic
    regions. Venn diagrams with proportional areas are provided, while UpSet plots
    are recommended for larger numbers of sets. The package supports GRanges and GRangesList
    inputs, and integrates with analysis workflows for ChIP-seq, ATAC-seq, and other
    genomic interval data. It generates clean, interpretable, and publication-ready
    figures.
  home: https://bioconductor.org/packages/3.22/bioc/html/gVenn.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Proportional Venn and UpSet Diagrams for Gene Sets and Genomic Regions
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gvenn
  version: 1.0.0
requirements:
  host:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-eulerr
  - r-lubridate
  - r-stringr
  - r-writexl
  run:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-eulerr
  - r-lubridate
  - r-stringr
  - r-writexl
source:
  md5: 21158cee1032dc950663a8d2acbc3fc0
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/gVenn_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/gVenn/gVenn_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/gVenn_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gvenn/bioconductor-gvenn_1.0.0_src_all.tar.gz
test:
