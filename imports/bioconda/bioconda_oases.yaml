about:
  dev_url: https://github.com/dzerbino/oases
  home: https://github.com/dzerbino/oases
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.txt
  summary: De novo transcriptome assembler for short reads.
build:
  number: 3
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:oases
  skip-lints:
  - uses_vcs_url
  - missing_hash
package:
  name: oases
  version: 0.2.09
requirements:
  build:
  - make
  - null
  - llvm-openmp
  - git-lfs
  run:
  - velvet
  - llvm-openmp
source:
  git_rev: 1b4c14c
  git_url: https://github.com/dzerbino/oases.git
test:
  commands:
  - oases | grep "oases - De novo transcriptome assembler for the Velvet package"
    > /dev/null
