about:
  description: A quasi-simulation based approach to performing power analysis for
    EWAS (Epigenome-wide association studies) with continuous or binary outcomes.
    'EpipwR' relies on empirical EWAS datasets to determine power at specific sample
    sizes while keeping computational cost low. EpipwR can be run with a variety of
    standard statistical tests, controlling for either a false discovery rate or a
    family-wise type I error rate.
  home: https://bioconductor.org/packages/3.22/bioc/html/EpipwR.html
  license: Artistic-2.0
  summary: Efficient Power Analysis for EWAS with Continuous or Binary Outcomes
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-epipwr
  version: 1.4.0
requirements:
  host:
  - bioconductor-epipwr.data >=1.4.0,<1.5.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - r-ggplot2
  run:
  - bioconductor-epipwr.data >=1.4.0,<1.5.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - r-ggplot2
source:
  md5: 57560298abd2c92969343ecd21c4f817
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/EpipwR_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/EpipwR/EpipwR_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/EpipwR_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-epipwr/bioconductor-epipwr_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('EpipwR')"
