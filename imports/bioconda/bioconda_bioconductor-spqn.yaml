about:
  description: The spqn package implements spatial quantile normalization (SpQN).
    This method was developed to remove a mean-correlation relationship in correlation
    matrices built from gene expression data. It can serve as pre-processing step
    prior to a co-expression analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/spqn.html
  license: Artistic-2.0
  summary: Spatial quantile normalization
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spqn
  version: 1.22.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-ggridges
  - r-matrixstats
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-ggridges
  - r-matrixstats
source:
  md5: 405a81e67b52d572f5b64a6f849dfabf
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/spqn_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/spqn/spqn_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/spqn_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-spqn/bioconductor-spqn_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('spqn')"
