about:
  description: This package provides pre-processed RNA-seq data where the epithelial
    to mesenchymal transition was induced on cell lines. These data come from three
    publications Cursons et al. (2015), Cursons etl al. (2018) and Foroutan et al.
    (2017). In each of these publications, EMT was induces across multiple cell lines
    following treatment by TGFb among other stimulants. This data will be useful in
    determining the regulatory programs modified in order to achieve an EMT. Data
    were processed by the Davis laboratory in the Bioinformatics division at WEHI.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/emtdata.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: An ExperimentHub Package for data sets with an Epithelial to Mesenchymal
    Transition (EMT)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-emtdata
  version: 1.18.0
requirements:
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 6a1412a42a9e3568691d227c12b1c014
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/emtdata_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/emtdata/emtdata_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/emtdata_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-emtdata/bioconductor-emtdata_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('emtdata')"
