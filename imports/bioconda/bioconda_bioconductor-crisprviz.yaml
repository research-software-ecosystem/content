about:
  description: Provides functionalities to visualize and contextualize CRISPR guide
    RNAs (gRNAs) on genomic tracks across nucleases and applications. Works in conjunction
    with the crisprBase and crisprDesign Bioconductor packages. Plots are produced
    using the Gviz framework.
  home: https://bioconductor.org/packages/3.22/bioc/html/crisprViz.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Visualization Functions for CRISPR gRNAs
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-crisprviz
  version: 1.12.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-crisprbase >=1.14.0,<1.15.0
  - bioconductor-crisprdesign >=1.12.0,<1.13.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-txdbmaker >=1.6.0,<1.7.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-crisprbase >=1.14.0,<1.15.0
  - bioconductor-crisprdesign >=1.12.0,<1.13.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-txdbmaker >=1.6.0,<1.7.0
  - r-base
