about:
  description: XAItest is an R Package that identifies features using eXplainable
    AI (XAI) methods such as SHAP or LIME. This package allows users to compare these
    methods with traditional statistical tests like t-tests, empirical Bayes, and
    Fisher's test. Additionally, it includes simThresh, a system that enables the
    comparison of feature importance with p-values by incorporating calibrated simulated
    data.
  home: https://bioconductor.org/packages/3.22/bioc/html/XAItest.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 'XAItest: Enhancing Feature Discovery with eXplainable AI'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-xaitest
  version: 1.2.0
requirements:
  host:
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-caret
  - r-dt
  - r-ggplot2
  - r-kernelshap
  - r-lime
  - r-randomforest
  run:
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-caret
  - r-dt
  - r-ggplot2
  - r-kernelshap
  - r-lime
  - r-randomforest
source:
  md5: b0f41db8d45f8e2409691d305c3d0e81
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/XAItest_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/XAItest/XAItest_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/XAItest_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-xaitest/bioconductor-xaitest_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('XAItest')"
