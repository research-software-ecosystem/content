about:
  description: The seqCAT package uses variant calling data (in the form of VCF files)
    from high throughput sequencing technologies to authenticate and validate the
    source, function and characteristics of biological samples used in scientific
    endeavours.
  home: https://bioconductor.org/packages/3.22/bioc/html/seqCAT.html
  license: MIT + file LICENCE
  summary: High Throughput Sequencing Cell Authentication Toolkit
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-seqcat
  version: 1.32.0
requirements:
  host:
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-dplyr >=0.5.0
  - r-ggplot2 >=2.2.1
  - r-rlang
  - r-scales >=0.4.1
  - r-tidyr >=0.6.1
  run:
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-dplyr >=0.5.0
  - r-ggplot2 >=2.2.1
  - r-rlang
  - r-scales >=0.4.1
  - r-tidyr >=0.6.1
source:
  md5: b6b92f1b329b62c28b5b763a5ce55e58
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/seqCAT_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/seqCAT/seqCAT_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/seqCAT_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-seqcat/bioconductor-seqcat_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('seqCAT')"
