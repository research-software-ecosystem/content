about:
  dev_url: https://github.com/ncsa/NEAT
  home: https://github.com/ncsa/NEAT
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: Toolset for generating synthethic FASTQ, VCF and BAM files.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install --no-deps --no-build-isolation --no-cache-dir -vvv .'
package:
  name: neat
  version: '4.4'
requirements:
  host:
  - python >=3.10
  - poetry-core >=1.0.0
  - pip
  run:
  - python >=3.10
  - biopython =1.85
  - pkginfo
  - matplotlib-base
  - numpy
  - seaborn-base
  - pyyaml
  - scipy
  - bedtools
  - pybedtools >=0.9.0
  - htslib
  - pysam
  - frozendict
source:
  sha256: 9f2579c935d6da6a10661f62846227d0f711840513f2e5b159ca62673f702f29
  url: https://github.com/ncsa/NEAT/archive/4.4.tar.gz
test:
  commands:
  - neat -h | grep read-simulator
