about:
  description: OGRE calculates overlap between user defined genomic region datasets.
    Any regions can be supplied i.e. genes, SNPs, or reads from sequencing experiments.
    Key numbers help analyse the extend of overlaps which can also be visualized at
    a genomic level.
  home: https://bioconductor.org/packages/3.22/bioc/html/OGRE.html
  license: Artistic-2.0
  summary: Calculate, visualize and analyse overlap between genomic regions
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ogre
  version: 1.14.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-assertthat
  - r-base
  - r-data.table
  - r-dt
  - r-ggplot2
  - r-shiny
