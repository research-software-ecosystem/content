about:
  description: This package contains the function to find marker genes for image-based
    spatial transcriptomics data. There are functions to create spatial vectors from
    the cell and transcript coordiantes, which are passed as inputs to find marker
    genes. Marker genes are detected for every cluster by two approaches. The first
    approach is by permtuation testing, which is implmented in parallel for finding
    marker genes for one sample study. The other approach is to build a linear model
    for every gene. This approach can account for multiple samples and backgound noise.
  home: https://bioconductor.org/packages/3.22/bioc/html/jazzPanda.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Finding spatially relevant marker genes in image based spatial transcriptomics
    data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
