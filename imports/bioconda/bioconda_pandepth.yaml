about:
  description: "PanDepth is an ultra-fast and efficient tool for calculating coverage\
    \ and depth from sequencing alignments. \nIt outperforms other tools in computation\
    \ time and memory efficiency for both BAM and CRAM-format \nalignment files, utilizing\
    \ chromosome parallel computation and optimized data structures.\n"
  dev_url: https://github.com/HuiyangYu/PanDepth
  home: https://github.com/HuiyangYu/PanDepth
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: An ultra-fast and efficient genomic tool for coverage calculation.
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: pandepth
  version: '2.26'
requirements:
  build:
  - make
  - null
  - null
  host:
  - htslib
  - libdeflate
  - zlib
  run:
  - htslib
source:
