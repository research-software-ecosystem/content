about:
  home: https://github.com/bede/deacon
  license: MIT
  license_file: LICENSE
  summary: Fast alignment-free sequence filter
build:
  number: 0
  run_exports:
  - null
  script:
  - mv .cargo/config-portable.toml .cargo/config.toml
  - cargo install --no-track --locked --verbose --root "${PREFIX}" --path .
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - bede
package:
  name: deacon
  version: 0.14.0
requirements:
  build:
  - null
  - cargo-bundle-licenses
  host:
  - openssl
source:
  sha256: 07ae5cd160b32fe20c6e122f2f162ab564a9d265a6a599606e3ec6e28e40a266
  url: https://github.com/bede/deacon/archive/0.14.0.tar.gz
test:
  commands:
  - deacon index build --help
  - deacon filter --help
