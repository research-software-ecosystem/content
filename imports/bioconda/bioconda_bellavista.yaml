about:
  dev_url: https://github.com/pkosurilab/BellaVista
  home: https://github.com/pkosurilab/BellaVista
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python package for interactive visualization of imaging-based spatial transcriptomics.
build:
  entry_points:
  - bellavista = bellavista.bellavista:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir
extra:
  container:
    extended-base: true
  recipe-maintainers:
  - nilchia
package:
  name: bellavista
  version: 0.1.0
requirements:
  host:
  - python >=3.9
  - hatchling
  - pip
  run:
  - python >=3.9
  - tqdm
  - numpy
  - pandas
  - h5py
  - matplotlib-base
  - ome-zarr >=0.3.0
  - napari-ome-zarr
  - zarr >=2.8.1,<3
  - imagecodecs
  - shapely
  - pyarrow
  - dask-core >=2022.02.0
  - napari
  - scikit-image
  - dask-image
  - mesa-libgl-cos6-x86_64
  - pyqt
source:
  sha256: d4edb66acbdc3c471167f3a98d0c0ec333101a6c117437336335973dacc4cb7a
  url: https://pypi.org/packages/source/b/bellavista/bellavista-0.1.0.tar.gz
test:
  commands:
  - bellavista --help
  imports:
  - bellavista
