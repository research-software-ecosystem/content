about:
  doc_url: https://mdu-phl.github.io/bohra/
  home: https://github.com/MDU-PHL/bohra
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.txt
  summary: Pipeline for analysing Illumina data for microbiological public health.
build:
  entry_points:
  - bohra=bohra.bohra:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - kristyhoran
  - tseemann
package:
  name: bohra
  version: 3.3.0
requirements:
  host:
  - python >=3.8
  - pip
  - hatchling
  run:
  - python >=3.11
  - nextflow
  - pytest
  - click
  - pandas
  - numpy
  - psutil
  - jinja2
  - csvtk
source:
  sha256: 6c1fa092386879584d2cccf342c7a3ac2fb5461e5d2ac4b764fef055a49aa91a
  url: https://pypi.io/packages/source/b/bohra/bohra-3.3.0.tar.gz
test:
  commands:
  - bohra --version | grep -F '3.3.0'
  - bohra --help
  imports:
  - bohra
