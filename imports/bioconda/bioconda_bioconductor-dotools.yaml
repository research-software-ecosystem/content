about:
  description: This package provides functions for creating various visualizations,
    convenient wrappers, and quality-of-life utilities for single cell experiment
    objects. It offers a streamlined approach to visualize results and integrates
    different tools for easy use.
  home: https://bioconductor.org/packages/3.22/bioc/html/DOtools.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Convenient functions to streamline your single cell data analysis workflow
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dotools
  version: 1.0.0
