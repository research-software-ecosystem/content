about:
  home: https://github.com/ConesaLab/SQANTI3
  license: GPL-3.0-only
  license_file: LICENSE
  summary: SQANTI3 is a tool for the structural and quality annotation of long-read
    transcriptomes.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
package:
  name: sqanti3
  version: 6.0.1
requirements:
  run:
  - python >=3.11,<3.12
  - pyyaml >=6.0.3
  - numpy >=1.26,<2.0
  - scipy >=1.11,<1.12
  - pandas >=2.2,<2.3
  - scikit-learn >=1.5,<1.6
  - seaborn >=0.13,<0.14
  - argcomplete >=3.4
  - jinja2 >=3.1
  - psutil >=6.1
  - bcbio-gff >=0.7
  - bedtools >=2.31
  - biopython >=1.81,<1.82
  - bx-python >=0.11
  - gffread >=0.12
  - gtftools >=0.9
  - namfinder >=0.1.3
  - pybedtools >=0.10
  - pysam >=0.22,<0.23
  - samtools >=1.21
  - seqtk >=1.4
  - desalt >=1.5
  - gmap >=2024.11
  - kallisto >=0.48
  - minimap2 >=2.28
  - star >=2.7.11b
  - r-base >=4.3.3
  - r-biocmanager >=1.30
  - r-caret >=6.0
  - r-dplyr >=1.1
  - r-dt >=0.33
  - r-devtools >=2.4
  - r-e1071 >=1.7
  - r-forcats >=1.0
  - r-ggplot2 >=3.4.0a
  - r-ggplotify >=0.1
  - r-gridbase >=0.4
  - r-gridextra >=2.3
  - r-htmltools >=0.5
  - r-jsonlite >=1.8
  - r-optparse >=1.7
  - r-plotly >=4.10
  - r-plyr >=1.8
  - r-purrr >=1.0
  - r-randomforest >=4.7
  - r-rmarkdown >=2.29
  - r-reshape >=0.8
  - r-readr >=2.1
  - r-scales >=1.3
  - r-stringi >=1.8
  - r-stringr >=1.5
  - r-tibble >=3.2
  - r-tidyr >=1.3
  - bioconductor-noiseq >=2.46
  - bioconductor-gviz
  - pandoc >=3.5
  - perl >=5.32,<5.33
