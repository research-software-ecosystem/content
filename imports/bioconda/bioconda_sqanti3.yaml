  - pyarrow >=14.0,<15.0
  - pyfaidx >=0.8
  - simplejson >=3.19
  - sortedcontainers >=2.4
  - zipp >=3.21
  - td2 >=1.0
source:
  sha256: 6318bfb3a60f2147202e90bd579dbfbe67b5a5b763005fe3b22429564bf95686
  url: https://github.com/ConesaLab/SQANTI3/archive/refs/tags/v6.0.1.tar.gz
test:
  commands:
  - sqanti3 --help
  - sqanti3_qc.py --help
  - sqanti3_filter.py --help
  - sqanti3_rescue.py --help
  - sqanti3_reads.py --help
  requires:
  - pytest >=7.4,<8.0
  source_files:
  - test/
  - pytest.ini
  - src/
