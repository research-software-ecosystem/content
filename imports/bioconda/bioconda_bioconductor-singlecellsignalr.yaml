about:
  description: Inference of ligand-receptor (L-R) interactions from single-cell expression
    (transcriptomics/proteomics) data. SingleCellSignalR v2 inferences rely on the
    statistical model we introduced in the BulkSignalR package as well as the original
    SingleCellSignalR LR-score (both are available). SingleCellSignalR v2 can be regarded
    as a wrapper to BulkSignalR fundamental classes. This also enables v2 users to
    work with any species, whereas only Mus musculus & Homo sapiens were available
    before in SingleCellSignalR v1.
  home: https://bioconductor.org/packages/3.22/bioc/html/SingleCellSignalR.html
  license: CeCILL | file LICENSE
  license_file: LICENSE
  summary: Cell Signalling Using Single-Cell RNA-seq or Proteomics Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-singlecellsignalr
  version: 2.0.1
requirements:
  host:
  - bioconductor-bulksignalr >=1.2.0,<1.3.0
  - r-base
  - r-foreach
  - r-ggplot2
  - r-matrixstats
  - r-matrixtests
  run:
  - bioconductor-bulksignalr >=1.2.0,<1.3.0
  - r-base
  - r-foreach
  - r-ggplot2
  - r-matrixstats
  - r-matrixtests
source:
  md5: 0d500e7f2c40e7d9d67cd348d8cd42b2
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SingleCellSignalR_2.0.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SingleCellSignalR/SingleCellSignalR_2.0.1.tar.gz
  - https://bioarchive.galaxyproject.org/SingleCellSignalR_2.0.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-singlecellsignalr/bioconductor-singlecellsignalr_2.0.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('SingleCellSignalR')"
