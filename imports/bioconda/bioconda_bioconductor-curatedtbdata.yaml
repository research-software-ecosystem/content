about:
  description: The curatedTBData is an R package that provides standardized, curated
    tuberculosis(TB) transcriptomic studies. The initial release of the package contains
    49 studies. The curatedTBData package allows users to access tuberculosis trancriptomic
    efficiently and to make efficient comparison for different TB gene signatures
    across multiple datasets.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/curatedTBData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Curation of existing tuberculosis transcriptomic studies
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-curatedtbdata
  version: 2.6.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - r-base
  - r-rlang
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - r-base
  - r-rlang
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: b17e44684f3fb8ffa421e23d86ff2098
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/curatedTBData_2.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/curatedTBData/curatedTBData_2.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/curatedTBData_2.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-curatedtbdata/bioconductor-curatedtbdata_2.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('curatedTBData')"
