  - https://bioarchive.galaxyproject.org/CopyNeutralIMA_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-copyneutralima/bioconductor-copyneutralima_1.28.0_src_all.tar.gz
