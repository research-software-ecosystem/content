about:
  home: https://github.com/ZJUFanLab/SIMO
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Spatial integration of multi-omics single-cell datasets through probabilistic
    alignment
build:
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation .
extra:
  recipe-maintainers:
  - askmadsen
package:
  name: simo-omics
  version: 1.0.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - scipy >=1.8.1,<1.12
  - pot ==0.8.2
  - scikit-misc >=0.1.4
  - scanpy >=1.9.1
  - python-igraph >=0.10.8
  - leidenalg >=0.10.0
  - louvain >=0.7.1
  - networkx >=3.1
  - pycomplexheatmap
  - plotly
source:
  sha256: 883c1c9e6909134693368813632bd4c7e26e8287d30e25bda5a1b1e2b81649d6
  url: https://github.com/ZJUFanLab/SIMO/archive/refs/tags/v1.0.0.tar.gz
test:
  imports:
  - simo
