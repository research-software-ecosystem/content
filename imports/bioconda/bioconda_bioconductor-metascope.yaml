about:
  description: This package contains tools and methods for preprocessing microbiome
    data. Functionality includes library generation, demultiplexing, alignment, and
    microbe identification.  It is in part an R translation of the PathoScope 2.0
    pipeline.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/MetaScope.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Tools and functions for preprocessing 16S and metagenomic sequencing microbiome
    data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-metascope
  version: 1.10.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-rbowtie2 >=2.16.0,<2.17.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table >=1.16.2
  - r-dplyr
  - r-ggplot2
  - r-magrittr
  - r-matrix
  - r-readr
  - r-rlang
  - r-stringr
  - r-taxonomizr
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-rbowtie2 >=2.16.0,<2.17.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table >=1.16.2
  - r-dplyr
  - r-ggplot2
  - r-magrittr
  - r-matrix
  - r-readr
  - r-rlang
  - r-stringr
  - r-taxonomizr
  - r-tibble
  - r-tidyr
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 6cd5c4736f6e47cd4b883ce5c8fa7ccd
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/MetaScope_1.10.0.tar.gz
