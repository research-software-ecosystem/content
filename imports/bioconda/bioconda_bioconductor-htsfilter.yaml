about:
  description: This package implements a filtering procedure for replicated transcriptome
    sequencing data based on a global Jaccard similarity index in order to identify
    genes with low, constant levels of expression across one or more experimental
    conditions.
  home: https://bioconductor.org/packages/3.22/bioc/html/HTSFilter.html
  license: Artistic-2.0
  summary: Filter replicated high-throughput transcriptome sequencing data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-htsfilter
  version: 1.50.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
source:
  md5: cc2a8bc72b020b6548f38041c8c5604c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/HTSFilter_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HTSFilter/HTSFilter_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/HTSFilter_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-htsfilter/bioconductor-htsfilter_1.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HTSFilter')"
