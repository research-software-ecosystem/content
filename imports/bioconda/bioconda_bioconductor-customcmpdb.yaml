about:
  description: This package serves as a query interface for important community collections
    of small molecules, while also allowing users to include custom compound collections.
  home: https://bioconductor.org/packages/3.22/bioc/html/customCMPdb.html
  license: Artistic-2.0
  summary: Customize and Query Compound Annotation Database
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-customcmpdb
  version: 1.20.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-chemminer >=3.62.0,<3.63.0
  - r-base
  - r-rappdirs
  - r-rsqlite
  - r-xml
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-chemminer >=3.62.0,<3.63.0
  - r-base
  - r-rappdirs
  - r-rsqlite
  - r-xml
source:
  md5: 95ffeee686b054206d92badcbec254e5
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/customCMPdb_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/customCMPdb/customCMPdb_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/customCMPdb_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-customcmpdb/bioconductor-customcmpdb_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('customCMPdb')"
