about:
  description: The FDA Adverse Event Reporting System (FAERS) is a database used for
    the spontaneous reporting of adverse events and medication errors related to human
    drugs and therapeutic biological products. faers pacakge serves as the interface
    between the FAERS database and R. Furthermore, faers pacakge offers a standardized
    approach for performing pharmacovigilance analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/faers.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: R interface for FDA Adverse Event Reporting System
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-faers
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-brio
  - r-cli
  - r-curl >=6.0.0
  - r-data.table
  - r-httr2 >=1.0.0
  - r-mcmcpack
  - r-openebgm
  - r-rlang
  - r-rvest
  - r-vroom
  - r-xml2
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-brio
  - r-cli
  - r-curl >=6.0.0
  - r-data.table
  - r-httr2 >=1.0.0
  - r-mcmcpack
  - r-openebgm
  - r-rlang
  - r-rvest
  - r-vroom
  - r-xml2
source:
  md5: 07035a6313ceaddc409b10600c7e970e
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/faers_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/faers/faers_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/faers_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-faers/bioconductor-faers_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('faers')"
