about:
  description: This package is a comprehensive visualization tool specifically designed
    for exploring phylomorphospace. It not only simplifies the process of generating
    phylomorphospace, but also enhances it with the capability to add graphic layers
    to the plot with grammar of graphics to create fully annotated phylomorphospaces.
    It also provide some utilities to help interpret evolutionary patterns.
  home: https://bioconductor.org/packages/3.22/bioc/html/ggtreeSpace.html
  license: Artistic-2.0
  summary: Visualizing Phylomorphospaces using 'ggtree'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ggtreespace
  version: 1.6.0
requirements:
  host:
  - bioconductor-ggtree >=4.0.0,<4.1.0
  - r-ape
  - r-base
  - r-dplyr
  - r-ggally
  - r-ggplot2
  - r-interp
  - r-phytools
  - r-rlang
  - r-tibble
  - r-tidyr
  - r-tidyselect
  run:
  - bioconductor-ggtree >=4.0.0,<4.1.0
  - r-ape
  - r-base
  - r-dplyr
  - r-ggally
  - r-ggplot2
  - r-interp
  - r-phytools
  - r-rlang
  - r-tibble
  - r-tidyr
  - r-tidyselect
source:
  md5: ff3f8dd9eebca2943545815feea38625
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ggtreeSpace_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ggtreeSpace/ggtreeSpace_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/ggtreeSpace_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ggtreespace/bioconductor-ggtreespace_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ggtreeSpace')"
