about:
  description: RgnTX allows the integration of transcriptome annotations so as to
    model the complex alternative splicing patterns. It supports the testing of transcriptome
    elements without clear isoform association, which is often the real scenario due
    to technical limitations. It involves functions that do permutaion test for evaluating
    association between features and transcriptome regions.
  home: https://bioconductor.org/packages/3.22/bioc/html/RgnTX.html
  license: Artistic-2.0
  summary: Colocalization analysis of transcriptome elements in the presence of isoform
    heterogeneity and ambiguity
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rgntx
  version: 1.11.1
requirements:
  host:
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-regioner >=1.42.0,<1.43.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-txdb.hsapiens.ucsc.hg19.knowngene >=3.22.0,<3.23.0
  - r-base
  - r-ggplot2
  run:
