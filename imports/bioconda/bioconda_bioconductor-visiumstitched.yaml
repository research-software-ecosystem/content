about:
  description: This package provides helper functions for working with multiple Visium
    capture areas that overlap each other. This package was developed along with the
    companion example use case data available from https://github.com/LieberInstitute/visiumStitched_brain.
    visiumStitched prepares SpaceRanger (10x Genomics) output files so you can stitch
    the images from groups of capture areas together with Fiji. Then visiumStitched
    builds a SpatialExperiment object with the stitched data and makes an artificial
    hexagonal grid enabling the seamless use of spatial clustering methods that rely
    on such grid to identify neighboring spots, such as PRECAST and BayesSpace. The
    SpatialExperiment objects created by visiumStitched are compatible with spatialLIBD,
    which can be used to build interactive websites for stitched SpatialExperiment
    objects. visiumStitched also enables casting SpatialExperiment objects as Seurat
    objects.
  home: https://bioconductor.org/packages/3.22/bioc/html/visiumStitched.html
  license: Artistic-2.0
  summary: Enable downstream analysis of Visium capture areas stitched together with
    Fiji
