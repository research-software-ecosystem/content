about:
  description: Save MultiAssayExperiments into file artifacts, and load them back
    into memory. This is a more portable alternative to serialization of such objects
    into RDS files. Each artifact is associated with metadata for further interpretation;
    downstream applications can enrich this metadata with context-specific properties.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.mae.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Load and Save MultiAssayExperiments
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster.mae
  version: 1.10.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.se >=1.10.0,<1.11.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-jsonlite
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.se >=1.10.0,<1.11.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-jsonlite
source:
  md5: 8084a76594f870bd4629dc50755b636c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/alabaster.mae_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/alabaster.mae/alabaster.mae_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/alabaster.mae_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-alabaster.mae/bioconductor-alabaster.mae_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('alabaster.mae')"
