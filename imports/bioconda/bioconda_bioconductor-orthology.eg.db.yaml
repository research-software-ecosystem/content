about:
  description: Orthology mapping package, based on data from NCBI, using NCBI Gene
    IDs and Taxonomy IDs.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/Orthology.eg.db.html
  license: Artistic-2.0
  summary: Orthology mapping package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-orthology.eg.db
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: e8f00d72bb2bdd2239ab7c19bf7dbcc4
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/Orthology.eg.db_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Orthology.eg.db/Orthology.eg.db_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/Orthology.eg.db_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-orthology.eg.db/bioconductor-orthology.eg.db_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Orthology.eg.db')"
