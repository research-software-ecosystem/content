about:
  description: This package facilitates reading, preprocessing and manipulating Codelink
    microarray data. The raw data must be exported as text file using the Codelink
    software.
  home: https://bioconductor.org/packages/3.22/bioc/html/codelink.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Manipulation of Codelink microarray data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:codelink
  parent_recipe:
    name: bioconductor-codelink
    path: recipes/bioconductor-codelink
    version: 1.48.0
package:
  name: bioconductor-codelink
  version: 1.78.0
requirements:
  host:
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
  run:
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
source:
  md5: a600253cc2ee4f9f2189c728a05dc439
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/codelink_1.78.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/codelink/codelink_1.78.0.tar.gz
  - https://bioarchive.galaxyproject.org/codelink_1.78.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-codelink/bioconductor-codelink_1.78.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('codelink')"
