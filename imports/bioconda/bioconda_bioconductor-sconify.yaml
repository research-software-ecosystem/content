about:
  description: This package does k-nearest neighbor based statistics and visualizations
    with flow and mass cytometery data. This gives tSNE maps"fold change" functionality
    and provides a data quality metric by assessing manifold overlap between fcs files
    expected to be the same. Other applications using this package include imputation,
    marker redundancy, and testing the relative information loss of lower dimension
    embeddings compared to the original manifold.
  home: https://bioconductor.org/packages/3.22/bioc/html/Sconify.html
  license: Artistic-2.0
  summary: A toolkit for performing KNN-based statistics for flow and mass cytometry
    data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-sconify
  version: 1.30.0
requirements:
  host:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-dplyr
  - r-fnn
  - r-ggplot2
  - r-magrittr
  - r-readr
  - r-rtsne
  - r-tibble
  run:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-dplyr
  - r-fnn
  - r-ggplot2
  - r-magrittr
  - r-readr
  - r-rtsne
  - r-tibble
source:
  md5: 72c849de409101364ef2fca037d59903
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Sconify_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Sconify/Sconify_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/Sconify_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-sconify/bioconductor-sconify_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Sconify')"
