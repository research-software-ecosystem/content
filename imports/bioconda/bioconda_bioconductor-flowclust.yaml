about:
  description: 'Robust model-based clustering using a t-mixture model with Box-Cox
    transformation. Note: users should have GSL installed. Windows users: ''consult
    the README file available in the inst directory of the source distribution for
    necessary configuration instructions''.'
  home: https://bioconductor.org/packages/3.22/bioc/html/flowClust.html
  license: MIT
  summary: Clustering for Flow Cytometry
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:flowclust
package:
  name: bioconductor-flowclust
  version: 3.48.0
requirements:
  build:
  - null
  - automake
  - make
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
source:
  md5: d08e264d9ab3bf759a3eba437423e328
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowClust_3.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowClust/flowClust_3.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowClust_3.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowclust/bioconductor-flowclust_3.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('flowClust')"
