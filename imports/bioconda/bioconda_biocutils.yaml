about:
  home: https://github.com/biocpy/biocutils
  license: MIT
  license_file: LICENSE.txt
  summary: Miscellaneous utilities for BiocPy, mostly to mimic base functionality
    in R.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - SilenWang
package:
  name: biocutils
  version: 0.4.0
requirements:
  host:
  - python
  - setuptools >=46.1.0
  - setuptools-scm >=5
  - pip
  run:
  - python
  - numpy
source:
  sha256: 0bbd796cb58b95c7847ce798f2c7a6dbc117b5c84d3920c041ed230883fa3220
  url: https://pypi.org/packages/source/b/biocutils/biocutils-0.4.0.tar.gz
test:
  commands:
  - pip check
  imports:
  - biocutils
  requires:
  - pip
