about:
  description: A post hoc cell type classification tool to fine-tune cell type annotations
    generated by any cell type classification procedure with semi-supervised learning
    algorithm AdaSampling technique. The current version of scReClassify supports
    Support Vector Machine and Random Forest as a base classifier.
  home: https://bioconductor.org/packages/3.22/bioc/html/scReClassify.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: 'scReClassify: post hoc cell type classification of single-cell RNA-seq
    data'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-screclassify
  version: 1.16.0
requirements:
  host:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-e1071
  - r-randomforest
  run:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-e1071
  - r-randomforest
source:
  md5: 79e52d3dd6b41ba0a92a830754dc8822
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/scReClassify_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/scReClassify/scReClassify_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/scReClassify_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-screclassify/bioconductor-screclassify_1.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('scReClassify')"
