about:
  dev_url: https://github.com/akikuno/DAJIN2
  doc_url: https://github.com/akikuno/DAJIN2/blob/0.9.2/README.md
  home: https://github.com/akikuno/DAJIN2
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: One-step genotyping tools for targeted long-read sequencing.
build:
  entry_points:
  - DAJIN2 = DAJIN2.main:execute
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - akikuno
package:
  name: dajin2
  version: 0.9.2
requirements:
  host:
  - python >=3.10,<3.13
  - poetry-core >=1.0.0
  - pip
  run:
  - python >=3.10,<3.13
  - mappy >=2.24,<3.0.0
  - pysam >=0.21.0,<1.0.0
  - numpy >=1.24.0,<2.0.0
  - pandas >=2.1.0,<3.0.0
  - scipy >=1.10.0,<2.0.0
  - plotly >=5.19.0,<6.0.0
  - openpyxl >=3.1.0,<4.0.0
  - rapidfuzz >=3.6.0,<4.0.0
  - scikit-learn >=1.3.0,<2.0.0
  - flask >=2.2.0
  - waitress >=2.1.0
  - jinja2 >=3.1.0
  - cstag >=1.0.0
  - midsv >=0.13.1
  - wslpath >=0.4.1
source:
  sha256: dda85ad49a78270e321a39e8464cd4222bd20619268480cce8d5966d1000b7f5
  url: https://pypi.org/packages/source/D/DAJIN2/dajin2-0.9.2.tar.gz
test:
  commands:
  - DAJIN2 --help
  imports:
  - DAJIN2
