about:
  description: This package generates pathway scores from expression data for single
    samples after training on a reference cohort. The score is generated by taking
    the expression of a gene set (pathway) from a reference cohort and performing
    linear discriminant analysis to distinguish samples in the cohort that have the
    pathway augmented and not. The separating hyperplane is then used to score new
    samples.
  home: https://bioconductor.org/packages/3.22/bioc/html/ssPATHS.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 'ssPATHS: Single Sample PATHway Score'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-sspaths
  version: 1.24.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dml
  - r-mess
  - r-rocr
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dml
  - r-mess
  - r-rocr
source:
  md5: e62f574c85c22d183c3a4da6e0d2d795
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ssPATHS_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ssPATHS/ssPATHS_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/ssPATHS_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-sspaths/bioconductor-sspaths_1.24.0_src_all.tar.gz
test:
