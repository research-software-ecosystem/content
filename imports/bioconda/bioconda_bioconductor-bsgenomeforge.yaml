about:
  description: A set of tools to forge BSgenome data packages. Supersedes the old
    seed-based tools from the BSgenome software package. This package allows the user
    to create a BSgenome data package in one function call, simplifying the old seed-based
    process.
  home: https://bioconductor.org/packages/3.22/bioc/html/BSgenomeForge.html
  license: Artistic-2.0
  summary: Forge your own BSgenome data package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bsgenomeforge
  version: 1.10.2
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
source:
  md5: 8ee8b75cc9703f66baffdb8f468294d9
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BSgenomeForge_1.10.2.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BSgenomeForge/BSgenomeForge_1.10.2.tar.gz
  - https://bioarchive.galaxyproject.org/BSgenomeForge_1.10.2.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bsgenomeforge/bioconductor-bsgenomeforge_1.10.2_src_all.tar.gz
test:
  commands:
  - $R -e "library('BSgenomeForge')"
