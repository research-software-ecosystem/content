about:
  description: In this package, a Hidden Semi Markov Model (HSMM) and one homogeneous
    segmentation model are designed and implemented for segmentation genomic data,
    with the aim of assisting in transcripts detection using high throughput technology
    like RNA-seq or tiling array, and copy number analysis using aCGH or sequencing.
  home: https://bioconductor.org/packages/3.22/bioc/html/biomvRCNS.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Copy Number study and Segmentation for multivariate biological data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biomvrcns
  version: 1.50.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-base
  - r-mvtnorm
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-base
  - r-mvtnorm
source:
  md5: 4fe79f3088f373388841578b3a036d2d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/biomvRCNS_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/biomvRCNS/biomvRCNS_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/biomvRCNS_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biomvrcns/bioconductor-biomvrcns_1.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('biomvRCNS')"
