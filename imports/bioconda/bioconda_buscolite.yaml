about:
  dev_url: https://github.com/nextgenusfs/buscolite
  home: https://github.com/nextgenusfs/buscolite
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: 'buscolite: busco analysis for gene predictions.'
build:
  entry_points:
  - buscolite = buscolite.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - nextgenusfs
package:
  name: buscolite
  version: 26.4.22
requirements:
  host:
  - python >=3.6
  - pip
  - hatchling
  run:
  - python >=3.6
  - augustus >=3.5.0
  - miniprot
  - natsort
  - pyhmmer >=0.12.0
  - pyfastx >=2.0.0
  - packaging
source:
  sha256: 019eca0329dcb9da844f10a2a2a53bd8e65fd671ff37cfe62a26f3c3c4a340de
  url: https://pypi.io/packages/source/b/buscolite/buscolite-26.4.22.tar.gz
test:
  commands:
  - buscolite --help
  imports:
  - buscolite
