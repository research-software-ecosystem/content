about:
  home: https://pypi.org/project/variant-extractor/
  license: MIT
  license_file: LICENSE
  summary: Deterministic and standard extractor of indels, SNVs and structural variants
    (SVs) from VCF files.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - georgiakes
package:
  name: variant-extractor
  version: 5.0.0
requirements:
  host:
  - python >=3.6
  - setuptools >=75.3.0,<75.4.dev0
  - wheel >=0.42,<1.dev0
  - pip
  run:
  - python >=3.6
  - pysam >=0.22.1
source:
  sha256: 2bf6e68453a30b1907645a1af4485ef91ec860eb7140519df60847dc666edc93
  url: https://pypi.org/packages/source/v/variant-extractor/variant_extractor-5.0.0.tar.gz
test:
  commands:
  - pip check
  imports:
  - variant_extractor
  requires:
  - pip
  - python
