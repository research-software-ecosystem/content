about:
  description: Contains consensus genomic signatures (CGS) for experimental cell-line
    specific gene knock-outs as well as baseline gene expression data for a subset
    of experimental cell-lines. Intended for use with package KEGGlincs.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/KOdata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: LINCS Knock-Out Data Package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-kodata
    path: recipes/bioconductor-kodata
    version: 1.6.0
package:
  name: bioconductor-kodata
  version: 1.36.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: e0a440255838c02751f9b363c9639e54
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/KOdata_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/KOdata/KOdata_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/KOdata_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-kodata/bioconductor-kodata_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('KOdata')"
