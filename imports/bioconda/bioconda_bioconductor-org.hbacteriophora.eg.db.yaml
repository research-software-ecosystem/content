about:
  description: Provides genome-wide annotation for Heterorhabditis bacteriophora,
    primarily based on mapping using custom gene identifiers. This OrgDb annotation
    package is intended for use with AnnotationDbi-based tools and supports querying
    of gene identifiers and related metadata.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/org.Hbacteriophora.eg.db.html
  license: Artistic-2.0
  summary: Genome-wide Annotation for Heterorhabditis bacteriophora
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-org.hbacteriophora.eg.db
  version: 0.99.1
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - r-dbi
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - r-dbi
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 6596cc91b04704f64af4d94d665c449f
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/org.Hbacteriophora.eg.db_0.99.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/org.Hbacteriophora.eg.db/org.Hbacteriophora.eg.db_0.99.1.tar.gz
  - https://bioarchive.galaxyproject.org/org.Hbacteriophora.eg.db_0.99.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-org.hbacteriophora.eg.db/bioconductor-org.hbacteriophora.eg.db_0.99.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('org.Hbacteriophora.eg.db')"
