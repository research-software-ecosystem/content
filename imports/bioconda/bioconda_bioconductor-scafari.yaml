about:
  description: Scafari is a Shiny application designed for the analysis of single-cell
    DNA sequencing (scDNA-seq) data provided in .h5 file format. The analysis process
    is structured into the four key steps "Sequencing", "Panel", "Variants", and "Explore
    Variants". It supports various analyses and visualizations.
  home: https://bioconductor.org/packages/3.22/bioc/html/scafari.html
  license: LGPL-3
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Analysis of scDNA-seq data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scafari
  version: 1.0.0
