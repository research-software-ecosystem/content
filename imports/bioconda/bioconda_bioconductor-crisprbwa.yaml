about:
  description: Provides a user-friendly interface to map on-targets and off-targets
    of CRISPR gRNA spacer sequences using bwa. The alignment is fast, and can be performed
    using either commonly-used or custom CRISPR nucleases. The alignment can work
    with any reference or custom genomes. Currently not supported on Windows machines.
  home: https://bioconductor.org/packages/3.22/bioc/html/crisprBwa.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: BWA-based alignment of CRISPR gRNA spacer sequences
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-crisprbwa
  version: 1.14.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-crisprbase >=1.14.0,<1.15.0
  - bioconductor-rbwa >=1.14.0,<1.15.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-readr
  - r-stringr
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-crisprbase >=1.14.0,<1.15.0
  - bioconductor-rbwa >=1.14.0,<1.15.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-readr
  - r-stringr
source:
  md5: df7217781a3a46c4458304b8d05fac6a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/crisprBwa_1.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/crisprBwa/crisprBwa_1.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/crisprBwa_1.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-crisprbwa/bioconductor-crisprbwa_1.14.0_src_all.tar.gz
test:
