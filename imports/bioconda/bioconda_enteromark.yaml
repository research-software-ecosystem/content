about:
  description: 'EnteroMark is a complete, automated genomic analysis pipeline for
    Enterococcus faecium,

    featuring parallel execution for rapid processing of bacterial genomes.

    '
  dev_url: https://github.com/bbeckley-hub/EnteroMark
  doc_url: https://github.com/bbeckley-hub/EnteroMark/blob/main/README.md
  home: https://github.com/bbeckley-hub/EnteroMark
  license: MIT
  license_file: LICENSE
  summary: 'EnteroMark: Comprehensive E. faecium genomic typing pipeline with parallel
    execution'
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation -vvv'
extra:
  recipe-maintainers:
  - bbeckley-hub
package:
  name: enteromark
  version: 1.0.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - pandas >=1.5.0
  - biopython >=1.85
  - psutil >=5.9.0
  - requests >=2.28.0
  - tqdm >=4.64.0
  - click >=8.0.0
  - beautifulsoup4 >=4.11.0
  - lxml >=4.9.0
  - matplotlib-base >=3.5.0
  - seaborn >=0.12.0
  - scipy >=1.10.1
  - plotly >=5.10.0
  - abricate >=1.2.0
  - perl
  - any2fasta
  - blast >=2.13.0
  - perl-moo
  - perl-list-moreutils
  - perl-json
  - perl-lwp-protocol-https
  - perl-path-tiny
  - perl-data-dumper
  - perl-getopt-long
  - perl-file-which
source:
  sha256: 60b94e5adee711cfb3efd0a037efcb1d4c7fc0ee13a5a08a5a4bf95fe8ba5eee
  url: https://github.com/bbeckley-hub/EnteroMark/archive/v1.0.0.tar.gz
test:
  commands:
  - enteromark --help
