about:
  home: https://github.com/Oshlack/JAFFA
  license: GPL-3.0-or-later
  summary: 'JAFFA is a multi-step pipeline that takes either raw RNA-Seq reads, or
    pre-assembled transcripts then searches for gene fusions.  This package contains
    the wrappers jaffa-direct, jaffa-assembly, and jaffa-hybrid. You can pass the
    "refSeq" parameter in the environment variables JAFFA_REF_BASE. Otherwise, pass
    any paramters to the wrappers as you would to the bpipe JAFFA_{method} call in
    the manual.

    '
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  skip-lints:
  - missing_tests
package:
  name: jaffa
  version: '2.5'
requirements:
  run:
  - bpipe
  - oases
  - velvet
  - trimmomatic
  - samtools ==1.1
  - bowtie2
  - ucsc-blat
  - fastx_toolkit
  - bbmap
  - bioconductor-iranges
source:
  patches:
  - jaffa.patch
  sha256: d4123facd165f985a290221366b7750b522b29876387d2491c57000c1865699e
  url: https://github.com/Oshlack/JAFFA/releases/download/version-2.5/JAFFA-version-2.5.tar.gz
