about:
  description: CNV detection tool for targeted NGS panel data. Extension of the cn.mops
    package.
  home: https://bioconductor.org/packages/3.22/bioc/html/panelcn.mops.html
  license: LGPL (>= 2.0)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: CNV detection tool for targeted NGS panel data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-panelcn.mops
  version: 1.32.0
requirements:
