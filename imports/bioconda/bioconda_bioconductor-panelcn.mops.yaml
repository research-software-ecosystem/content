  - bioconductor-cn.mops >=1.56.0,<1.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  run:
  - bioconductor-cn.mops >=1.56.0,<1.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
source:
  md5: 4c3c145edb21b2cde8089978d665e792
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/panelcn.mops_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/panelcn.mops/panelcn.mops_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/panelcn.mops_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-panelcn.mops/bioconductor-panelcn.mops_1.32.0_src_all.tar.gz
test:
