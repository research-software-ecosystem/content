about:
  description: The Lheuristic package identifies scatterpots that follow and L-shaped,
    negative distribution. It can be used to identify genes regulated by methylation
    by integration of an expression and a methylation array. The package uses two
    different methods to detect expression and methyaltion L- shapped scatterplots.
    The parameters can be changed to detect other scatterplot patterns.
  home: https://bioconductor.org/packages/3.22/bioc/html/Lheuristic.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Detection of scatterplots with L-shaped pattern
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-lheuristic
  version: 1.2.0
requirements:
  host:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - r-base
  - r-energy
  - r-ggplot2
  - r-ggpubr
  - r-hmisc
  run:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - r-base
  - r-energy
  - r-ggplot2
  - r-ggpubr
  - r-hmisc
source:
  md5: bf908a53747bc1b79e6577ef99f2553c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Lheuristic_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Lheuristic/Lheuristic_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/Lheuristic_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-lheuristic/bioconductor-lheuristic_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Lheuristic')"
