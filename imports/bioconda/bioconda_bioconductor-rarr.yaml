about:
  description: The Zarr specification defines a format for chunked, compressed, N-dimensional
    arrays.  It's design allows efficient access to subsets of the stored array, and
    supports both local and cloud storage systems.  Rarr aims to implement this specification
    in R with minimal reliance on an external tools or libraries.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rarr.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Read Zarr Files in R
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rarr
  version: 1.10.1
requirements:
  build:
  - null
  - null
  - automake
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - r-base
  - r-curl
  - r-jsonlite
  - r-paws.storage
  - r-r.utils
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - r-base
  - r-curl
  - r-jsonlite
  - r-paws.storage
  - r-r.utils
source:
  md5: 766914c69ed7c6ad741c5ccb0c3bdcc1
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rarr_1.10.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rarr/Rarr_1.10.1.tar.gz
  - https://bioarchive.galaxyproject.org/Rarr_1.10.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rarr/bioconductor-rarr_1.10.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('Rarr')"
