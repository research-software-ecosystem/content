about:
  description: Save SingleCellExperiment into file artifacts, and load them back into
    memory. This is a more portable alternative to serialization of such objects into
    RDS files. Each artifact is associated with metadata for further interpretation;
    downstream applications can enrich this metadata with context-specific properties.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.sce.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Load and Save SingleCellExperiment from File
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster.sce
  version: 1.10.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.se >=1.10.0,<1.11.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - r-jsonlite
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.se >=1.10.0,<1.11.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - r-jsonlite
source:
  md5: 8052cea21ca045b210c2b20e4f476f88
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/alabaster.sce_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/alabaster.sce/alabaster.sce_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/alabaster.sce_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-alabaster.sce/bioconductor-alabaster.sce_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('alabaster.sce')"
