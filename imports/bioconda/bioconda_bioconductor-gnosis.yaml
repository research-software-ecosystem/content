about:
  description: GNOSIS incorporates a range of R packages enabling users to efficiently
    explore and visualise clinical and genomic data obtained from cBioPortal. GNOSIS
    uses an intuitive GUI and multiple tab panels supporting a range of functionalities.
    These include data upload and initial exploration, data recoding and subsetting,
    multiple visualisations, survival analysis, statistical analysis and mutation
    analysis, in addition to facilitating reproducible research.
  home: https://bioconductor.org/packages/3.22/bioc/html/GNOSIS.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Genomics explorer using statistical and survival analysis in R
