about:
  description: 'Identifies cell populations in Flow Cytometry data using non-parametric
    clustering and segmented-regression-based change point detection. Note: R 2.11.0
    or newer is required.'
  home: https://bioconductor.org/packages/3.22/bioc/html/flowMeans.html
  license: Artistic-2.0
  summary: Non-parametric Flow Cytometry Data Gating
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  container:
    extended-base: true
package:
  name: bioconductor-flowmeans
  version: 1.70.0
requirements:
  build:
  - null
  - null
  - null
  - null
  - null
  - xorg-libxfixes
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-feature
  - r-rrcov
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-feature
  - r-rrcov
source:
  md5: 68531dbc1954fc34c0b8fa8205a585ca
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowMeans_1.70.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowMeans/flowMeans_1.70.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowMeans_1.70.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowmeans/bioconductor-flowmeans_1.70.0_src_all.tar.gz
test:
