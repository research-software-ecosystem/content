  - ninja
  host:
  - eigen
  - fast_float
  - cpp-filesystem
  - libmcfp
  - libpdb-redo >=2.0.2
  - newuoa-cpp
  - zlib
  run:
  - __osx >=13.3
source:
  sha256: 88162f45bac70a38455d8c212e8aaa13ed97e644201a834865c13fa321ea3f14
