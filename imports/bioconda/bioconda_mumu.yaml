about:
  description: 'mumu is a fast, stand-alone C++20 reimplementation of the R package
    lulu.

    It performs post-clustering curation of amplicon-based metabarcoding data

    by detecting spurious OTUs and merging them with their parent OTUs based

    on co-occurrence patterns and sequence similarity.

    '
  dev_url: https://github.com/frederic-mahe/mumu
  doc_url: https://github.com/frederic-mahe/mumu#readme
  home: https://github.com/frederic-mahe/mumu
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Post-clustering curation of metabarcoding data (C++ reimplementation of
    lulu)
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  recipe-maintainers:
  - frederic-mahe
package:
  name: mumu
  version: 1.1.4
requirements:
  build:
  - make
  - null
  - null
source:
  sha256: 1b78df5d68898ed6c4c471cbc5f1f0662e24d2465bf206e0bc8521080b93df42
  url: https://github.com/frederic-mahe/mumu/archive/refs/tags/v1.1.4.tar.gz
