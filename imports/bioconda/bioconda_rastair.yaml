about:
  dev_url: https://bitbucket.org/bsblabludwig/rastair
  home: https://docs.rastair.com/
  license: LicenseRef-NonCommercial
  license_file:
  - LICENSE.txt
  - THIRDPARTY.yml
  summary: Fast and flexible extraction of methylation information from BAM files
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - ze97286
package:
  name: rastair
  version: 2.0.0
requirements:
  build:
  - null
  - null
  - null
  - make
  - cmake
  - pkg-config
  - clang
  - libclang
  - cargo-bundle-licenses
  host:
  - bzip2
  - xz
  - zlib
  run:
  - bzip2
  - r-base
  - r-argparser
  - r-rmarkdown
  - r-data.table
  - r-ggplot2
  - pandoc
source:
  sha256: b52a81af13211cb3a9250ee4e3dee5bee743e6233953ceef45795df0cbc42d2f
  url: https://s3.eu-west-2.amazonaws.com/com.rastair.releases/build/release-v2.0.0/rastair-2.0.0-vendored.tar.gz
test:
  commands:
  - rastair --help
  - rastair --version
  - rastair mbias --help
  - rastair internal shell-completions bash > /dev/null
  - test -f "${PREFIX}/share/rastair/scripts/mbias.R"
  - test -f "${PREFIX}/share/rastair/scripts/QC_report.Rmd"
