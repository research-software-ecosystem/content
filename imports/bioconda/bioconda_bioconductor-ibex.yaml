about:
  description: Implementation of the Ibex algorithm for single-cell embedding based
    on BCR sequences. The package includes a standalone function to encode BCR sequence
    information by amino acid properties or sequence order using tensorflow-based
    autoencoder. In addition, the package interacts with SingleCellExperiment or Seurat
    data objects.
  home: https://bioconductor.org/packages/3.22/bioc/html/Ibex.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Methods for BCR single-cell embedding
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ibex
  version: 1.0.0
requirements:
  host:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-immapex >=1.4.0,<1.5.0
  - bioconductor-screpertoire >=2.6.0,<2.7.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  - r-reticulate >=1.43.0
  - r-rlang
  - r-seuratobject
  - r-tensorflow
  run:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-immapex >=1.4.0,<1.5.0
  - bioconductor-screpertoire >=2.6.0,<2.7.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  - r-reticulate >=1.43.0
  - r-rlang
  - r-seuratobject
  - r-tensorflow
source:
  md5: f70ec7ee9f3d3b4afe69a172fd281891
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Ibex_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Ibex/Ibex_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/Ibex_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ibex/bioconductor-ibex_1.0.0_src_all.tar.gz
test:
