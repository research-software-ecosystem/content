about:
  description: Interactive viewing and exploration of graphs, connecting R to Cytoscape.js,
    using websockets.
  home: https://bioconductor.org/packages/3.22/bioc/html/RCyjs.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Display and manipulate graphs in cytoscape.js
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rcyjs
  version: 2.32.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-browserviz >=2.32.0,<2.33.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - r-base64enc
  - r-httpuv >=1.5.0
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-browserviz >=2.32.0,<2.33.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - r-base64enc
  - r-httpuv >=1.5.0
source:
  md5: 7e26346738431caeccb8e822f7d1d608
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RCyjs_2.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RCyjs/RCyjs_2.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/RCyjs_2.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rcyjs/bioconductor-rcyjs_2.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RCyjs')"
