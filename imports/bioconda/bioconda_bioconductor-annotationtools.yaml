about:
  description: Functions to annotate microarrays, find orthologs, and integrate heterogeneous
    gene expression profiles using annotation and other molecular biology information
    available as flat file database (plain text files).
  home: https://bioconductor.org/packages/3.22/bioc/html/annotationTools.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: Annotate microarrays and perform cross-species gene expression analyses
    using flat file databases
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:annotationtools
  parent_recipe:
    name: bioconductor-annotationtools
    path: recipes/bioconductor-annotationtools
    version: 1.54.0
package:
  name: bioconductor-annotationtools
  version: 1.84.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
source:
  md5: 097b9c49b28c643a81c89dedf6560ff1
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/annotationTools_1.84.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/annotationTools/annotationTools_1.84.0.tar.gz
  - https://bioarchive.galaxyproject.org/annotationTools_1.84.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-annotationtools/bioconductor-annotationtools_1.84.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('annotationTools')"
