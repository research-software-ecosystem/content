about:
  description: Base annotation databases for human, intended ONLY to be used by AnnotationDbi
    to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/human.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for human
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-human.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 21e7c79e75eb1a4a89ee76abd55472cf
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/human.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/human.db0/human.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/human.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-human.db0/bioconductor-human.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('human.db0')"
