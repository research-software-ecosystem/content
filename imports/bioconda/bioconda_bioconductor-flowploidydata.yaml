about:
  description: A collection of raw flow cytometry data for use in vignettes for the
    flowPloidy package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/flowPloidyData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Example Flow Cytometry Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-flowploidydata
  version: 1.36.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: e095fc864bf2d9b7efc72b50ce51518c
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/flowPloidyData_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowPloidyData/flowPloidyData_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowPloidyData_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowploidydata/bioconductor-flowploidydata_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('flowPloidyData')"
