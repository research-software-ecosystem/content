about:
  dev_url: https://github.com/omics-tools/onyx
  doc_url: https://github.com/omics-tools/onyx
  home: https://github.com/omics-tools/onyx
  license: MIT
  license_file: LICENSE
  summary: Alignment-free biological sex inference from high-throughput sequencing
    data
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: python -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - omics-tools
package:
  name: onyx
  version: 0.0.1
requirements:
  host:
  - python
  - pip
  - setuptools
  run:
  - python >=3.8
  - kmc
  - seqkit
  - samtools
  - tqdm
  - requests
source:
  sha256: 5153a9e71768e66112085828098ad38f1871f4ba538d4a0e7dde379d21652218
  url: https://github.com/omics-tools/onyx/archive/refs/tags/v0.0.1.tar.gz
test:
  commands:
  - onyx --help
