about:
  description: This package contains diverse functionality to extend the usage of
    the iSEE package, including additional classes for the panels or modes facilitating
    the analysis of pathway analysis results. This package does not perform pathway
    analysis. Instead, it provides methods to embed precomputed pathway analysis results
    in a SummarizedExperiment object, in a manner that is compatible with interactive
    visualisation in iSEE applications.
  home: https://bioconductor.org/packages/3.22/bioc/html/iSEEpathways.html
  license: Artistic-2.0
  summary: iSEE extension for panels related to pathway analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-iseepathways
  version: 1.8.0
requirements:
  host:
  - bioconductor-isee >=2.22.0,<2.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-shiny
  - r-shinywidgets
  run:
  - bioconductor-isee >=2.22.0,<2.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-shiny
  - r-shinywidgets
source:
  md5: c3eed062de31d9401d562179ac815862
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/iSEEpathways_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/iSEEpathways/iSEEpathways_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/iSEEpathways_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-iseepathways/bioconductor-iseepathways_1.8.0_src_all.tar.gz
test:
