about:
  description: This package provides functions for the analysis of data generated
    by the multiplex substrate profiling by mass spectrometry for proteases (MSP-MS)
    method. Data exported from upstream proteomics software is accepted as input and
    subsequently processed for analysis. Tools for statistical analysis, visualization,
    and interpretation of the data are provided.
  home: https://bioconductor.org/packages/3.22/bioc/html/mspms.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Tools for the analysis of MSP-MS data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
