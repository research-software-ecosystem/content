about:
  description: BiocCheck guides maintainers through Bioconductor best practicies.
    It runs Bioconductor-specific package checks by searching through package code,
    examples, and vignettes. Maintainers are required to address all errors, warnings,
    and most notes produced.
  home: https://bioconductor.org/packages/3.22/bioc/html/BiocCheck.html
  license: Artistic-2.0
  summary: Bioconductor-specific package checks
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bioccheck
  version: 1.46.3
requirements:
  host:
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biocviews >=1.78.0,<1.79.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - r-biocmanager
  - r-callr
  - r-cli
  - r-codetools
  - r-httr2
  - r-knitr
  - r-rvest
  - r-stringdist
  run:
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biocviews >=1.78.0,<1.79.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - r-biocmanager
  - r-callr
  - r-cli
  - r-codetools
  - r-httr2
  - r-knitr
  - r-rvest
  - r-stringdist
source:
  md5: 1102603e9a23a5be8d05c6eaf3f9c110
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BiocCheck_1.46.3.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BiocCheck/BiocCheck_1.46.3.tar.gz
  - https://bioarchive.galaxyproject.org/BiocCheck_1.46.3.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bioccheck/bioconductor-bioccheck_1.46.3_src_all.tar.gz
test:
  commands:
  - $R -e "library('BiocCheck')"
