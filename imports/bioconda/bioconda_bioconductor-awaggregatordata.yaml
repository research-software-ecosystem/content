about:
  description: The AWAggregatorData package contains the data associated with the
    AWAggregator R package. It includes two pre-trained random forest models, one
    incorporating the average coefficient of variation as a feature, and the other
    one not including it. It also contains the PSMs in Benchmark Set 1~3 derived from
    the psm.tsv output files generated by FragPipe, which are used to train the random
    forest models.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/AWAggregatorData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Attribute-Weighted Aggregation Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-awaggregatordata
  version: 1.0.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: e42325ecbc590b4030fba922105928e6
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/AWAggregatorData_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/AWAggregatorData/AWAggregatorData_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/AWAggregatorData_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-awaggregatordata/bioconductor-awaggregatordata_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('AWAggregatorData')"
