about:
  home: https://github.com/qtoussaint/pangenome_merge
  license: MIT
  license_file: LICENSE
  summary: Create pangenome gene graphs for hundreds of thousands of bacterial genomes
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv --no-deps --no-build-isolation'
extra:
  recipe-maintainers:
  - qtoussaint
package:
  name: pangenomerge
  version: 0.9.1
requirements:
  host:
  - python
  - pip
  - setuptools
  - wheel
  run:
  - python
  - biopython >=1.80
  - networkx >=3.4.2
  - mmseqs2
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - python-edlib
  - tqdm
source:
  sha256: 0587012af9d05727fe7b720300c6b122d7633acb869c5fe0aebe8c4c23ef8134
  url: https://github.com/qtoussaint/pangenome_merge/archive/refs/tags/v0.9.1.tar.gz
test:
  commands:
  - python -c "import pangenomerge; print(pangenomerge.__version__)"
  imports:
  - pangenomerge
