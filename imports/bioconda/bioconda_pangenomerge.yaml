about:
  home: https://github.com/qtoussaint/pangenome_merge
  license: MIT
  license_file: LICENSE
  summary: Create pangenome gene graphs for hundreds of thousands of bacterial genomes
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv --no-deps --no-build-isolation'
extra:
  recipe-maintainers:
  - qtoussaint
package:
  name: pangenomerge
  version: 0.9.2
requirements:
  host:
  - python
  - pip
  - setuptools
  - wheel
  run:
  - python
  - biopython >=1.80
  - networkx >=3.4.2
  - mmseqs2
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - python-edlib
  - tqdm
source:
  sha256: 7420851e4a590fdb254bacf29722365b8ec3e96f350a8304c68ff242ce362e5e
  url: https://github.com/qtoussaint/pangenome_merge/archive/refs/tags/v0.9.2.tar.gz
test:
  commands:
  - python -c "import pangenomerge; print(pangenomerge.__version__)"
  imports:
  - pangenomerge
