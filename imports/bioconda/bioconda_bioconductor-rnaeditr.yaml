about:
  description: RNAeditr analyzes site-specific RNA editing events, as well as hyper-editing
    regions. The editing frequencies can be tested against binary, continuous or survival
    outcomes. Multiple covariate variables as well as interaction effects can also
    be incorporated in the statistical models.
  home: https://bioconductor.org/packages/3.22/bioc/html/rnaEditr.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Statistical analysis of RNA editing sites and hyper-editing regions
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rnaeditr
  version: 1.20.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bumphunter >=1.52.0,<1.53.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-corrplot
  - r-logistf
  - r-plyr
  - r-survival
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bumphunter >=1.52.0,<1.53.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
