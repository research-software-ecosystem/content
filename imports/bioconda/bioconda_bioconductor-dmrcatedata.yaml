about:
  description: This package contains 9 data objects supporting functionality and examples
    of the Bioconductor package DMRcate.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/DMRcatedata.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Data Package for DMRcate
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-dmrcatedata
    path: recipes/bioconductor-dmrcatedata
    version: 1.16.0
package:
  name: bioconductor-dmrcatedata
  version: 2.28.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylationepicanno.ilm10b4.hg19 >=0.6.0,<0.7.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-plyr
  - r-readxl
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylationepicanno.ilm10b4.hg19 >=0.6.0,<0.7.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-plyr
  - r-readxl
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 4c413bcd2857f948ae989ce3d4ec0525
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/DMRcatedata_2.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DMRcatedata/DMRcatedata_2.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/DMRcatedata_2.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dmrcatedata/bioconductor-dmrcatedata_2.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('DMRcatedata')"
