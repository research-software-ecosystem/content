about:
  description: Define utilities for exploration of human metabolome database, including
    functions to retrieve specific metabolite entries and data snapshots with pairwise
    associations (metabolite-gene,-protein,-disease).
  home: https://bioconductor.org/packages/3.22/bioc/html/hmdbQuery.html
  license: Artistic-2.0
  summary: utilities for exploration of human metabolome database
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hmdbquery
  version: 1.30.0
requirements:
  host:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-xml
  run:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-xml
source:
  md5: 95cc139c8199b2de0b99d09757785fbe
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/hmdbQuery_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/hmdbQuery/hmdbQuery_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/hmdbQuery_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hmdbquery/bioconductor-hmdbquery_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('hmdbQuery')"
