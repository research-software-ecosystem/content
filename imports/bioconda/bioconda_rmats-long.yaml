about:
  dev_url: https://github.com/Xinglab/rMATS-long
  home: https://github.com/Xinglab/rMATS-long
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Differential isoform analysis using long-read RNA-seq data.
build:
  entry_points:
  - rmats-long = rmats_long.command_line_interface:main
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: rmats-long
  version: 2.0.1
requirements:
  build:
  - null
  host:
  - python
  - setuptools >=80.0.0
  - cython >=3.2.0
  - pip
  run:
  - python
  - bioconductor-biocparallel
  - bioconductor-drimseq
  - matplotlib-base >=3.7
  - networkx >=2.8
  - numpy >=1.24
  - pandas >=2
  - pydot >=3
  - r-base
  - r-cowplot
  - r-ggplot2
  - r-ggrepel
  - r-ggvenndiagram
  - r-mclogit
  - r-stringi >=1.7.8
  - r-this.path
  - rpy2 >=3.5
  - samtools
  - threadpoolctl >=3.6
source:
  sha256: e76f8dc1ef6340e76c804878cfaf47b78395aac5c94252d443cf40b32be6be19
  url: https://pypi.org/packages/source/r/rmats-long/rmats_long-2.0.1.tar.gz
test:
  commands:
  - rmats-long --help > /dev/null
  imports:
  - rmats_long
