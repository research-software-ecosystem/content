about:
  home: https://github.com/YuLab-SMU/seqmagick
  license: Artistic-2.0
  license_family: OTHER
  license_file:
  - /lib/R/share/licenses/Artistic-2.0
  summary: Tools for reading and writing biological sequences in multiple formats,
    including 'FASTA', 'PHYLIP', 'CLUSTAL', 'STOCKHOLM', 'MEGA' and 'GenBank'. Supports
    interleaved and sequential layouts where applicable, converts between formats,
    and manipulates sequence sets (e.g., filtering by patterns and computing consensus
    sequences from alignments). Also includes functions to download nucleotide records
    from NCBI by accession.
build:
  missing_dso_whitelist:
  - '*/R.dll'
  - '*/Rblas.dll'
  - '*/Rlapack.dll'
  noarch: generic
  number: 1
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports:
  - null
package:
  name: r-seqmagick
  version: 0.1.8
requirements:
  host:
  - r-base
  - bioconductor-biostrings
  - r-magrittr
  - r-yulab.utils >0.1.6
  run:
  - r-base
  - bioconductor-biostrings
  - r-magrittr
  - r-yulab.utils >0.1.6
source:
  sha256: 259591499edc61d947e135a44f0ef91f6fc002104172974b0cfd991c5df387b8
  url:
  - /src/contrib/seqmagick_0.1.8.tar.gz
  - /src/contrib/Archive/seqmagick/seqmagick_0.1.8.tar.gz
test:
  commands:
  - $R -e "library('seqmagick')"
  - '"%R%" -e "library(''seqmagick'')"'
