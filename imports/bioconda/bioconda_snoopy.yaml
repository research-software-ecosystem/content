about:
  description: SNooPy detects strain-level nucleotide polymorphisms in long read metagenomic
    data.
  dev_url: https://github.com/RolandFaure/snoopy
  doc_url: https://github.com/RolandFaure/snoopy
  home: https://github.com/RolandFaure/snoopy
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Metagenomic SNP caller for strain-level variant detection in long reads.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - RolandFaure
package:
  name: snoopy
  version: 0.4.3
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - numpy
  - scipy
  - pandas
  - pysam
  - scikit-learn
source:
  sha256: 7eac6988a40d4d6bd608e4cdf1a0bdd15daffd43a9cb954cff4f631d5e134168
  url: https://github.com/RolandFaure/snoopy/archive/v0.4.3.tar.gz
test:
  commands:
  - snoopy --help
  imports:
  - snoopy
