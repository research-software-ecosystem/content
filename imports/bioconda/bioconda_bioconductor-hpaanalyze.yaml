about:
  description: 'Provide functions for retrieving, exploratory analyzing and visualizing
    the Human Protein Atlas data. HPAanalyze is designed to fullfill 3 main tasks:
    (1) Import, subsetting and export downloadable datasets; (2) Visualization of
    downloadable datasets for exploratory analysis; and (3) Working with the individual
    XML files. This package aims to serve researchers with little programming experience,
    but also allow power users to use the imported data as desired.'
  home: https://bioconductor.org/packages/3.22/bioc/html/HPAanalyze.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Retrieve and analyze data from the Human Protein Atlas
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hpaanalyze
  version: 1.28.0
requirements:
  host:
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-gridextra
  - r-openxlsx
  - r-tibble
  - r-xml2
  run:
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-gridextra
  - r-openxlsx
  - r-tibble
  - r-xml2
source:
  md5: 5f0f10f26a05aef2d803eba41178e09a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/HPAanalyze_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HPAanalyze/HPAanalyze_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/HPAanalyze_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hpaanalyze/bioconductor-hpaanalyze_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HPAanalyze')"
