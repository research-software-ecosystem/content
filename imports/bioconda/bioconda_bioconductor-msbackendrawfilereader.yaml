about:
  description: implements a MsBackend for the Spectra package using Thermo Fisher
    Scientific's NewRawFileReader .Net libraries. The package is generalizing the
    functionality introduced by the rawrr package Methods defined in this package
    are supposed to extend the Spectra Bioconductor package.
  home: https://bioconductor.org/packages/3.22/bioc/html/MsBackendRawFileReader.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Mass Spectrometry Backend for Reading Thermo Fisher Scientific raw Files
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-msbackendrawfilereader
  version: 1.16.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-rawrr >=1.18.0,<1.19.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-rawrr >=1.18.0,<1.19.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
