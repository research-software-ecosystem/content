about:
  description: This package contains utility functions used throughout the gDR platform
    to fit data, manipulate data, and convert and validate data structures. This package
    also has the necessary default constants for gDR platform. Many of the functions
    are utilized by the gDRcore package.
  home: https://bioconductor.org/packages/3.22/bioc/html/gDRutils.html
  license: Artistic-2.0
  summary: A package with helper functions for processing drug response data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gdrutils
  version: 1.8.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-checkmate
  - r-data.table
  - r-digest
  - r-drc
  - r-jsonlite
  - r-jsonvalidate
  - r-qs
  - r-stringr
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-checkmate
  - r-data.table
  - r-digest
  - r-drc
  - r-jsonlite
  - r-jsonvalidate
  - r-qs
  - r-stringr
source:
  md5: 737814a6f8ad54ca9fcca40b67ae334c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/gDRutils_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/gDRutils/gDRutils_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/gDRutils_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gdrutils/bioconductor-gdrutils_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('gDRutils')"
