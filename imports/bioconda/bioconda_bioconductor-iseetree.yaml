about:
  description: iSEEtree is an extension of iSEE for the TreeSummarizedExperiment data
    container. It provides interactive panel designs to explore hierarchical datasets,
    such as the microbiome and cell lines.
  home: https://bioconductor.org/packages/3.22/bioc/html/iSEEtree.html
  license: Artistic-2.0
  summary: Interactive visualisation for microbiome data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-iseetree
  version: 1.4.0
requirements:
  host:
  - bioconductor-ggtree >=4.0.0,<4.1.0
  - bioconductor-isee >=2.22.0,<2.23.0
  - bioconductor-mia >=1.18.0,<1.19.0
  - bioconductor-miaviz >=1.18.0,<1.19.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-ape
  - r-base
  - r-ggplot2
  - r-purrr
  - r-shiny
  - r-shinywidgets
  - r-tidygraph
  run:
  - bioconductor-ggtree >=4.0.0,<4.1.0
  - bioconductor-isee >=2.22.0,<2.23.0
  - bioconductor-mia >=1.18.0,<1.19.0
  - bioconductor-miaviz >=1.18.0,<1.19.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-ape
  - r-base
  - r-ggplot2
  - r-purrr
  - r-shiny
  - r-shinywidgets
  - r-tidygraph
source:
  md5: a6c25b63c50da1f3dd640a516a44c72a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/iSEEtree_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/iSEEtree/iSEEtree_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/iSEEtree_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-iseetree/bioconductor-iseetree_1.4.0_src_all.tar.gz
