about:
  description: Single-cell RNA-seq data for 1.3 million brain cells from E18 mice,
    generated by 10X Genomics.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/TENxBrainData.html
  license: CC BY 4.0
  summary: Data from the 10X 1.3 Million Brain Cell Study
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tenxbraindata
  version: 1.30.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: be8fa8d7b1c3fb8576fedd459d2b7ebb
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/TENxBrainData_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TENxBrainData/TENxBrainData_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/TENxBrainData_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tenxbraindata/bioconductor-tenxbraindata_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TENxBrainData')"
