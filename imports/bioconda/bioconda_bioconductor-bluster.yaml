about:
  description: Wraps common clustering algorithms in an easily extended S4 framework.
    Backends are implemented for hierarchical, k-means and graph-based clustering.
    Several utilities are also provided to compare and evaluate clustering results.
  home: https://bioconductor.org/packages/3.22/bioc/html/bluster.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Clustering Algorithms for Bioconductor
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:bluster
package:
  name: bioconductor-bluster
  version: 1.20.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-assorthead >=1.4.0,<1.5.0
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-cluster
  - r-igraph
  - r-matrix
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-assorthead >=1.4.0,<1.5.0
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-cluster
  - r-igraph
  - r-matrix
  - r-rcpp
source:
  md5: 4d0ebac62dfa944bef94c149904f26a4
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/bluster_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/bluster/bluster_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/bluster_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bluster/bioconductor-bluster_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('bluster')"
