about:
  description: Identification of diferentially methylated regions (DMRs) in predefined
    regions (promoters, CpG islands...) from the human genome using Illumina's 450K
    or EPIC microarray data. Provides methods to rank CpG probes based on linear models
    and includes plotting functions.
  home: https://bioconductor.org/packages/3.22/bioc/html/mCSEA.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Methylated CpGs Set Enrichment Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mcsea
  version: 1.30.1
requirements:
  host:
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-fgsea >=1.36.0,<1.37.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-homo.sapiens >=1.3.0,<1.4.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-mcseadata >=1.30.0,<1.31.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
