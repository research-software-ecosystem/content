about:
  description: Raw data objects to be used for umbilical cord blood cell proportion
    estimation in minfi and similar packages. The FlowSorted.CordBloodCombined.450k
    object is based in samples assayed by Bakulski et al, Gervin et al., de Goede
    et al., and Lin et al.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/FlowSorted.CordBloodCombined.450k.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Illumina 450k/EPIC data on FACS and MACS umbilical blood cells
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-flowsorted.cordbloodcombined.450k
  version: 1.26.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylationepicanno.ilm10b4.hg19 >=0.6.0,<0.7.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylationepicanno.ilm10b4.hg19 >=0.6.0,<0.7.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 503d97d9a40b4d16079b71560036cf47
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/FlowSorted.CordBloodCombined.450k_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/FlowSorted.CordBloodCombined.450k/FlowSorted.CordBloodCombined.450k_1.26.0.tar.gz
