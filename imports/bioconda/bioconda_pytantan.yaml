about:
  dev_url: https://github.com/althonos/pytantan
  doc_url: https://pytantan.readthedocs.io/en/latest
  home: https://github.com/althonos/pytantan
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file:
  - COPYING
  - vendor/tantan/COPYING.txt
  summary: Cython bindings and Python interface to Tantan, a fast method for identifying
    repeats in DNA and protein sequences.
build:
  number: 0
  run_exports:
  - null
  script:
  - export LDFLAGS="${LDFLAGS} -L${PREFIX}/lib"
  - export CPPFLAGS="${CPPFLAGS} -I${PREFIX}/include"
  - export CFLAGS="${CFLAGS} -O3"
  - export CXXFLAGS="${CXXFLAGS} -O3"
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - althonos
package:
  name: pytantan
  version: 0.1.4
requirements:
  build:
  - null
  - null
  - null
  - cmake >=3.20
  - make
  - pkg-config
  host:
  - python
  - pip
  - scikit-build-core
  - cython >=3.0
  - scoring-matrices >=0.3.2
  - zlib
  run:
  - python
  - archspec >=0.2
  - scoring-matrices >=0.3.2
source:
  sha256: 323410fdb42f2f7c4722a2a3c3633b273b6f75cf43b62c5d5f49dac7a77af5d1
  url: https://pypi.org/packages/source/p/pytantan/pytantan-0.1.4.tar.gz
test:
  imports:
  - pytantan
