about:
  description: Provides access to BAM files generated from RNA-seq data produced with
    different levels of gDNA contamination. It currently allows one to download a
    subset of the data published by Li et al., BMC Genomics, 23:554, 2022. This subset
    of data is formed by BAM files with about 100,000 alignments with three different
    levels of gDNA contamination.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/gDNAinRNAseqData.html
  license: Artistic-2.0
  summary: RNA-seq data with different levels of gDNA contamination
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gdnainrnaseqdata
  version: 1.10.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - r-rcurl
  - r-xml
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - r-rcurl
  - r-xml
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 43d38aaefcc24cd85c1108d34731af57
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/gDNAinRNAseqData_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/gDNAinRNAseqData/gDNAinRNAseqData_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/gDNAinRNAseqData_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gdnainrnaseqdata/bioconductor-gdnainrnaseqdata_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('gDNAinRNAseqData')"
