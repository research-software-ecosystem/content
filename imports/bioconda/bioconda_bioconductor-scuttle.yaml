about:
  description: Provides basic utility functions for performing single-cell analyses,
    focusing on simple normalization, quality control and data transformations. Also
    provides some helper functions to assist development of other packages.
  home: https://bioconductor.org/packages/3.22/bioc/html/scuttle.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Single-Cell RNA-Seq Analysis Utilities
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:scuttle
package:
  name: bioconductor-scuttle
  version: 1.20.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-beachmat >=2.26.0,<2.27.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4arrays >=1.10.0,<1.11.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-beachmat >=2.26.0,<2.27.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4arrays >=1.10.0,<1.11.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  - r-rcpp
source:
  md5: 19973712480a36373e7cf28a375dcbcf
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/scuttle_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/scuttle/scuttle_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/scuttle_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-scuttle/bioconductor-scuttle_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('scuttle')"
