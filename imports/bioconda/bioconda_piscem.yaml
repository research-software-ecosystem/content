about:
  home: https://github.com/COMBINE-lab/piscem
  license: BSD 3-Clause
  license_file: LICENSE
  summary: piscem is a next-generation compacted colored de Bruijn Graph-based indexer
    and mapper
build:
  number: 0
  run_exports:
  - null
  script_env:
  - CFLAGS=-I$PREFIX/include
  - CXXFLAGS=-I$PREFIX/include
  - LDFLAGS=-L$PREFIX/lib
channels:
- conda-forge
- bioconda
- defaults
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: piscem
  version: 0.14.6
requirements:
  build:
  - cmake <4.0.0
  - autoconf
  - make
  - bzip2
  - jemalloc >=5.2.1
  - null
  - null
  - pkg-config
  - curl
  host:
  - bzip2
  - jemalloc >=5.2.1
  - tapi
  run:
  - __osx >=10.9
source:
  sha256: 6565333f2a28dbf18a836d04f5069537faf827e1258f2042d150995d0d48b5ff
  url: https://github.com/COMBINE-lab/piscem/releases/download/v0.14.6/source-full.tar.gz
test:
  commands:
  - piscem --help
