about:
  home: https://github.com/COMBINE-lab/piscem
  license: BSD 3-Clause
  license_file: LICENSE
  summary: piscem is a next-generation compacted colored de Bruijn Graph-based indexer
    and mapper
build:
  number: 0
  run_exports:
  - null
  script_env:
  - CFLAGS=-I$PREFIX/include
  - CXXFLAGS=-I$PREFIX/include
  - LDFLAGS=-L$PREFIX/lib
channels:
- conda-forge
- bioconda
- defaults
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: piscem
  version: 0.18.0
requirements:
  build:
  - cmake <4.0.0
  - autoconf
  - make
  - bzip2
  - jemalloc >=5.2.1
  - null
  - null
  - pkg-config
  - curl
  host:
  - bzip2
  - jemalloc >=5.2.1
  - tapi
  run:
  - __osx >=10.9
source:
  sha256: 115fe1fc682643433d524fa8dac67c257eb69d9a77e5d5f423fc90d0e4bb92be
  url: https://github.com/COMBINE-lab/piscem/releases/download/v0.18.0/source-full.tar.gz
test:
  commands:
  - piscem --help
