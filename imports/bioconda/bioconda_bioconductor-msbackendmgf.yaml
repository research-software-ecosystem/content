about:
  description: Mass spectrometry (MS) data backend supporting import and export of
    MS/MS spectra data from Mascot Generic Format (mgf) files. Objects defined in
    this package are supposed to be used with the Spectra Bioconductor package. This
    package thus adds mgf file support to the Spectra package.
  home: https://bioconductor.org/packages/3.22/bioc/html/MsBackendMgf.html
  license: Artistic-2.0
  summary: Mass Spectrometry Data Backend for Mascot Generic Format (mgf) Files
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-msbackendmgf
  version: 1.18.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
source:
  md5: 2c5ee1e763557d924c902a3e1d5e77ff
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MsBackendMgf_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MsBackendMgf/MsBackendMgf_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/MsBackendMgf_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-msbackendmgf/bioconductor-msbackendmgf_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MsBackendMgf')"
