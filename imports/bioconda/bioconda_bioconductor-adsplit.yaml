about:
  description: This package implements clustering of microarray gene expression profiles
    according to functional annotations. For each term genes are annotated to, splits
    into two subclasses are computed and a significance of the supporting gene set
    is determined.
  home: https://bioconductor.org/packages/3.22/bioc/html/adSplit.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Annotation-Driven Clustering
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  parent_recipe:
    name: bioconductor-adsplit
    path: recipes/bioconductor-adsplit
    version: 1.50.0
package:
  name: bioconductor-adsplit
  version: 1.80.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - r-base
  - r-cluster >=1.9.1
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - r-base
  - r-cluster >=1.9.1
