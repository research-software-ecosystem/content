about:
  description: An R package for subset-based analysis of heterogeneous traits and
    disease subtypes. The package allows the user to search through all possible subsets
    of z-scores to identify the subset of traits giving the best meta-analyzed z-score.
    Further, it returns a p-value adjusting for the multiple-testing involved in the
    search. It also allows for searching for the best combination of disease subtypes
    associated with each variant.
  home: https://bioconductor.org/packages/3.22/bioc/html/ASSET.html
  license: GPL-2 + file LICENSE
  license_file: LICENSE
  summary: An R package for subset-based association analysis of heterogeneous traits
    and subtypes
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-asset
  version: 2.28.0
requirements:
  host:
  - r-base
  - r-mass
  - r-msm
  - r-rmeta
  run:
  - r-base
  - r-mass
  - r-msm
  - r-rmeta
source:
  md5: ff4c62a50c3c4b1d395e08d7e5e6040d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ASSET_2.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ASSET/ASSET_2.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/ASSET_2.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-asset/bioconductor-asset_2.28.0_src_all.tar.gz
