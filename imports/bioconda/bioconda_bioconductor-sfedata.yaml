about:
  description: Example spatial transcriptomics datasets with Simple Feature annotations
    as SpatialFeatureExperiment objects. Technologies include Visium, slide-seq, Nanostring
    CoxMX, Vizgen MERFISH, and 10X Xenium. Tissues include mouse skeletal muscle,
    human melanoma metastasis, human lung, breast cancer, and mouse liver.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/SFEData.html
  license: Artistic-2.0
  summary: Example SpatialFeatureExperiment datasets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-sfedata
  version: 1.12.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: d132b6dd896bfce4cdd7bf5d53b5bd07
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/SFEData_1.12.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SFEData/SFEData_1.12.0.tar.gz
  - https://bioarchive.galaxyproject.org/SFEData_1.12.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-sfedata/bioconductor-sfedata_1.12.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SFEData')"
