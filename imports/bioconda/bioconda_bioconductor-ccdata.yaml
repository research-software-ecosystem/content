about:
  description: This package contains microarray gene expression data generated from
    the Connectivity Map build 02 and LINCS l1000. The data are used by the ccmap
    package to find drugs and drug combinations to mimic or reverse a gene expression
    signature.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/ccdata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Data for Combination Connectivity Mapping (ccmap) Package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ccdata
  version: 1.36.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 5820fb0bb2a8f11a46330cbcf5f00ed9
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/ccdata_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ccdata/ccdata_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/ccdata_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ccdata/bioconductor-ccdata_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ccdata')"
