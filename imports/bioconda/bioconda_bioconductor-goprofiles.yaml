about:
  description: The package implements methods to compare lists of genes based on comparing
    the corresponding 'functional profiles'.
  home: https://bioconductor.org/packages/3.22/bioc/html/goProfiles.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: 'goProfiles: an R package for the statistical analysis of functional profiles'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-goprofiles
  version: 1.72.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - r-base
  - r-compquadform
  - r-stringr
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - r-base
  - r-compquadform
  - r-stringr
source:
  md5: eb9f25ba492b2c381202138d175b97e7
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/goProfiles_1.72.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/goProfiles/goProfiles_1.72.0.tar.gz
  - https://bioarchive.galaxyproject.org/goProfiles_1.72.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-goprofiles/bioconductor-goprofiles_1.72.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('goProfiles')"
