about:
  description: Base-resolution copy number analysis of viral genome. Utilizes base-resolution
    read depth data over viral genome to find copy number segments with two-dimensional
    segmentation approach. Provides publish-ready figures, including histograms of
    read depths, coverage line plots over viral genome annotated with copy number
    change events and viral genes, and heatmaps showing multiple types of data with
    integrative clustering of samples.
  home: https://bioconductor.org/packages/3.22/bioc/html/ELViS.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: An R Package for Estimating Copy Number Levels of Viral Genome Segments
    Using Base-Resolution Read Depth Profile
