about:
  dev_url: https://github.com/nanoporetech/pomoxis
  doc_url: https://nanoporetech.github.io/pomoxis/index.html
  home: https://github.com/nanoporetech/pomoxis
  license: MPL-2.0
  license_family: OTHER
  license_file: LICENSE.md
  summary: Assembly, consensensus, and analysis tools by ONT research.
build:
  entry_points:
  - assess_homopolymers = pomoxis.assess_homopolymers:main
  - catalogue_errors = pomoxis.catalogue_errors:main
  - coverage_from_bam = pomoxis.coverage_from_bam:main
  - filter_bam = pomoxis.filter_bam:main
  - pomoxis_path = pomoxis:show_prog_path
  - ref_seqs_from_bam = pomoxis.ref_seqs_from_bam:main
  - reverse_bed = pomoxis.util:reverse_bed
  - stats_from_bam = pomoxis.stats_from_bam:main
  - subsample_bam = pomoxis.subsample_bam:main
  - summary_from_stats = pomoxis.summary_from_stats:main
  - split_fastx = pomoxis.split_fastx:main
  - tag_bam = pomoxis.util:tag_bam
  - trim_alignments = pomoxis.trim_alignments:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - cjw85
package:
  name: pomoxis
  version: 0.4.0
requirements:
  host:
  - pip
  - python >=3.10,<3.15
  - setuptools
  run:
  - python >=3.10,<3.15
  - biopython
  - intervaltree >=3
  - matplotlib-base
  - numpy >=2.0
  - pandas
  - porechop
  - pysam >=0.22
  - minimap2 >=2.17
  - miniasm >=0.3_r179
  - racon >=1.3.1
  - samtools >=1.9
  - bcftools >=1.9
  - seqkit >=0.8.0
  - bedtools >=2.29.0
  - ncls >=0.0.65
source:
  sha256: 999ba14dc52550d250af03b968e43a6f37b604b45bd469887284e1c95362fc91
  url: https://pypi.org/packages/source/p/pomoxis/pomoxis-0.4.0.tar.gz
test:
  commands:
  - assess_homopolymers --help
  - catalogue_errors --help
  - coverage_from_bam --help
  - filter_bam --help
  - pomoxis_path --help
  - ref_seqs_from_bam --help
  - reverse_bed --help
  - stats_from_bam --help
  - subsample_bam --help
  - summary_from_stats --help
  - split_fastx --help
  - tag_bam --help
  - trim_alignments --help
  imports:
  - pomoxis
  - pomoxis.bio
  - pomoxis.util
