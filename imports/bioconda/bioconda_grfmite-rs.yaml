about:
  description: 'grfmite-rs is a from-scratch Rust implementation of the single GRF
    mode TIR-Learner

    uses: grf-main -c 1 (MITE candidate detection). It is a drop-in, work-stealing,

    parallel replacement that removes GRF''s per-chunk runtime tail. It is NOT a full
    GRF

    port -- only the MITE path is implemented; a complete GRF overhaul is future work.

    The package installs the `grf_rs` binary and a `grfmite-rs` alias.

    '
  home: https://github.com/KGerhardt/grfmite-rs
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Fast parallel Rust reimplementation of GRF MITE detection (grf-main -c
    1), used by TIR-Learner.
build:
  number: 0
  run_exports:
  - null
