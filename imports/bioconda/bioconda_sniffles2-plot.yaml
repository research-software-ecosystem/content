about:
  home: https://github.com/farhangus/Sniffles2_plot
  license: Unknown
  summary: A visualizer tool for generating plots from Sniffles2 VCF files.
build:
  entry_points:
  - sniffles2_plot = sniffles2_plot.cli:entry_point
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - nourmahfel
package:
  name: sniffles2-plot
  version: 0.2.1
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - seaborn >=0.11.0,<1
  - upsetplot >=0.8.0,<1
  - pandas >=1.1.3,<2
  - matplotlib-base >=3.3.2,<4
  - numpy <2
source:
  sha256: 938a5dda606f4221cec905ecc72542f4fc461e55b8ec9533c62d55fcd2c43fee
  url: https://pypi.org/packages/source/s/sniffles2-plot/sniffles2_plot-0.2.1.tar.gz
test:
  commands:
  - sniffles2_plot --help
  imports:
  - sniffles2_plot
