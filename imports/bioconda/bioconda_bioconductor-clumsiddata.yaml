about:
  description: This package contains various LC-MS/MS and GC-MS data that is used
    in vignettes and examples in the CluMSID package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/CluMSIDdata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Data for the CluMSID package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-clumsiddata
  version: 1.26.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: f246197291d7d0ed8166387470c78022
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/CluMSIDdata_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CluMSIDdata/CluMSIDdata_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/CluMSIDdata_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-clumsiddata/bioconductor-clumsiddata_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CluMSIDdata')"
