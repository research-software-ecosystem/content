about:
  description: Utility package to facilitate integration and analysis of EBI HoloFood
    data in R. This package streamlines access to the resource, allowing for direct
    loading of data into formats optimized for downstream analytics.
  home: https://bioconductor.org/packages/3.22/bioc/html/HoloFoodR.html
  license: Artistic-2.0 | file LICENSE
  license_file: LICENSE
  summary: R interface to EBI HoloFood resource
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-holofoodr
  version: 1.4.0
requirements:
  host:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-base
  - r-dplyr
  - r-httr2
  - r-jsonlite
  - r-stringi
  run:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-base
  - r-dplyr
  - r-httr2
  - r-jsonlite
  - r-stringi
source:
  md5: ec0c1ad1a80bf662696cb324fe0d1306
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/HoloFoodR_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HoloFoodR/HoloFoodR_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/HoloFoodR_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-holofoodr/bioconductor-holofoodr_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HoloFoodR')"
