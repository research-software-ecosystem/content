  - bifrost >=1.3.0
source:
  patches:
  - 0001-No-experimental.patch
  sha256: a88902cb1ac9be8058d99006c9f7911c8762dd7d5a6cce11080dfde6f20be987
  url: https://github.com/bacpop/unitig-caller/archive/v1.3.2.tar.gz
