about:
  description: This package helps users to work with TF metadata from various sources.
    Significant catalogs of TFs and classifications thereof are made available. Tools
    for working with motif scans are also provided.
  home: https://bioconductor.org/packages/3.22/bioc/html/TFutils.html
  license: Artistic-2.0
  summary: TFutils
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tfutils
  version: 1.30.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicfiles >=1.46.0,<1.47.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-dt
  - r-httr
  - r-magrittr
  - r-miniui
  - r-readxl
  - r-rjson
  - r-shiny
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicfiles >=1.46.0,<1.47.0
