about:
  description: Common techinical complications such as clogging can result in spurious
    events and fluorescence intensity shifting, flowCut is designed to detect and
    remove technical artifacts from your data by removing segments that show statistical
    differences from other segments.
  home: https://bioconductor.org/packages/3.22/bioc/html/flowCut.html
  license: Artistic-2.0
  summary: Automated Removal of Outlier Events and Flagging of Files Based on Time
    Versus Fluorescence Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-flowcut
  version: 1.20.0
requirements:
  host:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowdensity >=1.44.0,<1.45.0
  - r-base
  - r-cairo
  - r-e1071
  run:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowdensity >=1.44.0,<1.45.0
  - r-base
  - r-cairo
  - r-e1071
source:
  md5: 3b301ec95ccd28463b445625056d2737
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowCut_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowCut/flowCut_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowCut_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowcut/bioconductor-flowcut_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('flowCut')"
