about:
  description: The package includes functions to build restriction enzyme cut site
    (RECS) map, distribute mapped sequences on the map with five different approaches,
    find enriched/depleted RECSs for a sample, and identify differentially enriched/depleted
    RECSs between samples.
  home: https://bioconductor.org/packages/3.22/bioc/html/REDseq.html
  license: GPL (>=2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Analysis of high-throughput sequencing data processed by restriction enzyme
    digestion
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-redseq
  version: 1.56.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-bsgenome.celegans.ucsc.ce2 >=1.4.0,<1.5.0
  - bioconductor-chippeakanno >=3.44.0,<3.45.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
