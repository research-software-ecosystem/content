about:
  description: MultiBaC is a strategy to correct batch effects from multiomic datasets
    distributed across different labs or data acquisition events. MultiBaC is the
    first Batch effect correction algorithm that dealing with batch effect correction
    in multiomics datasets. MultiBaC is able to remove batch effects across different
    omics generated within separate batches provided that at least one common omic
    data type is included in all the batches considered.
  home: https://bioconductor.org/packages/3.22/bioc/html/MultiBaC.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Multiomic Batch effect Correction
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-multibac
  version: 1.20.0
requirements:
  host:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-pcamethods >=2.2.0,<2.3.0
  - bioconductor-ropls >=1.42.0,<1.43.0
  - r-base
  - r-ggplot2
  - r-matrix
  - r-plotrix
  run:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-pcamethods >=2.2.0,<2.3.0
  - bioconductor-ropls >=1.42.0,<1.43.0
  - r-base
  - r-ggplot2
  - r-matrix
  - r-plotrix
source:
  md5: 3c06d9564262b08476620fc07bb8fb52
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MultiBaC_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MultiBaC/MultiBaC_1.20.0.tar.gz
