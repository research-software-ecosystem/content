about:
  description: This is a comprehensive package to perform Tensor decomposition based
    unsupervised feature extraction. It can perform unsupervised feature extraction.
    It uses tensor decomposition. It is applicable to gene expression, DNA methylation,
    and histone modification etc. It can perform multiomics analysis. It is also potentially
    applicable to single cell omics data sets.
  home: https://bioconductor.org/packages/3.22/bioc/html/TDbasedUFE.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Tensor Decomposition Based Unsupervised Feature Extraction
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tdbasedufe
  version: 1.10.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-mofadata >=1.26.0,<1.27.0
  - bioconductor-tximport >=1.38.0,<1.39.0
  - bioconductor-tximportdata >=1.38.0,<1.39.0
  - r-base
  - r-readr
  - r-rtensor
  - r-shiny
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-mofadata >=1.26.0,<1.27.0
  - bioconductor-tximport >=1.38.0,<1.39.0
  - bioconductor-tximportdata >=1.38.0,<1.39.0
  - r-base
  - r-readr
  - r-rtensor
  - r-shiny
source:
  md5: 0a5fd60cf378ef9fba2bc4b67e8f01b6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TDbasedUFE_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TDbasedUFE/TDbasedUFE_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/TDbasedUFE_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tdbasedufe/bioconductor-tdbasedufe_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TDbasedUFE')"
