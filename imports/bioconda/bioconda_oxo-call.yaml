about:
  description: "oxo-call is an AI-powered CLI assistant for bioinformatics. Instead\
    \ of  memorizing hundreds of flags across dozens of tools, you describe what \
    \ you want to accomplish \u2014 oxo-call translates that into a correct, grounded\
    \ command.\n"
  dev_url: https://github.com/Traitome/oxo-call
  doc_url: https://traitome.github.io/oxo-call/documentation
  home: https://github.com/Traitome/oxo-call
  license: Custom
  license_family: OTHER
  license_file:
  - LICENSE
  - LICENSE-ACADEMIC
  - LICENSE-COMMERCIAL
  - THIRDPARTY.yml
  summary: "Model-intelligent orchestration for CLI bioinformatics \u2014 call any\
    \ tool with LLM intelligence"
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - ShixiangWang
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: oxo-call
  version: 0.12.1
requirements:
  build:
  - null
  - null
  - cargo-bundle-licenses
source:
  sha256: 9885a031fb9c7f0967ca1207b17efb679dd602ba0f6d8b770a87d97b123b6e3c
  url: https://github.com/Traitome/oxo-call/archive/refs/tags/v0.12.1.tar.gz
test:
  commands:
  - oxo-call --help
