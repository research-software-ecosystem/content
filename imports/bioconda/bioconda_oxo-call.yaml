  number: 0
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - ShixiangWang
package:
  name: oxo-call
  version: 0.10.0
requirements:
  build:
  - null
  - null
  - cargo-bundle-licenses
source:
