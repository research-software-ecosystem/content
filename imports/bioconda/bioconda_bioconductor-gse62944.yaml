about:
  description: TCGA processed RNA-Seq data for 9264 tumor and 741 normal samples across
    24 cancer types and made them available as GEO accession [GSE62944](http://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE62944).
    GSE62944 data have been parsed into a SummarizedExperiment object available in
    ExperimentHub.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/GSE62944.html
  license: Artistic-2.0
  summary: GEO accession data GSE62944 as a SummarizedExperiment
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gse62944
  version: 1.38.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: ddbe52bb10a4dec62aaea170984dccc7
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/GSE62944_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GSE62944/GSE62944_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/GSE62944_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gse62944/bioconductor-gse62944_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GSE62944')"
