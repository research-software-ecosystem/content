about:
  home: https://github.com/ragnargrootkoerkamp/sassy
  license: MIT
  license_file: LICENSE
  summary: Fast approximate string searching
build:
  number: 0
  run_exports:
  - null
  script:
  - mv .cargo/config-portable.toml .cargo/config.toml
  - cargo install --no-track --locked --verbose --root "${PREFIX}" --path .
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - ragnargrootkoerkamp
  - rickbeeloo
package:
  name: sassy
  version: 0.2.0
requirements:
  build:
  - null
  - cargo-bundle-licenses
source:
  sha256: 4082c3580259877c2aa633943846e52dc0b0c153d23972058031742ae4892454
  url: https://github.com/ragnargrootkoerkamp/sassy/archive/v0.2.0.tar.gz
test:
  commands:
  - sassy --help
  - sassy grep --help
  - sassy search --help
  - sassy crispr --help
