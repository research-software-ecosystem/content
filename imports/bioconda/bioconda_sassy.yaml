about:
  home: https://github.com/ragnargrootkoerkamp/sassy
  license: MIT
  license_file: LICENSE
  summary: Fast approximate string searching
build:
  number: 0
  run_exports:
  - null
  script:
  - mv .cargo/config-portable.toml .cargo/config.toml
  - cargo install --locked cargo-multivers
  - cargo multivers --profile dist --out-dir "${PREFIX}/bin"
  - cargo install --no-track --locked --profile dist --root "${PREFIX}" --path .
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - ragnargrootkoerkamp
  - rickbeeloo
package:
  name: sassy
  version: 0.2.2
requirements:
  build:
  - null
  - cargo-bundle-licenses
source:
  sha256: f1a446ed5eca2d9e653eb97abfca53dbc9a6baf81617c230560f929478c3d57d
  url: https://github.com/ragnargrootkoerkamp/sassy/archive/v0.2.2.tar.gz
test:
  commands:
  - sassy --help
  - sassy grep --help
  - sassy search --help
  - sassy crispr --help
