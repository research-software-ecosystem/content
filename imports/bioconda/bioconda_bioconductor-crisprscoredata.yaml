about:
  description: Provides an interface to access pre-trained models for on-target and
    off-target gRNA activity prediction algorithms implemented in the crisprScore
    package. Pre-trained model data are stored in the ExperimentHub database. Users
    should consider using the crisprScore package directly to use and load the pre-trained
    models.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/crisprScoreData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Pre-trained models for the crisprScore package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-crisprscoredata
  version: 1.14.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: a74750952b35b5b7e7ee386004f5fad7
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/crisprScoreData_1.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/crisprScoreData/crisprScoreData_1.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/crisprScoreData_1.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-crisprscoredata/bioconductor-crisprscoredata_1.14.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('crisprScoreData')"
