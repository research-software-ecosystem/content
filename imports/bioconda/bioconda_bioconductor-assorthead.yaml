about:
  description: Vendors an assortment of useful header-only C++ libraries. Bioconductor
    packages can use these libraries in their own C++ code by LinkingTo this package
    without introducing any additional dependencies. The use of a central repository
    avoids duplicate vendoring of libraries across multiple R packages, and enables
    better coordination of version updates across cohorts of interdependent C++ libraries.
  home: https://bioconductor.org/packages/3.22/bioc/html/assorthead.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Assorted Header-Only C++ Libraries
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-assorthead
  version: 1.4.0
requirements:
  host:
  - r-base
  run:
  - r-base
source:
  md5: 8ec7798fdb26c24973ba4da2944122ed
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/assorthead_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/assorthead/assorthead_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/assorthead_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-assorthead/bioconductor-assorthead_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('assorthead')"
