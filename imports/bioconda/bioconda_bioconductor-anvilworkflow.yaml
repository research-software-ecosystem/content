about:
  description: The AnVIL is a cloud computing resource developed in part by the National
    Human Genome Research Institute. The main cloud-based genomics platform deported
    by the AnVIL project is Terra. The AnVILWorkflow package allows remote access
    to Terra implemented workflows, enabling end-user to utilize Terra/ AnVIL provided
    resources - such as data, workflows, and flexible/scalble computing resources
    - through the conventional R functions.
  home: https://bioconductor.org/packages/3.22/bioc/html/AnVILWorkflow.html
  license: Artistic-2.0
  summary: Run workflows implemented in Terra/AnVIL workspace
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-anvilworkflow
  version: 1.10.0
requirements:
  host:
  - bioconductor-anvil >=1.22.0,<1.23.0
  - bioconductor-anvilbase >=1.4.0,<1.5.0
  - bioconductor-anvilgcp >=1.4.0,<1.5.0
  - r-base
  - r-dplyr
  - r-httr
  - r-jsonlite
  - r-plyr
  - r-rlang
  - r-stringr
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-anvil >=1.22.0,<1.23.0
  - bioconductor-anvilbase >=1.4.0,<1.5.0
  - bioconductor-anvilgcp >=1.4.0,<1.5.0
  - r-base
  - r-dplyr
  - r-httr
  - r-jsonlite
  - r-plyr
  - r-rlang
  - r-stringr
  - r-tibble
  - r-tidyr
source:
  md5: 5df30a3eca680da3586da73a8ed90c68
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/AnVILWorkflow_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/AnVILWorkflow/AnVILWorkflow_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/AnVILWorkflow_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-anvilworkflow/bioconductor-anvilworkflow_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('AnVILWorkflow')"
