about:
  home: https://github.com/iqbal-lab-org/pling
  license: LICENSE
  license_family: MIT
  summary: 'Pling computes the rearrangement distance between plasmids and clusters
    on their basis '
build:
  entry_points:
  - pling = pling.run_pling:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: pip install . --no-deps --ignore-installed --no-cache-dir -vvv
package:
  name: pling
  version: 3.0.1
requirements:
  host:
  - python >=3.9,<3.12
  - pip
  run:
  - python >=3.9,<3.12
  - sourmash >=4.4.0,<5.0.0
  - pandas >=1.5.3
  - numpy >=1.26.0
  - intervaltree >=3.0.2
  - mummer4
  - glpk >=5.0
  - snakemake >=7.25.4,<8.0.0
  - plasnet >=0.7.0
  - dingII
source:
  sha256: d2ef8396645e6f1ea9aab6e0230ec770d9d37ccfe0dbec40351327417ed1c5de
  url: https://github.com/iqbal-lab-org/pling/archive/refs/tags/v3.0.1.tar.gz
test:
  commands:
  - pling --help
  imports:
  - pling
