about:
  home: https://github.com/huangyh45/PhyloAln
  license: MIT
  license_file: LICENSE
  summary: 'PhyloAln: a reference-based multiple sequence alignment tool for phylogeny'
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  identifiers:
  - doi:10.1093/molbev/msae150
package:
  name: phyloaln
  version: 1.2.1
requirements:
  run:
  - biopython >=1.77
  - ete3 >=3.1.2
  - hmmer >=3.1
  - mafft >=7.467
  - perl >=5.26.2
  - perl-bioperl >=1.7.2
  - perl-parallel-forkmanager >=2.02
  - python >=3.7.4
source:
  sha256: 88e71032698a1a7a93f3ef0c86242cff2a6eb22d41a107e34836a6b997060934
  url: https://github.com/huangyh45/PhyloAln/archive/refs/tags/v1.2.1.tar.gz
test:
  commands:
  - PhyloAln -h
  - hmmbuild -h
  - hmmsearch -h
  - merge_seqs.py -h
  - root_tree.py -h
  - select_seqs.py -h
  - test_effect.py -h
  - trim_matrix.py -h
  - perl -MBio::SeqIO -e 1
  - perl -MBio::DB::Fasta -e 1
  - perl -MParallel::ForkManager -e 1
  - mafft --version
