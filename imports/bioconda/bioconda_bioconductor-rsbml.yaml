about:
  description: Links R to libsbml for SBML parsing, validating output, provides an
    S4 SBML DOM, converts SBML to R graph objects. Optionally links to the SBML ODE
    Solver Library (SOSLib) for simulating models.
  home: https://bioconductor.org/packages/3.22/bioc/html/rsbml.html
  license: Artistic-2.0
  summary: R support for SBML, using libsbml
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rsbml
  version: 2.68.0
requirements:
  build:
  - null
  - null
  - null
  - automake
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  - libsbml
  - libxml2
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - libsbml
source:
  md5: b301cac4ade6fa8e411f970c9ab8311a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rsbml_2.68.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rsbml/rsbml_2.68.0.tar.gz
  - https://bioarchive.galaxyproject.org/rsbml_2.68.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rsbml/bioconductor-rsbml_2.68.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rsbml')"
