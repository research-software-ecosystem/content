about:
  home: https://github.com/biobakery/baqlava
  license: MIT
  license_file: LICENSE
  summary: 'BAQLaVa: Bioinformatic Application of Quantification and Labeling of Viral
    Taxonomy (BAQLaVa).'
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - Matt-BF
package:
  name: baqlava
  version: '0.5'
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - anadama2
  - pandas
  - numpy
  - scipy
  - biopython
source:
  sha256: e09659998f39857d35cba71d4e5c4bd1dba0f6a56f523581b6e3f86912745861
  url: https://pypi.org/packages/source/b/baqlava/baqlava-0.5.tar.gz
test:
  commands:
  - baqlava --help
  - python -c "from baqlava.utility_scripts.join_tables import main"
  - baqlava_database --help
  imports:
  - baqlava
  requires:
  - pip
  - python
