about:
  description: 'AlphaTims provides fast indexing and slicing of Bruker timsTOF raw

    data for mass spectrometry-based proteomics.

    '
  dev_url: https://github.com/MannLabs/alphatims
  doc_url: https://alphatims.readthedocs.io/en/latest/
  home: https://github.com/MannLabs/alphatims
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE.txt
  summary: A Python package for indexing Bruker timsTOF raw data
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - jonasscheid
package:
  name: alphatims
  version: 1.0.10
requirements:
  host:
  - python >=3.8
  - setuptools
  - pip
  run:
  - python >=3.8
  - click
  - h5py
  - numba
  - pandas
  - psutil
  - pyzstd
  - tqdm
source:
  sha256: 51de16f4652ca02f986bfe12d82ff4602cf8a54710c55f7ac07dafa45be8d49c
  url: https://github.com/MannLabs/alphatims/archive/refs/tags/v1.0.10.tar.gz
test:
  commands:
  - pip check
  - alphatims --help
  imports:
  - alphatims
  requires:
  - pip
