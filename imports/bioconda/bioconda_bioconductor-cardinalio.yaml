about:
  description: Fast and efficient reading and writing of mass spectrometry imaging
    data files. Supports imzML and Analyze 7.5 formats. Provides ontologies for mass
    spectrometry imaging.
  home: https://bioconductor.org/packages/3.22/bioc/html/CardinalIO.html
  license: Artistic-2.0 | file LICENSE
  license_file: LICENSE
  summary: Read and write mass spectrometry imaging files
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cardinalio
  version: 1.8.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-matter >=2.12.0,<2.13.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-ontologyindex
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-matter >=2.12.0,<2.13.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-ontologyindex
source:
  md5: 974a5f2553a1f60f0ee1ca0978b4745b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CardinalIO_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CardinalIO/CardinalIO_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/CardinalIO_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cardinalio/bioconductor-cardinalio_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CardinalIO')"
