about:
  dev_url: https://github.com/scverse/SnapATAC2
  doc_url: https://scverse.org/SnapATAC2
  home: https://github.com/scverse/SnapATAC2
  license: MIT
  license_family: MIT
  license_file: snapatac2-core/LICENSE
  summary: 'SnapATAC2: Single-cell epigenomics analysis pipeline.'
build:
  number: 1
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:snapatac
  - doi:10.1038/s41592-023-02139-9
  - usegalaxy-eu:snapatac2_preprocessing
  - usegalaxy-eu:snapatac2_clustering
  - usegalaxy-eu:snapatac2_peaks_and_motif
  - usegalaxy-eu:snapatac2_plotting
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: snapatac2
  version: 2.9.0
requirements:
  build:
  - null
  - null
  - cargo-bundle-licenses
  - make
  - cmake
  - pkg-config
  host:
  - python
  - pip
  - maturin
  - zlib
  run:
  - python
  - anndata
  - python-igraph >=0.10.3
  - multiprocess
  - macs3
  - natsort
  - numpy >=2.0.0,<3.0.0
  - pandas >=2.2.0,<3.0.0
  - plotly >=5.19.0,<7.0.0
  - polars >=1.0
  - pooch >=1.6.0
  - pyarrow
  - pyfaidx >=0.7.0,<0.9.0
  - python-kaleido
  - rustworkx
  - scipy >=1.4
  - scikit-learn >=1.0
  - tqdm >=4.62
  - typing_extensions
  - typeguard >=4.0
source:
  patches:
  - cargo.toml.patch
  sha256: c9e94dcb9d22d8595c1ae5d56665e10bb11828f01e01c98463449537ed91b39a
  url: https://pypi.org/packages/source/s/snapatac2/snapatac2-2.9.0.tar.gz
test:
  imports:
  - snapatac2
