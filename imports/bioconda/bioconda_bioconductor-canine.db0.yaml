about:
  description: Base annotation databases for canine, intended ONLY to be used by AnnotationDbi
    to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/canine.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for canine
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-canine.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 16bd1d8be522376a6a07a05b16bfc748
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/canine.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/canine.db0/canine.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/canine.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-canine.db0/bioconductor-canine.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('canine.db0')"
