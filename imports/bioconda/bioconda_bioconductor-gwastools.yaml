about:
  description: Classes for storing very large GWAS data sets and annotation, and functions
    for GWAS data cleaning and analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/GWASTools.html
  license: Artistic-2.0
  summary: Tools for Genome Wide Association Studies
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gwastools
  version: 1.56.0
requirements:
