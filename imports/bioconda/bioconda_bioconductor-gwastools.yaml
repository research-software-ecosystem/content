  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-gdsfmt >=1.46.0,<1.47.0
  - bioconductor-quantsmooth >=1.76.0,<1.77.0
  - r-base
  - r-data.table
  - r-dbi
  - r-gwasexacthw
  - r-lmtest
