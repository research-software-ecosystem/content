about:
  dev_url: https://github.com/MDU-PHL/lissero
  doc_url: https://github.com/MDU-PHL/LisSero/blob/master/README.md
  home: https://github.com/MDU-PHL/lissero
  license: GPL-3.0
  license_family: GPL
  license_file: LICENSE
  summary: In silico serotyping of Listeria monocytogenes
build:
  entry_points:
  - lissero = lissero.run_lissero:run_lissero
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - kristyhoran
package:
  name: lissero
  version: 0.4.10
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - click
  - loguru
  - biopython
  - ispcr
  - blast >=2.10
source:
  sha256: f4cb32f986a137b92f5d276e58fb64aac442b3c12c0dfbd11b28ba74edf2bc7f
  url: https://github.com/MDU-PHL/lissero/archive/refs/tags/v0.4.10.tar.gz
test:
  commands:
  - lissero --help
  imports:
  - lissero
