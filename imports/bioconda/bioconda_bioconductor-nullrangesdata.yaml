about:
  description: Provides datasets for the nullranges package vignette, in particular
    example datasets for DNase hypersensitivity sites (DHS), CTCF binding sites, and
    CTCF genomic interactions. These are used to demonstrate generation of null hypothesis
    feature sets, either through block bootstrapping or matching, in the nullranges
    vignette.  For more details, see the data object man pages, and the R scripts
    for object construction provided within the package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/nullrangesData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: ExperimentHub datasets for the nullranges package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-nullrangesdata
  version: 1.16.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-interactionset >=1.38.0,<1.39.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-interactionset >=1.38.0,<1.39.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: f9ac146413d26934e2495cb024cca5e3
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/nullrangesData_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/nullrangesData/nullrangesData_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/nullrangesData_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-nullrangesdata/bioconductor-nullrangesdata_1.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('nullrangesData')"
