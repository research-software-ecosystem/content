about:
  dev_url: https://github.com/griffithlab/civicpy
  doc_url: https://docs.civicpy.org/en/latest
  home: https://civicpy.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: CIViC variant knowledgebase analysis toolkit.
build:
  entry_points:
  - civicpy = civicpy.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517
    -vvv
package:
  name: civicpy
  version: 5.3.0
requirements:
  host:
  - pip
  - python >=3.10
  - setuptools
  run:
  - python >=3.10
  - backports
  - backports-datetime-fromisoformat
  - click
  - deprecation
  - networkx
  - obonet
  - pandas
  - pysam
  - requests
  - vcfpy
source:
  sha256: 06747f1d1d15f4a80a0ab1df9b2e5555b7eea58ba1431e862cc653bc5b3267b6
  url: https://pypi.io/packages/source/c/civicpy/civicpy-5.3.0.tar.gz
test:
  imports:
  - civicpy
