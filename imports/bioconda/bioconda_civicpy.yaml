about:
  dev_url: https://github.com/griffithlab/civicpy
  doc_url: https://docs.civicpy.org/en/latest
  home: https://civicpy.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: CIViC variant knowledgebase analysis toolkit.
build:
  entry_points:
  - civicpy = civicpy.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517
    -vvv
package:
  name: civicpy
  version: 5.2.0
requirements:
  host:
  - pip
  - python >=3.10
  - setuptools
  run:
  - python >=3.10
  - backports
  - backports-datetime-fromisoformat
  - click
  - deprecation
  - networkx
  - obonet
  - pandas
  - pysam
  - requests
  - vcfpy
source:
  sha256: 4dd1a4e064c7fe1cf097409707bdc5e3df38d137f199204de8d8a859c6b4fefc
  url: https://pypi.io/packages/source/c/civicpy/civicpy-5.2.0.tar.gz
test:
  imports:
  - civicpy
