about:
  description: The scDblFinder package gathers various methods for the detection and
    handling of doublets/multiplets in single-cell sequencing data (i.e. multiple
    cells captured within the same droplet or reaction volume). It includes methods
    formerly found in the scran package, the new fast and comprehensive scDblFinder
    method, and a reimplementation of the Amulet detection method for single-cell
    ATAC-seq.
  home: https://bioconductor.org/packages/3.22/bioc/html/scDblFinder.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: scDblFinder
