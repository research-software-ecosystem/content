  - bioconductor-multidataset >=1.38.0,<1.39.0
  - bioconductor-omicade4 >=1.50.0,<1.51.0
  - bioconductor-rexposome >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
