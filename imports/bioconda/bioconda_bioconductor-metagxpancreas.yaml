about:
  description: A collection of pancreatic Cancer transcriptomic datasets that are
    part of the MetaGxData package compendium. This package contains multiple pancreas
    cancer datasets that have been downloaded from various resources and turned into
    SummarizedExperiment objects. The details of how the authors normalized the data
    can be found in the experiment data section of the objects. Additionally, the
    location the data was obtained from can be found in the url variables of the experiment
    data portion of each SE.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/MetaGxPancreas.html
  license: Artistic-2.0
  summary: Transcriptomic Pancreatic Cancer Datasets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-metagxpancreas
  version: 1.30.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-impute >=1.84.0,<1.85.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-impute >=1.84.0,<1.85.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 9e915e4c4ca131949b7868b56f7f2174
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/MetaGxPancreas_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MetaGxPancreas/MetaGxPancreas_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/MetaGxPancreas_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-metagxpancreas/bioconductor-metagxpancreas_1.30.0_src_all.tar.gz
test:
