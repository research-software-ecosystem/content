about:
  dev_url: https://github.com/shayesteh99/DecoDiPhy
  home: https://github.com/shayesteh99/DecoDiPhy
  license: MIT
  license_file: LICENSE
  summary: 'DecoDiPhy: a Python tool for consolidating millions of sequence reads
    into few accurate phylogenetic placements.'
build:
  entry_points:
  - decodiphy = decodiphy.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - shayesteh99
package:
  name: decodiphy
  version: 1.2.3
requirements:
  host:
  - python >=3.8,<3.13
  - pip
  - setuptools >=42
  run:
  - python >=3.8,<3.13
  - numpy >=1.24,<2.0
  - cvxpy >=1.2,<2.0
  - treeswift >=1.1.0,<2.0
source:
  sha256: 68efaca54946044d3c73631eeebc3fc5c1cb97be76b244889f2e7542843583b5
  url: https://github.com/shayesteh99/DecoDiPhy/archive/v1.2.3.tar.gz
test:
  imports:
  - decodiphy
