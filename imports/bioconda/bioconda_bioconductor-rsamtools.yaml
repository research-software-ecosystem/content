about:
  description: This package provides an interface to the 'samtools', 'bcftools', and
    'tabix' utilities for manipulating SAM (Sequence Alignment / Map), FASTA, binary
    variant call (BCF) and compressed indexed tab-delimited (tabix) files.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rsamtools.html
  license: Artistic-2.0 | file LICENSE
  license_file: LICENSE
  summary: Binary alignment (BAM), FASTA, variant call (BCF), and tabix file import
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:rsamtools
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-rsamtools
    path: recipes/bioconductor-rsamtools
    version: 1.32.3
package:
  name: bioconductor-rsamtools
  version: 2.26.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rhtslib >=3.6.0,<3.7.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
  - r-bitops
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rhtslib >=3.6.0,<3.7.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
