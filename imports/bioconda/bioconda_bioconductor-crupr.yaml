about:
  description: 'An R package that offers a workflow to predict condition-specific
    enhancers from ChIP-seq data. The prediction of regulatory units is done in four
    main steps: Step 1 - the normalization of the ChIP-seq counts. Step 2 - the prediction
    of active enhancers binwise on the whole genome. Step 3 - the condition-specific
    clustering of the putative active enhancers. Step 4 - the detection of possible
    target genes of the condition-specific clusters using RNA-seq counts.'
  home: https://bioconductor.org/packages/3.22/bioc/html/crupR.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: An R package to predict condition-specific enhancers from ChIP-seq data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
