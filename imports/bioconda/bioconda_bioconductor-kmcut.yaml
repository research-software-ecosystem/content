about:
  description: The purpose of the package is to identify prognostic biomarkers and
    an optimal numeric cutoff for each biomarker that can be used to stratify a group
    of test subjects (samples) into two sub-groups with significantly different survival
    (better vs. worse). The package was developed for the analysis of gene expression
    data, such as RNA-seq. However, it can be used with any quantitative variable
    that has a sufficiently large proportion of unique values.
  home: https://bioconductor.org/packages/3.22/bioc/html/kmcut.html
  license: Artistic-2.0
  summary: Optimized Kaplan Meier analysis and identification and validation of prognostic
    biomarkers
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-kmcut
  version: 1.4.0
requirements:
  host:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-doparallel
  - r-foreach
  - r-pracma
  - r-survival
  run:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-doparallel
  - r-foreach
  - r-pracma
  - r-survival
source:
  md5: 2880eab06b23ee2afd302af3affafb32
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/kmcut_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/kmcut/kmcut_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/kmcut_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-kmcut/bioconductor-kmcut_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('kmcut')"
