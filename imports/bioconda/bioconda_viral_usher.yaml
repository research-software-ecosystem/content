  doc_url: https://github.com/AngieHinrichs/viral_usher
  home: https://github.com/AngieHinrichs/viral_usher
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Easily configure and run a pipeline to build a tree of virus genomes using
    UShER
build:
  entry_points:
  - viral_usher = viral_usher.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - AngieHinrichs
package:
  name: viral_usher
  version: 0.10.1
requirements:
  host:
  - python >=3.11
  - pip
  - setuptools
  run:
  - python >=3.11
  - requests
  - biopython
  - docker-py
source:
  sha256: 12680e5b5756fd1b4e2de3adaf184b293c71697c61227d35ca13ccf6aca80171
  url: https://files.pythonhosted.org/packages/58/76/1839e73738e05a14bfaf48205bad1a6b24e4242b5e724ed14cd44c82b601/viral_usher-0.10.1.tar.gz
test:
  commands:
  - viral_usher --help
  imports:
  - viral_usher
