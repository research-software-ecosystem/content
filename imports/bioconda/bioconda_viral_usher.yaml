about:
  dev_url: https://github.com/AngieHinrichs/viral_usher
  doc_url: https://github.com/AngieHinrichs/viral_usher
  home: https://github.com/AngieHinrichs/viral_usher
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Easily configure and run a pipeline to build a tree of virus genomes using
    UShER
build:
  entry_points:
  - viral_usher = viral_usher.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - AngieHinrichs
package:
  name: viral_usher
  version: 0.10.2
requirements:
  host:
  - python >=3.11
  - pip
  - setuptools
  run:
  - python >=3.11
  - requests
  - biopython
  - docker-py
source:
  sha256: c64065e527d33125bf49f439ae43276a96291cabe86df6cc7eee7894486fa8b3
  url: https://files.pythonhosted.org/packages/2d/5f/f42f98f72bb3d147ba25265b5c326d1417520f67917289e68ad13db80490/viral_usher-0.10.2.tar.gz
test:
  commands:
  - viral_usher --help
  imports:
  - viral_usher
