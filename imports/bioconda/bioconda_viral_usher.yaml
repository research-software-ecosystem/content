about:
  dev_url: https://github.com/AngieHinrichs/viral_usher
  doc_url: https://github.com/AngieHinrichs/viral_usher
  home: https://github.com/AngieHinrichs/viral_usher
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Easily configure and run a pipeline to build a tree of virus genomes using
    UShER
build:
  entry_points:
  - viral_usher = viral_usher.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - AngieHinrichs
package:
  name: viral_usher
  version: 0.10.3
requirements:
  host:
  - python >=3.11
  - pip
  - setuptools
  run:
  - python >=3.11
  - requests
  - biopython
  - docker-py
source:
  sha256: 75139a3e028ea7ba4782d62403eac6c392a950445a9e30fa00ef2e583bf1f94e
  url: https://files.pythonhosted.org/packages/b6/f3/2c2f0e92ef1806077fc7ad2e2133d43c98d62904062cf6e45e9171eb1f17/viral_usher-0.10.3.tar.gz
test:
  commands:
  - viral_usher --help
  imports:
  - viral_usher
