about:
  description: Implements a parametric semi-supervised mixture model. The permutation
    test detects markers with main or interactive effects, without distinguishing
    them. Possible applications include genome-wide association analysis and differential
    expression analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/semisup.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Semi-Supervised Mixture Model
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-semisup
    path: recipes/bioconductor-semisup
    version: 1.4.0
package:
  name: bioconductor-semisup
  version: 1.34.0
requirements:
  host:
  - r-base
  - r-vgam
  run:
  - r-base
  - r-vgam
source:
  md5: ad032c7d45ec0acb1d0cbea9ebd440fe
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/semisup_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/semisup/semisup_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/semisup_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-semisup/bioconductor-semisup_1.34.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('semisup')"
