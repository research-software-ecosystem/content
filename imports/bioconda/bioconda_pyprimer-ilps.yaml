about:
  description: 'PyPrimer-ILPs identifies intron length variation between multiple
    species for

    the purpose of designing diagnostic multiplex PCR primers. Originally

    implemented in Neodiprion sawflies, the methodology can be applied to

    any system with an NCBI annotated reference genome.

    '
  dev_url: https://github.com/RDRidenbaugh/PyPrimer
  doc_url: https://github.com/RDRidenbaugh/PyPrimer
  home: https://github.com/RDRidenbaugh/PyPrimer
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: A bioinformatic pipeline for intron length variation-based diagnostic multiplex
    PCR primer design.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - RDRidenbaugh
package:
  name: pyprimer-ilps
  version: 0.1.2
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
source:
  sha256: b58f0e7ffe2cc1776c74b9a55b9c7b8034ee8ba2a33f9eb854008116b38ad9f3
  url: https://pypi.io/packages/source/p/pyprimer-ilps/pyprimer_ilps-0.1.2.tar.gz
test:
  commands:
  - pip check
  imports:
  - pyprimer_ilps
  requires:
  - pip
