about:
  description: A dplyr-like interface for interacting with the common Bioconductor
    classes Ranges and GenomicRanges. By providing a grammatical and consistent way
    of manipulating these classes their accessiblity for new Bioconductor users is
    hopefully increased.
  home: https://bioconductor.org/packages/3.22/bioc/html/plyranges.html
  license: Artistic-2.0
  summary: A fluent interface for manipulating GenomicRanges
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-plyranges
  version: 1.30.1
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-magrittr
  - r-rlang >=0.2.0
  - r-tidyselect >=1.0.0
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-magrittr
  - r-rlang >=0.2.0
  - r-tidyselect >=1.0.0
source:
  md5: a2e8c6421a841307dbf9211632b4c525
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/plyranges_1.30.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/plyranges/plyranges_1.30.1.tar.gz
  - https://bioarchive.galaxyproject.org/plyranges_1.30.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-plyranges/bioconductor-plyranges_1.30.1_src_all.tar.gz
