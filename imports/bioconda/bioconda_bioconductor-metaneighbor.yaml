about:
  description: MetaNeighbor allows users to quantify cell type replicability across
    datasets using neighbor voting.
  home: https://bioconductor.org/packages/3.22/bioc/html/MetaNeighbor.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Single cell replicability analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-metaneighbor
  version: 1.29.0
requirements:
  host:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-beanplot >=1.2
  - r-dplyr
  - r-ggplot2
  - r-gplots >=3.0.1
  - r-igraph
  - r-matrix >=1.2
  - r-matrixstats >=0.54
  - r-rcolorbrewer >=1.1.2
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-beanplot >=1.2
  - r-dplyr
  - r-ggplot2
  - r-gplots >=3.0.1
  - r-igraph
  - r-matrix >=1.2
  - r-matrixstats >=0.54
  - r-rcolorbrewer >=1.1.2
  - r-tibble
  - r-tidyr
source:
  md5: 1635a436e4b8e4f6cb06d08ad2b9bbaa
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MetaNeighbor_1.29.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MetaNeighbor/MetaNeighbor_1.29.0.tar.gz
  - https://bioarchive.galaxyproject.org/MetaNeighbor_1.29.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-metaneighbor/bioconductor-metaneighbor_1.29.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MetaNeighbor')"
