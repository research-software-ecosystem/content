about:
  description: This package provides functions for pathway analysis based on REACTOME
    pathway database. It implements enrichment analysis, gene set enrichment analysis
    and several functions for visualization. This package is not affiliated with the
    Reactome team.
  home: https://bioconductor.org/packages/3.22/bioc/html/ReactomePA.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Reactome Pathway Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:reactomepa
  parent_recipe:
    name: bioconductor-reactomepa
    path: recipes/bioconductor-reactomepa
    version: 1.24.0
package:
  name: bioconductor-reactomepa
  version: 1.54.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-dose >=4.4.0,<4.5.0
  - bioconductor-enrichplot >=1.30.0,<1.31.0
  - bioconductor-graphite >=1.56.0,<1.57.0
  - bioconductor-reactome.db >=1.95.0,<1.96.0
  - r-base
  - r-ggplot2 >=3.3.5
  - r-ggraph
  - r-gson
  - r-igraph
  - r-yulab.utils >=0.1.5
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-dose >=4.4.0,<4.5.0
  - bioconductor-enrichplot >=1.30.0,<1.31.0
  - bioconductor-graphite >=1.56.0,<1.57.0
  - bioconductor-reactome.db >=1.95.0,<1.96.0
  - r-base
  - r-ggplot2 >=3.3.5
  - r-ggraph
  - r-gson
  - r-igraph
  - r-yulab.utils >=0.1.5
source:
  md5: 7df11f1d7c86a0c9d4386926322308eb
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ReactomePA_1.54.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ReactomePA/ReactomePA_1.54.0.tar.gz
  - https://bioarchive.galaxyproject.org/ReactomePA_1.54.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-reactomepa/bioconductor-reactomepa_1.54.0_src_all.tar.gz
test:
