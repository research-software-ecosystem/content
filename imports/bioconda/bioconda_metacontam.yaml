about:
  home: https://github.com/Lifemining-lab/Metacontam
  license: MIT
  license_file: LICENSE
  summary: Contamination detection tool for metagenomic sequencing data
build:
  noarch: generic
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps
extra:
  recipe-maintainers:
  - iamjunwoojo
package:
  name: metacontam
  version: 0.0.1
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - pandas >=2.0.3
  - numpy >=1.25.2
  - networkx >=3.1
  - biopython >=1.74
  - matplotlib-base >=3.8.2
  - kraken2 >=2.1.3
  - bracken >=2.8
  - bowtie2 >=2.5
  - samtools >=1.10
  - mash >=2.1
  - r-netcomi >=1.1.0
source:
  sha256: fc74e050b5e298c375812baed02074118a082c8f06243b2bb256e9c9f5d35ce1
  url: https://github.com/Lifemining-lab/Metacontam/archive/refs/tags/v0.0.1.tar.gz
test:
  commands:
  - metacontam --help
