  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: c758fb82c26f4ce0745d43dbacb8835f
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HEEBOdata_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HEEBOdata/HEEBOdata_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/HEEBOdata_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-heebodata/bioconductor-heebodata_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HEEBOdata')"
