  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: HEEBO set and HEEBO controls.
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-heebodata
  version: 1.48.0
requirements:
