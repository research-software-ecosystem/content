about:
  description: Provides SummarizedExperiment-like containers for storing and manipulating
    dimensionally-reduced assay data. The ReducedExperiment classes allow users to
    simultaneously manipulate their original dataset and their decomposed data, in
    addition to other method-specific outputs like feature loadings. Implements utilities
    and specialised classes for the application of stabilised independent component
    analysis (sICA) and weighted gene correlation network analysis (WGCNA).
  home: https://bioconductor.org/packages/3.22/bioc/html/ReducedExperiment.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Containers and tools for dimensionally-reduced -omics representations
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
