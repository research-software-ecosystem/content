about:
  description: A collection of Bioinformatics tools and pipelines based on R and the
    Common Workflow Language.
  home: https://bioconductor.org/packages/3.22/bioc/html/RcwlPipelines.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Bioinformatics pipelines based on Rcwl
build:
  noarch: generic
  number: 1
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rcwlpipelines
  version: 1.26.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-rcwl >=1.26.0,<1.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-git2r
  - r-httr
  - r-rappdirs
  - nodejs <24
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-rcwl >=1.26.0,<1.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-git2r
  - r-httr
  - r-rappdirs
  - nodejs <24
source:
  md5: 8c3b92b7c5a7ceb89c53c4ac69bc59a1
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RcwlPipelines_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RcwlPipelines/RcwlPipelines_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/RcwlPipelines_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rcwlpipelines/bioconductor-rcwlpipelines_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RcwlPipelines')"
