  - bioconductor-data-packages >=20260207
source:
  md5: 2af71afb3bb666e5b9ff04864c2970cf
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/ITALICSData_2.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ITALICSData/ITALICSData_2.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/ITALICSData_2.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-italicsdata/bioconductor-italicsdata_2.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ITALICSData')"
