about:
  dev_url: https://github.com/OlmLab/ZipStrain
  home: https://github.com/OlmLab/ZipStrain
  license: MIT
  license_family: MIT
  summary: Fast strain-level metagenomics.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-cache-dir --no-build-isolation -vvv
package:
  name: zipstrain
  version: 0.9.14
requirements:
  host:
  - python >=3.12
  - poetry-core
  - pip
  run:
  - python >=3.12
  - samtools
  - click
  - polars
  - plotly
  - numpy
  - python-duckdb
  - seaborn-base
  - scipy
  - pyarrow
  - intervaltree
  - aiofiles
  - pydantic
  - rich
  - psutil
source:
  sha256: edf169923fa034e2062621e7f31dc58bd22c842f6f3db94443b443b08511ef16
  url: https://pypi.org/packages/source/z/zipstrain/zipstrain-0.9.14.tar.gz
test:
  commands:
  - zipstrain --help
  - samtools --version
  imports:
  - zipstrain
