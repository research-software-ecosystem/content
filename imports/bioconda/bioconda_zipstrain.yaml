about:
  dev_url: https://github.com/OlmLab/ZipStrain
  home: https://github.com/OlmLab/ZipStrain
  license: MIT
  license_family: MIT
  summary: Fast strain-level metagenomics.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-cache-dir --no-build-isolation -vvv
package:
  name: zipstrain
  version: 0.8.0
requirements:
  host:
  - python >=3.12
  - poetry-core
  - pip
  run:
  - python >=3.12
  - samtools
  - click
  - polars
  - plotly
  - numpy
  - python-duckdb
  - seaborn-base
  - scipy
  - pyarrow
  - intervaltree
  - aiofiles
  - pydantic
  - rich
  - psutil
source:
  sha256: eb2e228953fe4d8062a61484e5de47ddf5b0a5fa5b3b5e010642464b72b54d47
  url: https://pypi.org/packages/source/z/zipstrain/zipstrain-0.8.0.tar.gz
test:
  commands:
  - zipstrain --help
  - samtools --version
  imports:
  - zipstrain
