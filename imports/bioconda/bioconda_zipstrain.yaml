about:
  dev_url: https://github.com/OlmLab/ZipStrain
  home: https://github.com/OlmLab/ZipStrain
  license: MIT
  license_family: MIT
  summary: Fast strain-level metagenomics.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-cache-dir --no-build-isolation -vvv
package:
  name: zipstrain
  version: 0.7.6
requirements:
  host:
  - python >=3.12
  - poetry-core
  - pip
  run:
  - python >=3.12
  - samtools
  - click
  - polars
  - plotly
  - numpy
  - python-duckdb
  - seaborn-base
  - scipy
  - pyarrow
  - intervaltree
  - aiofiles
  - pydantic
  - rich
  - psutil
source:
  sha256: d77ffedcafa69b981e3e8867a18939c6b2d2e8d6e66bcb93f801442fd864808e
  url: https://pypi.org/packages/source/z/zipstrain/zipstrain-0.7.6.tar.gz
test:
  commands:
  - zipstrain --help
  - samtools --version
  imports:
  - zipstrain
