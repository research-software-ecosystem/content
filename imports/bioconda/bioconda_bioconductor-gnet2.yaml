about:
  description: Cluster genes to functional groups with E-M process. Iteratively perform
    TF assigning and Gene assigning, until the assignment of genes did not change,
    or max number of iterations is reached.
  home: https://bioconductor.org/packages/3.22/bioc/html/GNET2.html
  license: Apache License 2.0
  summary: Constructing gene regulatory networks from expression data through functional
    module inference
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:gnet2
package:
  name: bioconductor-gnet2
  version: 1.26.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-diagrammer
  - r-dplyr
  - r-ggplot2
  - r-igraph
  - r-matrixstats
  - r-rcpp
  - r-reshape2
  - r-xgboost
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-diagrammer
  - r-dplyr
  - r-ggplot2
  - r-igraph
  - r-matrixstats
  - r-rcpp
  - r-reshape2
  - r-xgboost
source:
  md5: 5605d6c87e4979f44d50cc212f217d39
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GNET2_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GNET2/GNET2_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/GNET2_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gnet2/bioconductor-gnet2_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GNET2')"
