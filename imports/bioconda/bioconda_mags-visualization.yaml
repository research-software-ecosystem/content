about:
  home: https://github.com/usegalaxy-eu/MAGs-visualization
  license: GPL-3.0
  license_family: GPL3
  license_file: LICENSE
  summary: Visualization toolkit for MAG quality, taxonomy, clustering, abundance
    patterns and functional annotation.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - python -m pip install . --no-deps -vv
extra:
  recipe-maintainers:
  - alexandrah1704
package:
  name: mags-visualization
  version: 0.0.7
requirements:
  host:
  - python >=3.9,<3.13
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.9,<3.13
  - pandas
  - numpy
  - matplotlib-base
  - seaborn
  - plotly
  - networkx
  - python-kaleido
source:
  sha256: cc3f64dba1e30cb72e30679a14d5657f7f1a594cd8cb400005633bc10114dd71
  url: https://github.com/usegalaxy-eu/MAGs-visualization/archive/refs/tags/v0.0.7.tar.gz
test:
  commands:
  - mags-visualization --help
  imports:
  - mags_visualization
  - mags_visualization.sanky_taxa
