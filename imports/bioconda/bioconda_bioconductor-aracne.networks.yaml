about:
  description: This package contains ARACNe-inferred networks from TCGA tumor datasets.
    It also contains a function to export them into plain-text format.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/aracne.networks.html
  license: file LICENSE
  license_file: LICENSE
  summary: ARACNe-inferred gene networks from TCGA tumor datasets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-aracne.networks
  version: 1.36.0
requirements:
  host:
  - bioconductor-viper >=1.44.0,<1.45.0
  - r-base
  run:
  - bioconductor-viper >=1.44.0,<1.45.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 11cddeaba1a0c3ae4acb1cf3940f99ac
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/aracne.networks_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/aracne.networks/aracne.networks_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/aracne.networks_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-aracne.networks/bioconductor-aracne.networks_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('aracne.networks')"
