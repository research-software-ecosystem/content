about:
  description: Statistics implemented for both peak-wise and gene-wise associations.
    In peak-wise associations, the p-value of the target genes of a given set of peaks
    are calculated. Negative binomial or Poisson distributions can be used for modeling
    the unweighted peaks targets and log-nromal can be used to model the weighted
    peaks. In gene-wise associations a table consisting of a set of genes, mapped
    to specific peaks, is generated using the given rules.
  home: https://bioconductor.org/packages/3.22/bioc/html/Site2Target.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: An R package to associate peaks and target genes
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-site2target
  version: 1.2.0
