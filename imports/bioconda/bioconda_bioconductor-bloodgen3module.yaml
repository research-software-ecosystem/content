about:
  description: The BloodGen3Module package provides functions for R user performing
    module repertoire analyses and generating fingerprint representations. Functions
    can perform group comparison or individual sample analysis and visualization by
    fingerprint grid plot or fingerprint heatmap. Module repertoire analyses typically
    involve determining the percentage of the constitutive genes for each module that
    are significantly increased or decreased. As we describe in details;https://www.biorxiv.org/content/10.1101/525709v2
    and https://pubmed.ncbi.nlm.nih.gov/33624743/, the results of module repertoire
    analyses can be represented in a fingerprint format, where red and blue spots
    indicate increases or decreases in module activity. These spots are subsequently
    represented either on a grid, with each position being assigned to a given module,
    or in a heatmap where the samples are arranged in columns and the modules in rows.
  home: https://bioconductor.org/packages/3.22/bioc/html/BloodGen3Module.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: This R package for performing module repertoire analyses and generating
    fingerprint representations
