about:
  description: Tools for data management, count preprocessing, and differential analysis
    in massively parallel report assays (MPRA).
  home: https://bioconductor.org/packages/3.22/bioc/html/mpra.html
  license: Artistic-2.0
  summary: Analyze massively parallel reporter assays
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mpra
  version: 1.32.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-scales
  - r-statmod
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-scales
  - r-statmod
source:
  md5: 78fdb827c21c84eced61f6373b19eb89
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/mpra_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/mpra/mpra_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/mpra_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mpra/bioconductor-mpra_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('mpra')"
