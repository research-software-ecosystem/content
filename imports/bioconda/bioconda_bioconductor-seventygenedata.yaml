about:
  description: Gene expression data for the two breast cancer cohorts published by
    van't Veer and Van de Vijver in 2002.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/seventyGeneData.html
  license: Artistic-2.0
  summary: ExpressionSets from the van't Veer and Van de Vijver breast cancer studies
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-seventygenedata
  version: 1.46.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: e158487024756c5c4e543bbf084e91d7
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/seventyGeneData_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/seventyGeneData/seventyGeneData_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/seventyGeneData_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-seventygenedata/bioconductor-seventygenedata_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('seventyGeneData')"
