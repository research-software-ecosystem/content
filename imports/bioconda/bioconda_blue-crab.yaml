about:
  dev_url: https://github.com/Psy-Fer/blue-crab
  doc_url: https://github.com/Psy-Fer/blue-crab/blob/v0.5.0/docs/cli.md
  home: https://github.com/Psy-Fer/blue-crab
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: lossless nanopore pod5 <=> s/blow5 file conversion
build:
  entry_points:
  - blue-crab = blue_crab.blue_crab:main
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - sed -i.bak 's|find_packages|find_namespace_packages|' setup.py
  - rm -rf *.bak
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv
extra:
  recipe-maintainers:
  - hasindu2008
  - Psy-Fer
package:
  name: blue-crab
  version: 0.5.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  - zlib
  - pod5 >=0.3.35
  - pyslow5 >=1.4.0
  run:
  - python >=3.9
  - pod5 >=0.3.35
  - pyslow5 >=1.4.0
  - pyarrow
source:
  sha256: 4c3bd9f14e1760a00f3ad8e479efc3e5832f991544ebbd41d6986c31f1d2cc4d
  url: https://pypi.org/packages/source/b/blue-crab/blue_crab-0.5.0.tar.gz
test:
  commands:
  - blue-crab --help
  - blue-crab --version
