about:
  description: This package calculates probabilistic pathway scores using gene expression
    data. Gene expression values are aggregated into pathway-based scores using Bayesian
    network representations of biological pathways.
  home: https://bioconductor.org/packages/3.22/bioc/html/PROPS.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: PRObabilistic Pathway Score (PROPS)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-props
  version: 1.32.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-bnlearn
  - r-reshape2
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-bnlearn
  - r-reshape2
source:
  md5: bb615dd58fe93782d1a1974ded0e7f79
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/PROPS_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/PROPS/PROPS_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/PROPS_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-props/bioconductor-props_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('PROPS')"
