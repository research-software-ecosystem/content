about:
  description: This package serves as an upstream pipeline for pre-processing sequencing-based
    spatial transcriptomics data. Functions includes FASTQ trimming, BAM file reformatting,
    index building, spatial barcode detection, demultiplexing, gene count matrix generation
    with UMI deduplication, QC, and revelant visualization. Config is an essential
    input for most of the functions which aims to improve reproducibility.
  home: https://bioconductor.org/packages/3.22/bioc/html/stPipe.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Upstream pre-processing for Sequencing-Based Spatial Transcriptomics
