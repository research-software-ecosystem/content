about:
  home: https://github.com/maxibor/sam2lca
  license: GPL-3.0
  license_file: LICENSE
  summary: Lowest Common Ancestor on SAM/BAM/CRAM alignment files.
build:
  entry_points:
  - sam2lca = sam2lca.cli:cli
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . --no-build-isolation --no-cache-dir --no-deps -vvv
extra:
  recipe-maintainers:
  - maxibor
package:
  name: sam2lca
  version: 1.1.4
requirements:
  host:
  - pip
  - python >=3.6
  - setuptools <81
  run:
  - python >=3.6
  - click
  - numpy
  - pandas
  - pysam
  - python-rocksdb
  - scipy
  - taxopy >=0.10.2
  - tqdm
  - xopen
  - setuptools <81
source:
  sha256: c1d26f67458c2ad3ff8541b4ecf672c97c81fd65c91092beefab10cdea6f945b
  url: https://pypi.org/packages/source/s/sam2lca/sam2lca-1.1.4.tar.gz
test:
  commands:
  - sam2lca --help
  imports:
  - sam2lca
