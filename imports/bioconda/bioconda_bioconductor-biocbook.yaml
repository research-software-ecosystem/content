about:
  description: A BiocBook can be created by authors (e.g. R developers, but also scientists,
    teachers, communicators, ...) who wish to 1) write (compile a body of biological
    and/or bioinformatics knowledge), 2) containerize (provide Docker images to reproduce
    the examples illustrated in the compendium), 3) publish (deploy an online book
    to disseminate the compendium), and 4) version (automatically generate specific
    online book versions and Docker images for specific Bioconductor releases).
  home: https://bioconductor.org/packages/3.22/bioc/html/BiocBook.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Write, containerize, publish and version Quarto books with Bioconductor
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biocbook
  version: 1.8.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-cli
  - r-dplyr
  - r-gert
  - r-gh
  - r-gitcreds
  - r-glue
  - r-httr
  - r-pak
  - r-purrr
  - r-quarto
  - r-renv
  - r-rlang
  - r-rprojroot
  - r-stringr
  - r-tibble
  - r-usethis
  - r-yaml
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-cli
  - r-dplyr
  - r-gert
  - r-gh
  - r-gitcreds
  - r-glue
  - r-httr
  - r-pak
  - r-purrr
  - r-quarto
  - r-renv
  - r-rlang
  - r-rprojroot
  - r-stringr
  - r-tibble
  - r-usethis
  - r-yaml
source:
  md5: c25a6f865b8e9c8fee2936410996759e
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BiocBook_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BiocBook/BiocBook_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/BiocBook_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biocbook/bioconductor-biocbook_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('BiocBook')"
