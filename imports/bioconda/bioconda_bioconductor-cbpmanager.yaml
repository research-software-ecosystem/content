about:
  description: This R package provides an R Shiny application that enables the user
    to generate, manage, and edit data and metadata files suitable for the import
    in cBioPortal for Cancer Genomics. Create cancer studies and edit its metadata.
    Upload mutation data of a patient that will be concatenated to the data_mutation_extended.txt
    file of the study. Create and edit clinical patient data, sample data, and timeline
    data. Create custom timeline tracks for patients.
  home: https://bioconductor.org/packages/3.22/bioc/html/cbpManager.html
  license: AGPL-3 + file LICENSE
  license_file: LICENSE
  summary: Generate, manage, and edit data and metadata files suitable for the import
    in cBioPortal for Cancer Genomics
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cbpmanager
  version: 1.18.0
