about:
  dev_url: https://github.com/htseq/htseq
  doc_url: https://htseq.readthedocs.io/en/latest
  home: https://github.com/htseq/htseq
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: HTSeq is a Python library to facilitate processing and analysis of data
    from high-throughput sequencing (HTS) experiments.
build:
  number: 2
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:htseq
  - usegalaxy-eu:htseq_count
  - doi:10.1093/bioinformatics/btu638
  - doi:10.1093/bioinformatics/btac166
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: htseq
  version: 2.1.2
requirements:
  build:
  - null
  host:
  - python
  - pip
  - cython
  - setuptools >=74.1
  - numpy
  - pysam
  - swig >=3.0.8
  run:
  - python
  - matplotlib-base
  - numpy
  - pysam
  - scipy
  - anndata
  - loompy
source:
  sha256: 69d5a6b9a832ea85edf8a32fbac591a8af2e32bb961d1f3843c48c9d03a77a82
  url: https://pypi.org/packages/source/h/htseq/htseq-2.1.2.tar.gz
test:
  commands:
  - htseq-count -h
  - htseq-qa -h
  - htseq-count-barcodes -h
  imports:
  - HTSeq._HTSeq_internal
  - HTSeq.StepVector
  - HTSeq.StretchVector
  - HTSeq.scripts.qa
  - HTSeq.scripts.count
  - HTSeq.scripts.count_with_barcodes
  - HTSeq.scripts.utils
  - HTSeq.features
  - HTSeq.scripts.count_features.count_features_per_file
  - HTSeq.scripts.count_features.reads_io_processor
  - HTSeq.scripts.count_features.reads_stats
