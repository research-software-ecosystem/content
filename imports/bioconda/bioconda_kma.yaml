about:
  dev_url: https://bitbucket.org/genomicepidemiology/kma
  doc_url: https://bitbucket.org/genomicepidemiology/kma/src/1.6.10/README.md
  home: https://bitbucket.org/genomicepidemiology/kma
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: KMA is a mapping method designed to map raw reads directly against redundant
    databases, in an ultra-fast manner using seed and extend.
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1093/nargab/lqaf116
  - usegalaxy-eu:kma_map
  - biotools:kma
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: kma
  version: 1.6.10
requirements:
  build:
  - make
  - null
  host:
  - zlib
source:
  sha256: 45719d0ce74fa59a76e4352b7a0800c193bf6f65643375f6576b940b4735cc16
  url: https://bitbucket.org/genomicepidemiology/kma/get/fdfc9b4bf3cc6fd252da0478685b1d8f5da6bd0a.tar.gz
test:
  commands:
  - kma -h | grep KMA >/dev/null
  - kma index -h | grep kma_index
  - kma shm -h | grep kma_shm >/dev/null
