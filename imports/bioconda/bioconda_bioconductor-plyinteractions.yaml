about:
  description: Operate on `GInteractions` objects as tabular data using `dplyr`-like
    verbs. The functions and methods in `plyinteractions` provide a grammatical approach
    to manipulate `GInteractions`, to facilitate their integration in genomic analysis
    workflows.
  home: https://bioconductor.org/packages/3.22/bioc/html/plyinteractions.html
  license: Artistic-2.0
  summary: Extending tidy verbs to genomic interactions
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-plyinteractions
  version: 1.8.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-interactionset >=1.38.0,<1.39.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-plyranges >=1.30.0,<1.31.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-rlang
  - r-tibble
  - r-tidyselect
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-interactionset >=1.38.0,<1.39.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-plyranges >=1.30.0,<1.31.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-rlang
  - r-tibble
  - r-tidyselect
source:
  md5: 4f6b5839866eccae821bdc84f63f4236
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/plyinteractions_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/plyinteractions/plyinteractions_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/plyinteractions_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-plyinteractions/bioconductor-plyinteractions_1.8.0_src_all.tar.gz
