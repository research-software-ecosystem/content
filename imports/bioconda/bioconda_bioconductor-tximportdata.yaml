about:
  description: This package provides the output of running various transcript abundance
    quantifiers on a set of 6 RNA-seq samples from the GEUVADIS project. The quantifiers
    were Cufflinks, RSEM, kallisto, Salmon and Sailfish. alevin example output is
    also included. Forr details on version numbers, sample information, and details
    on calls, see the package vignette.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/tximportData.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: tximportData
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tximportdata
  version: 1.38.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: f7006aaacb3c9f61eda3d8ae1b4fc531
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/tximportData_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/tximportData/tximportData_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/tximportData_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tximportdata/bioconductor-tximportdata_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('tximportData')"
