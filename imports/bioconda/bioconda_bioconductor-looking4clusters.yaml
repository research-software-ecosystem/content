about:
  description: Enables the interactive visualization of dimensional reduction, clustering,
    and cell properties for scRNA-Seq results. It generates an interactive HTML page
    using either a numeric matrix, SummarizedExperiment, SingleCellExperiment or Seurat
    objects as input. The input data can be projected into two-dimensional representations
    by applying dimensionality reduction methods such as PCA, MDS, t-SNE, UMAP, and
    NMF. Displaying multiple dimensionality reduction results within the same interface,
    with interconnected graphs, provides different perspectives that facilitate accurate
    cell classification. The package also integrates unsupervised clustering techniques,
    whose results that can be viewed interactively in the graphical interface. In
    addition to visualization, this interface allows manual selection of groups, labeling
    of cell entities based on processed meta-information, generation of new graphs
    displaying gene expression values for each cell, sample identification, and visual
    comparison of samples and clusters.
  home: https://bioconductor.org/packages/3.22/bioc/html/looking4clusters.html
  license: GPL-2 | GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Interactive Visualization of scRNA-Seq
