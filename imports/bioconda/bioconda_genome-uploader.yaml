about:
  dev_url: https://github.com/EBI-Metagenomics/genome_uploader
  home: https://github.com/EBI-Metagenomics/genome_uploader
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE.md
  summary: Python script to upload bins and MAGs in fasta format to ENA (European
    Nucleotide Archive).
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - Ge94
  - KateSakharova
package:
  name: genome-uploader
  version: 3.0.0
requirements:
  host:
  - python >=3.9
  - setuptools >=61.0.0
  - pip
  run:
  - python >=3.9
  - requests >=2.26,<3
  - pandas >=2.0.2
  - python-dotenv >=1.0
  - numpy ==1.26.0
  - click >=8.1.8,<9
  - mgnify-pipelines-toolkit >=1.4.22
  - ena-webin-cli >=9.0.1
  - retry >=0.9.2
source:
  sha256: a6c8231a5161ae2349fcc513a4a926bbbbf10589cd6347ca904652ad03994d64
  url: https://github.com/EBI-Metagenomics/genome_uploader/archive/v3.0.0.tar.gz
test:
  commands:
  - genome_upload --help
  - webin_cli_handler --help
  imports:
  - genomeuploader
