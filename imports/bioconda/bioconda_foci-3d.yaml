about:
  description: 'FOCI-3D (Footprinting Of Chromatin Interactions in 3D) is a toolkit
    for

    analyzing transcription factor footprints from Micro-C and related

    MNase-based chromosome conformation capture assays.

    '
  home: https://github.com/aryeelab/foci-3d
  license: MIT
  license_file: LICENSE
  summary: FOCI-3D tools for Micro-C transcription factor footprint analysis
build:
  entry_points:
  - foci-3d = foci3d.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - aryeelab
package:
  name: foci-3d
  version: 0.2.0
requirements:
  host:
  - python >=3.10
  - hatchling >=1.27
  - pip
  run:
  - python >=3.10
  - joblib
  - matplotlib-base
  - numpy >=1.22,<2.0a0
  - pairtools
  - pandas
  - psutil
  - pysam
  - samtools
  - scikit-image
  - scipy
  - seaborn
  - statsmodels
  - tqdm
  - htslib
source:
  sha256: 2cf59d4dcf8a98ce461dc537b89e93148ef6afa50f3132e45615f36a994698ef
  url: https://github.com/aryeelab/foci-3d/archive/refs/tags/v0.2.0.tar.gz
test:
  commands:
  - foci-3d --version
  - foci-3d --help
  - foci-3d parse --help
  - foci-3d count --help
  - foci-3d detect --help
  - foci-3d plot --help
  imports:
  - foci3d
  requires:
  - pip
