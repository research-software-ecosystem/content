about:
  home: https://github.com/vansteensellab/PARM
  license: https://github.com/vansteensellab/PARM/blob/main/LICENSE
  summary: 'PARM: Promoter Activity Regulatory Model'
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv'
extra:
  identifiers:
  - doi:10.1038/s41586-025-10093-z
package:
  name: parm
  version: 0.2.6
requirements:
  host:
  - python
  - pip
  - setuptools
  run:
  - python
  - pytorch
  - biopython
  - numpy >=1.26.0
  - pandas
  - matplotlib-base
  - logomaker
  - tqdm
  - seaborn
  - einops
  - optuna
  - scikit-learn
  - h5py
source:
- sha256: 11792d8520dc6992e18d8b3ba9be7acfe7d8d40e42c350e2a3b4ec5db6704b8b
  url: https://github.com/vansteensellab/PARM/archive/refs/tags/v0.2.6.tar.gz
test:
  commands:
  - parm train --help
