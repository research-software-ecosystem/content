about:
  home: https://github.com/pinin4fjords/nf-metro
  license: MIT
  license_file: LICENSE
  summary: Metromap-style pipeline workflow components
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - pinin4fjords
  - matthdsm
package:
  name: nf-metro
  version: 0.5.4
requirements:
