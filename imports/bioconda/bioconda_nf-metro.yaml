  - python >=3.10
  - pip
  - hatchling
  run:
  - python >=3.10
  - click >=8.0
  - drawsvg >=2.0
  - networkx >=3.0
  - pillow >=9.0
source:
  sha256: d6ecc649c9403c1985619075e7cc5fd4e337cbb7399d2aa1940f08b2284cacbe
  url: https://pypi.io/packages/source/n/nf-metro/nf_metro-0.5.4.tar.gz
test:
  commands:
  - nf-metro --help
