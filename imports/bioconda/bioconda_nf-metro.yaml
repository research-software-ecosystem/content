about:
  home: https://github.com/pinin4fjords/nf-metro
  license: MIT
  license_file: LICENSE
  summary: Metromap-style pipeline workflow components
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - pinin4fjords
  - matthdsm
package:
  name: nf-metro
  version: 0.6.1
requirements:
  host:
  - python >=3.10
  - pip
  - hatchling
  run:
  - python >=3.10
  - click >=8.0
  - drawsvg >=2.0
  - networkx >=3.0
  - pillow >=9.0
source:
  sha256: faeea226d95fb44c89fe73317c4b19429a5d094b3c370c65bc2e2e4d8daff64e
  url: https://pypi.io/packages/source/n/nf-metro/nf_metro-0.6.1.tar.gz
test:
  commands:
  - nf-metro --help
