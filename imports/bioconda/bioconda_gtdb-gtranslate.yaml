about:
  doc_url: https://cmc-aau.github.io/gTranslate
  home: https://pypi.org/project/gtdb-gtranslate/
  license: GPL-3.0-only
  license_file: LICENSE
  summary: software tool designed to accurately identify the genetic translation table
    (GTT) used in prokaryotic organisms.
build:
  entry_points:
  - gtranslate = gtranslate.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - pchaumeil
  - donovan-h-parks
package:
  name: gtdb-gtranslate
  version: 0.0.3
requirements:
  host:
  - python >=3.12
  - setuptools >=61.0
  - wheel
  - pip
  run:
  - python >=3.12
  - joblib >=1.3,<2.dev0
  - numpy >=1.26.4,<2.0.0
  - pandas >=2.2,<3.dev0
  - scikit-learn ==1.6.1
  - scipy >=1.12,<2.dev0
  - tqdm >=4.67,<5.dev0
  - mlxtend >=0.23,<0.24.0
  - plotly >=5.15,<6.dev0
  - xgboost ==2.1.4
  - lightgbm ==4.6.0
  - requests >=2.32.3
source:
  sha256: 0b5f8168d76f1ee31ddc81561180270f2a942658465a8a808b674504bfb678ed
  url: https://pypi.org/packages/source/g/gtdb-gtranslate/gtdb_gtranslate-0.0.3.tar.gz
test:
  commands:
  - pip check
  - gtranslate --help
  imports:
  - gtranslate
  requires:
  - pip
  - python
