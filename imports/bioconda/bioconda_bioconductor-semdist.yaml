about:
  description: This package implements methods to calculate information accretion
    for a given version of the gene ontology and uses this data to calculate remaining
    uncertainty, misinformation, and semantic similarity for given sets of predicted
    annotations and true annotations from a protein function predictor.
  home: https://bioconductor.org/packages/3.22/bioc/html/SemDist.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Information Accretion-based Function Predictor Evaluation
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:semdist
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-semdist
    path: recipes/bioconductor-semdist
    version: 1.14.0
package:
  name: bioconductor-semdist
  version: 1.44.0
requirements:
  host:
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - r-base
  run:
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - r-base
source:
  md5: d29b679207b1a0323b3ce122f731c696
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SemDist_1.44.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SemDist/SemDist_1.44.0.tar.gz
  - https://bioarchive.galaxyproject.org/SemDist_1.44.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-semdist/bioconductor-semdist_1.44.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SemDist')"
