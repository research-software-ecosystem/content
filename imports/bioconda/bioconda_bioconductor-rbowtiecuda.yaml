about:
  description: This package provides an R wrapper for the popular Bowtie2 sequencing
    read aligner, optimized to run on NVIDIA graphics cards. It includes wrapper functions
    that enable both genome indexing and alignment to the generated indexes, ensuring
    high performance and ease of use within the R environment.
  home: https://bioconductor.org/packages/3.22/bioc/html/RbowtieCuda.html
  license: BSD_3_clause + file LICENSE
  license_file: LICENSE
  summary: An R Wrapper for nvBowtie and nvBWT, a rewritten version of Bowtie2 for
    cuda
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rbowtiecuda
  version: 1.2.0
requirements:
  build:
  - null
  - null
  - automake
  - make
  host:
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
source:
  md5: d5810006727977aa74b93c7035f261df
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RbowtieCuda_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RbowtieCuda/RbowtieCuda_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/RbowtieCuda_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rbowtiecuda/bioconductor-rbowtiecuda_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RbowtieCuda')"
