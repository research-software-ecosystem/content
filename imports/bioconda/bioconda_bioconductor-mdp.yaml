about:
  description: The Molecular Degree of Perturbation webtool quantifies the heterogeneity
    of samples. It takes a data.frame of omic data that contains at least two classes
    (control and test) and assigns a score to all samples based on how perturbed they
    are compared to the controls. It is based on the Molecular Distance to Health
    (Pankla et al. 2009), and expands on this algorithm by adding the options to calculate
    the z-score using the modified z-score (using median absolute deviation), change
    the z-score zeroing threshold, and look at genes that are most perturbed in the
    test versus control classes.
  home: https://bioconductor.org/packages/3.22/bioc/html/mdp.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Molecular Degree of Perturbation calculates scores for transcriptome data
    samples based on their perturbation from controls
build:
  noarch: generic
  number: 0
  rpaths:
