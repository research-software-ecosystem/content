about:
  description: This R package provides access to the Qtlizer web server. Qtlizer annotates
    lists of common small variants (mainly SNPs) and genes in humans with associated
    changes in gene expression using the most comprehensive database of published
    quantitative trait loci (QTLs).
  home: https://bioconductor.org/packages/3.22/bioc/html/Qtlizer.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Comprehensive QTL annotation of GWAS results
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-qtlizer
  version: 1.24.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-curl
  - r-httr
  - r-stringi
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-curl
  - r-httr
  - r-stringi
source:
  md5: 713c9ea5af9335fcb4ce6f0c86ac8ded
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Qtlizer_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Qtlizer/Qtlizer_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/Qtlizer_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-qtlizer/bioconductor-qtlizer_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Qtlizer')"
