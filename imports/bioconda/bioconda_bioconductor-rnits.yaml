about:
  description: R/Bioconductor package for normalization, curve registration and inference
    in time course gene expression data.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rnits.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: R Normalization and Inference of Time Series data
build:
  noarch: generic
  number: 0
