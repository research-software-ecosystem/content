about:
  description: Tools for NanoString Technologies GeoMx Technology. Package to easily
    graph on top of an OME-TIFF image. Plotting annotations can range from tissue
    segment to gene expression.
  home: https://bioconductor.org/packages/3.22/bioc/html/SpatialOmicsOverlay.html
  license: MIT
  summary: Spatial Overlay for Omic Data from Nanostring GeoMx Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spatialomicsoverlay
  version: 1.10.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-geomxtools >=3.14.0,<3.15.0
  - bioconductor-rbioformats >=1.10.0,<1.11.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-base64enc
