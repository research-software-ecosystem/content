about:
  description: A package for inferring, comparing, and visualizing gene networks from
    single-cell RNA sequencing data. It integrates multiple methods (GENIE3, GRNBoost2,
    ZILGM, PCzinb, and JRF) for robust network inference, supports consensus building
    across methods or datasets, and provides tools for evaluating regulatory structure
    and community similarity. GRNBoost2 requires Python package 'arboreto' which can
    be installed using init_py(install_missing = TRUE). This package includes adapted
    functions from ZILGM (Park et al., 2021), JRF (Petralia et al., 2015), and learn2count
    (Nguyen et al. 2023) packages with proper attribution under GPL-2 license.
  home: https://bioconductor.org/packages/3.22/bioc/html/scGraphVerse.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: 'scGraphVerse: A Gene Network Analysis Package'
