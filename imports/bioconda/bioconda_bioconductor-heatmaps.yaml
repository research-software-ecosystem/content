about:
  description: This package provides functions for plotting heatmaps of genome-wide
    data across genomic intervals, such as ChIP-seq signals at peaks or across promoters.
    Many functions are also provided for investigating sequence features.
  home: https://bioconductor.org/packages/3.22/bioc/html/heatmaps.html
  license: Artistic-2.0
  summary: Flexible Heatmaps for Functional Genomics and Sequence Features
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-heatmaps
    path: recipes/bioconductor-heatmaps
    version: 1.4.0
package:
  name: bioconductor-heatmaps
  version: 1.34.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-kernsmooth
  - r-matrix
  - r-plotrix
  - r-rcolorbrewer
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-kernsmooth
  - r-matrix
  - r-plotrix
  - r-rcolorbrewer
source:
  md5: bc299657fed4cec55e33ea156f9094a1
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/heatmaps_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/heatmaps/heatmaps_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/heatmaps_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-heatmaps/bioconductor-heatmaps_1.34.0_src_all.tar.gz
