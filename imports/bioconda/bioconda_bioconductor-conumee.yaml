about:
  description: This package contains a set of processing and plotting methods for
    performing copy-number variation (CNV) analysis using Illumina 450k or EPIC methylation
    arrays.
  home: https://bioconductor.org/packages/3.22/bioc/html/conumee.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Enhanced copy-number variation analysis using Illumina DNA methylation
    arrays
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-conumee
  version: 1.44.0
requirements:
  host:
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylation450kmanifest >=0.4.0,<0.5.0
  - bioconductor-illuminahumanmethylationepicanno.ilm10b2.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylationepicmanifest >=0.3.0,<0.4.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  run:
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylation450kmanifest >=0.4.0,<0.5.0
  - bioconductor-illuminahumanmethylationepicanno.ilm10b2.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylationepicmanifest >=0.3.0,<0.4.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
