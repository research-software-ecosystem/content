about:
  description: This package contains the processed harmonized TCGA data of five cancer
    types used in "Tianle Ma and Aidong Zhang, Integrate Multi-omic Data Using Affinity
    Network Fusion (ANF) for Cancer Patient Clustering".
  home: https://bioconductor.org/packages/3.22/data/experiment/html/HarmonizedTCGAData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Processed Harmonized TCGA Data of Five Selected Cancer Types
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-harmonizedtcgadata
  version: 1.32.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 111cfba5d0567203269177db90f476f6
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HarmonizedTCGAData_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HarmonizedTCGAData/HarmonizedTCGAData_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/HarmonizedTCGAData_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-harmonizedtcgadata/bioconductor-harmonizedtcgadata_1.32.0_src_all.tar.gz
test:
