about:
  description: AnnotationHub package containing datasets for use in the TENET package.
    Includes GenomicRanges objects representing putative enhancer, promoter, and open
    chromatin regions. All included datasets are aligned to the hg38 human genome.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/TENET.AnnotationHub.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Annotation data for the TENET package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tenet.annotationhub
  version: 1.1.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 5dd1a5b2c28549c7e02092cdc420275f
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/TENET.AnnotationHub_1.1.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TENET.AnnotationHub/TENET.AnnotationHub_1.1.0.tar.gz
  - https://bioarchive.galaxyproject.org/TENET.AnnotationHub_1.1.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tenet.annotationhub/bioconductor-tenet.annotationhub_1.1.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TENET.AnnotationHub')"
