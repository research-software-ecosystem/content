about:
  home: https://github.com/superbio-zhangwei/seqcal
  license: Apache-2.0
  license_file: LICENSE
  summary: Primer-guided sequence extraction and copy-number calculation tool
build:
  entry_points:
  - seqcal = seqcal.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - superbio-zhangwei
package:
  name: seqcal
  version: '1.0'
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools >=61
  run:
  - python >=3.8
  - pandas >=1.5
  - tqdm >=4.60
  - seqkit
source:
  sha256: 50af3e26710ed4e0da6062c9566f16b8e0235f0e0685e0c32b8d1edfe6336a4f
  url: https://github.com/superbio-zhangwei/seqcal/archive/refs/tags/v1.0.tar.gz
test:
  commands:
  - seqcal --help
  imports:
  - seqcal
