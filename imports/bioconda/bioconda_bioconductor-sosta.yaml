about:
  description: sosta (Spatial Omics STructure Analysis) is a package for analyzing
    spatial omics data to explore tissue organization at the anatomical structure
    level. It reconstructs anatomically relevant structures based on molecular features
    or cell types. It further calculates a range of metrics at the structure level
    to quantitatively describe tissue architecture. The package is designed to integrate
    with other packages for the analysis of spatial omics data.
  home: https://bioconductor.org/packages/3.22/bioc/html/sosta.html
  license: GPL (>= 3) + file LICENSE
  license_file: LICENSE
  summary: A package for the analysis of anatomical tissue structures in spatial omics
    data
