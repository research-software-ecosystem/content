about:
  description: Statistical methods for differential discovery analyses in high-dimensional
    cytometry data (including flow cytometry, mass cytometry or CyTOF, and oligonucleotide-tagged
    cytometry), based on a combination of high-resolution clustering and empirical
    Bayes moderated tests adapted from transcriptomics.
  home: https://bioconductor.org/packages/3.22/bioc/html/diffcyt.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Differential discovery in high-dimensional cytometry via high-resolution
    clustering
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-diffcyt
  version: 1.30.0
requirements:
  host:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowsom >=2.18.0,<2.19.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-circlize
  - r-dplyr
  - r-lme4
  - r-magrittr
  - r-multcomp
  - r-reshape2
  - r-tidyr
  run:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
