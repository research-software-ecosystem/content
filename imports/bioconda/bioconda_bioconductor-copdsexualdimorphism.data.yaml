  - https://bioarchive.galaxyproject.org/COPDSexualDimorphism.data_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-copdsexualdimorphism.data/bioconductor-copdsexualdimorphism.data_1.46.0_src_all.tar.gz
test:
