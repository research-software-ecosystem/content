about:
  description: Access to internal data required for the functional performance of
    easier package and exemplary bladder cancer dataset with both processed RNA-seq
    data and information on response to ICB therapy generated by Mariathasan et al.
    "TGF-B attenuates tumour response to PD-L1 blockade by contributing to exclusion
    of T cells", published in Nature, 2018 [doi:10.1038/nature25501](https://doi.org/10.1038/nature25501).
    The data is made available via [`IMvigor210CoreBiologies`](http://research-pub.gene.com/IMvigor210CoreBiologies/)
    package under the CC-BY license.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/easierData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: easier internal data and exemplary dataset from IMvigor210CoreBiologies
    package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-easierdata
  version: 1.16.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 1a4f2a4cb88b4a38b8b8efceebd7291e
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/easierData_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/easierData/easierData_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/easierData_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-easierdata/bioconductor-easierdata_1.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('easierData')"
