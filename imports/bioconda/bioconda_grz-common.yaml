about:
  dev_url: https://github.com/BfArM-MVH/grz-tools
  home: https://github.com/BfArM-MVH/grz-tools
  license: MIT
  license_family: MIT
  summary: Common library for grz applications.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - tedil
  - Hoeze
package:
  name: grz-common
  version: 2.0.1
requirements:
  host:
  - python >=3.12
  - hatchling
  - pip
  run:
  - python >=3.12
  - boto3 >=1.36,<2
  - click >=8.2,<9
  - python-crypt4gh >=1.8.6,<2
  - jsonschema >=4.23.0,<5
  - pyyaml >=6.0.2,<7
  - tqdm >=4.66.5,<5
  - pydantic >=2.12,<3
  - pydantic-settings >=2.11,<3
  - platformdirs >=4.3.6,<5
  - grz-pydantic-models >=2.6,<3
  - grz-check-python >=0.3,<1
  - rich ==13.*
  - requests >=2.32.3,<3
source:
  sha256: 958f11dd8bdc86e1fc5a1b0be6cc7d47e307037da6e74e618c0cbdc4a92e89f4
  url: https://pypi.org/packages/source/g/grz-common/grz_common-2.0.1.tar.gz
test:
  commands:
  - pip check
  imports:
  - grz_common
  requires:
  - pip
