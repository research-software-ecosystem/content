about:
  description: Create, handle, validate, visualize and convert networks in the Cytoscape
    exchange (CX) format to standard data types and objects. The package also provides
    conversion to and from objects of iGraph and graphNEL. The CX format is also used
    by the NDEx platform, a online commons for biological networks, and the network
    visualization software Cytocape.
  home: https://bioconductor.org/packages/3.22/bioc/html/RCX.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: R package implementing the Cytoscape Exchange (CX) format
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rcx
  version: 1.14.1
requirements:
  host:
  - r-base
  - r-igraph
  - r-jsonlite
  - r-plyr
  run:
  - r-base
  - r-igraph
  - r-jsonlite
  - r-plyr
source:
  md5: cd7f0ddd6c52d1ab21cd5378cd821096
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RCX_1.14.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RCX/RCX_1.14.1.tar.gz
  - https://bioarchive.galaxyproject.org/RCX_1.14.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rcx/bioconductor-rcx_1.14.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('RCX')"
