about:
  home: https://github.com/millerlaboratory/needLR
  license: MIT
  summary: needLR is a command line tool that uses Truvari merging to compare query
    structural variant (SV) vcfs to our collection of 1000 Genomes Project (1KGP)
    samples sequenced by Oxford Nanopore Technologies long-read sequencing (ONT LRS).
build:
  noarch: generic
  number: 1
  run_exports:
  - null
package:
  name: needlr
  version: '4.0'
requirements:
  build:
  - sed >=4.7
  host:
  - sed >=4.7
  run:
  - bcftools >=1.23.1
  - bedtools >=2.31.1
  - truvari =4.2.2
  - gawk =4.2.1
  - coreutils =9.5
  - sed >=4.7
  - gzip >=1.9
  - grep >=3.1
source:
  sha256: 10684794a24a381536d8b38bf082d803b4b52556d966c0c58e9edbf39f4bb367
  url: https://s3.amazonaws.com/1000g-ont/needLR/needLR-4.0-release-patched.tar.gz
test:
  commands:
  - needLR --version
  - bcftools -h
  - bedtools -version
  - truvari version
  - sed --version
  - gawk --version
  - cut --version
  - paste --version
  - zgrep --version
  - grep --version
