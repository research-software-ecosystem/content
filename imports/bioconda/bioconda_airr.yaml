about:
  home: http://docs.airr-community.org
  license: CC BY 4.0
  license_family: CC
  summary: 'AIRR Community Data Representation Standard reference library for antibody
    and TCR sequencing data. Citations: AIRR standards <doi:10.5281/zenodo.1185414>.'
build:
  entry_points:
  - airr-tools=airr.tools:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - PertuyF
package:
  name: airr
  version: 2.0.0
requirements:
  host:
  - pip
  - python
  - setuptools
  run:
  - pandas >=0.18.0
  - python
  - pyyaml >=3.12
  - setuptools <78
  - yamlordereddictloader >=0.4.0
source:
  sha256: 3443d95e3088356ec9c5dc99f4879addd1ea1ee13fd43eb0a7ad9cf917838af3
  url: https://pypi.io/packages/source/a/airr/airr-2.0.0.tar.gz
test:
  commands:
  - airr-tools --help
  imports:
  - airr
  - airr.specs
  - tests
