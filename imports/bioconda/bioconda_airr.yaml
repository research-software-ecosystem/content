about:
  home: http://docs.airr-community.org
  license: CC BY 4.0
  license_family: CC
  summary: 'AIRR Community Data Representation Standard reference library for antibody
    and TCR sequencing data. Citations: AIRR standards <doi:10.5281/zenodo.1185414>.'
build:
  entry_points:
  - airr-tools=airr.tools:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - PertuyF
package:
  name: airr
  version: 1.6.1
requirements:
  host:
  - pip
  - python
  - setuptools
  run:
  - pandas >=0.18.0
  - python
  - pyyaml >=3.12
  - setuptools <78
  - yamlordereddictloader >=0.4.0
source:
  sha256: f701fde0440d5848e01374ce9026f6c6cf85cbbb412a148f95ffc53c9d1bdddb
  url: https://pypi.io/packages/source/a/airr/airr-1.6.1.tar.gz
test:
  commands:
  - airr-tools --help
  imports:
  - airr
  - airr.specs
  - tests
