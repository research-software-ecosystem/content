about:
  description: Provides various methods to load the pathways from the NCI Pathways
    Database in R graph objects and to re-format them.
  home: https://bioconductor.org/packages/3.22/bioc/html/NCIgraph.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Pathways from the NCI Pathways Database
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:ncigraph
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-ncigraph
    path: recipes/bioconductor-ncigraph
    version: 1.28.0
package:
  name: bioconductor-ncigraph
  version: 1.58.0
requirements:
  host:
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-kegggraph >=1.70.0,<1.71.0
  - bioconductor-rbgl >=1.86.0,<1.87.0
  - bioconductor-rcy3 >=2.30.0,<2.31.0
  - r-base
  - r-r.oo
  run:
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-kegggraph >=1.70.0,<1.71.0
  - bioconductor-rbgl >=1.86.0,<1.87.0
  - bioconductor-rcy3 >=2.30.0,<2.31.0
  - r-base
  - r-r.oo
source:
  md5: 99788722cd9ed544cffcfa0313edd95d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/NCIgraph_1.58.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/NCIgraph/NCIgraph_1.58.0.tar.gz
  - https://bioarchive.galaxyproject.org/NCIgraph_1.58.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ncigraph/bioconductor-ncigraph_1.58.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('NCIgraph')"
