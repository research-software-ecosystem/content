about:
  description: "It takes months to build infrastructure with the compute, storage,\
    \ and user-friendly interface necessary to run bioinformatics pipelines at scale.\n\
    \nThe Latch SDK is an open-source toolchain to define serverless bioinformatics\
    \ workflows with plain python and deploy associated no-code interfaces using single\
    \ command.\n\nBioinformatics workflows developed with the SDK automatically receive:\n\
    \  * Instant no-code interfaces for accessibility and publication\n  * First class\
    \ static typing\n  * Containerization and versioning of every registered change\n\
    \  * Reliable and scalable managed cloud infrastructure\n  * Single line definition\
    \ of arbitrary resource requirements (eg. CPU, GPU) for serverless execution\n"
  dev_url: https://github.com/latchbio/latch
  home: https://github.com/latchbio/latch
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The Latch python bioinformatics framework.
build:
  entry_points:
  - latch = latch_cli.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps  --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - nh13
package:
  name: latch
  version: 2.76.0
requirements:
  host:
  - python 3.10
  - hatchling
  - setuptools
  - pip
  run:
  - python >=3.10
  - aioconsole ==0.6.1
  - apscheduler >=3.10.0
  - asyncssh ==2.13.2
  - boto3 >=1.26.0
  - click >=8.0
  - dill >=0.4.0
  - docker-py >=7.1.0
  - gitpython ==3.1.40
  - gql ==3.5.0
  - graphql-core ==3.2.3
  - latch-persistence >=0.1.5
  - lytekit ==0.15.35
  - lytekitplugins-pods ==0.7.4
  - orjson >=3.10.12
  - paramiko >=3.4.0
  - pyjwt >=0.2.0
  - python-dateutil >=2.8
  - python-kubernetes >=24.2.0
  - pyxattr >=0.8.1
  - requests >=2.28.1
  - requests-toolbelt ==1.0.0
  - scp >=0.14.0
  - setuptools <78
  - tqdm >=4.63.0
  - typing-extensions >=4.12.0
  - watchfiles ==1.1.1
  - websockets ==11.0.3
source:
  sha256: 3af6c98bf048e00d1b06303fe4d63962c6953862b3f30e43a5f6284456cd5fa1
  url: https://pypi.org/packages/source/l/latch/latch-2.76.0.tar.gz
test:
  commands:
  - pip check || true
  - latch --help
  - latch --version
  imports:
  - latch
  - latch_cli
  - latch_sdk_gql.execute
  - latch_cli.services.k8s.attach
  - latch_cli.services.k8s.develop
  - latch_cli.services.k8s.execute
  - latch_cli.services.k8s.ws_utils
  - latch_cli.services.local_dev_old
  - latch.executions
  - latch.registry.table
  - latch.types.file
  - latch.types.directory
  - latch.ldata.path
  requires:
  - python 3.10
