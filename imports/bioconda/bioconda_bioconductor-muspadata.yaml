about:
  description: Data package containing a multi-sample multi-group spatial dataset
    in SpatialExperiment Bioconductor object format.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/muSpaData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Multi-sample multi-group spatially resolved transcriptomic data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-muspadata
  version: 1.2.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: bbd753ac03b3704db7050e714a5ee47a
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/muSpaData_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/muSpaData/muSpaData_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/muSpaData_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-muspadata/bioconductor-muspadata_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('muSpaData')"
