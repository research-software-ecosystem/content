about:
  description: The SimBenchData package contains a total of 35 single-cell RNA-seq
    datasets covering a wide range of data characteristics, including major sequencing
    protocols, multiple tissue types, and both human and mouse sources.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/SimBenchData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: 'SimBenchData: a collection of 35 single-cell RNA-seq data covering a wide
    range of data characteristics'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-simbenchdata
  version: 1.18.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: aec2e6976d8f608f7e6c917335902fe3
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/SimBenchData_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SimBenchData/SimBenchData_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/SimBenchData_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-simbenchdata/bioconductor-simbenchdata_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SimBenchData')"
