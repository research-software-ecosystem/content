about:
  dev_url: https://github.com/asadprodhan/blastdbbuilder
  home: https://github.com/asadprodhan/blastdbbuilder
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Build custom BLAST reference databases from NCBI genomes.
build:
  entry_points:
  - blastdbbuilder = blastdbbuilder.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - asadprodhan
package:
  name: blastdbbuilder
  version: 1.1.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools >=64
  run:
  - python >=3.9
  - blast
  - seqkit
  - ncbi-datasets-cli
source:
  sha256: c0dfd0fbd0d6e41858056633b970f5ac03919c3a1d9425ec756146fdb2ceacae
  url: https://pypi.org/packages/source/b/blastdbbuilder/blastdbbuilder-1.1.0.tar.gz
test:
  commands:
  - blastdbbuilder --help
