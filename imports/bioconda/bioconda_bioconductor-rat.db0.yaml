about:
  description: Base annotation databases for rat, intended ONLY to be used by AnnotationDbi
    to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/rat.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for rat
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rat.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 52b8d19f50300d53279eed2c7bced816
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/rat.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rat.db0/rat.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/rat.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rat.db0/bioconductor-rat.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rat.db0')"
