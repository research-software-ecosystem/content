about:
  dev_url: https://github.com/dcjones/proseg
  doc_url: https://github.com/dcjones/proseg/blob/v3.1.1/README.md
  home: https://github.com/dcjones/proseg
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.md
  summary: A Rust crate for running Proseg, a cell segmentation method for in situ
    spatial transcriptomics.
build:
  number: 0
  run_exports:
  - null
  script:
  - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
  - cargo install -v --locked --no-track --root $PREFIX --path .
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: rust-proseg
  version: 3.1.1
requirements:
  build:
  - null
  - null
  - null
  - cargo-bundle-licenses
source:
  sha256: 2c71d76a9f59f8464b7f5fcc8a652fd1d3aa7733dc76400f9d803818e720bb1d
  url: https://github.com/dcjones/proseg/archive/refs/tags/v3.1.1.tar.gz
test:
  commands:
  - proseg --version
  - proseg-to-baysor --help
