about:
  description: This package aims to import, parse, and analyze KEGG data such as KEGG
    PATHWAY and KEGG MODULE. The package supports visualizing KEGG information using
    ggplot2 and ggraph through using the grammar of graphics. The package enables
    the direct visualization of the results from various omics analysis packages.
  home: https://bioconductor.org/packages/3.22/bioc/html/ggkegg.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Analyzing and visualizing KEGG information using the grammar of graphics
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ggkegg
  version: 1.8.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-ggplot2
  - r-ggraph
  - r-gtable
  - r-igraph
  - r-magick
  - r-patchwork
  - r-shadowtext
  - r-stringr
  - r-tibble
  - r-tidygraph
  - r-xml
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-ggplot2
  - r-ggraph
  - r-gtable
  - r-igraph
  - r-magick
  - r-patchwork
  - r-shadowtext
  - r-stringr
  - r-tibble
  - r-tidygraph
  - r-xml
source:
  md5: 151b740f08ad91cf519d89fa7e2e3be9
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ggkegg_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ggkegg/ggkegg_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/ggkegg_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ggkegg/bioconductor-ggkegg_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ggkegg')"
