about:
  description: This package provides functions for interfacing with the Metabolomics
    Workbench RESTful API. Study, compound, protein and gene information can be searched
    for using the API. Methods to obtain study data in common Bioconductor formats
    such as SummarizedExperiment and MultiAssayExperiment are also included.
  home: https://bioconductor.org/packages/3.22/bioc/html/metabolomicsWorkbenchR.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Metabolomics Workbench in R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-metabolomicsworkbenchr
  version: 1.20.0
requirements:
  host:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-struct >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table
  - r-httr
  - r-jsonlite
  run:
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-struct >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table
  - r-httr
  - r-jsonlite
source:
  md5: 1f769020ccacb4bfc921e6cb1501eb5f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/metabolomicsWorkbenchR_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/metabolomicsWorkbenchR/metabolomicsWorkbenchR_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/metabolomicsWorkbenchR_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-metabolomicsworkbenchr/bioconductor-metabolomicsworkbenchr_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('metabolomicsWorkbenchR')"
