about:
  description: 'A toolkit for performing primer inference in sequencing reads.

    '
  dev_url: https://github.com/EBI-Metagenomics/PIMENTO
  home: https://github.com/EBI-Metagenomics/PIMENTO
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: A PrIMEr infereNce TOolkit to facilitate large-scale calling of metabarcoding
    amplicon sequence variants.
build:
  entry_points:
  - pimento = pimento.pimento_cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - chrisAta
package:
  name: mi-pimento
  version: 1.0.3
requirements:
  host:
  - python >=3.10
  - setuptools >=61.0
  - pip
  run:
  - python >=3.10
  - biopython ==1.82
  - numpy ==1.26.0
  - pandas ==2.0.2
  - regex ==2023.12.25
  - click ==8.1.7
  - pyfastx >=2.2.0
  - rich ==13.9.4
source:
  sha256: f8ac3faf1aea7fba5761158d420b8c97812a49da82af1a0f0fb841402855da6b
  url: https://pypi.org/packages/source/m/mi-pimento/mi_pimento-1.0.3.tar.gz
test:
  commands:
  - pimento --help
  imports:
  - pimento
