about:
  description: 'pridepy is a Python client library that enables users to download
    and

    search proteomics data from the PRIDE database. It supports multiple

    download protocols including FTP, Aspera, Globus, and S3.

    '
  dev_url: https://github.com/PRIDE-Archive/pridepy
  doc_url: https://github.com/PRIDE-Archive/pridepy
  home: https://github.com/PRIDE-Archive/pridepy
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Python Client library for PRIDE Rest API
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - jonasscheid
  - ypriverol
package:
  name: pridepy
  version: 0.0.16
requirements:
  host:
  - python >=3.9
  - poetry-core
  - pip
  - setuptools
  run:
  - python >=3.9
  - requests >=2.31.0,<3.0.0
  - ratelimit >=2.2.1,<3.0.0
  - click >=8.1.7,<9.0.0
  - tqdm >=4.66.1,<5.0.0
  - boto3 >=1.34.61,<2.0.0
  - botocore >=1.34.74,<2.0.0
  - httpx >=0.27.0,<0.28.0
  - defusedxml >=0.7.1,<0.8
source:
  sha256: 8936a18ae14f67c547214cbdb4aacc72ff6d775e58f8bc99fbbb828c2aa70636
  url: https://pypi.org/packages/source/p/pridepy/pridepy-0.0.16.tar.gz
test:
  commands:
  - pip check
  - pridepy --help
  imports:
  - pridepy
  requires:
  - pip
