about:
  description: Save common bioinformatics file formats within the alabaster framework.
    This includes BAM, BED, VCF, bigWig, bigBed, FASTQ, FASTA and so on. We save and
    load additional metadata for each file, and we support linkage between each file
    and its corresponding index.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.files.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Wrappers to Save Common File Formats
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster.files
  version: 1.8.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
source:
  md5: c1625e110b3fb5e3ac651fbff866bf2f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/alabaster.files_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/alabaster.files/alabaster.files_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/alabaster.files_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-alabaster.files/bioconductor-alabaster.files_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('alabaster.files')"
