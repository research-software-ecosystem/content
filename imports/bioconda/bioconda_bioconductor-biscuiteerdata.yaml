about:
  description: Contains default datasets used by the Bioconductor package biscuiteer.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/biscuiteerData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Data Package for Biscuiteer
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biscuiteerdata
  version: 1.24.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-curl
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-curl
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 90b394ddf5bddce028c1b58955acf9c5
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/biscuiteerData_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/biscuiteerData/biscuiteerData_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/biscuiteerData_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biscuiteerdata/bioconductor-biscuiteerdata_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('biscuiteerData')"
