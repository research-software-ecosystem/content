about:
  doc_url: https://github.com/PoonLab/sierra-local
  home: https://github.com/PoonLab/sierra-local
  license: GPLv3
  license_family: GPL3
  license_file: LICENSE
  summary: sierra-local is a Python3 implementation of the Stanford HIVdb Sierra service
    for generating drug resistance predictions from HIV-1 sequences.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
  script:
  - $PYTHON -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
package:
  name: sierra-local
  version: 0.4.4
requirements:
  host:
  - pip
  - python >=3.9,<=3.10
  - setuptools
  - wheel
  run:
  - python >=3.9,<=3.10
  - requests
  - pandas
source:
  sha256: 41ae6f5bf22ea25097454c4cb2a3d1169500fd614d771b6048cccdccde4ca78f
  url: https://github.com/PoonLab/sierra-local/archive/refs/tags/v0.4.4.tar.gz
test:
  commands:
  - sierralocal -h
