about:
  description: This package provides QDNAseq bin annotations for the mouse genome
    build mm10.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/QDNAseq.mm10.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: Bin annotation mm10
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-qdnaseq.mm10
    path: recipes/bioconductor-qdnaseq.mm10
    version: 1.10.0
package:
  name: bioconductor-qdnaseq.mm10
  version: 1.40.0
requirements:
  host:
  - bioconductor-qdnaseq >=1.46.0,<1.47.0
  - r-base
  run:
  - bioconductor-qdnaseq >=1.46.0,<1.47.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 85339d53a3e32fcede0b59e64e973548
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/QDNAseq.mm10_1.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/QDNAseq.mm10/QDNAseq.mm10_1.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/QDNAseq.mm10_1.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-qdnaseq.mm10/bioconductor-qdnaseq.mm10_1.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('QDNAseq.mm10')"
