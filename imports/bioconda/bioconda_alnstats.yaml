about:
  home: https://github.com/Poshi/alnstats
  license: GPL-3.0-or-later
  license_file:
  - LICENSE
  - THIRDPARTY.yml
  summary: A high-performance command-line tool designed to calculate yield and duplicate
    statistics from BAM, SAM, or CRAM alignment files
build:
  number: 0
  run_exports:
  - null
  script: 'cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

    cargo install -v --locked --no-track --path . --root $PREFIX

    rm -rf $CARGO_HOME $RUSTUP_HOME

    '
extra:
  recipe-maintainers:
  - Poshi
package:
  name: alnstats
  version: 0.1.1
requirements:
  build:
  - null
  - cargo-bundle-licenses
source:
  sha256: 4bdefe99c72e2d2c70ca95ca3f9a33ba7406e64dc2094f6fb2cca1756ee38c3e
  url: https://github.com/Poshi/alnstats/archive/refs/tags/v0.1.1.tar.gz
test:
  commands:
  - alnstats --version
