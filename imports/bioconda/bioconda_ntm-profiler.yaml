about:
  home: https://github.com/jodyphelan/NTM-Profiler
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Profiling tool for NTM to detect species and resistance from WGS data
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation . -vvv
package:
  name: ntm-profiler
  version: 0.8.1
requirements:
  host:
  - flit
  - python >=3.7
  - pip
  - gatk4
  - samtools =1.10
  - bwa
  - snpeff =5.2
  run:
  - python >=3.7
  - pathogen-profiler =5.1.0
  - jinja2
  - sourmash >=4.8.3
source:
  sha256: 0bb096d80e1f52108b243bc440d0c03d354872107d06dfbbb6914defdead01cc
  url: https://github.com/jodyphelan/NTM-Profiler/archive/v0.8.1.tar.gz
test:
  commands:
  - ntm-profiler -h
  imports:
  - ntm_profiler
