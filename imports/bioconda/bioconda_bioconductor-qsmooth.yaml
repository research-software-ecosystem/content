about:
  description: 'Smooth quantile normalization is a generalization of quantile normalization,
    which is average of the two types of assumptions about the data generation process:
    quantile normalization and quantile normalization between groups.'
  home: https://bioconductor.org/packages/3.22/bioc/html/qsmooth.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Smooth quantile normalization
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-qsmooth
  version: 1.26.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-hmisc
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-hmisc
source:
  md5: 6689b4da6cc224509c97b22548514abf
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/qsmooth_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/qsmooth/qsmooth_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/qsmooth_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-qsmooth/bioconductor-qsmooth_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('qsmooth')"
