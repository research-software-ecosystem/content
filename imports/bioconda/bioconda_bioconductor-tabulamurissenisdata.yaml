about:
  description: This package provides access to RNA-seq data generated by the Tabula
    Muris Senis project via the Bioconductor project. The data is made available without
    restrictions by the Chan Zuckerberg Biohub. It is provided here without further
    processing, collected in the form of SingleCellExperiment objects.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/TabulaMurisSenisData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Bulk and single-cell RNA-seq data from the Tabula Muris Senis project
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tabulamurissenisdata
  version: 1.16.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-gdata
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-gdata
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: e92ec5d004026b6583dce1519fac5457
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/TabulaMurisSenisData_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TabulaMurisSenisData/TabulaMurisSenisData_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/TabulaMurisSenisData_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tabulamurissenisdata/bioconductor-tabulamurissenisdata_1.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TabulaMurisSenisData')"
