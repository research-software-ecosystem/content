about:
  dev_url: https://github.com/motu-tool/mOTUs
  home: http://motus-tool.org/
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Marker gene-based OTU (mOTU) profiling
build:
  noarch: python
  number: 0
  run_exports:
  - null
extra:
  additional notes identifiers:
  - biotools:motus
  additional-platforms:
  - osx-arm64
  - linux-aarch64
  notes: A tiny wrapper to the command motus was added. See build.sh for
  recipe-maintainers:
  - hjruscheweyh
  - saulpierotti
package:
  name: motus
  version: 4.0.4
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - bwa >=0.7.19
  - vsearch >=2.30.4
  - python >=3.12
  - biopython >=1.8.5
  - pysam >=0.23.3
  - polars >=1.32.2
  - rapidfuzz >=3.13.0
  - tqdm >=4.67.3
  - fetchmgs >=2.1.2
source:
  sha256: e42f671f0dd46ac5606bc8c68a93ffdd09bfb90e8eb12e4b22269c320d0adc52
  url: https://pypi.io/packages/source/m/motus_tool/motus_tool-4.0.4.tar.gz
test:
  commands:
  - 'motus --help 2>&1 | grep "Version" | sed "s%^.*Version: %%" | grep -qF "4.0.4"'
  import:
  - motus
