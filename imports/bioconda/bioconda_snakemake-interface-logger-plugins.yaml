about:
  home: https://github.com/snakemake/snakemake-interface-logger-plugins
  license: MIT
  license_file: LICENSE
  summary: This package provides a stable interface for interactions between Snakemake
    and its logger plugins.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - koesterlab
  - cademirch
package:
  name: snakemake-interface-logger-plugins
  version: 2.1.0
requirements:
  host:
  - python >=3.11,<4.0
  - poetry-core
  - pip
  - hatchling
  run:
  - python >=3.11.0,<4.0.0
  - snakemake-interface-common >=1.17.4,<2.0.0
source:
  sha256: c89a00d2a398490cecd91b6dc6db8049cba93712d82e1d8f3000f3040bf3791c
  url: https://pypi.io/packages/source/s/snakemake-interface-logger-plugins/snakemake_interface_logger_plugins-2.1.0.tar.gz
test:
  commands:
  - pip check
  imports:
  - snakemake_interface_logger_plugins
  requires:
  - pip
