about:
  description: 'TEsmall is a tool that allows for the simultaneous processing and
    analysis of a variety of small RNAs in a single integrated workflow.

    '
  dev_url: https://github.com/mhammell-laboratory/TEsmall
  doc_url: https://www.mghlab.org/software/tesmall
  home: https://github.com/mhammell-laboratory/TEsmall
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: A pipeline for profiling small RNAs
build:
  entry_points:
  - TEsmall = TEsmall.command_line:main
  noarch: python
  number: 1
  run_exports:
  - null
  script:
  - -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - niekwit
package:
  name: tesmall
  version: 2.0.9
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - numpy >=1.11.3,<2.0
  - scipy >=0.18.0
  - pandas >=0.18.1
  - matplotlib-base >=1.5.1
  - seaborn >=0.7.1
  - bokeh >=1.0.0,<3.0.0
  - pysam >=0.9.1
  - pybedtools >=0.7.8
  - cutadapt >=1.10
  - samtools
  - bedtools
  - bowtie
  - wget
source:
  sha256: 457af1b1c3ddbd75e61ecd0921a36b351beef89f7bb1847e46c8e966a5a36e38
  url: https://github.com/mhammell-laboratory/TEsmall/archive/refs/tags/2.0.9.tar.gz
test:
  commands:
  - TEsmall --help
  - TEsmall --version
  imports:
  - TEsmall
  - TEsmall.command_line
