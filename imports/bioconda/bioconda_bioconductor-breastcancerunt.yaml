about:
  description: Gene expression data from a breast cancer study published by Sotiriou
    et al. in 2007, provided as an eSet.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/breastCancerUNT.html
  license: Artistic-2.0
  summary: Gene expression dataset published by Sotiriou et al. [2007] (UNT).
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-breastcancerunt
  version: 1.48.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: e30d5c6762430747a0371097007e5db5
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/breastCancerUNT_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/breastCancerUNT/breastCancerUNT_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/breastCancerUNT_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-breastcancerunt/bioconductor-breastcancerunt_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('breastCancerUNT')"
