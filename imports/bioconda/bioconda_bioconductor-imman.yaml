about:
  description: Reconstructing Interlog Protein Network (IPN) integrated from several
    Protein protein Interaction Networks (PPINs). Using this package, overlaying different
    PPINs to mine conserved common networks between diverse species will be applicable.
  home: https://bioconductor.org/packages/3.22/bioc/html/IMMAN.html
  license: Artistic-2.0
  summary: Interlog protein network reconstruction by Mapping and Mining ANalysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-imman
  version: 1.30.0
requirements:
  host:
  - bioconductor-pwalign >=1.6.0,<1.7.0
  - bioconductor-stringdb >=2.22.0,<2.23.0
  - r-base
  - r-igraph
  - r-seqinr
  run:
  - bioconductor-pwalign >=1.6.0,<1.7.0
  - bioconductor-stringdb >=2.22.0,<2.23.0
  - r-base
  - r-igraph
  - r-seqinr
source:
  md5: efe5f8663ec0ab8000c9c4e3b04ac0fe
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/IMMAN_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/IMMAN/IMMAN_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/IMMAN_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-imman/bioconductor-imman_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('IMMAN')"
