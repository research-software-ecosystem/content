about:
  description: The hdxmsqc package enables us to analyse and visualise the quality
    of HDX-MS experiments. Either as a final quality check before downstream analysis
    and publication or as part of a interative procedure to determine the quality
    of the data. The package builds on the QFeatures and Spectra packages to integrate
    with other mass-spectrometry data.
  home: https://bioconductor.org/packages/3.22/bioc/html/hdxmsqc.html
  license: file LICENSE
  license_file: LICENSE
  summary: An R package for quality Control for hydrogen deuterium exchange mass spectrometry
    experiments
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hdxmsqc
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-qfeatures >=1.20.0,<1.21.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-knitr
  - r-tidyr
  run:
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-qfeatures >=1.20.0,<1.21.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-knitr
  - r-tidyr
source:
  md5: adef46a1710adc7ce4fc8b4ca9fff202
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/hdxmsqc_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/hdxmsqc/hdxmsqc_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/hdxmsqc_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hdxmsqc/bioconductor-hdxmsqc_1.6.0_src_all.tar.gz
