about:
  home: https://github.com/kfuku52/amalgkit
  license: MIT
  license_file: LICENSE
  summary: Tools for transcriptome amalgamation
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-build-isolation -vv'
extra:
  recipe-maintainers:
  - kfuku52
package:
  name: amalgkit
  version: 0.14.0
requirements:
  host:
  - python
  - pip
  - setuptools
  - wheel
  run:
  - python >=
  - biopython
  - numpy
  - pandas
  - ete4
  - seqkit
  - sra-tools
  - fastp
  - kallisto
  - r-base
  - bioconductor-edger
  - r-ggplot2
  - bioconductor-sva
  - r-rtsne
source:
  sha256: dc180688258c6112dfca02cfca2cf66b11fc8db74f2ef112990a18a3357ac503
  url: https://github.com/kfuku52/amalgkit/archive/refs/tags/v0.14.0.tar.gz
test:
  commands:
  - amalgkit --help
  imports:
  - amalgkit
