about:
  description: Implements R bindings to C++ code for analyzing single-cell (expression)
    data, mostly from various libscran libraries. Each function performs an individual
    step in the single-cell analysis workflow, ranging from quality control to clustering
    and marker detection. It is mostly intended for other Bioconductor package developers
    to build more user-friendly end-to-end workflows.
  home: https://bioconductor.org/packages/3.22/bioc/html/scrapper.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Bindings to C++ Libraries for Single-Cell Analysis
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scrapper
  version: 1.4.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-assorthead >=1.4.0,<1.5.0
  - bioconductor-beachmat >=2.26.0,<2.27.0
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-rigraphlib >=1.2.0,<1.3.0
  - r-base
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-assorthead >=1.4.0,<1.5.0
  - bioconductor-beachmat >=2.26.0,<2.27.0
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-rigraphlib >=1.2.0,<1.3.0
  - r-base
  - r-rcpp
source:
  md5: 933c284316f24726c27cb57c7d19276b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/scrapper_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/scrapper/scrapper_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/scrapper_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-scrapper/bioconductor-scrapper_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('scrapper')"
