about:
  description: TumourMethData collects tumour methylation data from a variety of different
    tumour types (and also matching normal samples where available) and produced with
    different technologies (e.g. WGBS, RRBS and methylation arrays) and provides them
    as RangedSummarizedExperiments. This facilitates easy extraction of methylation
    data for regions of interest across different tumour types and studies.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/TumourMethData.html
  license: Artistic-2.0
  summary: A Collection of DNA Methylation Datasets for Human Tumour Samples and Matching
    Normal Samples
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tumourmethdata
  version: 1.8.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-r.utils
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-r.utils
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 772132a3c375eac882055f0b791ce993
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/TumourMethData_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TumourMethData/TumourMethData_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/TumourMethData_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tumourmethdata/bioconductor-tumourmethdata_1.8.0_src_all.tar.gz
