about:
  description: It searches for relevant associations of transcription factors with
    a transcription factor target, in specific genomic regions. It also allows to
    evaluate the Importance Index distribution of transcription factors (and combinations
    of transcription factors) in association rules.
  home: https://bioconductor.org/packages/3.22/bioc/html/TFARM.html
  license: Artistic-2.0
  summary: Transcription Factors Association Rules Miner
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tfarm
  version: 1.32.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-arules
  - r-base
  - r-fields
  - r-gplots
  - r-stringr
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-arules
  - r-base
  - r-fields
  - r-gplots
  - r-stringr
source:
  md5: 4b84c8dbdc992ed7776c1024c2e6816a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TFARM_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TFARM/TFARM_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/TFARM_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tfarm/bioconductor-tfarm_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TFARM')"
