about:
  dev_url: https://forge.inrae.fr/eric.duchaud/flavotyper
  doc_url: https://forge.inrae.fr/eric.duchaud/flavotyper/-/blob/main/README.md
  home: https://forge.inrae.fr/eric.duchaud/flavotyper
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: In silico serotyping for Flavobacterium psychrophilum
build:
  entry_points:
  - flavotyper = flavotyper.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vvv
extra:
  recipe-maintainers:
  - SalmaM2
package:
  name: flavotyper
  version: 0.4.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools >=68
  run:
  - python >=3.10
  - pillow >=9.0
  - pyyaml >=6.0
  - blast >=2.12
  - fastani >=1.3
source:
  sha256: 78c5ad531a9ad60ff865fe39ca144113fe2ed527a63efe045adeb92de2fbdab6
  url: https://pypi.io/packages/source/f/flavotyper/flavotyper-0.4.0.tar.gz
test:
  commands:
  - flavotyper --version
  - flavotyper --help
  imports:
  - flavotyper
