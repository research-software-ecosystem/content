about:
  description: 'Curated human breast cancer tissue S4 ExpresionSet datasets from over
    16 clinical trials comprising over 2,000 patients. All datasets contain at least
    one type of outcomes variable and treatment information (minimum level: whether
    they had chemotherapy and whether they had hormonal therapy). Includes code to
    post-process these datasets.'
  home: https://bioconductor.org/packages/3.22/data/experiment/html/curatedBreastData.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Curated breast cancer gene expression data with survival and treatment
    information
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-curatedbreastdata
  version: 2.38.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-impute >=1.84.0,<1.85.0
  - r-base
  - r-ggplot2
  - r-xml
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-impute >=1.84.0,<1.85.0
  - r-base
  - r-ggplot2
  - r-xml
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: a4b8bbab9b3141d149dfa8a717008789
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/curatedBreastData_2.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/curatedBreastData/curatedBreastData_2.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/curatedBreastData_2.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-curatedbreastdata/bioconductor-curatedbreastdata_2.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('curatedBreastData')"
