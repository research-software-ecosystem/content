about:
  description: 'PhageFlow is a modular pipeline for recovering complete and high-quality

    phage genomes from Illumina paired-end sequencing. It supports purified

    phage preparations, viromes, and environmental metagenomes.

    '
  dev_url: https://github.com/fcabezasmera/PhageFlow
  doc_url: https://github.com/fcabezasmera/PhageFlow
  home: https://github.com/fcabezasmera/PhageFlow
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Modular bacteriophage genomics pipeline for complete genome recovery
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - fcabezasmera
package:
  name: phageflow
  version: 0.2.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools >=61
  run:
  - python >=3.10
  - click >=8.1
  - rich >=13.0
  - pyyaml >=6.0
  - biopython >=1.80
  - pandas >=2.0
  - numpy >=1.24
  - matplotlib-base >=3.7
  - pygenomeviz >=0.4.0
  - fastp >=1.3
  - fastqc >=0.12
  - multiqc >=1.35
  - bwa-mem2
  - samtools >=1.23
  - seqtk
  - kraken2 >=2.1
  - ncbi-datasets-cli
  - spades >=4.2
  - megahit >=1.2.9
  - cd-hit
  - coverm >=0.7
  - genomad >=1.8
  - checkv >=1.1
  - mash >=2.3
  - minimap2 >=2.24
  - blast >=2.14
  - pharokka >=1.9
  - phold >=1.2
  - dnaapler >=1.3
  - pigz
source:
  sha256: 3280241178e31f3ef5707705539ce2dd27f2f13738bf34ce9e97369326efea56
  url: https://github.com/fcabezasmera/PhageFlow/archive/v0.2.0.tar.gz
test:
  commands:
  - phageflow --version
  - phageflow --help
  imports:
  - phageflow
  - phageflow.cli
  - phageflow.modules.qc
  - phageflow.modules.host_removal
  - phageflow.modules.assembly
  - phageflow.modules.coverage
  - phageflow.modules.viral_id
  - phageflow.modules.quality
  - phageflow.modules.annotate
  - phageflow.modules.resistance
  - phageflow.modules.runner
