about:
  description: The Chromatograms packages defines an efficient infrastructure for
    storing and handling of chromatographic mass spectrometry data. It provides different
    implementations of *backends* to store and represent the data. Such backends can
    be optimized for small memory footprint or fast data access/processing. A lazy
    evaluation queue and chunk-wise processing capabilities ensure efficient analysis
    of also very large data sets.
  home: https://bioconductor.org/packages/3.22/bioc/html/Chromatograms.html
  license: Artistic-2.0
  summary: Infrastructure for Chromatographic Mass Spectrometry Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-chromatograms
  version: 1.0.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
