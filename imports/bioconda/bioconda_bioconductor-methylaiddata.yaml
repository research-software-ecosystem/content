about:
  description: A data package containing summarized Illumina 450k array data on 2800
    samples and summarized EPIC data for 2620 samples. The data can be use as a background
    data set in the interactive application.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/MethylAidData.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: MethylAid-summarized data for 2800 Illumina 450k array samples and 2620
    EPIC array samples
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-methylaiddata
  version: 1.42.0
requirements:
  host:
  - bioconductor-methylaid >=1.44.0,<1.45.0
  - r-base
  run:
  - bioconductor-methylaid >=1.44.0,<1.45.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: f9ebd7da5aa0bac59dcf57bef3c60335
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/MethylAidData_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MethylAidData/MethylAidData_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/MethylAidData_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-methylaiddata/bioconductor-methylaiddata_1.42.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MethylAidData')"
