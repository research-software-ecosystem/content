about:
  description: 'ganon2 classifies genomic sequences against large sets of references
    efficiently,

    with integrated download and update of databases (refseq/genbank), taxonomic profiling

    (ncbi/gtdb), binning and hierarchical classification, customized reporting and
    more

    '
  home: https://github.com/pirovc/ganon
  license: MIT License
  license_family: MIT
  license_file: LICENSE
  summary: ganon2 classifies genomic sequences against large sets of references efficiently
build:
  ignore_run_exports:
  - seqan3
  number: 0
  run_exports:
  - null
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=2.4.2
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - doi:10.1093/nargab/lqaf094
  recipe-maintainers:
  - pirovc
package:
  name: ganon
  version: 2.4.2
requirements:
  build:
  - make
  - null
  - null
  - cmake >=3.5
  host:
  - bzip2
  - catch2 ==2.*
  - coreutils
  - curl
  - cxxopts >=3.2.0
  - diffutils
  - genome_updater >=0.8.1
  - grep
  - multitax >=1.5.1
  - pandas >=1.2.0
  - parameterized >=0.9.0
  - python
  - raptor ==3.*
  - robin_hood ==3.11.*
  - seqan3 ==3.3.0
  - setuptools
  - setuptools_scm
  - zlib
  run:
  - coreutils
  - curl
  - diffutils
  - genome_updater >=0.8.1
  - grep
  - multitax >=1.4.0
  - pandas >=1.2.0
  - python
  - raptor ==3.*
source:
- sha256: 20689c60de5a631b822c9a4d2f22bd987e1944e6e137c2d212e3cfe7b6577a29
  url: https://github.com/pirovc/ganon/archive/v2.4.2.tar.gz
test:
  commands:
  - ganon --help
  - ganon-build --help
  - ganon-classify --help
