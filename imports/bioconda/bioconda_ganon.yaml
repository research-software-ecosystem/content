about:
  description: 'ganon2 classifies genomic sequences against large sets of references
    efficiently,

    with integrated download and update of databases (refseq/genbank), taxonomic profiling

    (ncbi/gtdb), binning and hierarchical classification, customized reporting and
    more

    '
  home: https://github.com/pirovc/ganon
  license: MIT License
  license_family: MIT
  license_file: LICENSE
  summary: ganon2 classifies genomic sequences against large sets of references efficiently
build:
  ignore_run_exports:
  - seqan3
  number: 0
  run_exports:
  - null
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=2.3.0
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - doi:10.1093/nargab/lqaf094
  recipe-maintainers:
  - pirovc
package:
  name: ganon
  version: 2.3.0
requirements:
  build:
  - make
  - null
  - cmake >=3.5
  host:
  - bzip2
  - catch2 ==2.*
  - coreutils
  - curl
  - cxxopts >=2.2.0
  - diffutils
  - genome_updater >=0.7.2
  - grep
  - multitax >=1.4.0
  - pandas >=1.2.0
  - parameterized >=0.9.0
  - python
  - raptor ==3.*
  - seqan3 ==3.3.0
  - setuptools
  - setuptools_scm
  - zlib
  run:
  - coreutils
  - curl
  - diffutils
  - genome_updater >=0.7.2
  - grep
  - multitax >=1.4.0
  - pandas >=1.2.0
  - python
  - raptor ==3.*
source:
- sha256: 32d8d7dcc313df563dbafd8d8f89487ca688d5ba0ab0cc404334257c28f15bc5
  url: https://github.com/pirovc/ganon/archive/v2.3.0.tar.gz
- folder: libs/robin-hood-hashing
  sha256: dcf2b7fa9ef9dd0c67102d94c28e8df3effbe1845e0ed1f31f4772ca5e857fc4
  url: https://github.com/martinus/robin-hood-hashing/archive/refs/tags/3.11.3.tar.gz
test:
  commands:
  - ganon --help
  - ganon-build --help
  - ganon-classify --help
