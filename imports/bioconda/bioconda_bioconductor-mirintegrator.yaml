about:
  description: Tools for augmenting signaling pathways to perform pathway analysis
    of microRNA and mRNA expression levels.
  home: https://bioconductor.org/packages/3.22/bioc/html/mirIntegrator.html
  license: GPL (>=3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Integrating microRNA expression into signaling pathways for pathway analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:mirintegrator
  - doi:10.1038/srep29251
  parent_recipe:
    name: bioconductor-mirintegrator
    path: recipes/bioconductor-mirintegrator
    version: 1.10.0
package:
  name: bioconductor-mirintegrator
  version: 1.40.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - bioconductor-rontotools >=2.38.0,<2.39.0
  - r-base
  - r-ggplot2
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - bioconductor-rontotools >=2.38.0,<2.39.0
  - r-base
  - r-ggplot2
source:
  md5: bf312618fea409c56542cc80f37839aa
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/mirIntegrator_1.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/mirIntegrator/mirIntegrator_1.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/mirIntegrator_1.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mirintegrator/bioconductor-mirintegrator_1.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('mirIntegrator')"
