about:
  description: Open Cancer TherApeutic Discovery (OCTAD) package implies sRGES approach
    for the drug discovery. The essential idea is to identify drugs that reverse the
    gene expression signature of a disease by tamping down over-expressed genes and
    stimulating weakly expressed ones. The following package contains all required
    precomputed data for whole OCTAD pipeline computation.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/octad.db.html
  license: Artistic-2.0
  summary: Open Cancer TherApeutic Discovery (OCTAD) database
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-octad.db
  version: 1.12.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: e182a923b8b7b38c5039abb2ee1b6e81
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/octad.db_1.12.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/octad.db/octad.db_1.12.0.tar.gz
  - https://bioarchive.galaxyproject.org/octad.db_1.12.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-octad.db/bioconductor-octad.db_1.12.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('octad.db')"
