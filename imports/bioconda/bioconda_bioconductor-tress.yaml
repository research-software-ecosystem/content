about:
  description: This package is devoted to analyzing MeRIP-seq data. Current functionalities
    include 1. detect transcriptome wide m6A methylation regions 2. detect transcriptome
    wide differential m6A methylation regions.
  home: https://bioconductor.org/packages/3.22/bioc/html/TRESS.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Toolbox for mRNA epigenetics sequencing analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tress
  version: 1.16.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-matrix
  - r-matrixstats
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-matrix
  - r-matrixstats
source:
  md5: 9a56170182b69654ecb084bb2b054d48
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TRESS_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TRESS/TRESS_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/TRESS_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tress/bioconductor-tress_1.16.0_src_all.tar.gz
test:
