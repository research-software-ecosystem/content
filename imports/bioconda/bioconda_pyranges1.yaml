about:
  home: http://github.com/pyranges/pyranges_1.x
  license: MIT
  license_file: LICENSE
  summary: GenomicRanges for Python.
build:
  entry_points:
  - pyranger = pyranges1.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - endrebak
package:
  name: pyranges1
  version: 1.3.0
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools >=61
  - wheel
  - setuptools-scm >=6.2
  run:
  - python >=3.12
  - pyrle >=0.0.41
  - bamread
  - pybigwig
  - pandas
  - tabulate
  - natsort
  - ruranges >=0.1.1
source:
  sha256: 63061402c6cc8721e020d5d26d5dd25e17925ef11a05f78778c0871e0627e955
  url: https://pypi.io/packages/source/p/pyranges1/pyranges1-1.3.0.tar.gz
test:
  commands:
  - python -c "import pyranges1 as pr; print(pr.__version__)"
  imports:
  - pyranges1
  requires:
  - python >=3.12
