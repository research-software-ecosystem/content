about:
  dev_url: https://github.com/pyranges/pyranges_1.x
  home: https://github.com/pyranges/pyranges_1.x
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: GenomicRanges for Python.
build:
  entry_points:
  - pyranger = pyranges1.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.3.6
extra:
  recipe-maintainers:
  - endrebak
package:
  name: pyranges1
  version: 1.3.6
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools >=61
  - setuptools-scm >=6.2
  run:
  - python >=3.12
  - fire
  - pyrle >=0.0.43
  - bamread
  - pyfaidx
  - pybigwig
  - joblib
  - pandas
  - tabulate
  - natsort
  - ruranges >=0.1.2
  - gtfreader >=0.2.0
source:
  sha256: c7b89f366ce48db087ce273cb1a4de60e52c8304830a73d6c24423a1102f6bc5
  url: https://pypi.org/packages/source/p/pyranges1/pyranges1-1.3.6.tar.gz
test:
  commands:
  - pyranger --help
  imports:
  - pyranges1
