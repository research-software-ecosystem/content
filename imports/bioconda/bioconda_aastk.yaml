about:
  description: 'This package contains several tools to generate and work with amino
    acid sequence datasets.

    AASTK is primarily designed to work with the GlobDB genome database.

    '
  dev_url: https://github.com/dspeth/aastk/
  doc_url: https://globdb.org/aastk
  home: https://github.com/dspeth/aastk/
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Toolkit for analyses of amino acid sequences
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - dspeth
  - rennigm
package:
  name: aastk
  version: 0.1.1
requirements:
  host:
  - python >=3.13
  - pip
  - setuptools
  run:
  - python >=3.13
  - diamond >=2.1.11
  - seqkit >=2.5.1
  - contourpy >=1.3.2
  - matplotlib-base >=3.10.1
  - numpy >=2.2.5
  - opentsne >=1.0.2
  - pandas >=2.2.3
  - pyyaml >=6.0.2
  - scikit-learn >=1.6.1
  - scipy >=1.15.3
  - tqdm >=4.67.1
source:
  sha256: 239c811419c812fbc433fd690e7276b7b1d3b91438e3c6072c4938d2b8ac65da
  url: https://pypi.io/packages/source/a/aastk/aastk-0.1.1.tar.gz
test:
  commands:
  - aastk --help
  - diamond help
  - seqkit --help
  - pip check
  imports:
  - aastk
  requires:
  - pip
