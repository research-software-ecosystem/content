  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowViz_1.74.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowViz/flowViz_1.74.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowViz_1.74.0.tar.gz
