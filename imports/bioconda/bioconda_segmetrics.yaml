about:
  dev_url: https://github.com/BMCV/segmetrics
  doc_url: https://segmetrics.readthedocs.io
  home: https://github.com/BMCV/segmetrics
  license: MIT
  summary: A Python package implementing image segmentation and object detection performance
    measures, for biomedical image analysis and beyond.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install --no-deps --ignore-installed . -vv '
extra:
  recipe-maintainers:
  - kostrykin
package:
  name: segmetrics
  version: 1.6.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  - numpy >=1.20
  - scipy
  - scikit-image >=0.18,<0.27
  - scikit-learn
  - dill
  - Deprecated ==1.2
  run:
  - python >=3.9
  - numpy >=1.20
  - scipy
  - scikit-image >=0.18,<0.27
  - scikit-learn
  - dill
  - Deprecated ==1.2
source:
