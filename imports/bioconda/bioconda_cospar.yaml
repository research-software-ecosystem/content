about:
  dev_url: https://github.com/ShouWenWang-Lab/cospar
  home: https://github.com/ShouWenWang-Lab/cospar
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A toolkit for dynamic inference of cell fate by integrating state and lineage
