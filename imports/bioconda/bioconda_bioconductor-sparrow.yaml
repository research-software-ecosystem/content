about:
  description: Provides a unified interface to a variety of GSEA techniques from different
    bioconductor packages. Results are harmonized into a single object and can be
    interrogated uniformly for quick exploration and interpretation of results. Interactive
    exploration of GSEA results is enabled through a shiny app provided by a sparrow.shiny
    sibling package.
  home: https://bioconductor.org/packages/3.22/bioc/html/sparrow.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Take command of set enrichment analyses through a unified interface
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-sparrow
  version: 1.16.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-biocset >=1.24.0,<1.25.0
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-delayedmatrixstats >=1.32.0,<1.33.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-babelgene >=21.4
  - r-base
