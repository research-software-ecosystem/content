about:
  description: Lineagespot is a framework written in R, and aims to identify SARS-CoV-2
    related mutations based on a single (or a list) of variant(s) file(s) (i.e., variant
    calling format). The method can facilitate the detection of SARS-CoV-2 lineages
    in wastewater samples using next generation sequencing, and attempts to infer
    the potential distribution of the SARS-CoV-2 lineages.
  home: https://bioconductor.org/packages/3.22/bioc/html/lineagespot.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Detection of SARS-CoV-2 lineages in wastewater samples using next-generation
    sequencing
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-lineagespot
  version: 1.14.0
requirements:
  host:
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-data.table
  - r-httr
  - r-stringr
  run:
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-data.table
  - r-httr
  - r-stringr
source:
  md5: 134bdf2b54730e020987fed027bdc5d6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/lineagespot_1.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/lineagespot/lineagespot_1.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/lineagespot_1.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-lineagespot/bioconductor-lineagespot_1.14.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('lineagespot')"
