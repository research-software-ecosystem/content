about:
  dev_url: https://github.com/GMAP-fusion/GMAP-fusion
  doc_url: https://github.com/GMAP-fusion/GMAP-fusion/wiki
  home: https://github.com/GMAP-fusion/GMAP-fusion
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: GMAP-fusion is a utility for identifying candidate fusion transcripts based
    on transcript sequences reconstructed via RNA-Seq de novo transcriptome assembly.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
package:
  name: gmap-fusion
  version: 0.4.2
requirements:
  run:
  - perl
  - perl-set-intervaltree
  - perl-db_file
  - samtools >=1.3
  - bowtie2 >=2.1
  - gmap >=2017.11.15
source:
  sha256: d743933a5d5adcc764d9cbe7d95a6a6126a0114f60c90a5f864b8b67ccac73c0
  url: https://github.com/GMAP-fusion/GMAP-fusion/releases/download/GMAP-fusion_v0.4.2/GMAP-fusion-v0.4.2.FULL.tar.gz
test:
  commands:
  - GMAP-fusion --help 2>&1 | grep Required
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/compare_fusion_align_to_best_nonfusion_align.pl
    2>&1 | grep usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/estimate_fusion_read_support.pl 2>&1 |
    grep usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/filter_gmap_chims_via_dist_from_exon_bounds.pl
    2>&1 | grep usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/gmap_genome_gff3_to_chim_summary.pl 2>&1
    | grep Required
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/prep_evidence_for_IGV.pl 2>&1 | grep usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/retrieve_fusion_transcript_candidates.pl
    2>&1 | grep usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/revise_chim_candidate_list_via_split_align_reassessment.pl
    2>&1 | grep usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/screen_fusion_genome_breakpoint_for_confounding_kmers.pl
    2>&1 | grep usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/screen_fusion_trans_genes_for_kmer_confounders.pl
    2>&1 | grep usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/split_fusion_gmap_parts.pl 2>&1 | grep
    usage
  - $PREFIX/share/gmap-fusion-0.4.2-0/util/write_GMAP_Fusion_annot_report.pl 2>&1
    | grep usage
