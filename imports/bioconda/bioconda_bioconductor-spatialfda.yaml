about:
  description: spatialFDA is a package to calculate spatial statistics metrics. The
    package takes a SpatialExperiment object and calculates spatial statistics metrics
    using the package spatstat. Then it compares the resulting functions across samples/conditions
    using functional additive models as implemented in the package refund. Furthermore,
    it provides exploratory visualisations using functional principal component analysis,
    as well implemented in refund.
  home: https://bioconductor.org/packages/3.22/bioc/html/spatialFDA.html
  license: GPL (>= 3) + file LICENSE
  license_file: LICENSE
  summary: A Tool for Spatial Multi-sample Comparisons
