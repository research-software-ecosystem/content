about:
  description: CalibraCurve is a computational tool designed to generate calibration
    curves for targeted mass spectrometry-based quantitative data. It is applicable
    to various omics disciplines, including proteomics, lipidomics, and metabolomics.
    The package also offers functionalities for data and calibration curve visualization
    and concentration prediction from new datasets based on the established curves.
  home: https://bioconductor.org/packages/3.22/bioc/html/CalibraCurve.html
  license: BSD 3-clause License + file LICENSE
  license_file: LICENSE
  summary: Calibration curves for targeted proteomics, lipidomics and metabolomics
    data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-calibracurve
  version: 1.0.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-checkmate
  - r-dplyr
  - r-ggplot2
  - r-magrittr
  - r-openxlsx
  - r-scales
  - r-tidyr
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-checkmate
  - r-dplyr
  - r-ggplot2
  - r-magrittr
  - r-openxlsx
  - r-scales
  - r-tidyr
source:
  md5: b4ca7e1b5caa07aab5596b3781699732
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CalibraCurve_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CalibraCurve/CalibraCurve_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/CalibraCurve_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-calibracurve/bioconductor-calibracurve_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CalibraCurve')"
