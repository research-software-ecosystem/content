about:
  home: https://github.com/SilentGene/DiTing
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: A Snakemake-based pipeline to infer and compare biogeochemical pathways
    in metagenomic data
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  identifiers:
  - doi:10.3389/fmicb.2021.698286
  recipe-maintainers:
  - SilentGene
package:
  name: diting
  version: 2.0.2
requirements:
  host:
  - python
  - pip
  - hatchling
  run:
  - python
  - snakemake >=9.0
  - pandas
  - matplotlib-base
  - seaborn
  - megahit
  - spades >=4.0
  - prodigal
  - bwa
  - bbmap
  - hmmer >=3.3
  - kofamscan
  - opencv
  - pillow
source:
  sha256: 297ce11141ef9fa6a63aa22259e5574d50fb70d4ffb9efe14413480b1dbc668f
  url: https://github.com/SilentGene/DiTing/archive/refs/tags/v2.0.2.tar.gz
test:
  commands:
  - diting --version | grep '2.0.2'
