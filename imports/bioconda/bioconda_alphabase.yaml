about:
  description: 'AlphaBase provides foundational data structures and utilities for

    mass spectrometry-based proteomics in the AlphaPept ecosystem.

    '
  dev_url: https://github.com/MannLabs/alphabase
  doc_url: https://alphabase.readthedocs.io/en/latest/
  home: https://github.com/MannLabs/alphabase
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE.txt
  summary: An infrastructure Python package of the AlphaX ecosystem
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - jonasscheid
package:
  name: alphabase
  version: 1.9.0
requirements:
  host:
  - python >=3.9
  - setuptools
  - pip
  run:
  - python >=3.9
  - numba
  - numpy
  - pandas
  - h5py
  - contextlib2
  - python-xxhash
  - biopython
  - tqdm
  - regex
  - pyarrow
  - pyahocorasick
  - pyteomics
  - pyyaml
  - lxml
  - rdkit
source:
  sha256: e06b5da73b1a630c30aa86a743dfc8446dc7fe9886a04b329ddc10166ff214a4
  url: https://pypi.org/packages/source/a/alphabase/alphabase-1.9.0.tar.gz
test:
  commands:
  - pip check
  imports:
  - alphabase
  requires:
  - pip
