about:
  dev_url: https://github.com/barricklab/cryptkeeper
  home: https://github.com/barricklab/cryptkeeper
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: A negative design tool for predicting and visualizing undesired gene expression
build:
  entry_points:
  - cryptkeeper = cryptkeeper.cryptkeeper:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - croots
  - jeffreybarrick
package:
  name: cryptkeeper
  version: 1.0.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - ostir
  - rhotermpredict
  - promotercalculator
  - bokeh
  - biopython
  - pandas
source:
  sha256: abcd5f9ea0f3aef8e8fd1c56885cbb17e83ce5fbfdce6c19199799a2bbe221e4
  url: https://pypi.io/packages/source/c/cryptkeeper/cryptkeeper-1.0.2.tar.gz
test:
  commands:
  - cryptkeeper --help
  imports:
  - cryptkeeper
