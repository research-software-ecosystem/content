about:
  description: Headers and some wrapper functions from the SeqAn C++ library for ease
    of usage in R.
  home: https://bioconductor.org/packages/3.22/bioc/html/RSeqAn.html
  license: BSD_3_clause + file LICENSE
  license_file: LICENSE
  summary: R SeqAn
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rseqan
  version: 1.30.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - r-base
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
  - r-rcpp
source:
  md5: 5a9a67861e1c0cf01d458914dea7cf8d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RSeqAn_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RSeqAn/RSeqAn_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/RSeqAn_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rseqan/bioconductor-rseqan_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RSeqAn')"
