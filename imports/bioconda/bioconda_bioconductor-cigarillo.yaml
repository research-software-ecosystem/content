about:
  description: CIGAR stands for Concise Idiosyncratic Gapped Alignment Report. CIGAR
    strings are found in the BAM files produced by most aligners and in the AIRR-formatted
    output produced by IgBLAST. The cigarillo package provides functions to parse
    and inspect CIGAR strings, trim them, turn them into ranges of positions relative
    to the "query space" or "reference space", and project positions or sequences
    from one space to the other. Note that these operations are low-level operations
    that the user rarely needs to perform directly. More typically, they are performed
    behind the scene by higher-level functionality implemented in other packages like
    Bioconductor packages GenomicAlignments and igblastr.
  home: https://bioconductor.org/packages/3.22/bioc/html/cigarillo.html
  license: Artistic-2.0
  summary: Efficient manipulation of CIGAR strings
