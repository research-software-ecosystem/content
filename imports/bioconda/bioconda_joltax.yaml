about:
  home: https://github.com/SweBiTS/JolTax
  license: MIT
  license_file: LICENSE
  summary: JolTax is a high-performance, vectorized taxonomy library for Python.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - danisven
package:
  name: joltax
  version: 0.3.0
requirements:
  host:
  - python >=3.8
  - setuptools >=61.0
  - pip
  run:
  - python >=3.8
  - numpy >=1.20.0
  - polars >=0.20.0
  - rapidfuzz >=3.0.0
source:
  sha256: c023f729d04c3b6b826af48bdd008840568975d93b080dacd093af26c6a233bc
  url: https://pypi.org/packages/source/j/joltax/joltax-0.3.0.tar.gz
test:
  commands:
  - pip check
  imports:
  - joltax
  requires:
  - pip
  - python
