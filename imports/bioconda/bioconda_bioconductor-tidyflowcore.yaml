about:
  description: tidyFlowCore bridges the gap between flow cytometry analysis using
    the flowCore Bioconductor package and the tidy data principles advocated by the
    tidyverse. It provides a suite of dplyr-, ggplot2-, and tidyr-like verbs specifically
    designed for working with flowFrame and flowSet objects as if they were tibbles;
    however, your data remain flowCore data structures under this layer of abstraction.
    tidyFlowCore enables intuitive and streamlined analysis workflows that can leverage
    both the Bioconductor and tidyverse ecosystems for cytometry data.
  home: https://bioconductor.org/packages/3.22/bioc/html/tidyFlowCore.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 'tidyFlowCore: Bringing flowCore to the tidyverse'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tidyflowcore
  version: 1.4.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-purrr
  - r-rlang
  - r-stringr
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-purrr
  - r-rlang
  - r-stringr
  - r-tibble
  - r-tidyr
source:
  md5: 100ee8c99b68d8bbbee82bc6f95be414
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/tidyFlowCore_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/tidyFlowCore/tidyFlowCore_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/tidyFlowCore_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tidyflowcore/bioconductor-tidyflowcore_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('tidyFlowCore')"
