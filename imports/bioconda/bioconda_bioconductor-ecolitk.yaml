about:
  description: Meta-data and tools to work with E. coli. The tools are mostly plotting
    functions to work with circular genomes. They can used with other genomes/plasmids.
  home: https://bioconductor.org/packages/3.22/bioc/html/ecolitk.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Meta-data and tools for E. coli
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ecolitk
  version: 1.82.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
source:
  md5: c0d88ac32e30a95e7cb9595fd1481c58
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ecolitk_1.82.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ecolitk/ecolitk_1.82.0.tar.gz
  - https://bioarchive.galaxyproject.org/ecolitk_1.82.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ecolitk/bioconductor-ecolitk_1.82.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ecolitk')"
