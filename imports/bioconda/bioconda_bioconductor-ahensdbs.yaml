about:
  description: Supplies AnnotationHub with EnsDb Ensembl-based annotation databases
    for all species. EnsDb SQLite databases are generated separately from Ensembl
    MySQL databases using functions from the ensembldb package employing the Ensembl
    Perl API.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/AHEnsDbs.html
  license: Artistic-2.0
  summary: EnsDbs for AnnotationHub
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ahensdbs
  version: 1.7.0
requirements:
  host:
  - bioconductor-annotationhubdata >=1.40.0,<1.41.0
  - bioconductor-ensembldb >=2.34.0,<2.35.0
  - r-base
  run:
  - bioconductor-annotationhubdata >=1.40.0,<1.41.0
  - bioconductor-ensembldb >=2.34.0,<2.35.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 462375547f1f1460b8d03de27e789543
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/AHEnsDbs_1.7.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/AHEnsDbs/AHEnsDbs_1.7.0.tar.gz
  - https://bioarchive.galaxyproject.org/AHEnsDbs_1.7.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ahensdbs/bioconductor-ahensdbs_1.7.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('AHEnsDbs')"
