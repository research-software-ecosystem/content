about:
  description: Raw data objects for the Illumina 450k DNA methylation microarrays,
    and an object depicting which CpGs on the array are associated with cell type.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/FlowSorted.Blood.450k.html
  license: Artistic-2.0
  summary: Illumina HumanMethylation data on sorted blood cell populations
build:
