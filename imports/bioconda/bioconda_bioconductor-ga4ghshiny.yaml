about:
  description: GA4GHshiny package provides an easy way to interact with data servers
    based on Global Alliance for Genomics and Health (GA4GH) genomics API through
    a Shiny application. It also integrates with Beacon Network.
  home: https://bioconductor.org/packages/3.22/bioc/html/GA4GHshiny.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Shiny application for interacting with GA4GH-based data servers
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ga4ghshiny
  version: 1.32.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-ga4ghclient >=1.34.0,<1.35.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-dt
  - r-openxlsx
  - r-purrr
  - r-shiny
  - r-shinyjs
  - r-shinythemes
  - r-tidyr
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-ga4ghclient >=1.34.0,<1.35.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-dt
  - r-openxlsx
  - r-purrr
  - r-shiny
  - r-shinyjs
  - r-shinythemes
  - r-tidyr
source:
  md5: 246077362991c8e4f7106bb812303919
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GA4GHshiny_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GA4GHshiny/GA4GHshiny_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/GA4GHshiny_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ga4ghshiny/bioconductor-ga4ghshiny_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GA4GHshiny')"
