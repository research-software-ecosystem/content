about:
  description: 'Mimick, formerly known as XENIA from the VISOR project, can simulate
    all manner of available

    linked-read chemistries (10x, haplotagging, stlfr, tellseq). It allows you to
    simulate an

    arbitrary number of haplotypes, set overall coverage, molecule coverage, molecules
    per barcode,

    whether DNA is circular, etc.

    '
  dev_url: https://github.com/pdimens/mimick
  doc_url: https://pdimens.github.io/mimick
  home: https://github.com/pdimens/mimick
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Simulate linked-read data
build:
  entry_points:
  - mimick = mimick.__main__:mimick
  noarch: python
  number: 0
  run_exports:
  - null
  script: '-m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv

    '
extra:
  recipe-maintainers:
  - pdimens
package:
  name: mimick
  version: '3.1'
requirements:
  host:
  - python
  - pip
  - setuptools >=80
  run:
  - click >=8.2
  - juliaup >=1.10
  - python >=3.10
  - rich-click >=1.9.3
source:
  sha256: 57d9392b1f8fedbafd2ff7d5edfa13ca3fb59c189f76480acf277e0281d716e5
  url: https://github.com/pdimens/mimick/releases/download/3.1/mimick.3.1.tar.gz
test:
  commands:
  - mimick --version
