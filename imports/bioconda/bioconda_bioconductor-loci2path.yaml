about:
  description: loci2path performs statistics-rigorous enrichment analysis of eQTLs
    in genomic regions of interest. Using eQTL collections provided by the Genotype-Tissue
    Expression (GTEx) project and pathway collections from MSigDB.
  home: https://bioconductor.org/packages/3.22/bioc/html/loci2path.html
  license: Artistic-2.0
  summary: 'Loci2path: regulatory annotation of genomic intervals based on tissue-specific
    expression QTLs'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-loci2path
  version: 1.30.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-data.table
  - r-pheatmap
  - r-rcolorbrewer
  - r-wordcloud
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-data.table
  - r-pheatmap
  - r-rcolorbrewer
  - r-wordcloud
source:
  md5: 9f8212ab52546f2101aa9fc0778f859c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/loci2path_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/loci2path/loci2path_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/loci2path_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-loci2path/bioconductor-loci2path_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('loci2path')"
