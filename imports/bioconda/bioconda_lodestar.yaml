about:
  description: "LODESTAR projects the relatedness between samples into a lower\ndimension\
    \ using classical MDS within blocks along a genomes.\nThe user has the option\
    \ to perform Procrustes analysis between\nthe local regions and either the genome-wide\
    \ relatedness or a \nsupplied set of points. Procrustes analysis calculates the\
    \ correlation\nbetween two plots. Therefore, we can identify local regions that\
    \ are\nstructurally similar to the aggregate population stratification\nor the\
    \ relatedness defined by a non-genetic variable, such as \ngeography. LODESTAR\
    \ is written in C with no dependencies and is\nmultithreaded.\n"
  dev_url: https://github.com/TQ-Smith/LODESTAR
  doc_url: https://github.com/TQ-Smith/LODESTAR/wiki/LODESTAR-Manual
  home: https://github.com/TQ-Smith/LODESTAR
  license: MIT
  license_file: LICENSE
  summary: LOcal DEcomposition and Similarity To All Regions
