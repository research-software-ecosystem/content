about:
  description: Example text-converted C01 image files for use in the CONFESS Bioconductor
    package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/CONFESSdata.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Example dataset for CONFESS package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-confessdata
  version: 1.38.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 386b7bb0ce9d707af0b35466f282b2cc
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/CONFESSdata_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CONFESSdata/CONFESSdata_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/CONFESSdata_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-confessdata/bioconductor-confessdata_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CONFESSdata')"
