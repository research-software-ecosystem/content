about:
  description: BLASE is a method for finding where bulk RNA-seq data lies on a single-cell
    pseudotime trajectory. It uses a fast and understandable approach based on Spearman
    correlation, with bootstrapping to provide confidence. BLASE can be used to "date"
    bulk RNA-seq data, annotate cell types in scRNA-seq, and help correct for developmental
    phenotype differences in bulk RNA-seq experiments.
  home: https://bioconductor.org/packages/3.22/bioc/html/blase.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Bulk Linking Analysis for Single-cell Experiments
