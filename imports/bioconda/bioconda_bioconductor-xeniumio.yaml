about:
  description: The package allows users to readily import spatial data obtained from
    the 10X Xenium Analyzer pipeline. Supported formats include 'parquet', 'h5', and
    'mtx' files. The package mainly represents data as SpatialExperiment objects.
  home: https://bioconductor.org/packages/3.22/bioc/html/XeniumIO.html
  license: Artistic-2.0
  summary: Import and represent Xenium data from the 10X Xenium Analyzer
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-xeniumio
  version: 1.2.0
requirements:
  host:
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-tenxio >=1.12.0,<1.13.0
  - bioconductor-visiumio >=1.6.0,<1.7.0
  - r-base
  - r-jsonlite
  run:
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-tenxio >=1.12.0,<1.13.0
  - bioconductor-visiumio >=1.6.0,<1.7.0
  - r-base
  - r-jsonlite
