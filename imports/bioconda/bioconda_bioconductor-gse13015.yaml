about:
  description: Microarray expression matrix platform GPL6106 and clinical data for
    67 septicemic patients and made them available as GEO accession [GSE13015](https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE13015).
    GSE13015 data have been parsed into a SummarizedExperiment object available in
    ExperimentHub. This data data could be used as an example supporting BloodGen3Module
    R package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/GSE13015.html
  license: MIT License
  summary: GEO accession data GSE13015_GPL6106 as a SummarizedExperiment
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gse13015
  version: 1.18.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 095481c4e2500233400889a92a1a8434
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/GSE13015_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GSE13015/GSE13015_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/GSE13015_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gse13015/bioconductor-gse13015_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GSE13015')"
