about:
  description: 'CHAP is a tool for the functional annotation of ion channel structures.

    This a fork of the original CHAP code, which is no longer maintained, with the
    aim of

    providing compatibility with new GROMACS versions. The original code can be found
    at:

    https://github.com/channotation/chap

    '
  home: https://github.com/RubenChM/chap
  license: MIT
  license_file: LICENSE.TXT
  summary: CHAP is a tool for the functional annotation of ion channel structures.
build:
  number: 1
  run_exports:
  - null
  skip: true
package:
  name: chap_mddb
  version: 0.10.0
requirements:
  build:
  - make
  - null
  - null
  - cmake >=3.5
  host:
  - boost-cpp
  - libcblas * *_netlib
  - liblapacke * *_netlib
  - libtmglib
  - gromacs ==2025.*
  - rapidjson
  - intel-compute-runtime
  run:
  - boost-cpp
  - libcblas
  - liblapacke
  - gromacs ==2025.*
  - rapidjson
  - intel-compute-runtime
source:
  patches:
  - v2025.patch
  sha256: a8d68bd297acbca83b2b2e0454fdbb2a38f27ae1b5fcc70bca923489400bc973
  url: https://github.com/RubenChM/chap/archive/v0.10.0.tar.gz
test:
  commands:
  - chap -h
