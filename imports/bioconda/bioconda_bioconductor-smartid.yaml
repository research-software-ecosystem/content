about:
  description: This package enables automated selection of group specific signature,
    especially for rare population. The package is developed for generating specifc
    lists of signature genes based on Term Frequency-Inverse Document Frequency (TF-IDF)
    modified methods. It can also be used as a new gene-set scoring method or data
    transformation method. Multiple visualization functions are implemented in this
    package.
  home: https://bioconductor.org/packages/3.22/bioc/html/smartid.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Scoring and Marker Selection Method Based on Modified TF-IDF
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-smartid
  version: 1.6.1
requirements:
  host:
  - bioconductor-sparsematrixstats >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-matrix
  - r-mclust
  - r-mixtools
  - r-tidyr
  run:
  - bioconductor-sparsematrixstats >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-matrix
  - r-mclust
  - r-mixtools
  - r-tidyr
source:
  md5: 6e0823306a677facd09c05a63807e8af
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/smartid_1.6.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/smartid/smartid_1.6.1.tar.gz
  - https://bioarchive.galaxyproject.org/smartid_1.6.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-smartid/bioconductor-smartid_1.6.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('smartid')"
