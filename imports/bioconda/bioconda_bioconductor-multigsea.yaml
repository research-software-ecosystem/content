about:
  description: Extracted features from pathways derived from 8 different databases
    (KEGG, Reactome, Biocarta, etc.) can be used on transcriptomic, proteomic, and/or
    metabolomic level to calculate a combined GSEA-based enrichment score.
  home: https://bioconductor.org/packages/3.22/bioc/html/multiGSEA.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Combining GSEA-based pathway enrichment with multi omics data integration
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-multigsea
  version: 1.20.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-fgsea >=1.36.0,<1.37.0
  - bioconductor-graphite >=1.56.0,<1.57.0
  - bioconductor-metaboliteidmapping >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-magrittr
  - r-metap
  - r-rappdirs
  - r-rlang
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-fgsea >=1.36.0,<1.37.0
  - bioconductor-graphite >=1.56.0,<1.57.0
  - bioconductor-metaboliteidmapping >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-magrittr
  - r-metap
  - r-rappdirs
  - r-rlang
source:
  md5: 6b3cc8b0dce1091740d2e16ec97e8bb4
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/multiGSEA_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/multiGSEA/multiGSEA_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/multiGSEA_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-multigsea/bioconductor-multigsea_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('multiGSEA')"
