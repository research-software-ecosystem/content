about:
  description: 'annoreport summarizes annotated gene products across all bins from
    Prokka

    or Bakta metagenome annotation workflows. It auto-detects the annotation

    tool, enriches top gene products via the UniProt REST API, clusters genes

    by functional category, and produces an interactive HTML report and TSV

    summary table.

    '
  home: https://github.com/keplerridge/annoreport
  license: MIT
  license_file: LICENSE
  summary: Summary and visualization tool for MAG gene annotation workflows
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -v
extra:
  recipe-maintainers:
  - keplerridge
package:
  name: annoreport
  version: 0.1.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
source:
  sha256: df1268176543099d0e80ca6a8db04e06f7bd793f3fc95bde3005f59ffa45277b
  url: https://github.com/keplerridge/annoreport/archive/refs/tags/v0.1.0.tar.gz
test:
  commands:
  - annoreport --help
