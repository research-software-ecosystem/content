about:
  description: "Ebolaseq is a command-line tool that simplifies the process of analyzing\
    \ Ebola virus sequences. \nIt automates the complete workflow from downloading\
    \ sequences to creating phylogenetic trees.\n"
  dev_url: https://github.com/DaanJansen94/ebolaseq
  doc_url: https://github.com/DaanJansen94/ebolaseq/blob/v0.1.9/README.md
  home: https://github.com/DaanJansen94/ebolaseq
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Tool for downloading and analyzing Ebola virus sequences.
build:
  entry_points:
  - ebolaseq = ebolaseq.ebolaseq:cli_main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - DaanJansen94
package:
  name: ebolaseq
  version: 0.1.9
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - biopython >=1.81
  - numpy >=1.20.0
  - mafft
  - trimal
  - iqtree =2.4.0
  - minimap2
  - pal2nal
source:
  sha256: e4ccbc17a68ed8d1eb75c27e1e5854567efc5e8f5e081a3001c10a5b266b98f2
  url: https://github.com/DaanJansen94/ebolaseq/archive/v0.1.9.tar.gz
test:
  commands:
  - ebolaseq --help
  imports:
  - ebolaseq
