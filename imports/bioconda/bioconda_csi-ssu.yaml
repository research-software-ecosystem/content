about:
  description: "A command-line tool for screening SSU (Small Subunit ribosomal RNA)\
    \ sequences \nin genomic and transcriptomic data. This tool helps identify and\
    \ classify SSU \nsequences using phylogenetic placement in SSU reference packages\
    \ built from PR2 \nvia pplacer.\n\nFeatures include automated SSU screening using\
    \ BLAST, MAFFT, and pplacer, \nphylogenetic placement for contamination screening\
    \ and approximate taxonomic \nclassification, and a command-line interface for\
    \ easy integration into pipelines.\n"
  dev_url: https://github.com/AlexTiceLab/CSI-SSU
  doc_url: https://github.com/AlexTiceLab/CSI-SSU/blob/main/README.md
  home: https://github.com/AlexTiceLab/CSI-SSU
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: CSI SSU screening tool for genomic and transcriptomic data
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - robertejones
package:
  name: csi-ssu
  version: 1.0.0
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - snakemake-minimal >=7.0
  - blast >=2.12
  - mafft >=7.0
  - pplacer >=1.0
  - busco >=5.0
  - biopython >=1.79
  - pandas >=1.3
  - matplotlib-base >=3.4
  - ete3 >=3.1
  - numpy >=1.20
  - scipy >=1.7
source:
  sha256: c3c0107aa0fff722b96a9f4de265bdb94962d7be45487dc74bb20c0168c83d91
  url: https://github.com/AlexTiceLab/CSI-SSU/archive/refs/tags/v1.0.0.tar.gz
test:
  commands:
  - csi-ssu --help
  - csi-ssu --version
  imports:
  - csi_ssu
  - csi_ssu.cli
  - csi_ssu.runner
