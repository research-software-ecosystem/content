about:
  description: Two experimental datasets to illustrate running and analysing phylogenetic
    profiles with PhyloProfile package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/PhyloProfileData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Data package for phylogenetic profile analysis using PhyloProfile tool
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-phyloprofiledata
  version: 1.24.0
requirements:
  host:
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: eebcac4275c79b2c5680ed21f56b1ca1
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/PhyloProfileData_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/PhyloProfileData/PhyloProfileData_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/PhyloProfileData_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-phyloprofiledata/bioconductor-phyloprofiledata_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('PhyloProfileData')"
