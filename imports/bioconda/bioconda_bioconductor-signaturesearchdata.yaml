  - r-base
  - r-dplyr
  - r-magrittr
  - r-r.utils
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - r-base
  - r-dplyr
  - r-magrittr
  - r-r.utils
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 71b1eac92de8469273d28ddf8febcb43
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/signatureSearchData_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/signatureSearchData/signatureSearchData_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/signatureSearchData_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-signaturesearchdata/bioconductor-signaturesearchdata_1.24.0_src_all.tar.gz
test:
