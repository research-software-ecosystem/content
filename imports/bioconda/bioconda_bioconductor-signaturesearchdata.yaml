about:
  description: CMAP/LINCS hdf5 databases and other annotations used for signatureSearch
    software package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/signatureSearchData.html
  license: Artistic-2.0
  summary: Datasets for signatureSearch package
build:
