about:
  description: This package performs a Gene Set Analysis with the approach adopted
    by PADOG on the genes that are reported as translationally regulated (ie. exhibit
    a significant change in TE) by the DeltaTE package. It can be used on its own
    to see the impact of translation regulation on gene sets, but it is also integrated
    as an additional analysis method within ReactomeGSA, where results are further
    contextualised in terms of pathways and directionality of the change.
  home: https://bioconductor.org/packages/3.22/bioc/html/terapadog.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Translational Efficiency Regulation Analysis using the PADOG Method
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-terapadog
  version: 1.2.0
requirements:
  host:
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - r-base
  - r-dplyr
  - r-htmlwidgets
  - r-plotly
  run:
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - r-base
  - r-dplyr
  - r-htmlwidgets
  - r-plotly
