about:
  home: https://github.com/rrwick/Badread
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: A long read simulator that can imitate many types of read problems.
build:
  entry_points:
  - badread = badread.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: badread
  version: 0.4.2
requirements:
  host:
  - python >=3.6
  - pip
  - setuptools
  run:
  - python >=3.6
  - pip
  - numpy
  - python-edlib
  - matplotlib-base
  - scipy
source:
  sha256: 488ee2c4b87c064904e2ea1ef24ef833c2f5932aa4c1f03e361e2e4061692baf
  url: https://github.com/rrwick/Badread/archive/v0.4.2.tar.gz
test:
  commands:
  - badread -h
  imports:
  - edlib
  - numpy
  - scipy
  - matplotlib
