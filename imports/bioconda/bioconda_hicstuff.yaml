about:
  dev_url: https://github.com/koszullab/hicstuff
  doc_url: https://hicstuff.readthedocs.io/en/latest
  home: https://github.com/koszullab/hicstuff
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: General purpose stuff to generate and handle Hi-C data in its simplest
    form.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - lecorguille
package:
  name: hicstuff
  version: 3.2.5
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.8
  - biopython
  - rich-click >=1.7
  - matplotlib-base
  - numpy
  - pandas
  - pysam
  - requests
  - scipy
  - scikit-learn
  - minimap2
  - bowtie2
  - samtools
  - pyfastx
  - coreutils
  - cooler
  - pairtools
source:
  sha256: 8db7b39fee781bdbbe81add343e2ff49d43ee5b41d21cd3e023962e62b1149b6
  url: https://pypi.io/packages/source/h/hicstuff/hicstuff-3.2.5.tar.gz
test:
  commands:
  - hicstuff --help
  imports:
  - hicstuff
