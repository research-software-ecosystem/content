about:
  description: 'Manc-COJO extends COJO to multiple ancestries, using population-specific
    LD to improve

    independent signal detection. It can also run single-ancestry COJO compatible
    with GCTA-COJO.

    '
  dev_url: https://github.com/light156/multi-ancestry-COJO
  doc_url: https://light156.github.io/multi-ancestry-COJO-docs
  home: https://github.com/light156/multi-ancestry-COJO
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Multi-ancestry conditional and joint analysis (COJO) of GWAS summary statistics.
build:
  number: 0
  run_exports:
  - null
  skip: true
package:
  name: manc_cojo
  version: 1.1.0
requirements:
  build:
  - null
  - make
  host:
  - libgomp
  - llvm-openmp
  run:
  - libgomp
  - llvm-openmp
source:
  sha256: 0be0b3aba4adc0bb95b622beac365d317ad18d4332a0e209f2d4333c9e9bd9e9
  url: https://github.com/light156/multi-ancestry-COJO/archive/refs/tags/v1.1.0.tar.gz
test:
  commands:
  - manc_cojo --help
