about:
  description: 'Creates a muti-graph web page which allows the interactive exploration
    of differential analysis tests. The graphical web interface presents results as
    a table which is integrated with five interactive graphs: MA-plot, volcano plot,
    box plot, lines plot and cluster heatmap. Graphical aspect and information represented
    in the graphs can be customized by means of user controls. Final graphics can
    be exported as PNG format.'
  home: https://bioconductor.org/packages/3.22/bioc/html/Rvisdiff.html
  license: GPL-2 | GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Interactive Graphs for Differential Expression
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rvisdiff
  version: 1.8.1
requirements:
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
source:
  md5: ae02ad9abe1775bb4ae2a917a9de75dc
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rvisdiff_1.8.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rvisdiff/Rvisdiff_1.8.1.tar.gz
  - https://bioarchive.galaxyproject.org/Rvisdiff_1.8.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rvisdiff/bioconductor-rvisdiff_1.8.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('Rvisdiff')"
