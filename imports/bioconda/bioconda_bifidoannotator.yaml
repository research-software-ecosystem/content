about:
  description: 'bifidoAnnotator performs hierarchical annotation of bifidobacterial
    GH-encoding genes

    using MMseqs2, with an optional transporter annotation module, HMG-utilization
    row

    annotation bars, cluster row filtering, and publication-ready heatmap generation.

    '
  dev_url: https://github.com/nicholaspucci/bifidoAnnotator
  doc_url: https://github.com/nicholaspucci/bifidoAnnotator
  home: https://github.com/nicholaspucci/bifidoAnnotator
  license: MIT
  license_file: LICENSE
  summary: Fine-grained annotation of bifidobacterial enzymes involved in human-milk
    glycan (HMG) utilization
build:
  entry_points:
  - bifidoAnnotator = bifidoannotator.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv
extra:
  recipe-maintainers:
  - nicholaspucci
package:
  name: bifidoannotator
  version: 2.0.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - mmseqs2
  - pandas >=1.0.0
  - numpy >=1.18.0
  - matplotlib-base >=3.3.0
  - seaborn >=0.11.0
  - scipy >=1.5.0
  - setuptools
source:
  sha256: dd547be343d6f50231e66b8014429aaa81cda6bdb3adb55635b7dd57fa93cdac
  url: https://pypi.io/packages/source/b/bifidoannotator/bifidoannotator-2.0.0.tar.gz
test:
  commands:
  - bifidoAnnotator --help
  imports:
  - bifidoannotator
