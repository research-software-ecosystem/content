about:
  description: 'This is an external ExperimentData package for LRcell. This data package
    contains the gene enrichment scores calculated from scRNA-seq dataset which indicates
    the gene enrichment of each cell type in certain brain region. LRcell package
    is used to identify specific sub-cell types that drives the changes observed in
    a bulk RNA-seq differential gene expression experiment. For more details, please
    visit: https://github.com/marvinquiet/LRcell.'
  home: https://bioconductor.org/packages/3.22/data/experiment/html/LRcellTypeMarkers.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Marker gene information for LRcell R Bioconductor package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-lrcelltypemarkers
  version: 1.18.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: d4643766c00d738848251f39bc28092f
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/LRcellTypeMarkers_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/LRcellTypeMarkers/LRcellTypeMarkers_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/LRcellTypeMarkers_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-lrcelltypemarkers/bioconductor-lrcelltypemarkers_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('LRcellTypeMarkers')"
