about:
  description: This package provides functions for differential chromatin interaction
    analysis between two single-cell Hi-C data groups. It includes tools for imputation,
    normalization, and differential analysis of chromatin interactions. The package
    implements pooling techniques for imputation and offers methods to normalize and
    test for differential interactions across single-cell Hi-C datasets.
  home: https://bioconductor.org/packages/3.22/bioc/html/scHiCcompare.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Differential Analysis of Single-cell Hi-C Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-schiccompare
  version: 1.2.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-hiccompare >=1.32.0,<1.33.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-ggplot2
