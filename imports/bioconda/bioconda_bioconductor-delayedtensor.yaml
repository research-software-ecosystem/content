about:
  description: DelayedTensor operates Tensor arithmetic directly on DelayedArray object.
    DelayedTensor provides some generic function related to Tensor arithmetic/decompotision
    and dispatches it on the DelayedArray class. DelayedTensor also suppors Tensor
    contraction by einsum function, which is inspired by numpy einsum.
  home: https://bioconductor.org/packages/3.22/bioc/html/DelayedTensor.html
  license: Artistic-2.0
  summary: R package for sparse and out-of-core arithmetic and decomposition of Tensor
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-delayedtensor
  version: 1.16.0
requirements:
  host:
  - bioconductor-biocsingular >=1.26.0,<1.27.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-delayedrandomarray >=1.18.0,<1.19.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-s4arrays >=1.10.0,<1.11.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - r-base
  - r-einsum
  - r-irlba
  - r-matrix
  - r-rtensor
  run:
  - bioconductor-biocsingular >=1.26.0,<1.27.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-delayedrandomarray >=1.18.0,<1.19.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-s4arrays >=1.10.0,<1.11.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - r-base
  - r-einsum
  - r-irlba
  - r-matrix
  - r-rtensor
