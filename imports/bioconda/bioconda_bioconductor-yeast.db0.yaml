about:
  description: Base annotation databases for yeast, intended ONLY to be used by AnnotationDbi
    to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/yeast.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for yeast
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-yeast.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 1b7383067f3cfdf3c7ba1e87271d5aab
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/yeast.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/yeast.db0/yeast.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/yeast.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-yeast.db0/bioconductor-yeast.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('yeast.db0')"
