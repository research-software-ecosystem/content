about:
  description: This package provides ISoLDE a new method for identifying imprinted
    genes. This method is dedicated to data arising from RNA sequencing technologies.
    The ISoLDE package implements original statistical methodology described in the
    publication below.
  home: https://bioconductor.org/packages/3.22/bioc/html/ISoLDE.html
  license: GPL (>= 2.0)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Integrative Statistics of alleLe Dependent Expression
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
package:
  name: bioconductor-isolde
  version: 1.38.0
requirements:
  build:
  - null
  - make
  host:
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
source:
  md5: dcbddf50c2557607c8493629e64fc75f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ISoLDE_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ISoLDE/ISoLDE_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/ISoLDE_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-isolde/bioconductor-isolde_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ISoLDE')"
