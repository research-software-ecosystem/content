  - pip
  run:
  - python >=3.12
  - pydantic >=2.9.2,<3
source:
  sha256: 642f8bc50d3522f2d1c4bcd71885cd07accab32fc9a338f0546331e371f9dba1
  url: https://pypi.org/packages/source/g/grz-pydantic-models/grz_pydantic_models-2.7.0.tar.gz
test:
  commands:
  - pip check
  imports:
  - grz_pydantic_models
  requires:
  - pip
