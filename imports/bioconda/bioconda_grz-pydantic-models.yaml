about:
  home: https://github.com/BfArM-MVH/grz-tools
  license: MIT
  license_file: LICENSE
  summary: Pydantic models for the GRZ metadata schema
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - tedil
  - twrightsman
  - hoeze
package:
  name: grz-pydantic-models
  version: 2.6.0
requirements:
  host:
  - python >=3.12
  - hatchling
  - pip
  run:
  - python >=3.12
  - pydantic >=2.9.2,<3
source:
  sha256: 8c78329e2fe35ff7d1abf42b8f44e42fd9c3a457342bba6e6f3356aebabc36f9
  url: https://pypi.org/packages/source/g/grz-pydantic-models/grz_pydantic_models-2.6.0.tar.gz
test:
  commands:
  - pip check
  imports:
  - grz_pydantic_models
  requires:
  - pip
