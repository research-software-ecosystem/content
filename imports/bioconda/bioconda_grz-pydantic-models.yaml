  - pydantic >=2.9.2,<3
source:
  sha256: 997f732730025af6cc65a1824103fcf280e3f67d4a5e40bae570fe674046fea6
  url: https://pypi.org/packages/source/g/grz-pydantic-models/grz_pydantic_models-2.7.1.tar.gz
test:
  commands:
  - pip check
  imports:
  - grz_pydantic_models
  requires:
  - pip
