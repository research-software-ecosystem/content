about:
  description: A set of protein ID mappings for PFAM assembled using data from public
    repositories
  home: https://bioconductor.org/packages/3.22/data/annotation/html/PFAM.db.html
  license: Artistic-2.0
  summary: A set of protein ID mappings for PFAM
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-pfam.db
    path: recipes/bioconductor-pfam.db
    version: 3.6.0
package:
  name: bioconductor-pfam.db
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 401389a46383ca2ee9318356fce09621
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/PFAM.db_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/PFAM.db/PFAM.db_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/PFAM.db_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pfam.db/bioconductor-pfam.db_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('PFAM.db')"
