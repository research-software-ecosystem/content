about:
  description: This package provides a framework for the visualization of genome coverage
    profiles. It can be used for ChIP-seq experiments, but it can be also used for
    genome-wide nucleosome positioning experiments or other experiment types where
    it is important to have a framework in order to inspect how the coverage distributed
    across the genome
  home: https://bioconductor.org/packages/3.22/bioc/html/CoverageView.html
  license: Artistic-2.0
  summary: Coverage visualization package for R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-coverageview
  version: 1.48.0
requirements:
  host:
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
source:
  md5: 7ca10f02743a408c3f454778caf390c6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CoverageView_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CoverageView/CoverageView_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/CoverageView_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-coverageview/bioconductor-coverageview_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CoverageView')"
