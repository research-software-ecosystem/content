about:
  dev_url: https://github.com/treangenlab/Seqwin
  home: https://github.com/treangenlab/Seqwin
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Ultrafast identification of signature sequences in microbial genomes
build:
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: seqwin
  version: 0.2.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools >=61
  - wheel
  run:
  - python >=3.10
  - numpy >=2
  - numba
  - pandas >=2
  - networkx
  - pydantic >=2
  - typer
  - btllib
  - mash
  - blast
  - ncbi-datasets-cli
source:
  sha256: ba3989dc41aa7835af226b7ad610072bc39fee14ac19ef039ad94cfe0b8ff561
  url: https://github.com/treangenlab/Seqwin/archive/refs/tags/v0.2.2.tar.gz
test:
  commands:
  - seqwin --help
  imports:
  - seqwin
