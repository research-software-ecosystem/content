about:
  dev_url: https://github.com/treangenlab/Seqwin
  doc_url: https://github.com/treangenlab/Seqwin/wiki
  home: https://github.com/treangenlab/Seqwin
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Ultrafast identification of signature sequences in microbial genomes
build:
  number: 0
  run_exports:
  - null
  script:
  - export CXXFLAGS="${CXXFLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: seqwin
  version: 0.3.2
requirements:
  build:
  - null
  - null
  - cmake >=3.18
  - ninja >=1.10
  - make
  host:
  - python
  - pip
  - scikit-build-core >=0.12
  - pybind11 >=2.12
  run:
  - python
  - numpy >=2
  - numba
  - pandas >=2
  - networkx
  - pydantic >=2
  - typer
  - mash
  - blast
  - ncbi-datasets-cli
source:
  sha256: 2b716ec89172208d6115b3a994d6b11e1972372652f7eb47af7e47cfbc6526fc
  url: https://github.com/treangenlab/Seqwin/archive/refs/tags/v0.3.2.tar.gz
test:
  commands:
  - seqwin --help
  imports:
  - seqwin
  - seqwin.btllib
