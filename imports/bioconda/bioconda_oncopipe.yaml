  - python >=3.6
  - pyyaml
  - pandas
  - snakemake >=5.4,<5.19
source:
  sha256: 8bbdd02da79d416d2b54314454da302e32ebd7c1cf9734adfacadaa1d453a1d6
  url: https://github.com/LCR-BCCRC/lcr-modules/archive/v1.0.13.tar.gz
test:
  imports:
  - oncopipe
