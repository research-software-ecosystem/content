about:
  description: 'FusionInspector is a component of the Trinity Cancer Transcriptome
    Analysis Toolkit (CTAT). FusionInspector assists in fusion transcript discovery
    by performing a supervised analysis of fusion predictions, attempting to recover
    and re-score evidence for such predictions. - https://github.com/FusionInspector/FusionInspector/wiki

    '
  dev_url: https://github.com/FusionInspector/FusionInspector
  home: https://github.com/FusionInspector/FusionInspector
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: In silico Validation of Fusion Transcript Predictions.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
package:
  name: fusion-inspector
  version: 2.11.5
requirements:
  host:
  - perl
  - htslib
  - trinity >=2.15.1
  run:
  - python >=3
  - requests >=2.19.1
  - bzip2
  - htslib
  - samtools >=1.3
  - perl
  - perl-uri
  - perl-set-intervaltree
  - perl-db_file
  - gmap >=2017.11.15
  - star >=2.7.11b
  - trinity >=2.15.2
source:
  sha256: 16d3fbc308361496803e623fc8d7eec84be292374ceb6367dbc0eba8bf411be6
  url: https://github.com/FusionInspector/FusionInspector/releases/download/FusionInspector-v2.11.5/FusionInspector-v2.11.5.FULL.tar.gz
test:
  commands:
  - FusionInspector --help 2>&1
  - $PREFIX/share/fusion-inspector-2.11.5-0/util/retrieve_fusion_junction_reads_by_accession.pl
    --help 2>&1 | grep usage
