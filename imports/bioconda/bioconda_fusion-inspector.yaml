about:
  description: 'FusionInspector is a component of the Trinity Cancer Transcriptome
    Analysis Toolkit (CTAT). FusionInspector assists in fusion transcript discovery
    by performing a supervised analysis of fusion predictions, attempting to recover
    and re-score evidence for such predictions. - https://github.com/FusionInspector/FusionInspector/wiki

    '
  dev_url: https://github.com/FusionInspector/FusionInspector
  home: https://github.com/FusionInspector/FusionInspector
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: In silico Validation of Fusion Transcript Predictions.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
package:
  name: fusion-inspector
  version: 2.11.3
requirements:
  host:
  - htslib
  - trinity >=2.15.1
  run:
  - python >=3
  - requests >=2.19.1
  - bzip2
  - htslib
  - samtools >=1.3
  - perl
  - perl-uri
  - perl-set-intervaltree
  - perl-db_file
  - gmap >=2017.11.15
  - star >=2.6.1b
  - trinity >=2.15.1
source:
  sha256: 1698a6154fdf70dde1380bedd18fbd8753725076f0c898e2af89e226fb488acd
  url: https://github.com/FusionInspector/FusionInspector/releases/download/FusionInspector-v2.11.3/FusionInspector-v2.11.3.FULL.tar.gz
test:
  commands:
  - FusionInspector --help 2>&1
  - $PREFIX/share/fusion-inspector-2.11.3-0/util/retrieve_fusion_junction_reads_by_accession.pl
    --help 2>&1 | grep usage
