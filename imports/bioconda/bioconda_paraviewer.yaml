about:
  dev_url: https://github.com/PacificBiosciences/Paraviewer
  home: https://github.com/PacificBiosciences/Paraviewer
  license: Pacific Biosciences Software License Agreement
  summary: Automated visualization generator for Paraphase HiFi analysis tool
build:
  entry_points:
  - paraviewer = paraviewer.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir'
extra:
  recipe-maintainers:
  - jbelyeu
package:
  name: paraviewer
  version: 1.1.1
requirements:
  host:
  - pip
  - python >=3.10
  - hatchling
  run:
  - python >=3.10
  - jinja2 ==3.1.6
  - cachetools ==5.5.2
  - pysam ==0.24.0
  - orographer ==0.1.0
source:
  sha256: 9fdff0cfa8609498ff79e77e3611067ea86f722bd2670807a47628bbe24614e6
  url: https://github.com/PacificBiosciences/Paraviewer/archive/refs/tags/v1.1.1.tar.gz
test:
  commands:
  - paraviewer --version
  - paraviewer --help
