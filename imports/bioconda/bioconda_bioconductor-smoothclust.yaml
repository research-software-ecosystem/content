about:
  description: Method for identification of spatial domains and spatially-aware clustering
    in spatial transcriptomics data. The method generates spatial domains with smooth
    boundaries by smoothing gene expression profiles across neighboring spatial locations,
    followed by unsupervised clustering. Spatial domains consisting of consistent
    mixtures of cell types may then be further investigated by applying cell type
    compositional analyses or differential analyses.
  home: https://bioconductor.org/packages/3.22/bioc/html/smoothclust.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: smoothclust
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-smoothclust
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  run:
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
