  - bioconductor-data-packages >=20260207
source:
  md5: 5e1b8ccb160ab1dc7212a663d0ac1a3b
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/metaMSdata_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/metaMSdata/metaMSdata_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/metaMSdata_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-metamsdata/bioconductor-metamsdata_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('metaMSdata')"
