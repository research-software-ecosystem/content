about:
  description: This package contains a SummarizedExperiment from the Yu et al. (2013)
    paper that performed the rat BodyMap across 11 organs and 4 developmental stages.
    Raw FASTQ files were downloaded and mapped using STAR. Data is available on ExperimentHub
    as a data package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/bodymapRat.html
  license: CC BY 4.0
  summary: Experimental dataset from the rat BodyMap project
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bodymaprat
  version: 1.26.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 825fdbd656cc5bc24a37fd86356b6a06
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/bodymapRat_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/bodymapRat/bodymapRat_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/bodymapRat_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bodymaprat/bioconductor-bodymaprat_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('bodymapRat')"
