about:
  description: Tool for analysis of codon usage in various unannotated or KEGG/COG
    annotated DNA sequences. Calculates different measures of CU bias and CU-based
    predictors of gene expressivity, and performs gene set enrichment analysis for
    annotated sequences. Implements several methods for visualization of CU and enrichment
    analysis results.
  home: https://bioconductor.org/packages/3.22/bioc/html/coRdon.html
  license: Artistic-2.0
  summary: Codon Usage Analysis and Prediction of Gene Expressivity
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cordon
  version: 1.28.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-ggplot2
  - r-purrr
  - r-stringr
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-ggplot2
  - r-purrr
  - r-stringr
source:
  md5: 78cc260e20fb3a90983f2bd619eef4f6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/coRdon_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/coRdon/coRdon_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/coRdon_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cordon/bioconductor-cordon_1.28.0_src_all.tar.gz
test:
