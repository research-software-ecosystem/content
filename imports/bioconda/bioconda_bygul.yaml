about:
  dev_url: https://github.com/andersen-lab/Bygul
  home: https://github.com/andersen-lab/Bygul
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Bygul is an amplicon read simulating tool that can generate different sample
    read proportions based on user input.
build:
  entry_points:
  - bygul=bygul._cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
package:
  name: bygul
  version: 3.0.1
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools
  run:
  - python >=3.8
  - click
  - numpy
  - pandas
  - tqdm
  - biopython
  - wgsim
  - mason
source:
  sha256: 4cf54a2298812391fdbc09afd27d0f435e1c402cd6b80f9613f00e7a7981e5ad
  url: https://github.com/andersen-lab/Bygul/archive/V3.0.1.tar.gz
test:
  commands:
  - bygul simulate-proportions --help
