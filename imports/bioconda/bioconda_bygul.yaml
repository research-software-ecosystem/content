about:
  dev_url: https://github.com/andersen-lab/Bygul
  home: https://github.com/andersen-lab/Bygul
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Bygul is an amplicon read simulating tool that can generate different sample
    read proportions based on user input.
build:
  entry_points:
  - bygul=bygul._cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
package:
  name: bygul
  version: 3.2.0
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools
  run:
  - python >=3.8
  - click
  - numpy
  - pandas
  - tqdm
  - biopython
  - wgsim
  - mason
source:
  sha256: abf6c4856362e6aef23cc422f1f2f275aeeb006c64046ed716920d942a5ebb57
  url: https://github.com/andersen-lab/Bygul/archive/V3.2.0.tar.gz
test:
  commands:
  - bygul simulate-proportions --help
