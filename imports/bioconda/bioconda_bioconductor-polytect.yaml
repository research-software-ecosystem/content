about:
  description: Polytect is an advanced computational tool designed for the analysis
    of multi-color digital PCR data. It provides automatic clustering and labeling
    of partitions into distinct groups based on clusters first identified by the flowPeaks
    algorithm. Polytect is particularly useful for researchers in molecular biology
    and bioinformatics, enabling them to gain deeper insights into their experimental
    results through precise partition classification and data visualization.
  home: https://bioconductor.org/packages/3.22/bioc/html/Polytect.html
  license: Artistic-2.0
  summary: An R package for digital data clustering
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-polytect
  version: 1.2.0
requirements:
  host:
  - bioconductor-flowpeaks >=1.56.0,<1.57.0
  - r-base
  - r-biocmanager
  - r-cowplot
  - r-dicekriging
  - r-dplyr
  - r-ggplot2
  - r-lhs
  - r-mlrmbo
  - r-mvtnorm
  - r-paramhelpers
  - r-rgenoud
  - r-smoof
  - r-sn
  - r-tidyverse
  run:
  - bioconductor-flowpeaks >=1.56.0,<1.57.0
  - r-base
  - r-biocmanager
  - r-cowplot
  - r-dicekriging
  - r-dplyr
  - r-ggplot2
  - r-lhs
  - r-mlrmbo
  - r-mvtnorm
  - r-paramhelpers
  - r-rgenoud
  - r-smoof
