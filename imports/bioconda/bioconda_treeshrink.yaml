about:
  dev_url: https://github.com/uym2/TreeShrink
  doc_url: https://github.com/uym2/TreeShrink/blob/v1.4.0/README.md
  home: https://github.com/uym2/TreeShrink
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: An algorithm for detecting (and removing) abnormally long branches in one
    or more phylogenetic trees.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - mkdir -p ${PREFIX}/bin
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  - cp -f ${PREFIX}/bin/run_treeshrink.py ${PREFIX}/bin/run_treeshrink
  - chmod 0755 ${PREFIX}/bin/run_treeshrink
extra:
  identifiers:
  - doi:10.1186/s12864-018-4620-2
  - doi:10.1007/978-3-319-67979-2_7
package:
  name: treeshrink
  version: 1.4.0
requirements:
  host:
  - python >=3.8,<3.13
  - pip
  - setuptools
  run:
  - python >=3.8,<3.13
  - numpy
  - scipy
  - treeswift
source:
  sha256: 3bedad3aa2a35810dbe6c8635ba86143ebc4c8499181c5ffb98c9f7a4e86ee74
  url: https://github.com/uym2/TreeShrink/archive/refs/tags/v1.4.0.tar.gz
test:
  commands:
  - run_treeshrink -h
  imports:
  - treeshrink
  requires:
  - python <3.13
  - numpy
  - scipy
  - treeswift
