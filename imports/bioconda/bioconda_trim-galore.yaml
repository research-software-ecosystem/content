about:
  description: 'Trim Galore v2 is a Rust rewrite of the original Perl Trim Galore.
    Single

    static binary, no Python/Perl/Cutadapt/Java/igzip/pigz dependencies. Drop-in

    compatible with v0.6.x scripts and pipelines (same CLI, same output

    filenames, same report format) with adapter auto-detection (Illumina,

    Nextera, Small RNA, BGI/DNBSEQ), poly-G/poly-A trimming, paired-end

    single-pass processing, RRBS support, and bundled FastQC integration via

    fastqc-rust.

    '
  dev_url: https://github.com/FelixKrueger/TrimGalore
  home: https://www.trimgalore.com/
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: "Fast adapter and quality trimming for NGS data \u2014 Oxidized Edition\
    \ (Rust)"
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - usegalaxy-eu:trim_galore
  notes: "Linux x86_64, Linux aarch64, and macOS aarch64 (Apple Silicon) prebuilt\n\
    binaries ship via the GitHub Releases page. Intel Mac users (osx-x86_64)\nshould\
    \ install via `cargo install trim-galore`, or pull the Docker\nlinux/amd64 image\
    \ (`docker pull ghcr.io/felixkrueger/trimgalore:latest` on\nApple Silicon Docker\
    \ also works \u2014 pulls the linux/arm64 multi-arch variant).\n"
  recipe-maintainers:
  - FelixKrueger
  - ewels
  skip-lints:
  - should_be_noarch_generic
package:
  name: trim-galore
  version: 2.2.0
requirements:
  run: []
