about:
  home: https://github.com/minjeongjj/DupHIST
  license: MIT
  license_file: LICENSE
  summary: 'DupHIST: Duplication History Inference with Substitution-integrated Topology'
build:
  noarch: generic
  number: 0
  run_exports:
  - null
  script: 'mkdir -p $PREFIX/bin/scripts

    cp -r scripts/* $PREFIX/bin/scripts/

    cp duphist $PREFIX/bin/

    chmod +x $PREFIX/bin/duphist

    '
package:
  name: duphist
  version: 1.1.2
requirements:
  run:
  - perl
  - perl-config-tiny
  - perl-data-dumper
  - perl-statistics-r
  - r-base
  - r-cluster
  - r-desctools
  - r-nbclust
  - r-foreach
  - r-doparallel
  - r-tictoc
  - r-agricolae
  - r-ape
  - prank
  - kakscalculator2
  - mafft
  - fasttree
  - iqtree
source:
  sha256: bf80a03279e7ec04b5f5d9768a2ee5e267cdabc0762cc4690cb39c157ef48a78
  url: https://github.com/minjeongjj/DupHIST/archive/refs/tags/v1.1.2.tar.gz
test:
  commands:
  - duphist --help || true
