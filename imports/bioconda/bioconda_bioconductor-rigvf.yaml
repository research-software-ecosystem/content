about:
  description: The IGVF Catalog provides data on the impact of genomic variants on
    function. The `rigvf` package provides an interface to the IGVF Catalog, allowing
    easy integration with Bioconductor resources.
  home: https://bioconductor.org/packages/3.22/bioc/html/rigvf.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: R interface to the IGVF Catalog
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rigvf
  version: 1.2.3
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-cachem
  - r-dplyr
  - r-httr2
  - r-jsonlite
  - r-memoise
  - r-rjsoncons
  - r-rlang
  - r-tidyr
  - r-whisker
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-cachem
  - r-dplyr
  - r-httr2
  - r-jsonlite
  - r-memoise
  - r-rjsoncons
  - r-rlang
  - r-tidyr
  - r-whisker
source:
  md5: bcc9f46f6f36461370238bd884cea156
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rigvf_1.2.3.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rigvf/rigvf_1.2.3.tar.gz
  - https://bioarchive.galaxyproject.org/rigvf_1.2.3.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rigvf/bioconductor-rigvf_1.2.3_src_all.tar.gz
test:
  commands:
  - $R -e "library('rigvf')"
