about:
  description: 'Provides access to eoPred pretrained model hosted on ExperimentHub.
    Model was trained on placental DNA methylation preeclampsia samples using mixOmics
    splsda. There are two resources: 1. the model object, and 2. a testing data set
    used to demonstrate the function.'
  home: https://bioconductor.org/packages/3.22/data/experiment/html/eoPredData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: ExperimentHub package containing model data for predicting preeclampsia
    status for based on plcaental DNA methylation profile
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-eopreddata
  version: 1.4.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 26307e8618403f748306ad63b3d0533b
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/eoPredData_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/eoPredData/eoPredData_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/eoPredData_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-eopreddata/bioconductor-eopreddata_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('eoPredData')"
