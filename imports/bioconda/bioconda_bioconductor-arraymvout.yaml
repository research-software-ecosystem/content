about:
  description: This package supports the application of diverse quality metrics to
    AffyBatch instances, summarizing these metrics via PCA, and then performing parametric
    outlier detection on the PCs to identify aberrant arrays with a fixed Type I error
    rate
  home: https://bioconductor.org/packages/3.22/bioc/html/arrayMvout.html
  license: Artistic-2.0
  summary: multivariate outlier detection for expression array QA
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-arraymvout
  version: 1.68.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-affycontam >=1.68.0,<1.69.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-lumi >=2.62.0,<2.63.0
  - bioconductor-mdqc >=1.72.0,<1.73.0
  - bioconductor-parody >=1.68.0,<1.69.0
  - r-base
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-affycontam >=1.68.0,<1.69.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-lumi >=2.62.0,<2.63.0
  - bioconductor-mdqc >=1.72.0,<1.73.0
  - bioconductor-parody >=1.68.0,<1.69.0
  - r-base
source:
  md5: 1cc10943071b504c9419ced1231ef6e0
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/arrayMvout_1.68.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/arrayMvout/arrayMvout_1.68.0.tar.gz
  - https://bioarchive.galaxyproject.org/arrayMvout_1.68.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-arraymvout/bioconductor-arraymvout_1.68.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('arrayMvout')"
