about:
  description: Determine sample ploidy via flow cytometry histogram analysis. Reads
    Flow Cytometry Standard (FCS) files via the flowCore bioconductor package, and
    provides functions for determining the DNA ploidy of samples based on internal
    standards.
  home: https://bioconductor.org/packages/3.22/bioc/html/flowPloidy.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Analyze flow cytometer data to determine sample ploidy
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:flowploidy
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-flowploidy
    path: recipes/bioconductor-flowploidy
    version: 1.6.0
package:
  name: bioconductor-flowploidy
  version: 1.36.0
requirements:
  host:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-car
  - r-catools
  - r-knitr
  - r-minpack.lm
  - r-rmarkdown
  - r-shiny
  run:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-car
  - r-catools
  - r-knitr
  - r-minpack.lm
  - r-rmarkdown
  - r-shiny
source:
  md5: f3f65c02e90dfca3d556d9a70cc75eac
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowPloidy_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowPloidy/flowPloidy_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowPloidy_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowploidy/bioconductor-flowploidy_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('flowPloidy')"
