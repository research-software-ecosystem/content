about:
  description: Seamlessly interfaces the Basic Local Alignment Search Tool (BLAST)
    running locally to search genetic sequence data bases. This work was partially
    supported by grant no. R21HG005912 from the National Human Genome Research Institute.
  home: https://bioconductor.org/packages/3.22/bioc/html/rBLAST.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: R Interface for the Basic Local Alignment Search Tool
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rblast
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
source:
  md5: a1c2a49202262491184e00fa939994c4
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rBLAST_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rBLAST/rBLAST_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/rBLAST_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rblast/bioconductor-rblast_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rBLAST')"
