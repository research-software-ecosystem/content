about:
  description: Base annotation databases for zebrafish, intended ONLY to be used by
    AnnotationDbi to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/zebrafish.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for zebrafish
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-zebrafish.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 9619b53f6371c8591be06d92b24f305c
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/zebrafish.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/zebrafish.db0/zebrafish.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/zebrafish.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-zebrafish.db0/bioconductor-zebrafish.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('zebrafish.db0')"
