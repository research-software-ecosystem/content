about:
  description: A package to suggest the number of mutational signatures in a collection
    of somatic mutations using calculating the cross-validated perplexity score.
  home: https://bioconductor.org/packages/3.22/bioc/html/selectKSigs.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Selecting the number of mutational signatures using a perplexity-based
    measure and cross-validation
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-selectksigs
  version: 1.22.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-hilda >=1.24.0,<1.25.0
  - r-base
  - r-gtools
  - r-magrittr
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-hilda >=1.24.0,<1.25.0
  - r-base
  - r-gtools
  - r-magrittr
  - r-rcpp
source:
  md5: 49db9e7f0fd1a4b3130402cf244babd8
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/selectKSigs_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/selectKSigs/selectKSigs_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/selectKSigs_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-selectksigs/bioconductor-selectksigs_1.22.0_src_all.tar.gz
