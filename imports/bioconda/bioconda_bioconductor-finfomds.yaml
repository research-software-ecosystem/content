about:
  description: F-informed MDS is a new multidimensional scaling-based ordination method
    that configures data distribution based on the F-statistic (i.e., the ratio of
    dispersion between groups with shared or differing labels).
  home: https://bioconductor.org/packages/3.22/bioc/html/FinfoMDS.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Multidimensional Scaling with F-ratio for microbiome visualization
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-finfomds
  version: 1.0.0
requirements:
  host:
  - bioconductor-phyloseq >=1.54.0,<1.55.0
  - r-base
  run:
  - bioconductor-phyloseq >=1.54.0,<1.55.0
  - r-base
source:
  md5: ae520e10bda86c588b5406b82a62ff7b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/FinfoMDS_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/FinfoMDS/FinfoMDS_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/FinfoMDS_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-finfomds/bioconductor-finfomds_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('FinfoMDS')"
