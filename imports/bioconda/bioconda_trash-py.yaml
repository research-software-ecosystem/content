about:
  description: "trash-py is a Python re-implementation of the TRASH program (Tandem\n\
    Repeat Annotation and Structural Hierarchy) originally written in R by\nPiotr\
    \ W\u0142odzimierz. It identifies tandem repeat arrays in genome\nassemblies and\
    \ exposes a library of reusable repeat-annotation\nprimitives in addition to the\
    \ drag-and-drop CLI replacement for the\nupstream pipeline. Performance-critical\
    \ routines are implemented as a\nC extension.\n"
  dev_url: https://github.com/mbeavitt/trash-py
  home: https://github.com/mbeavitt/trash-py
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Tandem-repeat array identifier \u2014 Python port of TRASH."
build:
  entry_points:
  - trash-py = trash_py.cli:main
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1093/bioinformatics/btad308
  recipe-maintainers:
  - mbeavitt
package:
  name: trash-py
  version: 1.2.0
requirements:
  build:
  - null
  - null
  host:
  - python >=3.11
  - pip
  - setuptools >=68
  run:
  - python >=3.11
  - biopython >=1.83
  - numpy >=1.26
  - rapidfuzz >=3.6
  - hmmer
  - clustalo
source:
  sha256: 77e056fc6dbbe90161761fa496212003bcd32192e9199e93e0d87f97aee143ba
  url: https://github.com/mbeavitt/trash-py/archive/refs/tags/v1.2.0.tar.gz
test:
  commands:
  - trash-py --help
  imports:
  - trash_py
  - trash_py._ext
