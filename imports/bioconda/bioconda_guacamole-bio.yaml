about:
  home: https://github.com/CIBIV/GuaCAMOLE
  license: GPL-3.0-only
  license_file: COPYING
  summary: GC-aware species abundance estimation from metagenomic data.
build:
  entry_points:
  - create-reference-dist = guacamole.create_reference_dist:main
  - guacamole = guacamole.guacamole:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - fgp
  - Laurenz0908
package:
  name: guacamole-bio
  version: 1.0.2
requirements:
  host:
  - python >=3.10
  - setuptools >=61.0
  - wheel
  - python-build
  - pip
  run:
  - python >=3.10
  - pandas
  - numpy
  - matplotlib-base
  - seaborn
  - biopython
  - scipy
  - qpsolvers[cvxopt]
source:
  sha256: 32c72ccafe425cd4376abbe14da3aa36e83e0bb9ccc4f7b70cd25a59176359bc
  url: https://github.com/CIBIV/GuaCAMOLE/archive/v1.0.2.tar.gz
test:
  commands:
  - pip check
  - create-reference-dist --help
  - guacamole --help
  requires:
  - pip
  - python
