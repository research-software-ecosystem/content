about:
  description: Sorted and indexed BAM files for ChIP-seq libraries, for use in the
    chipseqDB workflow. BAM indices are also included.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/chipseqDBData.html
  license: CC BY 4.0
  summary: Data for the chipseqDB Workflow
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-chipseqdbdata
  version: 1.26.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 02d0f6a84651149c704c509431eb8974
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/chipseqDBData_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/chipseqDBData/chipseqDBData_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/chipseqDBData_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-chipseqdbdata/bioconductor-chipseqdbdata_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('chipseqDBData')"
