about:
  dev_url: https://www.github.com/bigbio/quantms-utils
  doc_url: https://quantms.org/home
  home: https://www.github.com/bigbio/quantms-utils
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python package with scripts and helpers for the quantms workflow.
build:
  entry_points:
  - quantmsutilsc=quantmsutils.quantmsutilsc:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - ypriverol
package:
  name: quantms-utils
  version: 0.0.27
requirements:
  host:
  - python
  - pip
  - poetry-core
  run:
  - python >=3.9,<3.13
  - click
  - sdrf-pipelines >=0.1.2
  - pyopenms >=3.3.0
  - pandas
  - numpy
  - pyarrow >=16.1.0
  - scipy
source:
  sha256: 31b9ea28a60aeb97068b8a02faa37157d8aaa159f2317a7916953ea079bdb6b7
  url: https://pypi.io/packages/source/q/quantms-utils/quantms_utils-0.0.27.tar.gz
test:
  commands:
  - quantmsutilsc --help
  imports:
  - quantmsutils
