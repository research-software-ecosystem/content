about:
  dev_url: https://www.github.com/bigbio/quantms-utils
  doc_url: https://quantms.org/home
  home: https://www.github.com/bigbio/quantms-utils
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python package with scripts and helpers for the quantms workflow.
build:
  entry_points:
  - quantmsutilsc=quantmsutils.quantmsutilsc:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - ypriverol
package:
  name: quantms-utils
  version: 0.0.25
requirements:
  host:
  - python
  - pip
  - poetry-core
  - setuptools <78
  run:
  - python >=3.9,<3.13
  - setuptools <78
  - click
  - sdrf-pipelines >=0.0.33,<0.1.0
  - pyopenms >=3.3.0
  - pandas
  - numpy
  - pyarrow >=16.1.0
  - scipy
source:
  sha256: cc178d55290b5afcddb93a8c1c3079cc4906610bfb53c4f501bf24915136d7f6
  url: https://pypi.io/packages/source/q/quantms-utils/quantms_utils-0.0.25.tar.gz
test:
  commands:
  - quantmsutilsc --help
  imports:
  - quantmsutils
  requires:
  - setuptools <78
