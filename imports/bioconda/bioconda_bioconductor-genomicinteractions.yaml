about:
  description: Utilities for handling genomic interaction data such as ChIA-PET or
    Hi-C, annotating genomic features with interaction information, and producing
    plots and summary statistics.
  home: https://bioconductor.org/packages/3.22/bioc/html/GenomicInteractions.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Utilities for handling genomic interaction data
build:
