about:
  description: This package is used for the analysis of long-range chromatin interactions
    from 3C-seq assay.
  home: https://bioconductor.org/packages/3.22/bioc/html/r3Cseq.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Analysis of Chromosome Conformation Capture and Next-generation Sequencing
    (3C-seq)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:r3cseq
  - doi:10.1093/nar/gkt373
  parent_recipe:
    name: bioconductor-r3cseq
    path: recipes/bioconductor-r3cseq
    version: 1.26.0
package:
