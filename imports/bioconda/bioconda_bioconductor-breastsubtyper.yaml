about:
  description: BreastSubtypeR provides an assumption-aware, multi-method framework
    for intrinsic molecular subtyping of breast cancer. The package harmonizes several
    published nearest-centroid (NC) and single-sample predictor (SSP) classifiers,
    supplies method-specific preprocessing and robust probe-to-gene mapping, and implements
    a cohort-aware AUTO mode that selectively enables classifiers compatible with
    the cohort composition. A local Shiny app (iBreastSubtypeR) is included for interactive
    analyses and to support users without programming experience.
  home: https://bioconductor.org/packages/3.22/bioc/html/BreastSubtypeR.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Cohort-aware methods for intrinsic molecular subtyping of breast cancer
