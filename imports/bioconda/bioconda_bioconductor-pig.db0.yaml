about:
  description: Base annotation databases for pig, intended ONLY to be used by AnnotationDbi
    to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/pig.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for pig
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-pig.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: aa7df4a51e5bf55a42eeca2db21a7be7
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/pig.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pig.db0/pig.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/pig.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pig.db0/bioconductor-pig.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('pig.db0')"
