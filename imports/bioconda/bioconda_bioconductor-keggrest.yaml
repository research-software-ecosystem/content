about:
  description: A package that provides a client interface to the Kyoto Encyclopedia
    of Genes and Genomes (KEGG) REST API. Only for academic use by academic users
    belonging to academic institutions (see <https://www.kegg.jp/kegg/rest/>). Note
    that KEGGREST is based on KEGGSOAP by J. Zhang, R. Gentleman, and Marc Carlson,
    and KEGG (python package) by Aurelien Mazurie.
  home: https://bioconductor.org/packages/3.22/bioc/html/KEGGREST.html
  license: Artistic-2.0
  summary: Client-side REST access to the Kyoto Encyclopedia of Genes and Genomes
    (KEGG)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:keggrest
  - doi:10.1007/s11845-015-1283-8
  parent_recipe:
    name: bioconductor-keggrest
    path: recipes/bioconductor-keggrest
    version: 1.20.2
package:
  name: bioconductor-keggrest
  version: 1.50.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-httr
  - r-png
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-httr
  - r-png
source:
  md5: 719627205317fc510d64d84158fdce8f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/KEGGREST_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/KEGGREST/KEGGREST_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/KEGGREST_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-keggrest/bioconductor-keggrest_1.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('KEGGREST')"
