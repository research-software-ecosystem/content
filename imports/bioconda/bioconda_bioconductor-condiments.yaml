about:
  description: This package encapsulate many functions to conduct a differential topology
    analysis. It focuses on analyzing an 'omic dataset with multiple conditions. While
    the package is mostly geared toward scRNASeq, it does not place any restriction
    on the actual input format.
  home: https://bioconductor.org/packages/3.22/bioc/html/condiments.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Differential Topology, Progression and Differentiation
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-condiments
  version: 1.18.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-distinct >=1.22.0,<1.23.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-slingshot >=2.18.0,<2.19.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-trajectoryutils >=1.18.0,<1.19.0
  - r-base
  - r-dplyr >=1.0
  - r-ecume >=0.9.1
  - r-igraph
  - r-magrittr
  - r-matrixstats
  - r-mgcv
  - r-pbapply
  - r-rann
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-distinct >=1.22.0,<1.23.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-slingshot >=2.18.0,<2.19.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-trajectoryutils >=1.18.0,<1.19.0
  - r-base
  - r-dplyr >=1.0
  - r-ecume >=0.9.1
  - r-igraph
  - r-magrittr
  - r-matrixstats
  - r-mgcv
  - r-pbapply
  - r-rann
source:
  md5: 4610734caf01bd72afe592f310e76530
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/condiments_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/condiments/condiments_1.18.0.tar.gz
