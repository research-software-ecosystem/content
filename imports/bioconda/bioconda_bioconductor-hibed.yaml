about:
  description: Hierarchical deconvolution for extensive cell type resolution in the
    human brain using DNA methylation. The HiBED deconvolution estimates proportions
    up to 7 cell types (GABAergic neurons, glutamatergic neurons, astrocytes, microglial
    cells, oligodendrocytes, endothelial cells, and stromal cells) in bulk brain tissues.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/HiBED.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: HiBED
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hibed
  version: 1.8.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-flowsorted.blood.epic >=2.14.0,<2.15.0
  - bioconductor-flowsorted.dlpfc.450k >=1.46.0,<1.47.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-tibble
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-flowsorted.blood.epic >=2.14.0,<2.15.0
  - bioconductor-flowsorted.dlpfc.450k >=1.46.0,<1.47.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-tibble
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 2df56917c24578ad6ccef9134e5a9b7e
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HiBED_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HiBED/HiBED_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/HiBED_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hibed/bioconductor-hibed_1.8.0_src_all.tar.gz
test:
