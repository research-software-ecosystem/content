    time course sequencing data, clustering analysis and visualization of the temporal
    patterns of time course data.
  home: https://bioconductor.org/packages/3.22/bioc/html/TCseq.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Time course sequencing data analysis
