about:
  description: Account for missing values in label-free mass spectrometry data without
    imputation. The package implements a probabilistic dropout model that ensures
    that the information from observed and missing values are properly combined. It
    adds empirical Bayesian priors to increase power to detect differentially abundant
    proteins.
  home: https://bioconductor.org/packages/3.22/bioc/html/proDA.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Differential Abundance Analysis of Label-Free Mass Spectrometry Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-proda
  version: 1.24.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-extradistr
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-extradistr
source:
  md5: 1e63b09dc63c1360597cff27ce1c65d7
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/proDA_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/proDA/proDA_1.24.0.tar.gz
