about:
  description: This package extends flowCore to provide functionality specific to
    bead data. One of the goals of this package is to automate analysis of bead data
    for the purpose of normalisation.
  home: https://bioconductor.org/packages/3.22/bioc/html/flowBeads.html
  license: Artistic-2.0
  summary: 'flowBeads: Analysis of flow bead data'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:flowbeads
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-flowbeads
    path: recipes/bioconductor-flowbeads
    version: 1.18.0
package:
  name: bioconductor-flowbeads
  version: 1.48.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-knitr
  - r-rrcov
  - r-xtable
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-knitr
  - r-rrcov
  - r-xtable
source:
  md5: f12eed61c7d203349f1f7884334f5d9b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowBeads_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowBeads/flowBeads_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowBeads_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowbeads/bioconductor-flowbeads_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('flowBeads')"
