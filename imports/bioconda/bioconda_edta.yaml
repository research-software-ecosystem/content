  - cd-hit
  - coreutils
  - genometools-genometools
  - grep
  - helitronscanner
  - ltr_finder_parallel
  - ltr_harvest_parallel
  - ltr_retriever >=3.0.0
  - mdust
  - muscle
  - openjdk
  - pandas
  - perl
  - perl-json
  - perl-text-soundex
  - python >=3.8
  - pyarrow
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-here
  - r-tidyr
  - repeatmodeler >=2
  - repeatmasker
  - samtools
  - tesorter
  - tir-learner
source:
  sha256: 66437a333403429cad1d8c11c43a862dc8e376e50f3983cbeabae62276e0dc94
  url: https://github.com/oushujun/EDTA/archive/v2.3.0.tar.gz
test:
  commands:
  - EDTA.pl -h > /dev/null
  - EDTA.pl --check_dependencies > /dev/null
  - EDTA_processK.pl -h 2>&1 | grep -i "Perform EDTA"
  - EDTA_raw.pl -h 2>&1 | grep -i "Obtain raw"
  - lib-test.pl -h 2>&1 | grep -i "To test"
