about:
  dev_url: https://github.com/nextgenusfs/funannotate2
  doc_url: https://funannotate2.readthedocs.io/en/latest
  home: https://github.com/nextgenusfs/funannotate2
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: 'Funannotate2: eukarytoic genome annotation pipeline.'
build:
  entry_points:
  - funannotate2 = funannotate2.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - nextgenusfs
package:
  name: funannotate2
  version: 26.4.22
requirements:
  host:
  - python >=3.7,<3.14
  - hatchling
  - pip
  run:
  - python >=3.7,<3.14
  - natsort
  - numpy
  - mappy
  - gfftk >=26.2.12
  - buscolite >=26.1.26
  - gapmm2 >=25.8.12
  - pyhmmer >=0.12.0
  - pyfastx >=2.0.0
  - requests
  - gb-io >=0.3.2
  - json-repair
  - pytantan
  - psutil
  - annorefine >=2026.2.9
  - augustus >=3.5.0
  - snap
  - glimmerhmm
  - diamond
  - trnascan-se
  - table2asn
source:
  sha256: 119702c89ade9c26810bdedef2a1e7a0a1630136a060dc486e3e117d7828ce6e
  url: https://pypi.org/packages/source/f/funannotate2/funannotate2-26.4.22.tar.gz
test:
  commands:
  - funannotate2 --help
  imports:
  - funannotate2
