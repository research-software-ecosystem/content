about:
  description: This package performs degradation normalization in bulk RNA-seq data
    to improve differential expression analysis accuracy. It provides estimates for
    each gene within each sample.
  home: https://bioconductor.org/packages/3.22/bioc/html/DegNorm.html
  license: LGPL (>= 3)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: 'DegNorm: degradation normalization for RNA-seq data'
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-degnorm
  version: 1.20.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
