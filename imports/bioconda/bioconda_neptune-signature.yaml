about:
  dev_url: https://github.com/phac-nml/neptune
  home: https://github.com/phac-nml/neptune
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE.txt
  summary: 'Neptune: Genomic Signature Discovery'
build:
  entry_points:
  - neptune = neptune.Neptune:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: neptune-signature
  version: 2.0.1
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - numpy
  - scipy
  - biopython
  - blast
source:
  sha256: 8456b3af281e4e9605e44e506eb9dd08d223ca7b60a54500c906456625daa654
  url: https://github.com/phac-nml/neptune/archive/refs/tags/v2.0.1.tar.gz
test:
  commands:
  - neptune -h 2>&1 | grep 'usage' > /dev/null
