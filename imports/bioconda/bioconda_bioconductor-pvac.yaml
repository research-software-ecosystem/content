about:
  description: The package contains the function for filtering genes by the proportion
    of variation accounted for by the first principal component (PVAC).
  home: https://bioconductor.org/packages/3.22/bioc/html/pvac.html
  license: LGPL (>= 2.0)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: PCA-based gene filtering for Affymetrix arrays
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:pvac
  - doi:10.1093/nar/gkr241
  parent_recipe:
    name: bioconductor-pvac
    path: recipes/bioconductor-pvac
    version: 1.28.0
package:
  name: bioconductor-pvac
  version: 1.58.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
source:
  md5: 4a4bf7bde824b3ca0a5a97e86d48ad50
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/pvac_1.58.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pvac/pvac_1.58.0.tar.gz
  - https://bioarchive.galaxyproject.org/pvac_1.58.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pvac/bioconductor-pvac_1.58.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('pvac')"
