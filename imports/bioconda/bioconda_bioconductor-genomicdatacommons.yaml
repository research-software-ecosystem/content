  - https://bioarchive.galaxyproject.org/GenomicDataCommons_1.34.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-genomicdatacommons/bioconductor-genomicdatacommons_1.34.1_src_all.tar.gz
