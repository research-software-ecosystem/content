about:
  description: A set of low-level utilities to retrieve data from the UCSC Genome
    Browser. Most functions in the package access the data via the UCSC REST API but
    some of them query the UCSC MySQL server directly. Note that the primary purpose
    of the package is to support higher-level functionalities implemented in downstream
    packages like GenomeInfoDb or txdbmaker.
  home: https://bioconductor.org/packages/3.22/bioc/html/UCSC.utils.html
  license: Artistic-2.0
  summary: Low-level utilities to retrieve data from the UCSC Genome Browser
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ucsc.utils
  version: 1.6.1
requirements:
  host:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-httr
  - r-jsonlite
  run:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-httr
  - r-jsonlite
source:
  md5: 24ac0d61a6fda5ed4e8f9c2d9fde80b8
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/UCSC.utils_1.6.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/UCSC.utils/UCSC.utils_1.6.1.tar.gz
  - https://bioarchive.galaxyproject.org/UCSC.utils_1.6.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ucsc.utils/bioconductor-ucsc.utils_1.6.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('UCSC.utils')"
