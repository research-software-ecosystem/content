about:
  description: To classify Helicobacter pylori genomes according to genetic distance
    from nine reference populations. The nine reference populations are hpgpAfrica,
    hpgpAfrica-distant, hpgpAfroamerica, hpgpEuroamerica, hpgpMediterranea, hpgpEurope,
    hpgpEurasia, hpgpAsia, and hpgpAklavik86-like. The vertex populations are Africa,
    Europe and Asia.
  home: https://bioconductor.org/packages/3.22/bioc/html/GrafGen.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Classification of Helicobacter Pylori Genomes
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-grafgen
  version: 1.6.0
