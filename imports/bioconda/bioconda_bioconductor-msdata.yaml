about:
  description: Ion Trap positive ionization mode data in mzML file format.  Subset
    from 500-850 m/z and 1190-1310 seconds, incl. MS2 and MS3, intensity threshold
    100.000. Extracts from FTICR Apex III, m/z 400-450.  Subset of UPLC - Bruker micrOTOFq
    data, both mzML and mz5. LC-MSMS and MRM files from proteomics experiments. PSI
    mzIdentML example files for various search engines.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/msdata.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Various Mass Spectrometry raw data example files
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-msdata
  version: 0.50.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: d8cb9351e410ea52dca527cad2392008
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/msdata_0.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/msdata/msdata_0.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/msdata_0.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-msdata/bioconductor-msdata_0.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('msdata')"
