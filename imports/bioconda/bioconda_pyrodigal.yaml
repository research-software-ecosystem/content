about:
  dev_url: https://github.com/althonos/pyrodigal
  doc_url: https://pyrodigal.readthedocs.org
  home: https://github.com/althonos/pyrodigal
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: COPYING
  summary: Python bindings to Prodigal, an ORF finder for microbial sequences.
build:
  entry_points:
  - pyrodigal = pyrodigal.cli:main
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.21105/joss.04296
  recipe-maintainers:
  - althonos
package:
  name: pyrodigal
  version: 3.7.1
requirements:
  build:
  - null
  - cmake >=3.20
  - make
  host:
  - python
  - pip
  - cython
  - scikit-build-core
  run:
  - null
  - archspec >=0.2.0
source:
  sha256: 0262fc5b5fd0b16c18eb3eb9b6079e1590e6d838c3f8431c46d9027c8e67f600
  url: https://pypi.org/packages/source/p/pyrodigal/pyrodigal-3.7.1.tar.gz
test:
  commands:
  - pyrodigal --help
  - python -m unittest -vv pyrodigal.tests
  imports:
  - pyrodigal
