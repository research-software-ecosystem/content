about:
  description: This package contains several sets of omics data including Gene Expression
    (ExpressionSet), Methylation (GenomicRatioSet), Proteome and Exposome (ExposomeSet).
    This data is used in vignettes and exaples at MEAL, MultiDataSet and omicRexposome.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/brgedata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Exposures, Gene Expression and Methylation data for ilustration purpouses
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-brgedata
  version: 1.32.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: c0161d5a1d8d9193dee153b7fe69e687
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/brgedata_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/brgedata/brgedata_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/brgedata_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-brgedata/bioconductor-brgedata_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('brgedata')"
