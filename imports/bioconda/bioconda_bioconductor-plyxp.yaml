about:
  description: The package provides `rlang` data masks for the SummarizedExperiment
    class. The enables the evaluation of unquoted expression in different contexts
    of the SummarizedExperiment object with optional access to other contexts. The
    goal for `plyxp` is for evaluation to feel like a data.frame object without ever
    needing to unwind to a rectangular data.frame.
  home: https://bioconductor.org/packages/3.22/bioc/html/plyxp.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Data masks for SummarizedExperiment enabling dplyr-like manipulation
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-plyxp
  version: 1.4.3
requirements:
  host:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cli
  - r-dplyr
  - r-glue
  - r-pillar
  - r-purrr
  - r-rlang
  - r-s7
  - r-tibble
  - r-tidyr
  - r-tidyselect
  - r-vctrs
  run:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cli
  - r-dplyr
  - r-glue
  - r-pillar
  - r-purrr
  - r-rlang
  - r-s7
  - r-tibble
  - r-tidyr
  - r-tidyselect
  - r-vctrs
source:
  md5: 756fafbd13b961e28bf4ba5df5ea17c3
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/plyxp_1.4.3.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/plyxp/plyxp_1.4.3.tar.gz
  - https://bioarchive.galaxyproject.org/plyxp_1.4.3.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-plyxp/bioconductor-plyxp_1.4.3_src_all.tar.gz
test:
