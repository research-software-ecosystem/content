  home: https://github.com/RIVM-bioinformatics/Pacini-typing
  license: AGPL-3.0
  license_file: LICENSE
  summary: YAML-based bacterial genotyping application
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . --no-deps --no-build-isolation -vv
extra:
