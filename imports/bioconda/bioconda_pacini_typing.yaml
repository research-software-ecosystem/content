about:
  dev_url: https://github.com/RIVM-bioinformatics/Pacini-typing
  home: https://github.com/RIVM-bioinformatics/Pacini-typing
  license: AGPL-3.0
  license_file: LICENSE
  summary: YAML-based bacterial genotyping application
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - MarkStreek
package:
  name: pacini_typing
  version: 3.1.1
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - pandas
  - pyyaml
  - blast
  - kma
source:
  sha256: ac2e2483ebe10aba4eeb9ffe32e88c94bd9f98b9bc0dc792b59e470da6ca231c
  url: https://github.com/RIVM-bioinformatics/Pacini-typing/archive/refs/tags/v3.1.1.tar.gz
test:
  commands:
  - pacini_typing --help
  - Pacini-typing --help
