about:
  description: A curated dataset of RNA-Seq samples. The samples are MDI-induced pre-phagocytes
    (3T3-L1) at different time points/stage of differentiation. The package document
    the data collection, pre-processing and processing. In addition to the documentation,
    the package contains the scripts that was used to generated the data.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/curatedAdipoRNA.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: A Curated RNA-Seq Dataset of MDI-induced Differentiated Adipocytes (3T3-L1)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-curatedadiporna
  version: 1.26.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: ec5d48c37723f2d2f2d480fa2f31a39d
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/curatedAdipoRNA_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/curatedAdipoRNA/curatedAdipoRNA_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/curatedAdipoRNA_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-curatedadiporna/bioconductor-curatedadiporna_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('curatedAdipoRNA')"
