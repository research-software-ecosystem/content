about:
  description: Tools to visualise read coverage from sequencing experiments together
    with genomic annotations (genes, transcripts, peaks). Introns of long transcripts
    can be rescaled to a fixed length for better visualisation of exonic read coverage.
  home: https://bioconductor.org/packages/3.22/bioc/html/wiggleplotr.html
  license: Apache License 2.0
  summary: Make read coverage plots from BigWig files
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-wiggleplotr
    path: recipes/bioconductor-wiggleplotr
    version: 1.4.0
package:
  name: bioconductor-wiggleplotr
  version: 1.34.0
requirements:
  host:
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-assertthat
  - r-base
  - r-cowplot
  - r-dplyr
  - r-ggplot2 >=2.2.0
  - r-purrr
  run:
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-assertthat
  - r-base
  - r-cowplot
  - r-dplyr
  - r-ggplot2 >=2.2.0
  - r-purrr
source:
  md5: 3ef5f75e12f003fb7b7815e70a00967b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/wiggleplotr_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/wiggleplotr/wiggleplotr_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/wiggleplotr_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-wiggleplotr/bioconductor-wiggleplotr_1.34.0_src_all.tar.gz
test:
