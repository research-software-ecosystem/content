about:
  description: The package contains functions for inferece of target gene regulation
    by miRNA, based on only target gene expression profile.
  home: https://bioconductor.org/packages/3.22/bioc/html/MiRaGE.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: MiRNA Ranking by Gene Expression
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:mirage
  parent_recipe:
    name: bioconductor-mirage
    path: recipes/bioconductor-mirage
    version: 1.22.0
package:
  name: bioconductor-mirage
  version: 1.52.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-biocmanager
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-biocmanager
source:
  md5: 117d9faf24d17254c4bbc1dcca0aa054
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MiRaGE_1.52.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MiRaGE/MiRaGE_1.52.0.tar.gz
  - https://bioarchive.galaxyproject.org/MiRaGE_1.52.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mirage/bioconductor-mirage_1.52.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MiRaGE')"
