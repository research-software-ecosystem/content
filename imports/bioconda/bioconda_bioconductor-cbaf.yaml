about:
  description: This package contains functions that allow analysing and comparing
    omic data across various cancers/cancer subgroups easily. So far, it is compatible
    with RNA-seq, microRNA-seq, microarray and methylation datasets that are stored
    on cbioportal.org.
  home: https://bioconductor.org/packages/3.22/bioc/html/cbaf.html
  license: Artistic-2.0
  summary: Automated functions for comparing various omic data from cbioportal.org
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cbaf
  version: 1.32.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-cbioportaldata >=2.22.0,<2.23.0
  - bioconductor-genefilter >=1.92.0,<1.93.0
  - r-base
  - r-gplots
  - r-openxlsx
  - r-rcolorbrewer
  - r-zip
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-cbioportaldata >=2.22.0,<2.23.0
  - bioconductor-genefilter >=1.92.0,<1.93.0
  - r-base
  - r-gplots
  - r-openxlsx
  - r-rcolorbrewer
  - r-zip
source:
  md5: 6047bcca88c3a0f1c6ed5feedc9e5fdd
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/cbaf_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/cbaf/cbaf_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/cbaf_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cbaf/bioconductor-cbaf_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('cbaf')"
