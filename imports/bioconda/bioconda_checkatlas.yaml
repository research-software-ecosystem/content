about:
  dev_url: https://github.com/becavin-lab/checkatlas
  doc_url: https://checkatlas.readthedocs.io/
  home: https://checkatlas.readthedocs.io/
  license: BSD 3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: One liner tool to check the quality of your single-cell atlases.
build:
  entry_points:
  - checkatlas = checkatlas.__main__:main
  - checkatlas-workflow = checkatlas.checkatlas_workflow:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation -vvv'
extra:
  recipe-maintainers:
  - drbecavin
package:
  name: checkatlas
  version: 0.8.2
requirements:
  host:
  - pip
  - poetry-core >=1.5.1,<2.0.0
  - python >=3.10
  run:
  - python >=3.10
  - llvmlite >=0.39.1,<0.40.0
  - numba >=0.56.4,<0.57.0
  - numpy >=1.23.5,<2.0.0
  - rpy2 ==3.5.10
  - scanpy >=1.9.1,<2.0.0
  - scikit-learn >=1.2.1,<2.0.0
  - types-pyyaml >=6.0.12.6,<7.0.0.0
source:
  sha256: cf690b2db057273d79d05d81a4c8671aec97848f8d73081f807a9eb7d64ff7d7
  url: https://pypi.io/packages/source/c/checkatlas/checkatlas-0.8.2.tar.gz
test:
  commands:
  - checkatlas --help
  - checkatlas-workflow --help
  imports:
  - checkatlas
  - checkatlas.metrics
  - checkatlas.metrics.annot
  - checkatlas.metrics.cluster
  - checkatlas.metrics.dimred
  - checkatlas.metrics.specificity
  - checkatlas.utils
