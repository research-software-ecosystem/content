  home: https://github.com/bio-miga/MyTaxa
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: "MyTaxa \u2014 Taxonomic classification of microbial genomes"
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - lmrodriguezr
notes: "The MyTaxa reference database (~2.4\u202FGB) is **not included** in the Bioconda\
  \ package.\n\nTo download the database after installation, run:\n\n    python $CONDA_PREFIX/share/mytaxa/utils/download_db.py\n\
  \nThis will create a `db/` directory containing the MyTaxa reference files.\n\n\n\
  After downloading, MyTaxa will look for the database directory in the\nfollowing\
  \ order:\n\n  1. If the environment variable MYTAXA_DB is set and non-empty, MyTaxa\n\
  \     will use that directory.\n  2. Otherwise, it will fall back to the default\
  \ location:\n     <directory_of_MyTaxa_executable>/db\n\nExample usage:\n\n    export\
  \ MYTAXA_DB=/path/to/mytaxa/db\n    MyTaxa -h"
package:
  name: mytaxa
  version: 1.2.0
requirements:
  build:
  - null
  - null
  - make
source:
  sha256: 568e186e0ea6a25baf6b8515872af919f7e76d684bb9003425485cb210eb4cb8
  url: https://github.com/bio-miga/MyTaxa/archive/refs/tags/v1.2.0.tar.gz
test:
  commands:
  - command -v MyTaxa
  - 'MyTaxa | grep Version:'
