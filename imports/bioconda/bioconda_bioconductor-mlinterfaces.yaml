  home: https://bioconductor.org/packages/3.22/bioc/html/MLInterfaces.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Uniform interfaces to R machine learning procedures for data in Bioconductor
    containers
