about:
  description: A package to merge, filter sort, organise and otherwise mash together
    metabolite annotation tables. Metabolite annotations can be imported from multiple
    sources (software) and combined using workflow steps based on S4 class templates
    derived from the `struct` package. Other modular workflow steps such as filtering,
    merging, splitting, normalisation and rest-api queries are included.
  home: https://bioconductor.org/packages/3.22/bioc/html/MetMashR.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Metabolite Mashing with R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-metmashr
  version: 1.4.0
requirements:
  host:
  - bioconductor-struct >=1.22.0,<1.23.0
  - r-base
  - r-cowplot
  - r-dplyr
  - r-ggplot2
  - r-ggthemes
  - r-httr
  - r-rlang
  - r-scales
  run:
  - bioconductor-struct >=1.22.0,<1.23.0
  - r-base
  - r-cowplot
  - r-dplyr
  - r-ggplot2
  - r-ggthemes
  - r-httr
  - r-rlang
  - r-scales
source:
  md5: 41192b4f6b97e721aae03697ce536aad
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MetMashR_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MetMashR/MetMashR_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/MetMashR_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-metmashr/bioconductor-metmashr_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MetMashR')"
