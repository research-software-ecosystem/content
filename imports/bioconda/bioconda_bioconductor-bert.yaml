about:
  description: Provides efficient batch-effect adjustment of data with missing values.
    BERT orders all batch effect correction to a tree of pairwise computations. BERT
    allows parallelization over sub-trees.
  home: https://bioconductor.org/packages/3.22/bioc/html/BERT.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: High Performance Data Integration for Large-Scale Analyses of Incomplete
    Omic Profiles Using Batch-Effect Reduction Trees (BERT)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bert
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-cluster
  - r-comprehenr
  - r-foreach >=1.5.2
  - r-invgamma
  - r-iterators >=1.0.14
  - r-janitor >=2.2.0
  - r-logging >=0.10-108
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-cluster
  - r-comprehenr
  - r-foreach >=1.5.2
  - r-invgamma
  - r-iterators >=1.0.14
  - r-janitor >=2.2.0
  - r-logging >=0.10-108
source:
