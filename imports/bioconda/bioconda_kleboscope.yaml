about:
  description: 'Kleboscope is a complete, automated genomic analysis pipeline for
    Klebsiella pneumoniae,

    featuring parallel execution for rapid processing of bacterial genomes.

    '
  dev_url: https://github.com/bbeckley-hub/Kleboscope
  doc_url: https://github.com/bbeckley-hub/Kleboscope
  home: https://github.com/bbeckley-hub/Kleboscope
  license: MIT
  license_file: LICENSE
  summary: 'Kleboscope: Comprehensive K. pneumoniae genomic typing pipeline with parallel
    execution'
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation -vvv'
extra:
  recipe-maintainers:
  - bbeckley-hub
package:
  name: kleboscope
  version: 1.0.1
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - pandas >=1.5.0
  - biopython >=1.85
  - psutil >=5.9.0
  - requests >=2.28.0
  - tqdm >=4.64.0
  - click >=8.0.0
  - kaptive >=3.1.0
  - beautifulsoup4 >=4.11.0
  - lxml >=4.9.0
  - matplotlib-base >=3.5.0
  - seaborn >=0.12.0
  - scipy >=1.10.1
  - plotly >=5.10.0
  - abricate >=1.2.0
  - perl
  - any2fasta
  - blast >=2.13.0
  - perl-moo
  - perl-list-moreutils
  - perl-json
  - perl-lwp-protocol-https
  - perl-path-tiny
  - perl-data-dumper
  - perl-getopt-long
  - perl-file-which
source:
  sha256: b5836cf57a0131dd9b91b3b42fcc47999d88efc7181d0073e517fb5a20c5f46d
  url: https://github.com/bbeckley-hub/Kleboscope/archive/v1.0.1.tar.gz
test:
  commands:
  - kleboscope --help
