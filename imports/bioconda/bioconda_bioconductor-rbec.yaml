about:
  description: Rbec is a adapted version of DADA2 for analyzing amplicon sequencing
    data from synthetic communities (SynComs), where the reference sequences for each
    strain exists. Rbec can not only accurately profile the microbial compositions
    in SynComs, but also predict the contaminants in SynCom samples.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rbec.html
  license: LGPL-3
  license_file: /lib/R/share/licenses/LGPL-3
  summary: 'Rbec: a tool for analysis of amplicon sequencing data from synthetic microbial
    communities'
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rbec
  version: 1.18.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-dada2 >=1.38.0,<1.39.0
  - r-base
  - r-doparallel
  - r-foreach
  - r-ggplot2
  - r-rcpp >=1.0.6
  - r-readr
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-dada2 >=1.38.0,<1.39.0
  - r-base
  - r-doparallel
  - r-foreach
  - r-ggplot2
  - r-rcpp >=1.0.6
  - r-readr
source:
  md5: 56feddea179b5bf9437b21b7a66095fa
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rbec_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rbec/Rbec_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/Rbec_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rbec/bioconductor-rbec_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Rbec')"
