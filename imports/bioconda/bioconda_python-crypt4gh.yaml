about:
  dev_url: https://github.com/EGA-archive/crypt4gh
  doc_url: http://crypt4gh.readthedocs.io
  home: https://github.com/EGA-archive/crypt4gh
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: GA4GH cryptographic tools
build:
  entry_points:
  - crypt4gh = crypt4gh.__main__:main
  number: 0
  run_exports:
  - null
  script:
  - export LDFLAGS="${LDFLAGS} -L${PREFIX}/lib $(pkg-config --libs libsodium)"
  - export CFLAGS="${CFLAGS} -O3 $(pkg-config --cflags libsodium)"
  - export SODIUM_INSTALL=system
  - -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: python-crypt4gh
  version: '1.8'
requirements:
  build:
  - null
  - pkg-config
  host:
  - python
  - pip
  - setuptools
  - libsodium
  run:
  - python
  - pyyaml
  - docopt-ng
  - cryptography
  - bcrypt
  - libsodium
source:
  sha256: 3365f62a3c4161c8e21969ee86d0b513d2a14e0f70cfdef245b298570d95f40d
  url: https://github.com/EGA-archive/crypt4gh/archive/refs/tags/v1.8.tar.gz
test:
  commands:
  - crypt4gh -h > testfile-help.txt
  imports:
  - crypt4gh
