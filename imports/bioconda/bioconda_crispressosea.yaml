about:
  dev_url: https://github.com/clementlab/CRISPRessoSea
  home: https://github.com/clementlab/CRISPRessoSea
  license: MIT
  license_file: LICENSE
  summary: 'CRISPRessoSea: a tool for processing CRISPR genome editing from multiple
    pooled amplicon sequencing experiments.'
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
package:
  name: crispressosea
  version: 0.1.5
requirements:
  host:
  - python
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.8
  - numpy
  - crispresso2
  - jinja2
  - matplotlib-base
  - pandas
  - scipy
  - seaborn
  - statsmodels
source:
  sha256: 01ab96570581008d961ae876bdd44030a50b6afeb46e927571e8bbc06899bce8
  url: https://github.com/clementlab/CRISPRessoSea/archive/v0.1.5.tar.gz
test:
  commands:
  - CRISPRessoSea Process -h
  imports:
  - CRISPRessoSea
