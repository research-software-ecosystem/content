about:
  description: A set of tools to for machine and deep learning in R from amino acid
    and nucleotide sequences focusing on adaptive immune receptors. The package includes
    pre-processing of sequences, unifying gene nomenclature usage, encoding sequences,
    and combining models. This package will serve as the basis of future immune receptor
    sequence functions/packages/models compatible with the scRepertoire ecosystem.
  home: https://bioconductor.org/packages/3.22/bioc/html/immApex.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Tools for Adaptive Immune Receptor Sequence-Based Machine and Deep Learning
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-immapex
  version: 1.4.3
