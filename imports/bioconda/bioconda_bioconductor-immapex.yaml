  - r-matrix
  - r-matrixstats
  - r-rcpp
  - r-rvest
  - r-stringr
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - r-hash
  - r-httr
  - r-matrix
  - r-matrixstats
  - r-rcpp
  - r-rvest
  - r-stringr
