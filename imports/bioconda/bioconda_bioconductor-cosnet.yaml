about:
  description: Package that implements the COSNet classification algorithm. The algorithm
    predicts node labels in partially labeled graphs where few positives are available
    for the class being predicted.
  home: https://bioconductor.org/packages/3.22/bioc/html/COSNet.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Cost Sensitive Network for node label prediction on graphs with highly
    unbalanced labelings
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cosnet
  version: 1.44.0
requirements:
  build:
  - null
  - make
  host:
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
source:
  md5: c7fd4e60608e702f5ce248bfa224de04
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/COSNet_1.44.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/COSNet/COSNet_1.44.0.tar.gz
  - https://bioarchive.galaxyproject.org/COSNet_1.44.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cosnet/bioconductor-cosnet_1.44.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('COSNet')"
