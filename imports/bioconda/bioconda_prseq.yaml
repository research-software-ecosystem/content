about:
  dev_url: https://github.com/virologyCharite/prseq
  doc_url: https://github.com/VirologyCharite/prseq/blob/v0.0.33/python/README.md
  home: https://github.com/virologyCharite/prseq
  license: MIT
  license_family: MIT
  summary: Python tools (backed by Rust) for sequence analysis.
build:
  entry_points:
  - fasta-info = prseq.cli:fasta_info
  - fasta-stats = prseq.cli:fasta_stats
  - fasta-filter = prseq.cli:fasta_filter
  - fastq-info = prseq.cli:fastq_info
  - fastq-stats = prseq.cli:fastq_stats
  - fastq-filter = prseq.cli:fastq_filter
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: prseq
  version: 0.0.33
requirements:
  build:
  - null
  - null
  - cargo-bundle-licenses
  - pkg-config
  host:
  - python
  - maturin >=1.0,<2.0
  - pip
  run:
  - python
source:
  sha256: de10dc938c046a8a0d01b261b67e016f995584412fed34ec4513abfcf5541bb9
  url: https://github.com/VirologyCharite/prseq/archive/refs/tags/v0.0.33.tar.gz
test:
  commands:
  - fasta-info --help
  - fasta-stats --help
  - fasta-filter --help
  - fastq-info --help
  - fastq-stats --help
  - fastq-filter --help
  imports:
  - prseq
