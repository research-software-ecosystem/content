about:
  description: This is an ExperimentHub package that provides access to the data generated
    and analyzed in the [smoking-nicotine-mouse](https://github.com/LieberInstitute/smoking-nicotine-mouse/)
    LIBD project. The datasets contain the expression data of mouse genes, transcripts,
    exons, and exon-exon junctions across 208 samples from pup and adult mouse brain,
    and adult blood, that were exposed to nicotine, cigarette smoke, or controls.
    They also contain relevant metadata of these samples and gene expression features,
    such QC metrics, if they were used after filtering steps and also if the features
    were differently expressed in the different experiments.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/smokingMouse.html
  license: Artistic-2.0
  summary: Provides access to smokingMouse project data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-smokingmouse
  version: 1.8.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 462c0059e1336994d44e7e539a6628d0
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/smokingMouse_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/smokingMouse/smokingMouse_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/smokingMouse_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-smokingmouse/bioconductor-smokingmouse_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('smokingMouse')"
