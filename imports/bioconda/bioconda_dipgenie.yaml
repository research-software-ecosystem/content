about:
  description: 'DipGenie is a tool designed to infer haplotypes using pangenome graphs.

    It estimates full haplotype sequences from low-coverage short-read

    sequencing data for both haploid and diploid genomes. Users may provide

    a pangenome reference in GFA or VCF format.

    '
  dev_url: https://github.com/gsc74/DipGenie
  doc_url: https://github.com/gsc74/DipGenie
  home: https://github.com/gsc74/DipGenie
  license: MIT AND Apache-2.0
  license_family: MIT
  license_file: LICENSE
  summary: Diploid genome inference using pangenome graphs
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  recipe-maintainers:
  - gsc74
package:
  name: dipgenie
  version: '1.0'
requirements:
  build:
  - null
  - null
  - make
  host:
  - zlib
  - libgomp
  run:
  - zlib
source:
  sha256: 624de036528498de2f8ae88b1bbc5f7d571ca080a36904b4925552b01ff00a38
  url: https://github.com/gsc74/DipGenie/archive/v1.0.tar.gz
test:
  commands:
  - DipGenie --version
