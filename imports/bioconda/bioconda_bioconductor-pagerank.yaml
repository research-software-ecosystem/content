about:
  description: Implemented temporal PageRank analysis as defined by Rozenshtein and
    Gionis. Implemented multiplex PageRank as defined by Halu et al. Applied temporal
    and multiplex PageRank in gene regulatory network analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/pageRank.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Temporal and Multiplex PageRank for Gene Regulatory Network Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-pagerank
  version: 1.20.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-motifmatchr >=1.32.0,<1.33.0
  - r-base
  - r-igraph
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-motifmatchr >=1.32.0,<1.33.0
  - r-base
  - r-igraph
source:
  md5: 7525bd69d630eccc9712e0db3bbefa2c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/pageRank_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pageRank/pageRank_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/pageRank_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pagerank/bioconductor-pagerank_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('pageRank')"
