  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Genome assembly scaffolder using minimizer graphs
build:
  noarch: generic
  number: 3
  run_exports:
  - null
package:
  name: ntjoin
  version: 1.1.5
requirements:
  host:
  - make
  - python <=3.12
  - pip
  - zlib
  - btllib >=1.7.1
  run:
  - python-igraph
  - pybedtools
  - pymannkendall
  - bedtools >=2.21.0
  - pysam >=0.16.0
  - samtools >=1.10
  - python <=3.12
  - zlib
  - make
  - btllib >=1.7.1
  - packaging
source:
  sha256: 808260e3e8c25121f4b7b88a0dd1766c9da0b59d5ebf843a5ec84efb13944009
  url: https://github.com/BirolLab/ntJoin/releases/download/v1.1.5/ntJoin-1.1.5.tar.gz
test:
  commands:
  - ntJoin help
  - ntJoin check_install
  - samtools --help
