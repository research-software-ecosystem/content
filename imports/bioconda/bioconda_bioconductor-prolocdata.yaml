about:
  description: Mass-spectrometry based spatial proteomics data sets and protein complex
    separation data. Also contains the time course expression experiment from Mulvey
    et al. 2015.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/pRolocdata.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Data accompanying the pRoloc package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-prolocdata
  version: 1.48.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-msnbase >=2.36.0,<2.37.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-msnbase >=2.36.0,<2.37.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 1ee70f659fb47e6616b139fc25c3e930
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/pRolocdata_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pRolocdata/pRolocdata_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/pRolocdata_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-prolocdata/bioconductor-prolocdata_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('pRolocdata')"
