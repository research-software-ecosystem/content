about:
  description: The barbieQ package provides a series of robust statistical tools for
    analysing barcode count data generated from cell clonal tracking (i.e., lineage
    tracing) experiments. In these experiments, an initial cell and its offspring
    collectively form a clone (i.e., lineage). A unique barcode sequence, incorporated
    into the DNA of the inital cell, is inherited within the clone. This one-to-one
    mapping of barcodes to clones enables clonal tracking of their behaviors. By counting
    barcodes, researchers can quantify the population abundance of individual clones
    under specific experimental perturbations. barbieQ supports barcode count data
    preprocessing, statistical testing, and visualization.
  home: https://bioconductor.org/packages/3.22/bioc/html/barbieQ.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Analyze Barcode Data from Clonal Tracking Experiments
