about:
  dev_url: https://github.com/klebgenomics/Kaptive
  doc_url: https://kaptive.readthedocs.io/en/latest
  home: https://kaptive.readthedocs.io/en/latest
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Reports information about surface polysaccharide loci for Klebsiella pneumoniae
    species complex and Acinetobacter baumannii genome assemblies.
build:
  entry_points:
  - kaptive = kaptive.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - tomdstanton
package:
  name: kaptive
  version: 3.2.1
requirements:
  host:
  - python >=3.9
  - pip
  - hatchling
  - hatch-vcs
  run:
  - python >=3.9
  - biopython >=1.83
  - numpy
  - dna_features_viewer
  - minimap2
source:
  sha256: 9b83666360f8842c7bbeca6043e6d111e8eba9b29242424f652225d8f0ef50d0
  url: https://pypi.io/packages/source/k/kaptive/kaptive-3.2.1.tar.gz
test:
  commands:
  - kaptive --help
  - minimap2 --help
  imports:
  - kaptive
