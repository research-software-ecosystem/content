about:
  description: This package provides model data and functions for easily using machine
    learning models that use data from the DNA methylome to classify cancer type and
    phenotype from a sample. The primary motivation for the development of this package
    is to abstract away the granular and accessibility-limiting code required to utilize
    machine learning models in R. Our package provides this abstraction for RandomForest,
    e1071 Support Vector, Extreme Gradient Boosting, and Tensorflow models. This is
    paired with an ExperimentHub component, which contains models developed for epigenetic
    cancer classification and predicting phenotypes. This includes CNS tumor classification,
    Pan-cancer classification, race prediction, cell of origin classification, and
    subtype classification models. The package links to our models on ExperimentHub.
    The package currently supports HM450, EPIC, EPICv2, MSA, and MM285.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/CytoMethIC.html
  license: Artistic-2.0
  summary: DNA methylation-based machine learning models
