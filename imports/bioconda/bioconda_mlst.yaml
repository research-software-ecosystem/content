about:
  home: https://github.com/tseemann/mlst
  license: GPL-2.0
  license_family: GPL
  license_file: LICENSE
  summary: Scan contig files against PubMLST typing schemes
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  identifiers:
  - biotools:mlst
package:
  name: mlst
  version: 2.33.1
requirements:
  run:
  - any2fasta
  - blast >=2.16.0
  - perl
  - perl-bioperl >=1.7.2
  - perl-file-which
  - perl-json
  - perl-list-moreutils
  - perl-moo
  - zlib
source:
  sha256: 8c68a09057fde12fc15ab95f594bfe607085eca613ca0c7640d48089bc58d964
  url: https://github.com/tseemann/mlst/archive/v2.33.1.tar.gz
test:
  commands:
  - mlst --version
  - mlst --check
  - mlst --help
  - mlst --list 2>&1 | grep leptospira > /dev/null
