about:
  description: This package addresses the mean-variance relationship in spatially
    resolved transcriptomics data. Precision weights are generated for individual
    observations using Empirical Bayes techniques. These weights are used to rescale
    the data and covariates, which are then used as input in spatially variable gene
    detection tools.
  home: https://bioconductor.org/packages/3.22/bioc/html/spoon.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Address the Mean-variance Relationship in Spatial Transcriptomics Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spoon
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-nnsvg >=1.14.0,<1.15.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-brisc
  - r-matrix
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-nnsvg >=1.14.0,<1.15.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
