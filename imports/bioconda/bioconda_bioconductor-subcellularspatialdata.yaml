about:
  description: This is a data package that hosts annotated sub-cellular localised
    datasets from the STOmics, Xenium and CosMx platforms. Specifically, it hosts
    datasets analysed in the publication Bhuva et. al, 2024 titled "Library size confounds
    biology in spatial transcriptomics data". Raw transcript detections are hosted
    and functions to convert them to SpatialExperiment objects have been implemented.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/SubcellularSpatialData.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Annotated spatial transcriptomics datasets from 10x Xenium, NanoString
    CosMx and BGI STOmics.
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-subcellularspatialdata
  version: 1.6.0
requirements:
  host:
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-base
  - r-dplyr
  - r-hexbin
  - r-matrix
  run:
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-base
  - r-dplyr
  - r-hexbin
  - r-matrix
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 4f1ce0b473f994c73bbf0edd8b18118e
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/SubcellularSpatialData_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SubcellularSpatialData/SubcellularSpatialData_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/SubcellularSpatialData_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-subcellularspatialdata/bioconductor-subcellularspatialdata_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SubcellularSpatialData')"
