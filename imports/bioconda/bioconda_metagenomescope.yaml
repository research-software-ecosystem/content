about:
  home: https://github.com/marbl/MetagenomeScope
  license: GPL-3.0-only
  license_family: GPL3
  license_file: COPYING.txt
  summary: Visualization tool for (meta)genome assembly graphs
build:
  noarch: python
  number: 0
  run_exports:
  - ''
  script: ' -m pip install . -vv --no-deps --no-build-isolation'
extra:
  recipe-maintainers:
  - fedarko
package:
  name: metagenomescope
  version: 1.3.0
requirements:
  host:
  - python
  - hatchling
  - pip
  - graphviz
  - pygraphviz
  run:
  - python
  - graphviz
  - pygraphviz
  - click
  - networkx
  - pyfastg >=0.2.0
  - pandas
  - dash-bootstrap-components
  - dash-ag-grid >=33.3.3
  - dash
  - plotly
source:
  sha256: e041797d72be6841404317f42b0381e61025589324d533c162239c2a9e71e0bb
  url: https://pypi.io/packages/source/m/metagenomescope/metagenomescope-1.3.0.tar.gz
test:
  commands:
  - mgsc --version
  imports:
  - metagenomescope
