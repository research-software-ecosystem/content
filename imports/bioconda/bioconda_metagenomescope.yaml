about:
  home: https://github.com/marbl/MetagenomeScope
  license: GPL-3.0-only
  license_family: GPL3
  license_file: COPYING.txt
  summary: Visualization tool for (meta)genome assembly graphs
build:
  noarch: python
  number: 0
  run_exports:
  - ''
  script: ' -m pip install . -vv --no-deps --no-build-isolation'
extra:
  recipe-maintainers:
  - fedarko
package:
  name: metagenomescope
  version: 1.2.0
requirements:
  host:
  - python
  - hatchling
  - pip
  - graphviz
  - pygraphviz
  run:
  - python
  - graphviz
  - pygraphviz
  - click
  - networkx
  - gfapy
  - pyfastg >=0.2.0
  - pandas
  - dash-bootstrap-components
  - dash-ag-grid >=33.3.3
  - dash
  - plotly
source:
  sha256: 12b4fcfa8f690e0b086d67987d08580545282650ce0dde695c56e4524a4dd316
  url: https://pypi.io/packages/source/m/metagenomescope/metagenomescope-1.2.0.tar.gz
test:
  commands:
  - mgsc --version
  imports:
  - metagenomescope
