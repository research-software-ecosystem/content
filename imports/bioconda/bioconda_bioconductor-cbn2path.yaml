about:
  description: CBN2Path package provides a unifying interface to facilitate CBN-based
    quantification, analysis and visualization of cancer progression pathways.
  home: https://bioconductor.org/packages/3.22/bioc/html/CBN2Path.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: '"CBN2Path: an R/Bioconductor package for the analysis of cancer progression
    pathways using Conjunctive Bayesian Networks'
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cbn2path
  version: 1.0.0
requirements:
  build:
  - null
  - automake
  - make
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-tcgabiolinks >=2.38.0,<2.39.0
  - r-base
  - r-coda
  - r-cowplot
  - r-ggplot2
  - r-ggraph
  - r-igraph
  - r-magrittr
  - r-patchwork
  - r-r6
  - r-rlang
  - r-tidygraph
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-tcgabiolinks >=2.38.0,<2.39.0
  - r-base
  - r-coda
  - r-cowplot
  - r-ggplot2
  - r-ggraph
  - r-igraph
  - r-magrittr
  - r-patchwork
  - r-r6
  - r-rlang
  - r-tidygraph
source:
  md5: 566818c69b92e3a857f749f3fb2f1f58
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CBN2Path_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CBN2Path/CBN2Path_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/CBN2Path_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cbn2path/bioconductor-cbn2path_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CBN2Path')"
