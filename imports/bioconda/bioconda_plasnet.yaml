about:
  home: https://github.com/leoisl/plasnet
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Clustering, visualising and exploring plasmid networks
build:
  entry_points:
  - plasnet = plasnet.plasnet_main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: python -m pip install . --no-deps --ignore-installed -vvv
package:
  name: plasnet
  version: 0.7.0
requirements:
  host:
  - python >=3.9,<3.13
  - poetry-core >=1.0.0
  - pip
  run:
  - python >=3.9,<3.13
  - networkx >=3.2,<4
  - click >=8.1.7,<9
  - pandas >=2.1.2,<3
source:
  sha256: b6cc4d4c69f8de1567093786c3e2ba6e34fbc102c299026af550e483501f43d0
  url: https://github.com/leoisl/plasnet/archive/v0.7.0.tar.gz
test:
  commands:
  - plasnet --help
  imports:
  - plasnet
