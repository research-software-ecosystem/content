about:
  description: The tRNA package allows tRNA sequences and structures to be accessed
    and used for subsetting. In addition, it provides visualization tools to compare
    feature parameters of multiple tRNA sets and correlate them to additional data.
    The tRNA package uses GRanges objects as inputs requiring only few additional
    column data sets.
  home: https://bioconductor.org/packages/3.22/bioc/html/tRNA.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Analyzing tRNA sequences and structures
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-trna
  version: 1.28.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-modstrings >=1.26.0,<1.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-structstrings >=1.26.0,<1.27.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
  - r-ggplot2
  - r-scales
  - r-stringr
  run:
