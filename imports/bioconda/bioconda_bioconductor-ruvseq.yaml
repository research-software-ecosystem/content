about:
  description: This package implements the remove unwanted variation (RUV) methods
    of Risso et al. (2014) for the normalization of RNA-Seq read counts between samples.
  home: https://bioconductor.org/packages/3.22/bioc/html/RUVSeq.html
  license: Artistic-2.0
  summary: Remove Unwanted Variation from RNA-Seq Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:ruvseq
  parent_recipe:
    name: bioconductor-ruvseq
    path: recipes/bioconductor-ruvseq
    version: 1.14.0
package:
  name: bioconductor-ruvseq
  version: 1.44.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-edaseq >=2.44.0,<2.45.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
  - r-mass
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-edaseq >=2.44.0,<2.45.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
  - r-mass
source:
  md5: 1c753cc63ee99705edbd2921048edc03
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RUVSeq_1.44.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RUVSeq/RUVSeq_1.44.0.tar.gz
  - https://bioarchive.galaxyproject.org/RUVSeq_1.44.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ruvseq/bioconductor-ruvseq_1.44.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RUVSeq')"
