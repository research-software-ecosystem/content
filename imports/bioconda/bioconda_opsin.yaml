about:
  dev_url: https://github.com/dan2097/opsin
  doc_url: https://www.ebi.ac.uk/opsin
  home: https://github.com/dan2097/opsin
  license: MIT
  license_family: MIT
  summary: OPSIN is a Java(8+) library for IUPAC name-to-structure conversion offering
    high recall and precision on organic chemical nomenclature.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  identifiers:
  - usegalaxy-eu:ctb_opsin
  notes: 'Opsin is a Java program that comes with a custom wrapper shell script.

    This shell wrapper is called "opsin" and is on $PATH by default. By default

    "-Xms512m -Xmx4g" is set in the wrapper. If you want to overwrite it you can

    specify these values directly after your binaries. If you have _JAVA_OPTIONS

    set globally this will take precedence.

    For example run opsin with "opsin -Xms512m -Xmx4g --help"

    '
package:
  name: opsin
  version: 2.9.0
requirements:
  run:
  - openjdk >=8
source:
  sha256: c2e29326c281f87b59a05d934d8589adac6e9d17b95b984931b3e739111b360f
  url: https://github.com/dan2097/opsin/releases/download/2.9.0/opsin-cli-2.9.0-jar-with-dependencies.jar
test:
  commands:
  - opsin --help
  - opsin -Xms512m -Xmx1g --help
