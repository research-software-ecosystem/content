about:
  dev_url: https://github.com/IOBR/IOBRpy
  doc_url: https://github.com/IOBR/IOBRpy
  home: https://github.com/IOBR/IOBRpy
  license: MIT
  license_file: LICENSE
  summary: Immuno-Oncology Biological Research using Python (IOBRpy)
build:
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
  skip: true
extra:
  recipe-maintainers:
  - hhn0527
  skip-lints:
  - should_be_noarch_generic
package:
  name: iobrpy
  version: 0.1.8
requirements:
  host:
  - python
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.11,<3.14
  - numpy >=1.22
  - pandas >=1.5
  - scipy >=1.9
  - scikit-learn >=1.2
  - statsmodels >=0.13
  - matplotlib-base >=3.7
  - tqdm >=4.66
  - click >=8.0
  - gseapy >=1.0.6
  - joblib >=1.3
  - regex >=2024.5
  - tiktoken >=0.11,<0.13
  - multiqc ==1.31
  - xarray >=0.20
  - requests >=2.32
  - prompt-toolkit >=3.0
  - pysam ==0.23.3
  - biopython >=1.83
  - fastp
  - star
  - salmon
  - gzip
  - trust4
source:
  sha256: 60046891042a276d7bc6426c608920db44be9e1dc1df8f5fd4f3f28faca51104
  url: https://files.pythonhosted.org/packages/source/i/iobrpy/iobrpy-0.1.8.tar.gz
test:
  commands:
  - python -c "import iobrpy.main"
  - iobrpy --help
  - iobrpy-cli --help
