about:
  description: "EukBin is a specialized binning tool for eukaryotic metagenomes that\
    \ combines\nrepeat-masked tetranucleotide frequency (TNF), multi-sample coverage\
    \ information,\nBUSCO marker gene constraints, and deep learning (\u03B2-VAE with\
    \ contrastive loss)\nwith ploidy-aware refinement.\n\nKey features:\n- Repeat-masked\
    \ TNF features to handle repeat-rich eukaryotic genomes\n- BUSCO-guided constraints\
    \ for accurate bin estimation\n- Ploidy-aware refinement (haplotig detection for\
    \ diploid/polyploid genomes)\n- Deep learning with \u03B2-VAE and contrastive\
    \ loss\n- Supports multi-sample binning\n\nThis package includes:\n- eukbin run:\
    \ Complete binning pipeline (M1-M6 modules)\n- eukbin evaluate: Quality assessment\
    \ for any binning tool\n- eukbin report: Multi-tool comparison report\n"
  dev_url: https://github.com/weiwei12456/eukbin
  doc_url: https://github.com/weiwei12456/eukbin/blob/main/README.md
  home: https://github.com/weiwei12456/eukbin
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: BUSCO-guided binning for eukaryotic metagenomes
build:
  entry_points:
  - eukbin = eukbin.__main__:main
  noarch: generic
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv
extra:
  recipe-maintainers:
  - weiwei12456
package:
  name: eukbin
  version: 0.1.0
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - numpy >=1.19
  - pandas >=1.0
  - scipy >=1.5
  - scikit-learn >=0.24
  - biopython >=1.78
  - pytorch >=1.9
  - pyyaml
  - tqdm
source:
  sha256: 14ac749c36c15116763269632ea2b25afda303a8296f9243e939d03a1e4d0113
  url: https://github.com/weiwei12456/eukbin/archive/v0.1.0.tar.gz
test:
  commands:
  - python -c "import eukbin; print(eukbin.__version__)"
  imports:
  - eukbin
  - eukbin.benchmark
  - eukbin.features
  - eukbin.model
  - eukbin.refinement
  - eukbin.seeds
