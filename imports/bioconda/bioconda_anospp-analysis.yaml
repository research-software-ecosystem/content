about:
  home: https://pypi.org/project/anospp-analysis
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: ANOSPP data analysis.
build:
  entry_points:
  - anospp-prep = anospp_analysis.prep:main
  - anospp-qc = anospp_analysis.qc:main
  - anospp-plasm = anospp_analysis.plasm:main
  - anospp-nn = anospp_analysis.nn:main
  - anospp-vae = anospp_analysis.vae:main
  - anospp-agg = anospp_analysis.agg:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - amakunin
package:
  name: anospp-analysis
  version: 0.5.0
requirements:
  host:
  - pip
  - poetry-core
  - python >=3.10,<3.11
  run:
  - python >=3.10,<3.11
  - cutadapt
  - numpy
  - scipy
  - pandas
  - seaborn-base
  - bokeh
  - pyarrow
  - keras ==2.15.0
  - tensorflow-base ==2.15.0
  - blast ==2.16
  - fasttree
  - mafft
source:
  sha256: 259529d9ea49d2bbe1bdb465705601181fc93956903b7dd4fc33c6de61582da8
  url: https://pypi.org/packages/source/a/anospp-analysis/anospp_analysis-0.5.0.tar.gz
test:
  commands:
  - anospp-prep -h
  - anospp-qc -h
  - anospp-plasm -h
  - anospp-nn -h
  - anospp-vae -h
  - anospp-agg -h
  imports:
  - anospp_analysis
