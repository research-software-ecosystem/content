about:
  description: This package provides access to the scRNA-seq, scATAC-seq, multiome,
    CITE-seq and spatial transcriptomics (Visium) data generated by the tonsil cell
    atlas in the context of the Human Cell Atlas (HCA). The data is provided via the
    Bioconductor project in the form of SingleCellExperiments. Additionally, information
    on the whole compendium of identified cell types is provided in form of a glossary.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/HCATonsilData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Provide programmatic access to the tonsil cell atlas datasets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hcatonsildata
  version: 1.8.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-base64enc
  - r-htmltools
  - r-rmarkdown
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-base64enc
  - r-htmltools
  - r-rmarkdown
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 9892747012d26e623740921e2b60a9f3
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HCATonsilData_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HCATonsilData/HCATonsilData_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/HCATonsilData_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hcatonsildata/bioconductor-hcatonsildata_1.8.0_src_all.tar.gz
test:
