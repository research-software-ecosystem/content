about:
  description: "Haplophaser analyzes haplotype inheritance patterns in derived lines\
    \ relative \nto founder/source populations. Designed for polyploid genomes, from\
    \ diploids \nthrough hexaploids and beyond. Features include haplotype proportion\
    \ estimation,\nchromosome painting, chimeric contig detection, and linkage-informed\
    \ scaffolding.\n"
  dev_url: https://github.com/aseetharam/haplophaser
  doc_url: https://github.com/aseetharam/haplophaser#readme
  home: https://github.com/aseetharam/haplophaser
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Haplotype analysis toolkit for complex genomes with full polyploid support
build:
  entry_points:
  - haplophaser = haplophaser.cli.main:app
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - aseetharam
package:
  name: haplophaser
  version: 0.1.1
requirements:
  host:
  - python >=3.10
  - pip
  - hatchling
  run:
  - python >=3.10
  - numpy >=1.21
  - pandas >=1.3
  - pydantic >=2.0
  - cyvcf2 >=0.30
  - pysam >=0.19
  - click >=8.0
  - pyyaml >=6.0
  - scipy >=1.7
  - rich >=12.0
  - typer >=0.9
  - chromoplot >=0.1.0
source:
  sha256: cfc6f99929b76893eb2fbe05c2af6c3163be5c9a0c4638051a0d92d6f40620bd
  url: https://pypi.org/packages/source/h/haplophaser/haplophaser-0.1.1.tar.gz
test:
  commands:
  - haplophaser --help
  imports:
  - haplophaser
  - haplophaser.core
  - haplophaser.io
  - haplophaser.markers
  - haplophaser.proportion
