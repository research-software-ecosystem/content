about:
  dev_url: https://github.com/OrthoFinder/OrthoFinder
  doc_url: https://orthofinder.github.io/OrthoFinder
  home: https://github.com/OrthoFinder/OrthoFinder
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Accurate inference of orthogroups, orthologues, gene trees and rooted species
    tree made easy!
build:
  noarch: generic
  number: 0
  run_exports:
  - null
package:
  name: orthofinder
  version: 3.1.4
requirements:
  run:
  - python >=3.11,<=3.14
  - numpy
  - scipy
  - scikit-learn
  - biopython
  - ete4
  - rich
  - blast
  - diamond <2.2|>=2.1.7
  - mcl
  - fastme
  - mafft
  - fasttree
  - muscle
  - raxml
  - raxml-ng
  - iqtree
  - bzip2
  - mmseqs2
  - aster
  - famsa
source:
  sha256: ed0751c2da03e8392c57fd0570209b6b121153e485e016766d370c11c7c1fdf6
  url: https://github.com/OrthoFinder/OrthoFinder/releases/download/v3.1.4/orthofinder-3.1.4.tar.gz
test:
  commands:
  - orthofinder -h
  - orthofinder -v
  source_files:
  - ExampleData
  - ExampleData/*
