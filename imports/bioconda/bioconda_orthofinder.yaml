about:
  dev_url: https://github.com/OrthoFinder/OrthoFinder
  doc_url: https://orthofinder.github.io/OrthoFinder
  home: https://github.com/OrthoFinder/OrthoFinder
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Accurate inference of orthogroups, orthologues, gene trees and rooted species
    tree made easy!
build:
  noarch: generic
  number: 0
  run_exports:
  - null
package:
  name: orthofinder
  version: 3.1.5
requirements:
  run:
  - python >=3.11,<=3.14
  - numpy
  - scipy
  - scikit-learn
  - biopython
  - ete4
  - rich
  - blast
  - diamond <2.2|>=2.1.7
  - mcl
  - fastme
  - mafft
  - fasttree
  - muscle
  - raxml
  - raxml-ng
  - iqtree
  - bzip2
  - mmseqs2
  - aster
  - famsa
source:
  sha256: d292dc7ca650de6940996c980917f183366c873fe834cef81515f159e2a41bc5
  url: https://github.com/OrthoFinder/OrthoFinder/releases/download/v3.1.5/orthofinder-3.1.5.tar.gz
test:
  commands:
  - orthofinder -h
  - orthofinder -v
  - orthofinder-utils
  - primary_transcript -h
  - make_ultrametric -h
  - convert_orthofinder_tree_ids -h
  - create_hog_fastas -h
  - ncbi_primary_transcript -h
  - orthogroup_gene_count -h
  source_files:
  - ExampleData
  - ExampleData/*
