about:
  description: This package implements functions for finding breakpoints, plotting
    and export of Strand-seq data.
  home: https://bioconductor.org/packages/3.22/bioc/html/breakpointR.html
  license: file LICENSE
  license_file: LICENSE
  summary: Find breakpoints in Strand-seq data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-breakpointr
  version: 1.28.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-breakpointrdata >=1.28.0,<1.29.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-cowplot
  - r-doparallel
  - r-foreach
  - r-ggplot2
  - r-gtools
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-breakpointrdata >=1.28.0,<1.29.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
