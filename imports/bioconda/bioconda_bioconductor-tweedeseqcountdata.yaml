about:
  description: RNA-seq count data from Pickrell et al. (2010) employed to illustrate
    the use of the Poisson-Tweedie family of distributions with the tweeDEseq package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/tweeDEseqCountData.html
  license: MIT + file LICENSE
  license_file: /lib/R/share/licenses/MIT
  summary: RNA-seq count data employed in the vignette of the tweeDEseq package
build:
  noarch: generic
  number: 1
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tweedeseqcountdata
  version: 1.48.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: b42acec96ff0cc596fba9da0da1917e9
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/tweeDEseqCountData_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/tweeDEseqCountData/tweeDEseqCountData_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/tweeDEseqCountData_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tweedeseqcountdata/bioconductor-tweedeseqcountdata_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('tweeDEseqCountData')"
