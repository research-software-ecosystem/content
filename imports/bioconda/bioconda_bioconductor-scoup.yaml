about:
  description: An elaborate molecular evolutionary framework that facilitates straightforward
    simulation of codon genetic sequences subjected to different degrees and/or patterns
    of Darwinian selection. The model is built upon the fitness landscape paradigm
    of Sewall Wright, as popularised by the mutation-selection model of Halpern and
    Bruno. This enables realistic evolutionary process of living organisms to be reproducible
    seamlessly. For example, an Ornstein-Uhlenbeck fitness update algorithm is incorporated
    herein. Consequently, otherwise complex biological processes, such as the effect
    of the interplay between genetic drift and fitness landscape fluctuations on the
    inference of diversifying selection, may now be investigated with minimal effort.
    Frequency-dependent and stochastic fitness landscape update techniques are available.
  home: https://bioconductor.org/packages/3.22/bioc/html/scoup.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Simulate Codons with Darwinian Selection Modelled as an OU Process
