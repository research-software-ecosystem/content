about:
  description: A Shiny application for visualization, exploration, comparison, and
    filtering of CRISPR screens analyzed with MAGeCK RRA or MLE. Features include
    interactive plots with on-click labeling, full customization of plot aesthetics,
    data upload and/or download, and much more. Quickly and easily explore your CRISPR
    screen results and generate publication-quality figures in seconds.
  home: https://bioconductor.org/packages/3.22/bioc/html/CRISPRball.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Shiny Application for Interactive CRISPR Screen Visualization, Exploration,
    Comparison, and Filtering
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-crisprball
  version: 1.6.0
requirements:
