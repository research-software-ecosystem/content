about:
  description: 'The igblastr package provides functions to conveniently install and
    use a local IgBLAST installation from within R. IgBLAST is described at <https://pubmed.ncbi.nlm.nih.gov/23671333/>.
    IgBLAST web interface: <https://www.ncbi.nlm.nih.gov/igblast/>.'
  home: https://bioconductor.org/packages/3.22/bioc/html/igblastr.html
  license: Artistic-2.0
  summary: User-friendly R Wrapper to IgBLAST
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-igblastr
  version: 1.0.11
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-curl
  - r-httr
  - r-jsonlite
  - r-r.utils
  - r-rvest
  - r-tibble
  - r-xml2
  - r-xtable
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-curl
  - r-httr
  - r-jsonlite
  - r-r.utils
  - r-rvest
  - r-tibble
  - r-xml2
  - r-xtable
source:
  md5: 6ea7836bf59c6ca1ec286b38fa430d71
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/igblastr_1.0.11.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/igblastr/igblastr_1.0.11.tar.gz
  - https://bioarchive.galaxyproject.org/igblastr_1.0.11.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-igblastr/bioconductor-igblastr_1.0.11_src_all.tar.gz
test:
  commands:
  - $R -e "library('igblastr')"
