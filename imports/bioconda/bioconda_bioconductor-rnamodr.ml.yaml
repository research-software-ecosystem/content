about:
  description: RNAmodR.ML extend the functionality of the RNAmodR package and classical
    detection strategies towards detection through machine learning models. RNAmodR.ML
    provides classes, functions and an example workflow to establish a detection stratedy,
    which can be packaged.
  home: https://bioconductor.org/packages/3.22/bioc/html/RNAmodR.ML.html
  license: Artistic-2.0
  summary: Detecting patterns of post-transcriptional modifications using machine
    learning
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rnamodr.ml
  version: 1.24.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rnamodr >=1.24.0,<1.25.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-ranger
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rnamodr >=1.24.0,<1.25.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-ranger
source:
  md5: 72e768541bfbae5f8a6e5dfa13accd99
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RNAmodR.ML_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RNAmodR.ML/RNAmodR.ML_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/RNAmodR.ML_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rnamodr.ml/bioconductor-rnamodr.ml_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RNAmodR.ML')"
