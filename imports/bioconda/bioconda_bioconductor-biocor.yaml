about:
  description: Calculates functional similarities based on the pathways described
    on KEGG and REACTOME or in gene sets. These similarities can be calculated for
    pathways or gene sets, genes, or clusters and combined with other similarities.
    They can be used to improve networks, gene selection, testing relationships...
  home: https://bioconductor.org/packages/3.22/bioc/html/BioCor.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Functional Similarities
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biocor
  version: 1.34.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - r-base
  - r-matrix
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - r-base
  - r-matrix
source:
  md5: 8d865c6f646e239dcd68626e9ee7b6f8
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BioCor_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BioCor/BioCor_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/BioCor_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biocor/bioconductor-biocor_1.34.0_src_all.tar.gz
test:
