about:
  description: Positive ionization mode data in NetCDF file format. Centroided subset
    from 200-600 m/z and 2500-4500 seconds. Data originally reported in "Assignment
    of Endogenous Substrates to Enzymes by Global Metabolite Profiling" Biochemistry;
    2004; 43(45). Also includes detected peaks in an xcmsSet.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/faahKO.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Saghatelian et al. (2004) FAAH knockout LC/MS data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-faahko
    path: recipes/bioconductor-faahko
    version: 1.20.0
package:
  name: bioconductor-faahko
  version: 1.50.0
requirements:
  host:
  - bioconductor-xcms >=4.8.0,<4.9.0
  - r-base
  run:
  - bioconductor-xcms >=4.8.0,<4.9.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 7515890b6ad1fdf121aac94b7ead7616
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/faahKO_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/faahKO/faahKO_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/faahKO_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-faahko/bioconductor-faahko_1.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('faahKO')"
