about:
  description: tidySpatialExperiment provides a bridge between the SpatialExperiment
    package and the tidyverse ecosystem. It creates an invisible layer that allows
    you to interact with a SpatialExperiment object as if it were a tibble; enabling
    the use of functions from dplyr, tidyr, ggplot2 and plotly. But, underneath, your
    data remains a SpatialExperiment object.
  home: https://bioconductor.org/packages/3.22/bioc/html/tidySpatialExperiment.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: SpatialExperiment with tidy principles
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
