about:
  description: This package provides support for parallelized estimation of GLMs/GEEs,
    catering for dispersed data.
  home: https://bioconductor.org/packages/3.22/bioc/html/parglms.html
  license: Artistic-2.0
  summary: support for parallelized estimation of GLMs/GEEs
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-parglms
  version: 1.42.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-batchjobs
  - r-doparallel
  - r-foreach
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-batchjobs
  - r-doparallel
  - r-foreach
source:
  md5: 2695f40b923b89caa9090e3c09528965
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/parglms_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/parglms/parglms_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/parglms_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-parglms/bioconductor-parglms_1.42.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('parglms')"
