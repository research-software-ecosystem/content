about:
  description: DoReMiTra is an R data package providing access to curated transcriptomic
    datasets related to blood radiation, with a focus on neutron, x-ray, and gamma
    ray studies. It is designed to facilitate radiation biology research and support
    data exploration and reproducibility in radiation transcriptomics. All datasets
    are provided as SummarizedExperiment objects, allowing seamless integration with
    the Bioconductor ecosystem.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/DoReMiTra.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Orchestrating Blood Radiation Transcriptomic Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-doremitra
  version: 1.0.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scater >=1.38.0,<1.39.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-glue
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scater >=1.38.0,<1.39.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-glue
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 480142b1b562ec54418c78211f7ae355
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/DoReMiTra_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DoReMiTra/DoReMiTra_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/DoReMiTra_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-doremitra/bioconductor-doremitra_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('DoReMiTra')"
