  doc_url: https://github.com/dalofa/telomore/blob/0.4.1/README.md
  home: https://github.com/dalofa/telomore
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Targeted assembly of Streptomycetes telomeres.
build:
