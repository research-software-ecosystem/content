  - pysam
  - bowtie2
  - emboss
  - lamassemble
  - mafft
  - minimap2 >=2.25
  - samtools
source:
  sha256: 63854489e810a1354af5ec0ecd533f22e13e6a46100e404693de21ec303686c2
  url: https://pypi.io/packages/source/t/telomore/telomore-0.4.1.tar.gz
test:
