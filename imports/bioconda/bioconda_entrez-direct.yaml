about:
  description: 'Entrez Direct (EDirect) provides access to Entrez, the NCBI''s suite
    of interconnected databases (publication, sequence, structure, gene, variation,
    expression, etc.) from a Unix terminal window. Search terms are entered as command-line
    arguments. Individual operations are connected with Unix pipes to construct multi-step
    queries. Selected records can then be retrieved in a variety of formats.

    '
  doc_url: https://ftp.ncbi.nlm.nih.gov/entrez/entrezdirect/versions/25.3.20260410/README
  home: https://ftp.ncbi.nlm.nih.gov/entrez/entrezdirect/versions/25.3.20260410/README
  license: Public Domain
  summary: Entrez Direct (EDirect) - Access to NCBI's Entrez databases
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:entrez
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: entrez-direct
  version: '25.3'
requirements:
  build:
  - null
  - go-licenses
  run:
  - wget
source:
  sha256: 189382f1fe4a1b43872855cd5b442ed25111192dd4b00330268c1cad6d7216bf
  url: https://ftp.ncbi.nlm.nih.gov/entrez/entrezdirect/versions/25.3.20260410/edirect.tar.gz
test:
  commands:
  - efetch --help
  - epost --help
  - efilter --help
  - einfo --help
  - esearch --help
  - elink --help
  - esummary --help
  - rchive -version
  - transmute -version
  - xtract -version
