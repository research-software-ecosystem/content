about:
  description: 'This experimental data package contains 11 data sets necessary to
    follow the "TCGA Workflow: Analyze cancer genomics and epigenomics data using
    Bioconductor packages".'
  home: https://bioconductor.org/packages/3.22/data/experiment/html/TCGAWorkflowData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Data for TCGA Workflow
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tcgaworkflowdata
  version: 1.34.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: d93ece4f65703d800b404e94e12b0c74
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/TCGAWorkflowData_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TCGAWorkflowData/TCGAWorkflowData_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/TCGAWorkflowData_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tcgaworkflowdata/bioconductor-tcgaworkflowdata_1.34.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TCGAWorkflowData')"
