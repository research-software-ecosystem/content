about:
  description: The functions support identification and annotation of hotspot residues
    in proteins. These are individual amino acids that accumulate mutations at a much
    higher rate than their surrounding regions.
  home: https://bioconductor.org/packages/3.22/bioc/html/DominoEffect.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Identification and Annotation of Protein Hotspot Residues
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dominoeffect
  version: 1.30.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-pwalign >=1.6.0,<1.7.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-data.table
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-pwalign >=1.6.0,<1.7.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-data.table
source:
