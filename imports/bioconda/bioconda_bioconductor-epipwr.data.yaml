about:
  description: This package provides reference data for EpipwR. EpipwR is a fast and
    efficient power analysis for continuous and binary phenotypes of epigenomic-wide
    association studies. This package is only meant to be used in conjunction with
    EpipwR.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/EpipwR.data.html
  license: Artistic-2.0
  summary: 'EpipwR.data: Reference data for EpipwR'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-epipwr.data
  version: 1.4.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 576d57c17aed0a4bab1ade6eb4c0a34a
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/EpipwR.data_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/EpipwR.data/EpipwR.data_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/EpipwR.data_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-epipwr.data/bioconductor-epipwr.data_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('EpipwR.data')"
