about:
  description: The package contains functions for calculate direct and model-based
    estimators for liquid association. It also provides functions for testing the
    existence of liquid association given a gene triplet data.
  home: https://bioconductor.org/packages/3.22/bioc/html/LiquidAssociation.html
  license: GPL (>=3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: LiquidAssociation
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:liquidassociation
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-liquidassociation
    path: recipes/bioconductor-liquidassociation
    version: 1.34.0
package:
  name: bioconductor-liquidassociation
  version: 1.64.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-org.sc.sgd.db >=3.22.0,<3.23.0
  - bioconductor-yeastcc >=1.50.0,<1.51.0
  - r-base
  - r-geepack
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-org.sc.sgd.db >=3.22.0,<3.23.0
  - bioconductor-yeastcc >=1.50.0,<1.51.0
  - r-base
  - r-geepack
source:
  md5: c090258d90b18b364be77d58461c91a2
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/LiquidAssociation_1.64.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/LiquidAssociation/LiquidAssociation_1.64.0.tar.gz
  - https://bioarchive.galaxyproject.org/LiquidAssociation_1.64.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-liquidassociation/bioconductor-liquidassociation_1.64.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('LiquidAssociation')"
