about:
  dev_url: https://github.com/pwilson97/peek-bio
  home: https://github.com/pwilson97/peek-bio
  license: MIT
  license_file: LICENSE
  summary: Instant file previews for genomics data
build:
  entry_points:
  - peek = peek_bio.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vvv
extra:
  recipe-maintainers:
  - pwilson97
package:
  name: peek-bio
  version: 0.2.0
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools >=64
  run:
  - python >=3.8
  - openpyxl >=3.0
  - anndata >=0.8
  - pybigwig >=0.3
  - pysam >=0.20
source:
  sha256: 3764a0a82a9b178c4656e7baa83b482cd4414831ced878c2118e8168ad61a8f9
  url: https://github.com/pwilson97/peek-bio/archive/refs/tags/v0.2.0.tar.gz
test:
  commands:
  - peek --version
  - peek --formats
