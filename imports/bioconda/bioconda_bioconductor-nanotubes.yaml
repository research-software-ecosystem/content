about:
  description: Cap Analysis of Gene Expression (CAGE) data from "Identification of
    Gene Transcription Start Sites and Enhancers Responding to Pulmonary Carbon Nanotube
    Exposure in Vivo" by Bornholdt et al. supplied as CAGE Transcription Start Sites
    (CTSSs).
  home: https://bioconductor.org/packages/3.22/data/experiment/html/nanotubes.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Mouse nanotube CAGE data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-nanotubes
  version: 1.26.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 355593a27c1c0eba86a042803ac6d149
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/nanotubes_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/nanotubes/nanotubes_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/nanotubes_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-nanotubes/bioconductor-nanotubes_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('nanotubes')"
