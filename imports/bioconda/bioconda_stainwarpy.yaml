about:
  home: https://github.com/tckumarasekara/stainwarpy
  license: MIT
  license_file: LICENSE
  summary: Tools for image registration between multiplexed and H&E stained tissue
    images
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps -vv'
extra:
  recipe-maintainers:
  - tckumarasekara
package:
  name: stainwarpy
  version: 0.2.4
requirements:
  host:
  - python >=3.11,<3.13
  - pip
  - setuptools
  run:
  - python >=3.11,<3.13
  - numpy >=2.2
  - scipy >=1.16
  - scikit-image >=0.25
  - imagecodecs >=2025.11.11
  - tifffile >=2025.5.10
  - typer >=0.20
source:
  sha256: 6384f6cbef6f67badfe96ab88c7fb168073f9e1df7f5e6a857d1d486b1ef0e73
  url: https://github.com/tckumarasekara/stainwarpy/releases/download/v0.2.4/stainwarpy-0.2.4.tar.gz
test:
  commands:
  - stainwarpy --help
  imports:
  - stainwarpy
