about:
  dev_url: https://github.com/EBI-Metagenomics/kegg-pathways-completeness-tool
  doc_url: https://github.com/EBI-Metagenomics/kegg-pathways-completeness-tool/blob/1.4.2/README.md
  home: https://github.com/EBI-Metagenomics/kegg-pathways-completeness-tool
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: The tool counts completeness of each KEGG pathway for protein sequences.
build:
  entry_points:
  - give_completeness = kegg_pathways_completeness.bin.give_completeness:main
  - plot_modules_graphs = kegg_pathways_completeness.bin.plot_modules_graphs:main
  - make_graphs = kegg_pathways_completeness.bin.make_graphs:main
  - fetch_modules_data = kegg_pathways_completeness.bin.fetch_modules_data:main
  - parse_hmmer_table = kegg_pathways_completeness.bin.parse_hmmer_table:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - chrisAta
package:
  name: kegg-pathways-completeness
  version: 1.4.2
requirements:
  host:
  - python >=3.10
  - setuptools >=61.0
  - pip
  run:
  - python >=3.10
  - biopython >=1.83
  - networkx >=3.3
  - python-graphviz >=0.20.3
  - pydot >=3.0.3
  - click >=8.0.0
  - requests >=2.25.0
  - tqdm >=4.60.0
source:
  sha256: e3f9b430da7a502350c105f28f79626cc0f473740f743f427e772c0f9f7ab2ab
  url: https://pypi.org/packages/source/k/kegg-pathways-completeness/kegg_pathways_completeness-1.4.2.tar.gz
test:
  commands:
  - give_completeness --help
  - plot_modules_graphs --help
  - make_graphs --help
  - fetch_modules_data --help
  - parse_hmmer_table --help
  imports:
  - kegg_pathways_completeness
