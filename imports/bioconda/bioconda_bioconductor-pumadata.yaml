about:
  description: This is a simple data package including various data sets derived from
    the estrogen data for use with the puma (Propagating Uncertainty in Microarray
    Analysis) package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/pumadata.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Various data sets for use with the puma package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-pumadata
  version: 2.46.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-oligo >=1.74.0,<1.75.0
  - bioconductor-puma >=3.52.0,<3.53.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-oligo >=1.74.0,<1.75.0
  - bioconductor-puma >=3.52.0,<3.53.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: d8e4c43c8addb5607621563a2ca33b3d
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/pumadata_2.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pumadata/pumadata_2.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/pumadata_2.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pumadata/bioconductor-pumadata_2.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('pumadata')"
