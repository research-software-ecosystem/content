about:
  dev_url: https://github.com/ewels/nf-docs
  doc_url: https://ewels.github.io/nf-docs/
  home: https://github.com/ewels/nf-docs
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Generate API documentation for Nextflow pipelines by querying the Nextflow
    Language Server
build:
  entry_points:
  - nf-docs = nf_docs.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - ewels
package:
  name: nf-docs
  version: 0.3.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - rich-click >=1.7
  - pyyaml >=6.0
  - jinja2 >=3.0
  - rich >=13.0
  - httpx >=0.25
  - markdown >=3.0
  - pygments >=2.0
source:
  sha256: a6ea9cf1123bc80549ac7ff43d6fc801aac9311daefed195b0646af9e280f09e
  url: https://pypi.org/packages/source/n/nf-docs/nf_docs-0.3.0.tar.gz
test:
  commands:
  - nf-docs --help
  imports:
  - nf_docs
