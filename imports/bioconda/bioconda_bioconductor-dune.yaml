about:
  description: Given a set of clustering labels, Dune merges pairs of clusters to
    increase mean ARI between labels, improving replicability.
  home: https://bioconductor.org/packages/3.22/bioc/html/Dune.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Improving replicability in single-cell RNA-Seq cell type discovery
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dune
  version: 1.22.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-aricode
  - r-base
  - r-dplyr
  - r-gganimate
  - r-ggplot2
  - r-magrittr
  - r-purrr
  - r-rcolorbrewer
  - r-tidyr
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-aricode
  - r-base
  - r-dplyr
  - r-gganimate
  - r-ggplot2
  - r-magrittr
  - r-purrr
  - r-rcolorbrewer
  - r-tidyr
source:
  md5: aab6e7b6df6db3cb2a8496c469262cdb
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Dune_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Dune/Dune_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/Dune_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dune/bioconductor-dune_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Dune')"
