about:
  description: 'This package is a parser to import HiC data into R. It accepts several
    type of data: tabular files, Cooler `.cool` or `.mcool` files, Juicer `.hic` files
    or HiC-Pro `.matrix` and `.bed` files. The HiC data can be several files, for
    several replicates and conditions. The data is formated in an InteractionSet object.'
  home: https://bioconductor.org/packages/3.22/bioc/html/HiCParser.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Parser for HiC data in R
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hicparser
  version: 1.2.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-interactionset >=1.38.0,<1.39.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table
  - r-gtools
  - r-pbapply
  - r-rcpp >=1.0.12
  - libblas
