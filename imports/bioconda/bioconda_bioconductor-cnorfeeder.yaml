about:
  description: This package integrates literature-constrained and data-driven methods
    to infer signalling networks from perturbation experiments. It permits to extends
    a given network with links derived from the data via various inference methods
    and uses information on physical interactions of proteins to guide and validate
    the integration of links.
  home: https://bioconductor.org/packages/3.22/bioc/html/CNORfeeder.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Integration of CellNOptR to add missing links
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cnorfeeder
  version: 1.50.0
requirements:
  host:
  - bioconductor-cellnoptr >=1.56.0,<1.57.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  run:
  - bioconductor-cellnoptr >=1.56.0,<1.57.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
source:
  md5: 2db0397c3557a30b0847da393b40ed90
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CNORfeeder_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CNORfeeder/CNORfeeder_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/CNORfeeder_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cnorfeeder/bioconductor-cnorfeeder_1.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CNORfeeder')"
