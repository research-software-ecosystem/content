about:
  description: Base annotation databases for xenopus, intended ONLY to be used by
    AnnotationDbi to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/xenopus.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for xenopus
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-xenopus.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 5dcf8c7e3939ff12b1c6820c4d085830
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/xenopus.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/xenopus.db0/xenopus.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/xenopus.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-xenopus.db0/bioconductor-xenopus.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('xenopus.db0')"
