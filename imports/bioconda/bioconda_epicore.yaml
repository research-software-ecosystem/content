about:
  dev_url: https://github.com/AG-Walz/epicore
  home: https://github.com/AG-Walz/epicore
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Compute core epitopes from multiple overlapping peptides.
build:
  entry_points:
  - epicore = epicore_utils.epicore_main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - janaHoffmann1
package:
  name: epicore
  version: 1.0.1
requirements:
  host:
  - python >=3.10
  - setuptools >=61.0
  - pip
  run:
  - python >=3.10
  - biopython >=1.80
  - click >=8.1
  - matplotlib-base >=3.4
  - numpy >=2
  - openpyxl >=3.1.3
  - pandas >=2
  - pyyaml >=6.0.2
  - polars >=1.32.3
  - pyarrow >=22.0.0
  - mpld3
source:
  sha256: cb607ad939df3183e5b630a531b210e5a29b4662094a70e1639c027e63641328
  url: https://pypi.org/packages/source/e/epicore/epicore-1.0.1.tar.gz
test:
  commands:
  - epicore --help
  imports:
  - epicore_utils
