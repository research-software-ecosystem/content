about:
  dev_url: https://github.com/AG-Walz/epicore
  home: https://github.com/AG-Walz/epicore
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Compute core epitopes from multiple overlapping peptides.
build:
  entry_points:
  - epicore = epicore_utils.epicore_main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - janaHoffmann1
package:
  name: epicore
  version: 0.1.8
requirements:
  host:
  - python >=3.12
  - setuptools >=61.0
  - pip
  run:
  - python >=3.12
  - biopython >=1.80
  - click >=8.1
  - matplotlib-base >=3.4
  - numpy >=2
  - pandas >=2
  - pyyaml >=6.0.2
  - polars >=1.32.3
  - pyarrow >=22.0.0
  - mpld3
source:
  sha256: 8a1b30567be939bd9c817596f4de80a9ff9e91cc679225d0b49ddf67fb02d09e
  url: https://pypi.org/packages/source/e/epicore/epicore-0.1.8.tar.gz
test:
  commands:
  - epicore --help
  imports:
  - epicore_utils
