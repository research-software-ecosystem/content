about:
  description: The ReactomeGSA packages uses Reactome's online analysis service to
    perform a multi-omics gene set analysis. The main advantage of this package is,
    that the retrieved results can be visualized using REACTOME's powerful webapplication.  Since
    Reactome's analysis service also uses R to perfrom the actual gene set analysis
    you will get similar results when using the same packages (such as limma and edgeR)
    locally.  Therefore, if you only require a gene set analysis, different packages
    are more suited.
  home: https://bioconductor.org/packages/3.22/bioc/html/ReactomeGSA.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Client for the Reactome Analysis Service for comparative multi-omics gene
    set analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-reactomegsa
  version: 1.24.1
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocsingular >=1.26.0,<1.27.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-gplots
  - r-httr
  - r-igraph
  - r-jsonlite
  - r-progress
  - r-rcolorbrewer
  - r-tidyr
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
