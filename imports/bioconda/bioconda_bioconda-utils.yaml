about:
  dev_url: https://github.com/bioconda/bioconda-utils
  doc_url: https://bioconda.github.io/contributor/guidelines.html
  home: https://bioconda.github.io/contributor/build-system.html
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: Utilities for building and managing bioconda recipes.
build:
  entry_points:
  - bioconda-utils = bioconda_utils.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517
    -vvv
package:
  name: bioconda-utils
  version: 4.2.0
requirements:
  host:
  - python =3.13
  - setuptools <82
  - pip
  run:
  - conda-forge-pinning =2026.01.07.13.16.30
  - setuptools <82
  - python =3.13
  - conda =26.1
  - conda-libmamba-solver =25.11
  - conda-build =26.3
  - conda-index =0.7
  - conda-package-streaming =0.12
  - mamba =2.5
  - argh =0.31
  - colorlog =6
  - tqdm =4.67
  - yaspin =3
  - ruamel.yaml =0.18
  - pyaml =26.2
  - networkx =3.6
  - pandas =3.0
  - libblas * *openblas
  - boltons =25.0
  - jsonschema =4.26
  - jinja2 =3.1
  - anaconda-client =1.14
  - galaxy-tool-util =25
  - involucro =1.1
  - skopeo =1.15
  - findutils
  - git =2
  - regex =2026
  - aiohttp =3.13
  - aiohttp-jinja2
  - aiohttp-session
  - aiohttp-security
  - aiofiles =25
  - aioftp =0.27
  - backoff =2.2
  - cachetools =7.0
  - gitpython =3.1
  - gidgethub =5
  - pyjwt >=2.4.0
  - beautifulsoup4 =4
  - requests =2.33
  - pygithub
  - diskcache =5
  - platformdirs =4
  - tabulate =0.10
  - psutil
source:
  sha256: 0acaa05cf618ff369dfcee2afc978afe774b2e11ce588c9d720fd77b1bd8e2ac
  url: https://github.com/bioconda/bioconda-utils/archive/v4.2.0.tar.gz
test:
  commands:
  - bioconda-utils --help
  - bioconda-utils lint --help
  - bioconda-utils build --help
  imports:
  - bioconda_utils
