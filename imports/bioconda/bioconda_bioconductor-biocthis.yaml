about:
  description: This package expands the usethis package with the goal of helping automate
    the process of creating R packages for Bioconductor or making them Bioconductor-friendly.
  home: https://bioconductor.org/packages/3.22/bioc/html/biocthis.html
  license: Artistic-2.0
  summary: Automate package and project setup for Bioconductor packages
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biocthis
  version: 1.20.0
requirements:
  host:
  - r-base
  - r-biocmanager
  - r-fs
  - r-glue
  - r-rlang
  - r-styler
  - r-usethis >=2.0.1
  run:
  - r-base
  - r-biocmanager
  - r-fs
  - r-glue
  - r-rlang
  - r-styler
  - r-usethis >=2.0.1
source:
  md5: a7578d60d10e5df3c7d92a19bff1acb1
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/biocthis_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/biocthis/biocthis_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/biocthis_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biocthis/bioconductor-biocthis_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('biocthis')"
