about:
  dev_url: https://github.com/TomHarrop/atol-reference-data-lookups
  home: https://github.com/TomHarrop/atol-reference-data-lookups
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Look up reference datasets by NCBI TaxId.
build:
  entry_points:
  - atol-reference-data-lookups = atol_reference_data_lookups.atol_reference_data_lookups:main
  - get-remote-files = get_remote_files.get_remote_files:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=0.2.0
package:
  name: atol-reference-data-lookups
  version: 0.2.0
requirements:
  host:
  - pip
  - python >=3.13,<3.15
  - setuptools-scm
  run:
  - python >=3.13,<3.15
  - scikit-bio >=0.6.3
  - snakemake >=9.16.3,<10
source:
  sha256: c6442352211f6888531309e7d6014b4c1625f81f5485dacee5521b9f79efe938
  url: https://github.com/TomHarrop/atol-reference-data-lookups/archive/refs/tags/0.2.0.tar.gz
test:
  commands:
  - 'atol-reference-data-lookups --help | grep ''usage: atol-reference-data-lookups'''
  - 'get-remote-files --help | grep ''usage: get-remote-files'''
