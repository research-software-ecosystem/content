about:
  home: https://github.com/willros/bam2plot
  license: GPL-3.0-only
  license_file: LICENSE
  summary: Plot of coverage from bam file
build:
  entry_points:
  - bam2plot=bam2plot.main:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
package:
  name: bam2plot
  version: 0.4.1
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - pysam >=0.22.0
  - seaborn >=0.13.2
  - polars >=0.20.15
  - mappy >=2.28
  - pyfastx
  - pyarrow
  - mosdepth
source:
  sha256: 27f081fdbc5358e265a1c4718daa5e816a9433f3f7c413012c0bec2fa39ca885
  url: https://pypi.org/packages/source/b/bam2plot/bam2plot-0.4.1.tar.gz
test:
  commands:
  - bam2plot from_bam --help
  - bam2plot from_reads --help
  - bam2plot guci --help
  imports:
  - bam2plot
