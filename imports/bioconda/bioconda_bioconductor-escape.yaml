about:
  description: A bridging R package to facilitate gene set enrichment analysis (GSEA)
    in the context of single-cell RNA sequencing. Using raw count information, Seurat
    objects, or SingleCellExperiment format, users can perform and visualize ssGSEA,
    GSVA, AUCell, and UCell-based enrichment calculations across individual cells.
    Alternatively, escape supports use of rank-based GSEA, such as the use of differential
    gene expression via fgsea.
  home: https://bioconductor.org/packages/3.22/bioc/html/escape.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Easy single cell analysis platform for enrichment
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-escape
  version: 2.6.2
requirements:
  host:
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggdist
  - r-ggplot2 >=3.5.0
  - r-matrix
  run:
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggdist
  - r-ggplot2 >=3.5.0
  - r-matrix
source:
  md5: f5880b5b367fdf4479ab8309c4bfdf32
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/escape_2.6.2.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/escape/escape_2.6.2.tar.gz
  - https://bioarchive.galaxyproject.org/escape_2.6.2.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-escape/bioconductor-escape_2.6.2_src_all.tar.gz
test:
  commands:
  - $R -e "library('escape')"
