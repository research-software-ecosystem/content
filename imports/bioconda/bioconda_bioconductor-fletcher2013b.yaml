about:
  description: This package reproduces the systems biology analysis for the data in
    package Fletcher2013a using RTN.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/Fletcher2013b.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Master regulators of FGFR2 signalling and breast cancer risk
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-fletcher2013b
  version: 1.46.0
requirements:
  host:
  - bioconductor-fletcher2013a >=1.46.0,<1.47.0
  - bioconductor-reder >=3.6.0,<3.7.0
  - bioconductor-rtn >=2.34.0,<2.35.0
  - r-base
  - r-igraph
  - r-rcolorbrewer
  run:
  - bioconductor-fletcher2013a >=1.46.0,<1.47.0
  - bioconductor-reder >=3.6.0,<3.7.0
  - bioconductor-rtn >=2.34.0,<2.35.0
  - r-base
  - r-igraph
  - r-rcolorbrewer
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 5d4bd34d30131d89113f1285634e2548
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/Fletcher2013b_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Fletcher2013b/Fletcher2013b_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/Fletcher2013b_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-fletcher2013b/bioconductor-fletcher2013b_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Fletcher2013b')"
