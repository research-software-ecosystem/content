about:
  description: 'Data management of large-scale whole-genome sequencing variant calls
    with thousands of individuals: genotypic data (e.g., SNVs, indels and structural
    variation calls) and annotations in SeqArray GDS files are stored in an array-oriented
    and compressed manner, with efficient data access using the R programming language.'
  home: https://bioconductor.org/packages/3.22/bioc/html/SeqArray.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Data management of large-scale whole-genome sequence variant calls using
    GDS files
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:seqarray
package:
  name: bioconductor-seqarray
  version: 1.50.1
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-gdsfmt >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-digest
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-gdsfmt >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-digest
source:
  md5: 6d877256b5a647d853a6afeee14cd0a1
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SeqArray_1.50.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SeqArray/SeqArray_1.50.1.tar.gz
  - https://bioarchive.galaxyproject.org/SeqArray_1.50.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-seqarray/bioconductor-seqarray_1.50.1_src_all.tar.gz
