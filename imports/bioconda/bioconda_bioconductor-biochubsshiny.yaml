about:
  description: A package that allows interactive exploration of AnnotationHub and
    ExperimentHub resources. It uses DT / DataTable to display resources for multiple
    organisms. It provides template code for reproducibility and for downloading resources
    via the indicated Hub package.
  home: https://bioconductor.org/packages/3.22/bioc/html/BiocHubsShiny.html
  license: Artistic-2.0
  summary: View AnnotationHub and ExperimentHub Resources Interactively
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biochubsshiny
  version: 1.10.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-shinybiocloader >=1.0.0,<1.1.0
  - r-base
  - r-dt
  - r-htmlwidgets
  - r-rclipboard
  - r-shiny
  - r-shinyace
  - r-shinyjs
  - r-shinythemes
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-shinybiocloader >=1.0.0,<1.1.0
  - r-base
  - r-dt
  - r-htmlwidgets
  - r-rclipboard
  - r-shiny
  - r-shinyace
  - r-shinyjs
  - r-shinythemes
source:
  md5: 439c5dfe057c0e2123d3b218470b7bb5
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BiocHubsShiny_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BiocHubsShiny/BiocHubsShiny_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/BiocHubsShiny_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biochubsshiny/bioconductor-biochubsshiny_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('BiocHubsShiny')"
