about:
  description: This package provides Bioconductor-friendly wrappers for RNA velocity
    calculations in single-cell RNA-seq data. We use the basilisk package to manage
    Conda environments, and the zellkonverter package to convert data structures between
    SingleCellExperiment (R) and AnnData (Python). The information produced by the
    velocity methods is stored in the various components of the SingleCellExperiment
    class.
  home: https://bioconductor.org/packages/3.22/bioc/html/velociraptor.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Toolkit for Single-Cell Velocity
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-velociraptor
  version: 1.20.0
requirements:
  host:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-biocsingular >=1.26.0,<1.27.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-zellkonverter >=1.20.0,<1.21.0
  - r-base
  - r-matrix
  - r-reticulate
  run:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-biocsingular >=1.26.0,<1.27.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
