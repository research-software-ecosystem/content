about:
  home: https://github.com/acorg/beast2-xml
  license: MIT
  license_file: LICENSE
  summary: Command line script and Python class for generating BEAST2 XML config files.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - m-d-grunnill
package:
  name: beast2-xml
  version: 1.5.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - dark-matter >=1.1.28
  - pandas >=2.2.2
  - ete3 >=3.1.3
  - six >=1.16.0
  - numpy >=1.10.0
  - legacy-cgi
source:
  sha256: f2cde257ecf02bdd3a8a1062405c9443174a2791208cea26019bfe0ed4d472db
  url: https://pypi.org/packages/source/b/beast2-xml/beast2_xml-1.5.2.tar.gz
test:
  imports:
  - beast2xml
