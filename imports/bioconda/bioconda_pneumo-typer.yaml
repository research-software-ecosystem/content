about:
  description: Pneumo-Typer is a stand-alone perl application, which requires blat,
    prodigal, NCBI BLAST+, and several perl Modules (GD, GD::SVG, Net::OAuth, JSON,
    LWP::UserAgent, HTTP::Request::Common, Data::Random, Config::Tiny) to be installed
    before use.
  doc_url: https://github.com/Xiangyang1984/Pneumo-Typer
  home: https://www.microbialgenomic.cn/Pneumo-Typer.html
  license: GPL-3.0-or-later
  summary: Pneumo-Typer is a high-throughput capsule genotype visualization tool with
    integrated serotype and sequence type prediction for Streptococcus pneumoniae
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  author:
  - Dr. Xiangyang Li <lixiangyang@fudan.edu.cn>
package:
  name: pneumo-typer
  version: 2.0.2
requirements:
  run:
  - blast
  - perl-gd >=2.74
  - perl-gd-svg
  - perl-svg >=2.87
  - perl-lwp-protocol-https
  - perl-bioperl-core
  - prodigal
  - ucsc-blat
source:
  sha256: a5abe985afa2b4f230aa58bbfc7eeed3af396e3daec24687c790a2a6ffaa1167
  url: https://www.microbialgenomic.cn/gz/pneumotyperData/pneumo-typer-v2.0.2.tar.gz
test:
  commands:
  - blastn -h
  - makeblastdb -h
  - pneumo-typer -h
  - update_mlstdb_cgmlstdb -m T -c F
  - prodigal -h
