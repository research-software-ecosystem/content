about:
  doc_url: https://asciigenome.readthedocs.io/en/latest/
  home: https://github.com/dariober/ASCIIGenome
  license: MIT
  license_family: MIT
  summary: Command-line genome browser running from terminal window and solely based
    on ASCII characters
build:
  noarch: generic
  number: 1
  run_exports:
  - null
package:
  name: asciigenome
  version: 1.20.0
requirements:
  run:
  - zlib
  - openjdk >=17
source:
  sha256: 8fce70d7e555c67e4fb27a99763e41a18d91a9a596695f22ce233c7a26cfc02f
  url: https://github.com/dariober/ASCIIGenome/releases/download/v1.20.0/ASCIIGenome-1.20.0.zip
test:
  commands:
  - ASCIIGenome -v
  - ASCIIGenome --debug 2 --noFormat --nonInteractive --exec "bookmark && zo && dropTracks
    mark"
