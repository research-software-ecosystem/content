about:
  description: 'TAfinder3D identifies Types I-VIII toxin-antitoxin loci in bacterial
    genomes

    using sequence homology (MMseqs2), domain detection (HMMER), and 3D

    structure-based searching (Foldseek with GPU acceleration).

    '
  home: https://github.com/schmigle/TAfinder3D
  license: MIT
  license_file: LICENSE
  summary: Toxin-antitoxin system identification with 3D structure-based searching
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . --no-deps --no-build-isolation -v
  - mkdir -p $PREFIX/share/tafinder3d
  - cp -r tafinder_db $PREFIX/share/tafinder3d/
extra:
  recipe-maintainers:
  - schmigle
package:
  name: tafinder3d
  version: 1.0.7
requirements:
  host:
  - python >=3.9,<3.13
  - setuptools
  - pip
  run:
  - python >=3.9,<3.13
  - numpy >=2.0
  - pandas >=2.0
  - mmseqs2
  - hmmer >=3.4
  - prodigal >=2.6
  - prodigal-gv
  - foldseek
  - biopython
  - pytorch
  - transformers
  - sentencepiece
  - protobuf
source:
  sha256: f0a1709f6c03ab8b489b2199e2ec3551310d2cc24abe7a4b9f4c6ba1d9abdd54
  url: https://github.com/schmigle/TAfinder3D/archive/refs/tags/v1.0.7.tar.gz
test:
  commands:
  - tafinder --help
