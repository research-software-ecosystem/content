about:
  description: The package curatedPCaData offers a selection of annotated prostate
    cancer datasets featuring multiple omics, manually curated metadata, and derived
    downstream variables. The studies are offered as MultiAssayExperiment (MAE) objects
    via ExperimentHub, and comprise of clinical characteristics tied to gene expression,
    copy number alteration and somatic mutation data. Further, downstream features
    computed from these multi-omics data are offered. Multiple vignettes help grasp
    characteristics of the various studies and provide example exploratory and meta-analysis
    of leveraging the multiple studies provided here-in.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/curatedPCaData.html
  license: CC BY 4.0
  summary: Curated Prostate Cancer Data
