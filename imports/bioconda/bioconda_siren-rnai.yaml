about:
  home: https://github.com/pablovargasmejia/SIREN
  license: GPL-3.0-only
  license_file: LICENSE
  summary: 'SIREN: Suite for Intelligent RNAi design and Evaluation of Nucleotide
    sequences'
build:
  entry_points:
  - SIREN = siren_rnai.siren_masterV:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - pablovargasmejia
package:
  name: siren-rnai
  version: 0.1.9
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.9
  - pandas
  - biopython
  - tqdm
  - primer3-py
  - matplotlib-base
  - numpy
  - seaborn
  - scipy
  - rnahybrid
source:
  sha256: 7f11152b48dea6e668ac3ae6b627c65eb9a2ef70d34fcab49bdad21791e8458d
  url: https://pypi.org/packages/source/s/siren-rnai/siren_rnai-0.1.9.tar.gz
test:
  commands:
  - pip check
  - SIREN --help
  imports:
  - siren_rnai
