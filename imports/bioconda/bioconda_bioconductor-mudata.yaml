about:
  description: Save MultiAssayExperiments to h5mu files supported by muon and mudata.
    Muon is a Python framework for multimodal omics data analysis. It uses an HDF5-based
    format for data storage.
  home: https://bioconductor.org/packages/3.22/bioc/html/MuData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Serialization for MultiAssayExperiment Objects
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mudata
  version: 1.14.0
requirements:
  host:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  run:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
source:
  md5: cbb0c2b36ac493fd3a203b484ab071cf
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MuData_1.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MuData/MuData_1.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/MuData_1.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mudata/bioconductor-mudata_1.14.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MuData')"
