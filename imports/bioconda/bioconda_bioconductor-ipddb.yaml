about:
  description: 'All alleles from the IPD IMGT/HLA <https://www.ebi.ac.uk/ipd/imgt/hla/>
    and IPD KIR <https://www.ebi.ac.uk/ipd/kir/> database for Homo sapiens. Reference:
    Robinson J, Maccari G, Marsh SGE, Walter L, Blokhuis J, Bimber B, Parham P, De
    Groot NG, Bontrop RE, Guethlein LA, and Hammond JA KIR Nomenclature in non-human
    species Immunogenetics (2018), in preparation.'
  home: https://bioconductor.org/packages/3.22/bioc/html/ipdDb.html
  license: Artistic-2.0
  summary: IPD IMGT/HLA and IPD KIR database for Homo sapiens
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ipddb
  version: 1.28.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-assertthat
  - r-base
  - r-dbi
  - r-rsqlite
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-assertthat
  - r-base
  - r-dbi
  - r-rsqlite
source:
  md5: 61104f31a176b1acf51daaf1e9e7bc65
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ipdDb_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ipdDb/ipdDb_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/ipdDb_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ipddb/bioconductor-ipddb_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ipdDb')"
