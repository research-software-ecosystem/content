about:
  description: See what is going on 'under the hood' of KEGG pathways by explicitly
    re-creating the pathway maps from information obtained from KGML files.
  home: https://bioconductor.org/packages/3.22/bioc/html/KEGGlincs.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Visualize all edges within a KEGG pathway and overlay LINCS data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:kegglincs
  - doi:10.7490/f1000research.1113436.1
  parent_recipe:
    name: bioconductor-kegglincs
    path: recipes/bioconductor-kegglincs
    version: 1.6.2
package:
  name: bioconductor-kegglincs
  version: 1.36.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-hgu133a.db >=3.13.0,<3.14.0
  - bioconductor-kegggraph >=1.70.0,<1.71.0
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - bioconductor-kodata >=1.36.0,<1.37.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - r-base
  - r-gtools
  - r-httr
  - r-igraph
  - r-plyr
  - r-rjsonio
  - r-xml
  - cytoscape >=3.3.0
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-hgu133a.db >=3.13.0,<3.14.0
  - bioconductor-kegggraph >=1.70.0,<1.71.0
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - bioconductor-kodata >=1.36.0,<1.37.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - r-base
  - r-gtools
  - r-httr
  - r-igraph
  - r-plyr
  - r-rjsonio
  - r-xml
  - cytoscape >=3.3.0
source:
