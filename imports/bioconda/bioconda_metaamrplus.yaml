about:
  description: MetaAMRplus is a command-line tool for detecting antimicrobial resistance
    genes, metal/biocide resistance genes, and their genomic colocalisation.
  home: https://github.com/migshaw03/MetaAMRplus
  license: MIT
  summary: 'MetaAMRplus: AMR + metal resistance + colocalisation analysis'
build:
  noarch: generic
  number: 1
  run_exports:
  - null
  script: "set -euo pipefail\n\nmkdir -p \"$PREFIX/bin\"\nmkdir -p \"$PREFIX/share/metaamrplus/db\"\
    \n\ninstall -m 755 \"$SRC_DIR/bin/metaamrplus\" \"$PREFIX/bin/metaamrplus\"\n\
    install -m 755 \"$SRC_DIR/bin/metaamrplus_batch\" \"$PREFIX/bin/metaamrplus_batch\"\
    \n\nif [[ -f \"$SRC_DIR/bin/metaamrplus-download-db\" ]]; then\n  install -m 755\
    \ \"$SRC_DIR/bin/metaamrplus-download-db\" \"$PREFIX/bin/metaamrplus-download-db\"\
    \nfi\n\ninstall -m 755 \"$SRC_DIR/bin/annotate_metaamrplus.py\" \\\n  \"$PREFIX/bin/annotate_metaamrplus.py\"\
    \n\nDB_DIR=\"$SRC_DIR/db\"\n\ncp \"$DB_DIR\"/MetaAMRplus_DB_v1.0.* \"$PREFIX/share/metaamrplus/db/\"\
    \ || true\n\nif [[ -f \"$DB_DIR/MetaAMRplus_v1.0.idmap.tsv\" ]]; then\n  cp \"\
    $DB_DIR/MetaAMRplus_v1.0.idmap.tsv\" \"$PREFIX/share/metaamrplus/db/\"\nfi\n"
extra:
  recipe-maintainers:
  - migshaw03
package:
  name: metaamrplus
  version: 1.5.1
requirements:
  build:
  - coreutils
  host:
  - python >=3.8
  run:
  - python >=3.8
  - coreutils
  - gawk
  - blast >=2.14
  - prodigal
source:
  sha256: 5ae9181e0eb5b64e929e4980bbef47c7aec7e2c81ae8bfda1d5a3e072b4f89ec
  url: https://github.com/migshaw03/MetaAMRplus/archive/refs/tags/v1.5.1.tar.gz
test:
  commands:
  - metaamrplus --help
