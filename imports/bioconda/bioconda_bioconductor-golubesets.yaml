about:
  description: representation of public golub data with some covariate data of provenance
    unknown to the maintainer at present; now employs ExpressionSet format
  home: https://bioconductor.org/packages/3.22/data/experiment/html/golubEsets.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: exprSets for golub leukemia data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-golubesets
    path: recipes/bioconductor-golubesets
    version: 1.22.0
package:
  name: bioconductor-golubesets
  version: 1.52.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: cbb8a2bcefde2e5a73934038bf6c6e1d
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/golubEsets_1.52.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/golubEsets/golubEsets_1.52.0.tar.gz
  - https://bioarchive.galaxyproject.org/golubEsets_1.52.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-golubesets/bioconductor-golubesets_1.52.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('golubEsets')"
