about:
  description: A package for the orthology prediction data download from OMA database.
  home: https://bioconductor.org/packages/3.22/bioc/html/OmaDB.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: R wrapper for the OMA REST API
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-omadb
  version: 2.26.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-topgo >=2.62.0,<2.63.0
  - r-ape
  - r-base
  - r-httr >=1.2.1
  - r-jsonlite
  - r-plyr >=1.8.4
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-topgo >=2.62.0,<2.63.0
  - r-ape
  - r-base
  - r-httr >=1.2.1
  - r-jsonlite
  - r-plyr >=1.8.4
source:
  md5: 76003a8021b656c6ff07ab90285e09ff
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/OmaDB_2.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/OmaDB/OmaDB_2.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/OmaDB_2.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-omadb/bioconductor-omadb_2.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('OmaDB')"
