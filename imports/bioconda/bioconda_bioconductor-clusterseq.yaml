about:
  description: Identification of clusters of co-expressed genes based on their expression
    across multiple (replicated) biological samples.
  home: https://bioconductor.org/packages/3.22/bioc/html/clusterSeq.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Clustering of high-throughput sequencing data by identifying co-expression
    patterns
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-clusterseq
  version: 1.34.0
requirements:
  host:
  - bioconductor-bayseq >=2.44.0,<2.45.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  run:
  - bioconductor-bayseq >=2.44.0,<2.45.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
source:
  md5: e5e597dbcd6619210e5f9b552a50e45d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/clusterSeq_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/clusterSeq/clusterSeq_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/clusterSeq_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-clusterseq/bioconductor-clusterseq_1.34.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('clusterSeq')"
