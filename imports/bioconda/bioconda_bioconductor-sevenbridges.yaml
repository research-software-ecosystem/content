about:
  description: R client and utilities for Seven Bridges platform API, from Cancer
    Genomics Cloud to other Seven Bridges supported platforms.
  home: https://bioconductor.org/packages/3.22/bioc/html/sevenbridges.html
  license: Apache License 2.0 | file LICENSE
  license_file: LICENSE
  summary: Seven Bridges Platform API Client and Common Workflow Language Tool Builder
    in R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-sevenbridges
  version: 1.40.0
requirements:
  host:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-curl
  - r-data.table
  - r-docopt
  - r-httr
  - r-jsonlite
  - r-objectproperties
  - r-stringr
  - r-uuid
  - r-yaml
  run:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-curl
  - r-data.table
  - r-docopt
  - r-httr
  - r-jsonlite
  - r-objectproperties
  - r-stringr
  - r-uuid
  - r-yaml
source:
  md5: 9d15413e5cc0409dacb74cbf7a05776b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/sevenbridges_1.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/sevenbridges/sevenbridges_1.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/sevenbridges_1.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-sevenbridges/bioconductor-sevenbridges_1.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('sevenbridges')"
