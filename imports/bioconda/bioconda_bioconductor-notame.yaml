about:
  description: "Provides functionality for untargeted LC-MS metabolomics research\
    \ as specified in the associated protocol article in the 'Metabolomics Data Processing\
    \ and Data Analysis\u2014Current Best Practices' special issue of the Metabolites\
    \ journal (2020). This includes tabular data preprocessing and quality control,\
    \ uni- and multivariate analysis as well as quality control visualizations, feature-wise\
    \ visualizations and results visualizations. Raw data preprocessing and functionality\
    \ related to biological context, such as pathway analysis, is not included."
  home: https://bioconductor.org/packages/3.22/bioc/html/notame.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Workflow for non-targeted LC-MS metabolic profiling
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-notame
  version: 1.0.1
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
