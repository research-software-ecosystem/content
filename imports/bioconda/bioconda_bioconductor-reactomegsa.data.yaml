about:
  description: Companion data sets to showcase the functionality of the ReactomeGSA
    package. This package contains proteomics and RNA-seq data of the melanoma B-cell
    induction study by Griss et al. and scRNA-seq data from Jerby-Arnon et al.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/ReactomeGSA.data.html
  license: Artistic-2.0
  summary: Companion data package for the ReactomeGSA package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-reactomegsa.data
  version: 1.24.0
requirements:
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-reactomegsa >=1.24.0,<1.25.0
  - r-base
  - r-seurat
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-reactomegsa >=1.24.0,<1.25.0
  - r-base
  - r-seurat
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 11c24e29808cdd0af16a5219f9a507ae
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/ReactomeGSA.data_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ReactomeGSA.data/ReactomeGSA.data_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/ReactomeGSA.data_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-reactomegsa.data/bioconductor-reactomegsa.data_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ReactomeGSA.data')"
