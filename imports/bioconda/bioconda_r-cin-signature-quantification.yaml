about:
  home: https://github.com/markowetzlab/CINSignatureQuantification
  license: ASL
  summary: Quantification of copy number signatures in cancer samples from copy number
    profiles. The signatures are a readout of mutational processes resulting in chromosomal
    instability (CIN). Methods from Drews et al. (Nature, 2022) and Macintyre et al.
    (Nature Genetics, 2018) are included.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  recipe-maintainers:
  - seneschall
package:
  name: r-cin-signature-quantification
  version: 1.2.0
requirements:
  host:
  - r-base >=3.6.0
  - bioconductor-biobase >=2.46.0
  - r-data.table >=1.14
  - r-limsolve >=1.5.6
  - r-stringr >=1.4
  - r-testthat >=3.0.0
  - r-doparallel >=1.0.16
  - r-foreach >=1.5.1
  - r-knitr
  - r-rmarkdown
  run:
  - r-base >=3.6.0
  - bioconductor-biobase >=2.46.0
  - r-data.table >=1.14
  - r-limsolve >=1.5.6
  - r-stringr >=1.4
  - r-testthat >=3.0.0
  - r-doparallel >=1.0.16
  - r-foreach >=1.5.1
  - r-knitr
  - r-rmarkdown
source:
  sha256: 6a7f44ef72bff6674976e3835f6d3bcdf27c7ee9c5f7f85aaa15d9d5fc20fff2
  url: https://github.com/markowetzlab/CINSignatureQuantification/archive/refs/tags/v1.2.0.tar.gz
test:
  commands:
  - $R -e "library(CINSignatureQuantification)"
