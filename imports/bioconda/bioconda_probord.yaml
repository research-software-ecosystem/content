about:
  home: https://github.com/mujiezhang/ProBord
  license: MIT
  license_file: LICENSE
  summary: A tool for precise delimitation of provirus borders in host genomes
build:
  entry_points:
  - probord = probord.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
package:
  name: probord
  version: '1.0'
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - biopython
  - blast
  - checkv
  - ncbi-genome-download
source:
  sha256: 181d67a1b3437d0478441df6f7365366187f5f3812f2192ac801ee5d2c639cf3
  url: https://github.com/mujiezhang/ProBord/archive/refs/tags/v1.0.tar.gz
test:
  commands:
  - probord --help
  imports:
  - probord
