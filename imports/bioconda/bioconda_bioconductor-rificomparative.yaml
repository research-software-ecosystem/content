about:
  description: '''rifiComparative'' is a continuation of rifi package. It compares
    two conditions output of rifi using half-life and mRNA at time 0 segments. As
    an input for the segmentation, the difference between half-life of both condtions
    and log2FC of the mRNA at time 0 are used. The package provides segmentation,
    statistics, summary table, fragments visualization and some additional useful
    plots for further anaylsis.'
  home: https://bioconductor.org/packages/3.22/bioc/html/rifiComparative.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: '''rifiComparative'' compares the output of rifi from two different conditions.'
