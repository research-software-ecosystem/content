about:
  description: Design primers for targeted single-cell RNA-seq used by TAP-seq. Create
    sequence templates for target gene panels and design gene-specific primers using
    Primer3. Potential off-targets can be estimated with BLAST. Requires working installations
    of Primer3 and BLASTn.
  home: https://bioconductor.org/packages/3.22/bioc/html/TAPseq.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Targeted scRNA-seq primer design for TAP-seq
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tapseq
  version: 1.22.1
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-dplyr
  - r-tidyr
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-dplyr
  - r-tidyr
