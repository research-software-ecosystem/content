about:
  description: Annotation data file for hgu2beta7 assembled using data from public
    data repositories
  home: https://bioconductor.org/packages/3.22/data/experiment/html/hgu2beta7.html
  license: Artistic-2.0
  summary: A data package containing annotation data for hgu2beta7
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hgu2beta7
  version: 1.50.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: c7670999631833e377d9b465421dfcb3
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/hgu2beta7_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/hgu2beta7/hgu2beta7_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/hgu2beta7_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hgu2beta7/bioconductor-hgu2beta7_1.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('hgu2beta7')"
