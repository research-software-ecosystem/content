about:
  description: The scRNAseqApp is a Shiny app package designed for interactive visualization
    of single-cell data. It is an enhanced version derived from the ShinyCell, repackaged
    to accommodate multiple datasets. The app enables users to visualize data containing
    various types of information simultaneously, facilitating comprehensive analysis.
    Additionally, it includes a user management system to regulate database accessibility
    for different users.
  home: https://bioconductor.org/packages/3.22/bioc/html/scRNAseqApp.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: A single-cell RNAseq Shiny app-package
