about:
  description: The geomeTriD (Three-Dimensional Geometry) Package provides interactive
    3D visualization of chromatin structures using the WebGL-based 'three.js' (https://threejs.org/)
    or the rgl rendering library. It is designed to identify and explore spatial chromatin
    patterns within genomic regions. The package generates dynamic 3D plots and HTML
    widgets that integrate seamlessly with Shiny applications, enabling researchers
    to visualize chromatin organization, detect spatial features, and compare structural
    dynamics across different conditions and data types.
  home: https://bioconductor.org/packages/3.22/bioc/html/geomeTriD.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: A R/Bioconductor package for interactive 3D plot of epigenetic data or
    single cell data
