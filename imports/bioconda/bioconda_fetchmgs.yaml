about:
  home: https://github.com/motu-tool/FetchMGs
  license: GPL-3.0-only
  license_file: LICENSE
  summary: FetchMGs extracts the 40 marker genes from genomes and metagenomes in an
    easy and accurate manner.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - kbseah
package:
  name: fetchmgs
  version: 2.1.3
requirements:
  host:
  - python
  - pip
  - setuptools
  run:
  - python
  - biopython
  - tqdm
  - pyrodigal >=3.6.3.post1
  - pyhmmer >=0.12.0,<0.13.0
  - psutil
source:
  sha256: 535f719fbb619bd14fdd8af8b07f3c224f2f2a3d856898e8f1eeb3acf2ea3b4f
  url: https://pypi.org/packages/source/f/fetchmgs/fetchmgs-2.1.3.tar.gz
test:
  commands:
  - pip check
  - fetchMGs 2>&1 | grep 'FetchMGs extracts the'
  - fetchMGs extraction 2>&1 | grep 'fetchMGs extraction'
  imports:
  - fetchmgs
  requires:
  - pip
