about:
  description: Functions for the selection of optimal reference genes and the normalisation
    of real-time quantitative PCR data.
  home: https://bioconductor.org/packages/3.22/bioc/html/NormqPCR.html
  license: LGPL-3
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Functions for normalisation of RT-qPCR data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  container:
    extended-base: true
package:
  name: bioconductor-normqpcr
  version: 1.56.0
requirements:
  build:
  - null
  - null
  - null
  - null
  - null
  - xorg-libxfixes
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-readqpcr >=1.56.0,<1.57.0
  - r-base
  - r-qpcr
  - r-rcolorbrewer
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-readqpcr >=1.56.0,<1.57.0
  - r-base
  - r-qpcr
  - r-rcolorbrewer
source:
  md5: f6bc620af9169be9a52ab86b70389616
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/NormqPCR_1.56.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/NormqPCR/NormqPCR_1.56.0.tar.gz
  - https://bioarchive.galaxyproject.org/NormqPCR_1.56.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-normqpcr/bioconductor-normqpcr_1.56.0_src_all.tar.gz
test:
  commands:
  - LD_LIBRARY_PATH="${BUILD_PREFIX}/x86_64-conda-linux-gnu/sysroot/usr/lib64:${BUILD_PREFIX}/lib"
    $R -e "library('NormqPCR')"
