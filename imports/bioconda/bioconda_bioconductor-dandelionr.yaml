about:
  description: dandelionR is an R package for performing single-cell immune repertoire
    trajectory analysis, based on the original python implementation. It provides
    the necessary functions to interface with scRepertoire and a custom implementation
    of an absorbing Markov chain for pseudotime inference, inspired by the Palantir
    Python package.
  home: https://bioconductor.org/packages/3.22/bioc/html/dandelionR.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Single-cell Immune Repertoire Trajectory Analysis in R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dandelionr
  version: 1.2.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bluster >=1.20.0,<1.21.0
  - bioconductor-destiny >=3.24.0,<3.25.0
  - bioconductor-milor >=2.6.0,<2.7.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-igraph
  - r-mass
  - r-matrix
  - r-purrr
  - r-rann
  - r-rlang
  - r-spam
  - r-uwot
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bluster >=1.20.0,<1.21.0
  - bioconductor-destiny >=3.24.0,<3.25.0
  - bioconductor-milor >=2.6.0,<2.7.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-igraph
  - r-mass
  - r-matrix
  - r-purrr
  - r-rann
  - r-rlang
  - r-spam
  - r-uwot
