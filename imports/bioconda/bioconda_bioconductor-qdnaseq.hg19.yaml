about:
  description: This package provides QDNAseq bin annotations for the human genome
    build hg19.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/QDNAseq.hg19.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: QDNAseq bin annotation for hg19
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-qdnaseq.hg19
  version: 1.40.0
requirements:
  host:
  - bioconductor-qdnaseq >=1.46.0,<1.47.0
  - r-base
  run:
  - bioconductor-qdnaseq >=1.46.0,<1.47.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 866e912e4993a067ccbd96fc3126f3ad
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/QDNAseq.hg19_1.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/QDNAseq.hg19/QDNAseq.hg19_1.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/QDNAseq.hg19_1.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-qdnaseq.hg19/bioconductor-qdnaseq.hg19_1.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('QDNAseq.hg19')"
