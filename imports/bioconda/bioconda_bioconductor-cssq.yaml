about:
  description: This package is desgined to perform statistical analysis to identify
    statistically significant differentially bound regions between multiple groups
    of ChIP-seq dataset.
  home: https://bioconductor.org/packages/3.22/bioc/html/CSSQ.html
  license: Artistic-2.0
  summary: Chip-seq Signal Quantifier Pipeline
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cssq
  version: 1.22.0
requirements:
  host:
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  run:
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
