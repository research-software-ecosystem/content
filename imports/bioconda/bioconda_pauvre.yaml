about:
  dev_url: https://github.com/conchoecia/pauvre
  home: https://github.com/conchoecia/pauvre
  license: GPL-3.0-only
  license_family: GPL3
  summary: Tools for plotting Oxford Nanopore and other long-read data.
build:
  entry_points:
  - pauvre = pauvre.pauvre_main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-build-isolation --no-cache-dir --no-deps -vvv'
package:
  name: pauvre
  version: 0.2.3
requirements:
  host:
  - python >=3
  - pip
  - setuptools
  run:
  - python >=3
  - biopython >=1.68
  - matplotlib-base >=2.0.2
  - numpy >=1.12.1
  - pandas >=0.20.1
  - scikit-learn
  - scipy
source:
  sha256: ba756bc9025ae7edafd91092d12a57864f018958fd46b548e9eeda7167ee197d
  url: https://pypi.org/packages/source/p/pauvre/pauvre-0.2.3.tar.gz
test:
  commands:
  - pauvre --help
  imports:
  - pauvre
  - pauvre.lsi
  - pauvre.tests
