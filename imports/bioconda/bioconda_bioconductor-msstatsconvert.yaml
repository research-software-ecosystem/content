about:
  description: MSstatsConvert provides tools for importing reports of Mass Spectrometry
    data processing tools into R format suitable for statistical analysis using the
    MSstats and MSstatsTMT packages.
  home: https://bioconductor.org/packages/3.22/bioc/html/MSstatsConvert.html
  license: Artistic-2.0
  summary: Import Data from Various Mass Spectrometry Signal Processing Tools to MSstats
    Format
build:
  number: 1
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
package:
  name: bioconductor-msstatsconvert
  version: 1.20.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - r-base
  - r-checkmate
  - r-data.table
  - r-log4r
  - r-rcpp
  - r-stringi
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
  - r-checkmate
  - r-data.table
  - r-log4r
  - r-rcpp
  - r-stringi
source:
  md5: 472e4f87202e9d7504c0483d20a4f1d6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MSstatsConvert_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MSstatsConvert/MSstatsConvert_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/MSstatsConvert_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-msstatsconvert/bioconductor-msstatsconvert_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MSstatsConvert')"
