about:
  description: performing all the steps of gene expression meta-analysis considering
    the possible existence of missing genes. It provides the necessary functions to
    be able to perform the different methods of gene expression meta-analysis. In
    addition, it contains functions to apply quality controls, download GEO datasets
    and show graphical representations of the results.
  home: https://bioconductor.org/packages/3.22/bioc/html/DExMA.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Differential Expression Meta-Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dexma
  version: 1.18.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-dexmadata >=1.18.0,<1.19.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - bioconductor-impute >=1.84.0,<1.85.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-snpstats >=1.60.0,<1.61.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-bnstruct
  - r-pheatmap
  - r-plyr
  - r-rcolorbrewer
