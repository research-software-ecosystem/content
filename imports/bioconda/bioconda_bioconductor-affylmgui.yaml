about:
  description: A Graphical User Interface (GUI) for analysis of Affymetrix microarray
    gene expression data using the affy and limma packages.
  home: https://bioconductor.org/packages/3.22/bioc/html/affylmGUI.html
  license: GPL (>=2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: GUI for limma Package with Affymetrix Microarrays
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-affylmgui
  version: 1.84.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-affyio >=1.80.0,<1.81.0
  - bioconductor-affyplm >=1.86.0,<1.87.0
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-gcrma >=2.82.0,<2.83.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
  - r-biocmanager
  - r-r2html
  - r-tkrplot
  - r-xtable
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-affyio >=1.80.0,<1.81.0
  - bioconductor-affyplm >=1.86.0,<1.87.0
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-gcrma >=2.82.0,<2.83.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
  - r-biocmanager
  - r-r2html
  - r-tkrplot
  - r-xtable
source:
  md5: 3bebc9bde7a601726de610a020650714
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/affylmGUI_1.84.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/affylmGUI/affylmGUI_1.84.0.tar.gz
  - https://bioarchive.galaxyproject.org/affylmGUI_1.84.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-affylmgui/bioconductor-affylmgui_1.84.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('affylmGUI')"
