about:
  description: The SpectriPy package allows integration of Python-based MS analysis
    code with the Spectra package. Spectra objects can be converted into Python MS
    data structures. In addition, SpectriPy integrates and wraps the similarity scoring
    and processing/filtering functions from the Python matchms package into R.
  home: https://bioconductor.org/packages/3.22/bioc/html/SpectriPy.html
  license: Artistic-2.0
  summary: Enhancing Cross-Language Mass Spectrometry Data Analysis with R and Python
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spectripy
  version: 1.0.0
requirements:
  host:
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
  - r-reticulate >=1.42.0
  - matchms >=0.31,<0.32
  - numpy >=2.2.0
  - python >=3.12
  - rdkit >=2024.3.5,<2025.0.0
  - spectrum_utils >=0.3.2
  run:
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
  - r-reticulate >=1.42.0
  - matchms >=0.31,<0.32
  - numpy >=2.2.0
  - python >=3.12
  - rdkit >=2024.3.5,<2025.0.0
  - spectrum_utils >=0.3.2
source:
  md5: c94df7804227ced8f7cbda9c65f9c321
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SpectriPy_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SpectriPy/SpectriPy_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/SpectriPy_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-spectripy/bioconductor-spectripy_1.0.0_src_all.tar.gz
