about:
  description: Functions to reconstruct case and control AFs from summary statistics.
    One function uses OR, NCase, NControl, and SE(log(OR)). The second function uses
    OR, NCase, NControl, and AF for the whole sample.
  home: https://bioconductor.org/packages/3.22/bioc/html/CCAFE.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Case Control Allele Frequency Estimation
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ccafe
  version: 1.2.0
requirements:
  host:
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-dplyr
  run:
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-dplyr
source:
  md5: e3269bca87421e20731e5d0998e723ac
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CCAFE_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CCAFE/CCAFE_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/CCAFE_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ccafe/bioconductor-ccafe_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CCAFE')"
