about:
  description: Visualize significant conserved amino acid sequence pattern in groups
    based on probability theory.
  home: https://bioconductor.org/packages/3.22/bioc/html/dagLogo.html
  license: GPL (>=2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: 'dagLogo: a Bioconductor package for visualizing conserved amino acid sequence
    pattern in groups based on probability theory'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-daglogo
  version: 1.48.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-motifstack >=1.54.0,<1.55.0
  - bioconductor-uniprot.ws >=2.50.0,<2.51.0
  - r-base
  - r-httr
  - r-pheatmap
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-motifstack >=1.54.0,<1.55.0
  - bioconductor-uniprot.ws >=2.50.0,<2.51.0
  - r-base
  - r-httr
  - r-pheatmap
source:
  md5: 31adb09bf15ee118d8cb4a2461bebd96
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/dagLogo_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/dagLogo/dagLogo_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/dagLogo_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-daglogo/bioconductor-daglogo_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('dagLogo')"
