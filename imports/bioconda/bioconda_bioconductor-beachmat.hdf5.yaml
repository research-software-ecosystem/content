about:
  description: Extends beachmat to support initialization of tatami matrices from
    HDF5-backed arrays. This allows C++ code in downstream packages to directly call
    the HDF5 C/C++ library to access array data, without the need for block processing
    via DelayedArray. Some utilities are also provided for direct creation of an in-memory
    tatami matrix from a HDF5 file.
  home: https://bioconductor.org/packages/3.22/bioc/html/beachmat.hdf5.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: beachmat bindings for HDF5-backed matrices
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-beachmat.hdf5
  version: 1.8.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-assorthead >=1.4.0,<1.5.0
  - bioconductor-beachmat >=2.26.0,<2.27.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-rhdf5lib >=1.32.0,<1.33.0
  - r-base
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-assorthead >=1.4.0,<1.5.0
  - bioconductor-beachmat >=2.26.0,<2.27.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-rhdf5lib >=1.32.0,<1.33.0
  - r-base
  - r-rcpp
source:
  md5: ef1dceb5ff5596aa3ca533aeab253058
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/beachmat.hdf5_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/beachmat.hdf5/beachmat.hdf5_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/beachmat.hdf5_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-beachmat.hdf5/bioconductor-beachmat.hdf5_1.8.0_src_all.tar.gz
