about:
  description: Raw data objects to be used for blood cell proportion estimation in
    minfi and similar packages. The FlowSorted.Blood.EPIC object is based in samples
    assayed by Brock Christensen and colleagues; for details see Salas et al. 2018.
    https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE110554.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/FlowSorted.Blood.EPIC.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Illumina EPIC data on immunomagnetic sorted peripheral adult blood cells
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-flowsorted.blood.epic
  version: 2.14.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genefilter >=1.92.0,<1.93.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-nlme
  - r-quadprog
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genefilter >=1.92.0,<1.93.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-nlme
  - r-quadprog
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: be980e595dc57da085e211855538385d
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/FlowSorted.Blood.EPIC_2.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/FlowSorted.Blood.EPIC/FlowSorted.Blood.EPIC_2.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/FlowSorted.Blood.EPIC_2.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowsorted.blood.epic/bioconductor-flowsorted.blood.epic_2.14.0_src_all.tar.gz
