about:
  description: signifinder is an R package for computing and exploring a compendium
    of tumor signatures. It allows to compute a variety of signatures coming from
    public literature, based on gene expression values, and return single-sample (-cell/-spot)
    scores. Currently, signifinder collects more than 70 distinct signatures, relating
    to multiple tumors and multiple cancer processes.
  home: https://bioconductor.org/packages/3.22/bioc/html/signifinder.html
  license: AGPL-3
  license_file: /lib/R/share/licenses/AGPL-3
  summary: Collection and implementation of public transcriptional cancer signatures
