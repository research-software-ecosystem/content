about:
  description: The package provides different distances measurements to calculate
    the difference between genesets. Based on these scores the genesets are clustered
    and visualized as graph. This is all presented in an interactive Shiny application
    for easy usage.
  home: https://bioconductor.org/packages/3.22/bioc/html/GeDi.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Defining and visualizing the distances between different genesets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gedi
  version: 1.6.1
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-simona >=1.8.0,<1.9.0
  - bioconductor-stringdb >=2.22.0,<2.23.0
  - r-base
  - r-bs4dash
  - r-circlize
  - r-cluster
  - r-dplyr
  - r-dt
