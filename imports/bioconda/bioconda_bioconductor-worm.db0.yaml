about:
  description: Base annotation databases for worm, intended ONLY to be used by AnnotationDbi
    to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/worm.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for worm
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-worm.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: b70b97e4548140957a8b6db3ac990b8c
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/worm.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/worm.db0/worm.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/worm.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-worm.db0/bioconductor-worm.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('worm.db0')"
