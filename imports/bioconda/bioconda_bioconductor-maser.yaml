about:
  description: This package provides functionalities for downstream analysis, annotation
    and visualizaton of alternative splicing events generated by rMATS.
  home: https://bioconductor.org/packages/3.22/bioc/html/maser.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Mapping Alternative Splicing Events to pRoteins
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-maser
  version: 1.28.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-dt
  - r-ggplot2
  - r-reshape2
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-dt
  - r-ggplot2
  - r-reshape2
source:
  md5: eee6b5a12e1b98277f73348b81175721
