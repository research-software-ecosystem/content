about:
  description: Provides a centralized conda installation for use by other Bioconductor
    packages. If conda is not already available on the system, it is downloaded and
    installed from the Miniforge project; otherwise, no action is performed. Historically,
    this package was used to provide a Python installation for basilisk, hence the
    name.
  home: https://bioconductor.org/packages/3.22/bioc/html/basilisk.utils.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Centralized Conda Installation for Bioconductor Packages
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-basilisk.utils
  version: 1.22.0
requirements:
  host:
  - bioconductor-dir.expiry >=1.18.0,<1.19.0
  - r-base
  run:
  - bioconductor-dir.expiry >=1.18.0,<1.19.0
  - r-base
source:
  md5: 76aac1d78e6fbc380bce0ca6cf85403a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/basilisk.utils_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/basilisk.utils/basilisk.utils_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/basilisk.utils_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-basilisk.utils/bioconductor-basilisk.utils_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('basilisk.utils')"
