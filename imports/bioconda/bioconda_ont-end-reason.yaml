about:
  description: "ont-end-reason is the canonical analysis toolkit for Oxford Nanopore\n\
    Technologies `end_reason` metadata \u2014 the tag every read carries that\nexplains\
    \ why sequencing stopped. The package provides:\n\n  - 9 analyses (distribution,\
    \ length, quality with GMM, temporal,\n    hypothesis tests, UMC posterior, signal\
    \ trace, SMA metrics, tables)\n  - 4 filter operations (tag, filter, export-fastq,\
    \ stats)\n  - 4 paper figure reproducers (fig3, fig5, fig6, supplementary)\n \
    \ - 6-section composed interactive HTML reports\n\nThe Bayesian UMC posterior\
    \ analysis estimates how much sequence was\ntruncated by adaptive sampling \u2014\
    \ recovering an estimate of \"unobserved\"\nsequence per read. This is the central\
    \ novel contribution of the\ncompanion paper.\n\nCompanion to the end-reason paper\
    \ from the Single-Molecule-Sequencing\nlab at the University of Michigan.\n"
  dev_url: https://github.com/Single-Molecule-Sequencing/ont-end-reason
  doc_url: https://silver-adventure-o322543.pages.github.io/
  home: https://github.com/Single-Molecule-Sequencing/ont-end-reason
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Comprehensive CLI for Oxford Nanopore end_reason analysis
build:
  entry_points:
  - ont-end-reason = ont_end_reason.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - gregfar
package:
  name: ont-end-reason
  version: 0.2.0a1
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools >=68
  - wheel
  run:
  - python >=3.10
  - click >=8.1
  - pysam >=0.22
  - pod5 >=0.3
  - numpy >=1.24
  - pandas >=2.0
  - matplotlib-base >=3.7
  - scipy >=1.10
  - structlog >=24.1
  - pyyaml >=6.0
  - jinja2 >=3.1
  - tabulate >=0.9
source:
  sha256: 3e5b9898b630284a1344d8f9a12549de3fc425570bd8f436eb69c37602fc08b3
  url: https://pypi.org/packages/source/o/ont-end-reason/ont_end_reason-0.2.0a1.tar.gz
test:
  commands:
  - ont-end-reason --version
  - ont-end-reason --help
  - ont-end-reason codes
  - ont-end-reason schema
  imports:
  - ont_end_reason
  - ont_end_reason.analyze.distribution
  - ont_end_reason.analyze.umc_posterior
  - ont_end_reason.filter
  - ont_end_reason.io
  - ont_end_reason.viz
