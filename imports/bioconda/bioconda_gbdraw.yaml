about:
  description: For details, see https://github.com/satoshikawato/gbdraw
  dev_url: https://github.com/satoshikawato/gbdraw
  fonts_license: SIL OFL, Version 1.1
  home: https://github.com/satoshikawato/gbdraw
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: A genome diagram generator for microbes and organelles.
build:
  entry_points:
  - gbdraw = gbdraw.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  - mkdir -p $PREFIX/fonts
  - cp -f gbdraw/data/*.ttf $PREFIX/fonts/
extra:
  recipe-maintainers:
  - satoshikawato
package:
  name: gbdraw
  version: 0.9.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - pandas
  - fonttools
  - biopython
  - svgwrite
  - cairosvg
  - bcbio-gff
source:
  sha256: 7c89abde83a5a0f2ef98ad3ef4804a9870280e09ddb35b5bde4e50662a537cb5
  url: https://github.com/satoshikawato/gbdraw/archive/refs/tags/0.9.2.tar.gz
test:
  commands:
  - gbdraw --help
  - gbdraw circular --help
  - gbdraw linear --help
  - cairosvg --help
  imports:
  - gbdraw
