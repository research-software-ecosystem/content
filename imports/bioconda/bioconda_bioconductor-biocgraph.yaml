about:
  description: This package provides examples and code that make use of the different
    graph related packages produced by Bioconductor.
  home: https://bioconductor.org/packages/3.22/bioc/html/biocGraph.html
  license: Artistic-2.0
  summary: Graph examples and use cases in Bioinformatics
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:biocgraph
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-biocgraph
    path: recipes/bioconductor-biocgraph
    version: 1.42.0
package:
  name: bioconductor-biocgraph
  version: 1.72.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-geneplotter >=1.88.0,<1.89.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-geneplotter >=1.88.0,<1.89.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - r-base
source:
  md5: 8c37735c6b79ce7118b6586cba9a3e08
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/biocGraph_1.72.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/biocGraph/biocGraph_1.72.0.tar.gz
  - https://bioarchive.galaxyproject.org/biocGraph_1.72.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biocgraph/bioconductor-biocgraph_1.72.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('biocGraph')"
