about:
  description: Cell Set Overlap Analysis (CSOA) is a tool for calculating per-cell
    gene signature scores in an scRNA-seq dataset. CSOA constructs a set for each
    gene in the signature, consisting of the cells that highly express the gene. Next,
    all overlaps of pairs of cell sets are computed, ranked, filtered and scored.
    The CSOA per-cell score is calculated by summing up all products of the overlap
    scores and the min-max-normalized expression of the two involved genes. CSOA can
    run on a Seurat object, a SingleCellExperiment object, a matrix and a dgCMatrix.
  home: https://bioconductor.org/packages/3.22/bioc/html/CSOA.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Calculate per-cell gene signature scores in scRNA-seq data using cell set
    overlaps
