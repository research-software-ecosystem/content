about:
  dev_url: https://github.com/snakemake/snakefmt
  doc_url: https://github.com/snakemake/snakefmt/blob/v1.1.0/README.md
  home: https://github.com/snakemake/snakefmt
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The uncompromising Snakemake code formatter.
build:
  entry_points:
  - snakefmt = snakefmt.snakefmt:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - mbhall88
  - bricoletc
package:
  name: snakefmt
  version: 1.1.0
requirements:
  host:
  - python >=3.11,<4.0
  - pip
  - hatchling
  run:
  - python >=3.11,<4.0
  - black >=26.3.1,<27.0
  - click >=8.2.0,<9.0
  - pathspec
source:
  sha256: 72f7405c55447a072e5a8356bff0f712d8a37bbdddb79d0ed843ce9453a75d08
  url: https://pypi.org/packages/source/s/snakefmt/snakefmt-1.1.0.tar.gz
test:
  commands:
  - snakefmt --help
  imports:
  - snakefmt
