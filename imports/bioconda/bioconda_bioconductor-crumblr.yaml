about:
  description: Crumblr enables analysis of count ratio data using precision weighted
    linear (mixed) models.  It uses an asymptotic normal approximation of the variance
    following the centered log ration transform (CLR) that is widely used in compositional
    data analysis.  Crumblr provides a fast, flexible alternative to GLMs and GLMM's
    while retaining high power and controlling the false positive rate.
  home: https://bioconductor.org/packages/3.22/bioc/html/crumblr.html
  license: Artistic-2.0
  summary: Count ratio uncertainty modeling base linear regression
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
