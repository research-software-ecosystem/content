about:
  description: Quantification and differential analysis of mass-spectrometry proteomics
    data, with probabilistic recovery of information from missing values. Avoids the
    need for imputation. Estimates the detection probability curve (DPC), which relates
    the probability of successful detection to the underlying log-intensity of each
    precursor ion, and uses it to incorporate missing values into protein quantification
    and into subsequent differential expression analyses. The package produces objects
    suitable for downstream analysis in limma. The package accepts precursor (or peptide)
    intensities including missing values and produces complete protein quantifications
    without the need for imputation. The uncertainty of the protein quantifications
    is propagated through to the limma analyses using variance modeling and precision
    weights, ensuring accurate error rate control. The analysis pipeline can alternatively
    work with PTM or protein level data. The package name "limpa" is an acronym for
    "Linear Models for Proteomics Data".
  home: https://bioconductor.org/packages/3.22/bioc/html/limpa.html
  license: GPL (>=2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Quantification and Differential Analysis of Proteomics Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-limpa
  version: 1.2.5
