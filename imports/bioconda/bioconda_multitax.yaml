about:
  description: "MultiTax is a Python package that provides a standardised set \nof\
    \ functions for downloading, parsing, filtering, exploring, \ntranslating, converting\
    \ and writing multiple taxonomies, \nincluding GTDB, NCBI, Silva, Greengenes and\
    \ Open Tree Taxonomy, \nas well as custom-formatted taxonomies.\n"
  dev_url: https://github.com/pirovc/multitax
  home: https://github.com/pirovc/multitax
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A Python package for obtaining, parsing and exploring biological taxonomies.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.5.2
extra:
  recipe-maintainers:
  - pirovc
package:
  name: multitax
  version: 1.5.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  - setuptools_scm
  run:
  - python >=3.10
  - pylca
source:
  sha256: 92bb3dbd58a6932dd6c961a903a929230c3075a44a232d5a461857ffad8f9904
  url: https://github.com/pirovc/multitax/archive/v1.5.2.tar.gz
test:
  imports:
  - multitax
