about:
  description: 'TRACE provides robust quantification of CRISPR editing outcomes

    including HDR, NHEJ, and large deletions using a triple-aligner

    consensus approach (BWA-MEM, BBMap, minimap2).

    '
  dev_url: https://github.com/k-roy/TRACE
  doc_url: https://github.com/k-roy/TRACE
  home: https://github.com/k-roy/TRACE
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'TRACE: Triple-aligner Read Analysis for CRISPR Editing'
build:
  entry_points: null
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - k-roy
package:
  name: trace-crispr
  version: 0.4.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools >=61.0
  run:
  - python >=3.9
  - click >=8.0
  - pysam >=0.20
  - pandas >=1.5
  - numpy >=1.20
  - pyyaml >=6.0
  - rapidfuzz >=3.0
  - tqdm >=4.60
  - bwa >=0.7
  - bbmap >=39
  - minimap2 >=2.24
  - samtools >=1.16
source:
  sha256: 5ca1a53495f54eee50e05691020d344aaca6be40901f731a21f916c1f6329b8f
  url: https://pypi.io/packages/source/t/trace-crispr/trace_crispr-0.4.0.tar.gz
test:
  commands:
  - trace --help
  - trace --version
  imports:
  - trace_crispr
  - trace_crispr.core
  - trace_crispr.preprocessing
  - trace_crispr.utils
  - trace_crispr.multi_template
