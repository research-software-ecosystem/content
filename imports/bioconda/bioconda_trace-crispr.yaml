about:
  description: 'TRACE provides robust quantification of CRISPR editing outcomes

    including HDR, NHEJ, and large deletions using a triple-aligner

    consensus approach (BWA-MEM, BBMap, minimap2).

    '
  dev_url: https://github.com/k-roy/TRACE
  doc_url: https://trace-crispr.readthedocs.io
  home: https://github.com/k-roy/TRACE
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'TRACE: Triple-aligner Read Analysis for CRISPR Editing'
build:
  entry_points:
  - trace = trace_crispr.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - k-roy
package:
  name: trace-crispr
  version: 0.6.3
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools >=61.0
  run:
  - python >=3.9
  - click >=8.0
  - pysam >=0.20
  - pandas >=1.5
  - numpy >=1.20
  - pyyaml >=6.0
  - rapidfuzz >=3.0
  - tqdm >=4.60
  - bwa >=0.7
  - bbmap >=39
  - minimap2 >=2.24
  - samtools >=1.16
source:
  sha256: 4fe5d7a32243a1c60a59e18424fe19640beba3e34739b4fae10354c6ad9139a7
  url: https://pypi.org/packages/source/t/trace-crispr/trace_crispr-0.6.3.tar.gz
test:
  commands:
  - trace --help
  - trace --version
  imports:
  - trace_crispr
  - trace_crispr.core
  - trace_crispr.preprocessing
  - trace_crispr.utils
