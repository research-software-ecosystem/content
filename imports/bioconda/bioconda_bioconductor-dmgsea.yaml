about:
  description: The R package dmGsea provides efficient gene set enrichment analysis
    specifically for DNA methylation data. It addresses key biases, including probe
    dependency and varying probe numbers per gene. The package supports Illumina 450K,
    EPIC, and mouse methylation arrays. Users can also apply it to other omics data
    by supplying custom probe-to-gene mapping annotations. dmGsea is flexible, fast,
    and well-suited for large-scale epigenomic studies.
  home: https://bioconductor.org/packages/3.22/bioc/html/dmGsea.html
  license: Artistic-2.0
  summary: Efficient Gene Set Enrichment Analysis for DNA Methylation Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dmgsea
  version: 1.0.2
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-biasedurn
  - r-dqrng
  - r-matrix
  - r-poolr
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-biasedurn
  - r-dqrng
  - r-matrix
  - r-poolr
source:
  md5: 56361694fe205a5c19df265d3a7bee5f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/dmGsea_1.0.2.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/dmGsea/dmGsea_1.0.2.tar.gz
