about:
  description: 'EcoliTyper is a comprehensive bioinformatics pipeline for complete
    Escherichia coli

    genomic characterization. It integrates multiple typing schemes including MLST,

    serotyping (O and H antigens), CH typing (FumC and FimH), ezClermont phylogrouping,

    antibiotic resistance detection (AMRfinderPlus), and virulence/plasmid screening
    (ABRicate).

    '
  dev_url: https://github.com/bbeckley-hub/EcoliTyper
  doc_url: https://github.com/bbeckley-hub/EcoliTyper
  home: https://github.com/bbeckley-hub/EcoliTyper
  license: MIT
  license_file: LICENSE
  summary: 'Comprehensive E. coli Typing Pipeline: MLST, Serotyping, CH Typing, Phylogrouping,
    AMR, and Virulence Analysis'
build:
  noarch: python
  number: 1
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation -vvv'
extra:
  recipe-maintainers:
  - bbeckley-hub
package:
  name: ecolityper
  version: 1.2.0
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - pandas >=1.5.0
  - biopython >=1.80
  - psutil >=5.9.0
  - requests >=2.28.0
  - tqdm >=4.64.0
  - click >=8.0.0
  - tabulate >=0.9.0
  - beautifulsoup4 >=4.11.0
  - lxml >=4.9.0
  - matplotlib-base >=3.5.0
  - seaborn >=0.12.0
  - scipy >=1.10.1
  - plotly >=5.10.0
  - abricate >=1.2.0
  - fastani >=1.34
  - ezclermont >=0.7.0
  - perl
  - any2fasta
  - cgecore >=1.5.6
  - blast >=2.13.0
  - perl-moo
  - perl-list-moreutils
  - perl-json
  - perl-lwp-protocol-https
  - perl-path-tiny
  - perl-data-dumper
  - perl-getopt-long
  - perl-file-which
source:
  sha256: 640433885d9dc4de3784dcf8afd0187406ddbba0f07e47b69fab8b8a8327dd0d
  url: https://github.com/bbeckley-hub/EcoliTyper/archive/v1.2.0.tar.gz
test:
  commands:
  - ecolityper --help
