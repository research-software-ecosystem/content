about:
  description: A data package of SELDI-TOF protein mass spectrometry data of 167 breast
    cancer and normal samples.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/ProData.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: SELDI-TOF data of Breast cancer samples
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-prodata
  version: 1.48.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 7030852c04a01b826458608bafe79855
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/ProData_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ProData/ProData_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/ProData_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-prodata/bioconductor-prodata_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ProData')"
