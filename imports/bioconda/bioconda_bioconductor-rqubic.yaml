about:
  description: This package implements the QUBIC algorithm introduced by Li et al.
    for the qualitative biclustering with gene expression data.
  home: https://bioconductor.org/packages/3.22/bioc/html/rqubic.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Qualitative biclustering algorithm for expression data analysis in R
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rqubic
  version: 1.56.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-biclust
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-biclust
source:
  md5: c40990a99b9d8d9afbfed9bc912c92aa
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rqubic_1.56.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rqubic/rqubic_1.56.0.tar.gz
  - https://bioarchive.galaxyproject.org/rqubic_1.56.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rqubic/bioconductor-rqubic_1.56.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rqubic')"
