about:
  description: Contains a collection of trans-omics datasets generated using various
    sequencing technologies such as RNA-seq, Mass spectrometry and ChIP-seq. Modalities
    include the bulk profiling of the phosphoproteome, proteome, transcriptome and
    epigenome. Data reflects the timecourses of different developmental systems from
    the mouse or human.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/TransOmicsData.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: A collection of trans-omics datasets across various biological systems
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-transomicsdata
  version: 1.6.0
requirements:
  host:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: d2a174c02da66d1e5c56f7ecea575343
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/TransOmicsData_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TransOmicsData/TransOmicsData_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/TransOmicsData_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-transomicsdata/bioconductor-transomicsdata_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TransOmicsData')"
