  - pandas
  - pymc >=3
  - arviz <1.0
  - python >=3.10
  - requests
  - scipy >=1.10.0
source:
  sha256: 1bb55e881e7114742f1ad81f675fa969057987b60e802e99ae013a23bf7b045e
