about:
  description: systemPipeRdata complements the systemPipeR workflow management system
    (WMS) by offering a collection of pre-designed data analysis workflow templates.
    These templates are easily accessible and can be readily loaded onto a user's
    system with a single command. Once loaded, the WMS can immediately utilize these
    templates for efficient end-to-end analysis, serving a wide range of data analysis
    needs.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/systemPipeRdata.html
  license: Artistic-2.0
  summary: 'systemPipeRdata: Workflow templates and sample data'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-systempiperdata
  version: 2.14.6
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-jsonlite
  - r-remotes
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - r-base
  - r-jsonlite
  - r-remotes
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: ab75ff05fbd7eed1d44e63dca3ce2d6f
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/systemPipeRdata_2.14.6.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/systemPipeRdata/systemPipeRdata_2.14.6.tar.gz
  - https://bioarchive.galaxyproject.org/systemPipeRdata_2.14.6.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-systempiperdata/bioconductor-systempiperdata_2.14.6_src_all.tar.gz
test:
  commands:
  - $R -e "library('systemPipeRdata')"
