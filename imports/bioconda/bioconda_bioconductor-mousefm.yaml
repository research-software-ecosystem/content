about:
  description: This package provides methods for genetic finemapping in inbred mice
    by taking advantage of their very high homozygosity rate (>95%).
  home: https://bioconductor.org/packages/3.22/bioc/html/MouseFM.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: In-silico methods for genetic finemapping in inbred mice
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mousefm
  version: 1.20.0
requirements:
  host:
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-curl
  - r-data.table
  - r-dplyr
  - r-ggplot2
  - r-gtools
  - r-httr
  - r-jsonlite
  - r-reshape2
  - r-rlist
  - r-scales
  - r-tidyr
  run:
  - bioconductor-biomart >=2.66.0,<2.67.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-curl
  - r-data.table
  - r-dplyr
