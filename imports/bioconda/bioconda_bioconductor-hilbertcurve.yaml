about:
  description: Hilbert curve is a type of space-filling curves that fold one dimensional
    axis into a two dimensional space, but with still preserves the locality. This
    package aims to provide an easy and flexible way to visualize data through Hilbert
    curve.
  home: https://bioconductor.org/packages/3.22/bioc/html/HilbertCurve.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Making 2D Hilbert Curve
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hilbertcurve
  version: 2.4.2
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-base
  - r-circlize >=0.3.3
  - r-png
  - r-polylabelr
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-base
  - r-circlize >=0.3.3
  - r-png
  - r-polylabelr
  - r-rcpp
source:
  md5: 2aa20068aa44633972e3c92aa34525f7
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/HilbertCurve_2.4.2.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HilbertCurve/HilbertCurve_2.4.2.tar.gz
  - https://bioarchive.galaxyproject.org/HilbertCurve_2.4.2.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hilbertcurve/bioconductor-hilbertcurve_2.4.2_src_all.tar.gz
test:
  commands:
  - $R -e "library('HilbertCurve')"
