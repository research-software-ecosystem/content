about:
  description: Length of mRNA transcripts for a number of genomes and gene ID formats,
    largely based on UCSC table browser. Data objects are provided as individual pieces
    of information to be retrieved and loaded. A variety of different gene identifiers
    and genomes is supported to ensure wide applicability.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/geneLenDataBase.html
  license: LGPL (>= 2)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Lengths of mRNA transcripts for a number of genomes
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-genelendatabase
    path: recipes/bioconductor-genelendatabase
    version: 1.16.0
package:
  name: bioconductor-genelendatabase
  version: 1.46.0
requirements:
  host:
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-txdbmaker >=1.6.0,<1.7.0
  - r-base
  run:
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-txdbmaker >=1.6.0,<1.7.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 431c09197f66285a04401f72afd634d4
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/geneLenDataBase_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/geneLenDataBase/geneLenDataBase_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/geneLenDataBase_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-genelendatabase/bioconductor-genelendatabase_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('geneLenDataBase')"
