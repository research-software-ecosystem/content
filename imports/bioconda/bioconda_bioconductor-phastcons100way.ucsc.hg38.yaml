about:
  description: Store UCSC phastCons conservation scores for the human genome (hg38)
    calculated from multiple alignments with other 99 vertebrate species.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/phastCons100way.UCSC.hg38.html
  license: Artistic-2.0
  summary: UCSC phastCons conservation scores for hg38
build:
  noarch: generic
  number: 14
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-phastcons100way.ucsc.hg38
  version: 3.7.1
requirements:
  host:
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-genomicscores >=2.22.0,<2.23.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-genomicscores >=2.22.0,<2.23.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 878c757f9270b3410d11e4e4a4213c8e
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/phastCons100way.UCSC.hg38_3.7.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/phastCons100way.UCSC.hg38/phastCons100way.UCSC.hg38_3.7.1.tar.gz
  - https://bioarchive.galaxyproject.org/phastCons100way.UCSC.hg38_3.7.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-phastcons100way.ucsc.hg38/bioconductor-phastcons100way.ucsc.hg38_3.7.1_src_all.tar.gz
