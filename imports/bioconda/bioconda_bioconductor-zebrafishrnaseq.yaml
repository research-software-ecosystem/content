about:
  description: Gene-level read counts from RNA-Seq for gallein-treated and control
    zebrafish.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/zebrafishRNASeq.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: Zebrafish RNA-Seq Experimental Data from Ferreira et al. (2014)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-zebrafishrnaseq
  version: 1.30.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 3634f28e1c205d355a4f581e5af0c2e1
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/zebrafishRNASeq_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/zebrafishRNASeq/zebrafishRNASeq_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/zebrafishRNASeq_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-zebrafishrnaseq/bioconductor-zebrafishrnaseq_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('zebrafishRNASeq')"
