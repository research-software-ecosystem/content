about:
  description: Provides a collection of Hi-C files (pairs, (m)cool and fastq). These
    datasets can be read into R and further investigated and visualized with the HiContacts
    package. Data includes yeast Hi-C data generated by the Koszul lab from the Pasteur
    Institute.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/HiContactsData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: HiContacts companion data package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hicontactsdata
  version: 1.12.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: f417181429ad6ddd2014b5c8bcb34d61
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HiContactsData_1.12.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HiContactsData/HiContactsData_1.12.0.tar.gz
  - https://bioarchive.galaxyproject.org/HiContactsData_1.12.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hicontactsdata/bioconductor-hicontactsdata_1.12.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HiContactsData')"
