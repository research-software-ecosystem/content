about:
  dev_url: https://github.com/ialbert/bio
  home: https://github.com/ialbert/bio
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Command-line utilities to make bioinformatics explorations more enjoyable.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
package:
  name: bio
  version: 1.8.3
requirements:
  host:
  - python >=3.10,<3.15
  - hatchling
  - pip
  run:
  - python >=3.10,<3.15
  - biopython >=1.80
  - requests
  - tqdm
  - mygene
  - pandas
  - pooch
  - gprofiler-official
source:
  sha256: 5c01920d842fdc7a15212c1af50296db30fa76a3bd3597f8c65724b294557937
  url: https://pypi.io/packages/source/b/bio/bio-1.8.3.tar.gz
test:
  commands:
  - pip check
  - bio 2>&1 | grep '^bio'
  imports:
  - biorun
