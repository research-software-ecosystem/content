  - poetry-core >=1.0.0
  run:
  - apptainer >=1.3
  - python =3.11
  - snakemake >=8.0.0
source:
- sha256: b6843f03ad56bd628965cb5ab91958c8c5b2a2092f248c23196bf01d6940753a
  url: https://github.com/dirkjanvw/MoGAAAP/archive/refs/tags/v1.2.0.tar.gz
test:
  commands:
  - MoGAAAP --version
  - MoGAAAP --help
