  - apptainer >=1.3
  - python =3.11
  - snakemake >=8.0.0
source:
- sha256: 35e225d49be261b8a8a37e8e5834c17d626337e3fa799efe55b880247a046a63
  url: https://github.com/dirkjanvw/MoGAAAP/archive/refs/tags/v1.2.1.tar.gz
test:
  commands:
  - MoGAAAP --version
  - MoGAAAP --help
