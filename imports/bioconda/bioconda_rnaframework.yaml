about:
  description: "RNA Framework is a modular toolkit designed to handle RNA structure\
    \ probing\nand post-transcriptional modifications mapping from high-throughput\
    \ sequencing\ndata. It supports transcriptome-scale analysis of RNA secondary\
    \ structure using\nprotocols such as CIRS-seq, SHAPE-seq, Structure-seq, DMS-seq,\
    \ PARS,\nSHAPE-MaP, and DMS-MaPseq, as well as mapping of post-transcriptional\n\
    modifications (\u03A8, m1A, m6A, m5C, hm5C, 2'-OMe).\n\nKey features:\n  - Automatic\
    \ reference transcriptome creation (rf-index)\n  - Read preprocessing, adapter\
    \ trimming, and mapping (rf-map)\n  - Per-base RT-stop/mutation counting and coverage\
    \ (rf-count)\n  - Reactivity scoring and whole-transcriptome normalization (rf-norm)\n\
    \  - RNA secondary structure prediction with probing data (rf-fold)\n  - RNA-RNA\
    \ interaction mapping (rf-duplex)\n  - Post-transcriptional modification calling\
    \ (rf-modcall)\n  - Peak calling for RNA immunoprecipitation data (rf-peakcall)\n"
  dev_url: https://github.com/dincarnato/RNAFramework
  doc_url: https://rnaframework-docs.readthedocs.io/
  home: https://github.com/dincarnato/RNAFramework
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Toolkit for the analysis of RNA structures and post-transcriptional modifications
    from HTS data
build:
  noarch: generic
  number: 1
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1093/nar/gky486
  recipe-maintainers:
  - dincarnato
  - pmb59
  - vicbeg
package:
  name: rnaframework
  version: 2.9.6
requirements:
  host:
  - perl
  run:
  - perl >=5.12
  - perl-termreadkey
  - bowtie >=1.2.3
  - bowtie2 >=2.3.5
  - samtools >=1.15
  - bedtools >=2.31
  - cutadapt >=2.1
  - viennarna >=2.5.0
  - rnastructure >=6.4
  - r-base >=4.4,<4.6
  - r-ggplot2 >=3.5.2
  - r-patchwork >=1.3.2
  - r-rcolorbrewer >=1.1_3
source:
  sha256: 81f89568fe34ae50cd9986afcda590bb2ca02e19d031d683c265dc8cbd7a86a1
  url: https://github.com/dincarnato/RNAFramework/archive/refs/tags/2.9.6.tar.gz
test:
  commands:
  - grep -Fq "use lib \"${PREFIX}/share/rnaframework/lib\";" ${PREFIX}/share/rnaframework/rf-count
  - PERL5LIB= rf-map -h 2>&1 | grep -qi "usage\|rf-map\|options"
  - PERL5LIB= rf-count -h 2>&1 | grep -qi "usage\|rf-count\|options"
  - PERL5LIB= rf-norm -h 2>&1 | grep -qi "usage\|rf-norm\|options"
  - PERL5LIB= rf-fold -h 2>&1 | grep -qi "usage\|rf-fold\|options"
  - PERL5LIB= rf-index -h 2>&1 | grep -qi "usage\|rf-index\|options"
  - PERL5LIB= rf-rctools -h 2>&1 | grep -qi "usage\|rf-rctools\|options"
