about:
  description: Sample data for PREDA package. (annotations objects synchronized with
    GeneAnnot custom CDFs version 2.2.0)
  home: https://bioconductor.org/packages/3.22/data/experiment/html/PREDAsampledata.html
  license: Artistic-2.0
  summary: expression and copy number data on clear cell renal carcinoma samples
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-predasampledata
  version: 0.50.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-preda >=1.56.0,<1.57.0
  - r-base
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-annotate >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-preda >=1.56.0,<1.57.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 81c417df8c29461badd1e35896e9873b
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/PREDAsampledata_0.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/PREDAsampledata/PREDAsampledata_0.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/PREDAsampledata_0.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-predasampledata/bioconductor-predasampledata_0.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('PREDAsampledata')"
