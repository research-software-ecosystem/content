about:
  description: anglemania extracts genes from multi-batch scRNA-seq experiments for
    downstream dataset integration. It shows improvement over the conventional usage
    of highly-variable genes for many integration tasks. We leverage gene-gene correlations
    that are stable across batches to identify biologically informative genes which
    are less affected by batch effects. Currently, its main use is for single-cell
    RNA-seq dataset integration, but it can be applied for other multi-batch downstream
    analyses such as NMF.
  home: https://bioconductor.org/packages/3.22/bioc/html/anglemania.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Feature Extraction for scRNA-seq Dataset Integration
