about:
  dev_url: https://github.com/mdshw5/pyfaidx
  doc_url: https://pypi.org/project/pyfaidx
  home: https://github.com/mdshw5/pyfaidx
  license: BSD
  license_family: BSD
  license_file: LICENSE
  summary: 'pyfaidx: efficient pythonic random access to fasta subsequences'
build:
  entry_points:
  - faidx = pyfaidx.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=0.9.0.4
extra:
  identifiers:
  - biotools:pyfaidx
  - doi:10.7287/peerj.preprints.970v1
package:
  name: pyfaidx
  version: 0.9.0.4
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools-scm
  run:
  - python >=3.7
  - six
  - setuptools
  - packaging
  - pyvcf3
  - biopython
  - importlib-metadata
source:
  sha256: 801bdd208b12bff6f4fb2da10a16834158dbb1c6f146e4015c9ff45e509acd65
  url: https://files.pythonhosted.org/packages/19/af/da148aaa8e75c9890a41dbe5516f8006def2b74831e66acf79f81bb7bb5b/pyfaidx-0.9.0.4.tar.gz
test:
  commands:
  - faidx --help
  imports:
  - pyfaidx
