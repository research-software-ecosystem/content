about:
  description: This package provides a enhanced visualization of single-cell data
    based on gene-weighted density estimation. Nebulosa recovers the signal from dropped-out
    features and allows the inspection of the joint expression from multiple features
    (e.g. genes). Seurat and SingleCellExperiment objects can be used within Nebulosa.
  home: https://bioconductor.org/packages/3.22/bioc/html/Nebulosa.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Single-Cell Data Visualisation Using Kernel Gene-Weighted Density Estimation
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-nebulosa
  version: 1.20.0
requirements:
  host:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-ggrastr
  - r-ks
  - r-matrix
  - r-patchwork
  - r-seuratobject
  run:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-ggrastr
  - r-ks
  - r-matrix
  - r-patchwork
  - r-seuratobject
source:
  md5: 21dfb39952381d96504ee13d3517ce1e
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Nebulosa_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Nebulosa/Nebulosa_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/Nebulosa_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-nebulosa/bioconductor-nebulosa_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Nebulosa')"
