about:
  doc_url: https://rnavigate.readthedocs.io/en/latest/
  home: https://github.com/Weeks-UNC/RNAvigate
  license: MIT
  license_file: LICENSE
  summary: RNA visualization and graphical analysis toolset
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - Psirving
package:
  name: rnavigate
  version: 1.1.2
requirements:
  host:
  - python >=3.9
  - setuptools >=61
  - wheel
  - pip
  run:
  - python >=3.9
  - biopython >=1.78
  - ipython >=8.18.1
  - jedi >=0.19.2
  - matplotlib-base >=3.8
  - numpy >=1.20.1
  - openpyxl >=3.1.2
  - pandas >=1.4.4
  - py3dmol >=2.0.0
  - requests
  - scikit-learn >=1.0.2
  - scipy >=1.6.2
  - seaborn >=0.13.0
  - statsmodels >=0.14.1
source:
  sha256: 7ab655a94d010eeb7a87014fc40d44fb206f108d49b96d36ac81aac23a50d47d
  url: https://pypi.org/packages/source/R/RNAvigate/rnavigate-1.1.2.tar.gz
test:
  commands:
  - pip check
  imports:
  - rnavigate
  requires:
  - pip
  - python
