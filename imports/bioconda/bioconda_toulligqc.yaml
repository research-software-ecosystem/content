about:
  dev_url: https://github.com/GenomicParisCentre/toulligQC
  doc_url: https://github.com/GenomiqueENS/toulligQC/blob/v2.8.4/README.md
  home: https://github.com/GenomicParisCentre/toulligQC
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.txt
  summary: A post sequencing QC tool for Oxford Nanopore sequencers.
build:
  entry_points:
  - toulligqc=toulligqc.toulligqc:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  identifiers:
  - biotools:ToulligQC
package:
  name: toulligqc
  version: 2.8.4
requirements:
  host:
  - python >=3.11
  - pip
  - setuptools
  - wheel
  - hatchling
  run:
  - h5py >=3.10.0
  - matplotlib-base >=3.6.3
  - numpy >=1.26.4
  - scipy >=1.11.4
  - pandas >=2.1.4
  - plotly >=5.15.0,<6.0.0
  - pysam >=0.22.0
  - python >=3.11
  - scikit-learn >=1.4.1
  - tqdm >=4.66.2
  - pod5 >=0.3.15
source:
  sha256: e33f1a8414c334546b5845b817b962ddd4afef3d8a9afd798b5a8c9b481aabec
  url: https://pypi.io/packages/source/t/toulligqc/toulligqc-2.8.4.tar.gz
test:
  commands:
  - toulligqc --help
  imports:
  - toulligqc
