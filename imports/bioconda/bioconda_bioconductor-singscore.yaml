about:
  description: A simple single-sample gene signature scoring method that uses rank-based
    statistics to analyze the sample's gene expression profile. It scores the expression
    activities of gene sets at a single-sample level.
  home: https://bioconductor.org/packages/3.22/bioc/html/singscore.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Rank-based single-sample gene set scoring method
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-singscore
  version: 1.30.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-ggrepel
  - r-magrittr
  - r-matrixstats
  - r-plotly
  - r-plyr
  - r-rcolorbrewer
  - r-reshape
  - r-reshape2
  - r-tidyr
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
