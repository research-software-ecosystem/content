about:
  description: The MouseAgingData package provides analysis-ready data resources from
    different studies focused on aging and rejuvenation in mice. The package currently
    provides two 10x Genomics single-cell RNA-seq datasets. The first study profiled
    the aging mouse brain measured across 37,089 cells (Ximerakis et al., 2019). The
    second study investigated parabiosis by profiling a total of 105,329 cells (Ximerakis
    & Holton et al., 2023). The datasets are provided as SingleCellExperiment objects
    and provide raw UMI counts and cell metadata.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/MouseAgingData.html
  license: Artistic-2.0
  summary: Multi-omics data access for studies investigating the effects of aging
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mouseagingdata
  version: 1.6.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 1885170ed9055be0ba0a12ddfa4debab
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/MouseAgingData_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MouseAgingData/MouseAgingData_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/MouseAgingData_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mouseagingdata/bioconductor-mouseagingdata_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MouseAgingData')"
