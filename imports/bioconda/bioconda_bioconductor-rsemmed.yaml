about:
  description: A programmatic interface to the Semantic MEDLINE database. It provides
    functions for searching the database for concepts and finding paths between concepts.
    Path searching can also be tailored to user specifications, such as placing restrictions
    on concept types and the type of link between concepts. It also provides functions
    for summarizing and visualizing those paths.
  home: https://bioconductor.org/packages/3.22/bioc/html/rsemmed.html
  license: Artistic-2.0
  summary: An interface to the Semantic MEDLINE database
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rsemmed
  version: 1.20.0
requirements:
  host:
  - r-base
  - r-dplyr
  - r-igraph
  - r-magrittr
  - r-stringr
  run:
  - r-base
  - r-dplyr
  - r-igraph
  - r-magrittr
  - r-stringr
source:
  md5: 755968e81ab825f8deb8af8d098f48f8
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rsemmed_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rsemmed/rsemmed_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/rsemmed_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rsemmed/bioconductor-rsemmed_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rsemmed')"
