about:
  description: Base annotation databases for arabidopsis, intended ONLY to be used
    by AnnotationDbi to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/arabidopsis.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for arabidopsis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-arabidopsis.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: fb8a61618b96702951337aeb40294e36
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/arabidopsis.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/arabidopsis.db0/arabidopsis.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/arabidopsis.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-arabidopsis.db0/bioconductor-arabidopsis.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('arabidopsis.db0')"
