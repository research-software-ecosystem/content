about:
  description: This is a collection of 18 data sets for which the phenotype is a disease
    with a corresponding pathway in either KEGG or metacore database.This collection
    of datasets were used as gold standard in comparing gene set analysis methods.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/KEGGandMetacoreDzPathwaysGEO.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Disease Datasets from GEO
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-keggandmetacoredzpathwaysgeo
  version: 1.30.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 8869e7773c26a4e3f6bbd61790e321fb
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/KEGGandMetacoreDzPathwaysGEO_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/KEGGandMetacoreDzPathwaysGEO/KEGGandMetacoreDzPathwaysGEO_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/KEGGandMetacoreDzPathwaysGEO_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-keggandmetacoredzpathwaysgeo/bioconductor-keggandmetacoredzpathwaysgeo_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('KEGGandMetacoreDzPathwaysGEO')"
