about:
  dev_url: https://github.com/JLSteenwyk/orthofisher
  doc_url: https://jlsteenwyk.com/orthofisher
  home: https://github.com/JLSteenwyk/orthofisher
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: Orthofisher is a broadly applicable tool for automated gene identification
    and retrieval.
build:
  entry_points:
  - orthofisher = orthofisher.orthofisher:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  identifiers:
  - doi:10.1093/g3journal/jkab250
package:
  name: orthofisher
  version: 1.1.2
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - biopython >=1.81
  - numpy >=1.24.0
  - tqdm >=4.66.1
source:
  sha256: 6ab53c09cc8b60aabe7102290a22cca4f0fd5d9e7c49cd301f5ee3bb2566edf3
  url: https://pypi.org/packages/source/o/orthofisher/orthofisher-1.1.2.tar.gz
test:
  commands:
  - orthofisher --help
  imports:
  - orthofisher
