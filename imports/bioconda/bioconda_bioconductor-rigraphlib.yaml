about:
  description: Vendors the igraph C source code and builds it into a static library.
    Other Bioconductor packages can link to libigraph.a in their own C/C++ code. This
    is intended for packages wrapping C/C++ libraries that depend on the igraph C
    library and cannot be easily adapted to use the igraph R package.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rigraphlib.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: igraph library as an R package
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rigraphlib
  version: 1.2.0
requirements:
  build:
  - null
  - null
  - automake
  - make
  host:
  - bioconductor-biocmake >=1.2.0,<1.3.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocmake >=1.2.0,<1.3.0
  - r-base
source:
  md5: 53666ae46245494b96c36bdc8dd95daa
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rigraphlib_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rigraphlib/Rigraphlib_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/Rigraphlib_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rigraphlib/bioconductor-rigraphlib_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Rigraphlib')"
