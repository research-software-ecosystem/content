about:
  description: References made from external single-cell mRNA sequencing data sets,
    stored as average gene expression matrices. For use with clustifyr <https://bioconductor.org/packages/clustifyr>
    to assign cell type identities.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/clustifyrdatahub.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: External data sets for clustifyr in ExperimentHub
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-clustifyrdatahub
  version: 1.20.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 601e70df7ea28b4be3a7a1a16c5302dd
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/clustifyrdatahub_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/clustifyrdatahub/clustifyrdatahub_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/clustifyrdatahub_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-clustifyrdatahub/bioconductor-clustifyrdatahub_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('clustifyrdatahub')"
