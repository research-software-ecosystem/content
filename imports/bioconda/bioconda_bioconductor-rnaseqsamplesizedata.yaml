about:
  description: RnaSeqSampleSizeData package provides the read counts and dispersion
    distribution from real RNA-seq experiments. It can be used by RnaSeqSampleSize
    package to estimate sample size and power for RNA-seq experiment design.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/RnaSeqSampleSizeData.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: RnaSeqSampleSizeData
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-rnaseqsamplesizedata
    path: recipes/bioconductor-rnaseqsamplesizedata
    version: 1.12.0
package:
  name: bioconductor-rnaseqsamplesizedata
  version: 1.42.0
requirements:
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 09605564c021bb6c4aafb8e8b1e1d632
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/RnaSeqSampleSizeData_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RnaSeqSampleSizeData/RnaSeqSampleSizeData_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/RnaSeqSampleSizeData_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rnaseqsamplesizedata/bioconductor-rnaseqsamplesizedata_1.42.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RnaSeqSampleSizeData')"
