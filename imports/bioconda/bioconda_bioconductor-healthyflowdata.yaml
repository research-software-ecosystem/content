about:
  description: A healthy dataset with 20 flow cytometry samples used by the flowMatch
    package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/healthyFlowData.html
  license: Artistic-2.0
  summary: Healthy dataset used by the flowMatch package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-healthyflowdata
  version: 1.48.0
requirements:
  host:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  run:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: c6e85aba24442aef675e16ee2af66048
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/healthyFlowData_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/healthyFlowData/healthyFlowData_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/healthyFlowData_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-healthyflowdata/bioconductor-healthyflowdata_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('healthyFlowData')"
