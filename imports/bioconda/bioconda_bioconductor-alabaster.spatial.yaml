about:
  description: Save SpatialExperiment objects and their images into file artifacts,
    and load them back into memory. This is a more portable alternative to serialization
    of such objects into RDS files. Each artifact is associated with metadata for
    further interpretation; downstream applications can enrich this metadata with
    context-specific properties.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.spatial.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Save and Load Spatial 'Omics Data to/from File
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster.spatial
  version: 1.10.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.sce >=1.10.0,<1.11.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-base
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.sce >=1.10.0,<1.11.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-base
source:
  md5: 98985b5d38fe869188cc8447a5847591
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/alabaster.spatial_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/alabaster.spatial/alabaster.spatial_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/alabaster.spatial_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-alabaster.spatial/bioconductor-alabaster.spatial_1.10.0_src_all.tar.gz
test:
