about:
  dev_url: https://github.com/althonos/gb-io.py
  doc_url: https://gb-io.readthedocs.io/
  home: https://github.com/althonos/gb-io.py
  license: MIT
  license_family: MIT
  license_file:
  - COPYING
  - THIRDPARTY.yml
  summary: A Python interface to gb-io, a fast GenBank parser and serializer written
    in Rust.
build:
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . --no-deps --no-build-isolation --disable-pip-version-check
  - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: gb-io
  version: 0.4.0
requirements:
  build:
  - null
  - python
  - cross-python_
  - crossenv
  - maturin >=1.2,<2
  - cargo-bundle-licenses
  host:
  - python
  - pip
  - maturin >=1.2,<2
  run:
  - python
source:
  sha256: 29ecc93467964cd8dd5303756d282ed20f895938c8997aa45e97314c782bcfcd
  url: https://pypi.org/packages/source/g/gb-io/gb_io-0.4.0.tar.gz
test:
  imports:
  - gb_io
