about:
  home: https://github.com/telatin/cdhit-parser
  license: MIT
  license_file: LICENSE.md
  summary: Parse CD-HIT cluster files
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: python -m pip install --no-deps --ignore-installed .
extra:
  recipe-maintainers:
  - telatin
package:
  name: cdhit-reader
  version: 0.3.0
requirements:
  host:
  - python >=3.6
  - pip
  - setuptools
  run:
  - python >=3.6
  - cd-hit
  - click
  - xopen
  - more-itertools
source:
  sha256: 04972f1ce8f061f28d2e112e0f98d3d2ba8fd3d2673ee4715fe4f19e43e436be
  url: https://github.com/telatin/cdhit-parser/archive/v0.3.0.tar.gz
test:
  commands:
  - cdhit-parser --version | grep 0.3.0
