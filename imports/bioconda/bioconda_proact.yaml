about:
  description: "ProAct exploits the principle that a provirus in lysogeny shares the\
    \ same copy \nnumber as its host, resulting in a Provirus-to-Host coverage ratio\
    \ (PtoH) of 1, \nwhereas transition toward lysis drives self-replication and elevates\
    \ PtoH above 1.\n"
  dev_url: https://github.com/mujiezhang/ProAct
  doc_url: https://github.com/mujiezhang/ProAct#readme
  home: https://github.com/mujiezhang/ProAct
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Provirus Activity Detector - Assessing provirus activity based on host
    sequencing data
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --ignore-installed -vv'
extra:
  recipe-maintainers:
  - mujiezhang
package:
  name: proact
  version: '1.0'
requirements:
  host:
  - python >=3.6
  - pip
  - setuptools
  run:
  - python >=3.6
  - pandas
  - biopython
  - pysam
  - bwa
  - samtools
  - bbmap
  - hmmer
  - prodigal
source:
  sha256: 3e9f93914df2570f6e4a6d95d7fc089553c7194a92689b55b5c24bab264346ff
  url: https://github.com/mujiezhang/ProAct/archive/refs/tags/v1.0.tar.gz
test:
  commands:
  - proact -h
