about:
  home: https://github.com/rpetit3/fastq-dl
  license: MIT
  license_file: LICENSE
  summary: A tool to download FASTQs associated with Study, Experiment, or Run accessions.
build:
  entry_points:
  - fastq-dl = fastq_dl.cli.download:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - rpetit3
package:
  name: fastq-dl
  version: 4.0.1
requirements:
  host:
  - python >=3.10,<3.14
  - poetry
  - pip
  run:
  - python >=3.10,<3.14
  - pysradb >=2.3
  - requests
  - rich-click >=1.6.0
  - sracha
  - wget
source:
  sha256: 3aecad1fb8c18edbf005af60c4280b9cb5d16fe9dd9e5550ee180c27f6c9624b
  url: https://pypi.io/packages/source/f/fastq_dl/fastq_dl-4.0.1.tar.gz
test:
  commands:
  - fastq-dl --version
  - fastq-dl --help
  - fastq-dl --check
