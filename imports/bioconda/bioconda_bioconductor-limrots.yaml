about:
  description: Differential expression analysis is a prevalent method utilised in
    the examination of diverse biological data. The reproducibility-optimized test
    statistic (ROTS) modifies a t-statistic based on the data's intrinsic characteristics
    and ranks features according to their statistical significance for differential
    expression between two or more groups (f-statistic). Focussing on proteomics and
    metabolomics, the current ROTS implementation cannot account for technical or
    biological covariates such as MS batches or gender differences among the samples.
    Consequently, we developed LimROTS, which employs a reproducibility-optimized
    test statistic utilising the limma methodology to simulate complex experimental
    designs. LimROTS is a hybrid method integrating empirical bayes and reproducibility-optimized
    statistics for robust analysis of proteomics and metabolomics data.
  home: https://bioconductor.org/packages/3.22/bioc/html/LimROTS.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: 'LimROTS: A Hybrid Method Integrating Empirical Bayes and Reproducibility-Optimized
    Statistics for Robust Differential Expression Analysis'
