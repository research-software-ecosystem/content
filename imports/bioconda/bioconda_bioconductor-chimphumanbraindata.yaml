about:
  description: This data package contains chimp and human brain data extracted from
    the ArrayExpress accession E-AFMX-2.  Both human and chimp RNAs were run on human
    hgu95av2 Affymetrix arrays. It is a useful dataset for tutorials.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/ChimpHumanBrainData.html
  license: MIT
  summary: Chimp and human brain data package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-chimphumanbraindata
  version: 1.48.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - r-base
  - r-hexbin
  - r-statmod
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - r-base
  - r-hexbin
  - r-statmod
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 89b9e3257d71ebd66fb485929db386af
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/ChimpHumanBrainData_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ChimpHumanBrainData/ChimpHumanBrainData_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/ChimpHumanBrainData_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-chimphumanbraindata/bioconductor-chimphumanbraindata_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ChimpHumanBrainData')"
