about:
  description: 'EukDetect detects and quantifies eukaryotic microbes in shotgun metagenomic

    sequencing data using a curated database of conserved marker genes.

    '
  dev_url: https://github.com/allind/EukDetect
  doc_url: https://github.com/allind/EukDetect
  home: https://github.com/allind/EukDetect
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Detect eukaryotes from shotgun metagenomic sequencing data
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - allind
package:
  name: eukdetect
  version: 2.0.0
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools >=61.0
  run:
  - python >=3.8
  - biopython
  - pyyaml
  - snakemake-minimal >=8
  - bowtie2 >=2.5
  - samtools >=1.15
  - ete3
  - pysam
  - pandas
  - numpy
source:
  sha256: 4069d41d2e5bee94b4e4ec058f136bcc0cc4acc51102fb236203bc861c1393f1
  url: https://github.com/allind/EukDetect/archive/refs/tags/v2.0.0.tar.gz
test:
  commands:
  - eukdetect --help
  - eukdetect-normalize --help
  imports:
  - eukdetect
  - eukdetect.wrappers.main
  - eukdetect.util.build_config
  - eukdetect.util.validate
  - eukdetect.util.execute
  - eukdetect.util.complexity_filter
