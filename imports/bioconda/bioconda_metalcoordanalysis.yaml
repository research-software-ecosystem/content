about:
  description: 'The Metal Coordination Analysis Tool is a Python application designed
    for analyzing metal coordination in biological macromolecules such as proteins
    and nucleic acids.

    This tool provides a set of functionalities to process molecular structures, identify
    metal coordination sites, and generate insightful visualizations.

    '
  dev_url: https://github.com/Lekaveh/MetalCoordAnalysis
  doc_url: https://github.com/Lekaveh/MetalCoordAnalysis/blob/v0.2.14/README.md
  home: https://github.com/Lekaveh/MetalCoordAnalysis
  license: MPL-2.0
  license_family: MOZILLA
  license_file: LICENSE
  summary: Python application designed for analyzing metal coordination in biological
    macromolecules such as proteins and nucleic acids
build:
  entry_points:
  - metalCoord = metalCoord.run:main_func
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  identifiers:
  - doi:10.1107/S2059798324011458
  recipe-maintainers:
  - eunos-1128
package:
  name: metalcoordanalysis
  version: 0.2.14
requirements:
  host:
  - pip
  - python .*
  - poetry-core >=1.0.0
  - poetry-dynamic-versioning >=1.0.0,<2.0.0
  run:
  - gemmi >=0.7.3
  - networkx >=3.2.1,<4
  - numpy >=1.26.4
  - pandas >=2.0.0
  - python >=
  - scipy >=1.0.0
  - scikit-learn >=1.4.0,<2
  - tqdm >=4.0.0
source:
  sha256: 4d086e31e8d6db48092a9250cc8ec4f31f158839fd6b1cd5d7f1845db6894237
  url: https://github.com/Lekaveh/MetalCoordAnalysis/archive/refs/tags/v0.2.14.tar.gz
test:
  commands:
  - pip check
  - metalCoord --version
  - metalCoord --help
  - metalCoord coord
  - metalCoord coord -n 6
  - metalCoord coord -m ZN
  - metalCoord table
  imports:
  - metalCoord
  - metalCoord.analysis
  - metalCoord.service
  - metalCoord.cli
  requires:
  - pip
  - python .*
  source_files:
  - tests/data/*
