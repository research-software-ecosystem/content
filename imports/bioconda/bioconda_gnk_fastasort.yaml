about:
  description: 'This package uses can use either a SAMTOOLS FAIDX indexed genome or

    an API call to NCBI to retrieve a sequence report.

    This is then used to generate a preferred ordering of the genome as a TSV,

    which can then be used to re-order a pretextsnapshot or create a re-ordered

    fasta file using samtools faidx.

    '
  dev_url: https://github.com/sanger-tol/gnk_fastasort
  home: https://github.com/sanger-tol/gnk_fastasort
  license: MIT
  license_file: LICENSE
  summary: A package to generate a GenomeNote ordered TSV of a genome.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - DLBPointon
package:
  name: gnk_fastasort
  version: 0.1.2
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.12
source:
  sha256: c73fdd7add9cd8e4167e1befa3a59ba47d58f56a30b7fb734956737d549a688d
  url: https://pypi.io/packages/source/g/gnk_fastasort/gnk_fastasort-0.1.2.tar.gz
test:
  commands:
  - fastasort -h
  imports:
  - gnk_fastasort
