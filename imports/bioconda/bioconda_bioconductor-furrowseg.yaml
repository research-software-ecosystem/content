about:
  description: Image feature data and analysis codes for the Guglielmi, Barry et al.
    paper describing the application of an optogenetics tools to disrupt Drosophila
    embryo furrowing.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/furrowSeg.html
  license: Artistic-2.0
  summary: Furrow Segmentation
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-furrowseg
  version: 1.38.0
requirements:
  host:
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - r-abind
  - r-base
  - r-dplyr
  - r-locfit
  - r-tiff
  run:
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - r-abind
  - r-base
  - r-dplyr
  - r-locfit
  - r-tiff
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 14f2cb5a0ee05dcc2e2ef76877e6bb14
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/furrowSeg_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/furrowSeg/furrowSeg_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/furrowSeg_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-furrowseg/bioconductor-furrowseg_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('furrowSeg')"
