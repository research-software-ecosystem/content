about:
  dev_url: https://github.com/raw-lab/pygage
  doc_url: https://github.com/raw-lab/pygage/blob/v1.0.0/README.md
  home: https://github.com/raw-lab/pygage
  license: CC BY-NC 4.0
  license_family: OTHER
  license_file: LICENSE
  summary: Python version of the GAGE (Generally Applicable Gene Set Enrichment) analysis
    package.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - decrevi
  - raw-lab
package:
  name: pygage
  version: 1.0.0
requirements:
  host:
  - pip
  - python >=3.8
  - setuptools
  - wheel
  run:
  - python >=3.8
  - polars
  - numpy
  - scipy
  - seaborn
  - pyarrow
  - requests
source:
  sha256: 9e462fab431f781e2f2609dcb9eb05945923a813b6b95bc2ecb65dcb82a2d851
  url: https://github.com/raw-lab/pygage/archive/refs/tags/v1.0.0.tar.gz
test:
  commands:
  - pygage-core.py --help
  imports:
  - pygage
