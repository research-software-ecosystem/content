about:
  dev_url: https://github.com/jeffhussmann/knock-knock
  home: https://github.com/jeffhussmann/knock-knock
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: toolkit for analyzing CRISPR knock-in experiments
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - jeffhussmann
package:
  name: knock-knock
  version: 0.8.2
requirements:
  host:
  - pip
  - python >=3.12
  - setuptools
  run:
  - python >=3.12
  - bokeh >=2.4.2
  - anndata
  - biopython >=1.86
  - h5py >=3.1.0
  - ipywidgets >=7.1.2
  - matplotlib-base >=2.1.2
  - nbconvert >=6.0.7
  - nbformat >=4.4.0
  - numpy >=1.14.2
  - pandas >=0.22.0
  - pillow >=5.0.0
  - pysam >=0.14
  - pyyaml >=3.12
  - scipy >=1.16.2
  - pytables
  - hits >=0.5.1
  - tqdm >=4.31.1
  - viennarna >=2.6.4
  - blast >=2.7.1
  - minimap2 >=2.16
  - samtools >=1.9
  - star >=2.7.1
  - parallel >=20190522
source:
  sha256: bba7ac4b2979568a5a010c46380ca66f0c1a83e512f598cb6b0ccf3b057a9f50
  url: https://pypi.org/packages/source/k/knock-knock/knock_knock-0.8.2.tar.gz
test:
  commands:
  - knock-knock -h
  - blastn -version
  - minimap2 --version
  - samtools --version
  - STAR --version
  imports:
  - knock_knock
