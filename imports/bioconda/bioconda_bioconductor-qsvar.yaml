about:
  description: The qsvaR package contains functions for removing the effect of degration
    in rna-seq data from postmortem brain tissue. The package is equipped to help
    users generate principal components associated with degradation. The components
    can be used in differential expression analysis to remove the effects of degradation.
  home: https://bioconductor.org/packages/3.22/bioc/html/qsvaR.html
  license: Artistic-2.0
  summary: Generate Quality Surrogate Variable Analysis for Degradation Correction
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-qsvar
  version: 1.14.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-rlang
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-rlang
source:
  md5: 69269550070e832a2a68adc81fb81fb3
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/qsvaR_1.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/qsvaR/qsvaR_1.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/qsvaR_1.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-qsvar/bioconductor-qsvar_1.14.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('qsvaR')"
