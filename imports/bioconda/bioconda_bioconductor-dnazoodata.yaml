about:
  description: DNAZooData is a data package giving programmatic access to genome assemblies
    and Hi-C contact matrices uniformly processed by the [DNA Zoo Consortium](https://www.dnazoo.org/).
    The matrices are available in the multi-resolution `.hic` format. A URL to corrected
    genome assemblies in `.fastq` format is also provided to the end-user.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/DNAZooData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: DNA Zoo data package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dnazoodata
  version: 1.10.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-hicexperiment >=1.10.0,<1.11.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-rjson
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-hicexperiment >=1.10.0,<1.11.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-rjson
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 435237c95068e29feb06542f3046ed4f
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/DNAZooData_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DNAZooData/DNAZooData_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/DNAZooData_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dnazoodata/bioconductor-dnazoodata_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('DNAZooData')"
