about:
  description: Base annotation databases for malaria, intended ONLY to be used by
    AnnotationDbi to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/malaria.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for malaria
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-malaria.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 10ce66b84d2588bb7d7ecd0acdc7add4
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/malaria.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/malaria.db0/malaria.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/malaria.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-malaria.db0/bioconductor-malaria.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('malaria.db0')"
