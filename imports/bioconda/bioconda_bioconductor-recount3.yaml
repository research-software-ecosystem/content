about:
  description: The recount3 package enables access to a large amount of uniformly
    processed RNA-seq data from human and mouse. You can download RangedSummarizedExperiment
    objects at the gene, exon or exon-exon junctions level with sample metadata and
    QC statistics. In addition we provide access to sample coverage BigWig files.
  home: https://bioconductor.org/packages/3.22/bioc/html/recount3.html
  license: Artistic-2.0
  summary: Explore and download data from the recount3 project
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-recount3
  version: 1.20.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table
  - r-httr
  - r-matrix
  - r-r.utils
  - r-sessioninfo
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-data.table
  - r-httr
  - r-matrix
  - r-r.utils
  - r-sessioninfo
