about:
  description: 'SeqAn is an open source C++ library of efficient algorithms and data

    structures for the analysis of sequences with the focus on biological data.

    Our library applies a unique generic design that guarantees high

    performance, generality, extensibility, and integration with other

    libraries. SeqAn is easy to use and simplifies the development of new

    software tools with a minimal loss of performance.

    '
  dev_url: https://github.com/seqan/seqan
  doc_url: https://seqan.readthedocs.io/en/seqan-v2.5.2
  home: https://www.seqan.de
  license: BSD-3-Clause
  license_family: BSD
  license_file: share/doc/seqan/LICENSE
  summary: SeqAn is a C++ template library for the analysis of biological sequences.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: seqan
  version: 2.5.2
requirements:
  run_constrained:
  - cmake >=3.12
  - bzip2 *
  - zlib *
source:
  sha256: 03baf2f4927b0ce3253fe5187a06c6b52dfb8c1059bfd17ce7d860f3dc997217
  url: https://github.com/seqan/seqan/releases/download/seqan-v2.5.2/seqan-library-2.5.2.tar.xz
test:
