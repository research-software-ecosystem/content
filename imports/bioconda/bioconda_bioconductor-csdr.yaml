about:
  description: This package contains functionality to run differential gene co-expression
    across two different conditions. The algorithm is inspired by Voigt et al. 2017
    and finds Conserved, Specific and Differentiated genes (hence the name CSD). This
    package include efficient and variance calculation by bootstrapping and Welford's
    algorithm.
  home: https://bioconductor.org/packages/3.22/bioc/html/csdR.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Differential gene co-expression
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-csdr
  version: 1.16.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - r-base
  - r-glue
  - r-matrixstats
  - r-rcpp
  - r-rhpcblasctl
  - r-wgcna
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
  - r-glue
  - r-matrixstats
  - r-rcpp
  - r-rhpcblasctl
  - r-wgcna
source:
  md5: 0cd2f805999ccb630344919d2e13dbbc
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/csdR_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/csdR/csdR_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/csdR_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-csdr/bioconductor-csdr_1.16.0_src_all.tar.gz
