  - pyfaidx ==0.9.0
  - pyhmmer >=0.11.3
  - pyrodigal-gv >=0.3
source:
  sha256: feca484a58508eae8d438bf962f1f09f347c60ce8dbbfac7b0c35d482eb613ed
  url: https://github.com/abdealijivaji/ViralRecall_3.0/archive/refs/tags/v3.0.3.tar.gz
