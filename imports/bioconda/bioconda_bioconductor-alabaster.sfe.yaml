about:
  description: Builds upon the existing ArtifactDB project, expending alabaster.spatial
    for language agnostic on disk serialization of SpatialFeatureExperiment.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.sfe.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Language agnostic on disk serialization of SpatialFeatureExperiment
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster.sfe
  version: 1.2.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.sce >=1.10.0,<1.11.0
  - bioconductor-alabaster.spatial >=1.10.0,<1.11.0
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-rbioformats >=1.10.0,<1.11.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialfeatureexperiment >=1.12.0,<1.13.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-jsonlite
  - r-sfarrow
  - r-spatialreg
  - r-spdep
  - r-terra
  - r-xml2
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.sce >=1.10.0,<1.11.0
  - bioconductor-alabaster.spatial >=1.10.0,<1.11.0
  - bioconductor-ebimage >=4.52.0,<4.53.0
  - bioconductor-rbioformats >=1.10.0,<1.11.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialfeatureexperiment >=1.12.0,<1.13.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-jsonlite
  - r-sfarrow
  - r-spatialreg
  - r-spdep
  - r-terra
  - r-xml2
