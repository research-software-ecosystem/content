about:
  home: https://github.com/rpetit3/steamboat-py
  license: MIT
  license_file: LICENSE
  summary: A collection of tools/scripts for microbial bioinformatics
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --ignore-installed -vv .
extra:
  recipe-maintainers:
  - rpetit3
package:
  name: steamboat
  version: 1.2.0
requirements:
  host:
  - python >=3.9
  - pip
  - poetry-core
  run:
  - biopython
  - executor
  - pigz
  - python >=3.9
  - pyyaml
  - rich <14
  - rich-click >=1.6.0
source:
  sha256: aa0eff6e0e93332ebe338c57e765f33cc2dca8bd8ceea108e7a005d71743b3ff
  url: https://pypi.io/packages/source/s/steamboat-binf/steamboat_binf-1.2.0.tar.gz
test:
  commands:
  - pip check
  - gisaid-batch --help
  imports:
  - steamboat
  requires:
  - pip
