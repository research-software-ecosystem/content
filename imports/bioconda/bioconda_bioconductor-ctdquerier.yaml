about:
  description: Package to retrieve and visualize data from the Comparative Toxicogenomics
    Database (http://ctdbase.org/). The downloaded data is formated as DataFrames
    for further downstream analyses.
  home: https://bioconductor.org/packages/3.22/bioc/html/CTDquerier.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Package for CTDbase data query, visualization and downstream analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ctdquerier
  version: 2.18.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-ggplot2
  - r-gridextra
  - r-igraph
  - r-rcurl
  - r-stringdist
  - r-stringr
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-ggplot2
  - r-gridextra
  - r-igraph
  - r-rcurl
  - r-stringdist
  - r-stringr
source:
  md5: 4c9150bbf2449c3f5dc85e445bc636e9
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CTDquerier_2.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CTDquerier/CTDquerier_2.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/CTDquerier_2.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ctdquerier/bioconductor-ctdquerier_2.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CTDquerier')"
