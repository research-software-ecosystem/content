about:
  home: https://github.com/kircherlab/CADD_threshold_app
  license: MIT
  license_file: LICENSE
  summary: Shiny-for-Python app for exploring ClinVar distributions across CADD score
    thresholds.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - visze
  - coraleif
package:
  name: cadd-threshold-app
  version: 0.0.1
requirements:
  host:
  - python >=3.10
  - setuptools
  - wheel
  - pip
  run:
  - python >=3.10
  - pandas
  - requests
  - anywidget
  - click
  - numpy
  - plotly
  - shiny
  - shinywidgets
  - scikit-learn
source:
  sha256: 07c406d816dfe1fc94316b36b9425ee657c3f4b73de6c967e59f05383f20c72e
  url: https://pypi.org/packages/source/c/cadd_threshold_app/cadd_threshold_app-0.0.1.tar.gz
test:
  commands:
  - cadd-threshold-app --help
  imports:
  - cadd_threshold_app
  requires:
  - pip
