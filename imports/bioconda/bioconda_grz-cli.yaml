about:
  home: https://github.com/BfArM-MVH/grz-tools
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Tool for validation, encryption and upload of MV submissions to GDCs.
build:
  entry_points:
  - grz-cli = grz_cli.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - tedil
  - hoeze
package:
  name: grz-cli
  version: 1.7.0
requirements:
  host:
  - python >=3.12
  - hatchling
  - pip
  run:
  - python >=3.12
  - packaging >=23,<27
  - grz-common >=2.1,<3
source:
  sha256: 4a118e50ebd634c96d6e552e315d53af64183e417f7f65689081ea8864e779a0
  url: https://pypi.org/packages/source/g/grz-cli/grz_cli-1.7.0.tar.gz
test:
  commands:
  - pip check
  - grz-cli --help
  imports:
  - grz_cli
  requires:
  - pip
