about:
  home: https://github.com/BfArM-MVH/grz-tools
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Tool for validation, encryption and upload of MV submissions to GDCs.
build:
  entry_points:
  - grz-cli = grz_cli.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - tedil
  - hoeze
package:
  name: grz-cli
  version: 1.7.2
requirements:
  host:
  - python >=3.12
  - hatchling
  - pip
  run:
  - python >=3.12
  - packaging >=23,<27
  - grz-common >=2.1,<3
source:
  sha256: c719b902b79e7f25e2917349ee849a1f2db5290e7c042a1dc7998c89f0ea3fb5
  url: https://pypi.org/packages/source/g/grz-cli/grz_cli-1.7.2.tar.gz
test:
  commands:
  - pip check
  - grz-cli --help
  imports:
  - grz_cli
  requires:
  - pip
