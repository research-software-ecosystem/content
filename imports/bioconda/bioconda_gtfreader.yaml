about:
  home: https://pypi.org/project/gtfreader
  license: MIT
  summary: Fast Cython-backed parsing for GTF attribute columns.
build:
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: gtfreader
  version: 0.2.0
requirements:
  build:
  - null
  host:
  - python
  - setuptools >=69
  - cython >=3.0
  - pip
  run:
  - python
  - pandas >=2.0
source:
  sha256: 59c0dece31c8fcb2b398beb247fd6b6214d0a20bd6122987ed5fd67efb11b61d
  url: https://pypi.org/packages/source/g/gtfreader/gtfreader-0.2.0.tar.gz
test:
  imports:
  - gtfreader
