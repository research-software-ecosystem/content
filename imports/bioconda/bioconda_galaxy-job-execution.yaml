about:
  dev_url: https://github.com/galaxyproject/galaxy
  doc_url: https://docs.galaxyproject.org
  home: https://galaxyproject.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Galaxy job execution runtime utilities.
build:
  entry_points:
  - galaxy-set-metadata=galaxy.metadata.set_metadata:set_metadata
  - galaxy-container-monitor=galaxy.job_execution.container_monitor:main
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  identifiers:
  - biotools:galaxy
  - doi:10.1093/nar/gky379
  recipe-maintainers:
  - bernt-matthias
  - natefoo
  - nsoranzo
package:
  name: galaxy-job-execution
  version: 26.0.1
requirements:
  host:
  - pip
  - python
  - setuptools
  run:
  - python >=
  - galaxy-data >=26.0
  - galaxy-files >=26.0
  - galaxy-objectstore >=26.0
  - galaxy-tool-util >=26.0
  - galaxy-util >=26.0
  - markupsafe
  - sqlalchemy >=2.0,<2.1
source:
  sha256: ec3a2dfa1144df6fc28cb602602e292bd0a8ca86f842e66ef5148aa635067ba2
  url: https://pypi.io/packages/source/g/galaxy-job-execution/galaxy_job_execution-26.0.1.tar.gz
test:
  imports:
  - galaxy
  - galaxy.job_execution
  - galaxy.metadata
