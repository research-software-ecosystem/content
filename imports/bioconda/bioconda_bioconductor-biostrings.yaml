about:
  description: Memory efficient string containers, string matching algorithms, and
    other utilities, for fast manipulation of large biological sequences or sets of
    sequences.
  home: https://bioconductor.org/packages/3.22/bioc/html/Biostrings.html
  license: Artistic-2.0
  summary: Efficient manipulation of biological strings
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:biostrings
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-biostrings
    path: recipes/bioconductor-biostrings
    version: 2.48.0
package:
  name: bioconductor-biostrings
  version: 2.78.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
  - r-crayon
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
  - r-crayon
source:
  md5: b4ec1bf212646114ef729393f6ff3855
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Biostrings_2.78.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Biostrings/Biostrings_2.78.0.tar.gz
  - https://bioarchive.galaxyproject.org/Biostrings_2.78.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biostrings/bioconductor-biostrings_2.78.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Biostrings')"
