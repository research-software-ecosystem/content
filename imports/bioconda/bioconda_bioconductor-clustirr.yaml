about:
  description: ClustIRR analyzes repertoires of B- and T-cell receptors. It starts
    by identifying communities of immune receptors with similar specificities, based
    on the sequences of their complementarity-determining regions (CDRs). Next, it
    employs a Bayesian probabilistic models to quantify differential community occupancy
    (DCO) between repertoires, allowing the identification of expanding or contracting
    communities in response to e.g. infection or cancer treatment.
  home: https://bioconductor.org/packages/3.22/bioc/html/ClustIRR.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Clustering of immune receptor repertoires
