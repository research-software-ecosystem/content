about:
  description: Provides delayed computation of a matrix of scaled and centered values.
    The result is equivalent to using the scale() function but avoids explicit realization
    of a dense matrix during block processing. This permits greater efficiency in
    common operations, most notably matrix multiplication.
  home: https://bioconductor.org/packages/3.22/bioc/html/ScaledMatrix.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Creating a DelayedMatrix of Scaled and Centered Values
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scaledmatrix
  version: 1.18.0
requirements:
  host:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-matrix
  run:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-matrix
source:
  md5: 3a6e83465e35c036f7687e6216447d1a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ScaledMatrix_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ScaledMatrix/ScaledMatrix_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/ScaledMatrix_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-scaledmatrix/bioconductor-scaledmatrix_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ScaledMatrix')"
