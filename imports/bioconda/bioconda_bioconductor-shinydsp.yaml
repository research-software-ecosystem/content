about:
  description: This package is a Shiny app for interactively analyzing and visualizing
    Nanostring GeoMX Whole Transcriptome Atlas data. Users have the option of exploring
    a sample data to explore this app's functionality. Regions of interest (ROIs)
    can be filtered based on any user-provided metadata. Upon taking two or more groups
    of interest, all pairwise and ANOVA-like testing are automatically performed.
    Available ouputs include PCA, Volcano plots, tables and heatmaps. Aesthetics of
    each output are highly customizable.
  home: https://bioconductor.org/packages/3.22/bioc/html/shinyDSP.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: A Shiny App For Visualizing Nanostring GeoMx DSP Data
