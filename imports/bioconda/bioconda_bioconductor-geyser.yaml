about:
  description: Lightweight Expression displaYer (plotter / viewer) of SummarizedExperiment
    object in R. This package provides a quick and easy Shiny-based GUI to empower
    a user to use a SummarizedExperiment object to view (gene) expression grouped
    from the sample metadata columns (in the `colData` slot). Feature expression can
    either be viewed with a box plot or a heatmap.
  home: https://bioconductor.org/packages/3.22/bioc/html/geyser.html
  license: CC0
  summary: Gene Expression displaYer of SummarizedExperiment in R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
