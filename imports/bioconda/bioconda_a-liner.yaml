about:
  home: https://github.com/mokuno3430/a-liner
  license: MIT
  license_file: LICENSE
  summary: Flexible command-line tool for linear visualization of genome-scale sequence
    alignments
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - mokuno3430
package:
  name: a-liner
  version: 1.1.1
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools >=61.0
  run:
  - python >=3.8
  - matplotlib-base
  - pandas
  - biopython
  - numpy
  - openpyxl
  - bcbio-gff
source:
  sha256: 4679b4695a4ffaca7cda5ec9b3f7a40a45aae1ddb8078b7e776ccf6d9811e173
  url: https://github.com/mokuno3430/a-liner/archive/v1.1.1.tar.gz
test:
  commands:
  - a-liner --help
