about:
  description: In single cell RNA sequencing (scRNA-seq) data combinations of cells
    are sometimes considered a single cell (doublets). The scds package provides methods
    to annotate doublets in scRNA-seq data computationally.
  home: https://bioconductor.org/packages/3.22/bioc/html/scds.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: In-Silico Annotation of Doublets for Single Cell RNA Sequencing Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scds
  version: 1.26.0
requirements:
  host:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-matrix
  - r-proc
  - r-xgboost
  run:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-matrix
  - r-proc
  - r-xgboost
source:
  md5: 46f5f31829bf0bbb8efcb7dd9e14da28
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/scds_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/scds/scds_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/scds_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-scds/bioconductor-scds_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('scds')"
