about:
  description: Store UCSC RepeatMasker AnnotationHub resource metadata. Provide provenance
    and citation information for UCSC RepeatMasker AnnotationHub resources. Illustrate
    in a vignette how to access those resources.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/UCSCRepeatMasker.html
  license: Artistic-2.0
  summary: UCSC RepeatMasker AnnotationHub resource metadata
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ucscrepeatmasker
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-rcurl
  - r-xml
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-rcurl
  - r-xml
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 63f6c47bae95f42374fe5984d74bfca4
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/UCSCRepeatMasker_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/UCSCRepeatMasker/UCSCRepeatMasker_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/UCSCRepeatMasker_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ucscrepeatmasker/bioconductor-ucscrepeatmasker_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('UCSCRepeatMasker')"
