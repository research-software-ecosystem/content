about:
  description: Spatially-aware quality control (QC) software for both spot-level and
    artifact-level QC in spot-based spatial transcripomics, such as 10x Visium. These
    methods calculate local (nearest-neighbors) mean and variance of standard QC metrics
    (library size, unique genes, and mitochondrial percentage) to identify outliers
    spot and large technical artifacts.
  home: https://bioconductor.org/packages/3.22/bioc/html/SpotSweeper.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Spatially-aware quality control for spatial transcriptomics
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spotsweeper
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-escher >=1.10.0,<1.11.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-mass
  - r-spatialeco
  run:
  - bioconductor-biocneighbors >=2.4.0,<2.5.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-escher >=1.10.0,<1.11.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-mass
  - r-spatialeco
source:
