about:
  description: Pipeline to analyze and merge data files produced by BioLegend's LEGENDScreen
    or BD Human Cell Surface Marker Screening Panel (BD Lyoplates).
  home: https://bioconductor.org/packages/3.22/bioc/html/infinityFlow.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Augmenting Massively Parallel Cytometry Experiments Using Multivariate
    Non-Linear Regressions
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-infinityflow
  version: 1.20.2
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-generics
  - r-gtools
  - r-matlab
  - r-pbapply
  - r-png
  - r-raster
  - r-uwot
  - r-xgboost
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - r-base
  - r-generics
  - r-gtools
  - r-matlab
  - r-pbapply
  - r-png
  - r-raster
  - r-uwot
  - r-xgboost
source:
  md5: 089582dd815d50639ec1d77e63b77c32
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/infinityFlow_1.20.2.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/infinityFlow/infinityFlow_1.20.2.tar.gz
  - https://bioarchive.galaxyproject.org/infinityFlow_1.20.2.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-infinityflow/bioconductor-infinityflow_1.20.2_src_all.tar.gz
test:
  commands:
  - $R -e "library('infinityFlow')"
