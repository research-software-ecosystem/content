about:
  description: 'get_MNV is a tool designed to identify Multi-Nucleotide Variants (MNVs)
    within the same codon in genomic sequences, providing more accurate annotation
    for genomic data. Pure Rust implementation with no C dependencies.

    '
  dev_url: https://github.com/PathoGenOmics-Lab/get_mnv
  doc_url: https://github.com/PathoGenOmics-Lab/get_mnv
  home: https://github.com/PathoGenOmics-Lab/get_mnv
  license: AGPL-3.0-or-later
  license_family: AGPL
  license_file: LICENSE
  summary: Tool to identify Multi-Nucleotide Variants (MNVs) in genomic sequences.
build:
  number: 0
  run_exports:
  - null
  script: 'set -xe

    export LANG=C.UTF-8

    export LC_ALL=C.UTF-8

    export RUST_BACKTRACE=1

    cargo install --no-track --locked --verbose --root "${PREFIX}" --path . --bin
    get_mnv

    '
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  categories:
  - Genomics
  - Variant Analysis
  recipe-maintainers:
  - paururo
  - PathoGenOmics-Lab
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: get_mnv
  version: 1.1.2
requirements:
  build:
  - null
  - null
  - pkg-config
source:
  sha256: dd64b4c54434e3ed17f220c95e0e16014a92d2868ffbb38a6152264a9b9283a0
  url: https://github.com/PathoGenOmics-Lab/get_mnv/archive/refs/tags/1.1.2.tar.gz
test:
  commands:
  - get_mnv --help
  - get_mnv --version
