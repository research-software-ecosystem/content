about:
  description: 'get_MNV is a tool designed to identify Multi-Nucleotide Variants (MNVs)
    within the same codon in genomic sequences, providing more accurate annotation
    for genomic data. Pure Rust implementation with no C dependencies.

    '
  dev_url: https://github.com/PathoGenOmics-Lab/get_mnv
  doc_url: https://github.com/PathoGenOmics-Lab/get_mnv
  home: https://github.com/PathoGenOmics-Lab/get_mnv
  license: AGPL-3.0-or-later
  license_family: AGPL
  license_file: LICENSE
  summary: Tool to identify Multi-Nucleotide Variants (MNVs) in genomic sequences.
build:
  number: 0
  run_exports:
  - null
  script: 'set -xe

    export LANG=C.UTF-8

    export LC_ALL=C.UTF-8

    export RUST_BACKTRACE=1

    cargo install --no-track --locked --verbose --root "${PREFIX}" --path .

    '
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  categories:
  - Genomics
  - Variant Analysis
  recipe-maintainers:
  - PathoGenOmics-Lab
package:
  name: get_mnv
  version: 1.1.1
requirements:
  build:
  - null
  - null
  - pkg-config
source:
  sha256: 4f20a5f169a4eae3c7eb934e2621b21d4464c9f24ae99f770f70b4edc1b40d6a
  url: https://github.com/PathoGenOmics-Lab/get_mnv/archive/refs/tags/1.1.1.tar.gz
test:
  commands:
  - get_mnv --help
  - get_mnv --version
