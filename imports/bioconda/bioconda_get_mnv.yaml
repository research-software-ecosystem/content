about:
  description: 'get_MNV is a tool designed to identify Multi-Nucleotide Variants (MNVs)
    within the same codon in genomic sequences, providing more accurate annotation
    for genomic data.

    '
  dev_url: https://github.com/PathoGenOmics-Lab/get_mnv
  doc_url: https://github.com/PathoGenOmics-Lab/get_mnv
  home: https://github.com/PathoGenOmics-Lab/get_mnv
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Tool to identify Multi-Nucleotide Variants (MNVs) in genomic sequences.
build:
  number: 0
  run_exports:
  - null
  script: 'set -xe

    export LANG=C.UTF-8

    export LC_ALL=C.UTF-8

    export RUST_BACKTRACE=1

    export OPENSSL_NO_VENDOR=1

    export OPENSSL_DIR=$PREFIX

    export OPENSSL_INCLUDE_DIR=$PREFIX/include

    export OPENSSL_LIB_DIR=$PREFIX/lib

    export CURL_STATIC_SSL=1

    export CURL_SYS_STATIC=1

    #export CARGO_NET_OFFLINE=true

    export HTS_LIB_DIR=$PREFIX/lib

    export HTS_INCLUDE_DIR=$PREFIX/include

    export LIBCLANG_PATH=$PREFIX/lib # [linux or aarch64]

    export CPLUS_INCLUDE_PATH=$PREFIX/include # [linux or aarch64]

    export BINDGEN_EXTRA_CLANG_ARGS="-I$PREFIX/include" # [linux or aarch64]

    export HTS_STATIC=1

    export HTS_SYS_BUNDLED=0

    cargo install --no-track --locked --verbose --root "${PREFIX}" --path .

    '
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  categories:
  - Genomics
  - Variant Analysis
  recipe-maintainers:
  - PathoGenOmics-Lab
package:
  name: get_mnv
  version: 1.0.1
requirements:
  build:
  - null
  - null
  - null
  - pkg-config
  host:
  - openssl
  - curl
  - htslib
  - bzip2
  - xz
  - zlib
  - clangdev >=16,<17
  run:
  - null
  - null
  - null
  - null
  - null
  - null
source:
  sha256: 68c771531b9f9b70f7e182cfebc6a6cacb98ce0786d937c7d39cfbde83af262a
  url: https://github.com/PathoGenOmics-Lab/get_mnv/archive/refs/tags/1.0.1.tar.gz
test:
  commands:
  - get_mnv --help
  - get_mnv --version
