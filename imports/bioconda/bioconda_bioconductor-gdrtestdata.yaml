about:
  description: R package with internal dose-response test data. Package provides functions
    to generate input testing data that can be used as the input for gDR pipeline.
    It also contains qs files with MAE data processed by gDR.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/gDRtestData.html
  license: Artistic-2.0
  summary: gDRtestData - R data package with testing dose response data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gdrtestdata
  version: 1.8.0
requirements:
  host:
  - r-base
  - r-checkmate
  - r-data.table
  run:
  - r-base
  - r-checkmate
  - r-data.table
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 39e2b20012a76dda879594d7c7bc8782
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/gDRtestData_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/gDRtestData/gDRtestData_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/gDRtestData_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gdrtestdata/bioconductor-gdrtestdata_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('gDRtestData')"
