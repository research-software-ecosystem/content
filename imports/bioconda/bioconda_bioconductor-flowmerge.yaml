about:
  description: 'Merging of mixture components for model-based automated gating of
    flow cytometry data using the flowClust framework. Note: users should have a working
    copy of flowClust 2.0 installed.'
  home: https://bioconductor.org/packages/3.22/bioc/html/flowMerge.html
  license: Artistic-2.0
  summary: Cluster Merging for Flow Cytometry Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  container:
    extended-base: true
package:
  name: bioconductor-flowmerge
  version: 2.58.0
requirements:
  build:
  - null
  - null
  - null
  - null
  - null
  - xorg-libxfixes
  host:
  - bioconductor-flowclust >=3.48.0,<3.49.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - r-base
  - r-feature
  - r-foreach
  - r-rrcov
  - r-snow
  run:
  - bioconductor-flowclust >=3.48.0,<3.49.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rgraphviz >=2.54.0,<2.55.0
  - r-base
  - r-feature
  - r-foreach
  - r-rrcov
  - r-snow
source:
