  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowMerge_2.58.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowMerge/flowMerge_2.58.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowMerge_2.58.0.tar.gz
