about:
  description: Provides data to use with xcore package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/xcoredata.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: data package for xcore
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-xcoredata
  version: 1.14.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 9ef984265921c0020b4aca7b86bd2fb0
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/xcoredata_1.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/xcoredata/xcoredata_1.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/xcoredata_1.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-xcoredata/bioconductor-xcoredata_1.14.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('xcoredata')"
