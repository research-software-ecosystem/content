about:
  description: The pattern of digestion and protection from DNA nucleases such as
    DNAse I, micrococcal nuclease, and Tn5 transposase can be used to infer the location
    of associated proteins. This package contains useful functions to analyze patterns
    of paired-end sequencing fragment density. VplotR facilitates the generation of
    V-plots and footprint profiles over single or aggregated genomic loci of interest.
  home: https://bioconductor.org/packages/3.22/bioc/html/VplotR.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Set of tools to make V-plots and compute footprint profiles
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-vplotr
  version: 1.20.0
requirements:
  host:
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-cowplot
  - r-ggplot2
  - r-magrittr
  - r-rcolorbrewer
  - r-reshape2
  - r-zoo
  run:
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-cowplot
  - r-ggplot2
  - r-magrittr
  - r-rcolorbrewer
  - r-reshape2
  - r-zoo
