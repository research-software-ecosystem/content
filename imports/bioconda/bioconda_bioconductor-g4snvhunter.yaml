about:
  description: "G-quadruplexes (G4s) are unique nucleic acid secondary structures\
    \ predominantly found in guanine-rich regions and have been shown to be involved\
    \ in various biological regulatory processes. G4SNVHunter is an R package designed\
    \ to rapidly identify genomic sequences with G4-forming propensity and to accurately\
    \ screen user-provided single nucleotide variants\u2014as well as other small-scale\
    \ variants such as indels and MNVs\u2014for their potential to destabilize these\
    \ structures. This allows researchers to then screen these critical variants for\
    \ deeper study, digging into how they might influence biological functions\u2014\
    think gene regulation, for instance\u2014by impairing G4 formation propensity."
  home: https://bioconductor.org/packages/3.22/bioc/html/G4SNVHunter.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Evaluating SNV-Induced Disruption of G-Quadruplex Structures
