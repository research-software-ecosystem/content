about:
  home: https://github.com/RECETOX/rcx-tk
  license: MIT
  license_file: LICENSE
  summary: This package adjusts and cleans the metadata file provided by a user.
build:
  entry_points:
  - rcx_tk = rcx_tk.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - KristinaGomoryova
  - hechth
package:
  name: rcx-tk
  version: 0.2.0
requirements:
  host:
  - python >=3.11,<4.0
  - poetry-core
  - pip
  run:
  - python >=3.11.0,<4.0.0
  - pandas >=3.0.1,<4.0.0
  - pandas-stubs >=2.2.2.240603,<3.0.0
  - mypy >=1.10.1,<2.0.0
  - click >=8.1.7,<9.0.0
  - openpyxl >=3.1.5,<4.0.0
source:
  sha256: 62d42c4d0b64f8b60dca044d0f0fd27b3f34838853371504b3c7affe4e077cf2
  url: https://pypi.io/packages/source/r/rcx-tk/rcx_tk-0.2.0.tar.gz
test:
  commands:
  - pip check
  - rcx_tk --help
  imports:
  - rcx_tk
  requires:
  - pip
