about:
  description: "AcinetoScope is a complete, automated genomic analysis pipeline for\
    \ Acinetobacter baumannii,\nfeaturing parallel execution for rapid processing\
    \ of bacterial genomes. The pipeline integrates\nmultiple analysis modules into\
    \ a unified workflow:\n\n\u2022 Quality Control (FASTA QC) - Comprehensive sequence\
    \ validation\n\u2022 Multi-Locus Sequence Typing (MLST) - Oxford & Pasteur schemes\n\
    \u2022 K/O Locus Typing (Kaptive) - Capsule and lipooligosaccharide typing\n\u2022\
    \ Antimicrobial Resistance (AMR) - Comprehensive resistance gene detection\n\u2022\
    \ Virulence & Plasmid Profiling (ABRicate) - Multi-database screening\n\u2022\
    \ Critical Genes Flagging - Priority markers for infection control\n\u2022 Interactive\
    \ HTML Reports - Gene-centric integrated analysis\n\u2022 Cross-genome pattern\
    \ discovery\n\nKey Features:\n\U0001F680 Parallel Execution - All modules run\
    \ simultaneously for maximum speed\n\U0001F4CA Interactive Reports - HTML summaries\
    \ with visualization\n\U0001F9EC Multi-Database Integration - CARD, ResFinder,\
    \ VFDB, NCBI, MEGARes, BacMet\n\u26A1 Easy Deployment - Single command analysis\
    \ with automatic dependency handling\n\U0001F3AF Critical Gene Tracking - Carbapenemases,\
    \ ESBLs, colistin/tigecycline resistance\n\nDesigned for clinical microbiology,\
    \ outbreak investigation, and genomic surveillance,\nAcinetoScope provides clinical\
    \ labs and researchers with a complete solution for\nA. baumannii genomic characterization\
    \ from raw sequencing data to publication-ready reports.\n"
  dev_url: https://github.com/bbeckley-hub/acinetoscope
  doc_url: https://github.com/bbeckley-hub/acinetoscope
  home: https://github.com/bbeckley-hub/acinetoscope
  license: MIT
  license_file: LICENSE
  summary: 'AcinetoScope: Comprehensive A. baumannii genomic typing pipeline with
    parallel execution'
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation -vvv'
