about:
  description: RNA-seq data generated by some library preparation methods, such as
    rRNA-depletion-based method and the SMART-seq method, might be contaminated by
    genomic DNA (gDNA), if DNase I disgestion is not performed properly during RNA
    preparation. CleanUpRNAseq is developed to check if RNA-seq data is suffered from
    gDNA contamination. If so, it can perform correction for gDNA contamination and
    reduce false discovery rate of differentially expressed genes.
  home: https://bioconductor.org/packages/3.22/bioc/html/CleanUpRNAseq.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Detect and Correct Genomic DNA Contamination in RNA-seq Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cleanuprnaseq
  version: 1.4.0
