about:
  description: Detects Gene Ontology and/or other user defined categories which are
    over/under represented in RNA-seq data.
  home: https://bioconductor.org/packages/3.22/bioc/html/goseq.html
  license: LGPL (>= 2)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Gene Ontology analyser for RNA-seq and other length biased data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:goseq
package:
  name: bioconductor-goseq
  version: 1.62.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genelendatabase >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-biasedurn
  - r-mgcv
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genelendatabase >=1.46.0,<1.47.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-biasedurn
  - r-mgcv
source:
  md5: a44a291d31ca93419a7bfc64bd8be0a7
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/goseq_1.62.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/goseq/goseq_1.62.0.tar.gz
  - https://bioarchive.galaxyproject.org/goseq_1.62.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-goseq/bioconductor-goseq_1.62.0_src_all.tar.gz
test:
