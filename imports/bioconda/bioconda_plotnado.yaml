about:
  dev_url: https://github.com/alsmith151/plotnado
  doc_url: https://github.com/alsmith151/plotnado
  home: https://github.com/alsmith151/plotnado
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Simple genomic track visualization and genome browser-style plotting
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - alsmith151
package:
  name: plotnado
  version: '0.3'
requirements:
  host:
  - pip
  - python >=3.12
  - setuptools >=61
  - setuptools-scm >=6.2
  - wheel
  run:
  - python >=3.12
  - cooler
  - loguru
  - matplotlib-base
  - numpy
  - pandas
  - pandera
  - pybigtools
  - pydantic >=2
  - pyranges1
  - tomli-w
  - tqdm
  - typer
source:
  sha256: 2bc0fb3b257a49678108d2e9486a2b001fbf78caf7dd0373233618039b743d88
  url: https://pypi.org/packages/source/p/plotnado/plotnado-0.3.tar.gz
test:
  commands:
  - plotnado --help
  - pip check
  imports:
  - plotnado
  requires:
  - pip
