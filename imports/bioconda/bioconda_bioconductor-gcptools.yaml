about:
  description: Lower-level functionality to interface with Google Cloud Platform tools.
    'gcloud' and 'gsutil' are both supported. The functionality provided centers around
    utilities for the AnVIL platform.
  home: https://bioconductor.org/packages/3.22/bioc/html/GCPtools.html
  license: Artistic-2.0
  summary: Tools for working with gcloud and gsutil
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gcptools
  version: 1.0.0
requirements:
  host:
  - bioconductor-anvilbase >=1.4.0,<1.5.0
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - r-base
  - r-dplyr
  - r-httr
  - r-rlang
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-anvilbase >=1.4.0,<1.5.0
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - r-base
  - r-dplyr
  - r-httr
  - r-rlang
  - r-tibble
  - r-tidyr
source:
  md5: d86fc427955c2b6fd444afae2503d500
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GCPtools_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GCPtools/GCPtools_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/GCPtools_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gcptools/bioconductor-gcptools_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GCPtools')"
