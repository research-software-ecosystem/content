about:
  description: A R interface to the TnT javascript library (https://github.com/ tntvis)
    to provide interactive and flexible visualization of track-based genomic data.
  home: https://bioconductor.org/packages/3.22/bioc/html/TnT.html
  license: AGPL-3
  license_file: /lib/R/share/licenses/AGPL-3
  summary: Interactive Visualization for Genomic Features
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tnt
  version: 1.32.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-data.table
  - r-htmlwidgets
  - r-jsonlite
  - r-knitr
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-data.table
  - r-htmlwidgets
  - r-jsonlite
  - r-knitr
source:
  md5: 5b43ded6f6eeb06fbb192f162e696d06
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TnT_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TnT/TnT_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/TnT_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tnt/bioconductor-tnt_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TnT')"
