about:
  description: 'EarlGrey ParTEA extends EarlGrey for pangenome-scale transposable
    element

    annotation. It processes multiple genomes in parallel, performs cross-species

    clustering, and generates comprehensive repeat annotations.

    '
  dev_url: https://github.com/TobyBaril/EarlGreyParTEA
  doc_url: https://github.com/TobyBaril/EarlGreyParTEA
  home: https://github.com/TobyBaril/EarlGreyParTEA
  license: OSL-2.1
  license_file: LICENSE
  summary: Pangenome transposable element annotation pipeline using EarlGrey
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  recipe-maintainers:
  - TobyBaril
package:
  name: earlgrey-partea
  version: 0.1.4
requirements:
  host:
  - python >=3.9,<3.13
  run:
  - python
  - earlgrey >=7.1.0
  - snakemake-minimal
  - cd-hit
  - graphviz
  - matplotlib-base
  - numpy
source:
  sha256: 117e5e45913151576df65c04f11fca06975e7e87848e372042de20129ff4a943
  url: https://github.com/TobyBaril/EarlGreyParTEA/archive/refs/tags/v0.1.4.tar.gz
test:
  commands:
  - earlGreyParTEA --help
  - earlGreyParTEA_LibConstruct --help
  - earlGreyParTEA_AnnotationOnly --help
  - earlGreyParTEA --generate-config test_config.yaml
  - test -f test_config.yaml
