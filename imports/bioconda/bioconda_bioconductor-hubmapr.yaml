  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HuBMAPR/HuBMAPR_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/HuBMAPR_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hubmapr/bioconductor-hubmapr_1.4.0_src_all.tar.gz
