about:
  home: https://atlaswiki.netlify.app
  license: MPL-2.0
  summary: 'ATLAS: Analysis Tools for Ancient and Low-depth Samples'
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: atlas
  version: 2.0.2
requirements:
  build:
  - null
  - cmake
  - ninja
  host:
  - armadillo
  - fmt
  - htslib
  - mkl
  - lapack
  - nlohmann_json
  - openblas
  - jsoncpp
  - zlib
  run:
  - armadillo
  - fmt
  - htslib
  - mkl
  - lapack
  - nlohmann_json
  - openblas
  - jsoncpp
source:
  sha256: 5a7b6a96acdd25a3ec929045d854a42e6fb8f451c7db337da8986fabcc27fae2
  url: https://bitbucket.org/wegmannlab/atlas/get/2.0.2.tar.gz
test:
  commands:
  - atlas | grep "successfully"
  - atlas simulate
  - atlas summaryStats --bam ATLAS_simulations.bam --fasta ATLAS_simulations.fasta
  - atlas GLF --bam ATLAS_simulations.bam
  - atlas saf --glf ATLAS_simulations_GLF.glf.gz --fasta ATLAS_simulations.fasta
  - atlas majorMinor --glf ATLAS_simulations_GLF.glf.gz
  - rm ATLAS* saf.saf.* simulate.* || exit 1
