about:
  description: 'This package can easily make heatmaps which are produced by the ComplexHeatmap
    package into interactive applications. It provides two types of interactivities:
    1. on the interactive graphics device, and 2. on a Shiny app. It also provides
    functions for integrating the interactive heatmap widgets for more complex Shiny
    app development.'
  home: https://bioconductor.org/packages/3.22/bioc/html/InteractiveComplexHeatmap.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Make Interactive Complex Heatmaps
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-interactivecomplexheatmap
  version: 1.18.1
requirements:
  host:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-clisymbols
  - r-digest
  - r-fontawesome
  - r-getoptlong
  - r-htmltools
  - r-jsonlite
  - r-kableextra >=1.3.1
  - r-rcolorbrewer
  - r-shiny
  - r-svglite
  run:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-clisymbols
  - r-digest
  - r-fontawesome
  - r-getoptlong
  - r-htmltools
  - r-jsonlite
  - r-kableextra >=1.3.1
  - r-rcolorbrewer
  - r-shiny
  - r-svglite
source:
  md5: 11f3656404352f58c4fa0c9fdad56537
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/InteractiveComplexHeatmap_1.18.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/InteractiveComplexHeatmap/InteractiveComplexHeatmap_1.18.1.tar.gz
  - https://bioarchive.galaxyproject.org/InteractiveComplexHeatmap_1.18.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-interactivecomplexheatmap/bioconductor-interactivecomplexheatmap_1.18.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('InteractiveComplexHeatmap')"
