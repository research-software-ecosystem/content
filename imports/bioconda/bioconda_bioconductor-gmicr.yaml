about:
  description: This package uses bayesian network learning to detect relationships
    between Gene Modules detected by WGCNA and immune cell signatures defined by xCell.
    It is a hypothesis generating tool.
  home: https://bioconductor.org/packages/3.22/bioc/html/GmicR.html
  license: GPL-2 + file LICENSE
  license_file: LICENSE
  summary: Combines WGCNA and xCell readouts with bayesian network learrning to generate
    a Gene-Module Immune-Cell network (GMIC)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gmicr
  version: 1.24.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-category >=2.76.0,<2.77.0
  - bioconductor-gostats >=2.76.0,<2.77.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-org.mm.eg.db >=3.22.0,<3.23.0
  - r-ape
  - r-base
  - r-bnlearn
  - r-data.table
  - r-doparallel
  - r-dt
  - r-foreach
  - r-grain
  - r-grbase
  - r-reshape2
  - r-shiny
