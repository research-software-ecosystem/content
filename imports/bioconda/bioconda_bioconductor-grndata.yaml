about:
  description: Simulated expression data for five large Gene Regulatory Networks from
    different simulators
  home: https://bioconductor.org/packages/3.22/data/experiment/html/grndata.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Synthetic Expression Data for Gene Regulatory Network Inference
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-grndata
  version: 1.42.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 92c17261063158a42019d3a8ec210c2e
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/grndata_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/grndata/grndata_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/grndata_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-grndata/bioconductor-grndata_1.42.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('grndata')"
