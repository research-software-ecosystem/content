about:
  description: OxBreaker is a GTK4-based interface that collects parameters and launches
    a Nextflow pipeline. The package bundles the Nextflow project files and assets
    so they are available at runtime.
  dev_url: https://gitlab.com/rc-reding/OxBreaker
  home: https://gitlab.com/rc-reding/OxBreaker
  license: LGPL-2.1-only
  license_family: LGPL
  license_file: LICENSE
  summary: GTK4 GUI wrapper that launches a Nextflow pipeline
build:
  entry_points:
  - oxbreaker = oxbreaker.gui:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  identifiers:
  - doi:10.64898/2026.03.18.709804
  recipe-maintainers:
  - rc-reding
package:
  name: oxbreaker
  version: 1.0.1
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - pygobject
  - gtk4
  - gobject-introspection
  - cairo
  - pango
  - harfbuzz
  - glib
  - nextflow 25.*
source:
  sha256: c06967179ab9e5e06d550b5847d20e3583f00bd51d2bbf2600012eaf019323a3
  url: https://gitlab.com/rc-reding/OxBreaker/-/archive/1.0.1/OxBreaker-1.0.1.tar.bz2
test:
  commands:
  - oxbreaker --help
  - nextflow -version
