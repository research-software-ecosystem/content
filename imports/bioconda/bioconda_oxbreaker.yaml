about:
  description: OxBreaker is a GTK4-based interface that collects parameters and launches
    a Nextflow pipeline. The package bundles the Nextflow project files and assets
    so they are available at runtime.
  dev_url: https://github.com/oxfordmmm/OxBreaker
  home: https://github.com/oxfordmmm/OxBreaker
  license: LGPL-2.1-only
  license_family: LGPL
  license_file: LICENSE
  summary: GTK4 GUI wrapper that launches a Nextflow pipeline.
build:
  entry_points:
  - oxbreaker = oxbreaker.gui:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  identifiers:
  - doi:10.64898/2026.03.18.709804
  recipe-maintainers:
  - rc-reding
package:
  name: oxbreaker
  version: '1.0'
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - pygobject
  - gtk4
  - gobject-introspection
  - cairo
  - pango
  - harfbuzz
  - glib
  - nextflow >=24
source:
  sha256: 9ef375c42f60193db29b7d0dc8e5792d6a5c4009660c9f43ffe9a046b28eaef9
  url: https://gitlab.com/rc-reding/OxBreaker/-/archive/1.0/OxBreaker-1.0.tar.bz2
test:
  commands:
  - oxbreaker --help
  - nextflow -version
