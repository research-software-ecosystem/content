about:
  description: This package provides a inferential analysis method for detecting differentially
    expressed CpG sites in MeDIP-seq data. It uses statistical framework and EM algorithm,
    to identify differentially expressed CpG sites. The methods on this package are
    described in the article 'Methylation-level Inferences and Detection of Differential
    Methylation with Medip-seq Data' by Yan Zhou, Jiadi Zhu, Mingtao Zhao, Baoxue
    Zhang, Chunfu Jiang and Xiyan Yang (2018, pending publication).
  home: https://bioconductor.org/packages/3.22/bioc/html/SIMD.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Statistical Inferences with MeDIP-seq Data (SIMD) to infer the methylation
    level for each CpG site
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-simd
  version: 1.28.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-methylmnm >=1.48.0,<1.49.0
  - r-base
  - r-statmod
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-methylmnm >=1.48.0,<1.49.0
  - r-base
  - r-statmod
source:
  md5: 30a83e5d9e6d04ec49d4946543e1eded
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SIMD_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SIMD/SIMD_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/SIMD_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-simd/bioconductor-simd_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SIMD')"
