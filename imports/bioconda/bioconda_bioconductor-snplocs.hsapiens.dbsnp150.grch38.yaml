  - https://bioarchive.galaxyproject.org/SNPlocs.Hsapiens.dbSNP150.GRCh38_0.99.21.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-snplocs.hsapiens.dbsnp150.grch38/bioconductor-snplocs.hsapiens.dbsnp150.grch38_0.99.21_src_all.tar.gz
