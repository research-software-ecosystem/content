about:
  description: The eiR package provides utilities for accelerated structure similarity
    searching of very large small molecule data sets using an embedding and indexing
    approach.
  home: https://bioconductor.org/packages/3.22/bioc/html/eiR.html
  license: Artistic-2.0
  summary: Accelerated similarity searching of small molecules
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-eir
  version: 1.50.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-chemminer >=3.62.0,<3.63.0
  - r-base
  - r-dbi
  - r-digest
  - r-rcppannoy >=0.0.9
  - r-rcurl
  - r-runit
  - r-snow
  - r-snowfall
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-chemminer >=3.62.0,<3.63.0
  - r-base
  - r-dbi
  - r-digest
  - r-rcppannoy >=0.0.9
  - r-rcurl
  - r-runit
  - r-snow
  - r-snowfall
source:
  md5: 23defa04c79b3c9765ea41229ff6ed87
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/eiR_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/eiR/eiR_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/eiR_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-eir/bioconductor-eir_1.50.0_src_all.tar.gz
test:
