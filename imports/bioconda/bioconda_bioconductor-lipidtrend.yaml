about:
  description: '"LipidTrend" is an R package that implements a permutation-based statistical
    test to identify significant differences in lipidomic features between groups.
    The test incorporates Gaussian kernel smoothing of region statistics to improve
    stability and accuracy, particularly when dealing with small sample sizes. This
    package also includes two plotting functions for visualizing significant tendencies
    in 1D and 2D feature data, respectively.'
  home: https://bioconductor.org/packages/3.22/bioc/html/LipidTrend.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 'LipidTrend: Analysis and Visualization of Lipid Feature Tendencies'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-lipidtrend
  version: 1.0.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-ggnewscale
  - r-ggplot2
  - r-magrittr
  - r-matrixtests
  - r-mkmisc
  - r-rlang
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-ggnewscale
  - r-ggplot2
  - r-magrittr
  - r-matrixtests
  - r-mkmisc
  - r-rlang
source:
