about:
  description: This package unifies access to Statistal Modeling of Omics Data. Across
    linear modeling engines (lm, lme, lmer, limma, and wilcoxon). Across coding systems
    (treatment, difference, deviation, etc). Across model formulae (with/without intercept,
    random effect, interaction or nesting). Across omics platforms (microarray, rnaseq,
    msproteomics, affinity proteomics, metabolomics). Across projection methods (pca,
    pls, sma, lda, spls, opls). Across clustering methods (hclust, pam, cmeans). Across
    survival methods (coxph, survdiff, coin). It provides a fast enrichment analysis
    implementation.
  home: https://bioconductor.org/packages/3.22/bioc/html/autonomics.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Unified Statistical Modeling of Omics Data
