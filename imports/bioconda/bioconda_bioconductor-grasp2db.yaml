about:
  description: grasp2db, sqlite wrap of NHLBI GRASP 2.0, an extended GWAS catalog.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/grasp2db.html
  license: Artistic-2.0 + file LICENSE
  license_file: LICENSE
  summary: grasp2db, sqlite wrap of GRASP 2.0
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-grasp2db
  version: 1.1.1
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dbplyr
  - r-digest
  - r-dplyr
  - r-rsqlite
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-dbplyr
  - r-digest
  - r-dplyr
  - r-rsqlite
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 360c87253a6132ae036d11fda03ee96a
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/grasp2db_1.1.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/grasp2db/grasp2db_1.1.1.tar.gz
  - https://bioarchive.galaxyproject.org/grasp2db_1.1.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-grasp2db/bioconductor-grasp2db_1.1.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('grasp2db')"
