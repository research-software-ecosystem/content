about:
  description: 'ccfind is a general tool to detect circular complete genomes

    with clues of terminal redundancy. It was originally designed

    for identification of complete virus genomes from metagenome assembly.

    '
  home: https://github.com/yosuken/ccfind
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Circular Complete genome FINDer
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  recipe-maintainers:
  - yosuken
package:
  name: ccfind
  version: 1.4.7
requirements:
  run:
  - ruby >=2.0
  - blast >=2.6
  - fasta3
  - prodigal
  - parallel
source:
  sha256: 3c0ae032d8eb024e3c3c88aa32f50e4e14ffab02e71ece06487b3d6dc221ef89
  url: https://github.com/yosuken/ccfind/archive/refs/tags/v1.4.7.tar.gz
test:
  commands:
  - ccfind --version
