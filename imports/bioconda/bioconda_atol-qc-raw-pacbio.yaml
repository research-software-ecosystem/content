about:
  dev_url: https://github.com/amytims/atol-qc-raw-pacbio
  home: https://github.com/amytims/atol-qc-raw-pacbio
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Runs QC and produces summary stats on Pacbio HiFi reads
build:
  entry_points:
  - atol-qc-raw-pacbio = atol_qc_raw_pacbio.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=0.2.2
package:
  name: atol-qc-raw-pacbio
  version: 0.2.2
requirements:
  host:
  - pip
  - python >=3.12,<3.13
  - setuptools-scm
  run:
  - python >=3.12,<3.13
  - snakemake >=9.16.3,<10
  - cutadapt >=4.4
  - seqkit >=2.13.0
  - pigz
  - samtools >=1.19.2
source:
  sha256: 05dc81c5bea6305d6fa76beedb8fea1ec3e9b602e635a4ab5b250557e6505e2a
  url: https://github.com/amytims/atol-qc-raw-pacbio/archive/refs/tags/0.2.2.tar.gz
test:
  commands:
  - 'atol-qc-raw-pacbio --help | grep ''usage: atol-qc-raw-pacbio'''
