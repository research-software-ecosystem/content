about:
  dev_url: https://github.com/amytims/atol-qc-raw-pacbio
  home: https://github.com/amytims/atol-qc-raw-pacbio
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Runs QC and produces summary stats on Pacbio HiFi reads
build:
  entry_points:
  - atol-qc-raw-pacbio = atol_qc_raw_pacbio.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=0.1.3
package:
  name: atol-qc-raw-pacbio
  version: 0.1.3
requirements:
  host:
  - pip
  - python >=3.12,<3.13
  - setuptools-scm
  run:
  - python >=3.12,<3.13
  - snakemake >=9.16.3,<10
  - cutadapt >=4.4
  - seqkit >=2.13.0
  - pigz
  - samtools >=1.19.2
source:
  sha256: 94455c433c85e0ac09b15a9a10f04a881ad4202a0050835164751b985c3082dd
  url: https://github.com/amytims/atol-qc-raw-pacbio/archive/refs/tags/0.1.3.tar.gz
test:
  commands:
  - 'atol-qc-raw-pacbio --help | grep ''usage: atol-qc-raw-pacbio'''
