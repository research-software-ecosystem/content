about:
  dev_url: https://github.com/jonas-fuchs/varVAMP
  home: https://github.com/jonas-fuchs/varVAMP
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Variable VirusAMPlicons (varVAMP) is a tool to design primers for highly
    diverse viruses.
build:
  entry_points:
  - varvamp = varvamp.command:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - bgruening
package:
  name: varvamp
  version: 1.3.1
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - biopython >=1.79
  - matplotlib-base >=3.5.1
  - primer3-py >=1.1.0
  - pandas >=1.4.4
  - numpy >=1.23.3
  - seqfold >=0.7.15
  - blast >=2.13.0
source:
  sha256: 0822c11911c5176f53b11c113c9813f21eaa322218dc17adffa4e99447df8816
  url: https://pypi.io/packages/source/v/varvamp/varvamp-1.3.1.tar.gz
test:
  commands:
  - varvamp --help
  imports:
  - varvamp
