about:
  description: "gapseq predicts bacterial metabolic pathways and reconstructs\ngenome-scale\
    \ metabolic models.\n\nAfter installation, initialize the required databases with:\n\
    \n  gapseq update-sequences -t Bacteria\n  gapseq update-sequences -t Archaea\n"
  home: https://github.com/jotech/gapseq
  license: AGPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: Informed prediction and analysis of bacterial metabolic pathways and genome-scale
    networks
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  recipe-maintainers:
  - cmkobel
  - jotech
  - Waschina
package:
  name: gapseq
  version: 2.0.1
requirements:
  run:
  - r-base
  - diamond >=2.1.9
  - pyrodigal
  - gawk
  - sed
  - grep
  - bc
  - coreutils
  - wget
  - openssl
  - glpk
  - hmmer
  - blast
  - libsbml
  - r-data.table
  - r-stringr
  - r-stringi
  - r-getopt
  - r-r.utils
  - r-cobrar >=0.2.5
  - r-biocmanager
  - bioconductor-biostrings
  - r-jsonlite
  - r-renv
  - r-rcurl
  - r-httr
source:
  sha256: 2c0b57d3c718b8554d3dc39c7d2bfaa03a3830bd71fa11b547c956f34f2f3f4c
  url: https://github.com/jotech/gapseq/archive/refs/tags/v2.0.1.tar.gz
test:
  commands:
  - gapseq test
