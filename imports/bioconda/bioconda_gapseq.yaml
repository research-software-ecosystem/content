about:
  description: "gapseq predicts bacterial metabolic pathways and reconstructs\ngenome-scale\
    \ metabolic models.\n\nAfter installation, initialize the required databases with:\n\
    \n  gapseq update-sequences -t Bacteria\n  gapseq update-sequences -t Archaea\n"
  home: https://github.com/jotech/gapseq
  license: AGPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: Informed prediction and analysis of bacterial metabolic pathways and genome-scale
    networks
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  recipe-maintainers:
  - cmkobel
  - jotech
  - Waschina
package:
  name: gapseq
  version: 2.1.0
requirements:
  run:
  - r-base
  - diamond >=2.1.9
  - pyrodigal
  - gawk
  - sed
  - grep
  - bc
  - coreutils
  - wget
  - openssl
  - glpk
  - hmmer
  - blast
  - libsbml
  - r-data.table
  - r-stringr
  - r-stringi
  - r-getopt
  - r-r.utils
  - r-cobrar >=0.2.5
  - r-biocmanager
  - bioconductor-biostrings
  - r-jsonlite
  - r-renv
  - r-rcurl
  - r-httr
source:
  sha256: 47d2ab302fec8942819abef41e44e4a34d28ba502896fe00c521f419fa136584
  url: https://github.com/jotech/gapseq/archive/refs/tags/v2.1.0.tar.gz
test:
  commands:
  - gapseq test
