about:
  description: "Virasign (Viral Read ASSIGNment) is a viral taxonomic classification\
    \ and reference selection tool for nanopore data. \nIt maps long-read sequencing\
    \ data (via minimap2) against viral databases (RVDB, RefSeq, or custom accessions)\
    \ and performs \ntaxonomic classification to identify viral species. Virasign\
    \ generates comprehensive interactive HTML reports with filterable \ntables, charts\
    \ and heatmaps. For each identified virus, Virasign also provides the closest\
    \ reference sequence, mapped reads in \nFASTQ format, and BAM files which can\
    \ be used to easily generate a consensus genome and visualize data (e.g., IGV).\
    \ Virasign \nincludes options to blind yourself from certain incidental findings\
    \ (such as HIV, Hepatitis viruses, HTLV, EBV, CMV, HPV) when \nwanted, ensuring\
    \ these findings do not appear in any output files, in line with consent guidelines\
    \ and ethical research practices.\n"
  dev_url: https://github.com/DaanJansen94/virasign
  doc_url: https://github.com/DaanJansen94/virasign/blob/main/README.md
  home: https://github.com/DaanJansen94/virasign
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Virasign is a viral taxonomic classification tool designed for nanopore
    sequencing data.
build:
  entry_points:
  - virasign=virasign.virasign:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation -vvv'
extra:
  recipe-maintainers:
  - DaanJansen94
package:
  name: virasign
  version: 0.0.6
requirements:
  host:
  - python >=3.7,<3.14
  - pip
  - setuptools
  run:
  - python >=3.7,<3.14
  - minimap2 =2.24
  - seqtk =1.3
  - curl
  - samtools >=1.17
  - gzip
  - mmseqs2
source:
  sha256: 26c97f8435e30122178ff588605580f5a066dde5d2fe526b60931558e41724e9
  url: https://github.com/DaanJansen94/virasign/archive/v0.0.6.tar.gz
test:
  commands:
  - virasign --help
  imports:
  - virasign
