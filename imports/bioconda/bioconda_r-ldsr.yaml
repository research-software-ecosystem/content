  - r-rlang >=1.1.0
  - r-tidyr
  run:
  - r-base
  - r-arrow
  - r-cli
  - r-dplyr
  - r-fs
  - r-purrr
  - r-rlang >=1.1.0
  - r-tidyr
source:
  sha256: 0ba9f2d03fa31d42fc75661d8295893aa789fb0b9e4fd11c72654ec2e0c04251
