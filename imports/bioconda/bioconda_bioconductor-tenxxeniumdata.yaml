about:
  description: Collection of Xenium spatial transcriptomics datasets provided by 10x
    Genomics, formatted into the Bioconductor classes, the SpatialExperiment or SpatialFeatureExperiment
    (SFE), to facilitate seamless integration into various applications, including
    examples, demonstrations, and tutorials. The constructed data objects include
    gene expression profiles, per-transcript location data, centroid, segmentation
    boundaries (e.g., cell or nucleus boundaries), and image.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/TENxXeniumData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Collection of Xenium spatial data by 10X genomics
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tenxxeniumdata
  version: 1.6.0
requirements:
  host:
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-spatialfeatureexperiment >=1.12.0,<1.13.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-spatialfeatureexperiment >=1.12.0,<1.13.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 788d348360bc26683061d2fadfdfc2f3
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/TENxXeniumData_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TENxXeniumData/TENxXeniumData_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/TENxXeniumData_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tenxxeniumdata/bioconductor-tenxxeniumdata_1.6.0_src_all.tar.gz
test:
