about:
  home: https://github.com/JeanMainguy/tatouscan
  license: MIT
  license_file: LICENSE
  summary: 'A command-line tool for identifying toxin-antitoxin (TA) systems in genomes
    and metagenomes. '
build:
  entry_points:
  - tatouscan = tatouscan.main:app
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - JeanMainguy
package:
  name: tatouscan
  version: 0.2.0
requirements:
  host:
  - python >=3.10
  - setuptools >=61.0.0
  - pip
  run:
  - python >=3.10
  - pyfastx >=2.0.0,<3.0.0
  - typer >=0.15.0,<0.16.0
  - pyhmmer >=0.11.0,<0.12.0
source:
  sha256: fdee30704551bfedbd442cca2ddfa854695ee86ed2bfe7aa4209b625e5f55c32
  url: https://pypi.org/packages/source/t/tatouscan/tatouscan-0.2.0.tar.gz
test:
  commands:
  - pip check
  - tatouscan --help
  imports:
  - tatouscan
  requires:
  - pip
