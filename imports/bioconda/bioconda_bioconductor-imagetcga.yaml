about:
  description: A Shiny application to explore the TCGA Diagnostic Image Database.
  home: https://bioconductor.org/packages/3.22/bioc/html/imageTCGA.html
  license: Artistic-2.0
  summary: TCGA Diagnostic Image Database Explorer
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-imagetcga
  version: 1.2.0
requirements:
  host:
  - r-base
  - r-bsicons
  - r-bslib
  - r-clipr
  - r-dplyr
  - r-dt
  - r-ggplot2
  - r-leaflet
  - r-rlang
  - r-shiny
  - r-tidyr
  - r-viridis
  run:
  - r-base
  - r-bsicons
  - r-bslib
  - r-clipr
  - r-dplyr
  - r-dt
  - r-ggplot2
  - r-leaflet
  - r-rlang
  - r-shiny
  - r-tidyr
  - r-viridis
source:
  md5: d86a4b92932c29a3e2bfdec4bedc1df8
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/imageTCGA_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/imageTCGA/imageTCGA_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/imageTCGA_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-imagetcga/bioconductor-imagetcga_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('imageTCGA')"
