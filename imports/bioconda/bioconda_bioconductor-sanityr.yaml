about:
  description: a Bayesian normalization procedure derived from first principles. Sanity
    estimates expression values and associated error bars directly from raw unique
    molecular identifier (UMI) counts without any tunable parameters.
  home: https://bioconductor.org/packages/3.22/bioc/html/SanityR.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: R/Bioconductor interface to the Sanity model gene expression analysis
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-sanityr
  version: 1.0.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-rcpp
