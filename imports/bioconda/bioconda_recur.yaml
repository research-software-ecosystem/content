about:
  dev_url: https://github.com/OrthoFinder/RECUR
  doc_url: https://orthofinder.github.io/RECUR
  home: https://github.com/OrthoFinder/RECUR
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Detect recurrent amino-acid substitutions from multiple-sequence alignments.
build:
  entry_points:
  - recur = recur.run.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.1.0
package:
  name: recur
  version: 1.1.0
requirements:
  host:
  - python >=3.9,<3.14
  - pip
  - setuptools >=77
  - setuptools-scm >=8
  run:
  - python >=3.9,<3.14
  - numpy
  - dendropy
  - pyyaml
  - types-pyyaml
  - psutil
  - rich
  - statsmodels
  - scipy
  - iqtree
source:
  sha256: 6e46dbb8f439530f3a365be2fde25ee95f819a1c643de28a68f09df436537479
  url: https://github.com/OrthoFinder/RECUR/releases/download/v1.1.0/recur-1.1.0.tar.gz
test:
  commands:
  - recur --help
  imports:
  - recur
  source_files:
  - ExampleData/
