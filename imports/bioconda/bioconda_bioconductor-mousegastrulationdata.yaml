about:
  description: Provides processed and raw count data for single-cell RNA sequencing,
    single-cell ATAC-seq, and seqFISH (spatial transcriptomic) experiments performed
    along a timecourse of mouse gastrulation and early organogenesis.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/MouseGastrulationData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Single-Cell -omics Data across Mouse Gastrulation and Early Organogenesis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mousegastrulationdata
  version: 1.24.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: ef5408483409bf0b3358b1ad108b8776
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/MouseGastrulationData_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MouseGastrulationData/MouseGastrulationData_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/MouseGastrulationData_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mousegastrulationdata/bioconductor-mousegastrulationdata_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MouseGastrulationData')"
