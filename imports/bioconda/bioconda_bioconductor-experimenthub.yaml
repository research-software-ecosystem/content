about:
  description: This package provides a client for the Bioconductor ExperimentHub web
    resource. ExperimentHub provides a central location where curated data from experiments,
    publications or training courses can be accessed. Each resource has associated
    metadata, tags and date of modification. The client creates and manages a local
    cache of files retrieved enabling quick and reproducible access.
  home: https://bioconductor.org/packages/3.22/bioc/html/ExperimentHub.html
  license: Artistic-2.0
  summary: Client to access ExperimentHub resources
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-experimenthub
    path: recipes/bioconductor-experimenthub
    version: 1.6.1
package:
  name: bioconductor-experimenthub
  version: 3.0.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-biocmanager
  - r-rappdirs
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-biocmanager
  - r-rappdirs
source:
  md5: 71fcb221ab1233d1640d17202105c500
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ExperimentHub_3.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ExperimentHub/ExperimentHub_3.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/ExperimentHub_3.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-experimenthub/bioconductor-experimenthub_3.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ExperimentHub')"
