about:
  description: MSA2dist calculates pairwise distances between all sequences of a DNAStringSet
    or a AAStringSet using a custom score matrix and conducts codon based analysis.
    It uses scoring matrices to be used in these pairwise distance calculations which
    can be adapted to any scoring for DNA or AA characters. E.g. by using literal
    distances MSA2dist calculates pairwise IUPAC distances. DNAStringSet alignments
    can be analysed as codon alignments to look for synonymous and nonsynonymous substitutions
    (dN/dS) in a parallelised fashion using a variety of substitution models. Non-aligned
    coding sequences can be directly used to construct pairwise codon alignments (global/local)
    and calculate dN/dS without any external dependencies.
  home: https://bioconductor.org/packages/3.22/bioc/html/MSA2dist.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: MSA2dist calculates pairwise distances between all sequences of a DNAStringSet
    or a AAStringSet using a custom score matrix and conducts codon based analysis
