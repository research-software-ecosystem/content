about:
  description: '`orthosData` is the companion ExperimentData package to the `orthos`
    R package for mechanistic studies using differential gene expression experiments.
    It provides functions for retrieval from ExperimentHub and local caching of the
    models and datasets used internally in orthos.'
  home: https://bioconductor.org/packages/3.22/data/experiment/html/orthosData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Data for the orthos package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-orthosdata
  version: 1.8.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-stringr
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-stringr
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 4201b7593093615e0e08a76f7a17204c
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/orthosData_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/orthosData/orthosData_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/orthosData_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-orthosdata/bioconductor-orthosdata_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('orthosData')"
