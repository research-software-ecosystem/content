about:
  description: This package provides access to mapping and results objects generated
    by the AssessORF package, as well as the genome sequences for the strains corresponding
    to those objects.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/AssessORFData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Data and Files for the AssessORF Package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-assessorfdata
  version: 1.28.0
requirements:
  host:
  - bioconductor-decipher >=3.6.0,<3.7.0
  - r-base
  - r-rsqlite >=1.1
  run:
  - bioconductor-decipher >=3.6.0,<3.7.0
  - r-base
  - r-rsqlite >=1.1
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 8e51de1bd19179b256ac1161b205ed5b
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/AssessORFData_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/AssessORFData/AssessORFData_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/AssessORFData_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-assessorfdata/bioconductor-assessorfdata_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('AssessORFData')"
