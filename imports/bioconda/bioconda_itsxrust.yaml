about:
  home: https://github.com/ayobi/ITSxRust
  license: MIT
  license_file: LICENSE
  summary: HMMER-based ITS subregion extraction for long-read fungal metabarcoding.
build:
  number: 1
  run_exports:
  - itsxrust >=0.2.2,<0.3.0a0
extra:
  recipe-maintainers:
  - ayobi
package:
  name: itsxrust
  version: 0.2.2
requirements:
  build:
  - null
  - cargo-bundle-licenses
  host:
  - openssl
  run:
  - hmmer
source:
  sha256: 3e17ba8a5859acad18e3c13ef038c5e02caa0d9986eb12f19690c862608e51cf
  url: https://github.com/ayobi/ITSxRust/archive/refs/tags/v0.2.2.tar.gz
test:
  commands:
  - itsxrust --help
  - itsxrust extract --help
  - test -f "$PREFIX/share/itsxrust/hmm/F.hmm"
