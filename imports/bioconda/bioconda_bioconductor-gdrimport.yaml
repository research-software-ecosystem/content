about:
  description: The package is a part of the gDR suite. It helps to prepare raw drug
    response data for downstream processing. It mainly contains helper functions for
    importing/loading/validating dose-response data provided in different file formats.
  home: https://bioconductor.org/packages/3.22/bioc/html/gDRimport.html
  license: Artistic-2.0
  summary: Package for handling the import of dose-response data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gdrimport
  version: 1.8.1
requirements:
  host:
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-coregx >=2.14.0,<2.15.0
  - bioconductor-gdrutils >=1.8.0,<1.9.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-pharmacogx >=3.14.0,<3.15.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-assertthat
  - r-base
  - r-checkmate
  - r-data.table
  - r-futile.logger
  - r-magrittr
  - r-openxlsx
  - r-readxl
  - r-rio
  - r-stringi
  - r-tibble
  - r-xml
  - r-yaml
  run:
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-coregx >=2.14.0,<2.15.0
  - bioconductor-gdrutils >=1.8.0,<1.9.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-pharmacogx >=3.14.0,<3.15.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-assertthat
  - r-base
  - r-checkmate
  - r-data.table
  - r-futile.logger
  - r-magrittr
  - r-openxlsx
  - r-readxl
  - r-rio
  - r-stringi
  - r-tibble
  - r-xml
  - r-yaml
source:
  md5: 20900fe0523583b86fe5f1f34ab015d4
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/gDRimport_1.8.1.tar.gz
