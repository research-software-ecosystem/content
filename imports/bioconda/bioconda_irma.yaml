about:
  home: https://wonder.cdc.gov/amd/flu/irma/
  license: Apache Software License, Apache-2.0
  license_family: APACHE
  summary: 'IRMA: Iterative Refinement Meta-Assembler for the robust assembly, variant
    calling, and phasing of highly variable RNA viruses.'
build:
  binary_relocation: false
  noarch: generic
  number: 0
  run_exports:
  - null
package:
  name: irma
  version: 1.3.3
requirements:
  host:
  - perl
  run:
  - perl
  - r-base >=3.5.1
  - parallel >=20200422
  - pigz >=2.8
  - blat >=35
  - samtools >=1.21
  - minimap2 >=2.29
  - zip >=3.0
source:
  patches:
  - irma-check-dir-writable.patch
  sha256: a1435f11626147baf8d52578f520d1b7de67a283fcd9f6fe5b7ea66c548c22db
  url: https://github.com/CDCgov/irma/releases/download/v1.3.3/irma-v1.3.3-universal.zip
test:
  commands:
  - IRMA -h 2>&1  | grep -q "Usage"
  - LABEL -h 2>&1 | grep -q "Usage"
