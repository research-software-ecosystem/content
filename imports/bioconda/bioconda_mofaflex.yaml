about:
  dev_url: https://github.com/bioFAM/mofaflex
  doc_url: https://mofaflex.readthedocs.io/
  home: https://pypi.org/project/mofaflex/
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Versatile factor analysis framework for factor models for omics data
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
package:
  name: mofaflex
  version: 0.1.1
requirements:
  host:
  - python >=3.11
  - hatch-vcs
  - hatchling
  - pip
  run:
  - python >=3.11
  - anndata >=0.11
  - array-api-compat
  - dtw-python
  - gpytorch
  - h5py
  - mizani
  - mudata >=0.3.2
  - numpy
  - packaging
  - pandas
  - platformdirs
  - plotnine
  - pyro-ppl
  - scikit-learn
  - scipy >=1.8
  - session-info2
  - statsmodels
  - pytorch
  - tqdm
source:
  sha256: 19cb27a94fffc6d6e5fc64bb0c42680e67d756a796f2c315829896e57c9e9e39
  url: https://pypi.org/packages/source/m/mofaflex/mofaflex-0.1.1.tar.gz
test:
  commands:
  - pip check
  imports:
  - mofaflex
  requires:
  - pip
  - python
