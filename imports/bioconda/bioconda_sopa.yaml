about:
  doc_url: https://gustaveroussy.github.io/sopa
  home: https://gustaveroussy.github.io/sopa
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Spatial-omics pipeline and analysis
build:
  entry_points:
  - sopa = sopa.main:app
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - quentinblampey
package:
  name: sopa
  version: 2.2.5
requirements:
  host:
  - python >=3.11
  - hatchling
  - pip
  run:
  - python >=3.11
  - spatialdata >=0.7.2
  - spatialdata-io >=0.3.0
  - spatialdata-plot >=0.2.10
  - scanpy >=1.10.4
  - anndata >=0.11.0
  - igraph >=0.11.0
  - typer >=0.9.0
  - dask-core >=2024.4.1
source:
  sha256: 92fe595f23e415a64654c58153d34f1c2eb4e092d23780baee23708ca4d42e52
  url: https://pypi.org/packages/source/s/sopa/sopa-2.2.5.tar.gz
test:
  imports:
  - sopa
