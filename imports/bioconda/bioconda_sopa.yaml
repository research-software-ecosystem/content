about:
  doc_url: https://gustaveroussy.github.io/sopa
  home: https://gustaveroussy.github.io/sopa
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Spatial-omics pipeline and analysis
build:
  entry_points:
  - sopa = sopa.main:app
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - quentinblampey
package:
  name: sopa
  version: 2.2.2
requirements:
  host:
  - python >=3.11
  - hatchling
  - pip
  run:
  - python >=3.11
  - spatialdata >=0.7.2
  - spatialdata-io >=0.3.0
  - spatialdata-plot >=0.2.10
  - scanpy >=1.10.4
  - anndata >=0.11.0
  - igraph >=0.11.0
  - typer >=0.9.0
  - dask-core >=2024.4.1
source:
  sha256: dd0c645f9028f86f44a77045569ec1c6fe451f435d01822b31c04ca90c8baffb
  url: https://pypi.org/packages/source/s/sopa/sopa-2.2.2.tar.gz
test:
  imports:
  - sopa
