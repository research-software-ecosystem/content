  - spatialdata-plot >=0.2.10
  - scanpy >=1.10.4
  - anndata >=0.11.0
  - python-igraph >=1.0.0
  - typer >=0.9.0
  - dask-core >=2024.4.1
source:
  sha256: 132a72ea651cf276b112936535756cadd5b5180e879f390dd50c293e7cb61a03
  url: https://pypi.org/packages/source/s/sopa/sopa-2.2.8.tar.gz
test:
