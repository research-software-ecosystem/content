  home: https://prism-oncology.github.io/sopa
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Spatial-omics pipeline and analysis
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
