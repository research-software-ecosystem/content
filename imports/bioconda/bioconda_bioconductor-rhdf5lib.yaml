about:
  description: Provides C and C++ hdf5 libraries.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rhdf5lib.html
  license: Artistic-2.0
  summary: hdf5 library as an R package
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
