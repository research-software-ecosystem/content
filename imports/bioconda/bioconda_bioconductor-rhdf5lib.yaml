  - r-base
source:
  md5: 3d99201552c1f32a3054e23f727daf28
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rhdf5lib_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rhdf5lib/Rhdf5lib_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/Rhdf5lib_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rhdf5lib/bioconductor-rhdf5lib_1.32.0_src_all.tar.gz
