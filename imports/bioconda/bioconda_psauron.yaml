about:
  doc_url: https://github.com/salzberg-lab/PSAURON
  home: https://github.com/salzberg-lab/PSAURON
  license: MIT License
  license_family: MIT
  license_file: LICENSE.txt
  summary: 'PSAURON: a machine learning model for rapid assessment of protein coding
    gene annotation'
build:
  entry_points:
  - psauron = psauron.psauron:eye_of_psauron
  noarch: python
  number: 0
  run_exports:
  - null
  script: python -m pip install . -vv --no-deps --no-build-isolation
extra:
  identifiers:
  - doi:10.1093/nargab/lqae189
package:
  name: psauron
  version: 1.1.3
requirements:
  host:
  - python >=3.9,<3.13
  - pip
  run:
  - python >=3.9,<3.13
  - pytorch >=2.1.2
  - torchvision >=0.16.2
  - torchaudio >=2.1.2
  - typing_extensions >=4.9.0
  - tqdm >=4.66.1
  - scipy >=1.10.1
  - numpy >=1.24.4,<2
  - pandas
  - setuptools
source:
  sha256: 4bd79151585facddf03de54632d84b24b08d1c842e28f40f5902a7ce9a242a8f
  url: https://github.com/salzberg-lab/PSAURON/archive/refs/tags/v1.1.3.tar.gz
test:
  commands:
  - pip check
  - psauron --help
  requires:
  - pip
