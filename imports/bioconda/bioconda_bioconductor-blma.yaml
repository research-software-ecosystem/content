about:
  description: Suit of tools for bi-level meta-analysis. The package can be used in
    a wide range of applications, including general hypothesis testings, differential
    expression analysis, functional analysis, and pathway analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/BLMA.html
  license: GPL (>=2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: 'BLMA: A package for bi-level meta-analysis'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-blma
  version: 1.34.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-padog >=1.52.0,<1.53.0
  - bioconductor-rontotools >=2.38.0,<2.39.0
  - r-base
  - r-gsa
  - r-metafor
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-padog >=1.52.0,<1.53.0
  - bioconductor-rontotools >=2.38.0,<2.39.0
  - r-base
  - r-gsa
  - r-metafor
source:
  md5: 859ff084ae48006cbc83f46b39f13393
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BLMA_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BLMA/BLMA_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/BLMA_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-blma/bioconductor-blma_1.34.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('BLMA')"
