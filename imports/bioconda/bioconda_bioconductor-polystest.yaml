about:
  description: The complexity of high-throughput quantitative omics experiments often
    leads to low replicates numbers and many missing values. We implemented a new
    test to simultaneously consider missing values and quantitative changes, which
    we combined with well-performing statistical tests for high confidence detection
    of differentially regulated features. The package contains functions to run the
    test and to visualize the results.
  home: https://bioconductor.org/packages/3.22/bioc/html/PolySTest.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: 'PolySTest: Detection of differentially regulated features. Combined statistical
    testing for data with few replicates and missing values'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-polystest
  version: 1.4.0
