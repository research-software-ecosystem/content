about:
  dev_url: https://github.com/grunwaldlab/heattree
  home: https://github.com/grunwaldlab/heattree
  license: MIT
  license_family: MIT
  summary: A wrapper for the javascript `heat-tree` package for interactive phylogenetic
    tree visualization widgets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports:
  - null
  script: ${R} CMD INSTALL --build . ${R_ARGS}
package:
  name: r-heattree
  version: 0.3.1
requirements:
  host:
  - r-base
  - r-ape
  - r-htmlwidgets
  run:
  - r-base
  - r-ape
  - r-htmlwidgets
source:
  sha256: 3c66b3c8f3f52cccdf15da526ca249d8edeee2bbb18adaa1c8f6eab953ac182e
  url: https://github.com/grunwaldlab/heattree/archive/v0.3.1.tar.gz
test:
  commands:
  - $R -e "library('heattree')"
