about:
  description: EpiDISH is a R package to infer the proportions of a priori known cell-types
    present in a sample representing a mixture of such cell-types. Right now, the
    package can be used on DNAm data of blood-tissue of any age, from birth to old-age,
    generic epithelial tissue and breast tissue. Besides, the package provides a function
    that allows the identification of differentially methylated cell-types and their
    directionality of change in Epigenome-Wide Association Studies.
  home: https://bioconductor.org/packages/3.22/bioc/html/EpiDISH.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Epigenetic Dissection of Intra-Sample-Heterogeneity
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-epidish
  version: 2.26.0
requirements:
  host:
  - r-base
  - r-e1071
  - r-locfdr
  - r-mass
  - r-matrix
  - r-matrixstats
  - r-quadprog
  - r-stringr
  run:
  - r-base
  - r-e1071
  - r-locfdr
  - r-mass
  - r-matrix
  - r-matrixstats
  - r-quadprog
  - r-stringr
