about:
  description: "HMP16SData is a Bioconductor ExperimentData package of the Human Microbiome\
    \ Project (HMP) 16S rRNA sequencing data for variable regions 1\u20133 and 3\u2013\
    5. Raw data files are provided in the package as downloaded from the HMP Data\
    \ Analysis and Coordination Center. Processed data is provided as SummarizedExperiment\
    \ class objects via ExperimentHub."
  home: https://bioconductor.org/packages/3.22/data/experiment/html/HMP16SData.html
  license: Artistic-2.0
  summary: 16S rRNA Sequencing Data from the Human Microbiome Project
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hmp16sdata
  version: 1.30.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-assertthat
  - r-base
  - r-dplyr
  - r-kableextra
  - r-knitr
  - r-magrittr
  - r-readr
  - r-stringr
  - r-tibble
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-assertthat
  - r-base
  - r-dplyr
  - r-kableextra
  - r-knitr
  - r-magrittr
  - r-readr
  - r-stringr
  - r-tibble
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 59a2af07d9a34892d9187eb8a82eca20
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HMP16SData_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HMP16SData/HMP16SData_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/HMP16SData_1.30.0.tar.gz
