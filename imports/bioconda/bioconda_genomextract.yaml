about:
  home: https://github.com/kevinkarbstein/GenomeXtract
  license: GPL-3.0-only
  license_file: LICENSE.txt
  summary: GenomeXtract - A toolkit to easily find, compare, and assemble NCBI genomes.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-build-isolation --no-deps -vvv'
package:
