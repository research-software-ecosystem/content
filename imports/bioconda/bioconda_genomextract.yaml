about:
  home: https://github.com/kevinkarbstein/GenomeXtract
  license: GPL-3.0-only
  license_file: LICENSE.txt
  summary: GenomeXtract - A toolkit to easily find, compare, and assemble NCBI genomes.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-build-isolation --no-deps -vvv'
package:
  name: genomextract
  version: 0.2.2
requirements:
  build: null
  host:
  - python >=3.6
  - pip
  - setuptools
  run:
  - python >=3.6
  - biopython
  - pandas
  - requests
  - openpyxl
  - ncbi-datasets-cli ==18.9.0
  - raxml-ng ==1.2.2
  - iqtree ==3.0.1
  - mafft ==7.525
  - astral-tree ==5.7.8
  - blast ==2.17.0
  - mash ==2.3
source:
  sha256: 93e39f075c257c68decfe863746ce9d524c9135c59a44001475ce86e94d28d33
  url: https://github.com/kevinkarbstein/GenomeXtract/archive/v0.2.2.tar.gz
test:
  commands:
  - findGenome --help
  - findClosestGenome --help
  - assembleOrgGenome --help
  - assembleOrgGenes --help
