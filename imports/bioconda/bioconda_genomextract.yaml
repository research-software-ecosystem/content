  - python >=3.6
  - biopython
  - pandas
  - requests
  - openpyxl
  - ncbi-datasets-cli ==18.9.0
  - raxml-ng ==1.2.2
  - iqtree ==3.0.1
  - mafft ==7.525
  - astral-tree ==5.7.8
source:
  sha256: 4cffc3ca7628309bcfdd655f64ad167ade56b0ad8c47aae9493aa24f8d5ca0c9
  url: https://github.com/kevinkarbstein/GenomeXtract/archive/v0.1.7.tar.gz
test:
  commands:
  - findGenome --help
  - findClosestGenome --help
  - assembleOrgGenome --help
  - assembleOrgGenes --help
