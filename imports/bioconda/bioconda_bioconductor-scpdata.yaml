about:
  description: The package disseminates mass spectrometry (MS)-based single-cell proteomics
    (SCP) datasets. The data were collected from published work and formatted using
    the `scp` data structure. The data sets contain quantitative information at spectrum,
    peptide and/or protein level for single cells or minute sample amounts.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/scpdata.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Single-Cell Proteomics Data Package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scpdata
  version: 1.18.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-qfeatures >=1.20.0,<1.21.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-qfeatures >=1.20.0,<1.21.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: d24e6b514a2a9556695ef42000d3c782
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/scpdata_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/scpdata/scpdata_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/scpdata_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-scpdata/bioconductor-scpdata_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('scpdata')"
