about:
  dev_url: https://github.com/pirl-unc/mhcgnomes
  doc_url: https://pirl-unc.github.io/mhcgnomes
  home: https://github.com/pirl-unc/mhcgnomes
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Python library for parsing MHC nomenclature in the wild.
build:
  entry_points:
  - mhcgnomes = mhcgnomes.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - jonasscheid
package:
  name: mhcgnomes
  version: 3.32.0
requirements:
  host:
  - pip
  - python >=3.9
  - setuptools
  run:
  - numpy
  - pandas
  - python >=3.9
  - pyyaml >=5.4
  - serializable
source:
  sha256: f5a2524fd8c19cb7903091d7424da4bf461de86ff496c80084c459f7c5274481
  url: https://pypi.org/packages/source/m/mhcgnomes/mhcgnomes-3.32.0.tar.gz
test:
  commands:
  - mhcgnomes --help
  imports:
  - mhcgnomes
