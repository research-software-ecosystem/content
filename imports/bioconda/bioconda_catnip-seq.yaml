about:
  home: https://github.com/CIBIO-BU/catnip
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Explore nucleotide divergence and sequence resolution across user-defined
    categories.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - camilababo
package:
  name: catnip-seq
  version: 0.1.10
requirements:
  host:
  - python >=3.9
  - setuptools >=45
  - wheel
  - pip
  run:
  - python >=3.9
  - pysam
  - pandas
  - numpy
  - cd-hit
  - bowtie2
  - samtools
source:
  sha256: 9a09af1d2130aa55c7bdda9d9f2e1f332b46fea16f2307e94ac9c1ad24e77bc1
  url: https://pypi.org/packages/source/c/catnip-seq/catnip_seq-0.1.10.tar.gz
test:
  commands:
  - pip check
  - catnip --help
  imports:
  - catnip
  requires:
  - pip
  - python
