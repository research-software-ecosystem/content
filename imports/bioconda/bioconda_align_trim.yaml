about:
  dev_url: https://github.com/artic-network/align_trim
  doc_url: https://github.com/artic-network/align_trim/blob/main/README.md
  home: https://github.com/artic-network/align_trim
  license: MIT
  license_family: MIT
  license_file: LICENSE
  recipe-maintainers:
  - Biowilko
  - ChrisgKent
  summary: 'ARTIC align_trim: A tool for trimming amplicon sequencing primers from
    aligned reads.'
build:
  entry_points:
  - align_trim = align_trim.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
package:
  name: align_trim
  version: 1.1.0
requirements:
  host:
  - python >=3.9
  - pip
  - hatchling
  run:
  - python >=3.9
  - numpy
  - pysam
  - primalbedtools >=0.10.1
source:
  sha256: da67f88a3c75afa9beb20c01d7063fffd009f6add1ae3154a5852642dece317c
  url: https://github.com/artic-network/align_trim/archive/1.1.0.tar.gz
test:
  commands:
  - align_trim --help
