about:
  home: https://pypi.org/project/markerrepo/
  license: MIT
  license_file: LICENSE
  summary: A tool for marker list management and annotation in the single cell context.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - hschult
package:
  name: markerrepo
  version: 0.1.6
requirements:
  host:
  - python
  - setuptools >=77.0.3
  - pip
  run:
  - python
  - pandas >=1.5.3
  - numpy
  - matplotlib-base >=3.7.1
  - seaborn >=0.12.2
  - pyyaml >=6.0
  - gitpython
  - scikit-learn >=1.2.2
  - apybiomart
  - scanpy
  - intervaltree
  - ipython
  - requests
source:
  sha256: 96b0843ef6efa49a7fa00c71ff7cde76569f1a151c715b60b1ac2c7722c6f19a
  url: https://pypi.org/packages/source/m/markerRepo/markerrepo-0.1.6.tar.gz
test:
  commands:
  - pip check
  imports:
  - markerrepo
  requires:
  - pip
