about:
  description: Functions for handling data from Bioconductor Affymetrix annotation
    data packages. Produces compact HTML and text reports including experimental data
    and URL links to many online databases. Allows searching biological metadata using
    various criteria.
  home: https://bioconductor.org/packages/3.22/bioc/html/annaffy.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Annotation tools for Affymetrix biological metadata
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:annaffy
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-annaffy
    path: recipes/bioconductor-annaffy
    version: 1.52.0
package:
  name: bioconductor-annaffy
  version: 1.82.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - r-base
  - r-biocmanager
  - r-dbi
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-go.db >=3.22.0,<3.23.0
  - r-base
  - r-biocmanager
  - r-dbi
source:
  md5: 053d4bf1d8d7514224a1e6e5ce8b44d9
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/annaffy_1.82.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/annaffy/annaffy_1.82.0.tar.gz
  - https://bioarchive.galaxyproject.org/annaffy_1.82.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-annaffy/bioconductor-annaffy_1.82.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('annaffy')"
