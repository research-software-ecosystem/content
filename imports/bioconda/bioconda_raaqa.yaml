about:
  home: https://github.com/kuzsam/raaqa
  license: MIT
  license_file: LICENSE
  summary: Read Alignment-based Assembly Quality Assessment
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - kuzsam
package:
  name: raaqa
  version: 0.3.0
requirements:
  host:
  - python >=3.10,<3.14
  - pip
  - setuptools
  run:
  - python >=3.10,<3.14
  - pysam >=0.22.0
  - matplotlib-base >=3.8
  - pandas >=2.0
  - numpy >=1.26
source:
  sha256: 74ec0ece8b894c8d7b3c12b58ede383194e750e5686fa2fdce9cafc1da7de600
  url: https://github.com/kuzsam/raaqa/archive/refs/tags/v0.3.0.tar.gz
test:
  commands:
  - visualise --help
  - mapq_softclip --help
