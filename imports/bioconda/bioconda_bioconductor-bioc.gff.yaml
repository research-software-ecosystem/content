about:
  description: Parse GFF and GTF files using C++ classes. The package also provides
    utilities to read and write GFF3 files. The GFF (General Feature Format) format
    is a tab-delimited file format for describing genes and other features of DNA,
    RNA, and protein sequences. GFF files are often used to describe the features
    of genomes.
  home: https://bioconductor.org/packages/3.22/bioc/html/Bioc.gff.html
  license: Artistic-2.0
  summary: Read and write GFF and GTF files
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bioc.gff
  version: 1.0.0
requirements:
