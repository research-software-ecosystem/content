about:
  description: R package providing functions to perform geneset significance analysis
    over simple cross-sectional data between 2 and 5 phenotypes of interest.
  home: https://bioconductor.org/packages/3.22/bioc/html/BAGS.html
  license: Artistic-2.0
  summary: A Bayesian Approach for Geneset Selection
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bags
  version: 2.50.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-breastcancervdx >=1.48.0,<1.49.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-breastcancervdx >=1.48.0,<1.49.0
  - r-base
source:
  md5: 8b4495813d2b53e9fbd50ffae5e8ce24
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BAGS_2.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BAGS/BAGS_2.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/BAGS_2.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bags/bioconductor-bags_2.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('BAGS')"
