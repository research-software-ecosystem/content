about:
  description: Tools for analyzing SingleCellExperiment objects as projects. for input
    into the chevreulShiny app downstream. Includes functions for analysis of single
    cell RNA sequencing data. Supported by NIH grants R01CA137124 and R01EY026661
    to David Cobrinik.
  home: https://bioconductor.org/packages/3.22/bioc/html/chevreulProcess.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Tools for managing SingleCellExperiment objects as projects
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-chevreulprocess
  version: 1.2.0
requirements:
  host:
  - bioconductor-batchelor >=1.26.0,<1.27.0
  - bioconductor-bluster >=1.20.0,<1.21.0
  - bioconductor-ensdb.hsapiens.v86 >=2.99.0,<2.100.0
  - bioconductor-ensembldb >=2.34.0,<2.35.0
  - bioconductor-genomicfeatures >=1.62.0,<1.63.0
  - bioconductor-megadepth >=1.20.0,<1.21.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scater >=1.38.0,<1.39.0
  - bioconductor-scran >=1.38.0,<1.39.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - r-circlize
  - r-cluster
  - r-dbi
  - r-dplyr
  - r-fs
  - r-glue
  - r-purrr
  - r-rsqlite
  - r-stringr
  - r-tibble
  - r-tidyr
  - r-tidyselect
  run:
  - bioconductor-batchelor >=1.26.0,<1.27.0
  - bioconductor-bluster >=1.20.0,<1.21.0
