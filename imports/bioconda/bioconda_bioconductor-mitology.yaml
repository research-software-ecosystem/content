about:
  description: mitology allows to study the mitochondrial activity throught high-throughput
    RNA-seq data. It is based on a collection of genes whose proteins localize in
    to the mitochondria. From these, mitology provides a reorganization of the pathways
    related to mitochondria activity from Reactome and Gene Ontology. Further a ready-to-use
    implementation of MitoCarta3.0 pathways is included.
  home: https://bioconductor.org/packages/3.22/bioc/html/mitology.html
  license: AGPL-3
  license_file: /lib/R/share/licenses/AGPL-3
  summary: Study of mitochondrial activity from RNA-seq data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mitology
  version: 1.2.0
