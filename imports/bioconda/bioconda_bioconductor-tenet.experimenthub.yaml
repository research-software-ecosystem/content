about:
  description: ExperimentHub package containing datasets for use in the TENET package's
    vignette and function examples. These include a variety of different objects to
    illustrate different datasets used in TENET functions. Where applicable, all datasets
    are aligned to the hg38 human genome.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/TENET.ExperimentHub.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Experiment data for the TENET package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tenet.experimenthub
  version: 1.2.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2 >=4.0
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2 >=4.0
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 0f8c9341a86697b49ed969e879d24e45
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/TENET.ExperimentHub_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TENET.ExperimentHub/TENET.ExperimentHub_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/TENET.ExperimentHub_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tenet.experimenthub/bioconductor-tenet.experimenthub_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TENET.ExperimentHub')"
