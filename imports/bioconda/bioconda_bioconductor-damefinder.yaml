about:
  description: '''DAMEfinder'' offers functionality for taking methtuple or bismark
    outputs to calculate ASM scores and compute DAMEs. It also offers nice visualization
    of methyl-circle plots.'
  home: https://bioconductor.org/packages/3.22/bioc/html/DAMEfinder.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Finds DAMEs - Differential Allelicly MEthylated regions
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-damefinder
  version: 1.22.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bumphunter >=1.52.0,<1.53.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-cowplot
  - r-ggplot2
  - r-plyr
  - r-readr
  - r-reshape2
  - r-stringr
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bumphunter >=1.52.0,<1.53.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-cowplot
  - r-ggplot2
  - r-plyr
  - r-readr
  - r-reshape2
  - r-stringr
source:
  md5: 3b76b5dd18766eabee123a89252bfb48
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/DAMEfinder_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DAMEfinder/DAMEfinder_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/DAMEfinder_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-damefinder/bioconductor-damefinder_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('DAMEfinder')"
