about:
  dev_url: https://github.com/openvax/pyensembl
  home: https://github.com/openvax/pyensembl
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Python interface to ensembl reference genome metadata.
build:
  entry_points:
  - pyensembl = pyensembl.shell:run
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
package:
  name: pyensembl
  version: 2.6.2
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - typechecks >=0.0.2
  - numpy >=2.0.0
  - pandas >=0.15
  - datacache >=1.1.4
  - memoized-property >=1.0.2
  - six >=1.9.0
  - gtfparse >=2.5.0
  - serializable
  - tinytimer
  - pylint >=1.4.4
  - python-dateutil >=2.5.0
source:
  sha256: dd0cb9efdbad67178d635b5fcdea65450a5f8836ccc612bc0f149b31ba9b08cf
  url: https://pypi.org/packages/source/p/pyensembl/pyensembl-2.6.2.tar.gz
test:
  commands:
  - pyensembl --help
  imports:
  - pyensembl
