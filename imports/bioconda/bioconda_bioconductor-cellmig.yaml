about:
  description: High-throughput cell imaging facilitates the analysis of cell migration
    across many wells treated under different biological conditions. These workflows
    generate considerable technical noise and biological variability, and therefore
    technical and biological replicates are necessary, leading to large, hierarchically
    structured datasets, i.e., cells are nested within technical replicates that are
    nested within biological replicates. Current statistical analyses of such data
    usually ignore the hierarchical structure of the data and fail to explicitly quantify
    uncertainty arising from technical or biological variability. To address this
    gap, we present cellmig, an R package implementing Bayesian hierarchical models
    for migration analysis. cellmig quantifies condition- specific velocity changes
    (e.g., drug effects) while modeling nested data structures and technical artifacts.
    It further enables synthetic data generation for experimental design optimization.
  home: https://bioconductor.org/packages/3.22/bioc/html/cellmig.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Uncertainty-aware quantitative analysis of high-throughput live cell migration
    data
