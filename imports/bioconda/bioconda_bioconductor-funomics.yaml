about:
  description: The 'funOmics' package ggregates or summarizes omics data into higher
    level functional representations such as GO terms gene sets or KEGG metabolic
    pathways. The aggregated data matrix represents functional activity scores that
    facilitate the analysis of functional molecular sets while allowing to reduce
    dimensionality and provide easier and faster biological interpretations. Coordinated
    functional activity scores can be as informative as single molecules!
  home: https://bioconductor.org/packages/3.22/bioc/html/funOmics.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Aggregating Omics Data into Higher-Level Functional Representations
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-funomics
  version: 1.4.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-pathifier >=1.48.0,<1.49.0
  - r-base
  - r-dplyr
  - r-nmf
  - r-stringr
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-pathifier >=1.48.0,<1.49.0
  - r-base
  - r-dplyr
  - r-nmf
  - r-stringr
