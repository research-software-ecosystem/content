about:
  dev_url: https://github.com/cov-lineages/pango-designation
  home: https://github.com/cov-lineages/pango-designation
  license: CC-BY-NC-4.0
  license_file: LICENSE.md
  summary: Repository for suggesting new lineages that should be added to the current
    scheme.
build:
  entry_points:
  - pango_designation = pango_designation.command:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation --no-cache-dir -vvv .
extra:
  recipe-maintainers:
  - corneliusroemer
package:
  name: pango-designation
  version: '1.38'
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools <82
  run:
  - python >=3.7
source:
  sha256: a4e57026376fccab7aa480bcfb5365574ddbc5ed63935553f6b3a5429c898b31
  url: https://github.com/cov-lineages/pango-designation/archive/refs/tags/v1.38.tar.gz
test:
  imports:
  - pango_designation
