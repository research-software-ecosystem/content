about:
  dev_url: https://github.com/cov-lineages/pango-designation
  home: https://github.com/cov-lineages/pango-designation
  license: CC-BY-NC-4.0
  license_file: LICENSE.md
  summary: Repository for suggesting new lineages that should be added to the current
    scheme.
build:
  entry_points:
  - pango_designation = pango_designation.command:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation --no-cache-dir -vvv .
extra:
  recipe-maintainers:
  - corneliusroemer
package:
  name: pango-designation
  version: '1.39'
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools <82
  run:
  - python >=3.7
source:
  sha256: 934856c072c25c89a52587e1152bf1def9233790b7b60dc6d97bcb25f00f2f4f
  url: https://github.com/cov-lineages/pango-designation/archive/refs/tags/v1.39.tar.gz
test:
  imports:
  - pango_designation
