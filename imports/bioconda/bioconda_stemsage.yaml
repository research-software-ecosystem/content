about:
  description: 'Stemage is a tool for uncovering stem-loop motifs from RBP binding
    regions.

    '
  dev_url: https://github.com/PrinceWang2018/stemsage
  home: https://github.com/PrinceWang2018/stemsage
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Uncovering Stem-loop Motifs from RBP Binding Regions.
build:
  entry_points:
  - stemsage = stemsage.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-build-isolation --no-cache-dir --no-deps -vvv
extra:
  recipe-maintainers:
  - PrinceWang2018
package:
  name: stemsage
  version: 0.8.8
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - numpy >=1.21.0
  - pandas >=1.3.0
  - scikit-learn >=1.0.0
  - xgboost >=1.5.0
  - matplotlib-base >=3.5.0
  - seaborn-base >=0.11.0
  - biopython >=1.79
  - scipy >=1.7.0
  - statsmodels >=0.13.0
  - tqdm >=4.62.0
  - joblib >=1.1.0
  - python-levenshtein >=0.20.0
  - jinja2 >=3.0.0
  - logomaker >=0.8
  - viennarna >=2.7.2
  - cairosvg >=2.7.1
  - cairo
  - pango
source:
  sha256: 1d8327109866d131f295580bed977db5e411b4c4a589fc7c44e5013122f7b7b1
  url: https://pypi.org/packages/source/s/stemsage/stemsage-0.8.8.tar.gz
test:
  commands:
  - stemsage --help
  imports:
  - stemsage
  - stemsage.steps
