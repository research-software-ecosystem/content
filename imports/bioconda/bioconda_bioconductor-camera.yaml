  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rbgl >=1.86.0,<1.87.0
  - bioconductor-xcms >=4.8.0,<4.9.0
  - r-base
  - r-hmisc
  - r-igraph
source:
  md5: fe342c0af7bd42be4897399d9857ba9e
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CAMERA_1.66.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CAMERA/CAMERA_1.66.0.tar.gz
  - https://bioarchive.galaxyproject.org/CAMERA_1.66.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-camera/bioconductor-camera_1.66.0_src_all.tar.gz
