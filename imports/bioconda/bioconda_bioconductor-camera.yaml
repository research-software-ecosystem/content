about:
  description: Annotation of peaklists generated by xcms, rule based annotation of
    isotopes and adducts, isotope validation, EIC correlation based tagging of unknown
    adducts and fragments
  home: https://bioconductor.org/packages/3.22/bioc/html/CAMERA.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Collection of annotation related methods for mass spectrometry data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:camera
  parent_recipe:
    name: bioconductor-camera
    path: recipes/bioconductor-camera
    version: 1.38.0
package:
  name: bioconductor-camera
  version: 1.66.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rbgl >=1.86.0,<1.87.0
  - bioconductor-xcms >=4.8.0,<4.9.0
  - r-base
  - r-hmisc
  - r-igraph
