about:
  dev_url: https://github.com/maplesond/portcullis
  doc_url: https://ei-corebioinformatics.github.io/portcullis
  home: https://github.com/maplesond/portcullis
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: COPYING
  summary: Splice junction analysis and filtering from BAM files.
build:
  entry_points:
  - junctools = junctools.__main__:main
  - portcullis_rule_filter = portcullis.rule_filter:main
  number: 5
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: portcullis
  version: 1.2.4
requirements:
  build:
  - make
  - null
  - null
  - autoconf
  - automake
  - libtool
  - pkg-config
  - gnuconfig
  host:
  - python
  - pip
  - setuptools <82
  - boost-cpp
  - samtools >=1.9
  - zlib
  - pandas
  - sphinx
  run:
  - python
  - boost-cpp
  - tabulate
  - sphinx
  - matplotlib-base
  - numpy
  - pandas
  - samtools >=1.9
  - setuptools <82
source:
  patches:
  - 0001-boost-leaf.patch
  - 0002-ax_python_devel.patch
  - 0003-src.patch
  - 0004-python_helper.patch
  - m64.patch
  sha256: 9183c4e8108af1e813dbc35e537e16e5d0e13f53ed4c0a36b182c3f8bfcea438
  url: https://github.com/EI-CoreBioinformatics/portcullis/archive/refs/tags/Release-1.2.4.tar.gz
test:
  commands:
  - portcullis --version
  - junctools --help
