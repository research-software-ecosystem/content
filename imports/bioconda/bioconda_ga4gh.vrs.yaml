about:
  dev_url: https://github.com/ga4gh/vrs-python
  home: https://vrs.ga4gh.org
  license: Apache-2.0
  license_file: LICENSE
  summary: GA4GH Variation Representation Specification (VRS) reference implementation
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - emmcauley
package:
  name: ga4gh.vrs
  version: 2.3.2
requirements:
  host:
  - python >=3.10
  - setuptools >=65.3
  - setuptools-scm >=8
  - pip
  run:
  - python >=3.10
  - click
  - pydantic >=2.1,<3.dev0
  - pysam
  - bioutils >=0.6
  - biocommons.seqrepo >=0.5.1
  - dill
  - hgvs >=1.5.5,<2.0
  - requests
  - canonicaljson
  - typing_extensions
source:
  sha256: 50647d14d53235bbc4483be8631821808f6b9f4ab42bbe9623f2c096179c08be
  url: https://pypi.org/packages/source/g/ga4gh.vrs/ga4gh_vrs-2.3.2.tar.gz
test:
  commands:
  - vrs-annotate --help
  imports:
  - ga4gh
