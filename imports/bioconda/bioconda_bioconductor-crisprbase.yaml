about:
  description: Provides S4 classes for general nucleases, CRISPR nucleases, CRISPR
    nickases, and base editors.Several CRISPR-specific genome arithmetic functions
    are implemented to help extract genomic coordinates of spacer and protospacer
    sequences. Commonly-used CRISPR nuclease objects are provided that can be readily
    used in other packages. Both DNA- and RNA-targeting nucleases are supported.
  home: https://bioconductor.org/packages/3.22/bioc/html/crisprBase.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Base functions and classes for CRISPR gRNA design
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-crisprbase
  version: 1.14.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-stringr
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-stringr
source:
  md5: 1681268546bcdabc6a43e708537928ae
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/crisprBase_1.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/crisprBase/crisprBase_1.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/crisprBase_1.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-crisprbase/bioconductor-crisprbase_1.14.0_src_all.tar.gz
test:
