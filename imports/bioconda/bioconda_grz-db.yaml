about:
  home: https://github.com/BfArM-MVH/grz-tools
  license: MIT
  summary: SQL models for grz-cli and grz-watchdog
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - tedil
  - Hoeze
package:
  name: grz-db
  version: 2.1.1
requirements:
  host:
  - python >=3.12
  - hatchling
  - pip
  run:
  - alembic >=1.16.1
  - cryptography >=45.0.3
  - sqlmodel >=0.0.27
  - grz-pydantic-models >=2.7,<3
  - psycopg >=3.2,<4
source:
  sha256: 21fb7e069e2f1d89b9408d5cb20d15038f7a4d9190fa53d2c5594645912d174f
  url: https://pypi.org/packages/source/g/grz-db/grz_db-2.1.1.tar.gz
test:
  commands:
  - pip check
  imports:
  - grz_db
  requires:
  - pip
