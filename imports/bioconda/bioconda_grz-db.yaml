about:
  home: https://github.com/BfArM-MVH/grz-tools
  license: MIT
  summary: SQL models for grz-cli and grz-watchdog
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - tedil
  - Hoeze
package:
  name: grz-db
  version: 2.0.0
requirements:
  host:
  - python >=3.12
  - hatchling
  - pip
  run:
  - alembic >=1.16.1
  - cryptography >=45.0.3
  - sqlmodel >=0.0.24
  - grz-pydantic-models >=2.6,<3
  - psycopg >=3.2,<4
source:
  sha256: 5ec0ef95d4e42b6450934c27b51e36d2b2f91119a4a7f027dc424bba53f72500
  url: https://pypi.org/packages/source/g/grz-db/grz_db-2.0.0.tar.gz
test:
  commands:
  - pip check
  imports:
  - grz_db
  requires:
  - pip
