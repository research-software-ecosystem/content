about:
  dev_url: https://github.com/LucoDevro/CAGEcleaner
  doc_url: https://github.com/LucoDevro/CAGEcleaner/wiki
  home: https://github.com/LucoDevro/CAGEcleaner
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Tool to find gene clusters using protein structure similarity
build:
  entry_points:
  - cfoldseeker = cfoldseeker.main:main
  - cfoldseeker-cds = cfoldseeker.build_cds_db:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vvv --no-build-isolation --no-cache-dir'
extra:
  recipe-maintainers:
  - LucoDevro
package:
  name: cfoldseeker
  version: 0.1.0
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - biopython
  - cblaster >=1.4.0
  - polars >=1.0.0
  - foldseek
  - networkx
  - requests
  - tqdm
  - kegg_pull
source:
  sha256: d5a395ca1615573919af920011a1e6bbd877103296e8739fdc494f7f8229bf37
  url: https://pypi.org/packages/source/c/cfoldseeker/cfoldseeker-0.1.0.tar.gz
test:
  commands:
  - cfoldseeker -h
