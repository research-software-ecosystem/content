about:
  description: Experiment data package. Contains microarray data from several large
    expression compendia that have been pre-processed for use with the CellMapper
    package. This pre-processed data is recommended for routine searches using the
    CellMapper package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/CellMapperData.html
  license: Artistic-2.0
  summary: Pre-processed data for use with the CellMapper package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cellmapperdata
  version: 1.36.0
requirements:
  host:
  - bioconductor-cellmapper >=1.36.0,<1.37.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-cellmapper >=1.36.0,<1.37.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 2bae6c728f262cf6810e80c0757fe9f2
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/CellMapperData_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CellMapperData/CellMapperData_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/CellMapperData_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cellmapperdata/bioconductor-cellmapperdata_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CellMapperData')"
