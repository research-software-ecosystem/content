about:
  dev_url: https://github.com/kennethabarr/CrossFilt
  home: https://github.com/kennethabarr/CrossFilt
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Tools to filter reads causing alignment bias in cross-species genomic comparisons.
build:
  entry_points:
  - crossfilt-lift = crossfilt.liftover_bam:main
  - crossfilt-split = crossfilt.split_bam:main
  - crossfilt-filter = crossfilt.identical_reads:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - kennethabarr
package:
  name: crossfilt
  version: 0.3.2
requirements:
  host:
  - python >=3.10
  - setuptools >=77.0.3
  - pip
  run:
  - python >=3.10
  - bx-python
  - pysam
  - intervaltree
source:
  sha256: e0ef439568636fccc231543d568d82ba870e3556179ab2bd3edeb970cf18298b
  url: https://pypi.org/packages/source/c/crossfilt/crossfilt-0.3.2.tar.gz
test:
  commands:
  - crossfilt-lift --help
  - crossfilt-split --help
  - crossfilt-filter --help
  imports:
  - crossfilt
