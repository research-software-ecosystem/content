about:
  description: The core functionality of the package is to provide coordinates of
    genes on the BioCarta pathway images and to provide methods to add self-defined
    graphics to the genes of interest.
  home: https://bioconductor.org/packages/3.22/bioc/html/BioCartaImage.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: BioCarta Pathway Images
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biocartaimage
  version: 1.8.1
requirements:
  host:
  - r-base
  - r-magick
  run:
  - r-base
  - r-magick
source:
  md5: 49f1ffa88e2cf7aacd4f210807022850
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BioCartaImage_1.8.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BioCartaImage/BioCartaImage_1.8.1.tar.gz
  - https://bioarchive.galaxyproject.org/BioCartaImage_1.8.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biocartaimage/bioconductor-biocartaimage_1.8.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('BioCartaImage')"
