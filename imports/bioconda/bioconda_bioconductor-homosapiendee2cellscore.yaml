about:
  description: This is a data package for normalised homosapien data downloaded from
    DEE2. The package both downloads, normalises, and filters the data, and provides
    a way to access the data from a canonical store without needing local processing.
    This package was built as a way to generate and store canonical test data for
    CellScore.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/homosapienDEE2CellScore.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Example Data Package for CellScore
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-homosapiendee2cellscore
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-getdee2 >=1.20.0,<1.21.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-rtsne >=0.15
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-getdee2 >=1.20.0,<1.21.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-rtsne >=0.15
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 8b2d4fffa0b17c9dcdbeea130e60916b
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/homosapienDEE2CellScore_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/homosapienDEE2CellScore/homosapienDEE2CellScore_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/homosapienDEE2CellScore_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-homosapiendee2cellscore/bioconductor-homosapiendee2cellscore_1.6.0_src_all.tar.gz
test:
