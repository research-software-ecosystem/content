about:
  description: The ribor package provides an R Interface for .ribo files. It provides
    functionality to read the .ribo file, which is of HDF5 format, and performs common
    analyses on its contents.
  home: https://bioconductor.org/packages/3.22/bioc/html/ribor.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: An R Interface for Ribo Files
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ribor
  version: 1.22.0
requirements:
  host:
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-hash
  - r-rlang
  - r-tidyr
  - r-yaml
  run:
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-hash
  - r-rlang
  - r-tidyr
  - r-yaml
source:
  md5: f9aeaa433be4b1550ed02e6ef2e8a898
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ribor_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ribor/ribor_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/ribor_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ribor/bioconductor-ribor_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ribor')"
