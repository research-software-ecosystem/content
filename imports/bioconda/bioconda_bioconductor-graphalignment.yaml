about:
  description: Graph alignment is an extension package for the R programming environment
    which provides functions for finding an alignment between two networks based on
    link and node similarity scores. (J. Berg and M. Laessig, "Cross-species analysis
    of biological networks by Bayesian alignment", PNAS 103 (29), 10967-10972 (2006))
  home: https://bioconductor.org/packages/3.22/bioc/html/GraphAlignment.html
  license: file LICENSE
  license_file: LICENSE
  summary: GraphAlignment
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-graphalignment
  version: 1.74.0
requirements:
  build:
  - null
  - make
  host:
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
source:
  md5: 648901bc2117e51bab5217a7cd73eaef
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GraphAlignment_1.74.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GraphAlignment/GraphAlignment_1.74.0.tar.gz
  - https://bioarchive.galaxyproject.org/GraphAlignment_1.74.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-graphalignment/bioconductor-graphalignment_1.74.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GraphAlignment')"
