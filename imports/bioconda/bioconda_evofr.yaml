about:
  dev_url: https://github.com/blab/evofr
  doc_url: https://github.com/blab/evofr/blob/0.2.0/README.md
  home: https://github.com/blab/evofr
  license: AGPL-3.0-or-later
  license_family: AGPL
  license_file: LICENSE.txt
  summary: Tools for evolutionary forecasting.
build:
  entry_points:
  - evofr = evofr.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - nextstrain-bot
  - huddlej
  - joverlee521
  - marlinfiggins
  - victorlin
package:
  name: evofr
  version: 0.2.0
requirements:
  host:
  - python >=3.9
  - pip
  - poetry-core
  run:
  - python >=3.9
  - numpy >=1.22.4,<2.0.0
  - pandas >=1.4.2,<2.0.0
  - jax >=0.4.14,<0.5.0
  - jaxlib >=0.4.1,<0.5.0
  - numpyro >=0.13.2,<0.14.0
  - blackjax >=0.9.6,<0.10.0
  - matplotlib-base >=3.9,<4
  - seaborn-base >=0.13.2,<0.14.0
  - pyyaml >=5,<7
source:
  sha256: 1fb117eaf4a00f581997a84ca56f7160913faaf2de601eea967bad3abae81609
  url: https://pypi.org/packages/source/e/evofr/evofr-0.2.0.tar.gz
test:
  commands:
  - evofr --help
  imports:
  - evofr
