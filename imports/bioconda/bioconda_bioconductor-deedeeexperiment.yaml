about:
  description: DeeDeeExperiment is an S4 class extending the SingleCellExperiment
    class, designed to integrate and manage omics analysis results. It introduces
    two dedicated slots to store Differential Expression Analysis (DEA) results and
    Functional Enrichment Analysis (FEA) results, providing a structured approach
    for downstream analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/DeeDeeExperiment.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 'DeeDeeExperiment: An S4 Class for managing and exploring omics analysis
    results'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-deedeeexperiment
  version: 1.0.0
requirements:
  host:
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cli
  run:
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cli
source:
  md5: 64d15a7af0f6c5d0f7f2ba8a63bdb21b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/DeeDeeExperiment_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DeeDeeExperiment/DeeDeeExperiment_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/DeeDeeExperiment_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-deedeeexperiment/bioconductor-deedeeexperiment_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('DeeDeeExperiment')"
