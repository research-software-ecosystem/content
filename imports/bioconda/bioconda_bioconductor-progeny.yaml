about:
  description: PROGENy is resource that leverages a large compendium of publicly available
    signaling perturbation experiments to yield a common core of pathway responsive
    genes for human and mouse. These, coupled with any statistical method, can be
    used to infer pathway activities from bulk or single-cell transcriptomics.
  home: https://bioconductor.org/packages/3.22/bioc/html/progeny.html
  license: Apache License (== 2.0) | file LICENSE
  license_file: LICENSE
  summary: Pathway RespOnsive GENes for activity inference from gene expression
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-progeny
  version: 1.32.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-decoupler >=2.16.0,<2.17.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-ggrepel
  - r-gridextra
  - r-reshape2
  - r-tidyr
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-decoupler >=2.16.0,<2.17.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-ggrepel
  - r-gridextra
  - r-reshape2
  - r-tidyr
source:
  md5: 64e4d3a0aaf2a5e3a95660ee0875b6c2
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/progeny_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/progeny/progeny_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/progeny_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-progeny/bioconductor-progeny_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('progeny')"
