about:
  description: CaMutQC is able to filter false positive mutations generated due to
    technical issues, as well as to select candidate cancer mutations through a series
    of well-structured functions by labeling mutations with various flags. And a detailed
    and vivid filter report will be offered after completing a whole filtration or
    selection section. Also, CaMutQC integrates serveral methods and gene panels for
    Tumor Mutational Burden (TMB) estimation.
  home: https://bioconductor.org/packages/3.22/bioc/html/CaMutQC.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: An R Package for Comprehensive Filtration and Selection of Cancer Somatic
    Mutations
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-camutqc
  version: 1.6.0
