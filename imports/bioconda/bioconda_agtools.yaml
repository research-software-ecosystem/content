about:
  description: 'agtools is a Python framework for manipulating assembly graphs for
    downstream metagenomic applications, with a focus on the Graphical Fragment Assembly
    (GFA) format.

    '
  dev_url: https://github.com/Vini2/agtools
  doc_url: https://agtools.readthedocs.io/
  home: https://github.com/Vini2/agtools
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'agtools: A Software Framework to Manipulate Assembly Graphs'
build:
  entry_points:
  - agtools = agtools.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - Vini2
package:
  name: agtools
  version: 1.1.0
requirements:
  host:
  - pip
  - python >=3.10
  - flit-core
  run:
  - python >=3.10
  - click
  - loguru
  - bidict
  - biopython
  - python-igraph
  - pycairo
  - pandas
source:
  sha256: e75a11bad1e575cb09708a4e1080d222440e1528602a24da06a6e3b9e34e9bc9
  url: https://github.com/Vini2/agtools/archive/refs/tags/v1.1.0.tar.gz
test:
  commands:
  - agtools --help
