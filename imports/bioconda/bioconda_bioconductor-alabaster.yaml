about:
  description: Umbrella for the alabaster suite, providing a single-line import for
    all alabaster.* packages. Installing this package ensures that all known alabaster.*
    packages are also installed, avoiding problems with missing packages when a staging
    method or loading function is dynamically requested. Obviously, this comes at
    the cost of needing to install more packages, so advanced users and application
    developers may prefer to install the required alabaster.* packages individually.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Umbrella for the Alabaster Framework
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster
  version: 1.10.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.bumpy >=1.10.0,<1.11.0
  - bioconductor-alabaster.mae >=1.10.0,<1.11.0
  - bioconductor-alabaster.matrix >=1.10.0,<1.11.0
  - bioconductor-alabaster.ranges >=1.10.0,<1.11.0
  - bioconductor-alabaster.sce >=1.10.0,<1.11.0
  - bioconductor-alabaster.se >=1.10.0,<1.11.0
  - bioconductor-alabaster.spatial >=1.10.0,<1.11.0
  - bioconductor-alabaster.string >=1.10.0,<1.11.0
  - bioconductor-alabaster.vcf >=1.10.0,<1.11.0
  - r-base
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-alabaster.bumpy >=1.10.0,<1.11.0
  - bioconductor-alabaster.mae >=1.10.0,<1.11.0
  - bioconductor-alabaster.matrix >=1.10.0,<1.11.0
  - bioconductor-alabaster.ranges >=1.10.0,<1.11.0
  - bioconductor-alabaster.sce >=1.10.0,<1.11.0
  - bioconductor-alabaster.se >=1.10.0,<1.11.0
  - bioconductor-alabaster.spatial >=1.10.0,<1.11.0
  - bioconductor-alabaster.string >=1.10.0,<1.11.0
  - bioconductor-alabaster.vcf >=1.10.0,<1.11.0
  - r-base
source:
  md5: f1b5c29e4cdefe3822ed552a6496dd01
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/alabaster_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/alabaster/alabaster_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/alabaster_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-alabaster/bioconductor-alabaster_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('alabaster')"
