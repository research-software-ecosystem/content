about:
  description: Summarised MinION sequencing data for Salmonella Typhi published by
    Ashton et al. in 2015. Three replicate runs are each provided as Fast5Summary
    objects.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/minionSummaryData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Summarised MinION sequencing data published by Ashton et al. 2015
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-minionsummarydata
  version: 1.40.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 39f891a909a26307c03b9d8b91ac37df
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/minionSummaryData_1.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/minionSummaryData/minionSummaryData_1.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/minionSummaryData_1.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-minionsummarydata/bioconductor-minionsummarydata_1.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('minionSummaryData')"
