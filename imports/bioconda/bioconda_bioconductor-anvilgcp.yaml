about:
  description: The package provides a set of functions to interact with the Google
    Cloud Platform (GCP) services on the AnVIL platform. The package is designed to
    use the API calls from the AnVIL package. It coordinates AnVIL workspace functionality
    with native GCP tools.
  home: https://bioconductor.org/packages/3.22/bioc/html/AnVILGCP.html
  license: Artistic-2.0
  summary: The GCP R Client for the AnVIL
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-anvilgcp
  version: 1.4.1
requirements:
  host:
  - bioconductor-anvilbase >=1.4.0,<1.5.0
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-gcptools >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-httr
  - r-jsonlite
  - r-rlang
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-anvilbase >=1.4.0,<1.5.0
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-gcptools >=1.0.0,<1.1.0
  - r-base
  - r-dplyr
  - r-httr
  - r-jsonlite
  - r-rlang
  - r-tibble
  - r-tidyr
source:
  md5: 576988ee416d28ac4cd36ec2302219e0
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/AnVILGCP_1.4.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/AnVILGCP/AnVILGCP_1.4.1.tar.gz
  - https://bioarchive.galaxyproject.org/AnVILGCP_1.4.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-anvilgcp/bioconductor-anvilgcp_1.4.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('AnVILGCP')"
