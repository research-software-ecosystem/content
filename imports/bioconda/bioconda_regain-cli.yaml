about:
  description: 'ReGAIN is a reproducible CLI for quantifying co-occurrence among

    bacterial antibiotic/heavy metal resistance and virulence genes using Bayesian
    network

    structure learning (bnlearn/gRain) and post-hoc metrics. It includes

    dataset curation, visualization, and multivariate analysis.

    '
  home: https://github.com/ERBringHorvath/regain_CLI
  license: MIT
  license_file: LICENSE
  summary: Bayesian-network pipeline for resistance/virulence gene co-occurrence analysis.
build:
  entry_points:
  - regain = regain.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation -vv'
extra:
  recipe-maintainers:
  - ERBringHorvath
package:
  name: regain-cli
  version: 1.8.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - ncbi-amrfinderplus
  - blast
  - fastani
  - mash
  - biopython >=1.83
  - pandas
  - tqdm >=4.67
  - r-base >=4.4
  - r-optparse
  - r-dplyr
  - r-tidyr
  - r-tibble
  - r-igraph
  - r-visnetwork
  - r-reshape2
  - r-scales
  - r-ggplot2
  - r-ggrepel
  - r-tidygraph
  - r-ggraph
  - r-ellipse
  - r-vegan
  - r-ape
  - r-compositions
  - r-cluster
  - r-pbapply
  - r-foreach
  - r-doparallel
  - r-progressr
  - r-rcolorbrewer
  - r-bnlearn
  - r-grain
  - bioconductor-graph
source:
  sha256: b77fb924472e6aa1fe09f8798ee52da5eff9ee178c023be1fe42d15ec68fdad9
  url: https://github.com/ERBringHorvath/regain_CLI/archive/refs/tags/v1.8.0.tar.gz
test:
  commands:
  - regain -h
  - regain --module-health
  - regain bnS -h
  - regain bnL -h
  - regain AMR -h
  - regain matrix -h
  - regain MVA -h
  - regain collapse-features -h
  - regain matrix-summary -h
  - regain genome-similarity -h
  - regain network-analysis -h
  - regain network -h
  - fastANI --help
  - mash --version
  - blastn -version
  - amrfinder -h
