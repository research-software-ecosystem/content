about:
  description: Single cell RNA-Seq data for 5902 cells from 18 patients with oral
    cavity head and neck squamous cell carcinoma available as GEO accession [GSE103322]
    (http://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE103322). GSE103322 data
    have been parsed into a SincleCellExperiment object available in ExperimentHub.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/GSE103322.html
  license: Artistic-2.0
  summary: GEO accession data GSE103322 as a SingleCellExperiment
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gse103322
  version: 1.16.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 3cd0bb8c4c0d337b2722ea94bce3a3f0
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/GSE103322_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GSE103322/GSE103322_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/GSE103322_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gse103322/bioconductor-gse103322_1.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GSE103322')"
