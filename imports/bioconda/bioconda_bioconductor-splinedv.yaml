about:
  description: "A spline based scRNA-seq method for identifying differentially variable\
    \ (DV) genes across two experimental conditions. Spline-DV constructs a 3D spline\
    \ from 3 key gene statistics: mean expression, coefficient of variance, and dropout\
    \ rate. This is done for both conditions. The 3D spline provides the \u201Cexpected\u201D\
    \ behavior of genes in each condition. The distance of the observed mean, CV and\
    \ dropout rate of each gene from the expected 3D spline is used to measure variability.\
    \ As the final step, the spline-DV method compares the variabilities of each condition\
    \ to identify differentially variable (DV) genes."
  home: https://bioconductor.org/packages/3.22/bioc/html/SplineDV.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Differential Variability (DV) analysis for single-cell RNA sequencing data.
    (e.g. Identify Differentially Variable Genes across two experimental conditions)
