about:
  description: scClassify is a multiscale classification framework for single-cell
    RNA-seq data based on ensemble learning and cell type hierarchies, enabling sample
    size estimation required for accurate cell type classification and joint classification
    of cells using multiple references.
  home: https://bioconductor.org/packages/3.22/bioc/html/scClassify.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: 'scClassify: single-cell Hierarchical Classification'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scclassify
  version: 1.22.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-cepo >=1.16.0,<1.17.0
  - bioconductor-hopach >=2.70.0,<2.71.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-cluster
  - r-diptest
  - r-ggplot2
  - r-ggraph
  - r-igraph
  - r-matrix
  - r-mgcv
  - r-minpack.lm
  - r-mixtools
  - r-proxy
  - r-proxyc
  - r-statmod
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-cepo >=1.16.0,<1.17.0
  - bioconductor-hopach >=2.70.0,<2.71.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
