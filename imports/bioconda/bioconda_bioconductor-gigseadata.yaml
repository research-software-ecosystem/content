about:
  description: The gene set collection used for the GIGSEA package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/GIGSEAdata.html
  license: LGPL-3
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Gene set collections for the GIGSEA package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gigseadata
  version: 1.28.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 597bcc2e10f419d3b41ca564b2d44d18
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/GIGSEAdata_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GIGSEAdata/GIGSEAdata_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/GIGSEAdata_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gigseadata/bioconductor-gigseadata_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GIGSEAdata')"
