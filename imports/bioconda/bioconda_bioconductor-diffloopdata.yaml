about:
  description: ChIA-PET example datasets and additional data for use with the diffloop
    package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/diffloopdata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Example ChIA-PET Datasets for the diffloop Package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-diffloopdata
  version: 1.38.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 9360cc1a6df2925f1c9ad37568dbbd97
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/diffloopdata_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/diffloopdata/diffloopdata_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/diffloopdata_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-diffloopdata/bioconductor-diffloopdata_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('diffloopdata')"
