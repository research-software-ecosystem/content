  license: MIT
  license_file: LICENSE
  summary: This package provides a stable interface for interactions between Snakemake
    and its report plugins.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - koesterlab
package:
  name: snakemake-interface-report-plugins
  version: 2.0.1
requirements:
  host:
  - python >=3.11,<4.0
  - poetry-core
  - pip
  run:
  - python >=3.11.0,<4.0.0
  - snakemake-interface-common >=1.16.0,<2.0.0
source:
  sha256: 05b2b88d249a30f8de8c81f85d70ce6e1762d098aea145accf571344140bfef8
  url: https://pypi.io/packages/source/s/snakemake-interface-report-plugins/snakemake_interface_report_plugins-2.0.1.tar.gz
test:
  commands:
  - pip check
  imports:
  - snakemake_interface_report_plugins
  requires:
  - pip
