about:
  description: tRNAdbImport imports the entries of the tRNAdb and mtRNAdb (http://trna.bioinf.uni-leipzig.de)
    as GRanges object.
  home: https://bioconductor.org/packages/3.22/bioc/html/tRNAdbImport.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Importing from tRNAdb and mitotRNAdb as GRanges objects
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-trnadbimport
  version: 1.28.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-modstrings >=1.26.0,<1.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-structstrings >=1.26.0,<1.27.0
  - bioconductor-trna >=1.28.0,<1.29.0
  - r-base
  - r-httr2
  - r-stringr
  - r-xml2
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-modstrings >=1.26.0,<1.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-structstrings >=1.26.0,<1.27.0
  - bioconductor-trna >=1.28.0,<1.29.0
  - r-base
  - r-httr2
  - r-stringr
  - r-xml2
source:
  md5: d9559efa314daf2c51252eb38e0dcc01
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/tRNAdbImport_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/tRNAdbImport/tRNAdbImport_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/tRNAdbImport_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-trnadbimport/bioconductor-trnadbimport_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('tRNAdbImport')"
