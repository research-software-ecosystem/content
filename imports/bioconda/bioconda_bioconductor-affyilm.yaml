about:
  description: affyILM is a preprocessing tool which estimates gene expression levels
    for Affymetrix Gene Chips. Input from physical chemistry is employed to first
    background subtract intensities before calculating concentrations on behalf of
    the Langmuir model.
  home: https://bioconductor.org/packages/3.22/bioc/html/affyILM.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Linear Model of background subtraction and the Langmuir isotherm
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:affyilm
  - doi:10.1186/1748-7188-4-15
  parent_recipe:
    name: bioconductor-affyilm
    path: recipes/bioconductor-affyilm
    version: 1.32.0
package:
  name: bioconductor-affyilm
  version: 1.62.0
requirements:
  host:
  - bioconductor-affxparser >=1.82.0,<1.83.0
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-gcrma >=2.82.0,<2.83.0
  - r-base
  run:
  - bioconductor-affxparser >=1.82.0,<1.83.0
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-gcrma >=2.82.0,<2.83.0
  - r-base
source:
  md5: 5741032dc19d25712ac82b05fa120e24
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/affyILM_1.62.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/affyILM/affyILM_1.62.0.tar.gz
  - https://bioarchive.galaxyproject.org/affyILM_1.62.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-affyilm/bioconductor-affyilm_1.62.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('affyILM')"
