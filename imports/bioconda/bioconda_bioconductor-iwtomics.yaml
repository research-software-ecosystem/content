about:
  description: Implementation of the Interval-Wise Testing (IWT) for omics data. This
    inferential procedure tests for differences in "Omics" data between two groups
    of genomic regions (or between a group of genomic regions and a reference center
    of symmetry), and does not require fixing location and scale at the outset.
  home: https://bioconductor.org/packages/3.22/bioc/html/IWTomics.html
  license: GPL (>=2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Interval-Wise Testing for Omics Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-iwtomics
    path: recipes/bioconductor-iwtomics
    version: 1.4.0
package:
  name: bioconductor-iwtomics
  version: 1.34.1
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-fda
  - r-gtable
  - r-kernsmooth
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-fda
  - r-gtable
  - r-kernsmooth
source:
  md5: 3a628c5196f4d61680fe25d9e3c1d6f4
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/IWTomics_1.34.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/IWTomics/IWTomics_1.34.1.tar.gz
  - https://bioarchive.galaxyproject.org/IWTomics_1.34.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-iwtomics/bioconductor-iwtomics_1.34.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('IWTomics')"
