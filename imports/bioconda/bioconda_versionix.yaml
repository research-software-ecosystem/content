about:
  dev_url: https://github.com/sequana/versionix
  home: https://github.com/sequana/versionix
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Get version of any tools.
build:
  entry_points:
  - versionix = versionix.scripts:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
package:
  name: versionix
  version: 0.99.4
requirements:
  host:
  - python >=3.8
  - pip
  - poetry-core >=1.0.0
  run:
  - python >=3.8
  - click >=8.1.7
  - rich-click
  - colorlog
source:
  sha256: 53d6229c2afee252f78c550017a508bd23a064c7594e0cb94b9d40316955c036
  url: https://pypi.io/packages/source/v/versionix/versionix-0.99.4.tar.gz
test:
  commands:
  - versionix --help
  imports:
  - versionix
