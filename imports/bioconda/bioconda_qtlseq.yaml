about:
  dev_url: https://github.com/YuSugihara/QTL-seq
  home: https://github.com/YuSugihara/QTL-seq
  license: GPL-3.0-or-later
  license_family: GPL3
  summary: 'QTL-seq: pipeline to identify causative mutations responsible for a phenotype.'
build:
  entry_points:
  - qtlseq = qtlseq.qtlseq:main
  - qtlplot = qtlseq.qtlplot:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
extra:
  identifiers:
  - biotools:qtlseq
  - doi:10.1111/tpj.12105
package:
  name: qtlseq
  version: 2.3.0
requirements:
  host:
  - python >=3.5
  - pip
  - setuptools
  run:
  - python >=3.5
  - samtools >=1.7
  - bcftools >=1.7
  - bwa
  - htslib
  - snpeff
  - trimmomatic
  - matplotlib-base
  - numpy
  - pandas
  - seaborn-base
source:
  sha256: faa4a7c09238701d5dfe4b57c237c904d49519570ffce12c93b9229c1b4ca229
  url: https://github.com/YuSugihara/QTL-seq/releases/download/v2.3.0/QTL-seq-2.3.0.tar.gz
test:
  commands:
  - qtlseq -h
  - qtlplot -h
