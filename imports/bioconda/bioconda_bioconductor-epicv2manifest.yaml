about:
  description: A data.frame containing an extended probe manifest for the Illumina
    Infinium Methylation v2.0 Kit. Contains the complete manifest from the Illumina-provided
    EPIC-8v2-0_EA.csv, plus additional probewise information described in Peters et
    al. (2024).
  home: https://bioconductor.org/packages/3.22/data/annotation/html/EPICv2manifest.html
  license: Artistic-2.0
  summary: Illumina Infinium MethylationEPIC v2.0 extended manifest from Peters et
    al. 2024
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-epicv2manifest
  version: 0.99.7
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: cca8526c45bc0124b76fdc206d1ae482
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/EPICv2manifest_0.99.7.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/EPICv2manifest/EPICv2manifest_0.99.7.tar.gz
  - https://bioarchive.galaxyproject.org/EPICv2manifest_0.99.7.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-epicv2manifest/bioconductor-epicv2manifest_0.99.7_src_all.tar.gz
test:
  commands:
  - $R -e "library('EPICv2manifest')"
