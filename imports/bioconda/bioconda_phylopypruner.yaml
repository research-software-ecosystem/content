about:
  dev_url: https://github.com/fethalen/phylopypruner
  doc_url: https://gitlab.com/fethalen/phylopypruner/-/wikis/home
  home: https://github.com/fethalen/phylopypruner
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Tree-based orthology inference.
build:
  entry_points:
  - phylopypruner = phylopypruner.__main__:entry
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.2.7
package:
  name: phylopypruner
  version: 1.2.7
requirements:
  host:
  - python >=3.6
  - pip
  - setuptools-scm
  run:
  - python >=3.6
  - setuptools
source:
  sha256: 9ccaa460a82649c4183476b5860da4c0d3118e9d73c4fd13221f62950a1b9b5d
  url: https://pypi.org/packages/source/p/phylopypruner/phylopypruner-1.2.7.tar.gz
test:
  commands:
  - phylopypruner --help
  imports:
  - phylopypruner
