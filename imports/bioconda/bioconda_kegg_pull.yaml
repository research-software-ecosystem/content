about:
  dev_url: https://github.com/MoseleyBioinformaticsLab/kegg_pull
  doc_url: https://moseleybioinformaticslab.github.io/kegg_pull/index.html
  home: https://github.com/MoseleyBioinformaticsLab/kegg_pull
  license: Clear BSD License with Extra Clause
  license_family: BSD
  license_file: LICENSE
  summary: 'Package that facilitates pulling database entries from KEGG via its REST
    API '
build:
  entry_points:
  - kegg_pull = kegg_pull.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir'
extra:
  recipe-maintainers:
  - LucoDevro
package:
  name: kegg_pull
  version: 3.2.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - docopt
  - requests
  - tqdm
  - jsonschema
source:
  sha256: ce948881378e5d6d44a8d3a6b85f46c10dd07dcc7000195d71a77fe3082f85f6
  url: https://pypi.org/packages/source/k/kegg_pull/kegg_pull-3.2.2.tar.gz
test:
  commands:
  - kegg_pull -h
