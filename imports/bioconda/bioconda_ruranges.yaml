about:
  dev_url: https://github.com/pyranges/ruranges
  home: https://github.com/pyranges/ruranges
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Rust-backed interval kernels exposed to Python/NumPy.
build:
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: ruranges
  version: 0.1.4
requirements:
  build:
  - null
  host:
  - python
  - pip
  - maturin
  - numpy
  run:
  - python
  - numpy
source:
  sha256: b5d8710a0fb36ab364f2543dff4eb450d38360539bd58ec7ecdc5405acdfb5f1
  url: https://files.pythonhosted.org/packages/source/r/ruranges/ruranges-0.1.4.tar.gz
test:
  commands:
  - python -c "import ruranges; print(getattr(ruranges, '__version__', ''))"
  imports:
  - ruranges
