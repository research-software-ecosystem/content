about:
  dev_url: https://github.com/pyranges/ruranges
  home: https://github.com/pyranges/ruranges
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Rust-backed interval kernels exposed to Python/NumPy.
build:
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
package:
  name: ruranges
  version: 0.1.1
requirements:
  build:
  - null
  host:
  - python
  - pip
  - maturin
  - numpy
  run:
  - python
  - numpy
source:
  sha256: 0a61e809cd7d8294292bbd452ecb1fbee0c571c32fc464b96f2e4ce8b06f0ece
  url: https://files.pythonhosted.org/packages/source/r/ruranges/ruranges-0.1.1.tar.gz
test:
  commands:
  - python -c "import ruranges; print(getattr(ruranges, '__version__', ''))"
  imports:
  - ruranges
