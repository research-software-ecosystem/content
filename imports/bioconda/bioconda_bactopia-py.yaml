about:
  dev_url: https://github.com/bactopia/bactopia
  doc_url: https://bactopia.github.io
  home: https://bactopia.github.io
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A Python package for working with Bactopia.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - rpetit3
package:
  name: bactopia-py
  version: 2.0.2
requirements:
  host:
  - python >=3.10,<3.14
  - poetry
  - pip
  run:
  - python >=3.10,<3.14
  - biopython
  - blast
  - jinja2
  - openpyxl
  - pandas >=2.2.0
  - pigz
  - pyyaml
  - rauth
  - requests
  - rich <14
  - rich-click >=1.6.0
  - tqdm
  - wget
source:
  sha256: 4d33e48231f2ab1cc223a3510e70387e3dcd5e6ef7ceaab2381c3ab78b6307e7
  url: https://pypi.io/packages/source/b/bactopia/bactopia-2.0.2.tar.gz
test:
  commands:
  - pip check
  - bactopia-citations --help
  - bactopia-citations --version
  - bactopia-datasets --help
  - bactopia-datasets --version
  - bactopia-download --help
  - bactopia-prepare --help
  - bactopia-search --help
  - bactopia-summary --help
  - bactopia-atb-formatter --help
  - bactopia-atb-downloader --help
  - bactopia-pubmlst-setup --help
  - bactopia-pubmlst-build --help
  - bactopia-check-fastqs --help
  - bactopia-teton-prepare --help
  imports:
  - bactopia
