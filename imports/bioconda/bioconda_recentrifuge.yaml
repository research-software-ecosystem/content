about:
  dev_url: https://github.com/khyox/recentrifuge
  doc_url: https://github.com/khyox/recentrifuge/wiki
  home: https://github.com/khyox/recentrifuge
  license: AGPL-3.0-or-later
  license_family: AGPL
  license_file: LICENSE.txt
  summary: Robust comparative analysis and contamination removal for metagenomics.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
extra:
  identifiers:
  - doi:10.1371/journal.pcbi.1006967
  - biotools:Recentrifuge
  - usegalaxy-eu:recentrifuge
  recipe-maintainers:
  - thanhleviet
  - khyox
package:
  name: recentrifuge
  version: 2.1.1
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools >=75.0.0
  run:
  - python >=3.12
  - biopython ==1.84
  - numpy >=2.3.4
  - matplotlib-base >=3.3.4
  - openpyxl >=3.1.2
  - pandas >=2.3.3
source:
  sha256: 2e87f64d5aa4daa15b428dae9bddc3de7ad99c79521516fb2fedf80a5892aa9b
  url: https://github.com/khyox/recentrifuge/archive/v2.1.1.tar.gz
test:
  commands:
  - rcf --version
