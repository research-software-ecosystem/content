about:
  description: The HiTC package was developed to explore high-throughput 'C' data
    such as 5C or Hi-C. Dedicated R classes as well as standard methods for quality
    controls, normalization, visualization, and further analysis are also provided.
  home: https://bioconductor.org/packages/3.22/bioc/html/HiTC.html
  license: Artistic-2.0
  summary: High Throughput Chromosome Conformation Capture analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:hitc
  parent_recipe:
    name: bioconductor-hitc
    path: recipes/bioconductor-hitc
    version: 1.24.0
package:
  name: bioconductor-hitc
  version: 1.54.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-matrix
  - r-rcolorbrewer
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  - r-matrix
  - r-rcolorbrewer
source:
  md5: 26cee0a596dc171e10fd423f0b475124
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/HiTC_1.54.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HiTC/HiTC_1.54.0.tar.gz
  - https://bioarchive.galaxyproject.org/HiTC_1.54.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hitc/bioconductor-hitc_1.54.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HiTC')"
