about:
  description: 'Mumemto is a tool for finding a variety of matches across collections
    of sequences like a pangenome.

    It includes a visualization tool for visualizing pangenome synteny.

    The conda package installs the CLI, the C/C++ library (headers include mumemto.h
    and mumemto.hpp)

    and CMake package (find_package(Mumemto)),

    and the Python package (utilities plus pybind11 bindings).

    '
  dev_url: https://github.com/vikshiv/mumemto
  doc_url: https://github.com/vikshiv/mumemto/wiki
  home: https://github.com/vikshiv/mumemto
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Finding maximal unique matches across pangenomes.
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - vikshiv
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: mumemto
  version: 1.4.0
requirements:
  build:
  - null
  - cmake
  - make
  - pkg-config
  host:
  - python
  - pip
  - zlib
  - numpy
  - pybind11
  - scikit-build-core
  - setuptools
  - wheel
  run:
  - python
  - libgcc-ng >=12
  - libstdcxx-ng >=12
  - matplotlib-base
  - numpy
  - tqdm
  - numba
source:
  sha256: 0918a5556065e4a2d19446d6fac58288444c77109a250875d0dfa271f0e88aa5
  url: https://github.com/vikshiv/mumemto/archive/refs/tags/v1.4.0.tar.gz
test:
  commands:
  - mumemto --help
  - mumemto viz --help
  - mumemto coverage --help
  - mumemto inversion --help
  - mumemto lengths --help
  - mumemto collinear --help
  - mumemto convert --help
  - mumemto extract --help
  - mumemto label --help
  - mumemto merge --help
  - mumemto bed --help
  - test -f "${PREFIX}/lib/cmake/Mumemto/MumemtoConfig.cmake"
  - test -f "${PREFIX}/include/mumemto.hpp"
  - test -f "${PREFIX}/include/mumemto.h"
  - python -c "import mumemto; r = mumemto.mum([['ACGTACGT'], ['TACGTAAA']], min_match_len=3);
    assert r.num_matches() >= 0"
  - python -c "import mumemto, numpy as np; r = mumemto.mem([['ACGTACGT'], ['TACGTAAA']],
    min_match_len=3, max_doc_freq=2); assert r.num_matches() > 0; t = r.match_at(0);
    assert isinstance(t[1], np.ndarray); assert not t[1].flags['OWNDATA']"
  imports:
  - mumemto
  - mumemto.utils
