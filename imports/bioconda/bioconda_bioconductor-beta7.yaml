about:
  description: Data from 6 gpr files aims to identify differential expressed genes
    between the beta 7+ and beta 7- memory T helper cells.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/beta7.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Rodriguez et al. (2004) Differential Gene Expression by Memory/Effector
    T Helper Cells Bearing the Gut-Homing Receptor Integrin alpha4 beta7.
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-beta7
  version: 1.48.0
requirements:
  host:
  - bioconductor-marray >=1.88.0,<1.89.0
  - r-base
  run:
  - bioconductor-marray >=1.88.0,<1.89.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 0c93b4b2fdcd335e2ca613fcce5a2d14
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/beta7_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/beta7/beta7_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/beta7_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-beta7/bioconductor-beta7_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('beta7')"
