about:
  description: Visualising oligonucleotide patterns and sequence motifs occurrences
    across a large set of sequences centred at a common reference point and sorted
    by a user defined feature.
  home: https://bioconductor.org/packages/3.22/bioc/html/seqPattern.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Visualising oligonucleotide patterns and motif occurrences across a set
    of sorted sequences
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:seqpattern
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-seqpattern
    path: recipes/bioconductor-seqpattern
    version: 1.12.0
package:
  name: bioconductor-seqpattern
  version: 1.42.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-base
  - r-kernsmooth
  - r-plotrix
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-base
  - r-kernsmooth
  - r-plotrix
source:
  md5: e56f0663a24b852cc5b2d31c1bfc0419
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/seqPattern_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/seqPattern/seqPattern_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/seqPattern_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-seqpattern/bioconductor-seqpattern_1.42.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('seqPattern')"
