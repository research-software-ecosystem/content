about:
  description: HVP is a quantitative batch effect metric that estimates the proportion
    of variance associated with batch effects in a data set.
  home: https://bioconductor.org/packages/3.22/bioc/html/HVP.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Hierarchical Variance Partitioning
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hvp
  version: 1.0.0
requirements:
  host:
  - r-base
  - r-matrix
  run:
  - r-base
  - r-matrix
source:
  md5: 589de48530ad0708aedd5baffe0a6f50
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/HVP_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HVP/HVP_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/HVP_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hvp/bioconductor-hvp_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HVP')"
