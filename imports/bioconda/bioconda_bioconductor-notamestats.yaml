about:
  description: Provides univariate and multivariate statistics for feature prioritization
    in untargeted LC-MS metabolomics research.
  home: https://bioconductor.org/packages/3.22/bioc/html/notameStats.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Workflow for non-targeted LC-MS metabolic profiling
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-notamestats
  version: 1.0.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-notame >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-broom
  - r-dplyr
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-notame >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-broom
  - r-dplyr
  - r-tibble
  - r-tidyr
source:
  md5: 493b29ae5054ca4f47b3a9bddd9bc468
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/notameStats_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/notameStats/notameStats_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/notameStats_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-notamestats/bioconductor-notamestats_1.0.0_src_all.tar.gz
test:
