about:
  description: Mass cytometry enables the simultaneous measurement of dozens of protein
    markers at the single-cell level, producing high dimensional datasets that provide
    deep insights into cellular heterogeneity and function. However, these datasets
    often contain unwanted covariance introduced by technical variations, such as
    differences in cell size, staining efficiency, and instrument-specific artifacts,
    which can obscure biological signals and complicate downstream analysis. This
    package addresses this challenge by implementing a robust framework of linear
    models designed to identify and remove these sources of unwanted covariance. By
    systematically modeling and correcting for technical noise, the package enhances
    the quality and interpretability of mass cytometry data, enabling researchers
    to focus on biologically relevant signals.
  home: https://bioconductor.org/packages/3.22/bioc/html/RUCova.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Removes unwanted covariance from mass cytometry data
