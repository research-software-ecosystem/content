about:
  description: The Seqinfo class stores the names, lengths, circularity flags, and
    genomes for a particular collection of sequences. These sequences are typically
    the chromosomes and/or scaffolds of a specific genome assembly of a given organism.
    Seqinfo objects are rarely used as standalone objects. Instead, they are used
    as part of higher-level objects to represent their seqinfo() component. Examples
    of such higher-level objects are GRanges, RangedSummarizedExperiment, VCF, GAlignments,
    etc... defined in other Bioconductor infrastructure packages.
  home: https://bioconductor.org/packages/3.22/bioc/html/Seqinfo.html
  license: Artistic-2.0
  summary: A simple S4 class for storing basic information about a collection of genomic
    sequences
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-seqinfo
  version: 1.0.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
source:
  md5: 10585f976146cbcf32a4ce7d46a18709
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Seqinfo_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Seqinfo/Seqinfo_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/Seqinfo_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-seqinfo/bioconductor-seqinfo_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Seqinfo')"
