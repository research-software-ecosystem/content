about:
  description: microbiomeDataSets is a collection of microbiome datasets loaded from
    Bioconductor'S ExperimentHub infrastructure. The datasets serve as reference for
    workflows and vignettes published adjacent to the microbiome analysis tools on
    Bioconductor. Additional datasets can be added overtime and additions from authors
    are welcome.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/microbiomeDataSets.html
  license: CC0
  summary: Experiment Hub based microbiome datasets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-microbiomedatasets
  version: 1.18.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-ape
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-ape
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 8350b261aa5afb204d20d4c7403f28ee
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/microbiomeDataSets_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/microbiomeDataSets/microbiomeDataSets_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/microbiomeDataSets_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-microbiomedatasets/bioconductor-microbiomedatasets_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('microbiomeDataSets')"
