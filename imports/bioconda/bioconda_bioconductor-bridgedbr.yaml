about:
  description: Use BridgeDb functions and load identifier mapping databases in R.
    It uses GitHub, Zenodo, and Figshare if you use this package to download identifier
    mappings files.
  home: https://bioconductor.org/packages/3.22/bioc/html/BridgeDbR.html
  license: AGPL-3
  license_file: /lib/R/share/licenses/AGPL-3
  summary: Code for using BridgeDb identifier mapping framework from within R
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-bridgedbr
    path: recipes/bioconductor-bridgedbr
    version: 1.16.0
package:
  name: bioconductor-bridgedbr
  version: 2.20.0
requirements:
  host:
  - r-base
  - r-curl
  - r-rjava
  run:
  - r-base
  - r-curl
  - r-rjava
source:
  md5: c6fe3d37ebcfc47442a0f46cd921ab18
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BridgeDbR_2.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BridgeDbR/BridgeDbR_2.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/BridgeDbR_2.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bridgedbr/bioconductor-bridgedbr_2.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('BridgeDbR')"
