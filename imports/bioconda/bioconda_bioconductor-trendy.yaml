about:
  description: Trendy implements segmented (or breakpoint) regression models to estimate
    breakpoints which represent changes in expression for each feature/gene in high
    throughput data with ordered conditions.
  home: https://bioconductor.org/packages/3.22/bioc/html/Trendy.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Breakpoint analysis of time-course expression data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-trendy
  version: 1.32.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dt
  - r-gplots
  - r-magrittr
  - r-segmented
  - r-shiny
  - r-shinyfiles
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dt
  - r-gplots
  - r-magrittr
  - r-segmented
  - r-shiny
  - r-shinyfiles
source:
  md5: 0912b55df1bab8dede2864693a8bd01f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Trendy_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Trendy/Trendy_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/Trendy_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-trendy/bioconductor-trendy_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Trendy')"
