about:
  home: https://github.com/logsdon-lab/rs-nucflag
  license: MIT
  license_file: py/LICENSE
  summary: Library to call misassemblies in genome assemblies from long-read alignments.
build:
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . -vv --no-deps --no-build-isolation
  - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
  skip: true
extra:
  recipe-maintainers:
  - koisland
package:
  name: py_nucflag
  version: 0.1.8
requirements:
  build:
  - null
  - cargo-bundle-licenses
  host:
  - python
  - maturin >=1.8,<2.0
  - pip
  run:
  - python
  - polars
source:
  sha256: db9dc7133bbc6da7301b369eb7b0646901e6303545f873c5dbc03133f49ab568
  url: https://pypi.org/packages/source/p/py_nucflag/py_nucflag-0.1.8.tar.gz
test:
  commands:
  - pip check
  imports:
  - py_nucflag
  requires:
  - pip
