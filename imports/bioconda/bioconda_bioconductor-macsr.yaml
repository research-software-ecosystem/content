about:
  description: The Model-based Analysis of ChIP-Seq (MACS) is a widely used toolkit
    for identifying transcript factor binding sites. This package is an R wrapper
    of the lastest MACS3.
  home: https://bioconductor.org/packages/3.22/bioc/html/MACSr.html
  license: BSD_3_clause + file LICENSE
  license_file: LICENSE
  summary: 'MACS: Model-based Analysis for ChIP-Seq'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-macsr
  version: 1.18.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-reticulate
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-reticulate
source:
  md5: c4e93fc34d9ac3d7b6e86b18f71ee4e9
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MACSr_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MACSr/MACSr_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/MACSr_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-macsr/bioconductor-macsr_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MACSr')"
