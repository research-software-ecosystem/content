about:
  description: This package provides additional expression data on diffuse large B-cell
    lymphomas for the BioNet package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/DLBCL.html
  license: GPL (>=2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Diffuse large B-cell lymphoma expression data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dlbcl
  version: 1.50.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 7082b2a7d31b68b82d986590cf9258e2
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/DLBCL_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DLBCL/DLBCL_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/DLBCL_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dlbcl/bioconductor-dlbcl_1.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('DLBCL')"
