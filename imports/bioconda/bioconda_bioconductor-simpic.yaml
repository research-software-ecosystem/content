about:
  description: simPIC is a package for simulating single-cell ATAC-seq count data.
    It provides a user-friendly, well documented interface for data simulation. Functions
    are provided for parameter estimation, realistic scATAC-seq data simulation, and
    comparing real and simulated datasets.
  home: https://bioconductor.org/packages/3.22/bioc/html/simPIC.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Flexible simulation of paired-insertion counts for single-cell ATAC-sequencing
    data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-simpic
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-edger >=4.8.0,<4.9.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-actuar
  - r-base
  - r-checkmate >=2.0.0
  - r-fitdistrplus
  - r-matrix
  - r-matrixstats
  - r-rlang
