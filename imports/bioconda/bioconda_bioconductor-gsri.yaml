about:
  description: The GSRI package estimates the number of differentially expressed genes
    in gene sets, utilizing the concept of the Gene Set Regulation Index (GSRI).
  home: https://bioconductor.org/packages/3.22/bioc/html/GSRI.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Gene Set Regulation Index
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:gsri
  - doi:10.1038/nmeth.3252
  parent_recipe:
    name: bioconductor-gsri
    path: recipes/bioconductor-gsri
    version: 2.28.0
package:
  name: bioconductor-gsri
  version: 2.58.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-genefilter >=1.92.0,<1.93.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-les >=1.60.0,<1.61.0
  - r-base
  - r-fdrtool
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-genefilter >=1.92.0,<1.93.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-les >=1.60.0,<1.61.0
  - r-base
  - r-fdrtool
source:
  md5: 88b01f21e89a9f4d46a28335ca1d4dc5
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GSRI_2.58.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GSRI/GSRI_2.58.0.tar.gz
  - https://bioarchive.galaxyproject.org/GSRI_2.58.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gsri/bioconductor-gsri_2.58.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GSRI')"
