about:
  description: The CLL package contains the chronic lymphocytic leukemia (CLL) gene
    expression data.  The CLL data had 24 samples that were either classified as progressive
    or stable in regards to disease progression.  The data came from Dr. Sabina Chiaretti
    at Division of Hematology, Department of Cellular Biotechnologies and Hematology,
    University La Sapienza, Rome, Italy and Dr. Jerome Ritz at Department of Medicine,
    Brigham and Women's Hospital, Harvard Medical School, Boston, Massachusetts.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/CLL.html
  license: LGPL
  license_file: /lib/R/share/licenses/LGPL-3
  summary: A Package for CLL Gene Expression Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cll
  version: 1.50.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 298e32fa59127eb55289cf6f71104007
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/CLL_1.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CLL/CLL_1.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/CLL_1.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cll/bioconductor-cll_1.50.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CLL')"
