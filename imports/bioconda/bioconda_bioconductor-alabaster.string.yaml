about:
  description: Save Biostrings objects to file artifacts, and load them back into
    memory. This is a more portable alternative to serialization of such objects into
    RDS files. Each artifact is associated with metadata for further interpretation;
    downstream applications can enrich this metadata with context-specific properties.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.string.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Save and Load Biostrings to/from File
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster.string
  version: 1.10.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
source:
  md5: 207bc34d6e4950a598a02bca241ebfc6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/alabaster.string_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/alabaster.string/alabaster.string_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/alabaster.string_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-alabaster.string/bioconductor-alabaster.string_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('alabaster.string')"
