about:
  description: "tttrlib is a simple, fast, libray to read, write and process\ntime-resolved\
    \ imaging and spectroscopic data. For speed, it \nis written in C++ and wrapped\
    \ for Python via SWIG.\n"
  dev_url: https://github.com/fluorescence-tools/tttrlib
  doc_url: https://tttrlib.readthedocs.io
  home: https://github.com/fluorescence-tools/tttrlib
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: A file format agnostic library for time-resolved imaging and spectroscopic
    data.
build:
  number: 0
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - tpeulen
  - khemmen
package:
  name: tttrlib
  version: 0.26.2
requirements:
  build:
  - null
  - null
  - pkg-config
  - cmake
  - ninja
  - make
  host:
  - swig <4.3.0
  - doxygen
  - llvm-openmp
  - libgomp
  - boost-cpp
  - hdf5
  - python
  - pip
  - numpy
  run:
  - python
  - llvm-openmp
  - libgomp
  - boost-cpp
  - tqdm
  - click
  - click-didyoumean
  - numpy
  - scikit-image
  - matplotlib-base
  - hdf5
source:
  sha256: 6db513cfc36b235d498ebbc8d90f72a35cd7c7db3d1dafa9593cb101e75d3ad8
  url: https://github.com/Fluorescence-Tools/tttrlib/archive/refs/tags/v0.26.2.tar.gz
test:
  commands:
  - tttrlib --help
  imports:
  - tttrlib
