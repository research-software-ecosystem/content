about:
  dev_url: https://github.com/BfArM-MVH/grz-tools
  doc_url: https://github.com/BfArM-MVH/grz-tools/blob/grzctl-v2.1.0/packages/grz-cli/README.md
  home: https://github.com/BfArM-MVH/grz-tools
  license: MIT
  license_family: MIT
  summary: Control CLI for GRZ administrators.
build:
  entry_points:
  - grzctl = grzctl.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - hoeze
  - tedil
package:
  name: grzctl
  version: 2.1.0
requirements:
  host:
  - python >=3.12
  - hatchling
  - pip
  run:
  - python >=3.12
  - requests >=2.32.3,<3
  - grz-db >=2.1,<3
  - grz-cli >=1.7,<2
  - textual >=5.3,<6
source:
  sha256: a5bae720a9cc097f7d88a256b56a06d726a8ff3d48d04199d256b139133a87bc
  url: https://pypi.org/packages/source/g/grzctl/grzctl-2.1.0.tar.gz
test:
  commands:
  - pip check
  - grzctl --help
  imports:
  - grzctl
  requires:
  - pip
