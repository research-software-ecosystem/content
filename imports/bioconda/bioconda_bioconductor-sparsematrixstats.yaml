about:
  description: 'High performance functions for row and column operations on sparse
    matrices. For example: col / rowMeans2, col / rowMedians, col / rowVars etc. Currently,
    the optimizations are limited to data in the column sparse format. This package
    is inspired by the matrixStats package by Henrik Bengtsson.'
  home: https://bioconductor.org/packages/3.22/bioc/html/sparseMatrixStats.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Summary Statistics for Rows and Columns of Sparse Matrices
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:sparseMatrixStats
package:
  name: bioconductor-sparsematrixstats
  version: 1.22.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - r-base
  - r-matrix
  - r-matrixstats >=0.60.0
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - r-base
  - r-matrix
  - r-matrixstats >=0.60.0
  - r-rcpp
source:
  md5: 0911afd4b58595f5b43aa39120a702e0
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/sparseMatrixStats_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/sparseMatrixStats/sparseMatrixStats_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/sparseMatrixStats_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-sparsematrixstats/bioconductor-sparsematrixstats_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('sparseMatrixStats')"
