about:
  description: Implements low-level utilities for single-cell trajectory analysis,
    primarily intended for re-use inside higher-level packages. Include a function
    to create a cluster-level minimum spanning tree and data structures to hold pseudotime
    inference results.
  home: https://bioconductor.org/packages/3.22/bioc/html/TrajectoryUtils.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Single-Cell Trajectory Analysis Utilities
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-trajectoryutils
  version: 1.18.0
requirements:
  host:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-igraph
  - r-matrix
  run:
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-igraph
  - r-matrix
source:
  md5: d4cb46f56f7e01346b264db570f65811
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TrajectoryUtils_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TrajectoryUtils/TrajectoryUtils_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/TrajectoryUtils_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-trajectoryutils/bioconductor-trajectoryutils_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TrajectoryUtils')"
