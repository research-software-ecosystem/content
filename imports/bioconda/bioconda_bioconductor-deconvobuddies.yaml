about:
  description: Funtions helpful for LIBD deconvolution project. Includes tools for
    marker finding with mean ratio, expression plotting, and plotting deconvolution
    results. Working to include DLPFC datasets.
  home: https://bioconductor.org/packages/3.22/bioc/html/DeconvoBuddies.html
  license: Artistic-2.0
  summary: Helper Functions for LIBD Deconvolution
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-deconvobuddies
  version: 1.2.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-delayedmatrixstats >=1.32.0,<1.33.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scran >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatiallibd >=1.22.0,<1.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-purrr
  - r-rafalib
  - r-reshape2
  - r-stringr
  - r-tibble
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
