about:
  description: Whole-genome single cell sequencing data for demonstration purposes
    in the AneuFinder package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/AneuFinderData.html
  license: file LICENSE
  license_file: LICENSE
  summary: WGSCS Data for Demonstration Purposes
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-aneufinderdata
  version: 1.38.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 6e7492c72a206535ae9e8d7f49d24fec
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/AneuFinderData_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/AneuFinderData/AneuFinderData_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/AneuFinderData_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-aneufinderdata/bioconductor-aneufinderdata_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('AneuFinderData')"
