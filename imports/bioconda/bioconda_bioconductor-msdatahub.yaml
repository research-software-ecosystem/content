about:
  description: The MsDataHub package uses the ExperimentHub infrastructure to distribute
    raw mass spectrometry data files, peptide spectrum matches or quantitative data
    from proteomics and metabolomics experiments.
  home: https://bioconductor.org/packages/3.22/bioc/html/MsDataHub.html
  license: Artistic-2.0
  summary: Mass Spectrometry Data on ExperimentHub
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-msdatahub
  version: 1.10.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
source:
  md5: 4ad62928fb49233f7aefc50a560ad9df
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MsDataHub_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MsDataHub/MsDataHub_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/MsDataHub_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-msdatahub/bioconductor-msdatahub_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MsDataHub')"
