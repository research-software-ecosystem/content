about:
  description: This package defines a custom landing page for an iSEE app interfacing
    with the Bioconductor ExperimentHub. The landing page allows users to browse the
    ExperimentHub, select a data set, download and cache it, and import it directly
    into a Bioconductor iSEE app.
  home: https://bioconductor.org/packages/3.22/bioc/html/iSEEhub.html
  license: Artistic-2.0
  summary: iSEE for the Bioconductor ExperimentHub
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-iseehub
  version: 1.12.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-isee >=2.22.0,<2.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-biocmanager
  - r-dt
  - r-rintrojs
  - r-shiny
  - r-shinydashboard
  - r-shinyjs
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-isee >=2.22.0,<2.23.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-biocmanager
  - r-dt
  - r-rintrojs
  - r-shiny
  - r-shinydashboard
  - r-shinyjs
source:
  md5: e5b7aae3140c4cd5a600921bb1f1a53c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/iSEEhub_1.12.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/iSEEhub/iSEEhub_1.12.0.tar.gz
  - https://bioarchive.galaxyproject.org/iSEEhub_1.12.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-iseehub/bioconductor-iseehub_1.12.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('iSEEhub')"
