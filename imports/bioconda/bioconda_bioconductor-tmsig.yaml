about:
  description: The TMSig package contains tools to prepare, analyze, and visualize
    named lists of sets, with an emphasis on molecular signatures (such as gene or
    kinase sets). It includes fast, memory efficient functions to construct sparse
    incidence and similarity matrices and filter, cluster, invert, and decompose sets.
    Additionally, bubble heatmaps can be created to visualize the results of any differential
    or molecular signatures analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/TMSig.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Tools for Molecular Signatures
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tmsig
  version: 1.4.0
requirements:
  host:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
  - r-circlize
  - r-data.table
  - r-matrix
  run:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-gseabase >=1.72.0,<1.73.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
  - r-circlize
  - r-data.table
  - r-matrix
source:
  md5: dde139c71de6c3881678dd5caba521f2
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TMSig_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TMSig/TMSig_1.4.0.tar.gz
