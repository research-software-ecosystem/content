  - python >=3.6
  - pip
  - hatchling
  run:
  - python >=3.6
  - mappy
  - python-edlib
  - natsort
source:
  sha256: 861ccd0738e4e1c0d298a5a5510b92cdb1b9c8e3dcafed3d67e0ce1dcd8b5b3e
  url: https://pypi.io/packages/source/g/gapmm2/gapmm2-26.5.22.tar.gz
test:
  commands:
  - gapmm2 --help
  imports:
  - gapmm2
