about:
  description: This package provides an R interface to Megadepth by Christopher Wilks
    available at https://github.com/ChristopherWilks/megadepth. It is particularly
    useful for computing the coverage of a set of genomic regions across bigWig or
    BAM files. With this package, you can build base-pair coverage matrices for regions
    or annotations of your choice from BigWig files. Megadepth was used to create
    the raw files provided by https://bioconductor.org/packages/recount3.
  home: https://bioconductor.org/packages/3.22/bioc/html/megadepth.html
  license: Artistic-2.0
  summary: 'megadepth: BigWig and BAM related utilities'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-megadepth
  version: 1.20.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-cmdfun
  - r-dplyr
  - r-fs
  - r-magrittr
  - r-readr
  - r-xfun
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-cmdfun
  - r-dplyr
  - r-fs
  - r-magrittr
  - r-readr
  - r-xfun
source:
  md5: 0dc129aaf84189b1ee8b35c198309272
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/megadepth_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/megadepth/megadepth_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/megadepth_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-megadepth/bioconductor-megadepth_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('megadepth')"
