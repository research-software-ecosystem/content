about:
  description: 'MLSTudio is an integrated MLST and cgMLST typing tool for bacterial
    isolates,

    bundling scheme management (PubMLST, BIGSdb-Pasteur, cgMLST.org, ad-hoc),

    BLAST-based allele calling, AMRFinderPlus integration, and a local web UI

    with a Cytoscape.js minimum-spanning-tree viewer. Aimed at filling the gap

    between calling-only tools (chewBBACA) and visualization-only tools

    (GrapeTree) without a SeqSphere-style licence cost.

    '
  dev_url: https://github.com/iowa69/mlstudio
  doc_url: https://github.com/iowa69/mlstudio
  home: https://github.com/iowa69/mlstudio
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Free, open-source MLST/cgMLST typing with an interactive minimum-spanning-tree
    GUI for Linux.
build:
  entry_points:
  - mlstudio = mlstudio.cli:app
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - iowa69
package:
  name: mlstudio
  version: 1.4.0
requirements:
  host:
  - python >=3.11
  - pip
  - hatchling >=1.21
  run:
  - python >=3.11
  - typer >=0.12
  - rich >=13.7
  - httpx >=0.27
  - fastapi >=0.111
  - uvicorn-standard >=0.30
  - websockets >=12
  - python-multipart >=0.0.9
  - pydantic >=2.7
  - numpy >=1.26
  - pandas >=2.2
  - pyarrow >=16
  - biopython >=1.83
  - pysam >=0.22
  - networkx >=3.3
  - platformdirs >=4.2
  - blast >=2.14
  - prodigal >=2.6.3
  - fastp >=0.23
  - ncbi-amrfinderplus >=3.12
source:
  sha256: e99bc4bae8472c1d7e536b5caf4e52c68f4369b983c0c8d39501958616befc53
  url: https://github.com/iowa69/mlstudio/archive/refs/tags/v1.4.0.tar.gz
test:
  commands:
  - mlstudio --version
  - mlstudio --help
  - blastn -version
  - makeblastdb -version
  - prodigal -v 2>&1 | grep -i prodigal
  - fastp --version 2>&1 | grep -i fastp
  - amrfinder --version
  imports:
  - mlstudio
  - mlstudio.api.server
  - mlstudio.calling.cgmlst
  - mlstudio.calling.mlst
  - mlstudio.profiles.distance
  - mlstudio.profiles.mst
