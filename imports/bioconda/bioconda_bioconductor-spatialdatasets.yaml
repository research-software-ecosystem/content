about:
  description: This is a collection of publically available spatial omics datasets.
    Where possible we have curated these datasets as either SpatialExperiments, MoleculeExperiments
    or CytoImageLists and included annotations of the sample characteristics.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/SpatialDatasets.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Collection of spatial omics datasets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spatialdatasets
  version: 1.8.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 9cb422ef023f1a17e9c0c1e3758918f1
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/SpatialDatasets_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SpatialDatasets/SpatialDatasets_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/SpatialDatasets_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-spatialdatasets/bioconductor-spatialdatasets_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SpatialDatasets')"
