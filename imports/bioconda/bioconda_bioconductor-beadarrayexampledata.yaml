about:
  description: An small dataset that can be used to run examples from the beadarray
    vignette and examples
  home: https://bioconductor.org/packages/3.22/data/experiment/html/beadarrayExampleData.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Example data for the beadarray package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-beadarrayexampledata
  version: 1.47.0
requirements:
  host:
  - bioconductor-beadarray >=2.60.0,<2.61.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-beadarray >=2.60.0,<2.61.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 05b4c55cf8582112c30c8cca2ed1ec47
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/beadarrayExampleData_1.47.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/beadarrayExampleData/beadarrayExampleData_1.47.0.tar.gz
  - https://bioarchive.galaxyproject.org/beadarrayExampleData_1.47.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-beadarrayexampledata/bioconductor-beadarrayexampledata_1.47.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('beadarrayExampleData')"
