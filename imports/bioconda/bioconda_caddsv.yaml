about:
  description: 'CADD-SV is a Snakemake-based command-line tool for scoring structural

    variants. This package installs the caddsv CLI and bundled workflow files.

    Large annotation resources are downloaded separately with

    caddsv get annotations.

    '
  dev_url: https://github.com/kircherlab/CADD-SV
  home: https://github.com/kircherlab/CADD-SV
  license: MIT
  license_file: LICENSE
  summary: CADD-SV structural variant scoring workflow CLI
build:
  entry_points:
  - caddsv = caddsv.cli:app
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  notes: 'CADD-SV invokes Snakemake with --use-conda and packaged workflow

    environment YAML files. Full scoring requires a working conda-compatible

    environment manager at runtime. SegmentNT modes require GPU-capable

    infrastructure and may download Hugging Face model weights unless the user

    has already populated the cache.

    '
  recipe-maintainers:
  - catonao
package:
  name: caddsv
  version: '2.0'
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools >=61
  run:
  - python >=3.9
  - typer >=0.9
  - huggingface_hub >=0.24
  - snakemake >=7.31
  - pulp ==2.7
  - numpy
  - pandas
source:
  sha256: c5eefc4e3bf2305966f6bf723c0ee8d5128dca848b4783ae43baa7238a430dc0
  url: https://github.com/kircherlab/CADD-SV/archive/refs/tags/v2.0.tar.gz
test:
  commands:
  - caddsv --help
  - caddsv run --help
  imports:
  - caddsv
