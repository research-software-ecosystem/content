about:
  description: omicsGMF is a Bioconductor package that uses the sgdGMF-framework of
    the \code{sgdGMF} package for highly performant and fast matrix factorization
    that can be used for dimensionality reduction, visualization and imputation of
    omics data. It considers data from the general exponential family as input, and
    therefore suits the use of both RNA-seq (Poisson or Negative Binomial data) and
    proteomics data (Gaussian data). It does not require prior transformation of counts
    to the log-scale, because it rather optimizes the deviances from the data family
    specified. Also, it allows to correct for known sample-level and feature-level
    covariates, therefore enabling visualization and dimensionality reduction upon
    batch correction. Last but not least, it deals with missing values, and allows
    to impute these after matrix factorization, useful for proteomics data. This Bioconductor
    package allows input of SummarizedExperiment, SingleCellExperiment, and QFeature
    classes.
  home: https://bioconductor.org/packages/3.22/bioc/html/omicsGMF.html
  license: Artistic-2.0
  summary: Dimensionality reduction of (single-cell) omics data in R using omicsGMF
