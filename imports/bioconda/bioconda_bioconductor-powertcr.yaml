about:
  description: This package provides a model for the clone size distribution of the
    TCR repertoire. Further, it permits comparative analysis of TCR repertoire libraries
    based on theoretical model fits.
  home: https://bioconductor.org/packages/3.22/bioc/html/powerTCR.html
  license: Artistic-2.0
  summary: Model-Based Comparative Analysis of the TCR Repertoire
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-powertcr
  version: 1.30.0
requirements:
  host:
  - r-base
  - r-cubature
  - r-doparallel
  - r-evmix
  - r-foreach
  - r-magrittr
  - r-purrr
  - r-truncdist
  - r-vegan
  - r-vgam
  run:
  - r-base
  - r-cubature
  - r-doparallel
  - r-evmix
  - r-foreach
  - r-magrittr
  - r-purrr
  - r-truncdist
  - r-vegan
  - r-vgam
source:
  md5: 22944c23d68464a22eb3fbe15e386d60
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/powerTCR_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/powerTCR/powerTCR_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/powerTCR_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-powertcr/bioconductor-powertcr_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('powerTCR')"
