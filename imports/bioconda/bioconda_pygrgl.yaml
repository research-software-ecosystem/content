about:
  dev_url: https://github.com/aprilweilab/grgl
  doc_url: https://grgl.readthedocs.io/en/stable/
  home: https://aprilweilab.github.io/
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Genotype Representation Graph Library for efficient storage/use of huge
    genetic datasets
build:
  entry_points:
  - grg=pygrgl.cli:main
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - dcdehaas
package:
  name: pygrgl
  version: '2.7'
requirements:
  build:
  - null
  - cmake
  - make
  host:
  - python
  - zlib
  - pip
  - tqdm
  - setuptools
  run:
  - python
  - tqdm
source:
  sha256: 84136bd6ea4d1f54a23c7678e8dbff5d9d08732659523ead1585dd83e7c76f0c
  url: https://pypi.io/packages/source/p/pygrgl/pygrgl-2.7.tar.gz
test:
  commands:
  - grg --help
  imports:
  - pygrgl
