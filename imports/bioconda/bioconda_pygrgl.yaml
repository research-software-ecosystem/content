about:
  dev_url: https://github.com/aprilweilab/grgl
  doc_url: https://grgl.readthedocs.io/en/stable/
  home: https://aprilweilab.github.io/
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Genotype Representation Graph Library for efficient storage/use of huge
    genetic datasets
build:
  entry_points:
  - grg=pygrgl.cli:main
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - dcdehaas
package:
  name: pygrgl
  version: '2.6'
requirements:
  build:
  - null
  - cmake
  - make
  host:
  - python
  - zlib
  - pip
  - tqdm
  run:
  - python
  - tqdm
source:
  sha256: f025f4f06f355f89e7d066cf6f370c59a8df2d2827d1f5142f8df93d4f0f2cc7
  url: https://pypi.io/packages/source/p/pygrgl/pygrgl-2.6.tar.gz
test:
  commands:
  - grg --help
  imports:
  - pygrgl
