about:
  dev_url: https://github.com/aprilweilab/grgl
  doc_url: https://grgl.readthedocs.io/en/stable/
  home: https://aprilweilab.github.io/
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Genotype Representation Graph Library for efficient storage/use of huge
    genetic datasets
build:
  entry_points:
  - grg=pygrgl.cli:main
  number: 0
  run_exports:
  - null
  script: ' -m pip install --no-deps --no-build-isolation . -vv'
extra:
  recipe-maintainers:
  - dcdehaas
package:
  name: pygrgl
  version: '2.8'
requirements:
  build:
  - null
  - null
  - cmake
  - make
  host:
  - python
  - zlib
  - pip
  - tqdm
  - setuptools
  run:
  - python
  - tqdm
source:
  sha256: 2cba2eacb94d94c9d57ab82fb95c2305b851f585c28854f2bc4b89575b4d633f
  url: https://pypi.io/packages/source/p/pygrgl/pygrgl-2.8.tar.gz
test:
  commands:
  - grg --help
  imports:
  - pygrgl
