about:
  description: The iModMix network-based method offers an integrated framework for
    analyzing multi-omics data, including metabolomics, proteomics, and transcriptomics
    data, enabling the exploration of intricate molecular associations within heterogeneous
    biological systems.
  home: https://bioconductor.org/packages/3.22/bioc/html/iModMix.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Integrative Modules for Multi-Omics Data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-imodmix
  version: 1.0.0
