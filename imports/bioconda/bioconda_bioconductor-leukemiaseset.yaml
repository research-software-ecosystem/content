about:
  description: Expressionset containing gene expresion data from 60 bone marrow samples
    of patients with one of the four main types of leukemia (ALL, AML, CLL, CML) or
    non-leukemia.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/leukemiasEset.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Leukemia's microarray gene expression data (expressionSet).
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-leukemiaseset
  version: 1.46.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 802f7fea2d01c96fc8bb0a26db417ab7
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/leukemiasEset_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/leukemiasEset/leukemiasEset_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/leukemiasEset_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-leukemiaseset/bioconductor-leukemiaseset_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('leukemiasEset')"
