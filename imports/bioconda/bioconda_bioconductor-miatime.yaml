about:
  description: The `miaTime` package provides tools for microbiome time series analysis
    based on (Tree)SummarizedExperiment infrastructure.
  home: https://bioconductor.org/packages/3.22/bioc/html/miaTime.html
  license: Artistic-2.0 | file LICENSE
  license_file: LICENSE
  summary: Microbiome Time Series Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-miatime
  version: 1.0.0
requirements:
  host:
  - bioconductor-mia >=1.18.0,<1.19.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-base
  - r-dplyr
  - r-tidyr
  run:
  - bioconductor-mia >=1.18.0,<1.19.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-base
  - r-dplyr
  - r-tidyr
source:
  md5: fabf6a9fdcf462aee466ef400f8c63c6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/miaTime_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/miaTime/miaTime_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/miaTime_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-miatime/bioconductor-miatime_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('miaTime')"
