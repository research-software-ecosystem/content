  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GWAS.BAYES_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GWAS.BAYES/GWAS.BAYES_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/GWAS.BAYES_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gwas.bayes/bioconductor-gwas.bayes_1.20.0_src_all.tar.gz
test:
