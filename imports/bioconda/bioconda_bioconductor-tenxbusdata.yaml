about:
  description: Download Barcode, UMI, and Set (BUS) format of 10x datasets from within
    R. This package accompanies the package BUSpaRse, which can load BUS format into
    R as a sparse matrix, and which has utility functions related to using the C++
    command line package bustools.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/TENxBUSData.html
  license: BSD_2_clause + file LICENSE
  license_file: LICENSE
  summary: Single cell dataset from 10x in BUS format
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tenxbusdata
  version: 1.24.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 2aa465ba53fe61cea788aaabf22f01bb
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/TENxBUSData_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TENxBUSData/TENxBUSData_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/TENxBUSData_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tenxbusdata/bioconductor-tenxbusdata_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TENxBUSData')"
