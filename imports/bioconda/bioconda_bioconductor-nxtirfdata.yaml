about:
  description: NxtIRFdata is a companion package for SpliceWiz, an interactive analysis
    and visualization tool for alternative splicing quantitation (including intron
    retention) for RNA-seq BAM files. NxtIRFdata contains Mappability files required
    for the generation of human and mouse references. NxtIRFdata also contains a synthetic
    genome reference and example BAM files used to demonstrate SpliceWiz's functionality.
    BAM files are based on 6 samples from the Leucegene dataset provided by NCBI Gene
    Expression Omnibus under accession number GSE67039.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/NxtIRFdata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Data for NxtIRF
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-nxtirfdata
  version: 1.16.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-r.utils
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - r-base
  - r-r.utils
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 58b78cd06976fa96084b996871727a2f
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/NxtIRFdata_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/NxtIRFdata/NxtIRFdata_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/NxtIRFdata_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-nxtirfdata/bioconductor-nxtirfdata_1.16.0_src_all.tar.gz
test:
