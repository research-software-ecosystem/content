about:
  description: 'FJORD (Flexible Joint Operational pipeline for Reference-based Diagnostics)

    is an amplicon sequencing pipeline for bacterial identification from Oxford

    Nanopore Technologies long-read data. It maps reads to a GTDB-formatted

    reference database, generates consensus sequences, clusters similar

    sequences with IUPAC-aware consolidation, and assigns taxonomy via BLAST.

    '
  dev_url: https://github.com/adnsvrtsn/fjord
  home: https://github.com/adnsvrtsn/fjord
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: ONT amplicon sequencing pipeline for bacterial identification
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  recipe-maintainers:
  - adnsvrtsn
package:
  name: fjord
  version: 1.0.0
requirements:
  run:
  - bash >=3.2
  - python >=3.8
  - biopython
  - x-mapper
  - samtools >=1.15
  - blast
  - vsearch
source:
  sha256: 83915f23de315080f7f51cc0278e26b1aff3486465145c396e6f42302ce674a3
  url: https://github.com/adnsvrtsn/fjord/archive/v1.0.0.tar.gz
test:
  commands:
  - fjord --version
  - fjord --help
