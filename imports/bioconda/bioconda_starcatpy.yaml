about:
  dev_url: https://github.com/immunogenomics/starCAT
  home: https://github.com/immunogenomics/starCAT
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Implements *CellAnnotator (aka *CAT/starCAT), annotating scRNA-Seq with
    predefined gene expression programs.
build:
  entry_points:
  - starcat = starcat:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
package:
  name: starcatpy
  version: 1.0.10
requirements:
  host:
  - python
  - pip
  - setuptools
  run:
  - python
  - scikit-learn >=1.0
  - anndata
  - pandas
  - numpy
  - scipy
  - pyyaml
  - requests
source:
  sha256: ff1b7e7a6d3e9432a7a8443bff810a44780bda188722388a6565ae09c03d4186
  url: https://pypi.org/packages/source/s/starcatpy/starcatpy-1.0.10.tar.gz
test:
  commands:
  - starcat --help
  imports:
  - starcat
