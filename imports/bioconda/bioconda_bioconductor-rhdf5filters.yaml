about:
  description: Provides a collection of additional compression filters for HDF5 datasets.
    The package is intended to provide seemless integration with rhdf5, however the
    compiled filters can also be used with external applications.
  home: https://bioconductor.org/packages/3.22/bioc/html/rhdf5filters.html
  license: BSD_2_clause + file LICENSE
  license_file: LICENSE
  summary: HDF5 Compression Filters
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:rhdf5filters
package:
  name: bioconductor-rhdf5filters
  version: 1.22.0
requirements:
  build:
  - null
  - null
  - automake
  - make
  host:
  - bioconductor-rhdf5lib >=1.32.0,<1.33.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-rhdf5lib >=1.32.0,<1.33.0
  - r-base
source:
  md5: 6ad81aa9580ffdc3e26301793abc8507
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rhdf5filters_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rhdf5filters/rhdf5filters_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/rhdf5filters_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rhdf5filters/bioconductor-rhdf5filters_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rhdf5filters')"
