build:
  noarch: python
  number: 0
  run_exports:
  - null
package:
  name: ampliconsuite
  version: 1.5.2
requirements:
  build:
  - python >=3
  - setuptools
  host:
  - python >=3
  - setuptools
  run:
  - python >=3
  - bwa
  - cnvkit >=0.9.10
  - Flask
  - future
  - intervaltree
  - matplotlib-base
  - mscorefonts
  - numpy
  - pysam
  - samtools
  - scipy
  - bedtools
source:
- sha256: d87497438bda6638de93ddd29172e003b83281ebe99c1ece1dff7d54e90486b6
  url: https://github.com/AmpliconSuite/AmpliconSuite-pipeline/archive/v1.5.2.tar.gz
- folder: ampliconarchitectlib
  sha256: 4c13876174d5d9a7b764f278812a08f2a71b6a5810146038f72ca74a9d46d160
  url: https://github.com/AmpliconSuite/AmpliconArchitect/archive/v1.5.r6.tar.gz
