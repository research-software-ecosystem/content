build:
  noarch: python
  number: 0
  run_exports:
  - null
package:
  name: ampliconsuite
  version: 1.5.1
requirements:
  build:
  - python >=3
  - setuptools
  host:
  - python >=3
  - setuptools
  run:
  - python >=3
  - bwa
  - cnvkit >=0.9.10
  - Flask
  - future
  - intervaltree
  - matplotlib-base
  - mscorefonts
  - numpy
  - pysam
  - samtools
  - scipy
  - bedtools
source:
- sha256: 739be2ff6e2dc1eca8c810e598f6b808d704d2d5aa84234b1dac75782957fff8
  url: https://github.com/AmpliconSuite/AmpliconSuite-pipeline/archive/v1.5.1.tar.gz
- folder: ampliconarchitectlib
  sha256: ddf10f23eb11fae2f5a63263339bbcbdc3896caf9d5c6bfcd264532a960cd618
  url: https://github.com/AmpliconSuite/AmpliconArchitect/archive/v1.5.r5.tar.gz
- sha256: e4619f3a22005ac650d17b5e9dab298d4da93746cd1fd60955bb3a639a3855c9
  url: https://github.com/AmpliconSuite/AmpliconClassifier/archive/v1.5.1.tar.gz
test:
  commands:
  - python3 $(which AmpliconSuite-pipeline.py) -v
  - python3 $(which GroupedAnalysisAmpSuite.py) -v
  - python3 $(which amplicon_classifier.py) -v
  - python3 $(which feature_similarity.py) -h
