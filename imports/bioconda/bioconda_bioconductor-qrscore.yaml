about:
  description: In genomics, differential analysis enables the discovery of groups
    of genes implicating important biological processes such as cell differentiation
    and aging. Non-parametric tests of differential gene expression usually detect
    shifts in centrality (such as mean or median), and therefore suffer from diminished
    power against alternative hypotheses characterized by shifts in spread (such as
    variance). This package provides a flexible family of non-parametric two-sample
    tests and K-sample tests, which is based on theoretical work around non-parametric
    tests, spacing statistics and local asymptotic normality (Erdmann-Pham et al.,
    2022+ [arXiv:2008.06664v2]; Erdmann-Pham, 2023+ [arXiv:2209.14235v2]).
  home: https://bioconductor.org/packages/3.22/bioc/html/QRscore.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Quantile Rank Score
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
