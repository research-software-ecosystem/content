about:
  description: HiContacts provides a collection of tools to analyse and visualize
    Hi-C datasets imported in R by HiCExperiment.
  home: https://bioconductor.org/packages/3.22/bioc/html/HiContacts.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Analysing cool files in R with HiContacts
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hicontacts
  version: 1.12.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hicexperiment >=1.10.0,<1.11.0
  - bioconductor-interactionset >=1.38.0,<1.39.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-ggrastr
  - r-matrix
  - r-readr
  - r-rspectra
  - r-scales
  - r-stringr
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hicexperiment >=1.10.0,<1.11.0
  - bioconductor-interactionset >=1.38.0,<1.39.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-ggrastr
  - r-matrix
  - r-readr
  - r-rspectra
  - r-scales
  - r-stringr
  - r-tibble
  - r-tidyr
