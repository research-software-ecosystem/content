about:
  description: Combine generalised least squares methodology from the nlme package
    for dealing with autocorrelation with penalised least squares methods from the
    glmnet package to deal with high dimensionality. This pengls packages glues them
    together through an iterative loop. The resulting method is applicable to high
    dimensional datasets that exhibit autocorrelation, such as spatial or temporal
    data.
  home: https://bioconductor.org/packages/3.22/bioc/html/pengls.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Fit Penalised Generalised Least Squares models
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-pengls
  version: 1.16.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-glmnet
  - r-nlme
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-glmnet
  - r-nlme
source:
  md5: e5841d6879cc5be6b3131a1eb87faccf
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/pengls_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pengls/pengls_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/pengls_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pengls/bioconductor-pengls_1.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('pengls')"
