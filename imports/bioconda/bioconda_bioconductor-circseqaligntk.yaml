about:
  description: CircSeqAlignTk is a toolkit for the analysis of RNA-Seq data derived
    from circular genome sequences, with a primary focus on viroids, circular RNAs
    typically consisting of a few hundred nucleotides. The toolkit supports an end-to-end
    analysis pipeline, from alignment to visualization.
  home: https://bioconductor.org/packages/3.22/bioc/html/CircSeqAlignTk.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: End-to-End Analysis of Small RNA-Seq Data from Viroids
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-circseqaligntk
  version: 1.12.0
