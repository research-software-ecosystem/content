about:
  dev_url: https://github.com/tedil/snakemake-logger-plugin-prometheus
  home: https://github.com/tedil/snakemake-logger-plugin-prometheus
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A Snakemake logger plugin that exposes workflow metrics via a Prometheus-compatible
    HTTP endpoint.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - tedil
  - fgvieira
package:
  name: snakemake-logger-plugin-prometheus
  version: 0.1.1
requirements:
  host:
  - python >=3.11,<4.0
  - hatchling
  - pip
  run:
  - python >=3.11,<4.0
  - prometheus_client >0.24.0,<1.0.0
  - snakemake-interface-logger-plugins >=2.0.0,<3.0.0
  - requests >=2.31
source:
  sha256: b6951c402ae02443902ce7480dd12fa2bc6fba8ea4396a27bc356345cc649814
  url: https://pypi.io/packages/source/s/snakemake-logger-plugin-prometheus/snakemake_logger_plugin_prometheus-0.1.1.tar.gz
test:
  imports:
  - snakemake_logger_plugin_prometheus
