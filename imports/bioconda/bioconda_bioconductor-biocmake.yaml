about:
  description: Manages the installation of CMake for building Bioconductor packages.
    This avoids the need for end-users to manually install CMake on their system.
    No action is performed if a suitable version of CMake is already available.
  home: https://bioconductor.org/packages/3.22/bioc/html/biocmake.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: CMake for Bioconductor
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biocmake
  version: 1.2.0
requirements:
  host:
  - bioconductor-dir.expiry >=1.18.0,<1.19.0
  - r-base
  run:
  - bioconductor-dir.expiry >=1.18.0,<1.19.0
  - r-base
source:
  md5: bd5bb06d493c0ce944fc91be6206eb97
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/biocmake_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/biocmake/biocmake_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/biocmake_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biocmake/bioconductor-biocmake_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('biocmake')"
