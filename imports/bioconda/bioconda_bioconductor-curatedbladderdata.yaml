    for gene expression analysis in patients with bladder cancer.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/curatedBladderData.html
  license: Artistic-2.0
  summary: Bladder Cancer Gene Expression Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-curatedbladderdata
  version: 1.46.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - r-base
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: adc80b63e824799773e63eb0f8450c87
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/curatedBladderData_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/curatedBladderData/curatedBladderData_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/curatedBladderData_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-curatedbladderdata/bioconductor-curatedbladderdata_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('curatedBladderData')"
