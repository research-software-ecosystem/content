about:
  dev_url: https://github.com/poeli/GOTTCHA2
  doc_url: https://github.com/poeli/GOTTCHA2/wiki
  home: https://github.com/poeli/GOTTCHA2
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Genomic Origin Through Taxonomic CHAllenge (GOTTCHA) v2.
build:
  entry_points:
  - gottcha2 = gottcha.scripts.cmd:gottcha2_command
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install -vvv --no-deps --no-build-isolation --no-cache-dir .
extra:
  identifiers:
  - biotools:gottcha2
package:
  name: gottcha2
  version: 2.4.0
requirements:
  host:
  - python >=3.6
  - pip
  - setuptools
  - pandas
  run:
  - python >=3.6
  - minimap2 >=2.17
  - gawk
  - biom-format >=2.1.7
  - numpy
  - pandas
  - requests
  - tqdm
source:
  sha256: 96f3f2433eb96dd185851e65d6d52fc7d134eaa43cbb6de805a94c0aa43a0006
  url: https://github.com/poeli/GOTTCHA2/archive/refs/tags/2.4.0.tar.gz
test:
  commands:
  - minimap2 -h
  - gawk -h
  - gottcha2.py --version
