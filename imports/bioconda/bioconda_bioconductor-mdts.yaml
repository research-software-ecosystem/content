about:
  description: A package for the detection of de novo copy number deletions in targeted
    sequencing of trios with high sensitivity and positive predictive value.
  home: https://bioconductor.org/packages/3.22/bioc/html/MDTS.html
  license: Artistic-2.0
  summary: Detection of de novo deletion in targeted sequencing trios
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mdts
  version: 1.30.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - r-stringr
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-dnacopy >=1.84.0,<1.85.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - r-stringr
source:
  md5: 2a84e28eb2e9799d1c2d6af003500634
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MDTS_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MDTS/MDTS_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/MDTS_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mdts/bioconductor-mdts_1.30.0_src_all.tar.gz
test:
