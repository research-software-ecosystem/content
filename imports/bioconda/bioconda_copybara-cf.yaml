about:
  dev_url: https://github.com/cortes-ciriano-lab/copybara-cf
  home: https://github.com/cortes-ciriano-lab/copybara-cf
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: COPYBARA - copy number analysis for long-read cfDNA sequencing data
build:
  entry_points:
  - copybara = copybara.copybara:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: copybara-cf
  version: 0.1.0
requirements:
  build:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - numpy
  - scipy
  - seaborn
  - pybedtools >=0.9.0
  - pysam >=0.20.0
  - pandas >=2.0.0
  - matplotlib-base >=3.7.1
  - intervaltree
  - statsmodels
source:
  sha256: 0543d67cf91e2644e779503df3bb0f0a39df0097b6d813c3e35e30be48ade5d2
  url: https://github.com/cortes-ciriano-lab/copybara-cf/archive/v0.1.0.tar.gz
test:
  commands:
  - copybara --version
  - copybara --help
  - copybara pon --help
  - copybara focal --help
