about:
  description: Utility package to facilitate integration and analysis of EBI MGnify
    data in R. The package can be used to import microbial data for instance into
    TreeSummarizedExperiment (TreeSE). In TreeSE format, the data is directly compatible
    with miaverse framework.
  home: https://bioconductor.org/packages/3.22/bioc/html/MGnifyR.html
  license: Artistic-2.0 | file LICENSE
  license_file: LICENSE
  summary: R interface to EBI MGnify metagenomics resource
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mgnifyr
  version: 1.6.1
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-mia >=1.18.0,<1.19.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-ape
  - r-base
  - r-dplyr
  - r-httr
  - r-plyr
  - r-reshape2
  - r-urltools
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-mia >=1.18.0,<1.19.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-ape
  - r-base
  - r-dplyr
  - r-httr
  - r-plyr
  - r-reshape2
  - r-urltools
source:
  md5: 24c9d3f0c49c4b936db546cc1a5f7dfc
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MGnifyR_1.6.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MGnifyR/MGnifyR_1.6.1.tar.gz
  - https://bioarchive.galaxyproject.org/MGnifyR_1.6.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mgnifyr/bioconductor-mgnifyr_1.6.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('MGnifyR')"
