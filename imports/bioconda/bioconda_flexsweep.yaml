about:
  dev_url: https://github.com/jmurga/flexsweep
  doc_url: https://flexsweep.readthedocs.io/en/latest
  home: https://github.com/jmurga/flexsweep
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A versatile tool for detecting selective sweeps.
build:
  entry_points:
  - flexsweep = flexsweep.main:cli
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - jmurga
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: flexsweep
  version: 1.9.2
requirements:
  build:
  - null
  - null
  - null
  - cargo-bundle-licenses
  - make
  - cmake
  - pkg-config
  host:
  - python
  - pip
  - maturin >=1.5,<2.0
  - zig
  run:
  - python
  - scipy >=1.14.0,<2.0.0
  - scikit-allel >=1.3.8,<2.0.0
  - scikit-learn >=1.5.1,<2.0.0
  - joblib >=1.4.2,<2.0.0
  - threadpoolctl >=3.5.0,<4.0.0
  - click >=8.1.7,<9.0.0
  - numpy ==1.26.4
  - numba >=0.60.0,<0.61.0
  - demes >=0.2.3,<0.3.0
  - tensorflow >=2.18.0
  - pyarrow >=21.0.0,<22
  - pyarrow >=19
  - matplotlib-base >=3.9.2,<4.0.0
  - polars >=1.14.0,<2.0.0
  - pybedtools >=0.12.0
  - tbb >=2022.1.0,<2023.0.0
source:
  sha256: 0cb388f40a79116d9f491eeb7ac8f7d9fdcb9b084e3420c0f709f2b2baffdbb9
  url: https://pypi.org/packages/source/f/flexsweep/flexsweep-1.9.2.tar.gz
test:
  commands:
  - flexsweep --help
