about:
  description: Runs PANDA, an algorithm for discovering novel network structure by
    combining information from multiple complementary data sources.
  home: https://bioconductor.org/packages/3.22/bioc/html/pandaR.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: PANDA Algorithm
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:pandar
  parent_recipe:
    name: bioconductor-pandar
    path: recipes/bioconductor-pandar
    version: 1.12.0
package:
  name: bioconductor-pandar
  version: 1.42.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-ggplot2
  - r-hexbin
  - r-igraph
  - r-matrixstats
  - r-plyr
  - r-reshape
  - r-runit
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-ggplot2
  - r-hexbin
  - r-igraph
  - r-matrixstats
  - r-plyr
  - r-reshape
  - r-runit
source:
  md5: 46a3a1ecff115eb861f6cd3cfd6c9b6a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/pandaR_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/pandaR/pandaR_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/pandaR_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pandar/bioconductor-pandar_1.42.0_src_all.tar.gz
test:
