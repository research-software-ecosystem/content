about:
  description: This data package contains timecourse gene expression data sets. The
    first dataset, from Shoemaker et al, consists of microarray samples from lung
    tissue of mice exposed to different influenzy strains from 14 timepoints. The
    two other datasets are leaf and root samples from sorghum crops exposed to pre-
    and post-flowering drought stress and a control condition, sampled across the
    plants lifetime.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/timecoursedata.html
  license: BSD 3-clause License + file LICENSE
  license_file: LICENSE
  summary: A data package for timecourse RNA-seq and microarray gene expression data
    sets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-timecoursedata
  version: 1.20.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 8084bb0cab948fed4a43e05a5ca21388
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/timecoursedata_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/timecoursedata/timecoursedata_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/timecoursedata_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-timecoursedata/bioconductor-timecoursedata_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('timecoursedata')"
