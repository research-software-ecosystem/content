about:
  description: Base-level (i.e. cytosine-level) counts for a collection of public
    bisulfite-seq datasets (e.g., WGBS and RRBS), provided as SummarizedExperiment
    objects with sample- and base-level metadata.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/MethylSeqData.html
  license: CC0
  summary: Collection of Public DNA Methylation Sequencing Datasets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-methylseqdata
  version: 1.20.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: c372fa0187560950c32441b6e978685a
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/MethylSeqData_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MethylSeqData/MethylSeqData_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/MethylSeqData_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-methylseqdata/bioconductor-methylseqdata_1.20.0_src_all.tar.gz
test:
