about:
  description: bugphyzz is an electronic database of standardized microbial annotations.
    It facilitates the creation of microbial signatures based on shared attributes,
    which are utilized for bug set enrichment analysis. The data also includes annotations
    imputed with ancestra state reconstruction methods.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/bugphyzz.html
  license: Artistic-2.0
  summary: A harmonized data resource and software for enrichment analysis of microbial
    physiologies
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bugphyzz
  version: 1.4.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-dplyr
  - r-httr2
  - r-purrr
  - r-stringr
  - r-tidyr
  - r-tidyselect
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-dplyr
  - r-httr2
  - r-purrr
  - r-stringr
  - r-tidyr
  - r-tidyselect
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 75f1f75cc148fd969355f7864ecec8c6
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/bugphyzz_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/bugphyzz/bugphyzz_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/bugphyzz_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bugphyzz/bioconductor-bugphyzz_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('bugphyzz')"
