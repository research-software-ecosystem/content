about:
  description: This package provides a set of functions useful in the analysis of
    3D genomic interactions. It includes the import of standard HiC data formats into
    R and HiC normalisation procedures. The main objective of this package is to improve
    the visualization and quantification of the analysis of HiC contacts through aggregation.
    The package allows to import 1D genomics data, such as peaks from ATACSeq, ChIPSeq,
    to create potential couples between features of interest under user-defined parameters
    such as distance between pairs of features of interest. It allows then the extraction
    of contact values from the HiC data for these couples and to perform Aggregated
    Peak Analysis (APA) for visualization, but also to compare normalized contact
    values between conditions. Overall the package allows to integrate 1D genomics
    data with 3D genomics data, providing an easy access to HiC contact values.
  home: https://bioconductor.org/packages/3.22/bioc/html/HicAggR.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Set of 3D genomic interaction analysis tools
