about:
  description: "Taffy is a C and Python library with a CLI for manipulating, \nreading,\
    \ and writing TAF and MAF format multiple sequence alignments. It allows \nconversion\
    \ between the formats and manipulation of the alignments with utilities \nfor\
    \ preparing them for different use cases\n"
  dev_url: https://github.com/ComparativeGenomicsToolkit/taffy
  doc_url: https://github.com/ComparativeGenomicsToolkit/taffy/blob/main/README.md
  home: https://github.com/ComparativeGenomicsToolkit/taffy
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A C/Python/CLI library for working with TAF alignment files
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  skip-lints:
  - uses_vcs_url
  - missing_hash
package:
  name: taffy
  version: 0.0.3
requirements:
  build:
  - null
  - null
  - make
  host:
  - python >3.11
  - pip
  - setuptools
  - cffi
  - numpy
  - htslib
  - zlib
  - bzip2
  - hdf5
  run:
  - python >3.11
  - cffi
  - numpy
  - htslib
  - zlib
  - bzip2
  - hdf5
source:
- git_rev: 5ab000b8e12bef211352131b9891c8e2cfb94063
  git_url: https://github.com/ComparativeGenomicsToolkit/taffy.git
  patches:
  - makefile.patch
  - line_iterator.patch
- folder: taffy/submodules/hal
  sha256: 052b28c8185adb090ceaae71e671e57637495cb46daf8e82c33250912a00c1e7
  url: https://github.com/ComparativeGenomicsToolkit/hal/archive/refs/tags/release-V2.3.zip
test:
  commands:
  - taffy
  - taffy view -h
  imports:
  - taffy
  - taffy.lib
