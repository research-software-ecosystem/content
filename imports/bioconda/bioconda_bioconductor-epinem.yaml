about:
  description: epiNEM is an extension of the original Nested Effects Models (NEM).
    EpiNEM is able to take into account double knockouts and infer more complex network
    signalling pathways. It is tailored towards large scale double knock-out screens.
  home: https://bioconductor.org/packages/3.22/bioc/html/epiNEM.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: epiNEM
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-epinem
  version: 1.34.0
requirements:
  host:
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-minet >=3.68.0,<3.69.0
  - bioconductor-mnem >=1.26.0,<1.27.0
  - r-base
  - r-boolnet
  - r-boutroslabplottinggeneral
  - r-e1071
  - r-gtools
  - r-igraph
  - r-latex2exp
  - r-lattice
  - r-latticeextra
  - r-pcalg
  - r-rcolorbrewer
  run:
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-minet >=3.68.0,<3.69.0
  - bioconductor-mnem >=1.26.0,<1.27.0
  - r-base
  - r-boolnet
  - r-boutroslabplottinggeneral
  - r-e1071
  - r-gtools
  - r-igraph
  - r-latex2exp
  - r-lattice
  - r-latticeextra
  - r-pcalg
  - r-rcolorbrewer
source:
  md5: ee3c24b367c50f6ef19a21d3d0493db8
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/epiNEM_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/epiNEM/epiNEM_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/epiNEM_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-epinem/bioconductor-epinem_1.34.0_src_all.tar.gz
test:
