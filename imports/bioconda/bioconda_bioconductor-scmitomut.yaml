about:
  description: This package is designed for calling lineage-informative mitochondrial
    mutations using single-cell sequencing data, such as scRNASeq and scATACSeq (preferably
    the latter due to RNA editing issues). It includes functions for mutation calling
    and visualization. Mutation calling is done using beta-binomial distribution.
  home: https://bioconductor.org/packages/3.22/bioc/html/scMitoMut.html
  license: Artistic-2.0
  summary: Single-cell Mitochondrial Mutation Analysis Tool
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scmitomut
  version: 1.6.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - r-base
  - r-data.table
  - r-ggplot2
  - r-magrittr
  - r-pheatmap
  - r-plyr
  - r-rcolorbrewer
  - r-rcpp
  - r-rcpparmadillo
  - r-readr
  - r-stringr
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - r-base
  - r-data.table
  - r-ggplot2
  - r-magrittr
  - r-pheatmap
  - r-plyr
  - r-rcolorbrewer
  - r-rcpp
  - r-rcpparmadillo
  - r-readr
  - r-stringr
