about:
  description: Provides datasets needed for ChAMP including a test dataset and blood
    controls for CNA analysis.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/ChAMPdata.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Data Packages for ChAMP package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-champdata
  version: 2.42.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: ff746bdbeb7ff7fe54608cc46f6674ee
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/ChAMPdata_2.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ChAMPdata/ChAMPdata_2.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/ChAMPdata_2.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-champdata/bioconductor-champdata_2.42.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ChAMPdata')"
