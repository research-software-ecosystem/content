about:
  description: Plots protein properties and visualizes position of peptide immunogens
    within protein sequence. Allows evaluation of immunogens based on structural and
    functional annotations to infer suitability for antibody-based methods aiming
    to detect native proteins.
  home: https://bioconductor.org/packages/3.22/bioc/html/immunogenViewer.html
  license: Apache License (>= 2)
  summary: Visualization and evaluation of protein immunogens
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-immunogenviewer
  version: 1.4.0
requirements:
  host:
  - bioconductor-uniprot.ws >=2.50.0,<2.51.0
  - r-base
  - r-ggplot2
  - r-httr
  - r-jsonlite
  - r-patchwork
  run:
  - bioconductor-uniprot.ws >=2.50.0,<2.51.0
  - r-base
  - r-ggplot2
  - r-httr
  - r-jsonlite
  - r-patchwork
source:
  md5: 6f1298c0a8a97ce263a2d3cc6900af84
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/immunogenViewer_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/immunogenViewer/immunogenViewer_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/immunogenViewer_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-immunogenviewer/bioconductor-immunogenviewer_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('immunogenViewer')"
