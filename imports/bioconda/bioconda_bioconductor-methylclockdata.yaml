about:
  description: Collection of 9 datasets, andrews and bakulski cord blood, blood gse35069,
    blood gse35069 chen, blood gse35069 complete, combined cord blood, cord bloo d
    gse68456, gervin and lyle cord blood, guintivano dlpfc and saliva gse48472". Data
    downloaded from [meffil](https://github.com/perishky/meffil/). Data used to estimate
    cell counts using Extrinsic epigenetic age acceleration (EEAA) method Collection
    of 12 datasets to use with MethylClock package to estimate chronological and gestational
    DNA methylationwith estimators to use wit different methylation clocks
  home: https://bioconductor.org/packages/3.22/data/experiment/html/methylclockData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Data for methylclock package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-methylclockdata
  version: 1.18.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-experimenthubdata >=1.36.0,<1.37.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-experimenthubdata >=1.36.0,<1.37.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 42da993831c860de3cc40f854f234b36
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/methylclockData_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/methylclockData/methylclockData_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/methylclockData_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-methylclockdata/bioconductor-methylclockdata_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('methylclockData')"
