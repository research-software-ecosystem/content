about:
  description: Provides curated gene target databases derived from ChIP-seq datasets,
    formatted as ChIPDB objects for use with TFEA.ChIP.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/ChIPDBData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: ChIP-seq Target Databases for TFEA.ChIP
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-chipdbdata
  version: 1.0.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 295a4c79c486d573ab64b69c2a917f0e
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/ChIPDBData_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ChIPDBData/ChIPDBData_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/ChIPDBData_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-chipdbdata/bioconductor-chipdbdata_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ChIPDBData')"
