about:
  home: https://github.com/KolmogorovLab/Severus
  license: BSD-3-Clause
  summary: A tool for somatic structural variant calling using long reads
build:
  noarch: python
  number: 0
  run_exports:
  - null
extra:
  skip-lints:
  - uses_setuptools
package:
  name: severus
  version: '1.7'
requirements:
  host:
  - python >=3.8
  - setuptools
  - pip
  run:
  - python >=3.8
  - setuptools
  - pip
  - samtools >=1.14
  - networkx >=2.6
  - pygraphviz
  - pydot
  - matplotlib-base
  - biopython
  - numpy
  - pysam
  - plotly
source:
  sha256: 986c957ede65fc6db187c0d8a358b09333b6a1cf9afaa5d4c76387c7e705d571
  url: https://github.com/KolmogorovLab/Severus/archive/refs/tags/1.7.tar.gz
test:
  commands:
  - severus -h | grep breakpoint
