about:
  description: Package containing example and annotation data for Hipathia package.
    Hipathia is a method for the computation of signal transduction along signaling
    pathways from transcriptomic data. The method is based on an iterative algorithm
    which is able to compute the signal intensity passing through the nodes of a network
    by taking into account the level of expression of each gene and the intensity
    of the signal arriving to it. It also provides a new approach to functional analysis
    allowing to compute the signal arriving to the functions annotated to each pathway.
    Hipathia depends on this package to be functional.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/hpAnnot.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Anotation package for Hipathia package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-hpannot
  version: 1.1.1
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 3fd984ead29ce24a3193c89a9422bc61
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/hpAnnot_1.1.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/hpAnnot/hpAnnot_1.1.1.tar.gz
  - https://bioarchive.galaxyproject.org/hpAnnot_1.1.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-hpannot/bioconductor-hpannot_1.1.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('hpAnnot')"
