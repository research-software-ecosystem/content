about:
  description: 'PeptDeep provides deep learning models for mass spectrometry-based

    proteomics. It includes built-in models for predicting retention time,

    collision cross section, and tandem mass spectra for peptides, enabling

    users to generate predicted spectral libraries from protein sequences.

    '
  dev_url: https://github.com/MannLabs/alphapeptdeep
  doc_url: https://alphapeptdeep.readthedocs.io/en/latest/
  home: https://github.com/MannLabs/alphapeptdeep
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE.txt
  summary: The AlphaX deep learning framework for Proteomics
build:
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - jonasscheid
package:
  name: peptdeep
  version: 1.4.1
requirements:
  host:
  - python >=3.8
  - setuptools
  - pip
  run:
  - python >=3.8
  - click
  - pandas <3.0
  - numpy <2
  - pytorch
  - tqdm
  - numba
  - psutil
  - transformers
  - scikit-learn
  - lxml
  - pyteomics
  - alphabase >=1.5.0
  - alpharaw >=0.2.0
source:
  sha256: 6ba483b70058f96e494bcff143fd8bf293ea600f191622061a0238b7eb265025
  url: https://github.com/MannLabs/alphapeptdeep/archive/refs/tags/v1.4.1.tar.gz
test:
  commands:
  - pip check
  - peptdeep --help
  imports:
  - peptdeep
  requires:
  - pip
