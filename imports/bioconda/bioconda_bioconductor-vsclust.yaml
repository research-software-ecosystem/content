about:
  description: Feature-based variance-sensitive clustering of omics data. Optimizes
    cluster assignment by taking into account individual feature variance. Includes
    several modules for statistical testing, clustering and enrichment analysis.
  home: https://bioconductor.org/packages/3.22/bioc/html/vsclust.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Feature-based variance-sensitive quantitative clustering
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-vsclust
  version: 1.12.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-clusterprofiler >=4.18.0,<4.19.0
  - bioconductor-dose >=4.4.0,<4.5.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - r-base
  - r-httr
  - r-matrixstats
  - r-rcpp
  - r-shiny
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-clusterprofiler >=4.18.0,<4.19.0
  - bioconductor-dose >=4.4.0,<4.5.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - r-base
  - r-httr
  - r-matrixstats
  - r-rcpp
  - r-shiny
source:
  md5: 197b818ceec1541d45404e2415e01db6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/vsclust_1.12.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/vsclust/vsclust_1.12.0.tar.gz
  - https://bioarchive.galaxyproject.org/vsclust_1.12.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-vsclust/bioconductor-vsclust_1.12.0_src_all.tar.gz
