about:
  description: Provides a structured S4 approach to importing data files from the
    10X pipelines. It mainly supports Single Cell Multiome ATAC + Gene Expression
    data among other data types. The main Bioconductor data representations used are
    SingleCellExperiment and RaggedExperiment.
  home: https://bioconductor.org/packages/3.22/bioc/html/TENxIO.html
  license: Artistic-2.0
  summary: Import methods for 10X Genomics files
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tenxio
  version: 1.12.1
requirements:
  host:
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  - r-r.utils
  - r-rcurl
  - r-readr
  run:
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biocio >=1.20.0,<1.21.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-matrixgenerics >=1.22.0,<1.23.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  - r-r.utils
  - r-rcurl
  - r-readr
source:
  md5: 4134a35e44028c87be90701111b15804
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TENxIO_1.12.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TENxIO/TENxIO_1.12.1.tar.gz
