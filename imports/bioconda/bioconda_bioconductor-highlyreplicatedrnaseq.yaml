about:
  description: Gene-level count matrix data for bulk RNA-seq dataset with many replicates.
    The data are provided as easy to use SummarizedExperiment objects. The source
    data that is made accessible through this package comes from https://github.com/bartongroup/profDGE48.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/HighlyReplicatedRNASeq.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Collection of Bulk RNA-Seq Experiments With Many Replicates
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-highlyreplicatedrnaseq
  version: 1.22.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 65360c3c2e28443c3172f847358d1553
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/HighlyReplicatedRNASeq_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/HighlyReplicatedRNASeq/HighlyReplicatedRNASeq_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/HighlyReplicatedRNASeq_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-highlyreplicatedrnaseq/bioconductor-highlyreplicatedrnaseq_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('HighlyReplicatedRNASeq')"
