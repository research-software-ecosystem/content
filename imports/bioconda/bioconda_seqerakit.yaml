about:
  home: https://github.com/seqeralabs/seqera-kit
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: Automate creation of Seqera Platform resources
build:
  entry_points:
  - seqerakit=seqerakit.cli:run
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - pinin4fjords
package:
  name: seqerakit
  version: 0.5.7
requirements:
  host:
  - python >=3.8,<4.0
  - pip
  - setuptools
  run:
  - python >=3.8,<4.0
  - pyyaml >=6.0.0
  - typer >=0.15.1
  - tower-cli >=0.9.0
source:
  sha256: 5a43ab2588d08dfeb9fceed47e7719340ad78fab323ed802e627708941755fa6
  url: https://pypi.io/packages/source/s/seqerakit/seqerakit-0.5.7.tar.gz
test:
  commands:
  - seqerakit --help
  imports:
  - seqerakit
