about:
  home: https://github.com/Bharathwaj8920/enaswan
  license: MIT
  license_file: LICENSE
  summary: "ENA Smart Workflow and Acquisition Network \u2014 fast parallel FASTQ\
    \ downloader for the European Nucleotide Archive"
build:
  entry_points:
  - enaswan = enaswan.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - Bharathwaj8920
package:
  name: enaswan
  version: 0.1.1
requirements:
  host:
  - python >=3.8
  - setuptools >=77.0.3
  - wheel
  - pip
  run:
  - python >=3.8
  - requests >=2.28.0
  - tqdm >=4.65.0
  - pandas >=1.5.0
  - urllib3 >=1.26.0
source:
  sha256: a66cc55072305f9ffa1b97509ef9d25c5544f261bc25dbeac5c9132605e3ba14
  url: https://pypi.org/packages/source/e/enaswan/enaswan-0.1.1.tar.gz
test:
  commands:
  - pip check
  - enaswan --help
  imports:
  - enaswan
  requires:
  - pip
  - python
