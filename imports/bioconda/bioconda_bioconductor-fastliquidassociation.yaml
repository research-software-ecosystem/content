about:
  description: This package extends the function of the LiquidAssociation package
    for genome-wide application. It integrates a screening method into the LA analysis
    to reduce the number of triplets to be examined for a high LA value and provides
    code for use in subsequent significance analyses.
  home: https://bioconductor.org/packages/3.22/bioc/html/fastLiquidAssociation.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: functions for genome-wide application of Liquid Association
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-fastliquidassociation
  version: 1.46.0
requirements:
  host:
  - bioconductor-impute >=1.84.0,<1.85.0
  - bioconductor-liquidassociation >=1.64.0,<1.65.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - r-base
  - r-doparallel
  - r-hmisc
  - r-wgcna
  run:
  - bioconductor-impute >=1.84.0,<1.85.0
  - bioconductor-liquidassociation >=1.64.0,<1.65.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - r-base
  - r-doparallel
  - r-hmisc
  - r-wgcna
source:
  md5: cb119e6e7447e1dc8b04163c4798da6f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/fastLiquidAssociation_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/fastLiquidAssociation/fastLiquidAssociation_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/fastLiquidAssociation_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-fastliquidassociation/bioconductor-fastliquidassociation_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('fastLiquidAssociation')"
