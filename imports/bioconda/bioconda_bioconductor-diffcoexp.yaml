about:
  description: A tool for the identification of differentially coexpressed links (DCLs)
    and differentially coexpressed genes (DCGs). DCLs are gene pairs with significantly
    different correlation coefficients under two conditions. DCGs are genes with significantly
    more DCLs than by chance.
  home: https://bioconductor.org/packages/3.22/bioc/html/diffcoexp.html
  license: GPL (>2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Differential Co-expression Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-diffcoexp
  version: 1.30.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-diffcorr
  - r-igraph
  - r-psych
  - r-wgcna
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-diffcorr
  - r-igraph
  - r-psych
  - r-wgcna
source:
  md5: fcc5753d68f43055ef6b63ee0dc2a1f7
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/diffcoexp_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/diffcoexp/diffcoexp_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/diffcoexp_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-diffcoexp/bioconductor-diffcoexp_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('diffcoexp')"
