about:
  description: Modified quantile normalization for omics or other matrix-like data
    distorted in location and scale.
  home: https://bioconductor.org/packages/3.22/bioc/html/MBQN.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Mean/Median-balanced quantile normalization
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mbqn
  version: 2.22.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-paireddata
  - r-rappdirs
  - r-rcurl
  - r-rmarkdown
  - r-xml2
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-preprocesscore >=1.72.0,<1.73.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-paireddata
  - r-rappdirs
  - r-rcurl
  - r-rmarkdown
  - r-xml2
source:
  md5: aa889d4b952f546322a3847a0160c52e
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MBQN_2.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MBQN/MBQN_2.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/MBQN_2.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mbqn/bioconductor-mbqn_2.22.0_src_all.tar.gz
test:
