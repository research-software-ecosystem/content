about:
  description: Functions to add metadata to ExperimentHub db and resource files to
    AWS S3 buckets.
  home: https://bioconductor.org/packages/3.22/bioc/html/ExperimentHubData.html
  license: Artistic-2.0
  summary: Add resources to ExperimentHub
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-experimenthubdata
  version: 1.36.0
requirements:
  host:
  - bioconductor-annotationhubdata >=1.40.0,<1.41.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-biocmanager
  - r-curl
  - r-dbi
  - r-httr
  run:
  - bioconductor-annotationhubdata >=1.40.0,<1.41.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-biocmanager
  - r-curl
  - r-dbi
  - r-httr
source:
  md5: 8655aa9b488cd6299b61832673f9ca27
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ExperimentHubData_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ExperimentHubData/ExperimentHubData_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/ExperimentHubData_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-experimenthubdata/bioconductor-experimenthubdata_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ExperimentHubData')"
