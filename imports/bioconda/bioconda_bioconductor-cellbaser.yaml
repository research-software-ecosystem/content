about:
  description: This R package makes use of the exhaustive RESTful Web service API
    that has been implemented for the Cellabase database. It enable researchers to
    query and obtain a wealth of biological information from a single database saving
    a lot of time. Another benefit is that researchers can easily make queries about
    different biological topics and link all this information together as all information
    is integrated.
  home: https://bioconductor.org/packages/3.22/bioc/html/cellbaseR.html
  license: Apache License (== 2.0)
  summary: Querying annotation data from the high performance Cellbase web
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cellbaser
  version: 1.34.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - r-data.table
  - r-doparallel
  - r-foreach
  - r-httr
  - r-jsonlite
  - r-pbapply
  - r-r.utils
  - r-tidyr
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - r-data.table
  - r-doparallel
  - r-foreach
  - r-httr
  - r-jsonlite
  - r-pbapply
  - r-r.utils
  - r-tidyr
source:
  md5: ad89c53b7639cdbe598bf9c49428c01d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/cellbaseR_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/cellbaseR/cellbaseR_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/cellbaseR_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cellbaser/bioconductor-cellbaser_1.34.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('cellbaseR')"
