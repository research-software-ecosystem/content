about:
  description: 'This is a fork of the original Straglr tool (Chiu et al., Genome Biol
    2021), modified by philres/ONT to focus on genotyping clinical TR expansions from
    long-read BAM alignments using Minimap2. Differs from upstream bcgsc/straglr in
    its clinical loci focus and VCF output.

    '
  dev_url: https://github.com/philres/straglr
  doc_url: https://github.com/philres/straglr/blob/master/README.md
  home: https://github.com/philres/straglr
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Clinical tandem repeat genotyping from long-read alignments (philres fork
    of straglr).
build:
  entry_points:
  - straglr-genotype = straglr.straglr_genotype:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  identifiers:
  - doi:10.1186/s13059-021-02447-3
  recipe-maintainers:
  - nourmahfel
package:
  name: straglr-ont
  version: 1.4.5
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - pysam >=0.14.0
  - pybedtools >=0.9.0
  - numpy >=1.22.3
  - pathos >=0.2.3
  - scikit-learn >=1.1
  - scipy >=1.8.0
  - natsort
  - matplotlib-base >=3.0
  - seaborn >=0.11
  - pandas >=1.0
  - trf >=4.09.1
  - blast >=2.5.0
source:
  sha256: 139bcd6b55d7e54627303e207e9804dd518b0f6b0a71a22a02a388528fe4b163
  url: https://github.com/philres/straglr/archive/refs/tags/v1.4.5.tar.gz
test:
  commands:
  - straglr-genotype --help
  imports:
  - straglr
