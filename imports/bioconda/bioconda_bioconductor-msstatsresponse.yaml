about:
  description: Tools for detecting drug-protein interactions and estimating IC50 values
    from chemoproteomics data. Implements semi-parametric isotonic regression, bootstrapping,
    and curve fitting to evaluate compound effects on protein abundance.
  home: https://bioconductor.org/packages/3.22/bioc/html/MSstatsResponse.html
  license: Artistic-2.0
  summary: Statistical Methods for Chemoproteomics Dose-Response Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-msstatsresponse
  version: 1.0.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-ggplot2
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - r-base
  - r-data.table
  - r-dplyr
  - r-ggplot2
source:
  md5: bf262b1f8b3858ddc40c250bbd3e4bff
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MSstatsResponse_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MSstatsResponse/MSstatsResponse_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/MSstatsResponse_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-msstatsresponse/bioconductor-msstatsresponse_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MSstatsResponse')"
