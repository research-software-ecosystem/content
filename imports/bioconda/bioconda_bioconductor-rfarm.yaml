about:
  description: rfaRm provides a client interface to the Rfam database of RNA families.
    Data that can be retrieved include RNA families, secondary structure images, covariance
    models, sequences within each family, alignments leading to the identification
    of a family and secondary structures in the dot-bracket format.
  home: https://bioconductor.org/packages/3.22/bioc/html/rfaRm.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: An R interface to the Rfam database
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rfarm
  version: 1.22.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-data.table
  - r-httr
  - r-jsonlite
  - r-magick
  - r-rsvg
  - r-rvest
  - r-stringi
  - r-xml2
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-data.table
  - r-httr
  - r-jsonlite
  - r-magick
  - r-rsvg
  - r-rvest
  - r-stringi
  - r-xml2
source:
  md5: 7f218e4dafc75b735e974d56c11b1744
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rfaRm_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rfaRm/rfaRm_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/rfaRm_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rfarm/bioconductor-rfarm_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rfaRm')"
