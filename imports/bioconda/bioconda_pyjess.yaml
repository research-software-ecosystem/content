about:
  dev_url: https://github.com/althonos/pyjess
  doc_url: https://pyjess.readthedocs.org
  home: https://github.com/althonos/pyjess
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: Cython bindings and Python interface to JESS, a 3D template matching software.
build:
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517
    -vvv'
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - althonos
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: pyjess
  version: 0.10.0
requirements:
  build:
  - null
  - cmake >=3.20
  - make
  host:
  - python
  - pip
  - cython
  - scikit-build-core
  run:
  - python
source:
  sha256: 13ab16071f580e95784e90fe006b430fa38f59f7c539bc74e0cee3930c14f6c5
  url: https://pypi.io/packages/source/p/pyjess/pyjess-0.10.0.tar.gz
test:
  commands:
  - python -m unittest -vv pyjess.tests
  imports:
  - pyjess
