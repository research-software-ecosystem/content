about:
  description: This package contains core functions to process and analyze drug response
    data. The package provides tools for normalizing, averaging, and calculation of
    gDR metrics data. All core functions are wrapped into the pipeline function allowing
    analyzing the data in a straightforward way.
  home: https://bioconductor.org/packages/3.22/bioc/html/gDRcore.html
  license: Artistic-2.0
  summary: Processing functions and interface to process and analyze drug dose-response
    data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gdrcore
  version: 1.8.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-gdrutils >=1.8.0,<1.9.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-checkmate
  - r-data.table
  - r-futile.logger
  - r-purrr
  - r-stringr
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-gdrutils >=1.8.0,<1.9.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-checkmate
  - r-data.table
  - r-futile.logger
  - r-purrr
  - r-stringr
