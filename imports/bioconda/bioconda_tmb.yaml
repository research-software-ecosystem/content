about:
  dev_url: https://github.com/bioinfo-pf-curie/TMB
  doc_url: https://github.com/bioinfo-pf-curie/TMB/blob/v1.6.0/README.md
  home: https://github.com/bioinfo-pf-curie/TMB
  license: CECILL-2.1
  license_file: LICENSE
  summary: This tool was designed to calculate a Tumor Mutational Burden (TMB) score
    from a VCF file.
build:
  entry_points:
  - pyTMB = pytmb.cli.run_tmb:main
  - pyEffGenomeSize = pytmb.cli.run_effgenomesize:main
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  identifiers:
  - doi:10.1186/s12915-024-01839-8
package:
  name: tmb
  version: 1.6.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  run:
  - python >=3.9
  - cyvcf2 >=0.30
  - pyyaml >=6.0
  - numpy >=1.21,<2
  - scipy >=1.9
  - pybedtools >=0.9
  - pandas >=1.3
  - mosdepth >=0.3.3
source:
  sha256: b34974e4ab3e648ff6fb061fa6db313fde81fdfa5fabf6b05d76b22175ae3044
  url: https://github.com/bioinfo-pf-curie/TMB/archive/refs/tags/v1.6.0.tar.gz
test:
  commands:
  - pyTMB -h
  - pyEffGenomeSize -h
  imports:
  - pytmb
