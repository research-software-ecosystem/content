about:
  description: Implements a DelayedArray backend for reading and writing dense or
    sparse arrays in the TileDB format. The resulting TileDBArrays are compatible
    with all Bioconductor pipelines that can accept DelayedArray instances.
  home: https://bioconductor.org/packages/3.22/bioc/html/TileDBArray.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Using TileDB as a DelayedArray Backend
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tiledbarray
  version: 1.20.0
requirements:
  host:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - r-base
  - r-tiledb
  run:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - r-base
  - r-tiledb
source:
  md5: 5a7f89ce1f75c9ed43700abd46bc55ee
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TileDBArray_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TileDBArray/TileDBArray_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/TileDBArray_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tiledbarray/bioconductor-tiledbarray_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TileDBArray')"
