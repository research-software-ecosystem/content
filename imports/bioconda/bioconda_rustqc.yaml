about:
  description: 'RustQC is a suite of quality control tools for sequencing data, compiled
    to a

    single binary. It reimplements dupRadar, featureCounts, 8 RSeQC tools, preseq,

    samtools stats, and Qualimap in Rust for dramatically reduced execution time.

    All outputs are format-compatible with the upstream tools and MultiQC.

    '
  dev_url: https://github.com/seqeralabs/RustQC
  home: https://seqeralabs.github.io/RustQC/
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: 'RNA-seq quality control suite: dupRadar, featureCounts, RSeQC, preseq,
    samtools stats, and Qualimap in one pass'
build:
  number: 1
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - ewels
  skip-lints:
  - should_be_noarch_generic
package:
  name: rustqc
  version: 0.1.1
requirements:
  run:
  - freetype
  - fontconfig
  - fonts-conda-ecosystem
