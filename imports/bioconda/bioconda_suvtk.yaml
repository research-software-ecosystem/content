about:
  doc_url: https://landerdc.github.io/suvtk/
  home: https://github.com/LanderDC/suvtk
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Tool to submit viral sequences to Genbank.
build:
  entry_points:
  - suvtk = suvtk.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - LanderDC
package:
  name: suvtk
  version: 0.2.0
requirements:
  host:
  - python >=3.10
  - uv-build >=0.8.0,<0.9.0
  - pip
  run:
  - python >=3.10
  - biopython >=1.83
  - psutil >=7.1.3
  - click >=8.3.1
  - rich-click >=1.9.4
  - numpy >1.24.4
  - pandas >=2.0.3
  - pyrodigal-gv >=0.3.2
  - pyrodigal-rv >=0.1.0
  - requests >=2.32.3
  - scipy >=1.13.1
  - taxopy >=0.14.0
  - mmseqs2 >=17.b804f
  - table2asn >=1.28.1094
source:
  sha256: 00f450fe02dbee2555a26b520f17c1a032faa76162f155c00cbf3d14d3280f7a
  url: https://pypi.org/packages/source/s/suvtk/suvtk-0.2.0.tar.gz
test:
  commands:
  - pip check
  - suvtk --help
  imports:
  - suvtk
  requires:
  - pip
