about:
  description: Feature rankings can be distorted by a single case in the context of
    high-dimensional data. The cases exerts abnormal influence on feature rankings
    are called influential points (IPs). The package aims at detecting IPs based on
    case deletion and quantifies their effects by measuring the rank changes (DOI:10.48550/arXiv.2303.10516).
    The package applies a novel rank comparing measure using the adaptive weights
    that stress the top-ranked important features and adjust the weights to ranking
    properties.
  home: https://bioconductor.org/packages/3.22/bioc/html/findIPs.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Influential Points Detection for Feature Rankings
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-findips
  version: 1.6.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-survival
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocparallel >=1.44.0,<1.45.0
