about:
  description: Normalized gene expression data from rheumatic diseases from study
    published by Wollbold et al. in 2009, provided as an eSet.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/rheumaticConditionWOLLBOLD.html
  license: Artistic-2.0
  summary: Normalized gene expression dataset published by Wollbold et al. [2009]
    (WOLLBOLD).
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rheumaticconditionwollbold
  version: 1.48.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 6a70b17075da3277fe8aea6f454078be
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/rheumaticConditionWOLLBOLD_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rheumaticConditionWOLLBOLD/rheumaticConditionWOLLBOLD_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/rheumaticConditionWOLLBOLD_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rheumaticconditionwollbold/bioconductor-rheumaticconditionwollbold_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rheumaticConditionWOLLBOLD')"
