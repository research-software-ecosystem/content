about:
  description: Supporting data for the chipenrich package. Includes pre-defined gene
    sets, gene locus definitions, and mappability estimates.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/chipenrich.data.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Companion package to chipenrich
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-chipenrich.data
  version: 2.34.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-readr
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-readr
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 9ae260b2b8cced3fd2f469ca2d35c894
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/chipenrich.data_2.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/chipenrich.data/chipenrich.data_2.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/chipenrich.data_2.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-chipenrich.data/bioconductor-chipenrich.data_2.34.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('chipenrich.data')"
