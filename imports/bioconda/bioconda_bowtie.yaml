about:
  home: https://github.com/BenLangmead/bowtie
  license: Artistic-2.0-only
  summary: An ultrafast memory-efficient short read aligner
build:
  number: 11
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:bowtie
  - doi:10.1186/gb-2009-10-3-r25
package:
  name: bowtie
  version: 1.3.1
requirements:
  build:
  - make
  - patch
  - null
  - null
  - zlib
  host:
  - tbb
  - tbb-devel
  - zlib
  run:
  - python
  - perl
  - tbb
  - zlib
source:
  patches:
  - rename_version_to_version_txt.patch
  sha256: 147d9fe9652f7c5f351bfc0eb012e06981986fb43bd6bdfe88a95c02eabc6573
  url: https://github.com/BenLangmead/bowtie/archive/v1.3.1.tar.gz
test:
  commands:
  - bowtie --help
  - bowtie-align-l --help
  - bowtie-align-s --help
  - bowtie-build --help
  - bowtie-build-l --help
  - bowtie-build-s --help
  - bowtie-inspect --help
  - bowtie-inspect-l --help
  - bowtie-inspect-s --help
  - printf ">ref\nACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT\n" > ref.fa
  - bowtie-build ref.fa ref
  - printf "@read1\nACGTACGTACGTACGTACGTACGTACGTACGT\n+\nIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIII\n"
    > reads.fq
  - bowtie -S ref reads.fq > out.sam
  - grep -q "^read1" out.sam
  - bowtie-inspect ref > inspected.fa
  - grep -q "^>ref" inspected.fa
