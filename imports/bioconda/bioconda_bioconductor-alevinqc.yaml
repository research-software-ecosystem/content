about:
  description: Generate QC reports summarizing the output from an alevin, alevin-fry,
    or simpleaf run. Reports can be generated as html or pdf files, or as shiny applications.
  home: https://bioconductor.org/packages/3.22/bioc/html/alevinQC.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Generate QC Reports For Alevin Output
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alevinqc
  version: 1.26.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-tximport >=1.38.0,<1.39.0
  - r-base
  - r-cowplot
  - r-dplyr
  - r-dt
  - r-ggally
  - r-ggplot2 >=3.4.0
  - r-rcpp
  - r-rjson
  - r-rlang
  - r-rmarkdown >=2.5
  - r-shiny
  - r-shinydashboard
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-tximport >=1.38.0,<1.39.0
  - r-base
  - r-cowplot
  - r-dplyr
  - r-dt
  - r-ggally
  - r-ggplot2 >=3.4.0
  - r-rcpp
  - r-rjson
  - r-rlang
  - r-rmarkdown >=2.5
  - r-shiny
  - r-shinydashboard
source:
  md5: 32c51a6cc456a519e7ed8914b3b9fd23
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/alevinQC_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/alevinQC/alevinQC_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/alevinQC_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-alevinqc/bioconductor-alevinqc_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('alevinQC')"
