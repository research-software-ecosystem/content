about:
  description: This packages simulates spatial transcriptomics data with the mean-
    variance relationship using a Gaussian Process model per gene.
  home: https://bioconductor.org/packages/3.22/bioc/html/spatialSimGP.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Simulate Spatial Transcriptomics Data with the Mean-variance Relationship
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spatialsimgp
  version: 1.4.0
requirements:
  host:
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-mass
  run:
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-mass
source:
  md5: 8efa078139b7784baebaa998f0d7684e
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/spatialSimGP_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/spatialSimGP/spatialSimGP_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/spatialSimGP_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-spatialsimgp/bioconductor-spatialsimgp_1.4.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('spatialSimGP')"
