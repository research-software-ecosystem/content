about:
  description: Add a Bioconductor themed CSS loader to your shiny app. It is based
    on the shinycustomloader R package. Use a spinning Bioconductor note loader to
    enhance your shiny app loading screen. This package is intended for developer
    use.
  home: https://bioconductor.org/packages/3.22/bioc/html/shinybiocloader.html
  license: Artistic-2.0
  summary: Use a Shiny Bioconductor CSS loader
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-shinybiocloader
  version: 1.0.0
requirements:
  host:
  - r-base
  - r-htmltools
  - r-shiny
  run:
  - r-base
  - r-htmltools
  - r-shiny
source:
  md5: 0b06a967937afcdf8a1d852998311aa7
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/shinybiocloader_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/shinybiocloader/shinybiocloader_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/shinybiocloader_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-shinybiocloader/bioconductor-shinybiocloader_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('shinybiocloader')"
