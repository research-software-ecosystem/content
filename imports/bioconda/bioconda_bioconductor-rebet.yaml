about:
  description: There is an increasing focus to investigate the association between
    rare variants and diseases. The REBET package implements the subREgion-based BurdEn
    Test which is a powerful burden test that simultaneously identifies susceptibility
    loci and sub-regions.
  home: https://bioconductor.org/packages/3.22/bioc/html/REBET.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: The subREgion-based BurdEn Test (REBET)
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rebet
  version: 1.28.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-asset >=2.28.0,<2.29.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-asset >=2.28.0,<2.29.0
  - r-base
source:
  md5: 014c1d8243e81111efdea2fc9b03f9b5
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/REBET_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/REBET/REBET_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/REBET_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rebet/bioconductor-rebet_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('REBET')"
