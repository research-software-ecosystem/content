about:
  doc_url: https://nemoto-lab.github.io/oddSNP/
  home: https://github.com/nemoto-lab/oddSNP
  license: Apache-2.0
  license_file: LICENSE
  summary: A CLI tool for Optimizing demultiplexing pooled experiments based on Single-Nucleotide
    Polymorphism
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - RodolfoAllendes
package:
  name: oddsnp
  version: 0.1.1
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - click
  - pandas
  - pysam
  - plotly
  - nbformat
  - python-kaleido
  - tqdm
  - more-itertools
  - joblib
  - requests
  - ipykernel
  - threadpoolctl
  - vireosnp
  - cellsnp-lite
source:
  sha256: f9226df4f803f40b9d6c748f4414c1430c5d9d654c83700a93c999d0dfc62d55
  url: https://pypi.org/packages/source/o/oddsnp/oddsnp-0.1.1.tar.gz
test:
  commands:
  - oddSNP --help
  imports:
  - oddSNP
  requires:
  - python
  - pip
