about:
  home: https://github.com/treangenlab/emu
  license: MIT
  license_file: LICENSE.txt
  summary: Emu is a relative abundance estimator for 16s genomic data.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
  script: mkdir -p ${PREFIX}/bin && cp emu ${PREFIX}/bin
package:
  name: emu
  version: 3.6.2
requirements:
  run:
  - biopython
  - python >=3.6
  - pysam >=0.15
  - numpy >=1.11
  - pandas >=1.1.3
  - flatten-dict
  - importlib-metadata
  - bioawk
  - minimap2 >=2.27
source:
  sha256: 7f4ec66d0e4ce74df75906ababf80192b3ce2a423b00051ee3aa68b10de8b5e2
  url: https://github.com/treangenlab/emu/archive/refs/tags/v3.6.2.tar.gz
test:
  commands:
  - emu --help
  source_files:
  - example
  - example/*
  - emu_database
  - emu_database/*
