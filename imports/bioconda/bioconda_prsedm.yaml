about:
  home: https://github.com/sethsh7/PRSedm
  license: MIT
  license_file: LICENSE
  summary: Polygenic risk score toolkit for diabetes.
build:
  entry_points:
  - prsedm = prsedm.extensions.score_dm:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: prsedm
  version: 1.3.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.9
  - pandas >=2
  - numpy <2
  - pysam >=0.22
  - joblib >=1.3
source:
  sha256: 0515313654af33c983733bfe60522aa77a2f0c2e57c1d3d2bb4bdbe8134708f2
  url: https://pypi.org/packages/source/p/prsedm/prsedm-1.3.0.tar.gz
test:
  commands:
  - prsedm --help
  - python -c "import prsedm"
