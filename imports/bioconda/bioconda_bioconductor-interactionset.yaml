about:
  description: Provides the GInteractions, InteractionSet and ContactMatrix objects
    and associated methods for storing and manipulating genomic interaction data from
    Hi-C and ChIA-PET experiments.
  home: https://bioconductor.org/packages/3.22/bioc/html/InteractionSet.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Base Classes for Storing Genomic Interaction Data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  identifiers:
  - biotools:interactionset
  parent_recipe:
    name: bioconductor-interactionset
    path: recipes/bioconductor-interactionset
    version: 1.8.0
package:
  name: bioconductor-interactionset
  version: 1.38.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  - r-rcpp
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-matrix
  - r-rcpp
source:
