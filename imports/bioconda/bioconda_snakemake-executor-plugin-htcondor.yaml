  - poetry-core
  - pip
  run:
  - python >=3.11
  - snakemake-interface-common >=1.17.1,<2.0.0
  - snakemake-interface-executor-plugins >=9.0.0,<10.0.0
  - python-htcondor >=23.4.0,<24.0.0
source:
  sha256: c5268807ecb6810d1852cbf7ccde0b54394e1a824eb64baa55538ccf55328f45
  url: https://pypi.org/packages/source/s/snakemake-executor-plugin-htcondor/snakemake_executor_plugin_htcondor-0.1.2.tar.gz
test:
  commands:
  - pip check
  imports:
  - snakemake_executor_plugin_htcondor
  requires:
  - pip
