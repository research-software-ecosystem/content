about:
  dev_url: https://github.com/COMBINE-lab/simpleaf
  doc_url: https://simpleaf.readthedocs.io/en/latest
  home: https://github.com/COMBINE-lab/simpleaf
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: A rust framework to make using alevin-fry even simpler.
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - osx-arm64
  - linux-aarch64
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: simpleaf
  version: 0.25.0
requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - cmake
  - null
  - null
  - cargo-bundle-licenses
  - pkg-config
  run:
  - alevin-fry >=0.15.0
  - piscem >=0.20.0
source:
  sha256: 1713f2a16f35748ab49d7299cdce35f4e28c1d98f0507ca1320c099fd82caac1
  url: https://github.com/COMBINE-lab/simpleaf/archive/v0.25.0.tar.gz
test:
  commands:
  - simpleaf --help || test $? -eq 1
