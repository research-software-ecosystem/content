about:
  dev_url: https://github.com/COMBINE-lab/simpleaf
  doc_url: https://simpleaf.readthedocs.io/en/latest
  home: https://github.com/COMBINE-lab/simpleaf
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: A rust framework to make using alevin-fry even simpler.
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - osx-arm64
  - linux-aarch64
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: simpleaf
  version: 0.24.0
requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - cmake
  - null
  - null
  - cargo-bundle-licenses
  - pkg-config
  run:
  - alevin-fry >=0.14.0
  - piscem >=0.19.0
source:
  sha256: 05fb74305c23c12c90772e4a9ea42c84af04c32f354186102113c554b314a9e8
  url: https://github.com/COMBINE-lab/simpleaf/archive/v0.24.0.tar.gz
test:
  commands:
  - simpleaf --help || test $? -eq 1
