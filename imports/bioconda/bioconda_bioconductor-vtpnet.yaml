about:
  description: variant-transcription factor-phenotype networks, inspired by Maurano
    et al., Science (2012), PMID 22955828
  home: https://bioconductor.org/packages/3.22/bioc/html/vtpnet.html
  license: Artistic-2.0
  summary: variant-transcription factor-phenotype networks
build:
