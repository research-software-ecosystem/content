  - r-base
  - r-doparallel
  - r-foreach
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-gwascat >=2.42.0,<2.43.0
  - r-base
  - r-doparallel
  - r-foreach
source:
  md5: 0359184b09f09daddece919ba2bb227c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/vtpnet_0.50.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/vtpnet/vtpnet_0.50.0.tar.gz
  - https://bioarchive.galaxyproject.org/vtpnet_0.50.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-vtpnet/bioconductor-vtpnet_0.50.0_src_all.tar.gz
