about:
  description: Data package containing a collection of multi-sample multi-group scRNA-seq
    datasets in SingleCellExperiment Bioconductor object format.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/muscData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Multi-sample multi-group scRNA-seq data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-muscdata
  version: 1.24.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 3624d8ae077912985a0dc3e64d8b2ebe
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/muscData_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/muscData/muscData_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/muscData_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-muscdata/bioconductor-muscdata_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('muscData')"
