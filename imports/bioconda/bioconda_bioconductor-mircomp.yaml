about:
  description: Based on a large miRNA dilution study, this package provides tools
    to read in the raw amplification data and use these data to assess the performance
    of methods that estimate expression from the amplification curves.
  home: https://bioconductor.org/packages/3.22/bioc/html/miRcomp.html
  license: GPL-3 | file LICENSE
  license_file: LICENSE
  summary: Tools to assess and compare miRNA expression estimatation methods
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mircomp
  version: 1.40.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-mircompdata >=1.40.0,<1.41.0
  - r-base
  - r-kernsmooth
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-mircompdata >=1.40.0,<1.41.0
  - r-base
  - r-kernsmooth
source:
  md5: 24d0288947f10234d8c4a1b53c3bda4e
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/miRcomp_1.40.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/miRcomp/miRcomp_1.40.0.tar.gz
  - https://bioarchive.galaxyproject.org/miRcomp_1.40.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mircomp/bioconductor-mircomp_1.40.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('miRcomp')"
