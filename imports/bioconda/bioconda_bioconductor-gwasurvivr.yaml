about:
  description: gwasurvivr is a package to perform survival analysis using Cox proportional
    hazard models on imputed genetic data.
  home: https://bioconductor.org/packages/3.22/bioc/html/gwasurvivr.html
  license: Artistic-2.0
  summary: 'gwasurvivr: an R package for genome wide survival analysis'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-gwasurvivr
  version: 1.28.0
requirements:
  host:
  - bioconductor-gwastools >=1.56.0,<1.57.0
  - bioconductor-snprelate >=1.44.0,<1.45.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-matrixstats
  - r-survival
  run:
  - bioconductor-gwastools >=1.56.0,<1.57.0
  - bioconductor-snprelate >=1.44.0,<1.45.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-matrixstats
  - r-survival
source:
  md5: 3aa7fc13337d742fe06d8fc932291c4f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/gwasurvivr_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/gwasurvivr/gwasurvivr_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/gwasurvivr_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-gwasurvivr/bioconductor-gwasurvivr_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('gwasurvivr')"
