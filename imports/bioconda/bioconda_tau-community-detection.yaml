  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - networkx >=3.4
  - numpy >=2.0
  - python-igraph >=0.10
  - scikit-learn >=1.6
source:
  sha256: 30184fbc51a7c6a67c59a2f2d9771cd3ddaa47ff7448cdecf6b3bf0c6668d7d2
  url: https://pypi.io/packages/source/t/tau-community-detection/tau_community_detection-1.2.11.tar.gz
test:
