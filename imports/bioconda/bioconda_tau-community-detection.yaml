  license: MIT
  license_file: LICENSE
  summary: Community detection via Louvain/Leiden + Genetic Algorithm
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - HillelCharbit
package:
  name: tau-community-detection
  version: 1.2.11
requirements:
