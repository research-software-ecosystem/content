about:
  doc_url: https://staphscan.readthedocs.io/en/latest
  home: https://github.com/riccabolla/StaphSCAN
  license: MIT
  license_file: LICENSE
  summary: A tool for Staphylococcus aureus analysis.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - riccabolla
package:
  name: staphscan
  version: 0.2.1
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - pandas
  - biopython >=1.78
  - blast
  - mash >=2.0
source:
  sha256: 922e4eeb55e407ced41081a174a3bf63a6090ee8e586f7e19f8b128c9ff14a71
  url: https://github.com/riccabolla/StaphSCAN/archive/refs/tags/v0.2.1.tar.gz
test:
  commands:
  - staphscan --help
