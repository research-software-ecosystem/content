about:
  doc_url: https://staphscan.readthedocs.io/en/latest
  home: https://github.com/riccabolla/StaphSCAN
  license: MIT
  license_file: LICENSE
  summary: A tool for Staphylococcus aureus analysis.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - riccabolla
package:
  name: staphscan
  version: 0.3.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - pandas
  - biopython >=1.78
  - blast
  - mash >=2.0
  - rauth
  - requests
source:
  sha256: 2ea2fc0c9697a8e770ab87b982a9b23e489717097160fc197ff87cabb9d17941
  url: https://github.com/riccabolla/StaphSCAN/archive/refs/tags/v0.3.0.tar.gz
test:
  commands:
  - staphscan --help
