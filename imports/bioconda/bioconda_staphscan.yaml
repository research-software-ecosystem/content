about:
  doc_url: https://staphscan.readthedocs.io/en/latest
  home: https://github.com/riccabolla/StaphSCAN
  license: MIT
  license_file: LICENSE
  summary: A tool for Staphylococcus aureus analysis.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - riccabolla
package:
  name: staphscan
  version: 0.1.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - pandas
  - biopython >=1.78
  - blast
  - mash >=2.0
source:
  sha256: c9f7ed82fbfb3712bd3955f411fef3146d0034736018bbfde13a14d0b84d562f
  url: https://github.com/riccabolla/StaphSCAN/archive/refs/tags/v0.1.2.tar.gz
test:
  commands:
  - staphscan --help
