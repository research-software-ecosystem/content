about:
  home: https://github.com/boenc28-cmyk/DANPOS
  license: GPL-3.0-only
  license_file: LICENSE
  summary: A toolkit for Dynamic Analysis of Nucleosome Positioning and Occupancy
    by Sequencing - Version 3
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vvv
package:
  name: danpos3
  version: 3.2.4
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools
  - wheel
  - hatchling
  run:
  - python >=3.7
  - samtools >=1.7
  - rpy2 >=3.3.3
  - numpy >=1.18.5
  - pysam >=0.16.0.1
  - scipy
source:
  sha256: aaa9850e79dd7103e9fb7de2ac8e949d653bc46ef8f6cf44fba61048a2e27705
  url: https://github.com/boenc28-cmyk/DANPOS/archive/refs/tags/v3.2.4.tar.gz
test:
  commands:
  - danpos -h
