about:
  description: This package performs prediction of intrinsic cyclizability of of every
    50-bp subsequence in a DNA sequence. The input could be a file either in FASTA
    or text format. The output will be the C-score, the estimated intrinsic cyclizability
    score for each 50 bp sequences in each entry of the sequence set.
  home: https://bioconductor.org/packages/3.22/bioc/html/DNAcycP2.html
  license: Artistic-2.0
  summary: DNA Cyclizability Prediction
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dnacycp2
  version: 1.2.0
requirements:
  host:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - r-base
  - r-reticulate
  run:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - r-base
  - r-reticulate
source:
  md5: 601de72b09b14f55ad7682188ca59725
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/DNAcycP2_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DNAcycP2/DNAcycP2_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/DNAcycP2_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dnacycp2/bioconductor-dnacycp2_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('DNAcycP2')"
