about:
  description: The MicrobiomeBenchmarkData package provides functionality to access
    microbiome datasets suitable for benchmarking. These datasets have some biological
    truth, which allows to have expected results for comparison. The datasets come
    from various published sources and are provided as TreeSummarizedExperiment objects.
    Currently, only datasets suitable for benchmarking differential abundance methods
    are available.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/MicrobiomeBenchmarkData.html
  license: Artistic-2.0
  summary: Datasets for benchmarking in microbiome research
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-microbiomebenchmarkdata
  version: 1.12.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-ape
  - r-base
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-treesummarizedexperiment >=2.18.0,<2.19.0
  - r-ape
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: a5f43c9d33e392644339b9978ccf5c7e
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/MicrobiomeBenchmarkData_1.12.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MicrobiomeBenchmarkData/MicrobiomeBenchmarkData_1.12.0.tar.gz
  - https://bioarchive.galaxyproject.org/MicrobiomeBenchmarkData_1.12.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-microbiomebenchmarkdata/bioconductor-microbiomebenchmarkdata_1.12.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MicrobiomeBenchmarkData')"
