about:
  description: 'Seqera AI is an intelligent command-line assistant for bioinformatics
    workflow

    development and management. It can help you write, debug, and understand Nextflow

    pipelines, generate configuration and schema files, build containerized environments

    using Wave, and interact with workflows and compute resources on Seqera Platform

    through a conversational interface.

    '
  home: https://seqera.io
  license: BUSL-1.1
  license_file: LICENSE
