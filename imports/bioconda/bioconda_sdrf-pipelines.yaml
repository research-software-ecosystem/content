about:
  dev_url: https://github.com/bigbio/sdrf-pipelines
  doc_url: https://github.com/bigbio/sdrf-pipelines
  home: https://github.com/bigbio/sdrf-pipelines
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Translate, convert SDRF to configuration pipelines
build:
  entry_points:
  - parse_sdrf = sdrf_pipelines.parse_sdrf:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  container:
    extended-base: true
package:
  name: sdrf-pipelines
  version: 0.1.1
requirements:
  host:
  - pip
  - python >=3.10
  - hatchling
  run:
  - python >=3.10
  - click
  - defusedxml
  - numpy
  - pandas
  - pydantic >=2.0.0
  - pyyaml
  - fastparquet
  - pooch
  - rdflib
  - requests
source:
  sha256: 8a0edc01ab46008056a443502d3b6e89f4709cc368cd2e42b03f291626ae8221
  url: https://pypi.io/packages/source/s/sdrf_pipelines/sdrf_pipelines-0.1.1.tar.gz
test:
  commands:
  - parse_sdrf --help
  imports:
  - sdrf_pipelines
