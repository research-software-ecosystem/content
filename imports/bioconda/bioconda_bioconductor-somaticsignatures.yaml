about:
  description: The SomaticSignatures package identifies mutational signatures of single
    nucleotide variants (SNVs).  It provides a infrastructure related to the methodology
    described in Nik-Zainal (2012, Cell), with flexibility in the matrix decomposition
    algorithms.
  home: https://bioconductor.org/packages/3.22/bioc/html/SomaticSignatures.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Somatic Signatures
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:somaticsignatures
  parent_recipe:
    name: bioconductor-somaticsignatures
    path: recipes/bioconductor-somaticsignatures
    version: 2.16.0
package:
  name: bioconductor-somaticsignatures
  version: 2.46.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-ggbio >=1.58.0,<1.59.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-pcamethods >=2.2.0,<2.3.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-ggplot2
  - r-nmf
  - r-proxy
  - r-reshape2
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-ggbio >=1.58.0,<1.59.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-pcamethods >=2.2.0,<2.3.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-ggplot2
  - r-nmf
  - r-proxy
  - r-reshape2
