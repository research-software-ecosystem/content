about:
  description: 'SpecHLA enables full-resolution HLA typing from various sequencing

    data types including WGS, WES, RNA-seq, and long-read sequencing.

    '
  dev_url: https://github.com/deepomicslab/SpecHLA
  home: https://github.com/deepomicslab/SpecHLA
  license: MIT
  license_family: MIT
  license_file: License
  summary: Full-resolution HLA typing from sequencing data
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  recipe-maintainers:
  - jonasscheid
  - wshuai294
package:
  name: spechla
  version: 1.0.10
requirements:
  build:
  - null
  - cmake >=3.6
  - make
  host:
  - python >=3.8,<3.13
  - htslib
  - arpack
  - zlib
  - bowtie2
  run:
  - python >=3.8,<3.13
  - samtools >=1.13
  - bcftools
  - htslib
  - perl
  - perl-findbin
  - perl-getopt-long
  - pysam
  - biopython
  - numpy
  - pandas
  - scipy
  - pyvcf3
  - pulp
  - python-edlib
  - bwa
  - bowtie2
  - freebayes
  - blast
  - blat
  - bedtools
  - bamutil
  - fermikit
  - k8
  - parallel
  - trinity
  - minimap2
  - longshot
  - pbmm2
  - pbsv
source:
  sha256: c6ed080caa84ef48db6bd05c269f72ba031eaee7d5ac05d2432cc1f431f3c438
  url: https://github.com/deepomicslab/SpecHLA/archive/refs/tags/v1.0.10.tar.gz
test:
  commands:
  - spechla -h 2>&1 | grep -q "SpecHLA"
  - command -v SpecHap
  - command -v ExtractHAIRs
  - test -d ${PREFIX}/share/spechla/db/HLA
  - test -d ${PREFIX}/share/spechla/db/ref
