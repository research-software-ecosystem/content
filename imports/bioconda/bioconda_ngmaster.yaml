about:
  dev_url: https://github.com/MDU-PHL/ngmaster
  doc_url: https://github.com/MDU-PHL/ngmaster/blob/master/README.md
  home: https://github.com/MDU-PHL/ngmaster
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: In silico multi-antigen sequence typing for N. gonorrhoeae (NG-MAST and
    NG-STAR).
build:
  entry_points:
  - ngmaster=ngmaster.run_ngmaster:main
  noarch: python
  number: 1
  run_exports:
  - null
  script: ' -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir'
extra:
  recipe-maintainers:
  - stroehleina
  - kristyhoran
package:
  name: ngmaster
  version: 1.1.1
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - biopython
  - mlst
  - requests
source:
  sha256: f186f0d642a4d8830ec69eafdf4cb5b04dce749aa01bbe0d6d523b9ce238687e
  url: https://github.com/MDU-PHL/ngmaster/archive/refs/tags/v1.1.1.tar.gz
test:
  commands:
  - ngmaster --help
  - ngmaster --test
  imports:
  - ngmaster
