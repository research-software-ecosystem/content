about:
  dev_url: https://github.com/MDU-PHL/ngmaster
  doc_url: https://github.com/MDU-PHL/ngmaster/blob/master/README.md
  home: https://github.com/MDU-PHL/ngmaster
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: In silico multi-antigen sequence typing for N. gonorrhoeae (NG-MAST and
    NG-STAR).
build:
  entry_points:
  - ngmaster=ngmaster.run_ngmaster:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir'
extra:
  recipe-maintainers:
  - stroehleina
  - kristyhoran
package:
  name: ngmaster
  version: 2.0.0
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - biopython
  - mlst
  - requests
  - bs4
  - mlstdb ==1.0.0
source:
  sha256: 1215140b5ea060b6274d40b87ae3e38cbf608174067c762a3bfba383f1687487
  url: https://github.com/MDU-PHL/ngmaster/archive/refs/tags/v2.0.0.tar.gz
test:
  commands:
  - ngmaster --help
  - ngmaster --test
  imports:
  - ngmaster
