about:
  dev_url: https://github.com/sgkit-dev/bio2zarr
  doc_url: https://sgkit-dev.github.io/bio2zarr/
  home: https://sgkit-dev.github.io/bio2zarr/
  license: Apache-2.0
  license_file: LICENSE
  summary: Convert bioinformatics data to Zarr
build:
  entry_points:
  - vcf2zarr = bio2zarr.cli:vcf2zarr_main
  - plink2zarr = bio2zarr.cli:plink2zarr_main
  - tskit2zarr = bio2zarr.cli:tskit2zarr_main
  - vcfpartition = bio2zarr.cli:vcfpartition
  - zipzarr = bio2zarr.cli:zipzarr
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - jeromekelleher
  - benjeffery
  - tomwhite
package:
  name: bio2zarr
  version: 0.2.1
requirements:
  host:
  - python >=3.11
  - setuptools >=69
  - setuptools-scm >=8
  - pip
  run:
  - python >=3.11
  - numpy >=2
  - zarr >=3.1
  - click
  - tabulate
  - tqdm
  - humanfriendly
  - cyvcf2
  - tskit >=1.0
  - pandas
source:
  sha256: 5bbab214c7b12ec99459e9e08a7575f21bc5415b31d6385cf80a7ff55e097b63
  url: https://pypi.org/packages/source/b/bio2zarr/bio2zarr-0.2.1.tar.gz
test:
  commands:
  - pip check
  - vcf2zarr --help
  - tskit2zarr --help
  - plink2zarr --help
  - vcfpartition --help
  - zipzarr --help
  imports:
  - bio2zarr
  requires:
  - pip
