about:
  dev_url: https://github.com/sgkit-dev/bio2zarr
  doc_url: https://sgkit-dev.github.io/bio2zarr/
  home: https://sgkit-dev.github.io/bio2zarr/
  license: Apache-2.0
  license_file: LICENSE
  summary: Convert bioinformatics data to Zarr
build:
  entry_points:
  - vcf2zarr = bio2zarr.cli:vcf2zarr_main
  - plink2zarr = bio2zarr.cli:plink2zarr_main
  - tskit2zarr = bio2zarr.cli:tskit2zarr_main
  - vcfpartition = bio2zarr.cli:vcfpartition
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - jeromekelleher
  - benjeffery
  - tomwhite
package:
  name: bio2zarr
  version: 0.1.7
requirements:
  host:
  - python >=3.10
  - setuptools >=69
  - setuptools-scm >=8
  - pip
  run:
  - python >=3.10
  - numpy >=2
  - zarr >=2.17,<3
  - click
  - tabulate
  - tqdm
  - humanfriendly
  - cyvcf2
  - tskit >=1.0
  - pandas
source:
  sha256: 237aa8af904bb29172a0cb8a525527d0ad8e5a855d214d8a5be29b39b4334b2c
  url: https://pypi.org/packages/source/b/bio2zarr/bio2zarr-0.1.7.tar.gz
test:
  commands:
  - pip check
  - vcf2zarr --help
  - tskit2zarr --help
  - plink2zarr --help
  - vcfpartition --help
  imports:
  - bio2zarr
  requires:
  - pip
