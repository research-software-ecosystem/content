  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-tcgabiolinks >=2.38.0,<2.39.0
  - r-base
  - r-dplyr
  - r-energy
