about:
  description: Provides visualization functionality for untargeted LC-MS metabolomics
    research. Includes quality control visualizations, feature-wise visualizations
    and results visualizations.
  home: https://bioconductor.org/packages/3.22/bioc/html/notameViz.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Workflow for non-targeted LC-MS metabolic profiling
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-notameviz
  version: 1.0.2
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-notame >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cowplot
  - r-devemf
  - r-dplyr
  - r-ggbeeswarm
  - r-ggdendro
  - r-ggplot2
  - r-ggrepel
  - r-scales
  - r-stringr
  - r-tibble
  - r-tidyr
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-notame >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cowplot
  - r-devemf
  - r-dplyr
  - r-ggbeeswarm
  - r-ggdendro
  - r-ggplot2
  - r-ggrepel
  - r-scales
  - r-stringr
  - r-tibble
  - r-tidyr
