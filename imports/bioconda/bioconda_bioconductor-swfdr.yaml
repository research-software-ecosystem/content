about:
  description: This package allows users to estimate the science-wise false discovery
    rate from Jager and Leek, "Empirical estimates suggest most published medical
    research is true," 2013, Biostatistics, using an EM approach due to the presence
    of rounding and censoring. It also allows users to estimate the false discovery
    rate conditional on covariates, using a regression framework, as per Boca and
    Leek, "A direct approach to estimating false discovery rates conditional on covariates,"
    2018, PeerJ.
  home: https://bioconductor.org/packages/3.22/bioc/html/swfdr.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Estimation of the science-wise false discovery rate and the false discovery
    rate conditional on covariates
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-swfdr
  version: 1.36.0
requirements:
  host:
  - r-base
  run:
  - r-base
source:
  md5: 8650ba83d14511bc8b636d272b8f9fca
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/swfdr_1.36.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/swfdr/swfdr_1.36.0.tar.gz
  - https://bioarchive.galaxyproject.org/swfdr_1.36.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-swfdr/bioconductor-swfdr_1.36.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('swfdr')"
