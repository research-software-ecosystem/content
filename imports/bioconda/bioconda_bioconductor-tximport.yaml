about:
  description: Imports transcript-level abundance, estimated counts and transcript
    lengths, and summarizes into matrices for use with downstream gene-level analysis
    packages. Average transcript length, weighted by sample-specific transcript abundance
    estimates, is provided as a matrix which can be used as an offset for different
    expression of gene-level counts.
  home: https://bioconductor.org/packages/3.22/bioc/html/tximport.html
  license: LGPL (>=2)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Import and summarize transcript-level estimates for transcript- and gene-level
    analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:tximport
  parent_recipe:
    name: bioconductor-tximport
    path: recipes/bioconductor-tximport
    version: 1.8.0
  recipe-maintainers:
  - roryk
package:
  name: bioconductor-tximport
  version: 1.38.2
requirements:
  host:
  - r-base
  run:
  - r-base
source:
  md5: fe37066a1bdc5c5e3ffd98313b5a02f3
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/tximport_1.38.2.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/tximport/tximport_1.38.2.tar.gz
  - https://bioarchive.galaxyproject.org/tximport_1.38.2.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tximport/bioconductor-tximport_1.38.2_src_all.tar.gz
test:
