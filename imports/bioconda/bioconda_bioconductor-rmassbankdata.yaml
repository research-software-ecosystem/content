about:
  description: Example spectra, example compound list(s) and an example annotation
    list for a narcotics dataset; required to test RMassBank. The package is described
    in the man page for RMassBankData. Includes new XCMS test data.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/RMassBankData.html
  license: Artistic-2.0
  summary: Test dataset for RMassBank
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rmassbankdata
  version: 1.48.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 1fd3f95324ae7e2c5bf87428947a1474
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/RMassBankData_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RMassBankData/RMassBankData_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/RMassBankData_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rmassbankdata/bioconductor-rmassbankdata_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RMassBankData')"
