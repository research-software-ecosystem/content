about:
  home: https://github.com/m-d-grunnill/BEAST_pype
  license: GPL-2.0-only
  license_file: LICENSE
  summary: A package of BEAST 2 pipelines for phylodynamics.
build:
  entry_points:
  - beast_pype = beast_pype.cli:beast_pype
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - m-d-grunnill
package:
  name: beast-pype
  version: 0.3.0
requirements:
  host:
  - python >=3.10
  - setuptools >=77.0.3
  - unidep >=2.0.0
  - pip >=25.3
  run:
  - pytest >=9.0.2
  - pytest-xdist >=3.8.0
  - psutil >=7.2.2
  - beast2 >=2.6.0
  - python >=3.10
  - biopython >=1.86
  - nextclade >=3.18.1
  - iqtree >=3.0.1
  - treetime >=0.11.4
  - beast2-xml >=1.5.0
  - dark-matter >=5.1.2
  - seqkit >=2.12.0
  - ete3 >=3.1.1
  - scipy >=1.16.3
  - python-dateutil >=2.9.0
  - numpy >=2.4.0
  - pandas >=2.3.3
  - seaborn >=0.13.2
  - matplotlib-base >=3.10.8
  - arviz ==0.23.4
  - xarray >=2025.12.0
  - click >=8.3.1
  - pyyaml >=6.0.3
  - parallel >=2051122
  - jupyter >=1.1.1
  - papermill >=2.6.0
  - nbconvert >=7.16.6
  - nbformat >=5.10.4
  - ipywidgets >=8.1.8
  - bash_kernel >=0.10.0
  - ipykernel >=4.3.1
  - r-irkernel >=1.3.2
  - bioconductor-treeio >=1.34.0
  - bioconductor-ggtree >=4.0.4
  - r-ggplot2 >=4.0.2
  - r-readr >=2.2.0
  - r-lubridate >=1.9.5
  - r-dplyr >=1.2.0
  - r-png >=0.1_8
  - r-tidyr >=1.3.2
  - r-htmltools >=0.5.9
source:
  sha256: cf89cd555d6b5a0f915d7a1dccbc4c08c19adffcf063d217895ffe3b97c9373a
