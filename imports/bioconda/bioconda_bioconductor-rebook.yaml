about:
  description: Provides utilities to re-use content across chapters of a Bioconductor
    book. This is mostly based on functionality developed while writing the OSCA book,
    but generalized for potential use in other large books with heavy compute. Also
    contains some functions to assist book deployment.
  home: https://bioconductor.org/packages/3.22/bioc/html/rebook.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Re-using Content in Bioconductor Books
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rebook
  version: 1.20.0
requirements:
  host:
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-dir.expiry >=1.18.0,<1.19.0
  - r-base
  - r-codedepends
  - r-filelock
  - r-knitr >=1.32
  - r-rmarkdown
  run:
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-dir.expiry >=1.18.0,<1.19.0
  - r-base
  - r-codedepends
  - r-filelock
  - r-knitr >=1.32
  - r-rmarkdown
source:
  md5: 13364d4800a6a5b09c89093ea5321eec
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rebook_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rebook/rebook_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/rebook_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rebook/bioconductor-rebook_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rebook')"
