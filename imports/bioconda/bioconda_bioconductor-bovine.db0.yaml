  - bioconductor-data-packages >=20260207
source:
  md5: 6e63f19af09dbe194e345e54ea090f84
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/bovine.db0_3.22.0.tar.gz
