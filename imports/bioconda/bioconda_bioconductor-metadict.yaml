about:
  description: MetaDICT is a method for the integration of microbiome data. This method
    is designed to remove batch effects and preserve biological variation while integrating
    heterogeneous datasets. MetaDICT can better avoid overcorrection when unobserved
    confounding variables are present.
  home: https://bioconductor.org/packages/3.22/bioc/html/MetaDICT.html
  license: Artistic-2.0
  summary: Microbiome data integration method via shared dictionary learning
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-metadict
  version: 1.0.0
requirements:
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-ape
  - r-base
  - r-cluster
  - r-ecodist
  - r-ggplot2
  - r-ggpubr
  - r-igraph
  - r-matrixstats
  - r-rann
  - r-vegan
  - r-viridis
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-ape
  - r-base
  - r-cluster
  - r-ecodist
  - r-ggplot2
  - r-ggpubr
  - r-igraph
  - r-matrixstats
  - r-rann
  - r-vegan
  - r-viridis
source:
  md5: 0ca058f956d9520fe4f92e85423225a6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MetaDICT_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MetaDICT/MetaDICT_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/MetaDICT_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-metadict/bioconductor-metadict_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MetaDICT')"
