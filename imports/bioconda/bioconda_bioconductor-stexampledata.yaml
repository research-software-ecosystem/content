about:
  description: Collection of spatial transcriptomics datasets stored in SpatialExperiment
    Bioconductor format, for use in examples, demonstrations, and tutorials. The datasets
    are from several different platforms and have been sourced from various publicly
    available sources. Several datasets include images and/or reference annotation
    labels.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/STexampleData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Collection of spatial transcriptomics datasets in SpatialExperiment Bioconductor
    format
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-stexampledata
  version: 1.18.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: c324e1fc1c3bfd06c5f6b095ff5e5df4
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/STexampleData_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/STexampleData/STexampleData_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/STexampleData_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-stexampledata/bioconductor-stexampledata_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('STexampleData')"
