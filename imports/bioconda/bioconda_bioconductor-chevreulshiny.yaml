about:
  description: Tools for managing SingleCellExperiment objects as projects. Includes
    functions for analysis and visualization of single-cell data. Also included is
    a shiny app for visualization of pre-processed scRNA data. Supported by NIH grants
    R01CA137124 and R01EY026661 to David Cobrinik.
  home: https://bioconductor.org/packages/3.22/bioc/html/chevreulShiny.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Tools for managing SingleCellExperiment objects as projects
