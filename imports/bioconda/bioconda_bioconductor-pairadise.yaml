about:
  description: This package implements the PAIRADISE procedure for detecting differential
    isoform expression between matched replicates in paired RNA-Seq data.
  home: https://bioconductor.org/packages/3.22/bioc/html/PAIRADISE.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 'PAIRADISE: Paired analysis of differential isoform expression'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-pairadise
  version: 1.26.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-abind
  - r-base
  - r-nloptr
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-abind
  - r-base
  - r-nloptr
source:
  md5: 6e7b3c8cddd01ae09298e064170695b2
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/PAIRADISE_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/PAIRADISE/PAIRADISE_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/PAIRADISE_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pairadise/bioconductor-pairadise_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('PAIRADISE')"
