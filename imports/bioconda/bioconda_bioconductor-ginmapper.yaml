about:
  description: 'Provides functionalities to translate gene or protein identifiers
    between state-of-art biological databases: CARD (<https://card.mcmaster.ca/>),
    NCBI Protein, Nucleotide and Gene (<https://www.ncbi.nlm.nih.gov/>), UniProt (<https://www.uniprot.org/>)
    and KEGG (<https://www.kegg.jp>). Also offers complementary functionality like
    NCBI identical proteins or UniProt similar genes clusters retrieval.'
  home: https://bioconductor.org/packages/3.22/bioc/html/ginmappeR.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Gene Identifier Mapper
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ginmapper
  version: 1.6.0
requirements:
  host:
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - bioconductor-uniprot.ws >=2.50.0,<2.51.0
  - r-base
  - r-cachem
  - r-httr
  - r-jsonlite
  - r-memoise
  - r-rentrez
  - r-rvest
  - r-xml
  run:
  - bioconductor-keggrest >=1.50.0,<1.51.0
  - bioconductor-uniprot.ws >=2.50.0,<2.51.0
  - r-base
  - r-cachem
  - r-httr
  - r-jsonlite
  - r-memoise
  - r-rentrez
  - r-rvest
  - r-xml
source:
  md5: 289ece20c2494ac2e04900e2e3eb26df
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ginmappeR_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ginmappeR/ginmappeR_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/ginmappeR_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ginmapper/bioconductor-ginmapper_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ginmappeR')"
