about:
  dev_url: https://github.com/swittouck/scarap
  home: https://pypi.org/project/scarap
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: A toolkit for prokaryotic comparative genomics
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  identifiers:
  - doi:10.1093/bioinformatics/btae735
  recipe-maintainers:
  - TheOafidian
  - swittouck
package:
  name: scarap
  version: 1.0.2
requirements:
  host:
  - python >=3.8,<3.13
  - setuptools
  - setuptools-scm
  - pip
  run:
  - python >=3.8,<3.13
  - biopython >=1.79,<2
  - ete3 >=3.1,<4
  - numpy >=1.18,<3
  - scipy >=1.4,<2
  - pandas >=1.3,<3
  - mafft >=7.407
  - mmseqs2 >=11
source:
  sha256: e7623c791815f14cb0a6b6fa4d71b2a9fc389fd9a6281e1c41d40c2f2ab428a7
  url: https://pypi.org/packages/source/s/scarap/scarap-1.0.2.tar.gz
test:
  commands:
  - pip check
  - scarap --help
  imports:
  - scarap
  requires:
  - pip
