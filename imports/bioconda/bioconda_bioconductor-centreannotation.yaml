about:
  description: This is an AnnotationHub package for the CENTRE Bioconductor software
    package. It contains the GENCODE version 40 annotation and ENCODE Registry of
    candidate cis-regulatory elements (cCREs) version 3. All for Human hg38 genome.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/CENTREannotation.html
  license: Artistic-2.0
  summary: Hub package for the annotation data of CENTRE (GENCODE v40 and SCREEN v3)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-centreannotation
  version: 0.99.1
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-dbi
  - r-rsqlite
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - r-base
  - r-dbi
  - r-rsqlite
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 2bad81852e1a04d39aae9cb87020e909
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/CENTREannotation_0.99.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CENTREannotation/CENTREannotation_0.99.1.tar.gz
  - https://bioarchive.galaxyproject.org/CENTREannotation_0.99.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-centreannotation/bioconductor-centreannotation_0.99.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('CENTREannotation')"
