about:
  description: This package provide simulation based methods for evaluating the statistical
    power in differential expression analysis from RNA-seq data.
  home: https://bioconductor.org/packages/3.22/bioc/html/PROPER.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: PROspective Power Evaluation for RNAseq
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:proper
  parent_recipe:
    name: bioconductor-proper
    path: recipes/bioconductor-proper
    version: 1.14.0
package:
  name: bioconductor-proper
  version: 1.42.0
requirements:
  host:
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
  run:
  - bioconductor-edger >=4.8.0,<4.9.0
  - r-base
source:
  md5: 3245cb7f0e6d8c767d33172c52ea46ab
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/PROPER_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/PROPER/PROPER_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/PROPER_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-proper/bioconductor-proper_1.42.0_src_all.tar.gz
test:
