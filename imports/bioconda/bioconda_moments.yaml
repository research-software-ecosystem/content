about:
  dev_url: https://github.com/MomentsLD/moments
  doc_url: https://momentsld.github.io/moments
  home: https://github.com/MomentsLD/moments
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Evolutionary inference using SFS and LD statistics.
build:
  number: 0
  run_exports:
  - null
  script:
  - export CFLAGS="${CFLAGS} -O3 -Wno-int-conversion -Wno-implicit-function-declaration"
  - -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.5.1
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1534/genetics.117.200493
  - doi:10.1371/journal.pgen.1008204
  - doi:10.1093/molbev/msz265
package:
  name: moments
  version: 1.5.1
requirements:
  build:
  - null
  - pkg-config
  host:
  - pip
  - python >=3.11,<3.15
  - setuptools-scm
  - numpy
  - cython >=3.1
  run:
  - python >=3.11,<3.15
  - null
  - scipy >=1.3,<1.17
  - mpmath >=1.0,<1.4
  - demes >=0.2
source:
  sha256: bd26c2c2158e61d9818b4102e5cb777c38f9d9d0b903c6616060db05697df202
  url: https://pypi.org/packages/source/m/moments-popgen/moments_popgen-1.5.1.tar.gz
test:
  imports:
  - moments
