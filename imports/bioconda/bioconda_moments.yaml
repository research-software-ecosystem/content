about:
  dev_url: https://github.com/MomentsLD/moments
  doc_url: https://momentsld.github.io/moments
  home: https://github.com/MomentsLD/moments
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Evolutionary inference using SFS and LD statistics.
build:
  number: 0
  run_exports:
  - null
  script:
  - export CFLAGS="${CFLAGS} -O3 -Wno-int-conversion -Wno-implicit-function-declaration"
  - -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
  - SETUPTOOLS_SCM_PRETEND_VERSION=1.5.2
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1534/genetics.117.200493
  - doi:10.1371/journal.pgen.1008204
  - doi:10.1093/molbev/msz265
package:
  name: moments
  version: 1.5.2
requirements:
  build:
  - null
  - pkg-config
  host:
  - pip
  - python
  - setuptools-scm
  - numpy
  - cython >=3.1
  run:
  - python
  - numpy
  - scipy >=1.3,<1.17
  - mpmath >=1.0,<1.4
  - demes >=0.2
source:
  sha256: d1ff9de8468692b4184784dbbe4e3b2bb158f888e92a5a57695da90e0a5e8ab6
  url: https://pypi.org/packages/source/m/moments-popgen/moments_popgen-1.5.2.tar.gz
test:
  imports:
  - moments
