about:
  description: A manifest package for use with Illumina's MSA methylation arrays,
    compatible with minfi.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/IlluminaHumanMethylationMSAmanifest.html
  license: Apache License 2.0
  summary: Package for MSA Infinium array compatibility with minfi
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-illuminahumanmethylationmsamanifest
  version: 0.1.1
requirements:
  host:
  - bioconductor-minfi >=1.56.0,<1.57.0
  - r-base
  run:
  - bioconductor-minfi >=1.56.0,<1.57.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: bc70b05eebebb2a6ca122319b3df9e7f
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/IlluminaHumanMethylationMSAmanifest_0.1.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/IlluminaHumanMethylationMSAmanifest/IlluminaHumanMethylationMSAmanifest_0.1.1.tar.gz
  - https://bioarchive.galaxyproject.org/IlluminaHumanMethylationMSAmanifest_0.1.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-illuminahumanmethylationmsamanifest/bioconductor-illuminahumanmethylationmsamanifest_0.1.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('IlluminaHumanMethylationMSAmanifest')"
