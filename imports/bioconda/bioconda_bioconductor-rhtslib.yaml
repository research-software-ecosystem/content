about:
  description: This package provides version 1.18 of the 'HTSlib' C library for high-throughput
    sequence analysis. The package is primarily useful to developers of other R packages
    who wish to make use of HTSlib. Motivation and instructions for use of this package
    are in the vignette, vignette(package="Rhtslib", "Rhtslib").
  home: https://bioconductor.org/packages/3.22/bioc/html/Rhtslib.html
  license: LGPL (>= 2)
  license_file: /lib/R/share/licenses/LGPL-3
  summary: HTSlib high-throughput sequencing library as an R package
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - biotools:rhtslib
  - doi:10.1038/nmeth.3252
package:
  name: bioconductor-rhtslib
  version: 3.6.0
requirements:
  build:
  - null
  - automake
  - make
  host:
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - r-base
source:
  md5: e832528219ddfe8adb8c0f0ac4ba29bc
  patches:
  - arm_hwcap.patch
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rhtslib_3.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rhtslib/Rhtslib_3.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/Rhtslib_3.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rhtslib/bioconductor-rhtslib_3.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Rhtslib')"
