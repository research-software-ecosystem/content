about:
  description: "BCalm is a package that provides a modification from the mpralm package,\
    \ \nan R package that provides tools for differential analysis in MPRA studies.\n\
    BCalm allows users to use individual barcodes as model input. It provides \ntools\
    \ for data management, count preprocessing, and differential analysis \nin massively\
    \ parallel reporter assays (MPRA).\n"
  dev_url: https://github.com/kircherlab/BCalm
  home: https://github.com/kircherlab/BCalm
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Barcode Analysis using linear models for MPRA data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports:
  - null
extra:
  recipe-maintainers:
  - visze
package:
  name: r-bcalm
  version: 0.100.0
requirements:
  host:
  - r-base >=3.5
  - r-curl
  - bioconductor-biocgenerics
  - bioconductor-biobase
  - bioconductor-delayedarray
  - bioconductor-genomeinfodb
  - bioconductor-genomicranges
  - bioconductor-iranges
  - bioconductor-limma
  - bioconductor-mpra
  - bioconductor-s4vectors
  - bioconductor-summarizedexperiment
  - r-scales
  - r-statmod
  - r-tidyr
  run:
  - r-base >=3.5
  - r-curl
  - bioconductor-biocgenerics
  - bioconductor-biobase
  - bioconductor-delayedarray
  - bioconductor-genomeinfodb
  - bioconductor-genomicranges
  - bioconductor-iranges
  - bioconductor-limma
  - bioconductor-mpra
  - bioconductor-s4vectors
  - bioconductor-summarizedexperiment
  - r-scales
  - r-statmod
  - r-tidyr
source:
  sha256: 7a183c8716d8b14ca308e197e99e0c5006d87dbe90e8556e6a3eb65247135bff
  url: https://github.com/kircherlab/BCalm/archive/refs/tags/v0.100.0.tar.gz
test:
  commands:
  - $R -e "library('BCalm')"
