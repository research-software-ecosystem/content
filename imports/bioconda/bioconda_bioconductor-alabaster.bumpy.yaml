about:
  description: Save BumpyMatrix objects into file artifacts, and load them back into
    memory. This is a more portable alternative to serialization of such objects into
    RDS files. Each artifact is associated with metadata for further interpretation;
    downstream applications can enrich this metadata with context-specific properties.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.bumpy.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Save and Load BumpyMatrices to/from file
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster.bumpy
  version: 1.10.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-matrix
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-bumpymatrix >=1.18.0,<1.19.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-matrix
