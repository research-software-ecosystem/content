about:
  description: Read in imaging-based spatial transcriptomics technology data. Current
    available modules are for Xenium by 10X Genomics, CosMx by Nanostring, MERSCOPE
    by Vizgen, or STARmapPLUS from Broad Institute. You can choose to read the data
    in as a SpatialExperiment or a SingleCellExperiment object.
  home: https://bioconductor.org/packages/3.22/bioc/html/SpatialExperimentIO.html
  license: Artistic-2.0
  summary: Read in Xenium, CosMx, MERSCOPE or STARmapPLUS data as SpatialExperiment
    object
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spatialexperimentio
  version: 1.2.0
requirements:
  host:
  - bioconductor-dropletutils >=1.30.0,<1.31.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-arrow
  - r-base
  - r-data.table
  - r-purrr
  run:
  - bioconductor-dropletutils >=1.30.0,<1.31.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - r-arrow
  - r-base
  - r-data.table
  - r-purrr
source:
  md5: 106b460e315b4dd91c41466b2707aeb9
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SpatialExperimentIO_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SpatialExperimentIO/SpatialExperimentIO_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/SpatialExperimentIO_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-spatialexperimentio/bioconductor-spatialexperimentio_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('SpatialExperimentIO')"
