about:
  description: Data from 6 samples across 2 groups from 450k methylation arrays.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/minfiData.html
  license: Artistic-2.0
  summary: Example data for the Illumina Methylation 450k array
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-minfidata
  version: 0.56.0
requirements:
  host:
  - bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylation450kmanifest >=0.4.0,<0.5.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - r-base
  run:
  - bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19 >=0.6.0,<0.7.0
  - bioconductor-illuminahumanmethylation450kmanifest >=0.4.0,<0.5.0
  - bioconductor-minfi >=1.56.0,<1.57.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: dc7abebc8c3eaaa92a56c4f5c0e117bc
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/minfiData_0.56.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/minfiData/minfiData_0.56.0.tar.gz
  - https://bioarchive.galaxyproject.org/minfiData_0.56.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-minfidata/bioconductor-minfidata_0.56.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('minfiData')"
