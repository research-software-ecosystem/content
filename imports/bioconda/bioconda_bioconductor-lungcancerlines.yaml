about:
  description: 'Reads from an RNA-seq experiment between two lung cancer cell lines:
    H1993 (met) and H2073 (primary). The reads are stored as Fastq files and are meant
    for use with the TP53Genome object in the gmapR package.'
  home: https://bioconductor.org/packages/3.22/data/experiment/html/LungCancerLines.html
  license: Artistic-2.0
  summary: Reads from Two Lung Cancer Cell Lines
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-lungcancerlines
  version: 0.48.0
requirements:
  host:
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  run:
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 931e0d3f056e3c04a5c1d8684c526bea
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/LungCancerLines_0.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/LungCancerLines/LungCancerLines_0.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/LungCancerLines_0.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-lungcancerlines/bioconductor-lungcancerlines_0.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('LungCancerLines')"
