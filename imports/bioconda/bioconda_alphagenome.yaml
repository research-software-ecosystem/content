about:
  description: 'AlphaGenome is a unified DNA sequence model from Google DeepMind for

    regulatory variant-effect prediction. This package provides the Python

    SDK for interacting with the AlphaGenome API and visualizing predictions

    across gene expression, splicing, chromatin features, and contact maps.

    '
  dev_url: https://github.com/google-deepmind/alphagenome
  doc_url: https://www.alphagenomedocs.com/
  home: https://github.com/google-deepmind/alphagenome
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Python SDK for interacting with and visualizing AlphaGenome genomic models
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - dannon
package:
  name: alphagenome
  version: 0.5.1
requirements:
  host:
  - python >=3.10
  - pip
  - hatchling
  - grpcio-tools
  run:
  - python >=3.10
  - absl-py
  - anndata
  - grpcio >=1.67.1
  - immutabledict
  - intervaltree
  - jaxtyping
  - matplotlib-base
  - ml_dtypes
  - numpy
  - pandas
  - protobuf >=5.28.3
  - pyarrow
  - scipy
  - seaborn
  - tqdm
  - typeguard
  - typing-extensions
  - zstandard
source:
  sha256: e7ca21dcb431ffa522d6f911ae7979d5f1e1ef63c621244d1e00db875ef8703b
  url: https://pypi.io/packages/source/a/alphagenome/alphagenome-0.5.1.tar.gz
test:
  imports:
  - alphagenome
  - alphagenome.data
  - alphagenome.models
