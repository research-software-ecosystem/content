about:
  description: 'DeepKin provides efficient and precise estimation for in-depth genetic
    relatedness.

    It includes functions for calculating critical values, minimum effective markers,

    and power analysis for genetic relatedness studies.

    '
  dev_url: https://github.com/qixininin/deepKin
  doc_url: https://github.com/qixininin/deepKin
  home: https://github.com/qixininin/deepKin
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file:
  - /lib/R/share/licenses/GPL-3
  summary: 'DeepKin: efficient and precise estimation for in-depth genetic relatedness'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports:
  - null
extra:
  recipe-maintainers:
  - VonPoo
package:
  name: r-deepkin
  version: 1.0.0
requirements:
  host:
  - r-base
  - r-readr
  run:
  - r-base
  - r-readr
source:
  sha256: 8354d2223dbc07fd11fd39270610c2a5c43146f4150a4a92185ff0ffd2eefe40
  url: https://github.com/qixininin/deepKin/archive/refs/tags/v1.0.0.tar.gz
test:
  commands:
  - $R -e "library('deepKin')"
