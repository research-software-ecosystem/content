about:
  description: This package provides a tool to search and download a collection of
    publicly available single cell ATAC-seq datasets and their metadata. scATAC-Explorer
    aims to act as a single point of entry for users looking to study single cell
    ATAC-seq data. Users can quickly search available datasets using the metadata
    table and download datasets of interest for immediate analysis within R.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/scATAC.Explorer.html
  license: Artistic-2.0
  summary: A Collection of Single-cell ATAC Sequencing Datasets and Corresponding
    Metadata
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scatac.explorer
  version: 1.16.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-zellkonverter >=1.20.0,<1.21.0
  - r-base
  - r-data.table
  - r-matrix
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-zellkonverter >=1.20.0,<1.21.0
  - r-base
  - r-data.table
  - r-matrix
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 17174656722d3aa1dba3a5814ae70c32
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/scATAC.Explorer_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/scATAC.Explorer/scATAC.Explorer_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/scATAC.Explorer_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-scatac.explorer/bioconductor-scatac.explorer_1.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('scATAC.Explorer')"
