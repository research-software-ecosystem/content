about:
  description: This package is a wrapper of Integrative Genomics Viewer (IGV). It
    comprises an htmlwidget version of IGV. It can be used as a module in Shiny apps.
  home: https://bioconductor.org/packages/3.22/bioc/html/igvShiny.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 'igvShiny: a wrapper of Integrative Genomics Viewer (IGV - an interactive
    tool for visualization and exploration integrated genomic data)'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-igvshiny
  version: 1.6.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomeinfodbdata >=1.2.0,<1.3.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-checkmate
  - r-futile.logger
  - r-htmlwidgets
  - r-httr
  - r-jsonlite
  - r-randomcolor
  - r-shiny
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomeinfodbdata >=1.2.0,<1.3.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-checkmate
  - r-futile.logger
  - r-htmlwidgets
  - r-httr
  - r-jsonlite
  - r-randomcolor
  - r-shiny
source:
  md5: 94ef96a96b60c4a12a702de7e1f8abf9
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/igvShiny_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/igvShiny/igvShiny_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/igvShiny_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-igvshiny/bioconductor-igvshiny_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('igvShiny')"
