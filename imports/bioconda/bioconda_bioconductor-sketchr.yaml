about:
  description: Provides an R interface for various subsampling algorithms implemented
    in python packages. Currently, interfaces to the geosketch and scSampler python
    packages are implemented. In addition it also provides diagnostic plots to evaluate
    the subsampling.
  home: https://bioconductor.org/packages/3.22/bioc/html/sketchR.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: An R interface for python subsampling/sketching algorithms
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-sketchr
  version: 1.6.0
requirements:
  host:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-reticulate
  - r-rlang
  - r-scales
  run:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - r-base
  - r-dplyr
  - r-ggplot2
  - r-reticulate
  - r-rlang
  - r-scales
source:
  md5: 5af7266a9caee8bee657c50aba65f1ab
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/sketchR_1.6.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/sketchR/sketchR_1.6.0.tar.gz
  - https://bioarchive.galaxyproject.org/sketchR_1.6.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-sketchr/bioconductor-sketchr_1.6.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('sketchR')"
