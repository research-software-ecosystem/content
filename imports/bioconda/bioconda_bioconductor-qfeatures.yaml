about:
  description: The QFeatures infrastructure enables the management and processing
    of quantitative features for high-throughput mass spectrometry assays. It provides
    a familiar Bioconductor user experience to manages quantitative data across different
    assay levels (such as peptide spectrum matches, peptides and proteins) in a coherent
    and tractable format.
  home: https://bioconductor.org/packages/3.22/bioc/html/QFeatures.html
  license: Artistic-2.0
  summary: Quantitative features for mass spectrometry data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-qfeatures
  version: 1.20.0
requirements:
  host:
  - bioconductor-annotationfilter >=1.34.0,<1.35.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-igraph
