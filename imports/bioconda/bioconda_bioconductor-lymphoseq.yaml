  - r-phangorn
  - r-plyr
  - r-rcolorbrewer
  - r-reshape
  - r-stringdist
  - r-upsetr
  - r-venndiagram
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-ggtree >=4.0.0,<4.1.0
  - bioconductor-lymphoseqdb >=0.99.0,<0.100.0
  - bioconductor-msa >=1.42.0,<1.43.0
  - r-base
