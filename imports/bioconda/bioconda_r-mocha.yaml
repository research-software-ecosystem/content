about:
  description: 'MOCHA is an R package providing model-based methods for open chromatin
    analysis in single-cell ATAC-seq data, including tile calling, differential accessibility,
    and co-accessibility analyses.

    '
  dev_url: https://github.com/aifimmunology/MOCHA
  doc_url: https://aifimmunology.github.io/MOCHA/
  home: https://github.com/aifimmunology/MOCHA
  license: GPL-3.0-or-later
  license_file: LICENSE.md
  summary: Modeling for single-cell open chromatin analysis.
build:
  noarch: generic
  number: 0
  run_exports:
  - null
  script: ' CMD INSTALL --build .'
extra:
  recipe-maintainers:
  - MPebworthEpana
package:
  name: r-mocha
  version: 1.2.0
requirements:
  host:
  - r-base >=4.1.0
  - r-data.table
  - r-dplyr
  - r-stringr
  - r-wcorr
  - r-magrittr
  - r-rlang
  - r-assertthat
  - r-ggplot2
  - r-ggrepel
  - r-matrixstats
  - r-scales
  - r-tidyr
  - r-ggridges
  - r-pbapply
  - r-tidyselect
  - r-lifecycle
  - bioconductor-plyranges >=1.14.0
  - bioconductor-genomicranges
  - bioconductor-raggedexperiment
  - bioconductor-multiassayexperiment
  - bioconductor-summarizedexperiment
  - bioconductor-ggbio
  - bioconductor-annotationdbi
  - bioconductor-biocgenerics
  - bioconductor-genomeinfodb
  - bioconductor-genomicfeatures
  - bioconductor-iranges
  - bioconductor-s4vectors
  - bioconductor-ensembldb
  - bioconductor-qvalue
  - bioconductor-bsgenome
  run:
  - r-base >=4.1.0
  - r-data.table
  - r-dplyr
  - r-stringr
  - r-wcorr
  - r-magrittr
  - r-rlang
  - r-assertthat
  - r-ggplot2
