about:
  description: This R package supports the handling and analysis of imaging mass cytometry
    and other highly multiplexed imaging data. The main functionality includes reading
    in single-cell data after image segmentation and measurement, data formatting
    to perform channel spillover correction and a number of spatial analysis approaches.
    First, cell-cell interactions are detected via spatial graph construction; these
    graphs can be visualized with cells representing nodes and interactions representing
    edges. Furthermore, per cell, its direct neighbours are summarized to allow spatial
    clustering. Per image/grouping level, interactions between types of cells are
    counted, averaged and compared against random permutations. In that way, types
    of cells that interact more (attraction) or less (avoidance) frequently than expected
    by chance are detected.
  home: https://bioconductor.org/packages/3.22/bioc/html/imcRtools.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Methods for imaging mass cytometry data analysis
