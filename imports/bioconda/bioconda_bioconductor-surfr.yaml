about:
  description: Identify Surface Protein coding genes from a list of candidates. Systematically
    download data from GEO and TCGA or use your own data. Perform DGE on bulk RNAseq
    data. Perform Meta-analysis. Descriptive enrichment analysis and plots.
  home: https://bioconductor.org/packages/3.22/bioc/html/SurfR.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: Surface Protein Prediction and Identification
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-surfr
  version: 1.6.0
