about:
  description: Calculates a single number for a whole sequence that reflects the propensity
    of a DNA binding protein to interact with it. The DNA binding protein has to be
    described with a PFM matrix, for example gotten from Jaspar.
  home: https://bioconductor.org/packages/3.22/bioc/html/MatrixRider.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Obtain total affinity and occupancies for binding site matrices on a given
    sequence
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-matrixrider
  version: 1.42.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-tfbstools >=1.48.0,<1.49.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-tfbstools >=1.48.0,<1.49.0
  - bioconductor-xvector >=0.50.0,<0.51.0
  - r-base
source:
  md5: 4af73c9fe3341f8f199418e416ce32c6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MatrixRider_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MatrixRider/MatrixRider_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/MatrixRider_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-matrixrider/bioconductor-matrixrider_1.42.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MatrixRider')"
