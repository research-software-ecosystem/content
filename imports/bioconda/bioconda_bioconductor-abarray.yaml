about:
  description: Automated pipline to perform gene expression analysis for Applied Biosystems
    Genome Survey Microarray (AB1700) data format. Functions include data preprocessing,
    filtering, control probe analysis, statistical analysis in one single function.
    A GUI interface is also provided. The raw data, processed data, graphics output
    and statistical results are organized into folders according to the analysis settings
    used.
  home: https://bioconductor.org/packages/3.22/bioc/html/ABarray.html
  license: GPL
  license_file: /lib/R/share/licenses/GPL-3
  summary: Microarray QA and statistical data analysis for Applied Biosystems Genome
    Survey Microrarray (AB1700) gene expression data.
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-abarray
  version: 1.78.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-multtest >=2.66.0,<2.67.0
  - r-base
source:
  md5: 6ad7c6708ff912ee32a00b355328d3b0
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ABarray_1.78.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ABarray/ABarray_1.78.0.tar.gz
  - https://bioarchive.galaxyproject.org/ABarray_1.78.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-abarray/bioconductor-abarray_1.78.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('ABarray')"
