about:
  description: Data set containing two complete lists of identified functional interaction
    partners in Human. Data are derived from Reactome and BioGRID databases.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/FIs.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Human Functional Interactions (FIs) for splineTimeR package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-fis
    path: recipes/bioconductor-fis
    version: 1.8.0
package:
  name: bioconductor-fis
  version: 1.38.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 14cbe587cd98ae1b90cca5ac01298195
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/FIs_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/FIs/FIs_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/FIs_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-fis/bioconductor-fis_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('FIs')"
