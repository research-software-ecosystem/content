about:
  description: The Mass Spec Query Language (MassQL) is a domain-specific language
    enabling to express a query and retrieve mass spectrometry (MS) data in a more
    natural and understandable way for MS users. It is inspired by SQL and is by design
    programming language agnostic. The SpectraQL package adds support for the MassQL
    query language to R, in particular to MS data represented by Spectra objects.
    Users can thus apply MassQL expressions to analyze and retrieve specific data
    from Spectra objects.
  home: https://bioconductor.org/packages/3.22/bioc/html/SpectraQL.html
  license: Artistic-2.0
  summary: MassQL support for Spectra
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spectraql
  version: 1.4.0
requirements:
  host:
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
  run:
  - bioconductor-mscoreutils >=1.22.0,<1.23.0
  - bioconductor-protgenerics >=1.42.0,<1.43.0
  - bioconductor-spectra >=1.20.0,<1.21.0
  - r-base
source:
  md5: 95d15caed36939d1b1c81b57068d0139
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/SpectraQL_1.4.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/SpectraQL/SpectraQL_1.4.0.tar.gz
  - https://bioarchive.galaxyproject.org/SpectraQL_1.4.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-spectraql/bioconductor-spectraql_1.4.0_src_all.tar.gz
test:
