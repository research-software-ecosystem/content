about:
  dev_url: https://github.com/sinhakrishnendu/BABAPPAlign
  home: https://github.com/sinhakrishnendu/BABAPPAlign
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Deep learning\u2013based progressive multiple sequence alignment engine\
    \ with learned residue scoring."
build:
  entry_points:
  - babappalign = babappalign.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  keywords:
  - multiple-sequence-alignment
  - protein-alignment
  - deep-learning
  - esm
  - transformers
  - bioinformatics
  recipe-maintainers:
  - sinhakrishnendu
package:
  name: babappalign
  version: 1.3.5
requirements:
  host:
  - python >=3.9,<3.13
  - pip
  - setuptools
  run:
  - python >=3.9,<3.13
  - numpy
  - scipy
  - pandas
  - biopython
  - tqdm
  - pytorch >=1.12
  - transformers >=4.30
  - fair-esm
source:
  sha256: 1b5c97e2523fa2228bc1522812a08a36eaf4e4c4f020f65417ad30a2d23bc183
  url: https://github.com/sinhakrishnendu/BABAPPAlign/archive/refs/tags/v1.3.5.tar.gz
test:
  commands:
  - export HF_HOME="$PWD/hf_home"
  - export TRANSFORMERS_CACHE="$PWD/hf_home"
  - export XDG_CACHE_HOME="$PWD/hf_home"
  - babappalign --help
