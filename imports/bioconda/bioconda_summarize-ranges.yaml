  - python >=3.8
  - hatchling
  - pip
  run:
  - python >=3.8
source:
  sha256: 7ee9d5cfbc1dee2688e76bafb24b202d6c30201c2cba410370fda7506fc4edfc
  url: https://pypi.org/packages/source/s/summarize-ranges/summarize_ranges-0.1.1.tar.gz
test:
  commands:
  - summarize-ranges --help
  imports:
  - summarize_ranges
