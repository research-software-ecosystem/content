about:
  description: 16S rRNA gene sequencing data to study changes in the faecal microbiota
    of 12 volunteers during a human challenge study with ETEC (H10407) and subsequent
    treatment with ciprofloxacin.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/etec16s.html
  license: Artistic-2.0
  summary: Individual-specific changes in the human gut microbiota after challenge
    with enterotoxigenic Escherichia coli and subsequent ciprofloxacin treatment
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-etec16s
  version: 1.38.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-metagenomeseq >=1.52.0,<1.53.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-metagenomeseq >=1.52.0,<1.53.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 72841a06e2f2b3b1aa0030bc7d8d168c
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/etec16s_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/etec16s/etec16s_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/etec16s_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-etec16s/bioconductor-etec16s_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('etec16s')"
