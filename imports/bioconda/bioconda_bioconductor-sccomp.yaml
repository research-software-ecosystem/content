about:
  description: Comprehensive R package for differential composition and variability
    analysis in single-cell RNA sequencing, CyTOF, and microbiome data. Provides robust
    Bayesian modeling with outlier detection, random effects, and advanced statistical
    methods for cell type proportion analysis. Features include probabilistic outlier
    identification, mixed-effect modeling, differential variability testing, and comprehensive
    visualization tools. Perfect for cancer research, immunology, developmental biology,
    and single-cell genomics applications.
  home: https://bioconductor.org/packages/3.22/bioc/html/sccomp.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Differential Composition and Variability Analysis for Single-Cell Data
