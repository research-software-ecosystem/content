about:
  description: Builds hexbin plots for variables and dimension reduction stored in
    single cell omics data such as SingleCellExperiment. The ideas used in this package
    are based on the excellent work of Dan Carr, Nicholas Lewin-Koh, Martin Maechler
    and Thomas Lumley.
  home: https://bioconductor.org/packages/3.22/bioc/html/schex.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Hexbin plots for single cell omics data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-schex
  version: 1.24.0
requirements:
  host:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - r-cluster
  - r-concaveman
  - r-dplyr
  - r-entropy
  - r-ggforce
  - r-ggplot2 >=3.2.1
  - r-hexbin
  - r-rlang
  run:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - r-cluster
  - r-concaveman
  - r-dplyr
  - r-entropy
  - r-ggforce
  - r-ggplot2 >=3.2.1
  - r-hexbin
  - r-rlang
source:
  md5: 679055bb0786e09fcbfa4978cb3258c8
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/schex_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/schex/schex_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/schex_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-schex/bioconductor-schex_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('schex')"
