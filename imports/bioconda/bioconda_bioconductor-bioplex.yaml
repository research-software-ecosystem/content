about:
  description: The BioPlex package implements access to the BioPlex protein-protein
    interaction networks and related resources from within R. Besides protein-protein
    interaction networks for HEK293 and HCT116 cells, this includes access to CORUM
    protein complex data, and transcriptome and proteome data for the two cell lines.
    Functionality focuses on importing the various data resources and storing them
    in dedicated Bioconductor data structures, as a foundation for integrative downstream
    analysis of the data.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/BioPlex.html
  license: Artistic-2.0
  summary: R-side access to BioPlex protein-protein interaction data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bioplex
  version: 1.16.1
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-geoquery >=2.78.0,<2.79.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 37536412662a70e1c1111a2b1f1ccf2b
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/BioPlex_1.16.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BioPlex/BioPlex_1.16.1.tar.gz
  - https://bioarchive.galaxyproject.org/BioPlex_1.16.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bioplex/bioconductor-bioplex_1.16.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('BioPlex')"
