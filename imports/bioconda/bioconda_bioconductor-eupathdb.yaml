about:
  description: Brings together annotation resources from the various EuPathDB databases
    (PlasmoDB, ToxoDB, TriTrypDB, etc.) and makes them available in R using the AnnotationHub
    framework.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/EuPathDB.html
  license: Artistic-2.0
  summary: Provides access to pathogen annotation resources available on EuPathDB
    databases
build:
  noarch: generic
  number: 14
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-eupathdb
  version: 1.0.1
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-annotationhubdata >=1.40.0,<1.41.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomeinfodbdata >=1.2.0,<1.3.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-biocmanager
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-annotationhubdata >=1.40.0,<1.41.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomeinfodbdata >=1.2.0,<1.3.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - r-biocmanager
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 1451c3ab6c224d9a4cfbdf27dc5c2680
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/EuPathDB_1.0.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/EuPathDB/EuPathDB_1.0.1.tar.gz
  - https://bioarchive.galaxyproject.org/EuPathDB_1.0.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-eupathdb/bioconductor-eupathdb_1.0.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('EuPathDB')"
