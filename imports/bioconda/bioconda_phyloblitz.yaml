about:
  dev_url: https://github.com/kbseah/phyloblitz
  doc_url: https://github.com/kbseah/phyloblitz#readme
  home: https://github.com/kbseah/phyloblitz
  license: MIT
  license_file: LICENSE.txt
  summary: Rapid SSU rRNA marker gene screening of long read metagenomes.
build:
  entry_points:
  - phyloblitz = phyloblitz:main.main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vvv
extra:
  recipe-maintainers:
  - kbseah
package:
  name: phyloblitz
  version: 0.2.0
requirements:
  host:
  - python >=3.10,<3.14
  - hatchling
  - pip
  run:
  - python >=3.10,<3.14
  - isonclust3 >=0.3.0,<0.4
  - matplotlib-base >=3.10.8,<4
  - minimap2 >=2.30,<3
  - mistune >=3.1.4,<4
  - numpy >=2.3.5,<3
  - oxli >=0.3.0,<0.4
  - pyfastx >=2.2.0,<3
  - pymarkovclustering >=0.1.1,<0.2
  - pysam >=0.23.3,<0.24
  - rich-click >=1.9.4,<2
  - spoa >=4.1.5,<5
source:
  sha256: 94053eca05a7a6e097931631071f4bef964f601c8064e7b7b15615dabc497ce0
  url: https://github.com/kbseah/phyloblitz/archive/refs/tags/v0.2.0.tar.gz
test:
  commands:
  - phyloblitz --version
  imports:
  - phyloblitz
