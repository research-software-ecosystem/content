about:
  dev_url: https://github.com/kbseah/phyloblitz
  doc_url: https://github.com/kbseah/phyloblitz#readme
  home: https://github.com/kbseah/phyloblitz
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Rapid SSU rRNA marker gene screening of long read metagenomes.
build:
  entry_points:
  - phyloblitz = phyloblitz:main.main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vvv
extra:
  recipe-maintainers:
  - kbseah
package:
  name: phyloblitz
  version: 0.3.0
requirements:
  host:
  - python >=3.10,<3.14
  - hatchling
  - pip
  run:
  - python >=3.10,<3.14
  - isonclust3 >=0.3.0,<0.4
  - matplotlib-base >=3.10.8,<4
  - minimap2 >=2.30,<3
  - mistune >=3.1.4,<4
  - numpy >=2.3.5,<3
  - oxli >=0.3.0,<0.4
  - packaging >=26.0,<27
  - pyfastx >=2.2.0,<3
  - pymarkovclustering >=0.1.1,<0.2
  - pysam >=0.23.3,<0.24
  - requests >=2.32.5,<3
  - rich >=14.3.3,<15
  - rich-click >=1.9.4,<2
  - spoa >=4.1.5,<5
  - tqdm >=4.67.3,<5
source:
  sha256: cbbd769e67776195f0a1598e3676d54897cd9c102fedb4237c03c9a69189100e
  url: https://github.com/kbseah/phyloblitz/archive/refs/tags/v0.3.0.tar.gz
test:
  commands:
  - phyloblitz --version
  - phyloblitz run --help
  - phyloblitz compare --help
  - phyloblitz download --help
  imports:
  - phyloblitz
