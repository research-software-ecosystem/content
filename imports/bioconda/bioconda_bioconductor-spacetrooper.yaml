about:
  description: SpaceTrooper performs Quality Control analysis using data driven GLM
    models of Image-Based spatial data, providing exploration plots, QC metrics computation,
    outlier detection. It implements a GLM strategy for the detection of low quality
    cells in imaging-based spatial data (Transcriptomics and Proteomics). It additionally
    implements several plots for the visualization of imaging based polygons through
    the ggplot2 package.
  home: https://bioconductor.org/packages/3.22/bioc/html/SpaceTrooper.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: SpaceTrooper performs Quality Control analysis of Image-Based spatial
