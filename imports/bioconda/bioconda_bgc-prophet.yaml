about:
  home: https://github.com/HUST-NingKang-Lab/BGC-Prophet
  license: MIT
  license_file: LICENSE
  summary: Deep learning tool for identifying and classifying Biosynthetic Gene Clusters
    (BGCs) using language processing neural networks.
build:
  entry_points:
  - bgc_prophet = bgc_prophet.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vvv
extra:
  recipe-maintainers:
  - maxibor
package:
  name: bgc-prophet
  version: 0.1.2
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - pytorch
  - python-lmdb
  - pandas
  - numpy
  - tqdm
  - scikit-learn
  - matplotlib-base
  - fair-esm
  - biopython
source:
  sha256: c04a118b75ff7babe2b2618a175696758218046f823692054c6dd80967919e3a
  url: https://github.com/HUST-NingKang-Lab/BGC-Prophet/archive/refs/tags/v0.1.2.tar.gz
test:
  commands:
  - bgc_prophet --help
  - bgc_prophet pipeline --help
  imports:
  - bgc_prophet
  - bgc_prophet.command
  - bgc_prophet.train
