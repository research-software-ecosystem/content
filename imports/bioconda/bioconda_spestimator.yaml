about:
  home: https://github.com/erinyoung/Spestimator
  license: MIT
  license_file: LICENSE
  summary: A tool to predict bacterial species from fasta files using RefSeq 16S.
build:
  entry_points:
  - spestimator = spestimator.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - erinyoung
package:
  name: spestimator
  version: 0.3.0.233
requirements:
  host:
  - python >=3.9
  - setuptools >=61.0
  - wheel
  - pip
  run:
  - python >=3.9
  - blast
  - pandas
  - requests
  - tqdm
  - ncbi-datasets-pyclient
source:
  sha256: 561646e5dd11ce80cd674a04fd8ea2ababda8524aaf97d2e5b94607bdcba84fa
  url: https://pypi.org/packages/source/S/Spestimator/spestimator-0.3.0.233.tar.gz
test:
  commands:
  - pip check
  - spestimator --help
  imports:
  - spestimator
  requires:
  - pip
