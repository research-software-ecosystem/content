about:
  description: Visualization functions for spatial transcriptomics data. Includes
    functions to generate several types of plots, including spot plots, feature (molecule)
    plots, reduced dimension plots, spot-level quality control (QC) plots, and feature-level
    QC plots, for datasets from the 10x Genomics Visium and other technological platforms.
    Datasets are assumed to be in either SpatialExperiment or SingleCellExperiment
    format.
  home: https://bioconductor.org/packages/3.22/bioc/html/ggspavis.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Visualization functions for spatial transcriptomics data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ggspavis
  version: 1.16.0
requirements:
  host:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-ggrepel
  - r-ggside
  - r-rcolorbrewer
  - r-scales
  run:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-ggplot2
  - r-ggrepel
  - r-ggside
  - r-rcolorbrewer
  - r-scales
source:
  md5: d6ea27807708df89d65e117fa4d43bbe
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/ggspavis_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/ggspavis/ggspavis_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/ggspavis_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ggspavis/bioconductor-ggspavis_1.16.0_src_all.tar.gz
test:
