about:
  description: Import, analyze and visualize data from Roche(R) xCELLigence RTCA systems.
    The package imports real-time cell electrical impedance data into R. As an alternative
    to commercial software shipped along the system, the Bioconductor package RTCA
    provides several unique transformation (normalization) strategies and various
    visualization tools.
  home: https://bioconductor.org/packages/3.22/bioc/html/RTCA.html
  license: LGPL-3
  license_file: /lib/R/share/licenses/LGPL-3
  summary: Open-source toolkit to analyse data from xCELLigence System (RTCA)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  identifiers:
  - biotools:rtca
  - doi:10.1016/j.compbiolchem.2013.12.004
  parent_recipe:
    name: bioconductor-rtca
    path: recipes/bioconductor-rtca
    version: 1.32.0
package:
  name: bioconductor-rtca
  version: 1.62.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - r-gtools
  - r-rcolorbrewer
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - r-gtools
  - r-rcolorbrewer
source:
  md5: 6dc361bdd0779a6f1db81bd1a52ee9f7
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/RTCA_1.62.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RTCA/RTCA_1.62.0.tar.gz
  - https://bioarchive.galaxyproject.org/RTCA_1.62.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rtca/bioconductor-rtca_1.62.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RTCA')"
