about:
  dev_url: https://github.com/althonos/pyfamsa
  doc_url: https://pyfamsa.readthedocs.org
  home: https://github.com/althonos/pyfamsa
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: COPYING
  summary: Cython bindings and Python interface to FAMSA, an algorithm for ultra-scale
    multiple sequence alignments.
build:
  number: 0
  run_exports:
  - null
  script:
  - export CPPFLAGS="${CPPFLAGS} -I${PREFIX}/include"
  - export LDFLAGS="${LDFLAGS} -L${PREFIX}/lib"
  - export CXXFLAGS="${CXXFLAGS} -std=c++23"
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - althonos
package:
  name: pyfamsa
  version: 0.7.0
requirements:
  build:
  - null
  - null
  - cmake
  - make
  - pkg-config
  - clangdev
  - llvmlite
  host:
  - python
  - pip
  - cython
  - scikit-build-core
  - scoring-matrices >=0.3
  run:
  - python
  - scoring-matrices >=0.3
source:
  sha256: 5b1f3b60a319d5a5c92911cccec7ad7d506799aecac0926fecba4da370cf9b3d
  url: https://pypi.org/packages/source/p/pyfamsa/pyfamsa-0.7.0.tar.gz
test:
  commands:
  - python -m unittest -vv pyfamsa.tests
  imports:
  - pyfamsa
