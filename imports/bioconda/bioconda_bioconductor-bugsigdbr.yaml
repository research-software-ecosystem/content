about:
  description: The bugsigdbr package implements convenient access to bugsigdb.org
    from within R/Bioconductor. The goal of the package is to facilitate import of
    BugSigDB data into R/Bioconductor, provide utilities for extracting microbe signatures,
    and enable export of the extracted signatures to plain text files in standard
    file formats such as GMT.
  home: https://bioconductor.org/packages/3.22/bioc/html/bugsigdbr.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: R-side access to published microbial signatures from BugSigDB
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bugsigdbr
  version: 1.16.2
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - r-base
  - r-vroom
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - r-base
  - r-vroom
source:
  md5: 52c9d82f65a266d6afaee9061740e0ab
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/bugsigdbr_1.16.2.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/bugsigdbr/bugsigdbr_1.16.2.tar.gz
  - https://bioarchive.galaxyproject.org/bugsigdbr_1.16.2.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-bugsigdbr/bioconductor-bugsigdbr_1.16.2_src_all.tar.gz
test:
  commands:
  - $R -e "library('bugsigdbr')"
