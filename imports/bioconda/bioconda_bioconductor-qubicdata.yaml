about:
  description: The data employed in the vignette of the QUBIC package. These data
    belong to Many Microbe Microarrays Database and STRING v10.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/QUBICdata.html
  license: Unlimited | file LICENSE
  license_file: LICENSE
  summary: Data employed in the vignette of the QUBIC package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-qubicdata
  version: 1.38.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 7e806f94da4d95600bd6d9de19810b30
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/QUBICdata_1.38.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/QUBICdata/QUBICdata_1.38.0.tar.gz
  - https://bioarchive.galaxyproject.org/QUBICdata_1.38.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-qubicdata/bioconductor-qubicdata_1.38.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('QUBICdata')"
