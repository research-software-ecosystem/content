about:
  description: Package that implements the FGGA algorithm. This package provides a
    hierarchical ensemble method based ob factor graphs for the consistent cross-ontology
    annotation of protein coding genes. FGGA embodies elements of predicate logic,
    communication theory, supervised learning and inference in graphical models.
  home: https://bioconductor.org/packages/3.22/bioc/html/fgga.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Hierarchical ensemble method based on factor graph
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-fgga
  version: 1.18.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rbgl >=1.86.0,<1.87.0
  - r-base
  - r-curl
  - r-e1071
  - r-grbase
  - r-igraph
  - r-jsonlite
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-graph >=1.88.0,<1.89.0
  - bioconductor-rbgl >=1.86.0,<1.87.0
  - r-base
  - r-curl
  - r-e1071
  - r-grbase
  - r-igraph
  - r-jsonlite
source:
  md5: db39553841288ba385e730ce51153f2c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/fgga_1.18.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/fgga/fgga_1.18.0.tar.gz
  - https://bioarchive.galaxyproject.org/fgga_1.18.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-fgga/bioconductor-fgga_1.18.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('fgga')"
