about:
  description: "Bash script to download/update snapshots of files from NCBI genomes\
    \ repository \n(refseq/genbank) with track of changes and without redundancy \
    \ \n"
  home: https://github.com/pirovc/genome_updater
  license: MIT License
  license_family: MIT
  summary: 'genome_updater: bash script to download/update snapshots of refseq/genbank'
build:
  noarch: generic
  number: 0
  run_exports:
  - null
extra:
  recipe-maintainers:
  - pirovc
package:
  name: genome_updater
  version: 0.7.1
requirements:
  run:
  - tar
  - bc
  - parallel >=20160822
  - gawk
  - coreutils
  - wget
  - findutils
  - curl
source:
  sha256: 4dff4a65e6a099eacc32621e73a9ba79a51e6e34a3fe71b1024212102d4c5eb8
  url: https://github.com/pirovc/genome_updater/archive/v0.7.1.tar.gz
test:
  commands:
  - "genome_updater.sh -h 2>&1 | grep -e \"\u250C\" -e \"\u2514\" -e \"\u2502\""
