about:
  description: Save GenomicRanges, IRanges and related data structures into file artifacts,
    and load them back into memory. This is a more portable alternative to serialization
    of such objects into RDS files. Each artifact is associated with metadata for
    further interpretation; downstream applications can enrich this metadata with
    context-specific properties.
  home: https://bioconductor.org/packages/3.22/bioc/html/alabaster.ranges.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Load and Save Ranges-related Artifacts from File
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-alabaster.ranges
  version: 1.10.0
requirements:
  host:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
  run:
  - bioconductor-alabaster.base >=1.10.0,<1.11.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - r-base
