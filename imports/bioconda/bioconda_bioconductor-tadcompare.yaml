about:
  description: TADCompare is an R package designed to identify and characterize differential
    Topologically Associated Domains (TADs) between multiple Hi-C contact matrices.
    It contains functions for finding differential TADs between two datasets, finding
    differential TADs over time and identifying consensus TADs across multiple matrices.
    It takes all of the main types of HiC input and returns simple, comprehensive,
    easy to analyze results.
  home: https://bioconductor.org/packages/3.22/bioc/html/TADCompare.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 'TADCompare: Identification and characterization of differential TADs'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tadcompare
  version: 1.20.0
requirements:
  host:
  - bioconductor-hiccompare >=1.32.0,<1.33.0
  - r-base
  - r-cluster
  - r-cowplot
  - r-dplyr
  - r-ggplot2
  - r-ggpubr
  - r-magrittr
  - r-matrix
  - r-primme
  - r-rcolorbrewer
  - r-reshape2
  - r-tidyr
  run:
  - bioconductor-hiccompare >=1.32.0,<1.33.0
  - r-base
  - r-cluster
  - r-cowplot
  - r-dplyr
  - r-ggplot2
  - r-ggpubr
  - r-magrittr
  - r-matrix
  - r-primme
  - r-rcolorbrewer
  - r-reshape2
  - r-tidyr
source:
  md5: c52cfcc8a1f7746d89574cc96673c02a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/TADCompare_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/TADCompare/TADCompare_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/TADCompare_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tadcompare/bioconductor-tadcompare_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('TADCompare')"
