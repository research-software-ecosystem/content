about:
  description: netSmooth is an R package for network smoothing of single cell RNA
    sequencing data. Using bio networks such as protein-protein interactions as priors
    for gene co-expression, netsmooth improves cell type identification from noisy,
    sparse scRNAseq data.
  home: https://bioconductor.org/packages/3.22/bioc/html/netSmooth.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Network smoothing for scRNAseq
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-netsmooth
  version: 1.30.0
requirements:
  host:
  - bioconductor-clusterexperiment >=2.30.0,<2.31.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-scater >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cluster
  - r-data.table
  - r-entropy
  - r-matrix
  run:
  - bioconductor-clusterexperiment >=2.30.0,<2.31.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-scater >=1.38.0,<1.39.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cluster
  - r-data.table
  - r-entropy
  - r-matrix
