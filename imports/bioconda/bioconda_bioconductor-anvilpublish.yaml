about:
  description: Use this package to create or update AnVIL workspaces from resources
    such as R / Bioconductor packages. The metadata about the package (e.g., select
    information from the package DESCRIPTION file and from vignette YAML headings)
    are used to populate the 'DASHBOARD'. Vignettes are translated to python notebooks
    ready for evaluation in AnVIL.
  home: https://bioconductor.org/packages/3.22/bioc/html/AnVILPublish.html
  license: Artistic-2.0
  summary: Publish Packages and Other Resources to AnVIL Workspaces
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-anvilpublish
  version: 1.20.0
requirements:
  host:
  - bioconductor-anvil >=1.22.0,<1.23.0
  - bioconductor-anvilgcp >=1.4.0,<1.5.0
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - r-base
  - r-biocmanager
  - r-httr
  - r-jsonlite
  - r-readr
  - r-rmarkdown
  - r-whisker
  - r-yaml
  run:
  - bioconductor-anvil >=1.22.0,<1.23.0
  - bioconductor-anvilgcp >=1.4.0,<1.5.0
  - bioconductor-biocbaseutils >=1.12.0,<1.13.0
  - r-base
  - r-biocmanager
  - r-httr
  - r-jsonlite
  - r-readr
  - r-rmarkdown
  - r-whisker
  - r-yaml
source:
  md5: 2ca2978c71dc3d573f527fac5b9c3b1a
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/AnVILPublish_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/AnVILPublish/AnVILPublish_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/AnVILPublish_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-anvilpublish/bioconductor-anvilpublish_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('AnVILPublish')"
