about:
  description: "covsnap computes per-target and per-exon depth metrics from\nBAM/CRAM\
    \ files, producing a machine-readable raw TSV and a\nhuman-readable interpreted\
    \ report with PASS/FAIL classifications.\nSupports gene symbols, genomic regions,\
    \ and BED files as input.\nShips with a bundled GENCODE v44 hg38 gene index \u2014\
    \ no internet\nor GTF files required at runtime.\n"
  dev_url: https://github.com/enes-ak/covsnap
  doc_url: https://github.com/enes-ak/covsnap/blob/main/README.md
  home: https://github.com/enes-ak/covsnap
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Coverage inspector for targeted sequencing QC (hg38)
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - enes-ak
package:
  name: covsnap
  version: 0.1.1
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools >=64
  - setuptools-scm >=8
  run:
  - python >=3.9
  - pysam >=0.22
  - numpy >=1.24
  - samtools >=1.17
  - htslib >=1.17
  - tabix
  run_constrained:
  - mosdepth >=0.3.4
source:
  sha256: c7d47395ec39f3e33e881d877b84afa5e558a77066dab8e5a565c47fc750104f
  url: https://github.com/enes-ak/covsnap/archive/v0.1.1.tar.gz
test:
  commands:
  - covsnap --version
  - covsnap --help
  imports:
  - covsnap
  - covsnap.cli
  - covsnap.engines
  - covsnap.annotation
