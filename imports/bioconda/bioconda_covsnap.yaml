about:
  description: "covsnap computes per-target and per-exon depth metrics from\nBAM/CRAM\
    \ files, producing an interactive HTML report with\nPASS/FAIL classifications\
    \ and visual coverage summaries.\nIncludes a cross-platform graphical interface\
    \ (Tkinter) and\nsupports gene symbols (single or comma-separated), genomic\n\
    regions, and BED files as input. Ships with a bundled GENCODE\nv44 hg38 gene index\
    \ \u2014 no internet or GTF files required at\nruntime.\n"
  dev_url: https://github.com/enes-ak/covsnap
  doc_url: https://github.com/enes-ak/covsnap/blob/main/README.md
  home: https://github.com/enes-ak/covsnap
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Coverage inspector for targeted sequencing QC (hg38)
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - enes-ak
package:
  name: covsnap
  version: 0.3.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools >=64
  - setuptools-scm >=8
  run:
  - python >=3.9
  - pysam >=0.22
  - numpy >=1.24
  - samtools >=1.17
  - htslib >=1.17
  - tabix
  run_constrained:
  - mosdepth >=0.3.4
source:
  sha256: f8cd4c37aedb42bf82143323f23982a2fb1ff03756f4cbdb4b8d3a8f5363ba12
  url: https://github.com/enes-ak/covsnap/archive/v0.3.0.tar.gz
test:
  commands:
  - covsnap --version
  - covsnap --help
  imports:
  - covsnap
  - covsnap.cli
  - covsnap.engines
  - covsnap.annotation
  - covsnap.html_report
  - covsnap.gui
