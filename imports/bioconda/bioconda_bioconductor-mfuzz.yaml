about:
  description: The Mfuzz package implements noise-robust soft clustering of omics
    time-series data, including transcriptomic, proteomic or metabolomic data. It
    is based on the use of c-means clustering. For convenience, it includes a graphical
    user interface.
  home: https://bioconductor.org/packages/3.22/bioc/html/Mfuzz.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Soft clustering of omics time series data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mfuzz
  version: 2.70.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-tkwidgets >=1.88.0,<1.89.0
  - r-base
  - r-e1071
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-tkwidgets >=1.88.0,<1.89.0
  - r-base
  - r-e1071
source:
  md5: ea0e93cd8afd5c890a2fda3203933be6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Mfuzz_2.70.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Mfuzz/Mfuzz_2.70.0.tar.gz
  - https://bioarchive.galaxyproject.org/Mfuzz_2.70.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mfuzz/bioconductor-mfuzz_2.70.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Mfuzz')"
