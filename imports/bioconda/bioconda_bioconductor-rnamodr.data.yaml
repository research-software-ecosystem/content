about:
  description: RNAmodR.Data contains example data, which is used for vignettes and
    example workflows in the RNAmodR and dependent packages.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/RNAmodR.Data.html
  license: Artistic-2.0
  summary: Example data for the RNAmodR package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rnamodr.data
  version: 1.24.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-experimenthubdata >=1.36.0,<1.37.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-experimenthubdata >=1.36.0,<1.37.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 4309063631ce671868daa875931af863
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/RNAmodR.Data_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/RNAmodR.Data/RNAmodR.Data_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/RNAmodR.Data_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rnamodr.data/bioconductor-rnamodr.data_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('RNAmodR.Data')"
