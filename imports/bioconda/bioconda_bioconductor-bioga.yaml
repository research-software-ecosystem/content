about:
  description: Genetic algorithm are a class of optimization algorithms inspired by
    the process of natural selection and genetics. This package allows users to analyze
    and optimize high throughput genomic data using genetic algorithms.  The functions
    provided are implemented in C++ for improved speed and efficiency, with an easy-to-use
    interface for use within R.
  home: https://bioconductor.org/packages/3.22/bioc/html/BioGA.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Bioinformatics Genetic Algorithm (BioGA)
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-bioga
  version: 1.4.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-biocviews >=1.78.0,<1.79.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-animation
  - r-base
  - r-ggplot2
  - r-rcpp
  - r-rlang
  - r-sessioninfo
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-biocstyle >=2.38.0,<2.39.0
  - bioconductor-biocviews >=1.78.0,<1.79.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-animation
  - r-base
  - r-ggplot2
  - r-rcpp
  - r-rlang
  - r-sessioninfo
