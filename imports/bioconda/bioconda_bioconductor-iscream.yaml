  build:
  - null
  - null
  - automake
  - make
  host:
  - bioconductor-rhtslib >=3.6.0,<3.7.0
  - r-base
  - r-data.table
  - r-matrix
  - r-parallelly
  - r-pbapply
  - r-rcpp
  - r-rcpparmadillo
  - r-rcppprogress
  - r-rcppspdlog
  - r-stringfish
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-rhtslib >=3.6.0,<3.7.0
  - r-base
  - r-data.table
  - r-matrix
  - r-parallelly
  - r-pbapply
  - r-rcpp
