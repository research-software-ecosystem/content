about:
  description: 'BED files store ranged genomic data that can be queried even when
    the files are compressed. iscream can query data from BED files and return them
    in muliple formats: parsed records or their summary statistics as data frames
    or GenomicRanges objects, and matrices as matrix, GenomicRanges, or SummarizedExperiment
    objects. iscream also provides specialized support for importing methylation data.'
  home: https://bioconductor.org/packages/3.22/bioc/html/iscream.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Make fast and memory efficient BED file queries, summaries and matrices
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-iscream
  version: 1.0.0
