about:
  description: Permutation analysis, based on Monte Carlo sampling, for testing the
    hypothesis that the number of conserved differentially methylated elements, between
    several generations, is associated to an effect inherited from a treatment and
    that stochastic effect can be dismissed.
  home: https://bioconductor.org/packages/3.22/bioc/html/methylInheritance.html
  license: Artistic-2.0
  summary: Permutation-Based Analysis associating Conserved Differentially Methylated
    Elements Across Multiple Generations to a Treatment Effect
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-methylinheritance
  version: 1.34.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-methylkit >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-ggplot2
  - r-gridextra
  - r-rebus
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-methylkit >=1.36.0,<1.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-ggplot2
  - r-gridextra
  - r-rebus
source:
  md5: 6666032c1dd3c65b1ad569f7fe63868f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/methylInheritance_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/methylInheritance/methylInheritance_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/methylInheritance_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-methylinheritance/bioconductor-methylinheritance_1.34.0_src_all.tar.gz
