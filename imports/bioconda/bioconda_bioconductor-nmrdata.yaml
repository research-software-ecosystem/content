about:
  description: "Provides example one-dimensional proton NMR spectra of murine urine\
    \ samples collected before and after bariatric or sham surgery (Roux-en-Y gastric\
    \ bypass). The data are adapted from Jia V Li et al. (2011), \"Metabolic surgery\
    \ profoundly influences gut microbial-host metabolic cross-talk\", Gut, 60(9),\
    \ 1214\u20131223. <doi:10.1136/gut.2010.234708>. This package serves as example\
    \ data for metabolomics analysis and teaching purposes."
  home: https://bioconductor.org/packages/3.22/data/experiment/html/nmrdata.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Example 1d NMR Data for Metabolic Profiling
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-nmrdata
  version: 1.0.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 8355820d765acbdc1a23874f7be8765d
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/nmrdata_1.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/nmrdata/nmrdata_1.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/nmrdata_1.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-nmrdata/bioconductor-nmrdata_1.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('nmrdata')"
