about:
  dev_url: https://github.com/refgenie/refgenie
  doc_url: https://refgenie.databio.org
  home: https://refgenie.databio.org
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: This server provides both a web interface and a RESTful API. Users may
    explore and download archived indexes from the web interface or develop tools
    that programmatically query the API.
build:
  entry_points:
  - refgenieserver = refgenieserver.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - stolarczyk
package:
  name: refgenieserver
  version: 0.8.0
requirements:
  host:
  - pip
  - python >=3.6
  - setuptools
  run:
  - python >=3.6
  - aiofiles
  - fastapi
  - jinja2
  - logmuse >=0.2
  - refgenconf >=0.10.0
  - uvicorn >=0.7.1
  - ubiquerg >=0.6.1
source:
  sha256: 50bbee7594832529f0713833c926a4c9d63367da6b732dcb398e5b54a730b092
  url: https://pypi.org/packages/source/r/refgenieserver/refgenieserver-0.8.0.tar.gz
test:
  commands:
  - refgenieserver --help
