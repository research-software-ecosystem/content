about:
  description: 'RIAssigner is a python tool for retention index (RI) computation for
    GC-MS data

    '
  dev_url: https://github.com/RECETOX/RIAssigner
  home: https://github.com/RECETOX/RIAssigner
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: GC-MS retention index calculation
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation . -vvv
extra:
  recipe-maintainers:
  - hechth
package:
  name: riassigner
  version: 0.6.1
requirements:
  host:
  - python >=3.11,<3.14
  - pip
  - poetry-core
  run:
  - python >=3.11,<3.14
  - numpy
  - matchms >=0.30.1
  - pint >=0.25.2
  - pandas
  - scipy
  - urllib3 >=2.6.3
  - fastparquet >=2025.12.0
  - click >=8.0
source:
  sha256: 8bf68968c109ae73222eacb1079082871fb26efd19445dae964b984fd569dc66
  url: https://pypi.io/packages/source/r/riassigner/riassigner-0.6.1.tar.gz
test:
  imports:
  - RIAssigner
