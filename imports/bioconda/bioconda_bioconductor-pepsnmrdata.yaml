  - https://bioarchive.galaxyproject.org/PepsNMRData_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-pepsnmrdata/bioconductor-pepsnmrdata_1.28.0_src_all.tar.gz
test:
