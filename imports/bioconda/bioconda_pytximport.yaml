about:
  description: 'pytximport is a Python port of tximport that allows users to import
    transcript counts from tools such as kallisto and Salmon, correct them for differential
    isoform usage, and summarize them at the gene level.

    '
  dev_url: https://github.com/complextissue/pytximport
  doc_url: https://pytximport.readthedocs.io
  home: https://pytximport.readthedocs.io/en/stable/start.html
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: pytximport - gene count estimation from transcript-level quantification
build:
  entry_points:
  - pytximport=pytximport._cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vvv
extra:
  recipe-maintainers:
  - maltekuehl
package:
  name: pytximport
  version: 0.13.0
requirements:
  host:
  - flit-core >=3.2,<4
  - python >=3.11
  - pip
  - hatchling
  run:
  - python >=3.11
  - anndata >=0.11.0
  - click >=8.0.0,<9
  - conda-forge::click-default-group >=1.2.0,<2
  - flox >=0.10.0,<0.11.0
  - h5py >=3.0.0,<4
  - numpy >=2.0.0,<3
  - pandas >=2.2.0,<4
  - pybiomart =0.2.0
  - tqdm >=4.0.0,<5
  - xarray >=2024.0.0
source:
  sha256: a2858425ff8bd49dc3264ba2df629d72471adce181f3efce65d9ff922569162d
  url: https://pypi.io/packages/source/p/pytximport/pytximport-0.13.0.tar.gz
test:
  commands:
  - pytximport --help
  imports:
  - pytximport
