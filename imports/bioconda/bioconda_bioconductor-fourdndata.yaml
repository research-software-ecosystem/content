about:
  description: fourDNData is a data package giving programmatic access to Hi-C contact
    matrices uniformly processed by the [4DN consortium](https://www.4dnucleome.org/).
    The matrices are available in the multi-resolution `.mcool` format.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/fourDNData.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: 4DN data package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-fourdndata
  version: 1.10.0
requirements:
  host:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hicexperiment >=1.10.0,<1.11.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  run:
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hicexperiment >=1.10.0,<1.11.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: a290a61e4bb84153d034785c8a7723fc
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/fourDNData_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/fourDNData/fourDNData_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/fourDNData_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-fourdndata/bioconductor-fourdndata_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('fourDNData')"
