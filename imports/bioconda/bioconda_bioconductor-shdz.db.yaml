  - bioconductor-data-packages >=20260207
source:
  md5: 63c4439a272a5cd0c4746e9e53a7bdc7
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/SHDZ.db_3.2.3.tar.gz
