about:
  description: Base annotation databases for rhesus, intended ONLY to be used by AnnotationDbi
    to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/rhesus.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for rhesus
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rhesus.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: bfbb3700fa723ddf87270e6434155561
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/rhesus.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rhesus.db0/rhesus.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/rhesus.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rhesus.db0/bioconductor-rhesus.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rhesus.db0')"
