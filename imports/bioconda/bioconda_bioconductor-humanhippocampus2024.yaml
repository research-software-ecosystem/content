about:
  description: This is an ExperimentHub Data package that helps to access the spatially-resolved
    transcriptomics and single-nucleus RNA sequencing data. The datasets are generated
    from adjacent tissue sections of the anterior human hippocampus across ten adult
    neurotypical donors. The datasets are based on [spatial_hpc](https://github.com/LieberInstitute/spatial_hpc)
    project by Lieber Institute for Brain Development (LIBD) researchers and collaborators.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/humanHippocampus2024.html
  license: Artistic-2.0
  summary: Access to SRT and snRNA-seq data from spatial_HPC project
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-humanhippocampus2024
  version: 1.2.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-spatialexperiment >=1.20.0,<1.21.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 5cd667093c8b4cbf5b58c74809af3fc4
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/humanHippocampus2024_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/humanHippocampus2024/humanHippocampus2024_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/humanHippocampus2024_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-humanhippocampus2024/bioconductor-humanhippocampus2024_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('humanHippocampus2024')"
