about:
  description: Tools for plotting SingleCellExperiment objects in the chevreulPlot
    package. Includes functions for analysis and visualization of single-cell data.
    Supported by NIH grants R01CA137124 and R01EY026661 to David Cobrinik.
  home: https://bioconductor.org/packages/3.22/bioc/html/chevreulPlot.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Plots used in the chevreulPlot package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-chevreulplot
  version: 1.2.0
requirements:
  host:
  - bioconductor-chevreulprocess >=1.2.0,<1.3.0
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-ensdb.hsapiens.v86 >=2.99.0,<2.100.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scater >=1.38.0,<1.39.0
  - bioconductor-scran >=1.38.0,<1.39.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-wiggleplotr >=1.34.0,<1.35.0
  - r-base
  - r-circlize
  - r-cluster
  - r-clustree
  - r-dplyr
  - r-forcats
  - r-fs
  - r-ggplot2
  - r-patchwork
  - r-plotly
  - r-purrr
  - r-scales
  - r-stringr
  - r-tibble
  - r-tidyr
  - r-tidyselect
  run:
  - bioconductor-chevreulprocess >=1.2.0,<1.3.0
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-ensdb.hsapiens.v86 >=2.99.0,<2.100.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-scater >=1.38.0,<1.39.0
  - bioconductor-scran >=1.38.0,<1.39.0
  - bioconductor-scuttle >=1.20.0,<1.21.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-wiggleplotr >=1.34.0,<1.35.0
  - r-base
  - r-circlize
  - r-cluster
  - r-clustree
  - r-dplyr
  - r-forcats
  - r-fs
  - r-ggplot2
  - r-patchwork
  - r-plotly
  - r-purrr
  - r-scales
  - r-stringr
