about:
  description: Methods to detect the differential composition abundances between conditions
    in singel-cell RNA-seq experiments, with or without replicates. It aims to correct
    bias introduced by missclaisification and enable controlling of confounding covariates.
    To avoid the influence of proportion change from big cell types, DCATS can use
    either total cell number or specific reference group as normalization term.
  home: https://bioconductor.org/packages/3.22/bioc/html/DCATS.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Differential Composition Analysis Transformed by a Similarity matrix
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-dcats
  version: 1.8.0
requirements:
  host:
  - r-aod
  - r-base
  - r-e1071
  - r-matrixstats
  - r-mcmcpack
  - r-robustbase
  run:
  - r-aod
  - r-base
  - r-e1071
  - r-matrixstats
  - r-mcmcpack
  - r-robustbase
source:
  md5: 8e3c3bd1ec6a0808d9e9731ae523a1a1
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/DCATS_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/DCATS/DCATS_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/DCATS_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-dcats/bioconductor-dcats_1.8.0_src_all.tar.gz
test:
