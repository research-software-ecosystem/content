about:
  description: This package provides functionality for reading data from HDF Scalable
    Data Service from within R.  The HSDSArray function bridges from HSDS to the user
    via the DelayedArray interface.  Bioconductor manages an open HSDS instance graciously
    provided by John Readey of the HDF Group.
  home: https://bioconductor.org/packages/3.22/bioc/html/rhdf5client.html
  license: Artistic-2.0
  summary: Access HDF5 content from HDF Scalable Data Service
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rhdf5client
  version: 1.32.0
requirements:
  build:
  - null
  - make
  host:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - r-base
  - r-data.table
  - r-httr
  - r-rjson
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - r-base
  - r-data.table
  - r-httr
  - r-rjson
source:
  md5: e47adc6d64a1f404da24a1c2aca0a981
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/rhdf5client_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/rhdf5client/rhdf5client_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/rhdf5client_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rhdf5client/bioconductor-rhdf5client_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('rhdf5client')"
