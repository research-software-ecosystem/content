about:
  description: Example datasets of a slightly large size. They represent 'real world
    examples', unlike the artificial examples included in the package affy.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/affydata.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Affymetrix Data for Demonstration Purpose
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-affydata
  version: 1.58.0
requirements:
  host:
  - bioconductor-affy >=1.88.0,<1.89.0
  - r-base
  run:
  - bioconductor-affy >=1.88.0,<1.89.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 141c1ab0896f5759904c2ae9d5c94e61
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/affydata_1.58.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/affydata/affydata_1.58.0.tar.gz
  - https://bioarchive.galaxyproject.org/affydata_1.58.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-affydata/bioconductor-affydata_1.58.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('affydata')"
