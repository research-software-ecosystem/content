about:
  description: This package provide a method for doing gene set analysis based on
    multiple omics data.
  home: https://bioconductor.org/packages/3.22/bioc/html/mogsa.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Multiple omics data integrative clustering and gene set analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mogsa
  version: 1.44.0
requirements:
