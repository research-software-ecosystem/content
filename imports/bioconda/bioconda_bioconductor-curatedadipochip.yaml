about:
  description: A curated dataset of publicly available ChIP-sequencing of transcription
    factors, chromatin remodelers and histone modifications in the 3T3-L1 pre-adipocyte
    cell line. The package document the data collection, pre-processing and processing
    of the data. In addition to the documentation, the package contains the scripts
    that was used to generated the data.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/curatedAdipoChIP.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: A Curated ChIP-Seq Dataset of MDI-induced Differentiated Adipocytes (3T3-L1)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-curatedadipochip
  version: 1.26.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: a950d936851620cd86633792ff092793
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/curatedAdipoChIP_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/curatedAdipoChIP/curatedAdipoChIP_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/curatedAdipoChIP_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-curatedadipochip/bioconductor-curatedadipochip_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('curatedAdipoChIP')"
