about:
  description: This package consolidates a comprehensive set of information measurements,
    encompassing mutual information, conditional mutual information, interaction information,
    partial information decomposition, and part mutual information.
  home: https://bioconductor.org/packages/3.22/bioc/html/Informeasure.html
  license: Artistic-2.0
  summary: R implementation of information measures
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-informeasure
  version: 1.20.0
requirements:
  host:
  - r-base
  - r-entropy
  run:
  - r-base
  - r-entropy
source:
  md5: f9686837e00954c1447fe7d0fac0bac3
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Informeasure_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Informeasure/Informeasure_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/Informeasure_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-informeasure/bioconductor-informeasure_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Informeasure')"
