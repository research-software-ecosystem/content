about:
  description: CNVfilteR identifies those CNVs that can be discarded by using the
    single nucleotide variant (SNV) calls that are usually obtained in common NGS
    pipelines.
  home: https://bioconductor.org/packages/3.22/bioc/html/CNVfilteR.html
  license: Artistic-2.0
  summary: Identifies false positives of CNV calling tools by using SNV calls
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cnvfilter
  version: 1.24.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-copynumberplots >=1.26.0,<1.27.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-karyoploter >=1.36.0,<1.37.0
  - bioconductor-regioner >=1.42.0,<1.43.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-assertthat
  - r-base
  - r-pracma
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-copynumberplots >=1.26.0,<1.27.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-karyoploter >=1.36.0,<1.37.0
  - bioconductor-regioner >=1.42.0,<1.43.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-assertthat
  - r-base
  - r-pracma
source:
