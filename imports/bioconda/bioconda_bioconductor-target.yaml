about:
  description: 'Implement the BETA algorithm for infering direct target genes from
    DNA-binding and perturbation expression data Wang et al. (2013) <doi: 10.1038/nprot.2013.150>.
    Extend the algorithm to predict the combined function of two DNA-binding elements
    from comprable binding and expression data.'
  home: https://bioconductor.org/packages/3.22/bioc/html/target.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Predict Combined Function of Transcription Factors
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-target
  version: 1.24.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-base
  - r-matrixstats
  - r-shiny
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - r-base
  - r-matrixstats
  - r-shiny
source:
  md5: 60c562f5c0f03842875b5c7f6f6aa9db
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/target_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/target/target_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/target_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-target/bioconductor-target_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('target')"
