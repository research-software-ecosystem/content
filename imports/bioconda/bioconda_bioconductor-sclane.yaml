about:
  description: Our scLANE model uses truncated power basis spline models to build
    flexible, interpretable models of single cell gene expression over pseudotime
    or latent time. The modeling architectures currently supported are Negative-binomial
    GLMs, GEEs, & GLMMs. Downstream analysis functionalities include model comparison,
    dynamic gene clustering, smoothed counts generation, gene set enrichment testing,
    & visualization.
  home: https://bioconductor.org/packages/3.22/bioc/html/scLANE.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Model Gene Expression Dynamics with Spline-Based NB GLMs, GEEs, & GLMMs
