about:
  description: Leverage the existing open access TCGA data on Terra with well-established
    Bioconductor infrastructure. Make use of the Terra data model without learning
    its complexities. With a few functions, you can copy / download and generate a
    MultiAssayExperiment from the TCGA example workspaces provided by Terra.
  home: https://bioconductor.org/packages/3.22/bioc/html/terraTCGAdata.html
  license: Artistic-2.0
  summary: OpenAccess TCGA Data on Terra as MultiAssayExperiment
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-terratcgadata
  version: 1.14.0
requirements:
  host:
  - bioconductor-anvil >=1.22.0,<1.23.0
  - bioconductor-anvilgcp >=1.4.0,<1.5.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-raggedexperiment >=1.34.0,<1.35.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-tcgautils >=1.30.0,<1.31.0
  - r-base
  - r-dplyr
  - r-readr
  - r-tidyr
  run:
  - bioconductor-anvil >=1.22.0,<1.23.0
  - bioconductor-anvilgcp >=1.4.0,<1.5.0
  - bioconductor-biocfilecache >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-raggedexperiment >=1.34.0,<1.35.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-tcgautils >=1.30.0,<1.31.0
  - r-base
  - r-dplyr
  - r-readr
  - r-tidyr
source:
  md5: 9786eccb40fcd3a369932b4eecd056d4
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/terraTCGAdata_1.14.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/terraTCGAdata/terraTCGAdata_1.14.0.tar.gz
  - https://bioarchive.galaxyproject.org/terraTCGAdata_1.14.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-terratcgadata/bioconductor-terratcgadata_1.14.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('terraTCGAdata')"
