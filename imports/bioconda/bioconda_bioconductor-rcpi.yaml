about:
  description: A molecular informatics toolkit with an integration of bioinformatics
    and chemoinformatics tools for drug discovery.
  home: https://bioconductor.org/packages/3.22/bioc/html/Rcpi.html
  license: Artistic-2.0 | file LICENSE
  license_file: LICENSE
  summary: Molecular Informatics Toolkit for Compound-Protein Interaction in Drug
    Discovery
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-rcpi
  version: 1.46.0
requirements:
  host:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-gosemsim >=2.36.0,<2.37.0
  - r-base
  - r-curl
  - r-doparallel
  - r-foreach
  - r-httr2
  - r-jsonlite
  - r-rlang
  run:
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-gosemsim >=2.36.0,<2.37.0
  - r-base
  - r-curl
  - r-doparallel
  - r-foreach
  - r-httr2
  - r-jsonlite
  - r-rlang
source:
  md5: e39b108a783ad75527ed17c88bd1efab
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Rcpi_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/Rcpi/Rcpi_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/Rcpi_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-rcpi/bioconductor-rcpi_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('Rcpi')"
