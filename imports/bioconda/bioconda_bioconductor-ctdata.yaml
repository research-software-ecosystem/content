about:
  description: Data from publicly available databases (GTEx, CCLE, TCGA and ENCODE)
    that go with CTexploreR in order to re-define a comprehensive and thoroughly curated
    list of CT genes and their main characteristics.
  home: https://bioconductor.org/packages/3.22/bioc/html/CTdata.html
  license: Artistic-2.0
  summary: Data companion to CTexploreR
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ctdata
  version: 1.10.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
source:
  md5: fcc3e7b463c0533b8c5c23baef4a9f05
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/CTdata_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/CTdata/CTdata_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/CTdata_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ctdata/bioconductor-ctdata_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('CTdata')"
