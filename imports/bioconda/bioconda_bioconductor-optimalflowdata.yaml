about:
  description: Data files used as examples and for testing of the software provided
    in the optimalFlow package.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/optimalFlowData.html
  license: Artistic-2.0
  summary: optimalFlowData
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-optimalflowdata
  version: 1.22.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 66c181f316a303a589fad28f713f1b39
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/optimalFlowData_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/optimalFlowData/optimalFlowData_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/optimalFlowData_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-optimalflowdata/bioconductor-optimalflowdata_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('optimalFlowData')"
