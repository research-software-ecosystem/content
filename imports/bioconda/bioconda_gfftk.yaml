about:
  dev_url: https://github.com/nextgenusfs/gfftk
  home: https://github.com/nextgenusfs/gfftk
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: 'GFFtk: genome annotation GFF3 tool kit'
build:
  entry_points:
  - gfftk = gfftk.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - nextgenusfs
package:
  name: gfftk
  version: 26.5.22
requirements:
  host:
  - python >=3.6
  - pip
  - hatchling
  run:
  - python >=3.6
  - natsort
  - numpy
  - table2asn
  - requests
  - gb-io >=0.3.2
source:
  sha256: bf90e0e7006c8ed90349cf5a7d0d03c99b4c745d384226e9c8383db5594de571
  url: https://pypi.io/packages/source/g/gfftk/gfftk-26.5.22.tar.gz
test:
  commands:
  - gfftk --help
  imports:
  - gfftk
