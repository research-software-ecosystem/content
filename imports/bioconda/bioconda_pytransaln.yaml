about:
  home: https://github.com/monagrland/pytransaln
  license: MIT
  license_file: LICENSE
  summary: Translation-guided nucleotide alignment for coding sequences
build:
  entry_points:
  - pytransaln = pytransaln.pytransaln:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - kbseah
package:
  name: pytransaln
  version: 0.2.3
requirements:
  host:
  - python
  - setuptools >=61.0.0
  - pip
  run:
  - python
  - biopython >=1.80,<2
  - pandas >=1.3,<3
  - matplotlib-base >=3.6,<4
  - pyhmmer >=0.12.0
source:
  sha256: 0a46c62ab6eaecfccfd5541d9cc725a840837e29bc7d6558b1a2e7eeb0a24d2a
  url: https://github.com/monagrland/pytransaln/archive/refs/tags/v0.2.3.tar.gz
test:
  commands:
  - pip check
  - pytransaln --help
  imports:
  - pytransaln
  requires:
  - pip
