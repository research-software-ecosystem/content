  recipe-maintainers:
  - rdoughty10
package:
  name: mft-tools
  version: 0.1.1
requirements:
  build:
  - null
  - cargo-bundle-licenses
  - null
source:
  sha256: 0386cf83c3ad124ede0db7a07fffe1a28fb6ed524f230fe8eb02f88836bba9dc
