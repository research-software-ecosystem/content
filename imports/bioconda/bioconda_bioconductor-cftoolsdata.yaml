about:
  description: The cfToolsData package supplies the data for the cfTools package.
    It contains two pre-trained deep neural network (DNN) models for the cfSort function.
    Additionally, it includes the shape parameters of beta distribution characterizing
    methylation markers associated with four tumor types for the CancerDetector function,
    as well as the parameters characterizing methylation markers specific to 29 primary
    human tissue types for the cfDeconvolve function.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/cfToolsData.html
  license: file LICENSE
  license_file: LICENSE
  summary: ExperimentHub data for the cfTools package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cftoolsdata
  version: 1.8.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 81d37c774c7126eaa9f5d76107a89aa6
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/cfToolsData_1.8.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/cfToolsData/cfToolsData_1.8.0.tar.gz
  - https://bioarchive.galaxyproject.org/cfToolsData_1.8.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cftoolsdata/bioconductor-cftoolsdata_1.8.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('cfToolsData')"
