about:
  description: Provides methods to convert between Python AnnData objects and SingleCellExperiment
    objects. These are primarily intended for use by downstream Bioconductor packages
    that wrap Python methods for single-cell data analysis. It also includes functions
    to read and write H5AD files used for saving AnnData objects to disk.
  home: https://bioconductor.org/packages/3.22/bioc/html/zellkonverter.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Conversion Between scRNA-seq Objects
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-zellkonverter
  version: 1.20.1
requirements:
  host:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cli
  - r-matrix
  - r-reticulate
  run:
  - bioconductor-basilisk >=1.22.0,<1.23.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-sparsearray >=1.10.0,<1.11.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-cli
  - r-matrix
  - r-reticulate
source:
  md5: 1ea9d37c086e84ee0d2b16a9f042c18d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/zellkonverter_1.20.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/zellkonverter/zellkonverter_1.20.1.tar.gz
  - https://bioarchive.galaxyproject.org/zellkonverter_1.20.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-zellkonverter/bioconductor-zellkonverter_1.20.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('zellkonverter')"
