about:
  description: Functions to analyze methylation data can be found here. Some functions
    are relevant for single cell methylation data but most other functions can be
    used for any methylation data. Highlight of this workflow is the comprehensive
    quality control report.
  home: https://bioconductor.org/packages/3.22/bioc/html/scmeth.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Functions to conduct quality control analysis in methylation data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scmeth
  version: 1.30.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-annotatr >=1.36.0,<1.37.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-bsseq >=1.46.0,<1.47.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dt
  - r-reshape2
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-annotatr >=1.36.0,<1.37.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-bsgenome >=1.78.0,<1.79.0
  - bioconductor-bsseq >=1.46.0,<1.47.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-dt
  - r-reshape2
