about:
  description: Dataset for the R package cancerclass
  home: https://bioconductor.org/packages/3.22/data/experiment/html/cancerdata.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: 'Development and validation of diagnostic tests from high-dimensional molecular
    data: Datasets'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cancerdata
  version: 1.48.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  run:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 2ca7be70aa288d9b665f5c55a1040f40
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/cancerdata_1.48.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/cancerdata/cancerdata_1.48.0.tar.gz
  - https://bioarchive.galaxyproject.org/cancerdata_1.48.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-cancerdata/bioconductor-cancerdata_1.48.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('cancerdata')"
