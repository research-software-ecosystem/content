about:
  description: Single cell multiome data, containing chromatin accessibility (scATAC-seq)
    and gene expression (scRNA-seq) information analyzed with the ArchR package and
    presented as MultiAssayExperiment objects.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/scMultiome.html
  license: CC BY-SA 4.0
  summary: Collection of Public Single-Cell Multiome (scATAC + scRNAseq) Datasets
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-scmultiome
  version: 1.10.0
requirements:
  host:
  - bioconductor-alabaster.matrix >=1.10.0,<1.11.0
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-azurestor
  - r-base
  - r-checkmate
  run:
  - bioconductor-alabaster.matrix >=1.10.0,<1.11.0
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-hdf5array >=1.38.0,<1.39.0
  - bioconductor-multiassayexperiment >=1.36.0,<1.37.0
  - bioconductor-rhdf5 >=2.54.0,<2.55.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-azurestor
  - r-base
  - r-checkmate
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 45e608c42164c04d71ce70db3584c357
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/scMultiome_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/scMultiome/scMultiome_1.10.0.tar.gz
