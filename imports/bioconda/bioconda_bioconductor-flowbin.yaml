about:
  description: Software to combine flow cytometry data that has been multiplexed into
    multiple tubes with common markers between them, by establishing common bins across
    tubes in terms of the common markers, then determining expression within each
    tube for each bin in terms of the tube-specific markers.
  home: https://bioconductor.org/packages/3.22/bioc/html/flowBin.html
  license: Artistic-2.0
  summary: Combining multitube flow cytometry data by binning
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-flowbin
  version: 1.46.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowfp >=1.68.0,<1.69.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
  - r-class
  - r-snow
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowfp >=1.68.0,<1.69.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - r-base
  - r-class
  - r-snow
source:
  md5: 03f6d9421c21e37c26caa348fe0ccfad
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowBin_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowBin/flowBin_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowBin_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowbin/bioconductor-flowbin_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('flowBin')"
