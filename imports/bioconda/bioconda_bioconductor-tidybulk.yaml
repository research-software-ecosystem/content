about:
  description: This is a collection of utility functions that allow to perform exploration
    of and calculations to RNA sequencing data, in a modular, pipe-friendly and tidy
    fashion.
  home: https://bioconductor.org/packages/3.22/bioc/html/tidybulk.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Brings transcriptomics to the tidyverse
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-tidybulk
  version: 2.0.1
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-crayon
  - r-dplyr >=1.1.0
  - r-ggplot2
  - r-lifecycle
  - r-magrittr
  - r-matrix
  - r-purrr
  - r-rlang
  - r-scales
  - r-stringr
  - r-tibble
  - r-tidyr
  - r-tidyselect
  - r-ttservice >=0.3.6
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-crayon
  - r-dplyr >=1.1.0
  - r-ggplot2
  - r-lifecycle
  - r-magrittr
  - r-matrix
  - r-purrr
  - r-rlang
  - r-scales
  - r-stringr
  - r-tibble
  - r-tidyr
  - r-tidyselect
  - r-ttservice >=0.3.6
source:
  md5: 24ab37f7b888742a9d07ea8376ddfdec
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/tidybulk_2.0.1.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/tidybulk/tidybulk_2.0.1.tar.gz
  - https://bioarchive.galaxyproject.org/tidybulk_2.0.1.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-tidybulk/bioconductor-tidybulk_2.0.1_src_all.tar.gz
test:
  commands:
  - $R -e "library('tidybulk')"
