about:
  description: A set of tools for network analysis using mass spectrometry-based proteomics
    data and network databases. The package takes as input the output of MSstats differential
    abundance analysis and provides functions to perform enrichment analysis and visualization
    in the context of prior knowledge from past literature. Notably, this package
    integrates with INDRA, which is a database of biological networks extracted from
    the literature using text mining techniques.
  home: https://bioconductor.org/packages/3.22/bioc/html/MSstatsBioNet.html
  license: file LICENSE
  license_file: LICENSE
  summary: Network Analysis for MS-based Proteomics Experiments
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-msstatsbionet
  version: 1.2.0
requirements:
  host:
  - bioconductor-msstats >=4.18.0,<4.19.0
  - bioconductor-rcy3 >=2.30.0,<2.31.0
  - r-base
  - r-httr
  - r-jsonlite
  - r-r2r
  - r-tidyr
  run:
  - bioconductor-msstats >=4.18.0,<4.19.0
  - bioconductor-rcy3 >=2.30.0,<2.31.0
  - r-base
  - r-httr
  - r-jsonlite
  - r-r2r
  - r-tidyr
source:
  md5: 8364c8d4b79ba470c430fc461f26959d
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/MSstatsBioNet_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/MSstatsBioNet/MSstatsBioNet_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/MSstatsBioNet_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-msstatsbionet/bioconductor-msstatsbionet_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('MSstatsBioNet')"
