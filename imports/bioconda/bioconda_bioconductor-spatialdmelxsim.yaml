about:
  description: Spatial allelic expression counts from Combs & Fraser (2018), compiled
    into a SummarizedExperiment object. This package contains data of allelic expression
    counts of spatial slices of a fly embryo, a Drosophila melanogaster x Drosophila
    simulans cross. See the CITATION file for the data source, and the associated
    script for how the object was constructed from publicly available data.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/spatialDmelxsim.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Spatial allelic expression counts for fly cross embryo
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-spatialdmelxsim
  version: 1.16.0
requirements:
  host:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  run:
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: ba37a7d691aca5d7ee5dfab8b81f7c3d
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/spatialDmelxsim_1.16.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/spatialDmelxsim/spatialDmelxsim_1.16.0.tar.gz
  - https://bioarchive.galaxyproject.org/spatialDmelxsim_1.16.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-spatialdmelxsim/bioconductor-spatialdmelxsim_1.16.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('spatialDmelxsim')"
