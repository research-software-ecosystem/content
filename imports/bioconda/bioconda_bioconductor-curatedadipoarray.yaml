about:
  description: A curated dataset of Microarrays samples. The samples are MDI- induced
    pre-adipocytes (3T3-L1) at different time points/stage of differentiation under
    different types of genetic (knockdown/overexpression) and pharmacological (drug
    treatment) perturbations. The package documents the data collection and processing.
    In addition to the documentation, the package contains the scripts that was used
    to generated the data.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/curatedAdipoArray.html
  license: GPL-3 + file LICENSE
  license_file: LICENSE
  summary: A Curated Microarrays Dataset of MDI-induced Differentiated Adipocytes
    (3T3-L1) Under Genetic and Pharmacological Perturbations
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-curatedadipoarray
  version: 1.22.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: a1a16529ff9db703f420febf3c488521
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/curatedAdipoArray_1.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/curatedAdipoArray/curatedAdipoArray_1.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/curatedAdipoArray_1.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-curatedadipoarray/bioconductor-curatedadipoarray_1.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('curatedAdipoArray')"
