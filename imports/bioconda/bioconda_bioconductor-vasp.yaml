about:
  description: 'Discovery of genome-wide variable alternative splicing events from
    short-read RNA-seq data and visualizations of gene splicing information for publication-quality
    multi-panel figures in a population. (Warning: The visualizing function is removed
    due to the dependent package Sushi deprecated. If you want to use it, please change
    back to an older version.)'
  home: https://bioconductor.org/packages/3.22/bioc/html/VaSP.html
  license: GPL (>= 2.0)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Quantification and Visualization of Variations of Splicing in Population
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-vasp
  version: 1.22.0
requirements:
  host:
  - bioconductor-ballgown >=2.42.0,<2.43.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-cluster
  - r-matrixstats
  run:
  - bioconductor-ballgown >=2.42.0,<2.43.0
  - bioconductor-genomeinfodb >=1.46.0,<1.47.0
  - bioconductor-genomicalignments >=1.46.0,<1.47.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-rsamtools >=2.26.0,<2.27.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-cluster
  - r-matrixstats
source:
  md5: dc32f890c628b9000a45fe1746ee42bd
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/VaSP_1.22.0.tar.gz
