about:
  description: 'FastaGuard validates assembly FASTA files, detects structural and

    composition red flags, and emits pipeline-ready JSON, TSV, HTML, and

    MultiQC outputs before downstream analysis.

    '
  dev_url: https://github.com/ehsanestaji/FastaGuard
  doc_url: https://github.com/ehsanestaji/FastaGuard/blob/v0.1.1/README.md
  home: https://github.com/ehsanestaji/FastaGuard
  license: MIT
  license_family: MIT
  license_file:
  - LICENSE
  - THIRDPARTY.yml
  summary: FASTA preflight QC for assembly pipelines
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - ehsanestaji
package:
  name: fastaguard
  version: 0.1.1
requirements:
  build:
  - null
  - null
  - null
  - cargo-bundle-licenses
source:
  sha256: 10a5520e54d7e7884aa4cdfec5108cd7183c6033053e7839f969b9dcd9d73a17
  url: https://github.com/ehsanestaji/FastaGuard/archive/refs/tags/v0.1.1.tar.gz
test:
  commands:
  - fastaguard --help
  - fastaguard --schema
  - fastaguard --finding-catalog
