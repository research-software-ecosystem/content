about:
  dev_url: https://github.com/KolmogorovLab/Wakhan
  home: https://github.com/KolmogorovLab/Wakhan
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A tool to analyze haplotype-specific chromosome-scale somatic copy number
    aberrations and aneuploidy using long reads.
build:
  entry_points:
  - wakhan = src.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - ljwharbers
  - villena-francis
package:
  name: wakhan
  version: 0.4.2
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools <81
  run:
  - python >=3.7
  - samtools >=1.14
  - bcftools >=1.14
  - pysam
  - pandas
  - pyfaidx
  - intervaltree
  - numpy ==1.24.4
  - plotly ==5.24.1
  - scikit-learn ==1.2.0
  - scipy ==1.9.2
  - ruptures
  - parse-vcf
  - python-kaleido <1.0
  - vcf_parser
  - matplotlib-base
  - setuptools <81
source:
  sha256: 5db90446521a6631993221a62b5a974dee1855b9f9c1a464fb4209f0d3a061f8
  url: https://github.com/KolmogorovLab/Wakhan/archive/refs/tags/0.4.2.tar.gz
test:
  commands:
  - wakhan --help
  imports:
  - pysam
  - vcf_parser
