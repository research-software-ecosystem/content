about:
  description: Extends beachmat to initialize tatami matrices from TileDB-backed arrays.
    This allows C++ code in downstream packages to directly call the TileDB C/C++
    library to access array data, without the need for block processing via DelayedArray.
    Developers only need to import this package to automatically extend the capabilities
    of beachmat::initializeCpp to TileDBArray instances.
  home: https://bioconductor.org/packages/3.22/bioc/html/beachmat.tiledb.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: beachmat bindings for TileDB-backed matrices
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-beachmat.tiledb
  version: 1.2.0
requirements:
  build:
  - null
  - null
  - automake
  - make
  host:
  - bioconductor-assorthead >=1.4.0,<1.5.0
  - bioconductor-beachmat >=2.26.0,<2.27.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-tiledbarray >=1.20.0,<1.21.0
  - r-base
  - r-rcpp
  - r-tiledb
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-assorthead >=1.4.0,<1.5.0
  - bioconductor-beachmat >=2.26.0,<2.27.0
  - bioconductor-delayedarray >=0.36.0,<0.37.0
  - bioconductor-tiledbarray >=1.20.0,<1.21.0
  - r-base
  - r-rcpp
  - r-tiledb
source:
  md5: 039c55f2c690a0cdaed31b7b8475e0b2
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/beachmat.tiledb_1.2.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/beachmat.tiledb/beachmat.tiledb_1.2.0.tar.gz
  - https://bioarchive.galaxyproject.org/beachmat.tiledb_1.2.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-beachmat.tiledb/bioconductor-beachmat.tiledb_1.2.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('beachmat.tiledb')"
