about:
  description: This package stores two merged expressionSet objects that contain the
    gene expression profile and clinical information of -a- six breast cancer cohorts
    and -b- four colorectal cancer cohorts. Breast cancer data are employed in the
    vignette of the hrunbiased package for survival analysis of gene signatures.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/mcsurvdata.html
  license: GPL (>=2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Meta cohort survival data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mcsurvdata
  version: 1.28.0
requirements:
  host:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  run:
  - bioconductor-annotationhub >=4.0.0,<4.1.0
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-experimenthub >=3.0.0,<3.1.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 52430434fd13d516acbadd1c04bcabc2
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/mcsurvdata_1.28.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/mcsurvdata/mcsurvdata_1.28.0.tar.gz
  - https://bioarchive.galaxyproject.org/mcsurvdata_1.28.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mcsurvdata/bioconductor-mcsurvdata_1.28.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('mcsurvdata')"
