about:
  description: Example data for the topdownr package generated on a Thermo Orbitrap
    Fusion Lumos MS device.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/topdownrdata.html
  license: GPL (>= 3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Example Files for the topdownr R Package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-topdownrdata
  version: 1.32.0
requirements:
  host:
  - bioconductor-topdownr >=1.32.0,<1.33.0
  - r-base
  run:
  - bioconductor-topdownr >=1.32.0,<1.33.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 752adbaadbdfd384edc37a8e16e69af4
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/topdownrdata_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/topdownrdata/topdownrdata_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/topdownrdata_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-topdownrdata/bioconductor-topdownrdata_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('topdownrdata')"
