about:
  description: "GeneF\xEDor orchestrates multiple alignment tools (BLAST, DIAMOND,\
    \ Bowtie2, BWA, Minimap2 and MMseqs2) \nto search DNA and protein sequences against\
    \ AMR and user-provided databases with transparent, \ncoverage-based validation.\n"
  dev_url: https://github.com/NickJD/Genefior
  doc_url: https://github.com/NickJD/Genefior
  home: https://github.com/NickJD/Genefior
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "GeneF\xEDor: A customisable and multi-tool approach for gene detection"
build:
  entry_points:
  - AMRFior = GeneFior.AMRfior:main
  - AMRfior = GeneFior.AMRfior:main
  - amrfior = GeneFior.AMRfior:main
  - GeneFior = GeneFior.GeneFior:main
  - Genefior = GeneFior.GeneFior:main
  - genefior = GeneFior.GeneFior:main
  - GeneFior-Recompute = GeneFior.GeneFior_Recompute:main
  - GeneFior-recompute = GeneFior.GeneFior_Recompute:main
  - genefior-recompute = GeneFior.GeneFior_Recompute:main
  - GeneFior-Gene-Stats = GeneFior.GeneFior_Gene_Stats:main
  - GeneFior-gene-stats = GeneFior.GeneFior_Gene_Stats:main
  - genefior-gene-stats = GeneFior.GeneFior_Gene_Stats:main
  - GeneFior-Combine = GeneFior.GeneFior_Combine:main
  - GeneFior-combine = GeneFior.GeneFior_Combine:main
  - genefior-combine = GeneFior.GeneFior_Combine:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - NickJD
package:
  name: genefior
  version: 0.9.1
requirements:
  host:
  - python >=3.10
  - setuptools
  - wheel
  - pip
  run:
  - python >=3.10
  - matplotlib-base >=3.10.8
  - samtools >=1.19.2
  - blast >=2.17.0
  - diamond >=2.1.13
  - bowtie2 >=2.5.4
  - bwa >=0.7.19
  - minimap2 >=2.30
  - mmseqs2 >=18.8cc5c
  - seqtk >=1.4
  - pigz >=2.4
source:
  sha256: 8c51d9b9e8c35767e7b0a18258d820e7c8fde6d93dfee952f24c4671c902616b
  url: https://pypi.org/packages/source/g/genefior/genefior-0.9.1.tar.gz
test:
  commands:
  - GeneFior --help
  - genefior --help
  - AMRfior --help
  - amrfior --help
  imports:
  - GeneFior
