about:
  description: TENET identifies key transcription factors (TFs) and regulatory elements
    (REs) linked to a specific cell type by finding significantly correlated differences
    in gene expression and RE DNA methylation between case and control input datasets,
    and identifying the top genes by number of significant RE DNA methylation site
    links. It also includes many tools for visualization and analysis of the results,
    including plots displaying and comparing methylation and expression data and methylation
    site link counts, survival analysis, TF motif searching in the vicinity of linked
    RE DNA methylation sites, custom TAD and peak overlap analysis, and UCSC Genome
    Browser track file generation. A utility function is also provided to download
    methylation, expression, and patient survival data from The Cancer Genome Atlas
    (TCGA) for use in TENET or other analyses.
  home: https://bioconductor.org/packages/3.22/bioc/html/TENET.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: R package for TENET (Tracing regulatory Element Networks using Epigenetic
    Traits) to identify key transcription factors
