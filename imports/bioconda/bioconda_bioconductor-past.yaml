about:
  description: PAST takes GWAS output and assigns SNPs to genes, uses those genes
    to find pathways associated with the genes, and plots pathways based on significance.
    Implements methods for reading GWAS input data, finding genes associated with
    SNPs, calculating enrichment score and significance of pathways, and plotting
    pathways.
  home: https://bioconductor.org/packages/3.22/bioc/html/PAST.html
  license: GPL (>=3) + file LICENSE
  license_file: LICENSE
  summary: Pathway Association Study Tool (PAST)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-past
  version: 1.26.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-doparallel
  - r-dplyr
  - r-foreach
  - r-ggplot2
  - r-iterators
  - r-rlang
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-qvalue >=2.42.0,<2.43.0
  - bioconductor-rtracklayer >=1.70.0,<1.71.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-base
  - r-doparallel
  - r-dplyr
  - r-foreach
  - r-ggplot2
  - r-iterators
  - r-rlang
source:
  md5: 872db8bc58c652289b17d7844331817c
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/PAST_1.26.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/PAST/PAST_1.26.0.tar.gz
  - https://bioarchive.galaxyproject.org/PAST_1.26.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-past/bioconductor-past_1.26.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('PAST')"
