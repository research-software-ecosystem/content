about:
  dev_url: https://github.com/neherlab/treetime
  doc_url: https://treetime.readthedocs.io/en/latest/index.html
  home: https://github.com/neherlab/treetime
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Maximum-Likelihood dating and ancestral inference for phylogenetic trees.
build:
  entry_points:
  - treetime = treetime.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
extra:
  identifiers:
  - doi:10.1093/ve/vex042
  recipe-maintainers:
  - corneliusroemer
  - rneher
  - ivan-aksamentov
package:
  name: treetime
  version: 0.11.5
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools
  run:
  - python >=3.7
  - numpy >=1.10.4
  - scipy >=0.16.1
  - biopython >=1.67,!=1.77,!=1.78
  - pandas >=0.17.1
  - matplotlib-base >=2.0
source:
  sha256: 04eb7fbe0cb5481465d162d66333669b1198a5630986e069e68019aafa77cdfc
  url: https://github.com/neherlab/treetime/archive/v0.11.5.tar.gz
test:
  commands:
  - treetime -h
  imports:
  - treetime
