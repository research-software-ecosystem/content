about:
  description: High-throughput single-cell measurements of DNA methylation allows
    studying inter-cellular epigenetic heterogeneity, but this task faces the challenges
    of sparsity and noise. We present vmrseq, a statistical method that overcomes
    these challenges and identifies variably methylated regions accurately and robustly.
  home: https://bioconductor.org/packages/3.22/bioc/html/vmrseq.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Probabilistic Modeling of Single-cell Methylation Heterogeneity
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
