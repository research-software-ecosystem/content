about:
  description: Cicero computes putative cis-regulatory maps from single-cell chromatin
    accessibility data. It also extends monocle 2 for use in chromatin accessibility
    data.
  home: https://bioconductor.org/packages/3.22/bioc/html/cicero.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Predict cis-co-accessibility from single-cell chromatin accessibility data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-cicero
  version: 1.28.0
requirements:
  host:
  - bioconductor-biobase >=2.70.0,<2.71.0
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-gviz >=1.54.0,<1.55.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-monocle >=2.38.0,<2.39.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - r-assertthat >=0.2.0
  - r-base
  - r-data.table >=1.10.4
  - r-dplyr >=0.7.4
  - r-fnn >=1.1
  - r-ggplot2 >=2.2.1
  - r-glasso >=1.8
  - r-igraph >=1.1.0
  - r-matrix >=1.2-12
