about:
  description: Experiment data package. The set were prepared using microarray images
    of human mesenchymal cells treated with various supplements. This package is intended
    to provide example data to test functionality provided by blima.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/blimaTestingData.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: Data for testing of the package blima.
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-blimatestingdata
  version: 1.30.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: b8a14a73b000c6264e3f704634e83e2e
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/blimaTestingData_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/blimaTestingData/blimaTestingData_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/blimaTestingData_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-blimatestingdata/bioconductor-blimatestingdata_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('blimaTestingData')"
