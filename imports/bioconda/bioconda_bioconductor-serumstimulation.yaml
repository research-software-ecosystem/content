about:
  description: Contains 13 micro array data results from a serum stimulation experiment
  home: https://bioconductor.org/packages/3.22/data/experiment/html/serumStimulation.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: serumStimulation is a data package which is used by examples in package
    pcaGoPromoter
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-serumstimulation
  version: 1.46.0
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 8c1e043ee1c006945b9ac3124188d97e
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/serumStimulation_1.46.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/serumStimulation/serumStimulation_1.46.0.tar.gz
  - https://bioarchive.galaxyproject.org/serumStimulation_1.46.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-serumstimulation/bioconductor-serumstimulation_1.46.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('serumStimulation')"
