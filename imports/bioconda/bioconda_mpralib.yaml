about:
  home: https://github.com/kircherlab/MPRAlib
  license: MIT
  license_file: LICENSE
  summary: Library to analyze count data of MPRA experiments.
build:
  entry_points:
  - mpralib = mpralib.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - visze
package:
  name: mpralib
  version: 0.10.3
requirements:
  host:
  - python >=3.10
  - setuptools
  - wheel
  - pip
  run:
  - python >=3.10
  - numpy
  - pandas
  - click
  - scikit-learn
  - scipy
  - anndata >=0.11.3
  - seaborn
  - matplotlib-base
  - jsonschema
  - tqdm
source:
  sha256: 2b436ee6d30a11d2aa8d8900b364a4a3fbae78b4b8c43f28bd7c55a1eaa4fd95
  url: https://pypi.org/packages/source/m/mpralib/mpralib-0.10.3.tar.gz
test:
  commands:
  - pip check
  - mpralib --help
  imports:
  - mpralib
  requires:
  - pip
