about:
  description: 'MAJEC is a unified framework for quantifying genes, transcript isoforms,

    and individual transposable element loci from aligned RNA-seq reads (BAM files)

    in a single analysis. It uses a junction-informed Expectation-Maximization

    algorithm operating on a joint gene+TE feature space.

    '
  dev_url: https://github.com/calico/majec
  home: https://github.com/calico/majec
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Momentum-Accelerated Junction-Enhanced Counting for RNA-seq quantification
build:
  entry_points:
  - majec_run_pipeline = majec.pipeline:main
  - majec_precompute_annotations = majec.preprocess:main
  - majec_build_db = majec.database:main
  - majec_add_norm_factors = majec.tools.normalization:main
  - majec_prepare_deseq2 = majec.analysis.deseq2:main
  - majec_visualize = majec.analysis.visualization:main
  - majec_calc_frag_len = majec.tools.fragment_lengths:main
  - majec_calc_thresholds = majec.tools.thresholds:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - ajfirestone
package:
  name: majec
  version: 0.1.4
requirements:
  host:
  - python >=3.11
  - pip
  - poetry-core >=1.0.0
  run:
  - python >=3.11
  - numpy >=2.3
  - pandas >=2.3
  - scipy >=1.16
  - intervaltree >=3.1
  - polars >=1.33
  - subread >=2.0
  - samtools >=1.20
  - bedtools >=2.31
source:
  sha256: ea56e9bb48ff41bd4d92c497defa1ff22cbbd076f03851f8e1b2306f88f02f65
  url: https://pypi.org/packages/source/m/majec/majec-0.1.4.tar.gz
test:
  commands:
  - majec_run_pipeline --help
  - majec_precompute_annotations --help
  imports:
  - majec
  - majec.pipeline
  - majec.preprocess
