about:
  description: 'PDBeCIF is a package that is used to work with mmCIF formatted files.

    The package ontains modules for accessing mmCIF data in different ways depending
    on the type of task required.

    '
  dev_url: https://github.com/pdbeurope/pdbecif
  doc_url: https://pdbeurope.github.io/pdbecif
  home: https://github.com/pdbeurope/pdbecif
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: A lightweight pure python package for reading, writing and manipulating
    mmCIF files distributed by the wwPDB.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  identifiers:
  - doi:10.1186/s12859-021-04271-9
  recipe-maintainers:
  - eunos-1128
package:
  name: pdbecif
  version: '1.5'
requirements:
  host:
  - pip
  - pytest-runner
  - python .*
  - setuptools
  - wheel
  run:
  - python >=
source:
  sha256: b3925fa22095a8780ac3f9c93ca8c94d89434d93fd959dfa240fcefde0ecfeb1
  url: https://pypi.org/packages/source/p/pdbecif/PDBeCif-1.5.tar.gz
test:
  commands:
  - pip check
  imports:
  - com
  - mmCif
  - pdbecif
  requires:
  - pip
  - python .*
