about:
  description: Adopting tipping-point theory to transcriptome profiles to unravel
    disease regulatory trajectory.
  home: https://bioconductor.org/packages/3.22/bioc/html/BioTIP.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: 'BioTIP: An R package for characterization of Biological Tipping-Point'
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-biotip
  version: 1.24.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-scran >=1.38.0,<1.39.0
  - r-base
  - r-cluster
  - r-doparallel
  - r-foreach
  - r-igraph
  - r-mass
  - r-psych
  - r-stringr
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-scran >=1.38.0,<1.39.0
  - r-base
  - r-cluster
  - r-doparallel
  - r-foreach
  - r-igraph
  - r-mass
  - r-psych
  - r-stringr
source:
  md5: e64b98d3815884bbd56bb6200dae69bb
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BioTIP_1.24.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BioTIP/BioTIP_1.24.0.tar.gz
  - https://bioarchive.galaxyproject.org/BioTIP_1.24.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biotip/bioconductor-biotip_1.24.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('BioTIP')"
