about:
  dev_url: https://github.com/statgen/savvy
  home: https://github.com/statgen/savvy
  license: MPL-2.0
  license_family: MOZILLA
  license_file: LICENSE
  summary: Interface to various variant calling formats.
build:
  number: 0
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  recipe-maintainers:
  - matuskosut
  - jonathonl
  skip-lints:
  - compiler_needs_stdlib_c
package:
  name: savvy
  version: 2.2.0
requirements:
  build:
  - null
  - null
  - pkg-config
  - cmake <4
  - make
  host:
  - shrinkwrap
  - zstd
  - zlib
  - liblzma-devel
  run:
  - shrinkwrap
source:
  patches:
  - patches/0002-patch-cmakelists-for-conda-build.patch
  sha256: f96585faddeba9dd6bbf22f828ecb9f866cc7075947dd25f89c1a618cb9f3bb5
  url: https://github.com/statgen/savvy/archive/v2.2.0.tar.gz
test:
  commands:
  - test -d ${PREFIX}/include/savvy
  - test -f ${PREFIX}/include/savvy/savvy.hpp
  - sav --help
