about:
  description: 'Cerberus is an opinionated all-in-one host-decontamination pipeline
    that

    produces three publication-ready outputs from a single run: a paired-end

    assembly-ready FASTQ pair (conservative), a single merged FASTQ for

    taxonomic profiling (aggressive), and a GDPR-compliant zero-host scrubbed

    output (via two orthogonal mechanisms: Kraken2 + minimap2). Works on

    Illumina short reads, ONT long reads, and PacBio HiFi/CLR. Autotunes its

    parameters from fastp QC.

    '
  dev_url: https://github.com/iowa69/cerberus
  doc_url: https://github.com/iowa69/cerberus
  home: https://github.com/iowa69/cerberus
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Three-headed host-removal pipeline for metagenomics: assembly, profiling,
    and GDPR-compliant outputs from one run.'
build:
  entry_points:
  - cerberus = cerberus.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  identifiers:
  - doi:10.5281/zenodo.20258069
  recipe-maintainers:
  - iowa69
package:
  name: cerberus-mg
  version: 0.1.1
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools >=68
  run:
  - python >=3.10
  - tqdm >=4.66
  - pyyaml >=6.0
  - fastp >=0.24
  - minimap2 >=2.28
  - bowtie2 >=2.5
  - bbmap >=39.0
  - kraken2 >=2.1.3
  - samtools >=1.20
  - seqkit >=2.8
  - pigz
  - aria2
  - multiqc >=1.25
  - chopper >=0.9
  - winnowmap >=2.03
  - bedtools >=2.31
  - zstd >=1.5
source:
  sha256: c17944783acded3876b5d49a572ac77371b8e1737646b05f8b4c87f5d8d149bf
  url: https://github.com/iowa69/cerberus/archive/refs/tags/v0.1.1.tar.gz
test:
  commands:
  - cerberus --version
  - cerberus --help
  imports:
  - cerberus
