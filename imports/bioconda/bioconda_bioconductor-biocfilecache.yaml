about:
  description: This package creates a persistent on-disk cache of files that the user
    can add, update, and retrieve. It is useful for managing resources (such as custom
    Txdb objects) that are costly or difficult to create, web resources, and data
    files used across sessions.
  home: https://bioconductor.org/packages/3.22/bioc/html/BiocFileCache.html
  license: Artistic-2.0
  summary: Manage Files Across Sessions
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-biocfilecache
    path: recipes/bioconductor-biocfilecache
    version: 1.4.0
package:
  name: bioconductor-biocfilecache
  version: 3.0.0
requirements:
  host:
  - r-base
  - r-curl
  - r-dbi
  - r-dbplyr >=1.0.0
  - r-dplyr
  - r-filelock
  - r-httr2
  - r-rsqlite
  run:
  - r-base
  - r-curl
  - r-dbi
  - r-dbplyr >=1.0.0
  - r-dplyr
  - r-filelock
  - r-httr2
  - r-rsqlite
source:
  md5: ab689154f452b7f076467111dcda6a2f
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/BiocFileCache_3.0.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/BiocFileCache/BiocFileCache_3.0.0.tar.gz
  - https://bioarchive.galaxyproject.org/BiocFileCache_3.0.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-biocfilecache/bioconductor-biocfilecache_3.0.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('BiocFileCache')"
