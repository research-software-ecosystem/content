about:
  description: Tools for NanoString Technologies GeoMx Technology. Package provides
    functions for reading in DCC and PKC files based on an ExpressionSet derived object.  Normalization
    and QC functions are also included.
  home: https://bioconductor.org/packages/3.22/bioc/html/GeomxTools.html
  license: MIT
  summary: NanoString GeoMx Tools
