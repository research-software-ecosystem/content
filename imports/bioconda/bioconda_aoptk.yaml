about:
  dev_url: https://github.com/rdurnik/aoptk
  doc_url: https://github.com/rdurnik/aoptk
  home: https://github.com/rdurnik/aoptk
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Tools to support data mining for the development of (q)AOPs.
build:
  entry_points:
  - chemical-identifier = aoptk.application.chemical_identifier:cli
  - publication-tracker = aoptk.application.publication_tracker:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - hechth
  - rdurnik
package:
  name: aoptk
  version: 0.3.2
requirements:
  host:
  - python >=3.8
  - setuptools >=64.0.0
  - setuptools-scm
  - wheel
  - pip
  run:
  - python >=3.8
  - pandas
  - pymupdf
  - metapub
  - requests
  - scispacy
  - spacy >=3.0.0,<3.8.0
  - huggingface_hub >=0.1.0,<1.0
  - beautifulsoup4
  - biopython
  - transformers
  - pytorch
  - openpyxl
  - click >=8.1
  - openai
  - spacy-layout
source:
  sha256: 6d933144e4a3a3ebfce283b76da7a7390e4e5b774d0c45e44cc30d2c81e629ff
  url: https://pypi.org/packages/source/a/aoptk/aoptk-0.3.2.tar.gz
test:
  commands:
  - chemical-identifier --help
  - publication-tracker --help
  imports:
  - aoptk
