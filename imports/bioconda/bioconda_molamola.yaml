about:
  description: 'A Python plotting tool for Oxford Nanopore variation data.

    One VCF in, one self-contained HTML report out. molamola

    inspects the VCF header and dispatches to the right plot type:

    a circos + linear cytoband SV report for long-read SV VCFs

    (Sniffles2 / cuteSV / SVIM / pbsv / NanoVar), or per-gene

    phased-haplotype panels for compound-het workup from phased

    + VEP-annotated small-variant VCFs.

    '
  dev_url: https://github.com/martinandclaude/molamola
  doc_url: https://github.com/martinandclaude/molamola
  home: https://github.com/martinandclaude/molamola
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Plot Oxford Nanopore variation as self-contained HTML reports.
build:
  entry_points:
  - molamola = molamola:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - martinandclaude
package:
  name: molamola
  version: 0.2.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools >=68
  - wheel
  run:
  - python >=3.10
  - matplotlib-base >=3.6
  - numpy >=1.23
  - pandas >=1.5
  - biopython >=1.80
  - pycirclize >=1.10
source:
  sha256: 6653ec0f5dd1719111491442f3b9b17a40ad1ad4adcb4df36be783e9cdbcd37e
  url: https://pypi.io/packages/source/m/molamola/molamola-0.2.0.tar.gz
test:
  commands:
  - molamola --help
  imports:
  - molamola
  requires:
  - pip
  source_files:
  - tests/
