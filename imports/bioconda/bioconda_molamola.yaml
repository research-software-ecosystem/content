about:
  description: "A Python plotting tool for Oxford Nanopore variation data.\nOne input\
    \ in, one self-contained HTML report out. molamola\npicks the visualiser from\
    \ its input:\n\n* VCF with ``##INFO=<ID=SVTYPE,...>``: a circos + linear\n  cytoband\
    \ SV report (Sniffles2 / cuteSV / SVIM / pbsv /\n  NanoVar).\n* VCF with ``##INFO=<ID=CSQ,...>``\
    \ + ``##FORMAT=<ID=PS,...>``:\n  per-gene phased-haplotype panels for compound-het\
    \ workup\n  from phased + VEP-annotated small-variant VCFs.\n* Mosdepth ``regions.bed.gz``\
    \ (via ``--mosdepth``): a\n  karyotype coverage report -- genome-wide CN scatter\
    \ +\n  rolling-median smooth, with an optional BAF panel beneath\n  when paired\
    \ with a small-variant VCF.\n"
  dev_url: https://github.com/martinandclaude/molamola
  doc_url: https://github.com/martinandclaude/molamola
  home: https://github.com/martinandclaude/molamola
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Plot Oxford Nanopore variation as self-contained HTML reports.
build:
  entry_points:
  - molamola = molamola:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - martinandclaude
package:
  name: molamola
  version: 0.3.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools >=68
  - wheel
  run:
  - python >=3.10
  - matplotlib-base >=3.6
  - numpy >=1.23
  - pandas >=1.5
  - biopython >=1.80
  - pycirclize >=1.10
source:
  sha256: 1dec3cb110fd507e53632e28e2272031ceea1f2248307a4079ad93d22f2c0b28
  url: https://pypi.io/packages/source/m/molamola/molamola-0.3.0.tar.gz
test:
  commands:
  - molamola --help
  imports:
  - molamola
  requires:
  - pip
  source_files:
  - tests/
