about:
  description: Base annotation databases for chicken, intended ONLY to be used by
    AnnotationDbi to produce regular annotation packages.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/chicken.db0.html
  license: Artistic-2.0
  summary: Base Level Annotation databases for chicken
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-chicken.db0
  version: 3.22.0
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: fe5904026b37d501a0ec32e457ce0ea4
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/chicken.db0_3.22.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/chicken.db0/chicken.db0_3.22.0.tar.gz
  - https://bioarchive.galaxyproject.org/chicken.db0_3.22.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-chicken.db0/bioconductor-chicken.db0_3.22.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('chicken.db0')"
