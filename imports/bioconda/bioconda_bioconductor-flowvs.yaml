about:
  description: Per-channel variance stabilization from a collection of flow cytometry
    samples by Bertlett test for homogeneity of variances. The approach is applicable
    to microarrays data as well.
  home: https://bioconductor.org/packages/3.22/bioc/html/flowVS.html
  license: Artistic-2.0
  summary: Variance stabilization in flow cytometry (and microarrays)
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-flowvs
  version: 1.42.0
requirements:
  host:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowstats >=4.22.0,<4.23.0
  - bioconductor-flowviz >=1.74.0,<1.75.0
  - r-base
  run:
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowstats >=4.22.0,<4.23.0
  - bioconductor-flowviz >=1.74.0,<1.75.0
  - r-base
source:
  md5: 45d821c5c5db51e63f5fa51f8de2d6d6
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/flowVS_1.42.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/flowVS/flowVS_1.42.0.tar.gz
  - https://bioarchive.galaxyproject.org/flowVS_1.42.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-flowvs/bioconductor-flowvs_1.42.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('flowVS')"
