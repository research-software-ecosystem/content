about:
  description: This is a package that includes pre-processing and quality control
    functions that can remove margin events, compensate and transform the data and
    that will use PeacoQCSignalStability for quality control. This last function will
    first detect peaks in each channel of the flowframe. It will remove anomalies
    based on the IsolationTree function and the MAD outlier detection method. This
    package can be used for both flow- and mass cytometry data.
  home: https://bioconductor.org/packages/3.22/bioc/html/PeacoQC.html
  license: GPL (>=3)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Peak-based selection of high quality cytometry data
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-peacoqc
  version: 1.20.0
requirements:
  host:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowworkspace >=4.22.0,<4.23.0
  - r-base
  - r-circlize
  - r-ggplot2
  - r-gridextra
  - r-plyr
  run:
  - bioconductor-complexheatmap >=2.26.0,<2.27.0
  - bioconductor-flowcore >=2.22.0,<2.23.0
  - bioconductor-flowworkspace >=4.22.0,<4.23.0
  - r-base
  - r-circlize
  - r-ggplot2
  - r-gridextra
  - r-plyr
source:
  md5: 5e49d8de49cec4c01d2ea082e6d04006
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/PeacoQC_1.20.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/PeacoQC/PeacoQC_1.20.0.tar.gz
  - https://bioarchive.galaxyproject.org/PeacoQC_1.20.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-peacoqc/bioconductor-peacoqc_1.20.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('PeacoQC')"
