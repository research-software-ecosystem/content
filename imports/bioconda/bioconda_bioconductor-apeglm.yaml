about:
  description: apeglm provides Bayesian shrinkage estimators for effect sizes for
    a variety of GLM models, using approximation of the posterior for individual coefficients.
  home: https://bioconductor.org/packages/3.22/bioc/html/apeglm.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Approximate posterior estimation for GLM coefficients
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  parent_recipe:
    name: bioconductor-apeglm
    path: recipes/bioconductor-apeglm
    version: 1.2.1
package:
  name: bioconductor-apeglm
  version: 1.32.0
requirements:
  build:
  - null
  - null
  - make
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-emdbook
  - r-rcpp
  - r-rcppeigen
  - r-rcppnumerical
  - libblas
  - liblapack
  - zlib
  - liblzma-devel
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-emdbook
  - r-rcpp
  - r-rcppeigen
  - r-rcppnumerical
source:
  md5: 844f77046de2ac9d9e92d6ae42a8189e
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/apeglm_1.32.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/apeglm/apeglm_1.32.0.tar.gz
  - https://bioarchive.galaxyproject.org/apeglm_1.32.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-apeglm/bioconductor-apeglm_1.32.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('apeglm')"
