about:
  dev_url: https://github.com/fhcrc/taxtastic
  doc_url: https://fhcrc.github.io/taxtastic/index.html
  home: https://github.com/fhcrc/taxtastic
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Tools for taxonomic naming and annotation.
build:
  entry_points:
  - taxit = taxtastic.scripts.taxit:main
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - export SETUPTOOLS_SCM_PRETEND_VERSION="${PKG_VERSION}"
  - -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
package:
  name: taxtastic
  version: 1.0.1
requirements:
  host:
  - python >=3.8
  - setuptools
  - setuptools-scm >=8
  - pip
  run:
  - python >=3.8
  - dendropy
  - pyyaml
  - decorator
  - fastalite
  - jinja2
  - psycopg2-binary
  - sqlalchemy >=2
  - sqlparse
source:
  sha256: 054e623875b522ad4305de0b22598c0c29f80321c6e985f852f3c0e7b19f3bd2
  url: https://pypi.org/packages/source/t/taxtastic/taxtastic-1.0.1.tar.gz
test:
  commands:
  - taxit --help
  imports:
  - taxtastic
  - taxtastic.scripts
  - taxtastic.subcommands
