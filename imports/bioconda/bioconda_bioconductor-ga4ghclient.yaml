about:
  description: GA4GHclient provides an easy way to access public data servers through
    Global Alliance for Genomics and Health (GA4GH) genomics API. It provides low-level
    access to GA4GH API and translates response data into Bioconductor-based class
    objects.
  home: https://bioconductor.org/packages/3.22/bioc/html/GA4GHclient.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: A Bioconductor package for accessing GA4GH API data servers
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ga4ghclient
  version: 1.34.0
requirements:
  host:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-dplyr
  - r-httr
  - r-jsonlite
  run:
  - bioconductor-biocgenerics >=0.56.0,<0.57.0
  - bioconductor-biostrings >=2.78.0,<2.79.0
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - bioconductor-iranges >=2.44.0,<2.45.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-seqinfo >=1.0.0,<1.1.0
  - bioconductor-variantannotation >=1.56.0,<1.57.0
  - r-base
  - r-dplyr
  - r-httr
  - r-jsonlite
source:
  md5: c59a4d6849903668c3bc58007e39b1ec
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/GA4GHclient_1.34.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GA4GHclient/GA4GHclient_1.34.0.tar.gz
  - https://bioarchive.galaxyproject.org/GA4GHclient_1.34.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-ga4ghclient/bioconductor-ga4ghclient_1.34.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('GA4GHclient')"
