about:
  description: ramr is an R package for detection of epimutations (i.e., infrequent
    aberrant DNA methylation events) in large data sets obtained by methylation profiling
    using array or high-throughput methylation sequencing. In addition, package provides
    functions to visualize found aberrantly methylated regions (AMRs), to generate
    sets of all possible regions to be used as reference sets for enrichment analysis,
    and to generate biologically relevant test data sets for performance evaluation
    of AMR/DMR search algorithms.
  home: https://bioconductor.org/packages/3.22/bioc/html/ramr.html
  license: Artistic-2.0
  summary: Detection of Rare Aberrantly Methylated Regions in Array and NGS Data
build:
  number: 1
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-ramr
