about:
  description: A data package containing annotation data for JazaeriMetaData assembled
    using data from public repositories
  home: https://bioconductor.org/packages/3.22/data/annotation/html/JazaeriMetaData.db.html
  license: Artistic-2.0
  summary: A data package containing annotation data for JazaeriMetaData
build:
  noarch: generic
  number: 14
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-jazaerimetadata.db
  version: 3.2.3
requirements:
  host:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - r-base
  run:
  - bioconductor-annotationdbi >=1.72.0,<1.73.0
  - bioconductor-org.hs.eg.db >=3.22.0,<3.23.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 3a154a74ac2acebe3471b039c9d9a4dc
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/JazaeriMetaData.db_3.2.3.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/JazaeriMetaData.db/JazaeriMetaData.db_3.2.3.tar.gz
  - https://bioarchive.galaxyproject.org/JazaeriMetaData.db_3.2.3.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-jazaerimetadata.db/bioconductor-jazaerimetadata.db_3.2.3_src_all.tar.gz
test:
  commands:
  - $R -e "library('JazaeriMetaData.db')"
