about:
  description: Provides functionality for processing and statistical analysis of multiplexed
    assays of variant effect (MAVE) and similar data. The package contains functions
    covering the full workflow from raw FASTQ files to publication-ready visualizations.
    A broad range of library designs can be processed with a single, unified interface.
  home: https://bioconductor.org/packages/3.22/bioc/html/mutscan.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Preprocessing and Analysis of Deep Mutational Scanning Data
build:
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
