about:
  description: Files for mapping between NCBI taxonomy ID and species. Used by functions
    in the GenomeInfoDb package.
  home: https://bioconductor.org/packages/3.22/data/annotation/html/GenomeInfoDbData.html
  license: Artistic-2.0
  summary: Species and taxonomy ID look up tables used by GenomeInfoDb
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
extra:
  parent_recipe:
    name: bioconductor-genomeinfodbdata
    path: recipes/bioconductor-genomeinfodbdata
    version: 1.1.0
package:
  name: bioconductor-genomeinfodbdata
  version: 1.2.15
requirements:
  host:
  - r-base
  run:
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 70fe5d6fa0b71bfacb94dfbee477d0c9
  url:
  - https://bioconductor.org/packages/3.22/data/annotation/src/contrib/GenomeInfoDbData_1.2.15.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/GenomeInfoDbData/GenomeInfoDbData_1.2.15.tar.gz
  - https://bioarchive.galaxyproject.org/GenomeInfoDbData_1.2.15.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-genomeinfodbdata/bioconductor-genomeinfodbdata_1.2.15_src_all.tar.gz
test:
  commands:
  - $R -e "library('GenomeInfoDbData')"
