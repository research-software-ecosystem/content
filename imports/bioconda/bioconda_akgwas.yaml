about:
  description: 'AKmerGWAS is a pipeline for k-mer based genome-wide association studies
    with any input format (shor_read; assembly; genomes).

    '
  dev_url: https://github.com/suzkami/AKmerGWAS
  home: https://github.com/suzkami/Aseembly_GWAS
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: AKmerGWAS -- All input format (shor_read; assembly; genomes) k-mer GWAS.
build:
  entry_points:
  - akgwas = akgwas.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  - find $PREFIX -type f -name "*.sh" -exec chmod +x {} \;
package:
  name: akgwas
  version: 0.1.0
requirements:
  host:
  - python >=3.11,<3.14
  - pip
  - setuptools
  run:
  - python >=3.11,<3.14
  - perl
  - snakemake-minimal >=9,<10
  - kmtricks
  - gemma
  - bwa
  - samtools
  - plink
  - parallel
  - rush
source:
  sha256: 25218c848dca7064c645803f2147998220f0252c21e6b1c59292b62164665c50
  url: https://github.com/suzkami/AKmerGWAS/archive/refs/tags/v0.1.0.tar.gz
test:
  commands:
  - akgwas --help
