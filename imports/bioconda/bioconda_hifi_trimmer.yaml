about:
  home: https://github.com/sanger-tol/hifi-trimmer
  license: MIT
  license_file: LICENSE
  summary: hifi-trimmer is a tool for filtering and trimming extraneous adapter hits
    from a HiFi read set using a BLAST search.
build:
  entry_points:
  - hifi-trimmer = hifi_trimmer.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - prototaxites
package:
  name: hifi_trimmer
  version: 3.1.0
requirements:
  host:
  - python >=3.10
  - hatchling
  - pip
  run:
  - python >=3.10
  - py-bgzip >=0.5.1
  - click >=8.1.8
  - polars <=1.22.0
  - pysam >=0.23.0
  - pyyaml >=6.0.2
  - loguru >=0.7.3
source:
  sha256: d1d05c95acc65cec296132d69f8747e731666cb1640105843ad14138a82dd7a0
  url: https://pypi.org/packages/source/h/hifi_trimmer/hifi_trimmer-3.1.0.tar.gz
test:
  commands:
  - pip check
  - hifi-trimmer --help
  imports:
  - hifi_trimmer
  requires:
  - pip
