about:
  description: '`BatchSVG` is a feature-based Quality Control (QC) to identify SVGs
    on spatial transcriptomics data with specific types of batch effect. Regarding
    to the spatial transcriptomics data experiments, the batch can be defined as "sample",
    "sex", and etc.The `BatchSVG` method is based on binomial deviance model (Townes
    et al, 2019) and applies cutoffs based on the number of standard deviation (nSD)
    of relative change in deviance and rank difference as the data-driven thresholding
    approach to detect the batch-biased outliers.'
  home: https://bioconductor.org/packages/3.22/bioc/html/BatchSVG.html
  license: Artistic-2.0
  summary: Identify Batch-Biased Features in Spatially Variable Genes
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
