about:
  description: Data objects necessary to some mCSEA package functions. There are also
    example data objects to illustrate mCSEA package functionality.
  home: https://bioconductor.org/packages/3.22/data/experiment/html/mCSEAdata.html
  license: GPL-2
  license_file: /lib/R/share/licenses/GPL-2
  summary: Data package for mCSEA package
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-mcseadata
  version: 1.30.0
requirements:
  host:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  run:
  - bioconductor-genomicranges >=1.62.0,<1.63.0
  - r-base
  - curl
  - bioconductor-data-packages >=20260207
source:
  md5: 77fb578de54fe9867b69a8742af8a9c3
  url:
  - https://bioconductor.org/packages/3.22/data/experiment/src/contrib/mCSEAdata_1.30.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/mCSEAdata/mCSEAdata_1.30.0.tar.gz
  - https://bioarchive.galaxyproject.org/mCSEAdata_1.30.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-mcseadata/bioconductor-mcseadata_1.30.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('mCSEAdata')"
