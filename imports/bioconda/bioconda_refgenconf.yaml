about:
  home: https://refgenie.databio.org
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: A standardized configuration object for reference genome assemblies
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - stolarczyk
package:
  name: refgenconf
  version: 0.13.1
requirements:
  host:
  - pip
  - python >=3.6
  - setuptools
  run:
  - python >=3.6
  - pyyaml
  - requests
  - yacman >=0.8.0
  - future
  - rich >=9.0.1
  - jsonschema >=3.0.1
source:
  sha256: 4653d5ada163a2716ef61f834207c55761d0ad681c8204a1a4873ef3708eb027
  url: https://pypi.org/packages/source/r/refgenconf/refgenconf-0.13.1.tar.gz
test:
  imports:
  - refgenconf
  requires:
  - pytest
