about:
  dev_url: https://github.com/LucoDevro/CAGEcleaner
  doc_url: https://github.com/LucoDevro/CAGEcleaner/wiki
  home: https://github.com/LucoDevro/CAGEcleaner
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Redundancy removal for gene cluster mining hit sets
build:
  entry_points:
  - cagecleaner = cagecleaner.main:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir'
extra:
  identifiers:
  - doi:10.1101/2025.02.19.639057
  recipe-maintainers:
  - LucoDevro
  - mimitair
package:
  name: cagecleaner
  version: 1.5.0
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - biopython
  - cblaster >=1.3.20
  - pandas <3.0.0
  - scipy <=1.14.1
  - ncbi-datasets-cli
  - skder >=1.3.4
  - any2fasta >=0.8.1
  - mmseqs2
  - networkx
source:
  sha256: 0474489d1b2bdfbd98a38d9f305d3adbfb69b453cc10521625c43e2dcc28f72f
  url: https://pypi.org/packages/source/c/cagecleaner/cagecleaner-1.5.0.tar.gz
test:
  commands:
  - cagecleaner -h
