about:
  dev_url: https://github.com/HKU-BAL/Clair3
  doc_url: https://github.com/HKU-BAL/Clair3
  home: https://github.com/HKU-BAL/Clair3
  license: BSD-3-Clause
  license_file: LICENSE.md
  summary: Clair3 is a small variant caller for long-reads. Clair3 makes the best
    of both worlds of using pileup or full-alignment as input for deep-learning based
    long-read small variant calling. Clair3 is simple and modular for easy deployment
    and integration.
build:
  number: 1
  run_exports:
  - null
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  container:
    extended-base: true
package:
  name: clair3
  version: 2.0.0
requirements:
  build:
  - null
  - null
  - make
  - automake
  host:
  - python 3.11.*
  - pip
  - mpmath
  - cffi <2
  - bzip2
  - xz
  - zlib
  - libcurl
  - openssl
  - libdeflate
  - longphase
  run:
  - python 3.11.*
  - pytorch-cpu
  - torchmetrics
  - numpy
  - h5py
  - hdf5plugin
  - numexpr
  - tqdm
  - samtools >=1.15
  - whatshap >=1.0
  - pigz
  - parallel >=20191122
  - zstd
  - openssl
  - cffi <2
  - longphase
source:
- sha256: 8a2d6bb6ded3163361a1d762168013f599d232a65d9a4a7777dd3e178ae7951b
  url: https://github.com/HKU-BAL/Clair3/archive/refs/tags/v2.0.0.tar.gz
test:
  commands:
  - longphase --version
  - which run_clair3.sh
  - run_clair3.sh -v
