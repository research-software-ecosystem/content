about:
  description: Tools for compositional and other sample-level ecological analyses
    and visualizations tailored for single-cell RNA-seq data. SETA includes functions
    for taxonomizing celltypes, normalizing data, performing statistical tests, and
    visualizing results. Several tutorials are included to guide users and introduce
    them to key concepts. SETA is meant to teach users about statistical concepts
    underlying ecological analysis methods so they can apply them to their own single-cell
    data.
  home: https://bioconductor.org/packages/3.22/bioc/html/SETA.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Single Cell Ecological Taxonomic Analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-seta
  version: 1.0.0
requirements:
  host:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - r-dplyr
  - r-mass
  - r-matrix
  - r-rlang
  - r-tidygraph
  run:
  - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
  - r-base
  - r-dplyr
  - r-mass
  - r-matrix
  - r-rlang
  - r-tidygraph
