about:
  description: pairedGSEA makes it simple to run a paired Differential Gene Expression
    (DGE) and Differencital Gene Splicing (DGS) analysis. The package allows you to
    store intermediate results for further investiation, if desired. pairedGSEA comes
    with a wrapper function for running an Over-Representation Analysis (ORA) and
    functionalities for plotting the results.
  home: https://bioconductor.org/packages/3.22/bioc/html/pairedGSEA.html
  license: MIT + file LICENSE
  license_file: LICENSE
  summary: Paired DGE and DGS analysis for gene set enrichment analysis
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-pairedgsea
  version: 1.10.0
requirements:
  host:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-dexseq >=1.56.0,<1.57.0
  - bioconductor-fgsea >=1.36.0,<1.37.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-aggregation
  - r-base
  - r-ggplot2
  - r-msigdbr
  - r-showtext
  run:
  - bioconductor-biocparallel >=1.44.0,<1.45.0
  - bioconductor-deseq2 >=1.50.0,<1.51.0
  - bioconductor-dexseq >=1.56.0,<1.57.0
  - bioconductor-fgsea >=1.36.0,<1.37.0
  - bioconductor-limma >=3.66.0,<3.67.0
  - bioconductor-s4vectors >=0.48.0,<0.49.0
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - bioconductor-sva >=3.58.0,<3.59.0
  - r-aggregation
  - r-base
  - r-ggplot2
  - r-msigdbr
  - r-showtext
