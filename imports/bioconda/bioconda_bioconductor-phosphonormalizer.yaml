about:
  description: It uses the overlap between enriched and non-enriched datasets to compensate
    for the bias introduced in global phosphorylation after applying median normalization.
  home: https://bioconductor.org/packages/3.22/bioc/html/phosphonormalizer.html
  license: GPL (>= 2)
  license_file: /lib/R/share/licenses/GPL-3
  summary: Compensates for the bias introduced by median normalization in
