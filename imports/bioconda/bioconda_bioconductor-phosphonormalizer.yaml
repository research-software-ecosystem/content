  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-phosphonormalizer
  version: 1.34.0
requirements:
  host:
  - r-base
  - r-matrixstats
  - r-plyr
  run:
  - r-base
  - r-matrixstats
  - r-plyr
source:
