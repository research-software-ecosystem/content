about:
  description: FeatSeekR performs unsupervised feature selection using replicated
    measurements. It iteratively selects features with the highest reproducibility
    across replicates, after projecting out those dimensions from the data that are
    spanned by the previously selected features. The selected a set of features has
    a high replicate reproducibility and a high degree of uniqueness.
  home: https://bioconductor.org/packages/3.22/bioc/html/FeatSeekR.html
  license: GPL-3
  license_file: /lib/R/share/licenses/GPL-3
  summary: FeatSeekR an R package for unsupervised feature selection
build:
  noarch: generic
  number: 0
  rpaths:
  - lib/R/lib/
  - lib/
  run_exports: ''
package:
  name: bioconductor-featseekr
  version: 1.10.0
requirements:
  host:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-mass
  - r-pheatmap
  - r-pracma
  run:
  - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
  - r-base
  - r-mass
  - r-pheatmap
  - r-pracma
source:
  md5: 50cc70a5cbf660ab8dec2c4a59447e8b
  url:
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/FeatSeekR_1.10.0.tar.gz
  - https://bioconductor.org/packages/3.22/bioc/src/contrib/Archive/FeatSeekR/FeatSeekR_1.10.0.tar.gz
  - https://bioarchive.galaxyproject.org/FeatSeekR_1.10.0.tar.gz
  - https://depot.galaxyproject.org/software/bioconductor-featseekr/bioconductor-featseekr_1.10.0_src_all.tar.gz
test:
  commands:
  - $R -e "library('FeatSeekR')"
