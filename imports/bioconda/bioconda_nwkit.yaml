about:
  home: https://github.com/kfuku52/nwkit
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Tools for processing newick trees
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-build-isolation --no-deps -vv'
extra:
  recipe-maintainers:
  - kfuku52
package:
  name: nwkit
  version: 0.19.2
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.8
  - ete3
  - biopython
  - pandas
  - requests
  - numpy
source:
  sha256: a89e1cc9f3762a0386cecf983ecfb4541b5f79657b589ea165afaf7be5357bb5
  url: https://github.com/kfuku52/nwkit/archive/refs/tags/v0.19.2.tar.gz
test:
  commands:
  - nwkit --help
  imports:
  - nwkit
