about:
  home: https://github.com/kfuku52/nwkit
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Tools for processing newick trees
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-build-isolation --no-deps -vv'
extra:
  recipe-maintainers:
  - kfuku52
package:
  name: nwkit
  version: 0.21.1
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.9
  - ete4 >=4.3.0
  - biopython
  - pandas
  - requests
  - numpy
source:
  sha256: 16a7026eec1e29fc65fc96932ccc6e8dd83733e644d388920ede7e4ff7c3bfca
  url: https://github.com/kfuku52/nwkit/archive/refs/tags/v0.21.1.tar.gz
test:
  commands:
  - nwkit --help
  imports:
  - nwkit
